liquid_glass:
  lovelace-background: "center top / cover no-repeat scroll url('/local/liquid_glass_bg.png')"
  primary-background-color: "#08111f"
  secondary-background-color: "#0f172a"
  card-background-color: "rgba(15, 23, 42, 0.58)"
  ha-card-background: "rgba(15, 23, 42, 0.58)"
  primary-text-color: "#f8fafc"
  secondary-text-color: "#cbd5e1"
  divider-color: "rgba(148, 163, 184, 0.18)"
  app-header-background-color: "rgba(15, 23, 42, 0.62)"
  app-header-text-color: "#f8fafc"
  sidebar-background-color: "rgba(15, 23, 42, 0.82)"
  paper-dialog-background-color: "rgba(15, 23, 42, 0.82)"
  popup-background-color: "rgba(15, 23, 42, 0.82)"
  paper-item-icon-color: "#94a3b8"
  paper-item-icon-active-color: "#f8fafc"
  state-icon-color: "#94a3b8"
  state-icon-active-color: "#f8fafc"
  mush-rgb-state-light: "248, 250, 252"
  card-mod-theme: "liquid_glass"
  card-mod-root: |
    :host,
    ha-app-layout,
    .content,
    hui-view {
      scrollbar-width: none !important;
      -ms-overflow-style: none !important;
    }
    :host::-webkit-scrollbar,
    ha-app-layout::-webkit-scrollbar,
    .content::-webkit-scrollbar,
    hui-view::-webkit-scrollbar {
      display: none !important;
      width: 0 !important;
      height: 0 !important;
    }
  card-mod-view: |
    :host {
      scrollbar-width: none !important;
      -ms-overflow-style: none !important;
    }
    :host::-webkit-scrollbar {
      display: none !important;
      width: 0 !important;
      height: 0 !important;
    }
