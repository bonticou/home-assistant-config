      - name: "Piano Tuning Due"
        unique_id: piano_tuning_due
        state: >
          {% set last = states('input_datetime.piano_last_tuned') %}
          {% set snooze = states('input_datetime.piano_tuning_snooze_until') %}
          {% set snoozed = snooze not in ['unknown', 'unavailable', '']
             and as_timestamp(snooze, 0) > as_timestamp(now()) %}
