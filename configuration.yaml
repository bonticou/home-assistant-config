            {% set rooms = [
              {'label': 'Kitchen', 'temp': states('sensor.main_floor_temperature'), 'humidity': states('sensor.main_floor_humidity')},
              {'label': 'Dining Room', 'temp': states('sensor.main_floor_2_temperature'), 'humidity': states('sensor.main_floor_2_humidity')},
              {'label': 'Primary Bedroom', 'temp': states('sensor.master_temperature'), 'humidity': states('sensor.master_humidity')},
              {'label': 'Office', 'temp': states('sensor.office_current_temperature'), 'humidity': states('sensor.office_current_humidity')}
            ] %}
            {% set ns = namespace(best='None', score=-999) %}
            {% if is_number(outdoor) %}
              {% for room in rooms %}
                {% set t = room.temp %}
                {% set h = room.humidity %}
                {% if is_number(t) and is_number(h) %}
                  {% set humidity_penalty = [0, [((h | float(0)) - 45) * 0.08, 2] | min] | max %}
                  {% set adjusted = (t | float(0)) + humidity_penalty %}
                  {% set score = adjusted - (outdoor | float(0)) %}
                  {% if adjusted >= 70 and score >= required_advantage and score > ns.score %}
                    {% set ns.best = room.label %}
                    {% set ns.score = score %}
                  {% endif %}
                {% endif %}
              {% endfor %}
            {% endif %}
            {{ ns.best }}
          eligible_rooms: >
            {% set outdoor = states('sensor.downstairs_outdoor_temp') %}
            {% set required_advantage = states('input_number.downstairs_open_window_advantage') | float(3) %}
            {% set rooms = [
              {'label': 'Kitchen', 'temp': states('sensor.main_floor_temperature'), 'humidity': states('sensor.main_floor_humidity')},
