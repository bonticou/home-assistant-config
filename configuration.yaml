          {{ 'mdi:calendar-alert' if is_state('binary_sensor.casey_driver_license_renewal_due', 'on') else 'mdi:card-account-details-outline' }}

  - sensor:
      - name: "Main Floor Temp Avg"
        unique_id: downstairs_temp_avg
        unit_of_measurement: "°F"
        device_class: temperature
        state_class: measurement
        state: >
          {% set ns = namespace(values=[]) %}
          {% if is_number(states('sensor.main_floor_temperature')) %}
            {% set ns.values = ns.values + [states('sensor.main_floor_temperature') | float(0)] %}
          {% endif %}
          {% if is_number(states('sensor.main_floor_2_temperature')) %}
            {% set ns.values = ns.values + [states('sensor.main_floor_2_temperature') | float(0)] %}
          {% endif %}
          {% if ns.values | count > 0 %}
            {{ (ns.values | sum / (ns.values | count)) | round(1) }}
          {% else %}
            unknown
          {% endif %}

      - name: "Main Floor Humidity Avg"
        unique_id: downstairs_humidity_avg
        unit_of_measurement: "%"
        state_class: measurement
        state: >
          {% set ns = namespace(values=[]) %}
          {% if is_number(states('sensor.main_floor_humidity')) %}
            {% set ns.values = ns.values + [states('sensor.main_floor_humidity') | float(0)] %}
          {% endif %}
          {% if is_number(states('sensor.main_floor_2_humidity')) %}
            {% set ns.values = ns.values + [states('sensor.main_floor_2_humidity') | float(0)] %}
          {% endif %}
          {% if ns.values | count > 0 %}
            {{ (ns.values | sum / (ns.values | count)) | round(1) }}
          {% else %}
            unknown
          {% endif %}

      - name: "Main Floor Temp Spread"
        unique_id: downstairs_temp_spread
        unit_of_measurement: "°F"
        device_class: temperature
        state_class: measurement
        state: >
          {% set t1 = states('sensor.main_floor_temperature') %}
          {% set t2 = states('sensor.main_floor_2_temperature') %}
          {% if is_number(t1) and is_number(t2) %}
            {{ ((t1 | float(0)) - (t2 | float(0))) | abs | round(1) }}
          {% else %}
            unknown
          {% endif %}

      - name: "Main Floor Time Period"
        unique_id: downstairs_time_period
        state: >
          {% set current = now().strftime('%H:%M') %}
          {{ 'day' if '06:30' <= current < '22:30' else 'night' }}
        icon: >
          {{ 'mdi:weather-sunny' if states('sensor.downstairs_time_period') == 'day' else 'mdi:weather-night' }}

      - name: "Main Floor Active Season"
        unique_id: downstairs_active_season
        state: >
          {% set selected = states('input_select.downstairs_season_mode') %}
          {% if selected in ['winter', 'summer', 'shoulder'] %}
            {{ selected }}
          {% else %}
            {% set month = now().month %}
            {% if month in [11, 12, 1, 2, 3] %}
              winter
            {% elif month in [6, 7, 8, 9] %}
              summer
            {% else %}
              shoulder
            {% endif %}
          {% endif %}
        icon: >
          {% set season = states('sensor.downstairs_active_season') %}
          {% if season == 'winter' %}mdi:snowflake
          {% elif season == 'summer' %}mdi:white-balance-sunny
          {% else %}mdi:leaf{% endif %}

      - name: "Main Floor Outdoor Temp"
        unique_id: downstairs_outdoor_temp
        unit_of_measurement: "°F"
        device_class: temperature
        state_class: measurement
        state: >
          {% set outdoor = state_attr('weather.forecast_home', 'temperature') %}
          {{ outdoor | round(1) if outdoor is number else 'unknown' }}

      - name: "Main Floor Outdoor Humidity"
        unique_id: downstairs_outdoor_humidity
        unit_of_measurement: "%"
        state_class: measurement
        state: >
          {% set humidity = state_attr('weather.forecast_home', 'humidity') %}
          {{ humidity | round(0) if humidity is number else 'unknown' }}

      - name: "Main Floor Outdoor Wind Speed"
        unique_id: downstairs_outdoor_wind_speed
        unit_of_measurement: "mph"
        state_class: measurement
        state: >
          {% set wind = state_attr('weather.forecast_home', 'wind_speed') %}
          {{ wind | round(1) if wind is number else 'unknown' }}

      - name: "Main Floor Source Policy"
        unique_id: downstairs_source_policy
        state: >
          {% if is_number(states('sensor.downstairs_outdoor_temp')) %}
            {% set outdoor = states('sensor.downstairs_outdoor_temp') | float(999) %}
            {% set aux_cutover = states('input_number.downstairs_aux_cutover_temp') | float(45) %}
            {% set compressor_lockout = states('input_number.downstairs_compressor_lockout_temp') | float(40) %}
            {% if outdoor > aux_cutover %}
              heat_pump
            {% elif outdoor <= compressor_lockout %}
              aux
            {% else %}
              transition
            {% endif %}
          {% else %}
            unknown
          {% endif %}
        icon: >
          {% set policy = states('sensor.downstairs_source_policy') %}
          {% if policy == 'aux' %}mdi:fire
          {% elif policy == 'transition' %}mdi:swap-horizontal
          {% else %}mdi:fan-chevron-down{% endif %}

      - name: "Dining Room Ecobee Setpoint"
        unique_id: downstairs_ecobee_setpoint
        unit_of_measurement: "°F"
        device_class: temperature
        state_class: measurement
        state: >
          {% set setpoint = state_attr('climate.dining_room', 'temperature') %}
          {{ setpoint | round(0) if setpoint is number else 'unknown' }}

      - name: "Main Floor Climate Status"
        unique_id: downstairs_climate_status
        state: >
          {% set spread = states('sensor.downstairs_temp_spread') %}
          {% set humidity = states('sensor.downstairs_humidity_avg') %}
          {% set avg_temp = states('sensor.downstairs_temp_avg') %}
          {% set setpoint = states('sensor.downstairs_ecobee_setpoint') %}
          {% set action = state_attr('climate.dining_room', 'hvac_action') | default('idle', true) %}
          {% if is_number(spread) and spread | float(0) > 3 %}
            uneven
          {% elif action == 'heating' %}
            warming
          {% elif action == 'cooling' %}
            cooling
          {% elif is_number(avg_temp) and is_number(setpoint) and (avg_temp | float(0)) >= (setpoint | float(0)) + 2 %}
            too_warm
          {% elif is_number(avg_temp) and is_number(setpoint) and (avg_temp | float(0)) <= (setpoint | float(0)) - 2 %}
            too_cool
          {% elif is_number(humidity) and (humidity | float(0)) >= 60 %}
            humid
          {% elif is_number(humidity) and (humidity | float(0)) <= 28 %}
            dry
          {% else %}
            steady
          {% endif %}
        icon: >
          {% set status = states('sensor.downstairs_climate_status') %}
          {% if status == 'warming' %}mdi:radiator
          {% elif status == 'cooling' %}mdi:snowflake
          {% elif status == 'too_warm' %}mdi:thermometer-high
          {% elif status == 'too_cool' %}mdi:thermometer-low
          {% elif status == 'humid' %}mdi:water-percent
          {% elif status == 'dry' %}mdi:water-off-outline
          {% elif status == 'uneven' %}mdi:thermometer-alert
          {% else %}mdi:home-thermometer-outline{% endif %}

      - name: "Main Floor Climate Insight"
        unique_id: downstairs_climate_insight
        state: >
          {% set avg_temp = states('sensor.downstairs_temp_avg') %}
          {% set humidity = states('sensor.downstairs_humidity_avg') %}
          {% set spread = states('sensor.downstairs_temp_spread') %}
          {% set outdoor = states('sensor.downstairs_outdoor_temp') %}
          {% set setpoint = states('sensor.downstairs_ecobee_setpoint') %}
          {% set profile = states('select.dining_room_current_mode') | replace('_', ' ') %}
          {% set action = state_attr('climate.dining_room', 'hvac_action') | default('idle', true) | replace('_', ' ') %}
          {% set open_window = is_state('binary_sensor.downstairs_open_window_eligible', 'on') %}
          Main Floor averages {{ avg_temp }}°F and {{ humidity }}% humidity.
          Dining Room Ecobee is {{ action }} in {{ profile }} with a setpoint of {{ setpoint }}°F.
          Sensor spread is {{ spread }}°F and outdoor air is {{ outdoor }}°F.
          {% if open_window %}Tonight looks favorable for opening windows and coasting.{% endif %}

      - name: "Main Floor Away Watch"
        unique_id: downstairs_away_watch
        state: >
          {% set away = is_state('binary_sensor.downstairs_everyone_away', 'on') %}
          {% set away_minutes = states('sensor.downstairs_away_minutes') | float(0) %}
          {% set away_delay = states('input_number.downstairs_away_profile_delay_minutes') | float(45) %}
          {% set avg_temp = states('sensor.downstairs_temp_avg') %}
          {% set humidity = states('sensor.downstairs_humidity_avg') %}
          {% set profile = states('select.dining_room_current_mode') %}
          {% set season = states('sensor.downstairs_active_season') %}
          {% if not away %}
            home_occupied
          {% elif away_minutes < away_delay %}
            grace_period
          {% elif is_number(avg_temp) and (avg_temp | float(0)) >= 78 %}
            too_hot
          {% elif is_number(avg_temp) and (avg_temp | float(0)) <= 60 %}
            too_cold
          {% elif is_number(humidity) and (humidity | float(0)) >= 65 %}
            too_humid
          {% elif profile == 'home' %}
            profile_check
          {% elif season == 'winter' and is_number(humidity) and (humidity | float(0)) <= 25 %}
            too_dry
          {% else %}
            all_clear
          {% endif %}
        icon: >
          {% set watch = states('sensor.downstairs_away_watch') %}
          {% if watch == 'too_hot' %}mdi:thermometer-high
          {% elif watch == 'too_cold' %}mdi:thermometer-low
          {% elif watch == 'too_humid' %}mdi:water-percent-alert
          {% elif watch == 'too_dry' %}mdi:water-off-outline
          {% elif watch == 'profile_check' %}mdi:home-alert-outline
          {% elif watch == 'all_clear' %}mdi:shield-home-outline
          {% else %}mdi:home-export-outline{% endif %}

      - name: "Main Floor Away Watch Reason"
        unique_id: downstairs_away_watch_reason
        state: >
          {% set watch = states('sensor.downstairs_away_watch') %}
          {% set away_minutes = states('sensor.downstairs_away_minutes') | int(0) %}
          {% set avg_temp = states('sensor.downstairs_temp_avg') %}
          {% set humidity = states('sensor.downstairs_humidity_avg') %}
          {% set profile = states('select.dining_room_current_mode') %}
          {% if watch == 'home_occupied' %}
            Someone is home, so the away watch is idle.
          {% elif watch == 'grace_period' %}
            Both phones are away, but only for {{ away_minutes }} minutes so the away grace period is still active.
          {% elif watch == 'too_hot' %}
            Both phones have been away for {{ away_minutes }} minutes and the Main Floor is running hot at {{ avg_temp }}°F.
          {% elif watch == 'too_cold' %}
            Both phones have been away for {{ away_minutes }} minutes and the Main Floor has drifted down to {{ avg_temp }}°F.
          {% elif watch == 'too_humid' %}
            Both phones have been away for {{ away_minutes }} minutes and Main Floor humidity is elevated at {{ humidity }}%.
          {% elif watch == 'too_dry' %}
            Both phones have been away for {{ away_minutes }} minutes and winter humidity has fallen to {{ humidity }}%.
          {% elif watch == 'profile_check' %}
            Both phones have been away for {{ away_minutes }} minutes, but the Dining Room Ecobee is still in the {{ profile }} comfort profile.
          {% else %}
            Both phones are away and the Main Floor looks stable right now.
          {% endif %}

      - name: "Main Floor Away Minutes"
        unique_id: downstairs_away_minutes
        unit_of_measurement: "min"
        state_class: measurement
        state: >
          {% if is_state('binary_sensor.downstairs_everyone_away', 'on') %}
            {{ ((as_timestamp(now()) - as_timestamp(states.binary_sensor.downstairs_everyone_away.last_changed)) / 60) | round(0) }}
          {% else %}
            0
          {% endif %}

  - binary_sensor:
      - name: "Wine Cave Sensor Unavailable"
        unique_id: wine_cave_sensor_unavailable
        state: >
          {{ states('sensor.wine_temperature') in ['unknown', 'unavailable', 'none', '']
             or states('sensor.wine_humidity') in ['unknown', 'unavailable', 'none', ''] }}
        delay_on:
          minutes: 10
        delay_off:
          minutes: 10
        icon: >
          {{ 'mdi:wifi-alert' if is_state('binary_sensor.wine_cave_sensor_unavailable', 'on') else 'mdi:wifi-check' }}

      - name: "Wine Cave Cooling Cycle"
        unique_id: wine_cave_cooling_cycle
        availability: >
          {{ is_number(states('sensor.wine_temperature'))
             and is_number(states('sensor.wine_humidity')) }}
        state: >
          {% set temp = states('sensor.wine_temperature') | float(0) %}
          {% set humidity = states('sensor.wine_humidity') | float(0) %}
          {{ temp >= 50 and temp <= 60
             and humidity >= 42
             and humidity < 50 }}
        delay_on:
          minutes: 3
        delay_off:
          minutes: 15
        icon: >
          {{ 'mdi:snowflake-thermometer' if is_state('binary_sensor.wine_cave_cooling_cycle', 'on') else 'mdi:snowflake-off' }}

      - name: "Wine Cave Cycle Settled"
        unique_id: wine_cave_cycle_settled
        availability: >
          {{ is_number(states('sensor.wine_temperature'))
             and is_number(states('sensor.wine_humidity')) }}
        state: >
          {% set temp = states('sensor.wine_temperature') | float(0) %}
          {% set humidity = states('sensor.wine_humidity') | float(0) %}
          {{ temp >= 50 and temp <= 60
             and humidity >= 50
             and humidity <= 65
             and is_state('binary_sensor.wine_cave_sensor_unavailable', 'off')
             and is_state('binary_sensor.wine_cave_temp_high_alert', 'off')
             and is_state('binary_sensor.wine_cave_temp_low_alert', 'off')
             and is_state('binary_sensor.wine_cave_condensation_risk', 'off') }}
        delay_on:
          minutes: 10
        icon: >
          {{ 'mdi:check-circle-outline' if is_state('binary_sensor.wine_cave_cycle_settled', 'on') else 'mdi:clock-outline' }}

      - name: "Wine Cave Temp High Alert"
        unique_id: wine_cave_temp_high_alert
        availability: >
          {{ is_number(states('sensor.wine_temperature')) }}
        state: >
          {{ (states('sensor.wine_temperature') | float(0)) > 60 }}
        delay_on:
          minutes: 15
        delay_off:
          minutes: 10
        icon: >
          {{ 'mdi:thermometer-high' if is_state('binary_sensor.wine_cave_temp_high_alert', 'on') else 'mdi:thermometer' }}

      - name: "Wine Cave Temp Low Alert"
        unique_id: wine_cave_temp_low_alert
        availability: >
          {{ is_number(states('sensor.wine_temperature')) }}
        state: >
          {{ (states('sensor.wine_temperature') | float(0)) < 50 }}
        delay_on:
          minutes: 15
        delay_off:
          minutes: 10
        icon: >
          {{ 'mdi:thermometer-low' if is_state('binary_sensor.wine_cave_temp_low_alert', 'on') else 'mdi:thermometer' }}

      - name: "Wine Cave Moisture Anomaly"
        unique_id: wine_cave_moisture_anomaly
        availability: >
          {{ is_number(states('sensor.wine_temperature'))
             and is_number(states('sensor.wine_humidity'))
             and is_number(states('sensor.wine_cave_absolute_humidity_24h_delta'))
             and is_number(states('sensor.wine_cave_dew_point_margin')) }}
        state: >
          {% set temp = states('sensor.wine_temperature') | float(0) %}
          {% set humidity = states('sensor.wine_humidity') | float(0) %}
          {% set ah_delta = states('sensor.wine_cave_absolute_humidity_24h_delta') | float(0) %}
          {% set dew_margin = states('sensor.wine_cave_dew_point_margin') | float(0) %}
          {% set normal_dry_cycle = temp >= 50 and temp <= 60
            and humidity >= 42
            and humidity < 50 %}
          {% set cycle_like_high = temp >= 50 and temp <= 60
            and humidity >= 70
            and (ah_delta | abs) <= 0.35
            and dew_margin >= 8 %}
          {{ humidity < 42
             or (humidity < 50 and not normal_dry_cycle)
             or (humidity > 70
             and not cycle_like_high
             and (ah_delta | abs) >= 0.5) }}
        delay_on:
          minutes: 15
        delay_off:
          minutes: 30
        icon: >
          {{ 'mdi:water-alert' if is_state('binary_sensor.wine_cave_moisture_anomaly', 'on') else 'mdi:water-check' }}

      - name: "Wine Cave Condensation Risk"
        unique_id: wine_cave_condensation_risk
        availability: >
          {{ is_number(states('sensor.wine_cave_dew_point_margin')) }}
        state: >
          {{ (states('sensor.wine_cave_dew_point_margin') | float(99)) < 7 }}
        delay_on:
          minutes: 10
        delay_off:
          minutes: 20
        icon: >
          {{ 'mdi:water-thermometer-alert' if is_state('binary_sensor.wine_cave_condensation_risk', 'on') else 'mdi:water-thermometer' }}

      - name: "Wine Cave Drift Alert"
        unique_id: wine_cave_drift_alert
        availability: >
          {{ is_number(states('sensor.wine_cave_temp_24h_delta_7d'))
             and is_number(states('sensor.wine_cave_humidity_24h_delta_7d')) }}
        state: >
          {% set temp_delta = states('sensor.wine_cave_temp_24h_delta_7d') | float(0) %}
          {% set humidity_delta = states('sensor.wine_cave_humidity_24h_delta_7d') | float(0) %}
          {{ (temp_delta | abs) >= 1.5 or (humidity_delta | abs) >= 6 }}
        delay_on:
          hours: 3
        delay_off:
          hours: 6
        icon: >
          {{ 'mdi:chart-line-variant' if is_state('binary_sensor.wine_cave_drift_alert', 'on') else 'mdi:chart-line' }}

      - name: "Wine Cave Actionable Alert"
        unique_id: wine_cave_actionable_alert
        state: >
          {{ is_state('binary_sensor.wine_cave_temp_high_alert', 'on')
             or is_state('binary_sensor.wine_cave_temp_low_alert', 'on')
             or is_state('binary_sensor.wine_cave_moisture_anomaly', 'on')
             or is_state('binary_sensor.wine_cave_condensation_risk', 'on') }}
        icon: >
          {{ 'mdi:alert-circle-outline' if is_state('binary_sensor.wine_cave_actionable_alert', 'on') else 'mdi:check-circle-outline' }}

  - binary_sensor:
      - name: "Main Floor Temp Spread High"
        unique_id: downstairs_temp_spread_high
        state: >
          {{ is_number(states('sensor.downstairs_temp_spread'))
             and states('sensor.downstairs_temp_spread') | float(0) > 3 }}
        icon: >
          {{ 'mdi:thermometer-alert' if is_state('binary_sensor.downstairs_temp_spread_high', 'on') else 'mdi:thermometer' }}

      - name: "Main Floor Open Window Eligible"
        unique_id: downstairs_open_window_eligible
        state: >
          {% set season = states('sensor.downstairs_active_season') %}
          {% set period = states('sensor.downstairs_time_period') %}
          {% set avg_temp = states('sensor.downstairs_temp_avg') %}
          {% set avg_humidity = states('sensor.downstairs_humidity_avg') %}
          {% set outdoor = states('sensor.downstairs_outdoor_temp') %}
          {% set humidity = states('sensor.downstairs_outdoor_humidity') %}
          {% set wind = states('sensor.downstairs_outdoor_wind_speed') %}
          {% set required_advantage = states('input_number.downstairs_open_window_advantage') | float(3) %}
          {% set weather_state = states('weather.forecast_home') %}
          {% set favorable_weather = weather_state not in ['rainy', 'pouring', 'snowy', 'snowy-rainy'] %}
          {% set season_ok = season == 'shoulder' or (season == 'summer' and period == 'night') %}
          {% if is_number(avg_temp) and is_number(avg_humidity) %}
            {% set humidity_penalty = [0, [((avg_humidity | float(0)) - 45) * 0.08, 2] | min] | max %}
            {% set indoor = (avg_temp | float(0)) + humidity_penalty %}
          {% else %}
            {% set indoor = none %}
          {% endif %}
          {{
            season_ok
            and favorable_weather
            and indoor is number
            and is_number(outdoor)
            and is_number(humidity)
            and is_number(wind)
            and (outdoor | float(999)) <= (indoor - required_advantage)
            and (humidity | float(100)) <= 75
            and (wind | float(999)) <= 18
          }}
        icon: >
          {{ 'mdi:window-open-variant' if is_state('binary_sensor.downstairs_open_window_eligible', 'on') else 'mdi:window-closed-variant' }}

