      - name: "Environment Attic Sensor Unavailable"
        unique_id: environment_attic_sensor_unavailable
        state: "{{ not is_number(states('sensor.attic_temperature')) or not is_number(states('sensor.attic_humidity')) }}"
        delay_on:
          minutes: 15
        delay_off:
