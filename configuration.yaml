      - name: "front_stairs_schedule_brightness"
        unique_id: front_stairs_schedule_brightness
        unit_of_measurement: "%"
        state: >
          {% set evening_start_pct = 30 %}
          {% set overnight_pct = 10 %}
          {% set morning_end_pct = 20 %}
          {% set base_schedule_elevation = 10 %}
          {% set evening_elevation = states('sensor.lighting_evening_on_schedule_elevation_threshold') | float(base_schedule_elevation) %}
          {% set morning_elevation = states('sensor.lighting_morning_off_schedule_elevation_threshold') | float(base_schedule_elevation) %}
          {% set schedule_elevation = morning_elevation if is_state_attr('sun.sun', 'rising', true) else evening_elevation %}
          {% set overnight_elevation = -10 %}
          {% set sun_elevation = state_attr('sun.sun', 'elevation') %}
          {% if sun_elevation is none %}
            0
          {% elif is_state('binary_sensor.front_stairs_schedule_active', 'off') %}
            0
          {% else %}
            {% set elevation = [overnight_elevation, [schedule_elevation, sun_elevation | float(0)] | min] | max %}
            {% set span = (schedule_elevation - overnight_elevation) | float(1) %}
            {% if is_state_attr('sun.sun', 'rising', true) %}
              {% set progress = ((elevation - overnight_elevation) / span) | float(0) %}
              {% set clamped = [0, [1, progress] | min] | max %}
              {{ (overnight_pct + ((morning_end_pct - overnight_pct) * clamped)) | round(0) }}
            {% else %}
              {% set progress = ((schedule_elevation - elevation) / span) | float(0) %}
              {% set clamped = [0, [1, progress] | min] | max %}
              {{ (evening_start_pct - ((evening_start_pct - overnight_pct) * clamped)) | round(0) }}
            {% endif %}
          {% endif %}

