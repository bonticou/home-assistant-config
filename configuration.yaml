          {% elif due in ['unknown', 'unavailable', 'none', ''] %}
            Missing due date
          {% else %}
            {% set this_year = now().year ~ '' %}
            {% set due_year = due[:4] %}
            {% set year_start = due_year ~ '-01-01' %}
            {% set notice_start = due[:4] ~ '-05-01' %}
            {% set paid_current_year = paid_cycle == this_year
               or paid not in ['unknown', 'unavailable', 'none', '']
