  - triggers:
      - trigger: homeassistant
        event: start
      - trigger: time_pattern
        hours: "/3"
    actions:
      - action: weather.get_forecasts
        target:
          entity_id: weather.forecast_home
        data:
          type: daily
        response_variable: garden_daily_forecast
    sensor:
      - name: "Garden Lowest Forecast Low 4 Day"
        unique_id: garden_lowest_forecast_low_4_day
        unit_of_measurement: "°F"
        device_class: temperature
        state: >
          {% set forecast_map = garden_daily_forecast if garden_daily_forecast is defined else {} %}
          {% set forecast = forecast_map['weather.forecast_home'].forecast if 'weather.forecast_home' in forecast_map else [] %}
          {% set ns = namespace(lows=[]) %}
          {% for item in forecast[:4] %}
            {% if item.templow is defined and item.templow is number %}
              {% set ns.lows = ns.lows + [item.templow | float(0)] %}
            {% endif %}
          {% endfor %}
          {{ (ns.lows | min | round(0)) if ns.lows else 'unknown' }}
        attributes:
          next_4_lows: >
            {% set forecast_map = garden_daily_forecast if garden_daily_forecast is defined else {} %}
            {% set forecast = forecast_map['weather.forecast_home'].forecast if 'weather.forecast_home' in forecast_map else [] %}
            {% set ns = namespace(labels=[]) %}
            {% for item in forecast[:4] %}
              {% if item.templow is defined and item.templow is number %}
                {% set ns.labels = ns.labels + [((item.templow | float(0)) | round(0) | int) ~ '°'] %}
              {% endif %}
            {% endfor %}
            {{ ns.labels | join(' · ') if ns.labels else 'Forecast unavailable' }}

  - sensor:
      - name: "Garden Seedlings Total"
        unique_id: garden_seedlings_total
        state: 40
        icon: mdi:sprout-outline

      - name: "Garden Outdoor Seedlings Count"
        unique_id: garden_outdoor_seedlings_count
        state: >
          {{ 0 if is_state('input_boolean.garden_spinach_in_ground', 'on') else 8 }}
        icon: mdi:flower-outline

      - name: "Garden Outdoor Planted Count"
        unique_id: garden_outdoor_planted_count
        state: >
          {{ 8 if is_state('input_boolean.garden_spinach_in_ground', 'on') else 0 }}
        icon: mdi:shovel

      - name: "Garden Indoor Seedlings Count"
        unique_id: garden_indoor_seedlings_count
        state: >
          {% set ns = namespace(total=0) %}
          {% if not is_state('input_boolean.garden_basil_outside', 'on') %}
            {% set ns.total = ns.total + 16 %}
          {% endif %}
          {% if not is_state('input_boolean.garden_marigolds_outside', 'on') %}
            {% set ns.total = ns.total + 16 %}
          {% endif %}
          {{ ns.total }}
        icon: mdi:home-thermometer-outline

      - name: "Garden Days Since Sowing"
        unique_id: garden_days_since_sowing
        unit_of_measurement: "d"
        state: >
          {% set started = states('input_datetime.garden_seed_start_date') %}
          {% if started in ['unknown', 'unavailable', ''] %}
            0
          {% else %}
            {{ [0, (now().date() - as_datetime(started).date()).days] | max }}
          {% endif %}
        icon: mdi:calendar-range

      - name: "Garden Check Status"
        unique_id: garden_check_status
        state: >
          {% if not is_state('binary_sensor.garden_indoor_seedlings_active', 'on') %}
            Outdoor season
          {% elif is_state('input_boolean.garden_checked_today', 'on') %}
            Checked today
          {% else %}
            Check today
          {% endif %}
        icon: mdi:clipboard-check-outline

      - name: "Garden Watering Status"
        unique_id: garden_watering_status
        state: >
          {% if not is_state('binary_sensor.garden_indoor_seedlings_active', 'on') %}
            Outdoor season
          {% elif is_state('input_boolean.garden_watered_today', 'on') %}
            Watered today
          {% elif now().hour >= 16 %}
            Moisture review due
          {% else %}
            Moisture check later today
          {% endif %}
        icon: mdi:watering-can-outline

      - name: "Garden Next Milestone"
        unique_id: garden_next_milestone
        state: >
          {% set started = states('input_datetime.garden_seed_start_date') %}
          {% if started in ['unknown', 'unavailable', ''] %}
            Set a seed-start date
          {% else %}
            {% set sowed = as_datetime(started).date() %}
            {% set marigold_harden = sowed + timedelta(days=14) %}
            {% set basil_harden = sowed + timedelta(days=28) %}
            {% if not is_state('input_boolean.garden_marigolds_hardening_off', 'on') %}
              Petite marigolds harden around {{ marigold_harden.strftime('%B %-d') }}
            {% elif not is_state('input_boolean.garden_marigolds_outside', 'on') %}
              Marigolds can move out after 5-7 days of hardening
            {% elif not is_state('input_boolean.garden_basil_hardening_off', 'on') %}
              Basil hardens around {{ basil_harden.strftime('%B %-d') }}
            {% elif not is_state('input_boolean.garden_basil_outside', 'on') %}
              Basil can move out after a warm hardening week
            {% else %}
              Outdoor growing season is underway
            {% endif %}
          {% endif %}
        icon: mdi:calendar-star

      - name: "Garden Outdoor Snapshot"
        unique_id: garden_outdoor_snapshot
        state: >
          {% set temp = state_attr('weather.forecast_home', 'temperature') %}
          {% set humidity = state_attr('weather.forecast_home', 'humidity') %}
          {% set wind = state_attr('weather.forecast_home', 'wind_speed') %}
          {% if is_number(temp) and is_number(humidity) and is_number(wind) %}
            {{ (temp | float(0) | round(0) | int) }}° · {{ humidity | int(0) }}% humidity · {{ (wind | float(0) | round(0) | int) }} mph wind
          {% else %}
            Weather unavailable
          {% endif %}
        icon: >
          {% set condition = states('weather.forecast_home') %}
          {% if condition == 'sunny' %}mdi:weather-sunny
          {% elif condition in ['partlycloudy', 'cloudy'] %}mdi:weather-partly-cloudy
          {% elif condition in ['rainy', 'pouring', 'lightning-rainy'] %}mdi:weather-rainy
          {% else %}mdi:weather-cloudy{% endif %}

      - name: "Garden Weather Readiness"
        unique_id: garden_weather_readiness
        state: >
          {% set temp = state_attr('weather.forecast_home', 'temperature') %}
          {% set humidity = state_attr('weather.forecast_home', 'humidity') %}
          {% set wind = state_attr('weather.forecast_home', 'wind_speed') %}
          {% set condition = states('weather.forecast_home') %}
          {% set wet = condition in ['rainy', 'pouring', 'lightning', 'lightning-rainy', 'snowy', 'snowy-rainy'] %}
          {% if is_state('binary_sensor.garden_basil_weather_ready', 'on') %}
            Warm, calm stretch for basil and marigolds
          {% elif is_state('binary_sensor.garden_marigolds_weather_ready', 'on') %}
            Good for marigolds today; basil still wants warmer nights
          {% elif wet %}
            Wet or stormy today; keep seedlings sheltered
          {% elif is_number(wind) and wind | float(0) > 15 %}
            Too windy today for a first hardening pass
          {% elif is_number(temp) and temp | float(0) < 55 %}
            Too cool today for tender starts
          {% elif is_number(humidity) and humidity | float(0) > 92 %}
            Very damp outside today; wait for a cleaner window
          {% else %}
            Forecast is not warm enough yet for outdoor nights
          {% endif %}
        icon: mdi:weather-partly-cloudy

      - name: "Garden Today Focus"
        unique_id: garden_today_focus
        state: >
          {% set marigold_hardening_started = states('input_datetime.garden_marigolds_hardening_started') %}
          {% set basil_hardening_started = states('input_datetime.garden_basil_hardening_started') %}
          {% set basil_observation = states('input_select.garden_basil_observation') %}
          {% set marigold_observation = states('input_select.garden_marigolds_observation') %}
          {% set spinach_observation = states('input_select.garden_spinach_observation') %}
          {% set spinach_in_ground = is_state('input_boolean.garden_spinach_in_ground', 'on') %}
          {% set marigold_days = (now().date() - as_datetime(marigold_hardening_started).date()).days
            if marigold_hardening_started not in ['unknown', 'unavailable', ''] else 0 %}
          {% set basil_days = (now().date() - as_datetime(basil_hardening_started).date()).days
            if basil_hardening_started not in ['unknown', 'unavailable', ''] else 0 %}
          {% if basil_observation == 'stressed' %}
            Basil needs a closer look
          {% elif marigold_observation == 'stressed' %}
            Marigolds need a closer look
          {% elif spinach_observation == 'stressed' %}
            Spinach needs a closer look
          {% elif basil_observation == 'dry' %}
            Basil looks dry
          {% elif marigold_observation == 'dry' %}
            Marigolds look dry
          {% elif spinach_observation == 'dry' %}
            Spinach looks dry
          {% elif basil_observation == 'leggy' %}
            Basil looks stretched
          {% elif marigold_observation == 'leggy' %}
            Marigolds look stretched
          {% elif not spinach_in_ground and spinach_observation == 'ready for ground' %}
            Spinach may be ready for the ground
          {% elif not spinach_in_ground and spinach_observation == 'true leaves showing' %}
            Spinach has true leaves now
          {% elif is_state('input_boolean.garden_marigolds_hardening_off', 'on')
             and not is_state('input_boolean.garden_marigolds_outside', 'on')
             and is_state('binary_sensor.garden_marigolds_weather_ready', 'on')
             and marigold_days >= 5 %}
            Petite marigolds can likely move outside
          {% elif is_state('input_boolean.garden_basil_hardening_off', 'on')
             and not is_state('input_boolean.garden_basil_outside', 'on')
             and is_state('binary_sensor.garden_basil_weather_ready', 'on')
             and basil_days >= 7 %}
            Basil looks ready for outdoor nights
          {% elif not is_state('input_boolean.garden_marigolds_hardening_off', 'on')
             and not is_state('input_boolean.garden_marigolds_outside', 'on')
             and states('sensor.garden_days_since_sowing') | int(0) >= 14
             and is_state('binary_sensor.garden_marigolds_weather_ready', 'on') %}
            Start hardening the petite marigolds
          {% elif not is_state('input_boolean.garden_basil_hardening_off', 'on')
             and not is_state('input_boolean.garden_basil_outside', 'on')
             and states('sensor.garden_days_since_sowing') | int(0) >= 28
             and is_state('binary_sensor.garden_basil_weather_ready', 'on') %}
            Start hardening the basil trays
          {% elif is_state('binary_sensor.garden_seedling_check_due', 'on')
             and is_state('binary_sensor.garden_water_review_due', 'on') %}
            Check trays and review moisture tonight
          {% elif is_state('binary_sensor.garden_seedling_check_due', 'on') %}
            Do a quick seedling check
          {% elif is_state('binary_sensor.garden_water_review_due', 'on') %}
            Do an evening moisture pass
          {% else %}
            {{ states('sensor.garden_next_milestone') }}
          {% endif %}
        icon: mdi:sprout-outline

      - name: "Garden Next Stage Step"
        unique_id: garden_next_stage_step
        state: >
          {% set marigold_hardening_started = states('input_datetime.garden_marigolds_hardening_started') %}
          {% set basil_hardening_started = states('input_datetime.garden_basil_hardening_started') %}
          {% set marigold_days = (now().date() - as_datetime(marigold_hardening_started).date()).days
            if marigold_hardening_started not in ['unknown', 'unavailable', ''] else 0 %}
          {% set basil_days = (now().date() - as_datetime(basil_hardening_started).date()).days
            if basil_hardening_started not in ['unknown', 'unavailable', ''] else 0 %}
          {% if is_state('input_boolean.garden_marigolds_hardening_off', 'on')
             and not is_state('input_boolean.garden_marigolds_outside', 'on')
             and is_state('binary_sensor.garden_marigolds_weather_ready', 'on')
             and marigold_days >= 5 %}
            Move marigolds outside
          {% elif is_state('input_boolean.garden_basil_hardening_off', 'on')
             and not is_state('input_boolean.garden_basil_outside', 'on')
             and is_state('binary_sensor.garden_basil_weather_ready', 'on')
             and basil_days >= 7 %}
            Move basil outside
          {% elif not is_state('input_boolean.garden_marigolds_hardening_off', 'on')
             and not is_state('input_boolean.garden_marigolds_outside', 'on')
             and states('sensor.garden_days_since_sowing') | int(0) >= 14
             and is_state('binary_sensor.garden_marigolds_weather_ready', 'on') %}
            Start marigold hardening
          {% elif not is_state('input_boolean.garden_basil_hardening_off', 'on')
             and not is_state('input_boolean.garden_basil_outside', 'on')
             and states('sensor.garden_days_since_sowing') | int(0) >= 28
             and is_state('binary_sensor.garden_basil_weather_ready', 'on') %}
            Start basil hardening
          {% else %}
            No stage step right now
          {% endif %}
        icon: >
          {% set marigold_hardening_started = states('input_datetime.garden_marigolds_hardening_started') %}
          {% set basil_hardening_started = states('input_datetime.garden_basil_hardening_started') %}
          {% set marigold_days = (now().date() - as_datetime(marigold_hardening_started).date()).days
            if marigold_hardening_started not in ['unknown', 'unavailable', ''] else 0 %}
          {% set basil_days = (now().date() - as_datetime(basil_hardening_started).date()).days
            if basil_hardening_started not in ['unknown', 'unavailable', ''] else 0 %}
          {% if (is_state('input_boolean.garden_marigolds_hardening_off', 'on')
             and not is_state('input_boolean.garden_marigolds_outside', 'on')
             and is_state('binary_sensor.garden_marigolds_weather_ready', 'on')
             and marigold_days >= 5)
             or (is_state('input_boolean.garden_basil_hardening_off', 'on')
             and not is_state('input_boolean.garden_basil_outside', 'on')
             and is_state('binary_sensor.garden_basil_weather_ready', 'on')
             and basil_days >= 7) %}mdi:arrow-right-circle-outline
          {% elif (not is_state('input_boolean.garden_marigolds_hardening_off', 'on')
             and not is_state('input_boolean.garden_marigolds_outside', 'on')
             and states('sensor.garden_days_since_sowing') | int(0) >= 14
             and is_state('binary_sensor.garden_marigolds_weather_ready', 'on'))
             or (not is_state('input_boolean.garden_basil_hardening_off', 'on')
             and not is_state('input_boolean.garden_basil_outside', 'on')
             and states('sensor.garden_days_since_sowing') | int(0) >= 28
             and is_state('binary_sensor.garden_basil_weather_ready', 'on')) %}mdi:white-balance-sunny
          {% else %}mdi:calendar-check-outline{% endif %}
        attributes:
          action_id: >
            {% set marigold_hardening_started = states('input_datetime.garden_marigolds_hardening_started') %}
            {% set basil_hardening_started = states('input_datetime.garden_basil_hardening_started') %}
            {% set marigold_days = (now().date() - as_datetime(marigold_hardening_started).date()).days
              if marigold_hardening_started not in ['unknown', 'unavailable', ''] else 0 %}
            {% set basil_days = (now().date() - as_datetime(basil_hardening_started).date()).days
              if basil_hardening_started not in ['unknown', 'unavailable', ''] else 0 %}
            {% if is_state('input_boolean.garden_marigolds_hardening_off', 'on')
               and not is_state('input_boolean.garden_marigolds_outside', 'on')
               and is_state('binary_sensor.garden_marigolds_weather_ready', 'on')
               and marigold_days >= 5 %}
              mark_marigolds_outside
            {% elif is_state('input_boolean.garden_basil_hardening_off', 'on')
               and not is_state('input_boolean.garden_basil_outside', 'on')
               and is_state('binary_sensor.garden_basil_weather_ready', 'on')
               and basil_days >= 7 %}
              mark_basil_outside
            {% elif not is_state('input_boolean.garden_marigolds_hardening_off', 'on')
               and not is_state('input_boolean.garden_marigolds_outside', 'on')
               and states('sensor.garden_days_since_sowing') | int(0) >= 14
               and is_state('binary_sensor.garden_marigolds_weather_ready', 'on') %}
              start_marigolds_hardening
            {% elif not is_state('input_boolean.garden_basil_hardening_off', 'on')
               and not is_state('input_boolean.garden_basil_outside', 'on')
               and states('sensor.garden_days_since_sowing') | int(0) >= 28
               and is_state('binary_sensor.garden_basil_weather_ready', 'on') %}
              start_basil_hardening
            {% else %}
              none
            {% endif %}
          detail: >
            {% set marigold_hardening_started = states('input_datetime.garden_marigolds_hardening_started') %}
            {% set basil_hardening_started = states('input_datetime.garden_basil_hardening_started') %}
            {% set marigold_days = (now().date() - as_datetime(marigold_hardening_started).date()).days
              if marigold_hardening_started not in ['unknown', 'unavailable', ''] else 0 %}
            {% set basil_days = (now().date() - as_datetime(basil_hardening_started).date()).days
              if basil_hardening_started not in ['unknown', 'unavailable', ''] else 0 %}
            {% if is_state('input_boolean.garden_marigolds_hardening_off', 'on')
               and not is_state('input_boolean.garden_marigolds_outside', 'on')
               and is_state('binary_sensor.garden_marigolds_weather_ready', 'on')
               and marigold_days >= 5 %}
              The marigolds have had enough hardening time and the weather looks friendly.
            {% elif is_state('input_boolean.garden_basil_hardening_off', 'on')
               and not is_state('input_boolean.garden_basil_outside', 'on')
               and is_state('binary_sensor.garden_basil_weather_ready', 'on')
               and basil_days >= 7 %}
              Basil has had a warm hardening week and should be ready for outdoor nights.
            {% elif not is_state('input_boolean.garden_marigolds_hardening_off', 'on')
               and not is_state('input_boolean.garden_marigolds_outside', 'on')
               and states('sensor.garden_days_since_sowing') | int(0) >= 14
               and is_state('binary_sensor.garden_marigolds_weather_ready', 'on') %}
              Mild weather today. Start with a short bright-shade session and build up over the week.
            {% elif not is_state('input_boolean.garden_basil_hardening_off', 'on')
               and not is_state('input_boolean.garden_basil_outside', 'on')
               and states('sensor.garden_days_since_sowing') | int(0) >= 28
               and is_state('binary_sensor.garden_basil_weather_ready', 'on') %}
              Basil finally has a warm enough window. Start gently and stretch exposure over about a week.
            {% else %}
              Notifications will nudge you when timing and weather line up.
            {% endif %}

      - name: "Garden Spinach Status"
        unique_id: garden_spinach_status
        state: >
          {% if is_state('input_boolean.garden_spinach_in_ground', 'on') %}
            Raised beds
          {% else %}
            Outdoors
          {% endif %}
        icon: >
          {% if is_state('input_boolean.garden_spinach_in_ground', 'on') %}mdi:shovel
          {% else %}mdi:leaf{% endif %}
        attributes:
          count: 8
          planted_date: >
            {% set planted = states('input_datetime.garden_spinach_planted_in_ground') %}
            {% if planted in ['unknown', 'unavailable', ''] %}
              unknown
            {% else %}
              {{ as_datetime(planted).strftime('%B %-d') }}
            {% endif %}
          last_watered: >
            {% set watered = states('input_datetime.garden_spinach_last_watered') %}
            {% if watered in ['unknown', 'unavailable', ''] %}
              unknown
            {% else %}
              {{ as_datetime(watered).strftime('%B %-d') }}
            {% endif %}
          stage_note: >
            {% set observation = states('input_select.garden_spinach_observation') %}
            {% set in_ground = is_state('input_boolean.garden_spinach_in_ground', 'on') %}
            {% set planted = states('input_datetime.garden_spinach_planted_in_ground') %}
            {% set watered = states('input_datetime.garden_spinach_last_watered') %}
            {% set planted_label = as_datetime(planted).strftime('%B %-d')
              if planted not in ['unknown', 'unavailable', ''] else 'recently' %}
            {% set watered_label = as_datetime(watered).strftime('%B %-d')
              if watered not in ['unknown', 'unavailable', ''] else planted_label %}
            {% if in_ground and observation == 'dry' %}
              In the raised beds since {{ planted_label }} and looking dry. Give them a deeper soak and recheck tonight.
            {% elif in_ground and observation == 'settling in' %}
              Planted in the raised beds {{ planted_label }}. Keep moisture even while they settle in.
            {% elif in_ground and observation == 'stressed' %}
              Planted in the raised beds {{ planted_label }}. Watch for transplant stress and keep the soil evenly moist.
            {% elif in_ground %}
              Planted in the raised beds {{ planted_label }} and watered in {{ watered_label }}.
            {% elif observation == 'dry' %}
              Outdoor trays look dry. Water before the surface fully dries out.
            {% elif observation == 'true leaves showing' %}
              True leaves are showing. Start watching for a nice planting window.
            {% elif observation == 'ready for ground' %}
              Looks ready for the ground when the bed is open and the soil is workable.
            {% elif observation == 'stressed' %}
              Looks stressed outside. Recheck moisture and sun exposure.
            {% else %}
              Sprouting outside, but not planted in the ground yet.
            {% endif %}
          move_rule: >
            {% if is_state('input_boolean.garden_spinach_in_ground', 'on') %}
              Already planted out in the raised beds.
            {% else %}
              Already outside as a cool-season crop.
            {% endif %}

      - name: "Garden Basil Genovese Status"
        unique_id: garden_basil_genovese_status
        state: >
          {% if is_state('input_boolean.garden_basil_outside', 'on') %}
            Outside
          {% elif is_state('input_boolean.garden_basil_hardening_off', 'on') %}
            Hardening off
          {% else %}
            Indoors
          {% endif %}
        icon: >
          {% if is_state('input_boolean.garden_basil_outside', 'on') %}mdi:leaf
          {% elif is_state('input_boolean.garden_basil_hardening_off', 'on') %}mdi:white-balance-sunny
          {% else %}mdi:sprout{% endif %}
        attributes:
          count: 8
          hardening_target: >
            {% set started = states('input_datetime.garden_seed_start_date') %}
            {% if started in ['unknown', 'unavailable', ''] %}
              TBD
            {% else %}
              {{ (as_datetime(started).date() + timedelta(days=28)).strftime('%B %-d') }}
            {% endif %}
          outdoor_target: >
            {% set started = states('input_datetime.garden_seed_start_date') %}
            {% if started in ['unknown', 'unavailable', ''] %}
              TBD
            {% else %}
              {{ (as_datetime(started).date() + timedelta(days=35)).strftime('%B %-d') }}
            {% endif %}
          stage_note: >
            {% set observation = states('input_select.garden_basil_observation') %}
            {% set hardening_started = states('input_datetime.garden_basil_hardening_started') %}
            {% set moved_outside = states('input_datetime.garden_basil_moved_outside') %}
            {% if is_state('input_boolean.garden_basil_outside', 'on') and moved_outside not in ['unknown', 'unavailable', ''] %}
              Outside since {{ as_datetime(moved_outside).strftime('%B %-d') }}
            {% elif is_state('input_boolean.garden_basil_hardening_off', 'on') and hardening_started not in ['unknown', 'unavailable', ''] %}
              Hardening since {{ as_datetime(hardening_started).strftime('%B %-d') }}
            {% elif observation == 'dry' %}
              Looks dry. Water gently and recheck the tray weight tonight.
            {% elif observation == 'leggy' %}
              Looks a bit stretched. Lower the light or increase intensity.
            {% elif observation == 'ready for next step' and is_state('binary_sensor.garden_basil_weather_ready', 'on') %}
              Looks ready for the next step and the weather window is finally warm enough.
            {% elif observation == 'ready for next step' %}
              Looks ready for the next step, but still wait for nights above 55°.
            {% elif observation == 'stressed' %}
              Looks stressed. Keep conditions steady and avoid big swings.
            {% else %}
              Keep indoors until nights stay above 55°
            {% endif %}
          move_rule: Wait for nighttime lows above 55°F.

      - name: "Garden Basil Lettuce Status"
        unique_id: garden_basil_lettuce_status
        state: >
          {% if is_state('input_boolean.garden_basil_outside', 'on') %}
            Outside
          {% elif is_state('input_boolean.garden_basil_hardening_off', 'on') %}
            Hardening off
          {% else %}
            Indoors
          {% endif %}
        icon: >
          {% if is_state('input_boolean.garden_basil_outside', 'on') %}mdi:leaf
          {% elif is_state('input_boolean.garden_basil_hardening_off', 'on') %}mdi:white-balance-sunny
          {% else %}mdi:sprout{% endif %}
        attributes:
          count: 8
          hardening_target: >
            {% set started = states('input_datetime.garden_seed_start_date') %}
            {% if started in ['unknown', 'unavailable', ''] %}
              TBD
            {% else %}
              {{ (as_datetime(started).date() + timedelta(days=28)).strftime('%B %-d') }}
            {% endif %}
          outdoor_target: >
            {% set started = states('input_datetime.garden_seed_start_date') %}
            {% if started in ['unknown', 'unavailable', ''] %}
              TBD
            {% else %}
              {{ (as_datetime(started).date() + timedelta(days=35)).strftime('%B %-d') }}
            {% endif %}
          stage_note: >
            {% set observation = states('input_select.garden_basil_observation') %}
            {% set hardening_started = states('input_datetime.garden_basil_hardening_started') %}
            {% set moved_outside = states('input_datetime.garden_basil_moved_outside') %}
            {% if is_state('input_boolean.garden_basil_outside', 'on') and moved_outside not in ['unknown', 'unavailable', ''] %}
              Outside since {{ as_datetime(moved_outside).strftime('%B %-d') }}
            {% elif is_state('input_boolean.garden_basil_hardening_off', 'on') and hardening_started not in ['unknown', 'unavailable', ''] %}
              Hardening since {{ as_datetime(hardening_started).strftime('%B %-d') }}
            {% elif observation == 'dry' %}
              Looks dry. Water gently and recheck the tray weight tonight.
            {% elif observation == 'leggy' %}
              Looks a bit stretched. Lower the light or increase intensity.
            {% elif observation == 'ready for next step' and is_state('binary_sensor.garden_basil_weather_ready', 'on') %}
              Looks ready for the next step and the weather window is finally warm enough.
            {% elif observation == 'ready for next step' %}
              Looks ready for the next step, but still wait for nights above 55°.
            {% elif observation == 'stressed' %}
              Looks stressed. Keep conditions steady and avoid big swings.
            {% else %}
              Keep indoors until nights stay above 55°
            {% endif %}
          move_rule: Wait for nighttime lows above 55°F.

      - name: "Garden Petite Marigolds Status"
        unique_id: garden_petite_marigolds_status
        state: >
          {% if is_state('input_boolean.garden_marigolds_outside', 'on') %}
            Outside
          {% elif is_state('input_boolean.garden_marigolds_hardening_off', 'on') %}
            Hardening off
          {% else %}
            Indoors
          {% endif %}
        icon: >
          {% if is_state('input_boolean.garden_marigolds_outside', 'on') %}mdi:flower-outline
          {% elif is_state('input_boolean.garden_marigolds_hardening_off', 'on') %}mdi:white-balance-sunny
          {% else %}mdi:sprout{% endif %}
        attributes:
          count: 16
          hardening_target: >
            {% set started = states('input_datetime.garden_seed_start_date') %}
            {% if started in ['unknown', 'unavailable', ''] %}
              TBD
            {% else %}
              {{ (as_datetime(started).date() + timedelta(days=14)).strftime('%B %-d') }}
            {% endif %}
          outdoor_target: >
            {% set started = states('input_datetime.garden_seed_start_date') %}
            {% if started in ['unknown', 'unavailable', ''] %}
              TBD
            {% else %}
              {{ (as_datetime(started).date() + timedelta(days=21)).strftime('%B %-d') }}
            {% endif %}
          stage_note: >
            {% set observation = states('input_select.garden_marigolds_observation') %}
            {% set hardening_started = states('input_datetime.garden_marigolds_hardening_started') %}
            {% set moved_outside = states('input_datetime.garden_marigolds_moved_outside') %}
            {% if is_state('input_boolean.garden_marigolds_outside', 'on') and moved_outside not in ['unknown', 'unavailable', ''] %}
              Outside since {{ as_datetime(moved_outside).strftime('%B %-d') }}
            {% elif is_state('input_boolean.garden_marigolds_hardening_off', 'on') and hardening_started not in ['unknown', 'unavailable', ''] %}
              Hardening since {{ as_datetime(hardening_started).strftime('%B %-d') }}
            {% elif observation == 'dry' %}
              Looks dry. Water and let the tray fully rehydrate.
            {% elif observation == 'leggy' %}
              Looks a bit stretched. Give it stronger light and a little airflow.
            {% elif observation == 'ready for next step' and is_state('binary_sensor.garden_marigolds_weather_ready', 'on') %}
              Looks ready for the next step and the weather window is mild enough.
            {% elif observation == 'ready for next step' %}
              Looks ready for the next step, but wait for a milder outdoor window.
            {% elif observation == 'stressed' %}
              Looks stressed. Keep moisture even and avoid sudden outdoor exposure.
            {% else %}
              Hardening can start around two weeks after sowing
            {% endif %}
          move_rule: Wait for forecast lows above 48°F.

  - binary_sensor:
      - name: "Garden Indoor Seedlings Active"
        unique_id: garden_indoor_seedlings_active
        state: >
          {{ not is_state('input_boolean.garden_marigolds_outside', 'on')
             or not is_state('input_boolean.garden_basil_outside', 'on') }}
        icon: >
          {{ 'mdi:sprout-outline' if is_state('binary_sensor.garden_indoor_seedlings_active', 'on') else 'mdi:flower' }}

      - name: "Garden Seedling Check Due"
        unique_id: garden_seedling_check_due
        state: >
          {% if not is_state('binary_sensor.garden_indoor_seedlings_active', 'on') %}
            false
          {% else %}
            {{ not is_state('input_boolean.garden_checked_today', 'on') }}
          {% endif %}
        icon: >
          {{ 'mdi:clipboard-alert-outline' if is_state('binary_sensor.garden_seedling_check_due', 'on') else 'mdi:clipboard-check-outline' }}

      - name: "Garden Water Review Due"
        unique_id: garden_water_review_due
        state: >
          {% if not is_state('binary_sensor.garden_indoor_seedlings_active', 'on') %}
            false
          {% elif now().hour < 16 %}
            false
          {% else %}
            {{ not is_state('input_boolean.garden_watered_today', 'on') }}
          {% endif %}
        icon: >
          {{ 'mdi:watering-can' if is_state('binary_sensor.garden_water_review_due', 'on') else 'mdi:watering-can-outline' }}

      - name: "Garden Marigolds Weather Ready"
        unique_id: garden_marigolds_weather_ready
        state: >
          {% set temp = state_attr('weather.forecast_home', 'temperature') %}
          {% set humidity = state_attr('weather.forecast_home', 'humidity') %}
          {% set wind = state_attr('weather.forecast_home', 'wind_speed') %}
          {% set condition = states('weather.forecast_home') %}
          {% set fair_weather = condition not in ['rainy', 'pouring', 'lightning', 'lightning-rainy', 'snowy', 'snowy-rainy', 'fog'] %}
          {{ is_number(states('sensor.garden_lowest_forecast_low_4_day'))
             and states('sensor.garden_lowest_forecast_low_4_day') | float(0) >= 48
             and is_number(temp) and temp | float(0) >= 55
             and is_number(humidity) and humidity | float(0) <= 92
             and is_number(wind) and wind | float(0) <= 15
             and fair_weather }}
        icon: >
          {{ 'mdi:weather-sunny' if is_state('binary_sensor.garden_marigolds_weather_ready', 'on') else 'mdi:weather-cloudy' }}

      - name: "Garden Basil Weather Ready"
        unique_id: garden_basil_weather_ready
        state: >
          {% set temp = state_attr('weather.forecast_home', 'temperature') %}
          {% set humidity = state_attr('weather.forecast_home', 'humidity') %}
          {% set wind = state_attr('weather.forecast_home', 'wind_speed') %}
          {% set condition = states('weather.forecast_home') %}
          {% set fair_weather = condition not in ['rainy', 'pouring', 'lightning', 'lightning-rainy', 'snowy', 'snowy-rainy', 'fog'] %}
          {{ is_number(states('sensor.garden_lowest_forecast_low_4_day'))
             and states('sensor.garden_lowest_forecast_low_4_day') | float(0) >= 55
             and is_number(temp) and temp | float(0) >= 60
             and is_number(humidity) and humidity | float(0) <= 88
             and is_number(wind) and wind | float(0) <= 12
             and fair_weather }}
        icon: >
          {{ 'mdi:weather-sunny' if is_state('binary_sensor.garden_basil_weather_ready', 'on') else 'mdi:weather-night' }}

# ── 24h Rolling Average Sensors ──────────────────────────
# These use HA's built-in statistics integration as the source of truth
# for the two template sensors above. Keeping the statistics entities
# separate gives the dashboard stable entity IDs.

sensor:
  - platform: statistics
    name: "Wine Temperature 24h Stats"
    unique_id: wine_temperature_24h_stats
    entity_id: sensor.wine_temperature
    state_characteristic: mean
    max_age:
      hours: 24
    sampling_size: 1000
    precision: 1

  - platform: statistics
    name: "Wine Humidity 24h Stats"
    unique_id: wine_humidity_24h_stats
    entity_id: sensor.wine_humidity
    state_characteristic: mean
    max_age:
      hours: 24
    sampling_size: 1000
    precision: 1

  - platform: statistics
    name: "Wine Cave Absolute Humidity 24h Stats"
    unique_id: wine_cave_absolute_humidity_24h_stats
    entity_id: sensor.wine_cave_absolute_humidity
    state_characteristic: mean
    max_age:
      hours: 24
    sampling_size: 1000
    precision: 2

  - platform: statistics
    name: "Wine Temperature 7d Stats"
    unique_id: wine_temperature_7d_stats
    entity_id: sensor.wine_temperature
    state_characteristic: mean
    max_age:
      days: 7
    sampling_size: 10000
    precision: 1

  - platform: statistics
    name: "Wine Humidity 7d Stats"
    unique_id: wine_humidity_7d_stats
    entity_id: sensor.wine_humidity
    state_characteristic: mean
    max_age:
      days: 7
    sampling_size: 10000
    precision: 1

  - platform: statistics
    name: "Wine Temperature 30d Stats"
    unique_id: wine_temperature_30d_stats
    entity_id: sensor.wine_temperature
    state_characteristic: mean
    max_age:
      days: 30
    sampling_size: 10000
    precision: 1

  - platform: statistics
    name: "Wine Humidity 30d Stats"
    unique_id: wine_humidity_30d_stats
    entity_id: sensor.wine_humidity
    state_characteristic: mean
    max_age:
      days: 30
    sampling_size: 10000
    precision: 1
    
  - platform: statistics
    name: "Basement Radon 24h Stats"
    unique_id: basement_radon_24h_stats
    entity_id: sensor.basement_air_quality_radon
    state_characteristic: mean
    max_age:
      hours: 24
    sampling_size: 1000
    precision: 0

  - platform: statistics
    name: "Basement Radon 7d Stats"
    unique_id: basement_radon_7d_stats
    entity_id: sensor.basement_air_quality_radon
    state_characteristic: mean
    max_age:
      days: 7
    sampling_size: 10000
    precision: 0

