# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

lovelace:
  resources:
    - url: /local/calm-mobile-scrollbars.js?v=3
      type: module
    - url: /local/house-notices-card.js?v=25
      type: module
  dashboards:
    calm-mobile:
      mode: yaml
      title: Home
      icon: mdi:home-variant-outline
      show_in_sidebar: true
      require_admin: false
      filename: dashboards/calm_mobile.yaml

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

command_line:
  - sensor:
      name: Wine Collection Snapshot
      unique_id: wine_collection_snapshot
      command: python3 /config/tools/refresh_wine_collection_snapshot.py
      command_timeout: 60
      scan_interval: 86400
      value_template: >
        {{ value_json.ready_total if value_json.ready_total is defined else 0 }}
      json_attributes:
        - sheet_url
        - data_source
        - refreshed_at
        - refreshed_label
        - total_bottles
        - ready_total
        - stabilizing_total
        - mature_total
        - early_total
        - hold_total
        - unknown_total
        - ready_styles
        - ready_regions
        - ready_countries
        - stabilizing_rows
        - mature_rows
        - early_rows
        - hold_rows
  - sensor:
      name: Metro-North NWP to Grand Central
      unique_id: metro_north_nwp_to_grand_central
      command: >-
        python3 /config/tools/mta_mnr_departures.py
        --origin-stop-id 76
        --origin-stop-name "North White Plains"
        --destination-stop-id 1
        --destination-stop-name "Grand Central"
        --route-id 2
        --route-name "Harlem Line"
        --min-departure-minutes 20
        --limit 3
      command_timeout: 45
      scan_interval: 120
      value_template: >
        {{ value_json.summary if value_json.summary is defined else 'unavailable' }}
      json_attributes:
        - updated_at
        - source
        - realtime_available
        - buffer_minutes
        - origin_stop_id
        - origin_stop_name
        - destination_stop_id
        - destination_stop_name
        - route_id
        - route_name
        - departures_label
        - track_label
        - message
        - trains
        - error
  - sensor:
      name: Device Inventory Status
      unique_id: device_inventory_status
      command: >-
        python3 /config/tools/generate_device_inventory.py
        --config-dir /config
        --print-status
      command_timeout: 15
      scan_interval: 300
      value_template: >
        {{ value_json.summary_message if value_json.summary_message is defined else 'Inventory status pending' }}
      json_attributes:
        - generated_at
        - api_enriched
        - output_changed
        - severity
        - change_counts
        - security_reasons
        - warnings
  - sensor:
      name: Device Inventory Pending Digest
      unique_id: device_inventory_pending_digest
      command: >-
        python3 /config/tools/generate_device_inventory.py
        --config-dir /config
        --print-digest
      command_timeout: 15
      scan_interval: 300
      value_template: >
        {{ value_json.pending_count if value_json.pending_count is defined else 0 }}
      json_attributes:
        - updated_at
        - pending_count
        - summary_message
        - items

shell_command:
  refresh_device_inventory: >-
    python3 /config/tools/generate_device_inventory.py
    --config-dir /config
    --output-dir /config/docs
  clear_device_inventory_digest: >-
    python3 /config/tools/generate_device_inventory.py
    --config-dir /config
    --clear-digest
  house_manager_log_property_tax_payment: >-
    python3 /config/tools/log_property_tax_payment.py
    --tax-type "{{ tax_type }}"
    --bill-month "{{ bill_month }}"
    --bill-year "{{ bill_year }}"
    --due-date "{{ due_date }}"
    --paid-date "{{ paid_date }}"
    --source "{{ source }}"

