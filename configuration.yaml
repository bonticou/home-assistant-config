      - name: "Garden Next Action"
        unique_id: garden_next_action
        state: >
          {% set low = state_attr('sensor.garden_weather_window', 'lowest_low_4_day') %}
          {% set low = low | float(99) if is_number(low) else 99 %}
          {% set forecast_ok = state_attr('sensor.garden_weather_window', 'forecast_available') in [true, 'true', 'True'] %}
          {% set tomato_window = state_attr('sensor.garden_weather_window', 'tomatoes_window') in [true, 'true', 'True'] %}
          {% set pepper_window = state_attr('sensor.garden_weather_window', 'peppers_window') in [true, 'true', 'True'] %}
          {% set cape_window = state_attr('sensor.garden_weather_window', 'cape_gooseberry_window') in [true, 'true', 'True'] %}
            {% set squash_window = state_attr('sensor.garden_weather_window', 'honeynut_squash_window') in [true, 'true', 'True'] %}
          {% set cool_in_ground = is_state('input_boolean.garden_spinach_in_ground', 'on')
             or states('input_select.garden_bok_choy_stage') == 'planted' %}
          {% set tomato_started = states('input_datetime.garden_tomatoes_hardening_started') %}
          {% set pepper_started = states('input_datetime.garden_peppers_hardening_started') %}
          {% set cape_started = states('input_datetime.garden_cape_gooseberry_hardening_started') %}
          {% set squash_started = states('input_datetime.garden_honeynut_squash_hardening_started') %}
          {% set tomato_days = (now().date() - as_datetime(tomato_started).date()).days if tomato_started not in ['unknown', 'unavailable', ''] else 0 %}
          {% set pepper_days = (now().date() - as_datetime(pepper_started).date()).days if pepper_started not in ['unknown', 'unavailable', ''] else 0 %}
          {% set cape_days = (now().date() - as_datetime(cape_started).date()).days if cape_started not in ['unknown', 'unavailable', ''] else 0 %}
          {% set squash_days = (now().date() - as_datetime(squash_started).date()).days if squash_started not in ['unknown', 'unavailable', ''] else 0 %}
          {% set stressed = [
            'spinach' if states('input_select.garden_spinach_observation') == 'stressed' else '',
            'bok choy' if states('input_select.garden_bok_choy_observation') == 'stressed' else '',
            'tomatoes' if states('input_select.garden_tomatoes_observation') == 'stressed' else '',
            'peppers' if states('input_select.garden_peppers_observation') == 'stressed' else '',
            'cape gooseberry' if states('input_select.garden_cape_gooseberry_observation') == 'stressed' else '',
            'honeynut squash' if states('input_select.garden_honeynut_squash_observation') == 'stressed' else ''
          ] | reject('eq', '') | list %}
          {% if stressed | count > 0 %}
            Check {{ stressed[0] }}
          {% elif not forecast_ok %}
            Forecast unavailable
          {% elif low < 32 and cool_in_ground %}
            Cover cool greens tonight
          {% elif low < 32 and states('input_select.garden_bok_choy_stage') != 'planted' %}
            Protect bok choy from frost
          {% elif states('input_select.garden_bok_choy_stage') != 'planted' and low >= 32 %}
            Plant bok choy
          {% elif (states('input_select.garden_tomatoes_stage') in ['hardening', 'ready to plant', 'planted'] and low < 50)
             or (states('input_select.garden_cape_gooseberry_stage') in ['hardening', 'ready to plant', 'planted'] and low < 50)
             or (states('input_select.garden_peppers_stage') in ['hardening', 'ready to plant', 'planted'] and low < 55)
             or (states('input_select.garden_honeynut_squash_stage') in ['hardening', 'ready to plant', 'planted'] and low < 55) %}
            Protect warm starts tonight
          {% elif states('input_select.garden_tomatoes_stage') in ['hardening', 'ready to plant'] and tomato_window and (tomato_days >= 7 or states('input_select.garden_tomatoes_stage') == 'ready to plant') %}
            Plant tomatoes
          {% elif states('input_select.garden_cape_gooseberry_stage') in ['hardening', 'ready to plant'] and cape_window and (cape_days >= 7 or states('input_select.garden_cape_gooseberry_stage') == 'ready to plant') %}
            Plant cape gooseberry
          {% elif states('input_select.garden_peppers_stage') in ['hardening', 'ready to plant'] and pepper_window and (pepper_days >= 7 or states('input_select.garden_peppers_stage') == 'ready to plant') %}
            Plant peppers
          {% elif states('input_select.garden_honeynut_squash_stage') in ['hardening', 'ready to plant'] and squash_window and (squash_days >= 7 or states('input_select.garden_honeynut_squash_stage') == 'ready to plant') %}
            Plant honeynut squash
          {% elif low >= 50 %}
            Warm window opening
          {% else %}
            Keep warm starts hardening
          {% endif %}
        icon: mdi:calendar-check-outline
        attributes:
          action_id: >
            {% set low = state_attr('sensor.garden_weather_window', 'lowest_low_4_day') %}
            {% set low = low | float(99) if is_number(low) else 99 %}
            {% set forecast_ok = state_attr('sensor.garden_weather_window', 'forecast_available') in [true, 'true', 'True'] %}
            {% set tomato_window = state_attr('sensor.garden_weather_window', 'tomatoes_window') in [true, 'true', 'True'] %}
            {% set pepper_window = state_attr('sensor.garden_weather_window', 'peppers_window') in [true, 'true', 'True'] %}
            {% set cape_window = state_attr('sensor.garden_weather_window', 'cape_gooseberry_window') in [true, 'true', 'True'] %}
            {% set squash_window = state_attr('sensor.garden_weather_window', 'honeynut_squash_window') in [true, 'true', 'True'] %}
            {% set cool_in_ground = is_state('input_boolean.garden_spinach_in_ground', 'on')
               or states('input_select.garden_bok_choy_stage') == 'planted' %}
            {% set tomato_started = states('input_datetime.garden_tomatoes_hardening_started') %}
            {% set pepper_started = states('input_datetime.garden_peppers_hardening_started') %}
            {% set cape_started = states('input_datetime.garden_cape_gooseberry_hardening_started') %}
            {% set squash_started = states('input_datetime.garden_honeynut_squash_hardening_started') %}
            {% set tomato_days = (now().date() - as_datetime(tomato_started).date()).days if tomato_started not in ['unknown', 'unavailable', ''] else 0 %}
            {% set pepper_days = (now().date() - as_datetime(pepper_started).date()).days if pepper_started not in ['unknown', 'unavailable', ''] else 0 %}
            {% set cape_days = (now().date() - as_datetime(cape_started).date()).days if cape_started not in ['unknown', 'unavailable', ''] else 0 %}
            {% set squash_days = (now().date() - as_datetime(squash_started).date()).days if squash_started not in ['unknown', 'unavailable', ''] else 0 %}
            {% if states('input_select.garden_spinach_observation') == 'stressed' %}GARDEN_RESOLVE_SPINACH_ISSUE
            {% elif states('input_select.garden_bok_choy_observation') == 'stressed' %}GARDEN_RESOLVE_BOK_CHOY_ISSUE
            {% elif states('input_select.garden_tomatoes_observation') == 'stressed' %}GARDEN_RESOLVE_TOMATOES_ISSUE
            {% elif states('input_select.garden_peppers_observation') == 'stressed' %}GARDEN_RESOLVE_PEPPERS_ISSUE
            {% elif states('input_select.garden_cape_gooseberry_observation') == 'stressed' %}GARDEN_RESOLVE_CAPE_GOOSEBERRY_ISSUE
            {% elif states('input_select.garden_honeynut_squash_observation') == 'stressed' %}GARDEN_RESOLVE_HONEYNUT_SQUASH_ISSUE
            {% elif not forecast_ok %}none
            {% elif low < 32 and cool_in_ground %}none
            {% elif states('input_select.garden_bok_choy_stage') != 'planted' and low >= 32 %}GARDEN_MARK_BOK_CHOY_PLANTED
            {% elif states('input_select.garden_tomatoes_stage') in ['hardening', 'ready to plant'] and tomato_window and (tomato_days >= 7 or states('input_select.garden_tomatoes_stage') == 'ready to plant') %}GARDEN_MARK_TOMATOES_PLANTED
            {% elif states('input_select.garden_cape_gooseberry_stage') in ['hardening', 'ready to plant'] and cape_window and (cape_days >= 7 or states('input_select.garden_cape_gooseberry_stage') == 'ready to plant') %}GARDEN_MARK_CAPE_GOOSEBERRY_PLANTED
            {% elif states('input_select.garden_peppers_stage') in ['hardening', 'ready to plant'] and pepper_window and (pepper_days >= 7 or states('input_select.garden_peppers_stage') == 'ready to plant') %}GARDEN_MARK_PEPPERS_PLANTED
            {% elif states('input_select.garden_honeynut_squash_stage') in ['hardening', 'ready to plant'] and squash_window and (squash_days >= 7 or states('input_select.garden_honeynut_squash_stage') == 'ready to plant') %}GARDEN_MARK_HONEYNUT_SQUASH_PLANTED
            {% else %}none{% endif %}
          detail: >
            {% set low = state_attr('sensor.garden_weather_window', 'lowest_low_4_day') %}
            {% set lows = state_attr('sensor.garden_weather_window', 'next_4_lows') %}
            {% set forecast_ok = state_attr('sensor.garden_weather_window', 'forecast_available') in [true, 'true', 'True'] %}
            {% if states('binary_sensor.garden_issue_attention_due') == 'on' %}
              One crop is marked stressed. Check moisture, light, wind exposure, and pest pressure.
            {% elif not forecast_ok %}
              Forecast data is not available, so planting notifications stay quiet.
            {% elif states('binary_sensor.garden_stage_action_due') == 'on' %}
              Forecast lows: {{ lows }}. {{ states('sensor.garden_weather_window') }}.
            {% elif states('binary_sensor.garden_weather_protection_due') == 'on' %}
              Forecast lows: {{ lows }}. Cover planted warm crops only if practical; move potted outdoor starts somewhere warmer before evening.
            {% else %}
              Forecast lows: {{ lows }}. Climate normals are context; the live forecast decides.
            {% endif %}

      - name: "Garden Workflow Status"
        unique_id: garden_workflow_status
        icon: >
          {% if is_state('binary_sensor.garden_issue_attention_due', 'on') %}mdi:sprout-outline
          {% elif is_state('binary_sensor.garden_weather_protection_due', 'on') %}mdi:weather-night
          {% elif is_state('binary_sensor.garden_stage_action_due', 'on') %}mdi:shovel
          {% else %}mdi:leaf-circle-outline{% endif %}
        state: >
          {% if is_state('binary_sensor.garden_issue_attention_due', 'on')
             or is_state('binary_sensor.garden_weather_protection_due', 'on')
             or is_state('binary_sensor.garden_stage_action_due', 'on') %}
            Needs attention
          {% elif not (state_attr('sensor.garden_weather_window', 'forecast_available') in [true, 'true', 'True']) %}
            Waiting for forecast
          {% elif state_attr('sensor.garden_weather_window', 'lowest_low_4_day') | float(0) < 50 %}
            Hardening
          {% elif state_attr('sensor.garden_weather_window', 'lowest_low_4_day') | float(0) < 55 %}
            Partial warm window
          {% else %}
            Warm window watch
          {% endif %}
        attributes:
          attention_type: >
            {% if is_state('binary_sensor.garden_issue_attention_due', 'on') %}
              stressed_crop
            {% elif is_state('binary_sensor.garden_weather_protection_due', 'on') %}
              weather_protection
            {% elif is_state('binary_sensor.garden_stage_action_due', 'on') %}
              planting_window
            {% else %}
              none
            {% endif %}
          attention_reason: >
            {% set action = states('sensor.garden_next_action') %}
            {% set detail = state_attr('sensor.garden_next_action', 'detail') %}
            {% if is_state('binary_sensor.garden_issue_attention_due', 'on') %}
              {{ action }}. {{ detail }}
            {% elif is_state('binary_sensor.garden_weather_protection_due', 'on') %}
              {{ action }}. {{ detail }}
            {% elif is_state('binary_sensor.garden_stage_action_due', 'on') %}
              {{ action }} is ready to plant. {{ detail }}
            {% else %}
              No garden action needs attention right now.
            {% endif %}
          ready_to_plant: >
            {{ states('sensor.garden_next_action')
               if is_state('binary_sensor.garden_stage_action_due', 'on')
               else 'none' }}
          notification_policy: >
            Planting windows notify when they open or at the morning check, at most once per day. Weather protection notifies late afternoon, at most once per day. Stressed crops notify immediately or at the daily issue check.

    binary_sensor:
      - name: "Garden Stage Action Due"
        unique_id: garden_stage_action_due
        state: >
          {% set low = state_attr('sensor.garden_weather_window', 'lowest_low_4_day') %}
          {% set low = low | float(99) if is_number(low) else 99 %}
          {% set forecast_ok = state_attr('sensor.garden_weather_window', 'forecast_available') in [true, 'true', 'True'] %}
          {% set tomato_window = state_attr('sensor.garden_weather_window', 'tomatoes_window') in [true, 'true', 'True'] %}
          {% set pepper_window = state_attr('sensor.garden_weather_window', 'peppers_window') in [true, 'true', 'True'] %}
          {% set cape_window = state_attr('sensor.garden_weather_window', 'cape_gooseberry_window') in [true, 'true', 'True'] %}
          {% set squash_window = state_attr('sensor.garden_weather_window', 'honeynut_squash_window') in [true, 'true', 'True'] %}
          {% set tomato_started = states('input_datetime.garden_tomatoes_hardening_started') %}
          {% set pepper_started = states('input_datetime.garden_peppers_hardening_started') %}
          {% set cape_started = states('input_datetime.garden_cape_gooseberry_hardening_started') %}
          {% set squash_started = states('input_datetime.garden_honeynut_squash_hardening_started') %}
          {% set tomato_days = (now().date() - as_datetime(tomato_started).date()).days if tomato_started not in ['unknown', 'unavailable', ''] else 0 %}
          {% set pepper_days = (now().date() - as_datetime(pepper_started).date()).days if pepper_started not in ['unknown', 'unavailable', ''] else 0 %}
          {% set cape_days = (now().date() - as_datetime(cape_started).date()).days if cape_started not in ['unknown', 'unavailable', ''] else 0 %}
          {% set squash_days = (now().date() - as_datetime(squash_started).date()).days if squash_started not in ['unknown', 'unavailable', ''] else 0 %}
          {{ forecast_ok and (
             (states('input_select.garden_bok_choy_stage') != 'planted' and low >= 32)
             or (states('input_select.garden_tomatoes_stage') in ['hardening', 'ready to plant'] and tomato_window and (tomato_days >= 7 or states('input_select.garden_tomatoes_stage') == 'ready to plant'))
             or (states('input_select.garden_cape_gooseberry_stage') in ['hardening', 'ready to plant'] and cape_window and (cape_days >= 7 or states('input_select.garden_cape_gooseberry_stage') == 'ready to plant'))
             or (states('input_select.garden_peppers_stage') in ['hardening', 'ready to plant'] and pepper_window and (pepper_days >= 7 or states('input_select.garden_peppers_stage') == 'ready to plant'))
             or (states('input_select.garden_honeynut_squash_stage') in ['hardening', 'ready to plant'] and squash_window and (squash_days >= 7 or states('input_select.garden_honeynut_squash_stage') == 'ready to plant'))
          ) }}
        icon: mdi:calendar-check-outline

      - name: "Garden Weather Protection Due"
        unique_id: garden_weather_protection_due
        state: >
          {% set forecast_ok = state_attr('sensor.garden_weather_window', 'forecast_available') in [true, 'true', 'True'] %}
          {% set low = state_attr('sensor.garden_weather_window', 'lowest_low_4_day') %}
          {% set low = low | float(99) if is_number(low) else 99 %}
          {% set cool_in_ground = is_state('input_boolean.garden_spinach_in_ground', 'on')
             or states('input_select.garden_bok_choy_stage') in ['hardening', 'ready to plant', 'planted'] %}
          {{ forecast_ok and (
            (cool_in_ground and low < 32)
            or (states('input_select.garden_tomatoes_stage') in ['hardening', 'ready to plant', 'planted'] and low < 50)
            or (states('input_select.garden_cape_gooseberry_stage') in ['hardening', 'ready to plant', 'planted'] and low < 50)
            or (states('input_select.garden_peppers_stage') in ['hardening', 'ready to plant', 'planted'] and low < 55)
            or (states('input_select.garden_honeynut_squash_stage') in ['hardening', 'ready to plant', 'planted'] and low < 55)
          ) }}
        icon: mdi:weather-night

      - name: "Garden Issue Attention Due"
        unique_id: garden_issue_attention_due
        state: >
          {{ states('input_select.garden_spinach_observation') == 'stressed'
             or states('input_select.garden_bok_choy_observation') == 'stressed'
             or states('input_select.garden_tomatoes_observation') == 'stressed'
             or states('input_select.garden_peppers_observation') == 'stressed'
             or states('input_select.garden_cape_gooseberry_observation') == 'stressed'
             or states('input_select.garden_honeynut_squash_observation') == 'stressed' }}
        icon: mdi:sprout-outline

      - name: "Garden Actionable Alert"
        unique_id: garden_actionable_alert
        device_class: problem
        state: >
          {{ is_state('binary_sensor.garden_stage_action_due', 'on')
             or is_state('binary_sensor.garden_weather_protection_due', 'on')
             or is_state('binary_sensor.garden_issue_attention_due', 'on') }}
        icon: mdi:sprout-outline
        attributes:
          attention_type: "{{ state_attr('sensor.garden_workflow_status', 'attention_type') }}"
          reason: "{{ state_attr('sensor.garden_workflow_status', 'attention_reason') }}"

      - name: "Garden Needs Attention"
        unique_id: garden_needs_attention
        device_class: problem
        state: >
          {{ is_state('binary_sensor.garden_stage_action_due', 'on')
             or is_state('binary_sensor.garden_weather_protection_due', 'on')
             or is_state('binary_sensor.garden_issue_attention_due', 'on') }}
        icon: >
          {% if is_state('binary_sensor.garden_issue_attention_due', 'on') %}mdi:sprout-outline
          {% elif is_state('binary_sensor.garden_weather_protection_due', 'on') %}mdi:weather-night
          {% elif is_state('binary_sensor.garden_stage_action_due', 'on') %}mdi:shovel
          {% else %}mdi:check-circle-outline{% endif %}
        attributes:
          attention_type: "{{ state_attr('sensor.garden_workflow_status', 'attention_type') }}"
          reason: "{{ state_attr('sensor.garden_workflow_status', 'attention_reason') }}"
          ready_to_plant: "{{ state_attr('sensor.garden_workflow_status', 'ready_to_plant') }}"

  - trigger:
      - platform: event
        event_type: house_notice_event_recorded
    sensor:
      - name: "House Notice History"
        unique_id: house_notice_history
        state: >
          {{ trigger.event.data.at | default(now().strftime('%Y-%m-%d %H:%M:%S'), true) }}
        icon: mdi:history
        attributes:
          events_json: >
            {% set existing_raw = this.attributes.get('events_json', []) if this is defined and this.attributes is defined else [] %}
            {% set parsed = namespace(items=[]) %}
            {% if existing_raw is string and existing_raw | length > 0 %}
              {% set parsed.items = existing_raw | from_json %}
            {% elif existing_raw is iterable %}
              {% set parsed.items = existing_raw | list %}
            {% endif %}
            {% set cutoff = as_timestamp(now()) - 1209600 %}
            {% set kept = namespace(items=[]) %}
            {% set dismissing = trigger.event.data.kind | default('', true) == 'dismiss' %}
            {% set dismiss_all_recent = (trigger.event.data.dismiss_all_recent | default(false)) in [true, 'true', 'True', 'on', '1', 1] %}
            {% set dismiss_kind_filter = trigger.event.data.dismiss_all_kind | default('', true) %}
            {% for item in parsed.items %}
              {% set item_ts = as_timestamp(item.at | default('', true), 0) %}
              {% set matches_dismiss = dismissing
                 and (
                   dismiss_all_recent
                   or (dismiss_kind_filter | length > 0 and item.kind | default('', true) == dismiss_kind_filter)
                   or (
                     dismiss_kind_filter | length == 0
                     and not dismiss_all_recent
                     and item.at | default('', true) == trigger.event.data.dismiss_at | default('', true)
                     and item.kind | default('', true) == trigger.event.data.dismiss_kind | default('', true)
                     and item.tag | default('', true) == trigger.event.data.dismiss_tag | default('', true)
                     and item.title | default('', true) == trigger.event.data.dismiss_title | default('', true)
                     and item.message | default('', true) == trigger.event.data.dismiss_message | default('', true)
                     and item.action | default('', true) == trigger.event.data.dismiss_action | default('', true)
                     and item.source | default('', true) == trigger.event.data.dismiss_source | default('', true)
                   )
                 ) %}
              {% if item_ts >= cutoff and not matches_dismiss %}
                {% set kept.items = kept.items + [item] %}
              {% endif %}
            {% endfor %}
            {% if dismissing %}
              {{ kept.items[:80] | to_json }}
            {% else %}
              {% set open_sent_tags = namespace(items=[]) %}
              {% for item in kept.items | reverse %}
                {% set item_kind = item.kind | default('sent', true) %}
                {% set item_tag = item.tag | default('', true) %}
                {% if item_kind == 'sent' and item_tag | length > 0 and item_tag not in open_sent_tags.items %}
                  {% set open_sent_tags.items = open_sent_tags.items + [item_tag] %}
                {% elif item_kind == 'clear' and item_tag | length > 0 and item_tag in open_sent_tags.items %}
                  {% set open_sent_tags.items = open_sent_tags.items | reject('eq', item_tag) | list %}
                {% endif %}
              {% endfor %}
              {% set event_kind = trigger.event.data.kind | default('sent', true) %}
              {% set event_tag = trigger.event.data.tag | default('', true) %}
              {% set event = {
                'at': trigger.event.data.at | default(now().strftime('%Y-%m-%d %H:%M:%S'), true),
                'kind': event_kind,
                'title': trigger.event.data.title | default('House notice', true),
                'message': trigger.event.data.message | default('', true),
                'group': trigger.event.data.group | default('general', true),
                'tag': event_tag,
                'url': trigger.event.data.url | default('', true),
                'severity': trigger.event.data.severity | default('info', true),
                'action': trigger.event.data.action | default('', true),
                'source': trigger.event.data.source | default('', true),
                'recent': trigger.event.data.recent | default(false, true),
                'keep_recent': trigger.event.data.keep_recent | default(false, true),
                'history': trigger.event.data.history | default('', true)
              } %}
              {% set orphan_clear = event_kind == 'clear' and (event_tag | length == 0 or event_tag not in open_sent_tags.items) %}
              {{ (kept.items if orphan_clear else [event] + kept.items)[:80] | to_json }}
            {% endif %}

