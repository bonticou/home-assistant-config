            {% set robison_price = now().year ~ '-08-20' %}
            {% set ns = namespace(dates=[]) %}
            {% for date_value in [
              (water_last + 604800) | timestamp_custom('%Y-%m-%d', true) if water_last > 0 else '',
              (cafiza_last + 5184000) | timestamp_custom('%Y-%m-%d', true) if cafiza_last > 0 else '',
