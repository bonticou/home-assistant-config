                'id': 'casey-passport',
                'title': 'Casey passport',
                'emoji': '🇺🇸',
                'date': states('sensor.casey_passport_renewal_opens'),
                'expires': states('input_datetime.casey_passport_expiration_date'),
                'state_entity': 'binary_sensor.casey_passport_renewal_due',
                'status_entity': 'sensor.casey_passport_renewal_status',
                'applied_service': 'script.casey_passport_mark_renewal_applied',
                'snooze_service': 'script.casey_passport_snooze_renewal',
                'done_label': 'Applied'
              },
              {
                'id': 'casey-license',
                'title': 'Casey driver license',
                'emoji': '🇺🇸',
                'date': states('sensor.casey_driver_license_renewal_opens'),
                'expires': states('input_datetime.casey_driver_license_expiration_date'),
                'state_entity': 'binary_sensor.casey_driver_license_renewal_due',
                'status_entity': 'sensor.casey_driver_license_renewal_status',
                'applied_service': 'script.casey_driver_license_mark_renewed',
                'snooze_service': 'script.casey_driver_license_snooze_renewal',
                'done_label': 'Renewed'
              }
            ] %}
            {% for doc in docs %}
              {% if doc.date not in ['unknown', 'unavailable', 'none', ''] %}
                {% set ns.items = ns.items + [{
                  'id': doc.id,
                  'title': doc.title,
                  'emoji': doc.emoji,
                  'icon': 'mdi:passport',
                  'group': 'Personal admin',
                  'state': 'due' if is_state(doc.state_entity, 'on') else 'upcoming',
                  'severity': 'watch' if is_state(doc.state_entity, 'on') else 'info',
                  'date': doc.date,
                  'due_prefix': 'Opens',
                  'basis_date': doc.expires,
                  'basis_prefix': 'expires',
                  'narrative': states(doc.status_entity),
                  'url': '/calm-mobile/notices',
                  'entity_id': doc.status_entity,
                  'actions': [
                    {'label': doc.done_label, 'service': doc.applied_service},
                    {'label': 'Snooze 7d', 'service': doc.snooze_service, 'data': {'days': 7}},
                    {'label': 'Snooze 2w', 'service': doc.snooze_service, 'data': {'days': 14}},
                    {'label': 'Snooze 30d', 'service': doc.snooze_service, 'data': {'days': 30}}
                  ]
                }] %}
              {% endif %}
            {% endfor %}
            {% set tax_items = [
              {'id': 'school-tax-jan', 'title': 'School tax January', 'emoji': '📚', 'paid': states('input_datetime.school_tax_january_last_paid_at'), 'tax_type': 'school', 'bill_month': 1},
              {'id': 'town-tax-apr', 'title': 'Town tax April', 'emoji': '🏛️', 'paid': states('input_datetime.town_tax_last_paid_at'), 'tax_type': 'town', 'bill_month': 4},
              {'id': 'school-tax-sep', 'title': 'School tax September', 'emoji': '📚', 'paid': states('input_datetime.school_tax_september_last_paid_at'), 'tax_type': 'school', 'bill_month': 9}
            ] %}
            {% if is_state('input_boolean.tax_reminders_enabled', 'on') %}
              {% for tax_year in range(now().year, now().year + 3) %}
                {% for tax in tax_items %}
                  {% set bill = '%04d-%02d-01' | format(tax_year, tax.bill_month | int) %}
                  {% set notice_start = (strptime(bill, '%Y-%m-%d') - timedelta(days=21)).strftime('%Y-%m-%d') %}
                  {% set first_next_month = strptime('%04d-%02d-01' | format(tax_year, (tax.bill_month | int) + 1), '%Y-%m-%d') %}
                  {% set last_day = first_next_month - timedelta(days=1) %}
                  {% set weekend_offset = 2 if last_day.weekday() == 6 else 1 if last_day.weekday() == 5 else 0 %}
                  {% set due = (last_day - timedelta(days=weekend_offset)).strftime('%Y-%m-%d') %}
                  {% set paid = tax.paid not in ['unknown', 'unavailable', 'none', ''] and tax.paid[:10] >= bill %}
                  {% set active = today >= bill %}
                  {% if not paid and (active or (bill >= today and today >= notice_start)) %}
                    {% set ns.items = ns.items + [{
                      'id': tax.id ~ '-' ~ tax_year,
                      'title': tax.title ~ ' ' ~ tax_year,
                      'emoji': tax.emoji,
                      'icon': 'mdi:bank-outline',
                      'group': 'Property',
                      'state': 'due' if active else 'upcoming',
                      'severity': 'watch' if active else 'info',
                      'date': due if active else bill,
                      'due_prefix': 'Due' if active else 'Bill opens',
                      'basis_date': bill if active else due,
                      'basis_prefix': 'bill opened' if active else 'due',
                      'narrative': 'Property tax reminder remains open until marked paid.',
                      'url': '/calm-mobile/notices',
                      'entity_id': 'input_boolean.tax_reminders_enabled',
                      'actions': ([{'label': 'Paid', 'service': 'script.property_tax_mark_paid', 'confirm': true, 'data': {'tax_type': tax.tax_type, 'bill_month': tax.bill_month, 'due_date': due}}] if active else [])
                    }] %}
                  {% endif %}
                {% endfor %}
              {% endfor %}
            {% endif %}
            {% set robison_tune = now().year ~ '-03-25' %}
            {% set robison_price = now().year ~ '-08-20' %}
            {% set robison_follow = now().year ~ '-09-05' %}
            {% set robison_price_last_done = states('input_datetime.robison_oil_price_check_last_done') %}
            {% set robison_price_done = robison_price_last_done not in ['unknown', 'unavailable', 'none', ''] and robison_price_last_done[:10] >= robison_price %}
            {% set ns.items = ns.items + [
              {
                'id': 'robison-oil-tune',
                'title': 'Robison Oil tune-up',
                'emoji': '🛢️',
                'icon': 'mdi:oil',
                'group': 'Home care',
                'state': 'upcoming',
                'severity': 'info',
                'date': robison_tune if robison_tune >= today else (now().year + 1) ~ '-03-25',
                'due_prefix': 'Check',
                'narrative': 'Annual boiler tune-up reminder.',
                'url': '/calm-mobile/home',
                'entity_id': 'input_datetime.robison_oil_price_check_last_done'
              },
              {
                'id': 'robison-oil-price',
                'title': 'Robison Oil price check',
                'emoji': '💸',
                'icon': 'mdi:cash-sync',
                'group': 'Home care',
                'state': 'upcoming' if not robison_price_done else 'quiet',
                'severity': 'info',
                'date': robison_price if robison_price >= today else (now().year + 1) ~ '-08-20',
                'due_prefix': 'Check',
                'basis_date': robison_follow if robison_follow >= today else (now().year + 1) ~ '-09-05',
                'basis_prefix': 'follow up',
                'narrative': 'Compare annual heating oil plan pricing and mark done when reviewed.',
                'url': '/calm-mobile/home',
                'entity_id': 'input_datetime.robison_oil_price_check_last_done',
                'actions': [
                  {'label': 'Done', 'service': 'script.robison_oil_mark_price_check_done'}
                ]
              }
            ] %}
            {% if is_state('input_boolean.wine_cave_maintenance_enabled', 'on') %}
              {% for wine_item in [
                {'id': 'wine-charcoal', 'title': 'Wine cave charcoal filter', 'emoji': '', 'icon': 'mdi:air-filter', 'date': states('sensor.wine_cave_next_charcoal_filter_due'), 'entity': 'binary_sensor.wine_cave_charcoal_filter_due', 'basis': states('input_datetime.wine_cave_last_charcoal_filter_check'), 'basis_suffix': 'last filter check', 'done': 'script.wine_cave_mark_charcoal_filter_replaced', 'snooze': 'script.wine_cave_snooze_charcoal_filter'},
                {'id': 'wine-cleaning', 'title': 'Wine cave cabinet cleaning', 'emoji': '🧼', 'icon': 'mdi:spray-bottle', 'date': states('sensor.wine_cave_next_cleaning_due'), 'entity': 'binary_sensor.wine_cave_cabinet_cleaning_due', 'basis': states('input_datetime.wine_cave_last_cabinet_cleaning'), 'basis_suffix': 'last cleaning', 'done': 'script.wine_cave_mark_cabinet_cleaning_done', 'snooze': 'script.wine_cave_snooze_cabinet_cleaning'}
              ] %}
                {% if wine_item.date not in ['unknown', 'unavailable', 'none', ''] %}
                  {% set ns.items = ns.items + [{
                    'id': wine_item.id,
                    'title': wine_item.title,
                    'emoji': wine_item.emoji,
                    'icon': wine_item.icon,
                    'group': 'Wine cave',
                    'state': 'due' if is_state(wine_item.entity, 'on') else 'upcoming',
                    'severity': 'watch' if is_state(wine_item.entity, 'on') else 'info',
                    'date': wine_item.date,
                    'due_prefix': 'Due',
                    'basis_date': wine_item.basis,
                    'basis_prefix': 'based on',
                    'basis_suffix': wine_item.basis_suffix,
                    'narrative': states('sensor.wine_cave_maintenance_status'),
                    'url': '/calm-mobile/wine',
                    'entity_id': 'sensor.wine_cave_maintenance_status',
                    'actions': [
                      {'label': 'Done', 'service': wine_item.done},
                      {'label': 'Snooze 30d', 'service': wine_item.snooze}
                    ]
                  }] %}
                {% endif %}
              {% endfor %}
              {% if is_state('input_boolean.wine_cave_rating_plate_captured', 'off') %}
                {% set ns.items = ns.items + [{
                  'id': 'wine-rating-plate',
                  'title': 'Wine cave serial number',
                  'emoji': '🏷️',
                  'icon': 'mdi:tag-outline',
                  'group': 'Wine cave',
                  'state': 'due',
                  'severity': 'info',
                  'date': today,
                  'due_prefix': 'Open',
                  'narrative': 'Capture the rating plate so the appliance record has exact support identity.',
                  'url': '/calm-mobile/wine',
                  'entity_id': 'input_boolean.wine_cave_rating_plate_captured',
                  'actions': [
                    {'label': 'Captured', 'service': 'script.wine_cave_mark_rating_plate_captured'}
                  ]
                }] %}
              {% endif %}
              {% if states('input_datetime.wine_cave_parts_labor_warranty_review') not in ['unknown', 'unavailable', 'none', ''] %}
                {% set ns.items = ns.items + [{
                  'id': 'wine-warranty',
                  'title': 'Wine cave warranty review',
                  'emoji': '📄',
                  'icon': 'mdi:file-document-check-outline',
                  'group': 'Wine cave',
                  'state': 'upcoming',
                  'severity': 'info',
                  'date': states('input_datetime.wine_cave_parts_labor_warranty_review'),
                  'due_prefix': 'Review',
                  'narrative': 'Parts and labor warranty review date tracked from the appliance record.',
                  'url': '/calm-mobile/wine',
                  'entity_id': 'sensor.wine_cave_appliance_context'
                }] %}
              {% endif %}
            {% endif %}
            {{ ns.items | to_json }}

    binary_sensor:
      - name: "Water Notification Alert Active"
        unique_id: water_notification_alert_active
        state: >
          {{ is_state('input_boolean.water_flow_alert_active', 'on')
             or is_state('input_boolean.water_pressure_alert_active', 'on')
             or is_state('input_boolean.water_leak_alert_active', 'on')
             or is_state('input_boolean.water_valve_alert_active', 'on')
             or is_state('input_boolean.water_usage_alert_active', 'on') }}
        icon: >
          {% if is_state('input_boolean.water_flow_alert_active', 'on')
             or is_state('input_boolean.water_pressure_alert_active', 'on')
             or is_state('input_boolean.water_leak_alert_active', 'on')
             or is_state('input_boolean.water_valve_alert_active', 'on')
             or is_state('input_boolean.water_usage_alert_active', 'on') %}
            mdi:bell-alert-outline
          {% else %}
            mdi:bell-check-outline
          {% endif %}

      - name: "house_unsecured_while_away"
        unique_id: house_unsecured_while_away
        state: >
          {% set trevor_state = states('device_tracker.tk_iphone_16_pro') %}
          {% set casey_state = states('device_tracker.unifi_default_42_15_78_4a_d9_f8') %}
          {% set trevor_away = trevor_state not in ['home', 'unknown', 'unavailable', ''] %}
          {% set casey_away = casey_state not in ['home', 'unknown', 'unavailable', ''] %}
          {% set everyone_away = trevor_away and casey_away %}
          {% set lights_on = states('sensor.away_security_active_lights') | int(0) > 0 %}
          {{ everyone_away and (is_state('lock.aqara_smart_lock_u100', 'unlocked') or lights_on) }}
        icon: >
          {% if is_state('lock.aqara_smart_lock_u100', 'unlocked') %}
            mdi:lock-open-alert-outline
          {% elif states('sensor.away_security_active_lights') | int(0) > 0 %}
            mdi:lightbulb-alert-outline
          {% else %}
            mdi:shield-home-outline
          {% endif %}
        attributes:
          lights_on_count: >
            {{ states('sensor.away_security_active_lights') | int(0) }}
          summary: "{{ states('sensor.away_security_issue_summary') }}"

      - name: "door_lights_schedule_active"
        unique_id: door_lights_schedule_active
        icon: mdi:coach-lamp
        state: >
          {% set schedule_elevation = 10 %}
          {{ state_attr('sun.sun', 'elevation') | float(90) <= schedule_elevation }}

      - name: "front_stairs_schedule_active"
        unique_id: front_stairs_schedule_active
        icon: mdi:stairs
        state: >
          {% set schedule_elevation = 10 %}
          {{ state_attr('sun.sun', 'elevation') | float(90) <= schedule_elevation }}

