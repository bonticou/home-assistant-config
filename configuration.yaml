                'title': 'Dryer vent cleaning',
                'emoji': '🧺',
                'icon': 'mdi:tumble-dryer',
                'group': 'Home care',
                'state': 'due' if is_state('binary_sensor.dryer_vent_cleaning_due', 'on') else 'upcoming',
                'severity': 'watch' if is_state('binary_sensor.dryer_vent_cleaning_due', 'on') else 'info',
