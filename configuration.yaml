          casey_parked_vehicle_detected: "{{ states('binary_sensor.ratgdo32disco_c26634_vehicle_detected') }}"
          trevor_ratgdo_motion: "{{ states('binary_sensor.ratgdo32_4536e8_motion') }}"
          trevor_ratgdo_obstruction: "{{ states('binary_sensor.ratgdo32_4536e8_obstruction') }}"

