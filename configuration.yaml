          humidity: "{{ states('sensor.main_floor_humidity') }}"
          issue: >
            {% set t = states('sensor.main_floor_temperature') %}
            {% set h = states('sensor.main_floor_humidity') %}
            {% if not is_number(t) or not is_number(h) %}Sensor unavailable
            {% elif (t | float(0)) < 60 %}Too cool
            {% elif (t | float(0)) > 80 %}Too warm
            {% elif (h | float(0)) < 28 %}Very dry
            {% elif (h | float(0)) > 65 %}Very humid
            {% elif (t | float(0)) < 64 or (t | float(0)) > 76 or (h | float(0)) < 32 or (h | float(0)) > 60 %}Comfort watch
