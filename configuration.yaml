          {{ 'mdi:calendar-alert' if is_state('binary_sensor.bonticou_llc_de_franchise_tax_due', 'on') else 'mdi:briefcase-check-outline' }}

      - name: "Garbage Recycling Takeout Due"
        unique_id: garbage_recycling_takeout_due
