      - name: "Irrigation Next Cycle"
        unique_id: irrigation_next_cycle
        device_class: timestamp
        state: >
          {% set ns = namespace(next=none) %}
          {% for entity in [
            'sensor.zone_1_next_cycle',
            'sensor.zone_2_next_cycle',
            'sensor.zone_3_next_cycle',
            'sensor.zone_4_next_cycle',
            'sensor.zone_5_next_cycle',
            'sensor.zone_6_next_cycle',
            'sensor.zone_7_next_cycle',
            'sensor.zone_8_next_cycle',
            'sensor.zone_9_next_cycle',
            'sensor.zone_10_next_cycle',
            'sensor.zone_11_next_cycle',
            'sensor.zone_12_next_cycle',
            'sensor.zone_13_next_cycle',
            'sensor.zone_14_next_cycle',
            'sensor.zone_15_next_cycle',
            'sensor.zone_16_next_cycle',
            'sensor.zone_17_next_cycle',
            'sensor.zone_18_next_cycle',
            'sensor.zone_19_next_cycle',
            'sensor.zone_20_next_cycle',
            'sensor.zone_21_next_cycle',
            'sensor.zone_22_next_cycle',
            'sensor.zone_23_next_cycle',
            'sensor.zone_24_next_cycle',
            'sensor.zone_25_next_cycle',
            'sensor.zone_26_next_cycle',
            'sensor.zone_27_next_cycle'
          ] %}
            {% set ts = as_timestamp(states(entity), 0) %}
            {% if ts > as_timestamp(now()) and (ns.next is none or ts < ns.next) %}
              {% set ns.next = ts %}
            {% endif %}
          {% endfor %}
          {{ ns.next | timestamp_local if ns.next is not none else 'unknown' }}

      - name: "Irrigation Up Next Zone"
        unique_id: irrigation_up_next_zone
        state: >
          {% set ns = namespace(ts=none, name='Unknown') %}
          {% for zone in range(1, 28) %}
            {% set next_entity = 'sensor.zone_' ~ zone ~ '_next_cycle' %}
            {% set watering_entity = 'binary_sensor.zone_' ~ zone ~ '_watering' %}
            {% set ts = as_timestamp(states(next_entity), 0) %}
            {% if ts > as_timestamp(now()) and not is_state(watering_entity, 'on') and (ns.ts is none or ts < ns.ts) %}
              {% set ns.ts = ts %}
              {% set ns.name = (state_attr(watering_entity, 'friendly_name') or ('Zone ' ~ zone)) | regex_replace(' Watering$', '') %}
            {% endif %}
          {% endfor %}
          {{ ns.name }}
        icon: mdi:sprinkler
        attributes:
          zone_number: >
            {% set ns = namespace(ts=none, zone='') %}
            {% for zone in range(1, 28) %}
              {% set ts = as_timestamp(states('sensor.zone_' ~ zone ~ '_next_cycle'), 0) %}
              {% if ts > as_timestamp(now()) and not is_state('binary_sensor.zone_' ~ zone ~ '_watering', 'on') and (ns.ts is none or ts < ns.ts) %}
                {% set ns.ts = ts %}
                {% set ns.zone = zone %}
              {% endif %}
            {% endfor %}
            {{ ns.zone }}
          next_cycle: >
            {% set ns = namespace(ts=none) %}
            {% for zone in range(1, 28) %}
              {% set ts = as_timestamp(states('sensor.zone_' ~ zone ~ '_next_cycle'), 0) %}
              {% if ts > as_timestamp(now()) and not is_state('binary_sensor.zone_' ~ zone ~ '_watering', 'on') and (ns.ts is none or ts < ns.ts) %}
                {% set ns.ts = ts %}
              {% endif %}
            {% endfor %}
            {{ ns.ts | timestamp_local if ns.ts is not none else 'unknown' }}
          entity_id: >
            {% set ns = namespace(ts=none, entity='') %}
            {% for zone in range(1, 28) %}
              {% set entity = 'sensor.zone_' ~ zone ~ '_next_cycle' %}
              {% set ts = as_timestamp(states(entity), 0) %}
              {% if ts > as_timestamp(now()) and not is_state('binary_sensor.zone_' ~ zone ~ '_watering', 'on') and (ns.ts is none or ts < ns.ts) %}
                {% set ns.ts = ts %}
                {% set ns.entity = entity %}
              {% endif %}
            {% endfor %}
            {{ ns.entity }}

      - name: "Irrigation Running Context"
        unique_id: irrigation_running_context
        state: >
          {% if is_state('binary_sensor.irrigation_active', 'on') %}
            {{ states('sensor.irrigation_active_zone') }} running
          {% elif is_state('binary_sensor.irrigation_expected_water_use', 'on') %}
            Recovering
          {% else %}
            Quiet
          {% endif %}
        icon: >
          {{ 'mdi:sprinkler-variant'
             if is_state('binary_sensor.irrigation_active', 'on')
             else 'mdi:sprinkler' }}
        attributes:
          active_zone: "{{ states('sensor.irrigation_active_zone') }}"
          active_zone_entity: "{{ state_attr('sensor.irrigation_active_zone', 'entity_id') }}"
          active_zone_count: "{{ states('sensor.irrigation_active_zone_count') }}"
          up_next_zone: "{{ states('sensor.irrigation_up_next_zone') }}"
          up_next_at: "{{ state_attr('sensor.irrigation_up_next_zone', 'next_cycle') }}"
          elapsed_minutes: >
            {% set started = states('input_datetime.irrigation_zone_started_at') %}
            {% if is_state('binary_sensor.irrigation_active', 'on') and as_timestamp(started, 0) > 0 %}
              {{ ((as_timestamp(now()) - as_timestamp(started, 0)) / 60) | round(0) }}
            {% else %}
              0
            {% endif %}
          remaining_time: >
            {% set entity = state_attr('sensor.irrigation_active_zone', 'entity_id') | default('', true) %}
            {% set zone = entity | regex_replace('^binary_sensor.zone_(\\d+)_watering$', '\\1') %}
            {% if zone | string | int(0) > 0 %}
              {{ states('sensor.zone_' ~ zone ~ '_remaining_watering_time') }}
            {% else %}
              unknown
            {% endif %}
          current_flow: "{{ states('sensor.flo_shutoff_water_flow_rate') }}"
          current_pressure: "{{ states('sensor.flo_shutoff_water_pressure') }}"
          session_gallons: >
            {% set current = states('sensor.flo_shutoff_today_s_water_usage') | float(0) %}
            {% set start = states('input_number.irrigation_session_start_gallons') | float(0) %}
            {{ (current - start) | round(1) if current >= start else 0 }}
          session_min_pressure: "{{ states('input_number.irrigation_session_min_pressure') }}"
          session_max_flow: "{{ states('input_number.irrigation_session_max_flow') }}"
          expected_water_use_until: "{{ states('input_datetime.irrigation_expected_water_use_until') }}"
          flo_telemetry_available: "{{ states('binary_sensor.irrigation_flo_telemetry_available') }}"

      - name: "Irrigation Dashboard Status"
        unique_id: irrigation_dashboard_status
        state: >
          {% if is_state('binary_sensor.irrigation_flo_telemetry_available', 'off')
             and is_state('binary_sensor.irrigation_expected_water_use', 'on') %}
            Telemetry unavailable
          {% elif is_state('input_boolean.water_irrigation_alert_active', 'on') %}
            Needs attention
          {% elif is_state('binary_sensor.irrigation_active', 'on') %}
            Running
          {% elif is_state('binary_sensor.irrigation_expected_water_use', 'on') %}
            Recovering
          {% elif is_state('binary_sensor.irrigation_weather_skip_buffer_active', 'on') %}
            Weather skip likely
          {% elif is_state('binary_sensor.hydrawise_controller_online', 'off') %}
            Controller offline
          {% else %}
            Quiet
          {% endif %}
        icon: >
          {% if is_state('input_boolean.water_irrigation_alert_active', 'on') %}mdi:sprinkler-fire
          {% elif is_state('binary_sensor.irrigation_active', 'on') %}mdi:sprinkler-variant
          {% elif is_state('binary_sensor.irrigation_weather_skip_buffer_active', 'on') %}mdi:weather-pouring
          {% elif is_state('binary_sensor.hydrawise_controller_online', 'off') %}mdi:cloud-off-outline
          {% else %}mdi:sprinkler{% endif %}
        attributes:
          severity: >
            {% if is_state('input_boolean.water_irrigation_alert_active', 'on') %}
              critical
            {% elif is_state('binary_sensor.irrigation_flo_telemetry_available', 'off')
               and is_state('binary_sensor.irrigation_expected_water_use', 'on') %}
              warning
            {% elif is_state('binary_sensor.hydrawise_controller_online', 'off')
               or is_state('binary_sensor.irrigation_weather_skip_buffer_active', 'on') %}
              watch
            {% else %}
              info
            {% endif %}
          reason: >
            {% if is_state('input_boolean.water_irrigation_alert_active', 'on') %}
              {{ states('input_text.irrigation_active_alert_kind') or states('input_text.water_latest_alert_label') }}
            {% elif is_state('binary_sensor.irrigation_active', 'on') %}
              {{ states('sensor.irrigation_active_zone') }} is watering now.
            {% elif is_state('binary_sensor.irrigation_expected_water_use', 'on') %}
              Irrigation ended recently; well recovery and lingering flow are still being watched.
            {% elif is_state('binary_sensor.irrigation_weather_skip_buffer_active', 'on') %}
              {{ state_attr('binary_sensor.irrigation_weather_skip_buffer_active', 'reason') | default(states('sensor.irrigation_weather_skip_context'), true) }}
            {% elif is_state('binary_sensor.hydrawise_controller_online', 'off') %}
              Hydrawise controller connectivity is offline.
            {% else %}
              No active irrigation issue.
            {% endif %}
          latest_event: "{{ state_attr('sensor.irrigation_history_status', 'latest_event') }}"
          active_zone: "{{ states('sensor.irrigation_active_zone') }}"
          up_next_zone: "{{ states('sensor.irrigation_up_next_zone') }}"
          next_cycle: "{{ states('sensor.irrigation_next_cycle') }}"
          flow: "{{ states('sensor.flo_shutoff_water_flow_rate') }}"
          pressure: "{{ states('sensor.flo_shutoff_water_pressure') }}"

      - name: "Irrigation Schedule Summary"
        unique_id: irrigation_schedule_summary
        state: >
          {% if states('sensor.irrigation_up_next_zone') not in ['unknown', 'unavailable', 'Unknown', ''] %}
            {{ states('sensor.irrigation_up_next_zone') }} next
          {% elif states('sensor.irrigation_next_cycle') not in ['unknown', 'unavailable', 'none', ''] %}
            Next cycle scheduled
          {% else %}
            No schedule found
          {% endif %}
        icon: mdi:calendar-clock-outline
        attributes:
          next_zone: "{{ states('sensor.irrigation_up_next_zone') }}"
          next_cycle: "{{ state_attr('sensor.irrigation_up_next_zone', 'next_cycle') }}"
          zones_json: >
            {% set fingerprints = state_attr('sensor.irrigation_fingerprint_status', 'zones') or {} %}
            {% set zone_runs = state_attr('sensor.irrigation_history_status', 'zone_runs') or [] %}
            {% set ns = namespace(items=[]) %}
            {% for zone in range(1, 28) %}
              {% set key = 'Zone ' ~ zone %}
              {% set watering_entity = 'binary_sensor.zone_' ~ zone ~ '_watering' %}
              {% set next_entity = 'sensor.zone_' ~ zone ~ '_next_cycle' %}
              {% set remaining_entity = 'sensor.zone_' ~ zone ~ '_remaining_watering_time' %}
              {% set daily_entity = 'sensor.zone_' ~ zone ~ '_daily_active_watering_time' %}
              {% set valve_entity = 'valve.' ~ 'zone_' ~ zone %}
              {% set automatic_entity = 'switch.' ~ 'zone_' ~ zone ~ '_automatic_watering' %}
              {% set label = (state_attr(watering_entity, 'friendly_name') or key) | regex_replace(' Watering$', '') %}
              {% set run = namespace(item={}) %}
              {% for item in zone_runs %}
                {% if run.item == {} and item.zone | default('', true) == key %}
                  {% set run.item = item %}
                {% endif %}
              {% endfor %}
              {% set fp = fingerprints.get(key, {}) if fingerprints is mapping else {} %}
              {% set duration = namespace(value='Not learned yet', source='none') %}
              {% set hydrawise_duration = state_attr(next_entity, 'duration')
                 or state_attr(next_entity, 'watering_duration')
                 or state_attr(next_entity, 'watering_duration_minutes')
                 or state_attr(remaining_entity, 'duration') %}
              {% if hydrawise_duration not in [none, '', 'unknown', 'unavailable'] %}
                {% set duration.value = hydrawise_duration %}
                {% set duration.source = 'hydrawise' %}
              {% elif fp.get('median_duration_minutes', 0) | float(0) > 0 %}
                {% set duration.value = (fp.get('median_duration_minutes') | float(0) | round(1)) ~ ' min learned' %}
                {% set duration.source = 'learned' %}
              {% elif run.item.get('duration_minutes', 0) | float(0) > 0 %}
                {% set duration.value = (run.item.get('duration_minutes') | float(0) | round(1)) ~ ' min observed' %}
                {% set duration.source = 'observed' %}
              {% endif %}
              {% set ns.items = ns.items + [{
                'zone': key,
                'zone_number': zone,
                'name': label,
                'watering': states(watering_entity),
                'valve': states(valve_entity),
                'automatic': states(automatic_entity),
                'next_cycle': states(next_entity),
                'remaining_time': states(remaining_entity),
                'daily_active_time': states(daily_entity),
                'duration_context': duration.value,
                'duration_source': duration.source
              }] %}
            {% endfor %}
            {{ ns.items | to_json }}

      - name: "Irrigation Zone Attention Summary"
        unique_id: irrigation_zone_attention_summary
        state: >
          {% set learned = states('sensor.irrigation_fingerprint_status') | int(0) %}
          {% if is_state('binary_sensor.irrigation_active', 'on') %}
            {{ states('sensor.irrigation_active_zone') }} running
          {% elif state_attr('sensor.irrigation_fingerprint_status', 'latest_anomaly') not in ['', none, 'unknown', 'unavailable'] %}
            Fingerprint anomaly
          {% else %}
            {{ learned }} learned zones
          {% endif %}
        icon: mdi:map-marker-radius-outline
        attributes:
          learned_zone_count: "{{ states('sensor.irrigation_fingerprint_status') }}"
          learning_zone_count: "{{ 27 - (states('sensor.irrigation_fingerprint_status') | int(0)) }}"
          active_zone: "{{ states('sensor.irrigation_active_zone') }}"
          up_next_zone: "{{ states('sensor.irrigation_up_next_zone') }}"
          latest_anomaly: "{{ state_attr('sensor.irrigation_fingerprint_status', 'latest_anomaly') }}"
          latest_anomaly_zone: "{{ state_attr('sensor.irrigation_fingerprint_status', 'latest_anomaly_zone') }}"
          latest_zone_run: "{{ state_attr('sensor.irrigation_history_status', 'latest_zone_run') }}"
          attention_json: >
            {% set items = namespace(value=[]) %}
            {% if is_state('binary_sensor.irrigation_active', 'on') %}
              {% set items.value = items.value + [{
                'kind': 'active',
                'title': states('sensor.irrigation_active_zone') ~ ' running',
                'note': 'Flow ' ~ states('sensor.flo_shutoff_water_flow_rate') ~ ' gpm, pressure ' ~ states('sensor.flo_shutoff_water_pressure') ~ ' psi.'
              }] %}
            {% endif %}
            {% if states('sensor.irrigation_up_next_zone') not in ['unknown', 'unavailable', 'Unknown', ''] %}
              {% set items.value = items.value + [{
                'kind': 'up_next',
                'title': states('sensor.irrigation_up_next_zone') ~ ' up next',
                'note': state_attr('sensor.irrigation_up_next_zone', 'next_cycle') | default('Unknown time', true)
              }] %}
            {% endif %}
            {% if state_attr('sensor.irrigation_fingerprint_status', 'latest_anomaly') not in ['', none, 'unknown', 'unavailable'] %}
              {% set items.value = items.value + [{
                'kind': 'anomaly',
                'title': state_attr('sensor.irrigation_fingerprint_status', 'latest_anomaly_zone') | default('Zone anomaly', true),
                'note': state_attr('sensor.irrigation_fingerprint_status', 'latest_anomaly_reason') | default('Fingerprint anomaly', true)
              }] %}
            {% endif %}
            {% set latest = state_attr('sensor.irrigation_history_status', 'latest_zone_run') or {} %}
            {% if latest.get('zone_name', '') %}
              {% set items.value = items.value + [{
                'kind': 'recent',
                'title': latest.get('zone_name') ~ ' finished',
                'note': (latest.get('duration_minutes', 0) | round(1) | string) ~ ' min, ' ~ (latest.get('gallons', 0) | round(1) | string) ~ ' gal.'
              }] %}
            {% endif %}
            {{ items.value | to_json }}

      - name: "Irrigation Focus Zone Detail"
        unique_id: irrigation_focus_zone_detail
        state: "{{ states('input_select.irrigation_dashboard_zone_focus') }}"
        icon: mdi:map-marker-radius-outline
        attributes:
          zone_number: >
            {{ states('input_select.irrigation_dashboard_zone_focus') | regex_replace('^Zone ', '') | int(1) }}
          zone_name: >
            {% set zone = states('input_select.irrigation_dashboard_zone_focus') | regex_replace('^Zone ', '') | int(1) %}
            {{ (state_attr('binary_sensor.zone_' ~ zone ~ '_watering', 'friendly_name') or ('Zone ' ~ zone)) | regex_replace(' Watering$', '') }}
          watering: >
            {% set zone = states('input_select.irrigation_dashboard_zone_focus') | regex_replace('^Zone ', '') | int(1) %}
            {{ states('binary_sensor.zone_' ~ zone ~ '_watering') }}
          valve: >
            {% set zone = states('input_select.irrigation_dashboard_zone_focus') | regex_replace('^Zone ', '') | int(1) %}
            {{ states('valve.' ~ 'zone_' ~ zone) }}
          automatic: >
            {% set zone = states('input_select.irrigation_dashboard_zone_focus') | regex_replace('^Zone ', '') | int(1) %}
            {{ states('switch.' ~ 'zone_' ~ zone ~ '_automatic_watering') }}
          next_cycle: >
            {% set zone = states('input_select.irrigation_dashboard_zone_focus') | regex_replace('^Zone ', '') | int(1) %}
            {{ states('sensor.zone_' ~ zone ~ '_next_cycle') }}
          remaining_time: >
            {% set zone = states('input_select.irrigation_dashboard_zone_focus') | regex_replace('^Zone ', '') | int(1) %}
            {{ states('sensor.zone_' ~ zone ~ '_remaining_watering_time') }}
          daily_active_time: >
            {% set zone = states('input_select.irrigation_dashboard_zone_focus') | regex_replace('^Zone ', '') | int(1) %}
            {{ states('sensor.zone_' ~ zone ~ '_daily_active_watering_time') }}
          duration_context: >
            {% set selected = states('input_select.irrigation_dashboard_zone_focus') %}
            {% set zones = state_attr('sensor.irrigation_schedule_summary', 'zones_json') | default('[]', true) | from_json %}
            {% set ns = namespace(value='Not learned yet') %}
            {% for item in zones %}
              {% if item.zone | default('', true) == selected %}
                {% set ns.value = item.duration_context | default('Not learned yet', true) %}
              {% endif %}
            {% endfor %}
            {{ ns.value }}
          fingerprint: >
            {% set selected = states('input_select.irrigation_dashboard_zone_focus') %}
            {% set fingerprints = state_attr('sensor.irrigation_fingerprint_status', 'zones') or {} %}
            {{ fingerprints.get(selected, {}) if fingerprints is mapping else {} }}
          recent_runs_json: >
            {% set selected = states('input_select.irrigation_dashboard_zone_focus') %}
            {% set runs = state_attr('sensor.irrigation_history_status', 'zone_runs') or [] %}
            {% set ns = namespace(items=[]) %}
            {% for run in runs %}
              {% if run.zone | default('', true) == selected %}
                {% set ns.items = ns.items + [run] %}
              {% endif %}
            {% endfor %}
            {{ ns.items[:8] | to_json }}

      - name: "Ting Notification Status"
        unique_id: ting_notification_status
        state: >
          {% set active = [
            is_state('binary_sensor.ting_confirmed_hazard_active', 'on'),
            is_state('binary_sensor.ting_unverified_hazard_active', 'on'),
            is_state('binary_sensor.ting_power_quality_watch', 'on'),
            is_state('binary_sensor.ting_offline_watch', 'on'),
            is_state('binary_sensor.ting_freeze_risk_watch', 'on')
          ] | select('eq', true) | list | count %}
          {% if active == 0 %}
            Quiet
          {% elif active == 1 %}
            Active
          {% else %}
            {{ active }} active
          {% endif %}
        icon: >
          {% if is_state('binary_sensor.ting_confirmed_hazard_active', 'on') %}
            mdi:flash-alert
          {% elif is_state('binary_sensor.ting_unverified_hazard_active', 'on')
             or is_state('binary_sensor.ting_power_quality_watch', 'on')
             or is_state('binary_sensor.ting_offline_watch', 'on')
             or is_state('binary_sensor.ting_freeze_risk_watch', 'on') %}
            mdi:flash-alert-outline
          {% else %}
            mdi:flash-check-outline
          {% endif %}
        attributes:
          active_count: >
            {{ [
              is_state('binary_sensor.ting_confirmed_hazard_active', 'on'),
              is_state('binary_sensor.ting_unverified_hazard_active', 'on'),
              is_state('binary_sensor.ting_power_quality_watch', 'on'),
              is_state('binary_sensor.ting_offline_watch', 'on'),
              is_state('binary_sensor.ting_freeze_risk_watch', 'on')
            ] | select('eq', true) | list | count }}
          active_alerts: >
            {% set ns = namespace(items=[]) %}
            {% if is_state('binary_sensor.ting_confirmed_hazard_active', 'on') %}
              {% set ns.items = ns.items + ['confirmed electrical hazard'] %}
            {% endif %}
