            {% endif %}
            {% if is_state('input_boolean.dryer_vent_maintenance_enabled', 'on') and states('sensor.dryer_vent_next_cleaning_due') not in ['unknown', 'unavailable', 'none', ''] %}
              {% set ns.items = ns.items + [{
