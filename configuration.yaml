                    'tracking': 'Upcoming uses the real expiration date. Needs Attention opens one day before expiration, so June 29 says expires tomorrow while the Upcoming timeline still points at June 30.'
                  },
                  'actions': ([{'label': 'Replaced', 'service': 'script.nwp_parking_pass_mark_replaced', 'confirm': true, 'inline': false},
                    {'label': 'Snooze 1d', 'service': 'script.nwp_parking_pass_snooze', 'data': {'days': 1}, 'inline': false}] if nwp_active else [])
                }] %}
              {% endif %}
            {% endif %}
            {% set north_castle_tax_url = 'https://northcastle.municipaltaxpayments.com/' %}
            {% set delaware_llc_tax_url = 'https://icis.corp.delaware.gov/ecorp/logintax.aspx?FilingType=FranchiseTax' %}
            {% set tax_items = [
              {'id': 'school-tax-jan', 'title': 'School tax January', 'emoji': '📚', 'paid': states('input_datetime.school_tax_january_last_paid_at'), 'tax_type': 'school', 'bill_month': 1, 'url': north_castle_tax_url},
              {'id': 'town-tax-apr', 'title': 'Town tax April', 'emoji': '🏛️', 'paid': states('input_datetime.town_tax_last_paid_at'), 'tax_type': 'town', 'bill_month': 4, 'url': north_castle_tax_url},
              {'id': 'school-tax-sep', 'title': 'School tax September', 'emoji': '📚', 'paid': states('input_datetime.school_tax_september_last_paid_at'), 'tax_type': 'school', 'bill_month': 9, 'url': north_castle_tax_url}
            ] %}
            {% if is_state('input_boolean.tax_reminders_enabled', 'on') %}
              {% for tax_year in range(now().year, now().year + 3) %}
                {% for tax in tax_items %}
                  {% set bill = '%04d-%02d-01' | format(tax_year, tax.bill_month | int) %}
                  {% set first_next_month = strptime('%04d-%02d-01' | format(tax_year, (tax.bill_month | int) + 1), '%Y-%m-%d') %}
                  {% set last_day = first_next_month - timedelta(days=1) %}
                  {% set weekend_offset = 2 if last_day.weekday() == 6 else 1 if last_day.weekday() == 5 else 0 %}
                  {% set due = (last_day - timedelta(days=weekend_offset)).strftime('%Y-%m-%d') %}
                  {% set paid = tax.paid not in ['unknown', 'unavailable', 'none', ''] and tax.paid[:10] >= bill %}
                  {% set active = today >= bill %}
                  {% if not paid and (active or (due >= today and due <= horizon)) %}
                    {% set ns.items = ns.items + [{
                      'id': tax.id ~ '-' ~ tax_year,
                      'title': tax.title ~ ' ' ~ tax_year,
                      'emoji': tax.emoji,
                      'icon': 'mdi:bank-outline',
                      'group': 'Property',
                      'state': 'due' if active else 'upcoming',
                      'severity': 'watch' if active else 'info',
                      'date': due,
                      'due_prefix': 'Due',
                      'badge': 'due',
                      'badge_class': 'due',
                      'show_in_upcoming': true,
                      'basis_date': bill,
                      'basis_prefix': 'bill opens',
                      'narrative': 'Property tax reminder remains open until marked paid.',
                      'url': tax.url,
                      'entity_id': 'input_boolean.tax_reminders_enabled',
                      'actions': ([{'label': 'Paid', 'service': 'script.property_tax_mark_paid', 'confirm': true, 'data': {'tax_type': tax.tax_type, 'bill_month': tax.bill_month, 'due_date': due}}] if active else [])
                    }] %}
                  {% endif %}
                {% endfor %}
              {% endfor %}
            {% endif %}
            {% set llc_due = states('sensor.bonticou_llc_de_franchise_tax_due_date') %}
            {% if is_state('input_boolean.business_admin_reminders_enabled', 'on')
               and llc_due not in ['unknown', 'unavailable', 'none', ''] %}
              {% set llc_paid = states('input_datetime.bonticou_llc_de_franchise_tax_last_paid_at') %}
              {% set llc_paid_cycle = states('input_text.bonticou_llc_de_franchise_tax_paid_cycle') %}
              {% set llc_due_year = llc_due[:4] %}
              {% set llc_year_start = llc_due_year ~ '-01-01' %}
              {% set llc_notice_start = llc_due_year ~ '-05-01' %}
              {% set llc_active = today >= llc_notice_start %}
              {% set llc_paid_for_due_year = llc_paid_cycle == llc_due_year
                 or llc_paid not in ['unknown', 'unavailable', 'none', '']
                 and llc_paid[:10] >= llc_year_start %}
              {% if not llc_paid_for_due_year and (llc_active or (llc_due >= today and llc_due <= horizon)) %}
                {% set ns.items = ns.items + [{
                  'id': 'bonticou-de-franchise-tax-' ~ llc_due_year,
                  'title': 'Bonticou - DE franchise tax',
                  'emoji': '🏛️',
                  'icon': 'mdi:briefcase-check-outline',
                  'group': 'Business admin',
                  'state': 'due' if llc_active else 'upcoming',
                  'severity': 'watch' if llc_active else 'info',
                  'date': llc_due,
                  'due_prefix': 'Due',
                  'badge': 'due',
                  'badge_class': 'due',
                  'show_in_upcoming': true,
                  'basis_date': llc_notice_start,
                  'basis_prefix': 'reminders start',
                  'narrative': 'Annual Delaware LLC tax. Pay before June 1 to keep the entity in good standing.',
                  'url': delaware_llc_tax_url,
                  'entity_id': 'sensor.bonticou_llc_de_franchise_tax_status',
                  'details': {
                    'summary': 'Bonticou LLC has an annual Delaware franchise tax deadline on June 1. Pay it or schedule it before then, then mark it paid so the reminder clears.',
                    'facts': [
                      'Entity: Bonticou LLC',
                      {'label': 'DE file no.', 'value': '6672495', 'copy_value': '6672495'},
                      'Jurisdiction: Delaware',
                      'Deadline: June 1',
                      'Current status: ' ~ states('sensor.bonticou_llc_de_franchise_tax_status')
                    ],
                    'after_action': 'After you mark it paid, Home Assistant stamps this year as handled, clears the push notification, and starts tracking the next annual cycle.',
                    'tracking': 'This notice is a house reminder only; the payment confirmation should still be kept with the LLC records.'
                  },
                  'actions': [
                    {'label': 'Paid', 'service': 'script.bonticou_llc_de_franchise_tax_mark_paid', 'confirm': true, 'inline': false}
                  ]
                }] %}
              {% endif %}
            {% endif %}
            {% set robison_tune = now().year ~ '-03-25' %}
            {% set robison_price = now().year ~ '-08-20' %}
            {% set robison_follow = now().year ~ '-09-05' %}
            {% set robison_price_last_done = states('input_datetime.robison_oil_price_check_last_done') %}
            {% set robison_price_done = robison_price_last_done not in ['unknown', 'unavailable', 'none', ''] and robison_price_last_done[:10] >= robison_price %}
            {% set ns.items = ns.items + [
              {
                'id': 'robison-oil-tune',
                'title': 'Robison Oil tune-up',
                'emoji': '🛢️',
                'icon': 'mdi:oil',
                'group': 'Home care',
                'state': 'upcoming',
                'severity': 'info',
                'date': robison_tune if robison_tune >= today else (now().year + 1) ~ '-03-25',
                'due_prefix': 'Check',
                'narrative': 'Annual boiler tune-up reminder.',
                'url': '/calm-mobile/home',
                'entity_id': 'input_datetime.robison_oil_price_check_last_done'
              },
              {
                'id': 'robison-oil-price',
                'title': 'Robison Oil price check',
                'emoji': '💸',
                'icon': 'mdi:cash-sync',
                'group': 'Home care',
                'state': 'upcoming' if not robison_price_done else 'quiet',
                'severity': 'info',
                'date': robison_price if robison_price >= today else (now().year + 1) ~ '-08-20',
                'due_prefix': 'Check',
                'basis_date': robison_follow if robison_follow >= today else (now().year + 1) ~ '-09-05',
                'basis_prefix': 'follow up',
                'narrative': 'Compare annual heating oil plan pricing and mark done when reviewed.',
                'url': '/calm-mobile/home',
                'entity_id': 'input_datetime.robison_oil_price_check_last_done',
                'actions': [
                  {'label': 'Done', 'service': 'script.robison_oil_mark_price_check_done'}
                ]
              }
            ] %}
            {% if is_state('input_boolean.wine_cave_maintenance_enabled', 'on') %}
              {% for wine_item in [
                {'id': 'wine-charcoal', 'title': 'Wine cave charcoal filter', 'emoji': '', 'icon': 'mdi:air-filter', 'date': states('sensor.wine_cave_next_charcoal_filter_due'), 'entity': 'binary_sensor.wine_cave_charcoal_filter_due', 'basis': states('input_datetime.wine_cave_last_charcoal_filter_check'), 'basis_suffix': 'last filter check', 'done': 'script.wine_cave_mark_charcoal_filter_replaced', 'snooze': 'script.wine_cave_snooze_charcoal_filter'},
                {'id': 'wine-cleaning', 'title': 'Wine cave cabinet cleaning', 'emoji': '🧼', 'icon': 'mdi:spray-bottle', 'date': states('sensor.wine_cave_next_cleaning_due'), 'entity': 'binary_sensor.wine_cave_cabinet_cleaning_due', 'basis': states('input_datetime.wine_cave_last_cabinet_cleaning'), 'basis_suffix': 'last cleaning', 'done': 'script.wine_cave_mark_cabinet_cleaning_done', 'snooze': 'script.wine_cave_snooze_cabinet_cleaning'}
              ] %}
                {% if wine_item.date not in ['unknown', 'unavailable', 'none', ''] %}
                  {% set ns.items = ns.items + [{
                    'id': wine_item.id,
                    'title': wine_item.title,
                    'emoji': wine_item.emoji,
                    'icon': wine_item.icon,
                    'group': 'Wine cave',
                    'state': 'due' if is_state(wine_item.entity, 'on') else 'upcoming',
                    'severity': 'watch' if is_state(wine_item.entity, 'on') else 'info',
                    'date': wine_item.date,
                    'due_prefix': 'Due',
                    'basis_date': wine_item.basis,
                    'basis_prefix': 'based on',
                    'basis_suffix': wine_item.basis_suffix,
                    'narrative': states('sensor.wine_cave_maintenance_status'),
                    'url': '/calm-mobile/wine',
                    'entity_id': 'sensor.wine_cave_maintenance_status',
                    'actions': [
                      {'label': 'Done', 'service': wine_item.done},
                      {'label': 'Snooze 30d', 'service': wine_item.snooze}
                    ]
                  }] %}
                {% endif %}
              {% endfor %}
              {% if is_state('input_boolean.wine_cave_rating_plate_captured', 'off') %}
                {% set ns.items = ns.items + [{
                  'id': 'wine-rating-plate',
                  'title': 'Wine cave serial number',
                  'emoji': '🏷️',
                  'icon': 'mdi:tag-outline',
                  'group': 'Wine cave',
                  'state': 'due',
                  'severity': 'info',
                  'date': today,
                  'due_prefix': 'Open',
                  'narrative': 'Capture the rating plate so the appliance record has exact support identity.',
                  'url': '/calm-mobile/wine',
                  'entity_id': 'input_boolean.wine_cave_rating_plate_captured',
                  'details': {
                    'summary': 'This is still an open task. Take a clear photo of the rating plate or write down the model and serial number, then mark it captured so the appliance record knows support identity is complete.',
                    'facts': [
                      'Where to look: rating plate or serial label on the wine cave.',
                      'Why it matters: service, warranty, and parts calls need exact identity.',
                      'Current state: not captured yet.'
                    ],
                    'after_action': 'After you mark it captured, this reminder clears and the wine cave record stops asking for serial-number follow-up.',
                    'tracking': 'Home Assistant will keep the task open until you explicitly mark the plate captured.'
                  },
                  'actions': [
                    {'label': 'Mark captured', 'service': 'script.wine_cave_mark_rating_plate_captured', 'confirm': true, 'inline': false}
                  ]
                }] %}
              {% endif %}
              {% if states('input_datetime.wine_cave_parts_labor_warranty_review') not in ['unknown', 'unavailable', 'none', ''] %}
                {% set ns.items = ns.items + [{
                  'id': 'wine-warranty',
                  'title': 'Wine cave warranty review',
                  'emoji': '📄',
                  'icon': 'mdi:file-document-check-outline',
                  'group': 'Wine cave',
                  'state': 'upcoming',
                  'severity': 'info',
                  'date': states('input_datetime.wine_cave_parts_labor_warranty_review'),
                  'due_prefix': 'Review',
                  'narrative': 'Parts and labor warranty review date tracked from the appliance record.',
                  'url': '/calm-mobile/wine',
                  'entity_id': 'sensor.wine_cave_appliance_context'
                }] %}
              {% endif %}
            {% endif %}
            {{ ns.items | to_json }}

    binary_sensor:
      - name: "Water Notification Alert Active"
        unique_id: water_notification_alert_active
        state: >
          {{ is_state('input_boolean.water_flow_alert_active', 'on')
             or is_state('input_boolean.water_pressure_alert_active', 'on')
             or is_state('input_boolean.water_leak_alert_active', 'on')
             or is_state('input_boolean.water_valve_alert_active', 'on')
             or is_state('input_boolean.water_usage_alert_active', 'on')
             or is_state('input_boolean.water_irrigation_alert_active', 'on') }}
        icon: >
          {% if is_state('input_boolean.water_flow_alert_active', 'on')
             or is_state('input_boolean.water_pressure_alert_active', 'on')
             or is_state('input_boolean.water_leak_alert_active', 'on')
             or is_state('input_boolean.water_valve_alert_active', 'on')
             or is_state('input_boolean.water_usage_alert_active', 'on')
             or is_state('input_boolean.water_irrigation_alert_active', 'on') %}
            mdi:bell-alert-outline
          {% else %}
            mdi:bell-check-outline
          {% endif %}

      - name: "Hydrawise Controller Online"
        unique_id: hydrawise_controller_online
        device_class: connectivity
        state: >
          {{ is_state('binary_sensor.45_chesnut_ridge_rd_armonk_connectivity', 'on') }}

      - name: "Irrigation Active"
        unique_id: irrigation_active
        device_class: running
        state: >
          {% set watering = expand([
            'binary_sensor.zone_1_watering',
            'binary_sensor.zone_2_watering',
            'binary_sensor.zone_3_watering',
            'binary_sensor.zone_4_watering',
            'binary_sensor.zone_5_watering',
            'binary_sensor.zone_6_watering',
            'binary_sensor.zone_7_watering',
            'binary_sensor.zone_8_watering',
            'binary_sensor.zone_9_watering',
            'binary_sensor.zone_10_watering',
            'binary_sensor.zone_11_watering',
            'binary_sensor.zone_12_watering',
            'binary_sensor.zone_13_watering',
            'binary_sensor.zone_14_watering',
            'binary_sensor.zone_15_watering',
            'binary_sensor.zone_16_watering',
            'binary_sensor.zone_17_watering',
            'binary_sensor.zone_18_watering',
            'binary_sensor.zone_19_watering',
            'binary_sensor.zone_20_watering',
            'binary_sensor.zone_21_watering',
            'binary_sensor.zone_22_watering',
            'binary_sensor.zone_23_watering',
            'binary_sensor.zone_24_watering',
            'binary_sensor.zone_25_watering',
            'binary_sensor.zone_26_watering',
            'binary_sensor.zone_27_watering'
          ]) | selectattr('state', 'eq', 'on') | list | count %}
          {% set valves = expand([
            'valve.zone_1',
            'valve.zone_2',
            'valve.zone_3',
            'valve.zone_4',
            'valve.zone_5',
            'valve.zone_6',
            'valve.zone_7',
            'valve.zone_8',
            'valve.zone_9',
            'valve.zone_10',
            'valve.zone_11',
            'valve.zone_12',
            'valve.zone_13',
            'valve.zone_14',
            'valve.zone_15',
            'valve.zone_16',
            'valve.zone_17',
            'valve.zone_18',
            'valve.zone_19',
            'valve.zone_20',
            'valve.zone_21',
            'valve.zone_22',
            'valve.zone_23',
            'valve.zone_24',
            'valve.zone_25',
            'valve.zone_26',
            'valve.zone_27'
          ]) | selectattr('state', 'eq', 'open') | list | count %}
          {{ watering > 0 or valves > 0 }}

      - name: "Irrigation Expected Water Use"
        unique_id: irrigation_expected_water_use
        state: >
          {% set expected_until = states('input_datetime.irrigation_expected_water_use_until') %}
          {{ is_state('binary_sensor.irrigation_active', 'on')
             or (expected_until not in ['unknown', 'unavailable', 'none', '']
                 and as_timestamp(expected_until, 0) > as_timestamp(now())) }}
        icon: mdi:sprinkler-variant

      - name: "Irrigation Break Signature Active"
        unique_id: irrigation_break_signature_active
        device_class: problem
        state: >
          {% set flow = states('sensor.flo_shutoff_water_flow_rate') | float(0) %}
          {% set pressure = states('sensor.flo_shutoff_water_pressure') | float(0) %}
          {% set start_pressure = states('input_number.irrigation_zone_start_pressure') | float(0) %}
          {{ is_state('binary_sensor.irrigation_active', 'on')
             and states('sensor.irrigation_active_zone_count') | int(0) == 1
             and ((flow > 10 and pressure < 30)
                  or (flow > 4 and start_pressure > 0 and (start_pressure - pressure) > 20)) }}
        icon: mdi:pipe-leak

      - name: "Irrigation Zone Running Too Long"
        unique_id: irrigation_zone_running_too_long
        device_class: problem
        state: >
          {% set zone = states('sensor.irrigation_active_zone') %}
          {% set started = states('input_datetime.irrigation_zone_started_at') %}
          {{ is_state('binary_sensor.irrigation_active', 'on')
             and states('sensor.irrigation_active_zone_count') | int(0) == 1
             and zone not in ['unknown', 'unavailable', 'none', '', 'None']
             and started not in ['unknown', 'unavailable', 'none', '']
             and (as_timestamp(now()) - as_timestamp(started, as_timestamp(now()))) > 2700 }}
        icon: mdi:timer-alert-outline

      - name: "Irrigation Valve State Mismatch"
        unique_id: irrigation_valve_state_mismatch
        device_class: problem
        state: >
          {% set ns = namespace(mismatches=[]) %}
          {% for zone in range(1, 28) %}
            {% set watering_entity = 'binary_sensor.zone_' ~ zone ~ '_watering' %}
            {% set valve_entity = 'valve' ~ '.zone_' ~ zone %}
            {% set watering = states(watering_entity) %}
            {% set valve = states(valve_entity) %}
            {% set label = (state_attr(watering_entity, 'friendly_name') or ('Zone ' ~ zone)) | regex_replace(' Watering$', '') %}
            {% if watering == 'on' and valve not in ['open', 'opening', 'unknown', 'unavailable'] %}
              {% set ns.mismatches = ns.mismatches + [label ~ ' watering, valve ' ~ valve] %}
            {% elif valve == 'open' and watering != 'on' %}
              {% set ns.mismatches = ns.mismatches + [label ~ ' valve open, watering ' ~ watering] %}
            {% endif %}
          {% endfor %}
          {{ ns.mismatches | count > 0 }}
        icon: mdi:valve-open
        attributes:
          mismatches: >
            {% set ns = namespace(mismatches=[]) %}
            {% for zone in range(1, 28) %}
              {% set watering_entity = 'binary_sensor.zone_' ~ zone ~ '_watering' %}
              {% set valve_entity = 'valve' ~ '.zone_' ~ zone %}
              {% set watering = states(watering_entity) %}
              {% set valve = states(valve_entity) %}
              {% set label = (state_attr(watering_entity, 'friendly_name') or ('Zone ' ~ zone)) | regex_replace(' Watering$', '') %}
              {% if watering == 'on' and valve not in ['open', 'opening', 'unknown', 'unavailable'] %}
                {% set ns.mismatches = ns.mismatches + [label ~ ' watering, valve ' ~ valve] %}
              {% elif valve == 'open' and watering != 'on' %}
                {% set ns.mismatches = ns.mismatches + [label ~ ' valve open, watering ' ~ watering] %}
              {% endif %}
            {% endfor %}
            {{ ns.mismatches | join('; ') }}

      - name: "Irrigation Flo Telemetry Available"
        unique_id: irrigation_flo_telemetry_available
        device_class: connectivity
        state: >
          {{ states('sensor.flo_shutoff_water_flow_rate') not in ['unknown', 'unavailable', 'none', '']
             and states('sensor.flo_shutoff_water_pressure') not in ['unknown', 'unavailable', 'none', ''] }}
        icon: mdi:gauge

      - name: "Irrigation Weather Skip Buffer Active"
        unique_id: irrigation_weather_skip_buffer_active
        state: >
          {% set grace = states('input_datetime.irrigation_weather_skip_grace_until') %}
          {% set recent_wet = grace not in ['unknown', 'unavailable', 'none', '']
             and as_timestamp(grace, 0) > as_timestamp(now()) %}
          {% set current_weather = state_attr('sensor.irrigation_weather_skip_context', 'plausible_weather_skip') in [true, 'true', 'True'] %}
          {{ recent_wet or current_weather }}
        icon: mdi:weather-rainy
        attributes:
          reason: >
            {% set grace = states('input_datetime.irrigation_weather_skip_grace_until') %}
            {% set recent_wet = grace not in ['unknown', 'unavailable', 'none', '']
               and as_timestamp(grace, 0) > as_timestamp(now()) %}
            {% set reasons = state_attr('sensor.irrigation_weather_skip_context', 'skip_reasons') | default('', true) %}
            {% if recent_wet and reasons not in ['unknown', 'unavailable', 'none', ''] %}
              {{ reasons }}; recent wet-weather buffer until {{ as_timestamp(grace, 0) | timestamp_custom('%a %-I:%M %p', true) }}
            {% elif recent_wet %}
              Recent wet-weather buffer until {{ as_timestamp(grace, 0) | timestamp_custom('%a %-I:%M %p', true) }}
            {% else %}
              {{ reasons }}
            {% endif %}

      - name: "Ting Confirmed Hazard Active"
        unique_id: ting_confirmed_hazard_active
        device_class: problem
        state: >
          {{ is_state('binary_sensor.ting_1_fire_hazard', 'on')
             or is_state('binary_sensor.ting_2_fire_hazard', 'on')
             or is_state('binary_sensor.ting_1_electrical_fire_hazard', 'on')
             or is_state('binary_sensor.ting_2_electrical_fire_hazard', 'on') }}
        icon: >
          {{ 'mdi:flash-alert' if is_state('binary_sensor.ting_confirmed_hazard_active', 'on') else 'mdi:flash-check-outline' }}

      - name: "Ting Unverified Hazard Active"
        unique_id: ting_unverified_hazard_active
        device_class: problem
        state: >
          {% set confirmed = is_state('binary_sensor.ting_1_fire_hazard', 'on')
             or is_state('binary_sensor.ting_2_fire_hazard', 'on')
             or is_state('binary_sensor.ting_1_electrical_fire_hazard', 'on')
             or is_state('binary_sensor.ting_2_electrical_fire_hazard', 'on') %}
          {% set unverified = is_state('binary_sensor.ting_1_unverified_fire_hazard', 'on')
             or is_state('binary_sensor.ting_2_unverified_fire_hazard', 'on') %}
          {{ unverified and not confirmed }}
        icon: >
          {{ 'mdi:flash-triangle-outline' if is_state('binary_sensor.ting_unverified_hazard_active', 'on') else 'mdi:flash-check-outline' }}

      - name: "Ting Power Quality Watch"
        unique_id: ting_power_quality_watch
        device_class: problem
        state: >
          {% set learning = is_state('binary_sensor.ting_1_learning_mode', 'on')
             or is_state('binary_sensor.ting_2_learning_mode', 'on') %}
          {% set v1 = states('sensor.ting_1_current_voltage') %}
          {% set v2 = states('sensor.ting_2_current_voltage') %}
          {% set low_1 = is_number(v1) and (v1 | float(0)) < 108 %}
          {% set high_1 = is_number(v1) and (v1 | float(0)) > 132 %}
          {% set low_2 = is_number(v2) and (v2 | float(0)) < 108 %}
          {% set high_2 = is_number(v2) and (v2 | float(0)) > 132 %}
          {% set spread = is_number(v1) and is_number(v2) and (((v1 | float(0)) - (v2 | float(0))) | abs) >= 5 %}
          {{ not learning and (low_1 or high_1 or low_2 or high_2 or spread) }}
        icon: >
          {{ 'mdi:sine-wave' if is_state('binary_sensor.ting_power_quality_watch', 'on') else 'mdi:flash-check-outline' }}
        attributes:
          threshold_low: 108
          threshold_high: 132
          spread_threshold: 5

      - name: "Ting Offline Watch"
        unique_id: ting_offline_watch
