  - binary_sensor:
      - name: "Environment Kitchen Temp High Alert"
        unique_id: environment_kitchen_temp_high_alert
        state: "{{ is_number(states('sensor.main_floor_temperature')) and (states('sensor.main_floor_temperature') | float(0)) > 80 }}"
        delay_on:
          minutes: 45
        delay_off:
          minutes: 15

      - name: "Environment Kitchen Temp Low Alert"
        unique_id: environment_kitchen_temp_low_alert
        state: "{{ is_number(states('sensor.main_floor_temperature')) and (states('sensor.main_floor_temperature') | float(0)) < 60 }}"
        delay_on:
          minutes: 45
        delay_off:
          minutes: 15

