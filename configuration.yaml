            {% set season = states('sensor.downstairs_active_season') %}
            {% set period = states('sensor.downstairs_time_period') %}
            {% set awake_window_ok = period == 'day' %}
            {% set season_ok = season in ['shoulder', 'summer'] %}
            {% set weather_state = states('weather.forecast_home') %}
            {% set favorable_weather = weather_state not in ['rainy', 'pouring', 'snowy', 'snowy-rainy'] %}
            {% set outdoor = states('sensor.downstairs_outdoor_temp') %}
            {% set outdoor_humidity = states('sensor.downstairs_outdoor_humidity') %}
            {% set wind = states('sensor.downstairs_outdoor_wind_speed') %}
            {% set required_advantage = states('input_number.downstairs_open_window_advantage') | float(3) %}
            {% set someone_home = is_state('binary_sensor.downstairs_someone_home', 'on') %}
            {% set dismissed_until = states('input_datetime.open_window_notice_dismissed_until') %}
            {% set dismissed = dismissed_until not in ['unknown', 'unavailable', 'none', '']
               and as_timestamp(dismissed_until, 0) > as_timestamp(now()) %}
            {% set rooms = [
              {'label': 'Kitchen', 'temp': states('sensor.main_floor_temperature'), 'humidity': states('sensor.main_floor_humidity')},
              {'label': 'Dining Room', 'temp': states('sensor.main_floor_2_temperature'), 'humidity': states('sensor.main_floor_2_humidity')},
              {'label': 'Primary Bedroom', 'temp': states('sensor.master_temperature'), 'humidity': states('sensor.master_humidity')},
              {'label': 'Office', 'temp': states('sensor.office_current_temperature'), 'humidity': states('sensor.office_current_humidity')}
            ] %}
            {% set ns = namespace(valid=0, warm=0, eligible=0) %}
            {% if is_number(outdoor) %}
              {% for room in rooms %}
                {% set t = room.temp %}
                {% set h = room.humidity %}
                {% if is_number(t) and is_number(h) %}
                  {% set ns.valid = ns.valid + 1 %}
                  {% set humidity_penalty = [0, [((h | float(0)) - 45) * 0.08, 2] | min] | max %}
                  {% set adjusted = (t | float(0)) + humidity_penalty %}
                  {% if adjusted >= 70 %}
                    {% set ns.warm = ns.warm + 1 %}
                    {% if (outdoor | float(999)) <= (adjusted - required_advantage) %}
                      {% set ns.eligible = ns.eligible + 1 %}
                    {% endif %}
                  {% endif %}
                {% endif %}
              {% endfor %}
            {% endif %}
            {% if not someone_home %}Nobody home
            {% elif dismissed %}Dismissed for this window-air opportunity
            {% elif not awake_window_ok %}Outside the awake-hours window
            {% elif not season_ok %}Season is not favorable
            {% elif not favorable_weather %}Weather is not window-friendly
