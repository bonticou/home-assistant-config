          special_zones: "Basement uses mechanical room temperature/humidity and Airthings radon. Garage and Attic use their dedicated temperature/humidity sensors."
          battery_sources: "Primary Bedroom uses sensor.master_sensor_new_battery_2. Basement Airthings uses sensor.basement_air_quality_battery. Other environment battery entities are not exposed yet."
