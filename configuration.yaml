            'binary_sensor.environment_kitchen_temp_high_alert',
            'binary_sensor.environment_kitchen_temp_low_alert',
            'binary_sensor.environment_kitchen_humidity_high_alert',
            'binary_sensor.environment_kitchen_humidity_low_alert',
            'binary_sensor.environment_dining_room_temp_high_alert',
            'binary_sensor.environment_dining_room_temp_low_alert',
            'binary_sensor.environment_dining_room_humidity_high_alert',
            'binary_sensor.environment_dining_room_humidity_low_alert',
            'binary_sensor.environment_primary_bedroom_temp_high_alert',
            'binary_sensor.environment_primary_bedroom_temp_low_alert',
            'binary_sensor.environment_primary_bedroom_humidity_high_alert',
            'binary_sensor.environment_primary_bedroom_humidity_low_alert',
            'binary_sensor.environment_basement_temp_high_alert',
            'binary_sensor.environment_basement_temp_low_alert',
            'binary_sensor.environment_garage_temp_high_alert',
            'binary_sensor.environment_garage_temp_low_alert',
            'binary_sensor.environment_garage_humidity_high_alert',
            'binary_sensor.environment_attic_temp_high_alert',
            'binary_sensor.environment_attic_humidity_high_alert',
            'binary_sensor.environment_basement_radon_high_alert'
          ] %}
          {% set ns = namespace(count=0, env_active=false) %}
          {% for entity_id in env_entities %}
            {% if is_state(entity_id, 'on') %}
              {% set ns.env_active = true %}
            {% endif %}
          {% endfor %}
          {% for active in [
            is_state('binary_sensor.water_notification_alert_active', 'on'),
            is_state('binary_sensor.house_unsecured_while_away', 'on'),
            ns.env_active,
            is_state('binary_sensor.house_low_battery_alert', 'on'),
            is_state('binary_sensor.wine_cave_actionable_alert', 'on'),
            is_state('binary_sensor.wine_cave_sensor_unavailable', 'on'),
            is_state('binary_sensor.espresso_maintenance_due', 'on'),
            is_state('binary_sensor.piano_tuning_due', 'on'),
            is_state('binary_sensor.dryer_vent_cleaning_due', 'on'),
            is_state('binary_sensor.passport_renewal_due', 'on'),
            is_state('binary_sensor.driver_license_renewal_due', 'on'),
            is_state('binary_sensor.casey_passport_renewal_due', 'on'),
            is_state('binary_sensor.casey_driver_license_renewal_due', 'on'),
            is_state('binary_sensor.wine_cave_maintenance_due', 'on'),
            is_state('binary_sensor.garden_seedling_check_due', 'on'),
            is_state('binary_sensor.garden_water_review_due', 'on')
          ] %}
            {% if active %}
              {% set ns.count = ns.count + 1 %}
            {% endif %}
          {% endfor %}
          {{ ns.count ~ ' need attention' if ns.count > 0 else 'All quiet' }}
        attributes:
          attention_count: >
            {% set env_entities = [
              'binary_sensor.environment_kitchen_temp_high_alert',
              'binary_sensor.environment_kitchen_temp_low_alert',
              'binary_sensor.environment_kitchen_humidity_high_alert',
              'binary_sensor.environment_kitchen_humidity_low_alert',
              'binary_sensor.environment_dining_room_temp_high_alert',
              'binary_sensor.environment_dining_room_temp_low_alert',
              'binary_sensor.environment_dining_room_humidity_high_alert',
              'binary_sensor.environment_dining_room_humidity_low_alert',
              'binary_sensor.environment_primary_bedroom_temp_high_alert',
              'binary_sensor.environment_primary_bedroom_temp_low_alert',
              'binary_sensor.environment_primary_bedroom_humidity_high_alert',
              'binary_sensor.environment_primary_bedroom_humidity_low_alert',
              'binary_sensor.environment_basement_temp_high_alert',
              'binary_sensor.environment_basement_temp_low_alert',
              'binary_sensor.environment_garage_temp_high_alert',
              'binary_sensor.environment_garage_temp_low_alert',
              'binary_sensor.environment_garage_humidity_high_alert',
              'binary_sensor.environment_attic_temp_high_alert',
              'binary_sensor.environment_attic_humidity_high_alert',
              'binary_sensor.environment_basement_radon_high_alert'
            ] %}
            {% set ns = namespace(count=0, env_active=false) %}
            {% for entity_id in env_entities %}
              {% if is_state(entity_id, 'on') %}
                {% set ns.env_active = true %}
              {% endif %}
            {% endfor %}
            {% for active in [
              is_state('binary_sensor.water_notification_alert_active', 'on'),
              is_state('binary_sensor.house_unsecured_while_away', 'on'),
              ns.env_active,
              is_state('binary_sensor.house_low_battery_alert', 'on'),
              is_state('binary_sensor.wine_cave_actionable_alert', 'on'),
              is_state('binary_sensor.wine_cave_sensor_unavailable', 'on'),
              is_state('binary_sensor.espresso_maintenance_due', 'on'),
              is_state('binary_sensor.piano_tuning_due', 'on'),
              is_state('binary_sensor.dryer_vent_cleaning_due', 'on'),
              is_state('binary_sensor.passport_renewal_due', 'on'),
              is_state('binary_sensor.driver_license_renewal_due', 'on'),
              is_state('binary_sensor.casey_passport_renewal_due', 'on'),
              is_state('binary_sensor.casey_driver_license_renewal_due', 'on'),
              is_state('binary_sensor.wine_cave_maintenance_due', 'on'),
              is_state('binary_sensor.garden_seedling_check_due', 'on'),
              is_state('binary_sensor.garden_water_review_due', 'on')
            ] %}
              {% if active %}
                {% set ns.count = ns.count + 1 %}
              {% endif %}
            {% endfor %}
            {{ ns.count }}
          next_short: >
            {% set today = now().strftime('%Y-%m-%d') %}
            {% set horizon = (now() + timedelta(days=365)).strftime('%Y-%m-%d') %}
            {% set water_last = as_timestamp(states('input_datetime.espresso_last_water_backflush'), 0) %}
            {% set cafiza_last = as_timestamp(states('input_datetime.espresso_last_cafiza_clean'), 0) %}
            {% set wine_filter = states('sensor.wine_cave_next_charcoal_filter_due') %}
            {% set wine_clean = states('sensor.wine_cave_next_cleaning_due') %}
            {% set robison_tune = now().year ~ '-03-25' %}
            {% set robison_price = now().year ~ '-08-20' %}
            {% set ns = namespace(dates=[]) %}
            {% for date_value in [
              (water_last + 604800) | timestamp_custom('%Y-%m-%d', true) if water_last > 0 else '',
              (cafiza_last + 5184000) | timestamp_custom('%Y-%m-%d', true) if cafiza_last > 0 else '',
              states('sensor.piano_next_tuning_due'),
              states('sensor.dryer_vent_next_cleaning_due'),
              states('sensor.passport_renewal_opens'),
              states('sensor.driver_license_renewal_opens'),
              states('sensor.casey_passport_renewal_opens'),
              states('sensor.casey_driver_license_renewal_opens'),
              robison_tune if robison_tune >= today else (now().year + 1) ~ '-03-25',
              robison_price if robison_price >= today else (now().year + 1) ~ '-08-20',
              wine_filter,
              wine_clean
            ] %}
              {% if date_value not in ['unknown', 'unavailable', 'none', ''] and date_value >= today and date_value <= horizon %}
                {% set ns.dates = ns.dates + [date_value] %}
              {% endif %}
            {% endfor %}
            {% if is_state('input_boolean.tax_reminders_enabled', 'on') %}
              {% for tax_year in range(now().year, now().year + 3) %}
                {% for tax_month in [1, 4, 9] %}
                  {% set bill_date = '%04d-%02d-01' | format(tax_year, tax_month) %}
                  {% if bill_date >= today and bill_date <= horizon %}
                    {% set ns.dates = ns.dates + [bill_date] %}
                  {% endif %}
                {% endfor %}
              {% endfor %}
            {% endif %}
            {% set upcoming = ns.dates | sort %}
            {% if upcoming | count > 0 %}
              Next {{ as_timestamp(strptime(upcoming[0], '%Y-%m-%d')) | timestamp_custom('%b %d', true) }}
            {% else %}
              All quiet
            {% endif %}
          next_at: >
            {% set today = now().strftime('%Y-%m-%d') %}
            {% set horizon = (now() + timedelta(days=365)).strftime('%Y-%m-%d') %}
            {% set water_last = as_timestamp(states('input_datetime.espresso_last_water_backflush'), 0) %}
            {% set cafiza_last = as_timestamp(states('input_datetime.espresso_last_cafiza_clean'), 0) %}
            {% set robison_tune = now().year ~ '-03-25' %}
            {% set robison_price = now().year ~ '-08-20' %}
            {% set ns = namespace(dates=[]) %}
            {% for date_value in [
              (water_last + 604800) | timestamp_custom('%Y-%m-%d', true) if water_last > 0 else '',
              (cafiza_last + 5184000) | timestamp_custom('%Y-%m-%d', true) if cafiza_last > 0 else '',
              states('sensor.piano_next_tuning_due'),
              states('sensor.dryer_vent_next_cleaning_due'),
              states('sensor.passport_renewal_opens'),
              states('sensor.driver_license_renewal_opens'),
              states('sensor.casey_passport_renewal_opens'),
              states('sensor.casey_driver_license_renewal_opens'),
              robison_tune if robison_tune >= today else (now().year + 1) ~ '-03-25',
              robison_price if robison_price >= today else (now().year + 1) ~ '-08-20',
              states('sensor.wine_cave_next_charcoal_filter_due'),
              states('sensor.wine_cave_next_cleaning_due')
            ] %}
              {% if date_value not in ['unknown', 'unavailable', 'none', ''] and date_value >= today and date_value <= horizon %}
                {% set ns.dates = ns.dates + [date_value] %}
              {% endif %}
            {% endfor %}
            {% if is_state('input_boolean.tax_reminders_enabled', 'on') %}
              {% for tax_year in range(now().year, now().year + 3) %}
                {% for tax_month in [1, 4, 9] %}
                  {% set bill_date = '%04d-%02d-01' | format(tax_year, tax_month) %}
                  {% if bill_date >= today and bill_date <= horizon %}
                    {% set ns.dates = ns.dates + [bill_date] %}
                  {% endif %}
                {% endfor %}
              {% endfor %}
            {% endif %}
            {% set upcoming = ns.dates | sort %}
            {{ upcoming[0] if upcoming | count > 0 else '' }}
          items_json: >
            {% set today = now().strftime('%Y-%m-%d') %}
            {% set now_date = now().strftime('%Y-%m-%d') %}
            {% set now_stamp = now().strftime('%Y-%m-%d %H:%M:%S') %}
            {% set ns = namespace(items=[]) %}
            {% if is_state('binary_sensor.water_notification_alert_active', 'on') %}
              {% set ns.items = ns.items + [{
                'id': 'water-guard',
                'title': 'Water guardrail',
                'emoji': '💧',
                'icon': 'mdi:water-alert-outline',
                'group': 'Guardrails',
                'state': 'active',
                'severity': 'critical' if is_state('input_boolean.water_leak_alert_active', 'on') else 'watch',
                'date': state_attr('sensor.water_notification_status', 'latest_alert_at') | default(now_stamp, true),
                'due_prefix': 'Active since',
                'narrative': state_attr('sensor.water_notification_status', 'active_alerts') | default('Water guardrail is active.', true),
                'url': '/calm-mobile/water',
                'entity_id': 'sensor.water_notification_status'
              }] %}
            {% endif %}
            {% if is_state('binary_sensor.house_unsecured_while_away', 'on') %}
              {% set ns.items = ns.items + [{
                'id': 'away-security',
                'title': 'Away security',
                'emoji': '🏠',
                'icon': 'mdi:shield-alert-outline',
                'group': 'Guardrails',
                'state': 'active',
                'severity': 'critical',
                'date': now_stamp,
                'due_prefix': 'Active',
                'narrative': states('sensor.away_security_issue_summary'),
                'url': '/calm-mobile/home',
                'entity_id': 'binary_sensor.house_unsecured_while_away'
              }] %}
            {% endif %}
            {% set env_entities = {
              'Kitchen high temp': 'binary_sensor.environment_kitchen_temp_high_alert',
              'Kitchen low temp': 'binary_sensor.environment_kitchen_temp_low_alert',
              'Kitchen humidity high': 'binary_sensor.environment_kitchen_humidity_high_alert',
              'Kitchen humidity low': 'binary_sensor.environment_kitchen_humidity_low_alert',
              'Dining high temp': 'binary_sensor.environment_dining_room_temp_high_alert',
              'Dining low temp': 'binary_sensor.environment_dining_room_temp_low_alert',
              'Dining humidity high': 'binary_sensor.environment_dining_room_humidity_high_alert',
              'Dining humidity low': 'binary_sensor.environment_dining_room_humidity_low_alert',
              'Bedroom high temp': 'binary_sensor.environment_primary_bedroom_temp_high_alert',
              'Bedroom low temp': 'binary_sensor.environment_primary_bedroom_temp_low_alert',
              'Bedroom humidity high': 'binary_sensor.environment_primary_bedroom_humidity_high_alert',
              'Bedroom humidity low': 'binary_sensor.environment_primary_bedroom_humidity_low_alert',
              'Basement high temp': 'binary_sensor.environment_basement_temp_high_alert',
              'Basement low temp': 'binary_sensor.environment_basement_temp_low_alert',
              'Garage high temp': 'binary_sensor.environment_garage_temp_high_alert',
              'Garage low temp': 'binary_sensor.environment_garage_temp_low_alert',
              'Garage humidity high': 'binary_sensor.environment_garage_humidity_high_alert',
              'Attic high temp': 'binary_sensor.environment_attic_temp_high_alert',
              'Attic humidity high': 'binary_sensor.environment_attic_humidity_high_alert',
              'Basement radon': 'binary_sensor.environment_basement_radon_high_alert'
            } %}
            {% set env = namespace(labels=[]) %}
            {% for label, entity_id in env_entities.items() %}
              {% if is_state(entity_id, 'on') %}
                {% set env.labels = env.labels + [label] %}
              {% endif %}
            {% endfor %}
            {% if env.labels | count > 0 %}
              {% set ns.items = ns.items + [{
                'id': 'environment-guard',
                'title': 'Environment watch',
                'emoji': '🌡️',
                'icon': 'mdi:home-thermometer-outline',
                'group': 'Guardrails',
                'state': 'active',
                'severity': 'watch',
                'date': now_stamp,
                'due_prefix': 'Active',
                'narrative': env.labels | join(', '),
                'url': '/calm-mobile/climate',
                'entity_id': 'input_boolean.environment_alerts_enabled'
              }] %}
            {% endif %}
            {% if is_state('binary_sensor.house_low_battery_alert', 'on') %}
              {% set ns.items = ns.items + [{
                'id': 'house-batteries',
                'title': 'House batteries',
                'emoji': '🪫',
                'icon': 'mdi:battery-alert',
                'group': 'Guardrails',
                'state': 'active',
                'severity': state_attr('sensor.house_low_battery_summary', 'severity') | default('watch', true),
                'date': now_stamp,
                'due_prefix': 'Active',
                'narrative': state_attr('sensor.house_low_battery_summary', 'replace_soon_batteries') | default(states('sensor.house_low_battery_summary') ~ ' batteries need attention', true),
                'url': '/calm-mobile/climate',
                'entity_id': 'sensor.house_low_battery_summary'
              }] %}
            {% endif %}
            {% if is_state('binary_sensor.wine_cave_actionable_alert', 'on') or is_state('binary_sensor.wine_cave_sensor_unavailable', 'on') %}
              {% set ns.items = ns.items + [{
                'id': 'wine-cave-guard',
                'title': 'Wine cave sensor unavailable' if is_state('binary_sensor.wine_cave_sensor_unavailable', 'on') else 'Wine cave needs attention',
                'emoji': '🍷',
                'icon': 'mdi:glass-wine',
                'group': 'Guardrails',
                'state': 'active',
                'severity': 'critical' if is_state('binary_sensor.wine_cave_actionable_alert', 'on') else 'watch',
                'date': now_stamp,
                'due_prefix': 'Active',
                'narrative': 'Sensor unavailable' if is_state('binary_sensor.wine_cave_sensor_unavailable', 'on') else states('sensor.wine_cave_status'),
