                'severity': 'watch' if is_state('binary_sensor.piano_tuning_due', 'on') else 'info',
                'date': states('sensor.piano_next_tuning_due'),
                'due_prefix': 'Due',
                'basis_date': states('input_datetime.piano_last_tuned'),
