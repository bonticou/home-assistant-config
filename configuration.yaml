          temperature: "{{ states('sensor.garage_temperature') }}"
          humidity: "{{ states('sensor.garage_humidity') }}"
          issue: >
            {% set t = states('sensor.garage_temperature') %}
            {% set h = states('sensor.garage_humidity') %}
            {% if not is_number(t) or not is_number(h) %}Sensor unavailable
            {% elif (t | float(0)) < 25 %}Too cold
            {% elif (t | float(0)) > 115 %}Too hot
            {% elif (h | float(0)) > 75 %}Very humid
            {% elif (t | float(0)) < 32 or (t | float(0)) > 105 or (h | float(0)) > 65 %}Watch
            {% else %}Steady{% endif %}

      - name: "Environment Attic Status"
        unique_id: environment_attic_status
        state: >
          {% set t = states('sensor.attic_temperature') %}
          {% set h = states('sensor.attic_humidity') %}
          {% if not is_number(t) or not is_number(h) %}
            unavailable
          {% elif (t | float(0)) > 145 or (h | float(0)) > 80 %}
            attention
          {% elif (t | float(0)) > 130 or (h | float(0)) > 70 %}
            watch
          {% else %}
            steady
          {% endif %}
        icon: mdi:home-roof
        attributes:
          area: Attic
          room: Attic
          primary_source: SensorPush
          temperature_entity: sensor.attic_temperature
          humidity_entity: sensor.attic_humidity
          temperature: "{{ states('sensor.attic_temperature') }}"
          humidity: "{{ states('sensor.attic_humidity') }}"
          issue: >
            {% set t = states('sensor.attic_temperature') %}
            {% set h = states('sensor.attic_humidity') %}
            {% if not is_number(t) or not is_number(h) %}Sensor unavailable
            {% elif (t | float(0)) > 145 %}Very hot
            {% elif (h | float(0)) > 80 %}Very humid
            {% elif (t | float(0)) > 130 or (h | float(0)) > 70 %}Watch
            {% else %}Steady{% endif %}

      - name: "Environment Main Floor Status"
        unique_id: environment_main_floor_status
        state: >
