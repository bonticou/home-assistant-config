              {% if is_state(entity_id, 'on') %}
                {% set ns.names = ns.names + [label] %}
              {% endif %}
            {% endfor %}
            {{ ns.names | join(', ') if ns.names else 'No garage motion hazard detected' }}
          active_sources: >
            {% set sources = [
              'binary_sensor.g6_instant_motion_3',
              'binary_sensor.garage_person_detected',
              'binary_sensor.garage_vehicle_detected',
              'binary_sensor.ratgdo32disco_c26634_motion',
