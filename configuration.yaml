            or is_state('device_tracker.unifi_default_42_15_78_4a_d9_f8', 'home')
          }}
        icon: >
          {{ 'mdi:home-heart' if is_state('binary_sensor.downstairs_someone_home', 'on') else 'mdi:home-off-outline' }}

      - name: "Main Floor Everyone Away"
        unique_id: downstairs_everyone_away
        state: >
          {{
            not is_state('device_tracker.tk_iphone_16_pro', 'home')
            and not is_state('device_tracker.unifi_default_42_15_78_4a_d9_f8', 'home')
          }}
        icon: >
          {{ 'mdi:home-export-outline' if is_state('binary_sensor.downstairs_everyone_away', 'on') else 'mdi:home-account' }}

  - sensor:
      - name: "Environment Source Map"
        unique_id: environment_source_map
        state: "7"
        icon: mdi:map-marker-radius-outline
        attributes:
          main_floor: "Kitchen uses sensor.main_floor_temperature/humidity; Dining Room uses sensor.main_floor_2_temperature/humidity plus Dining Room Ecobee context."
          second_floor: "Primary Bedroom uses sensor.master_temperature/humidity. Office and Primary Bedroom Ecobee context remain pending until live entity IDs are confirmed."
          special_zones: "Basement uses mechanical room temperature/humidity and Airthings radon. Garage and Attic use their dedicated temperature/humidity sensors."
          battery_sources: "Primary Bedroom uses sensor.master_sensor_new_battery_2. Basement Airthings uses sensor.basement_air_quality_battery. Other environment battery entities are not exposed yet."
          wine_cave: "Excluded. Wine cave has its own alert stack."

      - name: "Environment Kitchen Status"
        unique_id: environment_kitchen_status
        state: >
          {% set t = states('sensor.main_floor_temperature') %}
          {% set h = states('sensor.main_floor_humidity') %}
          {% if not is_number(t) or not is_number(h) %}
            unavailable
          {% elif (t | float(0)) < 60 or (t | float(0)) > 80 or (h | float(0)) < 28 or (h | float(0)) > 65 %}
            attention
          {% elif (t | float(0)) < 64 or (t | float(0)) > 76 or (h | float(0)) < 32 or (h | float(0)) > 60 %}
            watch
          {% else %}
            steady
          {% endif %}
        icon: mdi:countertop-outline
        attributes:
          area: Main Floor
          room: Kitchen
          primary_source: SensorPush
          temperature_entity: sensor.main_floor_temperature
          humidity_entity: sensor.main_floor_humidity
          temperature: "{{ states('sensor.main_floor_temperature') }}"
          humidity: "{{ states('sensor.main_floor_humidity') }}"
          issue: >
            {% set t = states('sensor.main_floor_temperature') %}
            {% set h = states('sensor.main_floor_humidity') %}
            {% if not is_number(t) or not is_number(h) %}Sensor unavailable
            {% elif (t | float(0)) < 60 %}Too cool
            {% elif (t | float(0)) > 80 %}Too warm
            {% elif (h | float(0)) < 28 %}Very dry
            {% elif (h | float(0)) > 65 %}Very humid
            {% elif (t | float(0)) < 64 or (t | float(0)) > 76 or (h | float(0)) < 32 or (h | float(0)) > 60 %}Comfort watch
            {% else %}Steady{% endif %}

      - name: "Environment Dining Room Status"
        unique_id: environment_dining_room_status
        state: >
          {% set t = states('sensor.main_floor_2_temperature') %}
          {% set h = states('sensor.main_floor_2_humidity') %}
          {% if not is_number(t) or not is_number(h) %}
            unavailable
          {% elif (t | float(0)) < 60 or (t | float(0)) > 80 or (h | float(0)) < 28 or (h | float(0)) > 65 %}
            attention
          {% elif (t | float(0)) < 64 or (t | float(0)) > 76 or (h | float(0)) < 32 or (h | float(0)) > 60 %}
            watch
          {% else %}
            steady
          {% endif %}
        icon: mdi:silverware-fork-knife
        attributes:
          area: Main Floor
          room: Dining Room
          primary_source: SensorPush
          control_context: Dining Room Ecobee
          temperature_entity: sensor.main_floor_2_temperature
          humidity_entity: sensor.main_floor_2_humidity
          ecobee_temperature_entity: sensor.dining_room_current_temperature
          ecobee_humidity_entity: sensor.dining_room_current_humidity
          temperature: "{{ states('sensor.main_floor_2_temperature') }}"
          humidity: "{{ states('sensor.main_floor_2_humidity') }}"
          ecobee_temperature: "{{ states('sensor.dining_room_current_temperature') }}"
          ecobee_humidity: "{{ states('sensor.dining_room_current_humidity') }}"
          temperature_delta_vs_ecobee: >
