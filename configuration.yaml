        unique_id: foyer_chandelier_schedule_brightness
        unit_of_measurement: "%"
        state: >
          {% if is_state('binary_sensor.front_stairs_schedule_active', 'off') %}
            0
          {% else %}
            10
          {% endif %}

      - name: "Vacation Activity Window"
        unique_id: vacation_activity_window
        icon: mdi:island
        state: >
          {% set elevation = state_attr('sun.sun', 'elevation') %}
          {% set now_ts = as_timestamp(now()) %}
          {% set lived_in_end = as_timestamp(today_at('21:30')) %}
          {% set evening_tail_end = as_timestamp(today_at('23:45')) %}
          {% if elevation is none %}
            off
          {% elif is_state_attr('sun.sun', 'rising', true)
             and elevation | float(90) >= -14
             and elevation | float(90) <= 4 %}
            pre_sunrise
          {% elif not is_state_attr('sun.sun', 'rising', true)
             and now().hour >= 12
             and elevation | float(90) <= 10
             and now_ts < evening_tail_end %}
            evening
          {% else %}
            off
          {% endif %}
        attributes:
          label: >
            {% set elevation = state_attr('sun.sun', 'elevation') %}
            {% set now_ts = as_timestamp(now()) %}
            {% set evening_tail_end = as_timestamp(today_at('23:45')) %}
            {% if elevation is not none
               and is_state_attr('sun.sun', 'rising', true)
               and elevation | float(90) >= -14
               and elevation | float(90) <= 4 %}
              Pre-sunrise activity
            {% elif elevation is not none
               and not is_state_attr('sun.sun', 'rising', true)
               and now().hour >= 12
               and elevation | float(90) <= 10
               and now_ts < evening_tail_end %}
              Evening activity
            {% else %}
              Quiet watch
            {% endif %}
          detail_phase: >
            {% set elevation = state_attr('sun.sun', 'elevation') %}
            {% set now_ts = as_timestamp(now()) %}
            {% set lived_in_end = as_timestamp(today_at('21:30')) %}
            {% set evening_tail_end = as_timestamp(today_at('23:45')) %}
            {% if elevation is none %}
              unknown
            {% elif is_state_attr('sun.sun', 'rising', true)
               and elevation | float(90) >= -14
               and elevation | float(90) <= 4 %}
              morning_glow
            {% elif not is_state_attr('sun.sun', 'rising', true)
               and now().hour >= 12
               and elevation | float(90) <= 10
               and now_ts < lived_in_end %}
              evening_lived_in
            {% elif not is_state_attr('sun.sun', 'rising', true)
               and now().hour >= 12
               and elevation | float(90) <= 10
               and now_ts < evening_tail_end %}
              late_glow
            {% elif is_state_attr('sun.sun', 'rising', true) %}
              daylight
            {% else %}
              night_quiet
            {% endif %}
          sun_elevation: "{{ state_attr('sun.sun', 'elevation') | float(0) | round(1) }}"
          next_setting: "{{ state_attr('sun.sun', 'next_setting') }}"
          next_rising: "{{ state_attr('sun.sun', 'next_rising') }}"
          evening_lived_in_until: "21:30"
          evening_tail_until: "23:45"
          pre_sunrise_elevation_start: -14
          pre_sunrise_elevation_end: 4

