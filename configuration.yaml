            {% elif is_state('binary_sensor.environment_dining_room_ecobee_temp_disagreement', 'on') or is_state('binary_sensor.environment_dining_room_ecobee_humidity_disagreement', 'on') %}Ecobee disagreement
            {% elif (t | float(0)) < 64 or (t | float(0)) > 76 or (h | float(0)) < 32 or (h | float(0)) > 60 %}Comfort watch
            {% else %}Steady{% endif %}

      - name: "Environment Primary Bedroom Status"
        unique_id: environment_primary_bedroom_status
        state: >
          {% set t = states('sensor.master_temperature') %}
          {% set h = states('sensor.master_humidity') %}
          {% set b = states('sensor.master_sensor_new_battery_2') %}
          {% if not is_number(t) or not is_number(h) %}
            unavailable
          {% elif (t | float(0)) < 60 or (t | float(0)) > 80 or (h | float(0)) < 28 or (h | float(0)) > 65 %}
            attention
          {% elif is_number(b) and (b | float(100)) <= 20 %}
            watch
          {% elif (t | float(0)) < 64 or (t | float(0)) > 76 or (h | float(0)) < 32 or (h | float(0)) > 60 %}
            watch
          {% else %}
            steady
          {% endif %}
        icon: mdi:bed-king-outline
        attributes:
          area: Second Floor
          room: Primary Bedroom
          primary_source: SensorPush
          control_context: "Ecobee pending live entity discovery"
          temperature_entity: sensor.master_temperature
          humidity_entity: sensor.master_humidity
          battery_entity: sensor.master_sensor_new_battery_2
          temperature: "{{ states('sensor.master_temperature') }}"
          humidity: "{{ states('sensor.master_humidity') }}"
          battery: "{{ states('sensor.master_sensor_new_battery_2') }}"
          issue: >
            {% set t = states('sensor.master_temperature') %}
            {% set h = states('sensor.master_humidity') %}
            {% set b = states('sensor.master_sensor_new_battery_2') %}
            {% if not is_number(t) or not is_number(h) %}Sensor unavailable
            {% elif (t | float(0)) < 60 %}Too cool
            {% elif (t | float(0)) > 80 %}Too warm
            {% elif (h | float(0)) < 28 %}Very dry
            {% elif (h | float(0)) > 65 %}Very humid
            {% elif is_number(b) and (b | float(100)) <= 20 %}Battery low
            {% elif (t | float(0)) < 64 or (t | float(0)) > 76 or (h | float(0)) < 32 or (h | float(0)) > 60 %}Comfort watch
            {% else %}Steady{% endif %}

      - name: "Environment Office Status"
        unique_id: environment_office_status
        state: source_pending
        icon: mdi:desk
        attributes:
          area: Second Floor
          room: Office
          primary_source: "Pending live entity discovery"
          control_context: "Office Ecobee pending live entity discovery"
          issue: "Office environment source IDs are not present in this repo checkout."

      - name: "Environment Basement Status"
        unique_id: environment_basement_status
        state: >
          {% set t = states('sensor.mechanical_room_temperature') %}
          {% set h = states('sensor.mechanical_room_humidity') %}
          {% set r24 = states('sensor.basement_radon_24h_stats') %}
          {% set r = states('sensor.basement_air_quality_radon') %}
          {% set b = states('sensor.basement_air_quality_battery') %}
          {% set radon_value = r24 if is_number(r24) else r %}
          {% if not is_number(t) or not is_number(h) %}
            unavailable
          {% elif (t | float(0)) < 55 or (t | float(0)) > 78 or (h | float(0)) >= 60 or (is_number(radon_value) and (radon_value | float(0)) >= 150) %}
            attention
          {% elif (h | float(0)) >= 55 or (is_number(radon_value) and (radon_value | float(0)) >= 75) or (is_number(b) and (b | float(100)) <= 20) %}
            watch
          {% else %}
            steady
          {% endif %}
        icon: mdi:stairs-down
        attributes:
          area: Basement
          room: Mechanical Room
          primary_source: Airthings
          temperature_entity: sensor.mechanical_room_temperature
          humidity_entity: sensor.mechanical_room_humidity
          radon_entity: sensor.basement_air_quality_radon
          radon_24h_entity: sensor.basement_radon_24h_stats
          battery_entity: sensor.basement_air_quality_battery
          temperature: "{{ states('sensor.mechanical_room_temperature') }}"
          humidity: "{{ states('sensor.mechanical_room_humidity') }}"
          radon: "{{ states('sensor.basement_air_quality_radon') }}"
          radon_24h: "{{ states('sensor.basement_radon_24h_stats') }}"
          battery: "{{ states('sensor.basement_air_quality_battery') }}"
          issue: >
            {% set t = states('sensor.mechanical_room_temperature') %}
            {% set h = states('sensor.mechanical_room_humidity') %}
            {% set r24 = states('sensor.basement_radon_24h_stats') %}
            {% set r = states('sensor.basement_air_quality_radon') %}
            {% set b = states('sensor.basement_air_quality_battery') %}
            {% set radon_value = r24 if is_number(r24) else r %}
            {% if not is_number(t) or not is_number(h) %}Sensor unavailable
            {% elif is_number(radon_value) and (radon_value | float(0)) >= 150 %}Radon high
            {% elif (h | float(0)) >= 60 %}Humidity urgent
            {% elif (h | float(0)) >= 55 %}Humidity watch
            {% elif (t | float(0)) < 55 %}Too cool
            {% elif (t | float(0)) > 78 %}Too warm
            {% elif is_number(radon_value) and (radon_value | float(0)) >= 75 %}Radon watch
            {% elif is_number(b) and (b | float(100)) <= 20 %}Battery low
            {% else %}Steady{% endif %}

