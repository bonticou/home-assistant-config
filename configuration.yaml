                  {% set notice_start = (strptime(bill_date, '%Y-%m-%d') - timedelta(days=21)).strftime('%Y-%m-%d') %}
                  {% if bill_date >= today and bill_date <= horizon and today >= notice_start %}
                    {% set ns.dates = ns.dates + [bill_date] %}
                  {% endif %}
                {% endfor %}
              {% endfor %}
