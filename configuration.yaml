          {% set ecobee = states('sensor.dining_room_current_temperature') %}
          {{ is_number(primary) and is_number(ecobee)
             and ((primary | float(0)) - (ecobee | float(0))) | abs >= 3 }}
        delay_on:
          minutes: 45
        delay_off:
          minutes: 15

      - name: "Environment Dining Room Ecobee Humidity Disagreement"
        unique_id: environment_dining_room_ecobee_humidity_disagreement
        state: >
          {% set primary = states('sensor.main_floor_2_humidity') %}
          {% set ecobee = states('sensor.dining_room_current_humidity') %}
          {{ is_number(primary) and is_number(ecobee)
             and ((primary | float(0)) - (ecobee | float(0))) | abs >= 10 }}
        delay_on:
          minutes: 90
        delay_off:
          minutes: 30

      - name: "Environment Basement Radon High Alert"
        unique_id: environment_basement_radon_high_alert
        state: "{{ is_number(states('sensor.basement_radon_24h_stats')) and (states('sensor.basement_radon_24h_stats') | float(0)) >= 150 }}"
        delay_off:
          hours: 6

      - name: "Environment Basement Airthings Battery Low Alert"
        unique_id: environment_basement_airthings_battery_low_alert
        device_class: battery
        state: "{{ is_number(states('sensor.basement_air_quality_battery')) and (states('sensor.basement_air_quality_battery') | float(100)) <= 20 }}"
        delay_on:
          hours: 6

      - name: "House Battery Getting Low Alert"
        unique_id: house_low_battery_alert
        device_class: battery
        state: "{{ (states('sensor.house_low_battery_summary') | int(0)) > 0 }}"
        delay_on:
          hours: 6

      - name: "House Battery Replace Soon Alert"
        unique_id: house_battery_replace_soon_alert
        device_class: battery
        state: "{{ state_attr('sensor.house_low_battery_summary', 'severity') in ['replace_soon', 'critical'] }}"
        delay_on:
          hours: 1

      - name: "House Battery Critical Alert"
        unique_id: house_battery_critical_alert
        device_class: battery
        state: "{{ state_attr('sensor.house_low_battery_summary', 'severity') == 'critical' }}"
        delay_on:
          minutes: 10

      - name: "Environment Kitchen Sensor Unavailable"
        unique_id: environment_kitchen_sensor_unavailable
        state: "{{ not is_number(states('sensor.main_floor_temperature')) or not is_number(states('sensor.main_floor_humidity')) }}"
        delay_on:
          minutes: 15
        delay_off:
          minutes: 15

      - name: "Environment Dining Room Sensor Unavailable"
        unique_id: environment_dining_room_sensor_unavailable
        state: "{{ not is_number(states('sensor.main_floor_2_temperature')) or not is_number(states('sensor.main_floor_2_humidity')) }}"
        delay_on:
          minutes: 15
        delay_off:
          minutes: 15

      - name: "Environment Primary Bedroom Sensor Unavailable"
        unique_id: environment_primary_bedroom_sensor_unavailable
        state: "{{ not is_number(states('sensor.master_temperature')) or not is_number(states('sensor.master_humidity')) }}"
        delay_on:
          minutes: 15
        delay_off:
          minutes: 15

      - name: "Environment Basement Sensor Unavailable"
        unique_id: environment_basement_sensor_unavailable
        state: "{{ not is_number(states('sensor.mechanical_room_temperature')) or not is_number(states('sensor.mechanical_room_humidity')) }}"
        delay_on:
          minutes: 15
        delay_off:
          minutes: 15

      - name: "Environment Garage Sensor Unavailable"
        unique_id: environment_garage_sensor_unavailable
        state: "{{ not is_number(states('sensor.garage_temperature')) or not is_number(states('sensor.garage_humidity')) }}"
        delay_on:
          minutes: 15
        delay_off:
