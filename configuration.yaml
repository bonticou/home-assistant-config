      - name: "lighting_evening_on_schedule_elevation_threshold"
        unique_id: lighting_evening_on_schedule_elevation_threshold
        unit_of_measurement: "°"
        icon: mdi:weather-sunset
        state: >
          {% set base_elevation = 10 %}
          {% set weather_state = states('weather.forecast_home') %}
          {% if weather_state in ['sunny', 'clear-night'] %}
            {% set weather_adjustment = -2 %}
          {% elif weather_state == 'partlycloudy' %}
            {% set weather_adjustment = 0 %}
          {% elif weather_state in ['cloudy', 'fog'] %}
            {% set weather_adjustment = 8 %}
          {% elif weather_state in ['rainy', 'pouring', 'lightning-rainy', 'snowy', 'snowy-rainy'] %}
            {% set weather_adjustment = 18 %}
          {% else %}
            {% set weather_adjustment = 0 %}
          {% endif %}
          {{ base_elevation + weather_adjustment }}
        attributes:
          base_elevation: 10
          weather_adjustment: >
            {% set weather_state = states('weather.forecast_home') %}
            {% if weather_state in ['sunny', 'clear-night'] %}
              -2
            {% elif weather_state == 'partlycloudy' %}
              0
            {% elif weather_state in ['cloudy', 'fog'] %}
              8
            {% elif weather_state in ['rainy', 'pouring', 'lightning-rainy', 'snowy', 'snowy-rainy'] %}
              18
            {% else %}
              0
            {% endif %}
          weather_condition: "{{ states('weather.forecast_home') }}"
          summary: >
            {% set weather_state = states('weather.forecast_home') %}
            {% if weather_state in ['sunny', 'clear-night'] %}
              Clearer evening, lights wait a little longer
            {% elif weather_state == 'partlycloudy' %}
              Baseline evening threshold
            {% elif weather_state in ['cloudy', 'fog'] %}
              Cloudy evening, lights start noticeably earlier
            {% elif weather_state in ['rainy', 'pouring', 'lightning-rainy', 'snowy', 'snowy-rainy'] %}
              Rainy evening, lights start much earlier
            {% else %}
              Baseline evening threshold
            {% endif %}

      - name: "lighting_morning_off_schedule_elevation_threshold"
        unique_id: lighting_morning_off_schedule_elevation_threshold
