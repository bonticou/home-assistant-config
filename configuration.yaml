# Loads default set of integrations. Do not remove.
default_config:

homeassistant:
  customize:
    light.master_casey_s_closet:
      friendly_name: Casey's closet
    cover.ratgdo32disco_c26634_door:
      friendly_name: Casey's garage door
    cover.ratgdo32_4536e8_door:
      friendly_name: Trevor's garage door

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

lovelace:
  resources:
    - url: /local/calm-mobile-scrollbars.js?v=6
      type: module
    - url: /local/house-notices-card.js?v=45
      type: module
    - url: /local/radon-air-quality-card.js?v=6
      type: module
    - url: /local/casey-presence-timeline-card.js?v=5
      type: module
  dashboards:
    calm-mobile:
      mode: yaml
      title: Home
      icon: mdi:home-variant-outline
      show_in_sidebar: true
      require_admin: false
      filename: dashboards/calm_mobile.yaml
    ha-safe:
      mode: yaml
      title: HA Safe
      icon: mdi:lifebuoy
      show_in_sidebar: true
      require_admin: false
      filename: dashboards/ha_safe.yaml

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

homekit:
  - name: House Modes
    mode: bridge
    port: 21076
    filter:
      include_entities:
        - script.lights_evening_scene
        - script.lights_tv_scene
        - script.lights_bedtime_scene
        - script.lights_all_off_scene
    entity_config:
      script.lights_evening_scene:
        name: Evening Lights
      script.lights_tv_scene:
        name: TV Lights
      script.lights_bedtime_scene:
        name: Bedtime Lights
      script.lights_all_off_scene:
        name: House Lights Off

command_line:
  - sensor:
      name: House Action Stamp Ledger
      unique_id: house_action_stamp_ledger
      command: python3 /config/tools/log_house_action_stamp.py --status
      command_timeout: 15
      scan_interval: 300
      value_template: >
        {{ value_json.pending_count if value_json.pending_count is defined else 0 }}
      json_attributes:
        - ledger_path
        - event_count
        - pending_count
        - latest_event_id
        - latest_notice_id
        - latest_cycle_id
        - latest_action
        - latest_completed_at
        - updated_at
  - sensor:
      name: Wine Collection Snapshot
      unique_id: wine_collection_snapshot
      command: python3 /config/tools/refresh_wine_collection_snapshot.py
      command_timeout: 60
      scan_interval: 86400
      value_template: >
        {{ value_json.ready_total if value_json.ready_total is defined else 0 }}
      json_attributes:
        - sheet_url
        - data_source
        - refreshed_at
        - refreshed_label
        - total_bottles
        - ready_total
        - anytime_total
        - stabilizing_total
        - mature_total
        - early_total
        - hold_total
        - unknown_total
        - ready_styles
        - ready_regions
        - ready_countries
        - drink_now_rows
        - anytime_rows
        - stabilizing_rows
        - mature_rows
        - early_rows
        - hold_rows
  - sensor:
      name: Metro-North NWP to Grand Central
      unique_id: metro_north_nwp_to_grand_central
      command: >-
        python3 /config/tools/mta_mnr_departures.py
        --origin-stop-id 76
        --origin-stop-name "North White Plains"
        --destination-stop-id 1
        --destination-stop-name "Grand Central"
        --route-id 2
        --route-name "Harlem Line"
        --min-departure-minutes 20
        --limit 3
      command_timeout: 45
      scan_interval: 120
      value_template: >
        {{ value_json.summary if value_json.summary is defined else 'unavailable' }}
      json_attributes:
        - updated_at
        - source
        - realtime_available
        - buffer_minutes
        - origin_stop_id
        - origin_stop_name
        - destination_stop_id
        - destination_stop_name
        - route_id
        - route_name
        - departures_label
        - track_label
        - message
        - trains
        - error
  - sensor:
      name: Device Inventory Status
      unique_id: device_inventory_status
      command: >-
        python3 /config/tools/generate_device_inventory.py
        --config-dir /config
        --print-status
      command_timeout: 15
      scan_interval: 300
      value_template: >
        {{ value_json.summary_message if value_json.summary_message is defined else 'Inventory status pending' }}
      json_attributes:
        - generated_at
        - api_enriched
        - output_changed
        - severity
        - change_counts
        - security_reasons
        - warnings
  - sensor:
      name: Device Inventory Pending Digest
      unique_id: device_inventory_pending_digest
      command: >-
        python3 /config/tools/generate_device_inventory.py
        --config-dir /config
        --print-digest
      command_timeout: 15
      scan_interval: 300
      value_template: >
        {{ value_json.pending_count if value_json.pending_count is defined else 0 }}
      json_attributes:
        - updated_at
        - pending_count
        - summary_message
        - items
  - sensor:
      name: Irrigation Fingerprint Status
      unique_id: irrigation_fingerprint_status
      command: >-
        python3 /config/tools/irrigation_fingerprints.py
        --data-file /config/.irrigation_fingerprints.json
        --status-file /config/.irrigation_fingerprint_status.json
        --status
      command_timeout: 15
      scan_interval: 300
      value_template: >
        {{ value_json.learned_zone_count if value_json.learned_zone_count is defined else 0 }}
      json_attributes:
        - updated_at
        - learned_zone_count
        - active_zone_count
        - zones
        - latest_sample
        - latest_anomaly
        - latest_anomaly_zone
        - latest_anomaly_reason
  - sensor:
      name: Irrigation History Status
      unique_id: irrigation_history_status
      command: >-
        python3 /config/tools/irrigation_history.py
        --data-file /config/.irrigation_history.json
        --status-file /config/.irrigation_history_status.json
        --status
      command_timeout: 15
      scan_interval: 300
      value_template: >
        {{ value_json.latest_event.title
           if value_json.latest_event is defined and value_json.latest_event.title is defined
           else 'No irrigation history yet' }}
      json_attributes:
        - updated_at
        - active_session
        - active_zone_count
        - active_zones
        - session_count
        - zone_run_count
        - event_count
        - latest_session
        - latest_zone_run
        - latest_event
        - sessions
        - zone_runs
        - events

shell_command:
  refresh_device_inventory: >-
    python3 /config/tools/generate_device_inventory.py
    --config-dir /config
    --output-dir /config/docs
  clear_device_inventory_digest: >-
    python3 /config/tools/generate_device_inventory.py
    --config-dir /config
    --clear-digest
  house_manager_log_property_tax_payment: >-
    python3 /config/tools/log_property_tax_payment.py
    --tax-type "{{ tax_type }}"
    --bill-month "{{ bill_month }}"
    --bill-year "{{ bill_year }}"
    --due-date "{{ due_date }}"
    --paid-date "{{ paid_date }}"
    --source "{{ source }}"
  log_house_action_stamp: >-
    python3 /config/tools/log_house_action_stamp.py
    --notice-id "{{ notice_id }}"
    --cycle-id "{{ cycle_id }}"
    --action "{{ action }}"
    --completed-at "{{ completed_at }}"
    --source "{{ source }}"
    --note "{{ note }}"
  irrigation_fingerprint_start: >-
    python3 /config/tools/irrigation_fingerprints.py
    --data-file /config/.irrigation_fingerprints.json
    --status-file /config/.irrigation_fingerprint_status.json
    start
    --zone "{{ zone }}"
    --at "{{ at }}"
    --gallons "{{ gallons }}"
    --pressure "{{ pressure }}"
    --flow "{{ flow }}"
    --active-count "{{ active_count }}"
  irrigation_fingerprint_touch: >-
    python3 /config/tools/irrigation_fingerprints.py
    --data-file /config/.irrigation_fingerprints.json
    --status-file /config/.irrigation_fingerprint_status.json
    touch
    --zone "{{ zone }}"
    --at "{{ at }}"
    --pressure "{{ pressure }}"
    --flow "{{ flow }}"
    --active-count "{{ active_count }}"
  irrigation_fingerprint_finish: >-
    python3 /config/tools/irrigation_fingerprints.py
    --data-file /config/.irrigation_fingerprints.json
    --status-file /config/.irrigation_fingerprint_status.json
    finish
    --zone "{{ zone }}"
    --at "{{ at }}"
    --gallons "{{ gallons }}"
    --pressure "{{ pressure }}"
    --flow "{{ flow }}"
    --active-count "{{ active_count }}"
  irrigation_history_event: >-
    python3 /config/tools/irrigation_history.py
    --data-file /config/.irrigation_history.json
    --status-file /config/.irrigation_history_status.json
    event
    --kind "{{ kind | default('', true) | replace('"', "'") | replace('\n', ' ') }}"
    --at "{{ at | default('', true) }}"
    --severity "{{ severity | default('info', true) | replace('"', "'") | replace('\n', ' ') }}"
    --title "{{ title | default('', true) | replace('"', "'") | replace('\n', ' ') }}"
    --note "{{ note | default('', true) | replace('"', "'") | replace('\n', ' ') }}"
    --session-id "{{ session_id | default('', true) | replace('"', "'") | replace('\n', ' ') }}"
    --zone "{{ zone | default('', true) | replace('"', "'") | replace('\n', ' ') }}"
    --zone-name "{{ zone_name | default('', true) | replace('"', "'") | replace('\n', ' ') }}"
  irrigation_history_session_start: >-
    python3 /config/tools/irrigation_history.py
    --data-file /config/.irrigation_history.json
    --status-file /config/.irrigation_history_status.json
    session-start
    --session-id "{{ session_id | default('', true) | replace('"', "'") | replace('\n', ' ') }}"
    --at "{{ at | default('', true) }}"
    --zone "{{ zone | default('', true) | replace('"', "'") | replace('\n', ' ') }}"
    --zone-name "{{ zone_name | default('', true) | replace('"', "'") | replace('\n', ' ') }}"
    --pressure "{{ pressure | default(0, true) }}"
    --flow "{{ flow | default(0, true) }}"
    --gallons "{{ gallons | default(0, true) }}"
    --next-cycle "{{ next_cycle | default('', true) | replace('"', "'") | replace('\n', ' ') }}"
    --note "{{ note | default('', true) | replace('"', "'") | replace('\n', ' ') }}"
  irrigation_history_session_finish: >-
    python3 /config/tools/irrigation_history.py
    --data-file /config/.irrigation_history.json
    --status-file /config/.irrigation_history_status.json
    session-finish
    --session-id "{{ session_id | default('', true) | replace('"', "'") | replace('\n', ' ') }}"
    --at "{{ at | default('', true) }}"
    --started-at "{{ started_at | default('', true) }}"
    --runtime-minutes "{{ runtime_minutes | default(0, true) }}"
    --gallons "{{ gallons | default(0, true) }}"
    --start-zone "{{ start_zone | default('', true) | replace('"', "'") | replace('\n', ' ') }}"
    --start-zone-name "{{ start_zone_name | default('', true) | replace('"', "'") | replace('\n', ' ') }}"
    --min-pressure "{{ min_pressure | default(0, true) }}"
    --max-flow "{{ max_flow | default(0, true) }}"
    --current-pressure "{{ current_pressure | default(0, true) }}"
    --recovery-status "{{ recovery_status | default('', true) | replace('"', "'") | replace('\n', ' ') }}"
    --alert-outcome "{{ alert_outcome | default('', true) | replace('"', "'") | replace('\n', ' ') }}"
    --note "{{ note | default('', true) | replace('"', "'") | replace('\n', ' ') }}"
  irrigation_history_zone_start: >-
    python3 /config/tools/irrigation_history.py
    --data-file /config/.irrigation_history.json
    --status-file /config/.irrigation_history_status.json
    zone-start
    --zone "{{ zone | default('', true) | replace('"', "'") | replace('\n', ' ') }}"
    --zone-name "{{ zone_name | default('', true) | replace('"', "'") | replace('\n', ' ') }}"
    --session-id "{{ session_id | default('', true) | replace('"', "'") | replace('\n', ' ') }}"
    --at "{{ at | default('', true) }}"
    --pressure "{{ pressure | default(0, true) }}"
    --flow "{{ flow | default(0, true) }}"
    --gallons "{{ gallons | default(0, true) }}"
    --active-count "{{ active_count | default(1, true) }}"
    --note "{{ note | default('', true) | replace('"', "'") | replace('\n', ' ') }}"
  irrigation_history_zone_finish: >-
    python3 /config/tools/irrigation_history.py
    --data-file /config/.irrigation_history.json
    --status-file /config/.irrigation_history_status.json
    --fingerprint-status-file /config/.irrigation_fingerprint_status.json
    zone-finish
    --zone "{{ zone | default('', true) | replace('"', "'") | replace('\n', ' ') }}"
    --zone-name "{{ zone_name | default('', true) | replace('"', "'") | replace('\n', ' ') }}"
    --session-id "{{ session_id | default('', true) | replace('"', "'") | replace('\n', ' ') }}"
    --at "{{ at | default('', true) }}"
    --started-at "{{ started_at | default('', true) }}"
    --duration-minutes "{{ duration_minutes | default(0, true) }}"
    --gallons "{{ gallons | default(0, true) }}"
    --avg-flow "{{ avg_flow | default(0, true) }}"
    --max-flow "{{ max_flow | default(0, true) }}"
    --pressure-drop "{{ pressure_drop | default(0, true) }}"
    --min-pressure "{{ min_pressure | default(0, true) }}"
    --contaminated "{{ contaminated | default(false, true) }}"
    --contamination-reasons "{{ contamination_reasons | default('', true) | replace('"', "'") | replace('\n', ' ') }}"
    --anomaly "{{ anomaly | default('', true) | replace('"', "'") | replace('\n', ' ') }}"
    --anomaly-reason "{{ anomaly_reason | default('', true) | replace('"', "'") | replace('\n', ' ') }}"
    --note "{{ note | default('', true) | replace('"', "'") | replace('\n', ' ') }}"

