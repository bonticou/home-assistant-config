recorder:
  purge_keep_days: 30
  exclude:
    entity_globs:
      - sensor.*_signal_strength
      - sensor.*_rssi
      - sensor.*_lqi
      - sensor.*_linkquality
    entities:
      - sun.sun
      - weather.forecast_home

# ─────────────────────────────────────────────────────────────
# All template sensors in a single block.
# After editing, restart HA (not just reload — templates need restart).
# ─────────────────────────────────────────────────────────────
template:
  - sensor:
      - name: "Radon Level Status"
        unique_id: radon_level_status
        state: >
          {% set r = states('sensor.basement_air_quality_radon') | float(0) %}
          {% if r < 75 %}Good
          {% elif r < 150 %}Fair
          {% else %}Poor
          {% endif %}
        icon: mdi:radioactive

      # ── Dew Point °F ─────────────────────────────────────
      # Why it matters: if dew point approaches your cave wall
      # temperature, condensation forms on labels and corks.
      # Keep dew point well below ambient temp (~10°F margin).
      - name: "wine_cave_dew_point"
        unique_id: wine_cave_dew_point
        unit_of_measurement: "°F"
        device_class: temperature
        state_class: measurement
        state: >
          {% set t = states('sensor.wine_temperature') | float(0) %}
          {% set rh = states('sensor.wine_humidity') | float(0) %}
          {% if t == 0 or rh == 0 %}
            unknown
          {% else %}
            {% set tc = (t - 32) * 5 / 9 %}
            {% set a = 17.27 %}
            {% set b = 237.7 %}
            {% set alpha = ((a * tc) / (b + tc)) + ((rh / 100) | log) %}
            {% set dp_c = (b * alpha) / (a - alpha) %}
            {{ ((dp_c * 9 / 5) + 32) | round(1) }}
          {% endif %}

      # ── Absolute Humidity g/m³ ────────────────────────────
      # Why it matters: RH is relative to temperature. When your
      # compressor cools the air, RH rises even if no moisture
      # was added. Absolute humidity tracks real moisture content.
      # Stable AH = stable environment. Drifting AH = real change.
      - name: "wine_cave_absolute_humidity"
        unique_id: wine_cave_absolute_humidity
        unit_of_measurement: "g/m³"
        state_class: measurement
        state: >
          {% set t = states('sensor.wine_temperature') | float(0) %}
          {% set rh = states('sensor.wine_humidity') | float(0) %}
          {% if t == 0 or rh == 0 %}
            unknown
          {% else %}
            {% set tc = (t - 32) * 5 / 9 %}
            {% set tk = tc + 273.15 %}
            {% set es = 6.112 * (2.71828 ** ((17.67 * tc) / (tc + 243.5))) %}
            {{ ((es * rh * 2.1674) / tk) | round(2) }}
          {% endif %}

      # ── Compliance Status ─────────────────────────────────
      # Three-tier: Optimal / Warning / Critical
      # Warning = approaching limits, Critical = outside safe zone
      # Thresholds: target 55°F / 50-65% RH
      #   Optimal:  53–57°F, 50–65% RH
      #   Warning:  50–60°F, 45–70% RH
      #   Critical: outside Warning band
      - name: "wine_cave_status"
        unique_id: wine_cave_status
        state: >
          {% set t = states('sensor.wine_temperature') | float(0) %}
          {% set rh = states('sensor.wine_humidity') | float(0) %}
          {% if t < 50 or t > 62 or rh < 45 or rh > 72 %}
            Critical
          {% elif t < 53 or t > 57 or rh < 50 or rh > 65 %}
            Warning
          {% else %}
            Optimal
          {% endif %}
        icon: >
          {% set t = states('sensor.wine_temperature') | float(0) %}
          {% set rh = states('sensor.wine_humidity') | float(0) %}
          {% if t < 50 or t > 62 or rh < 45 or rh > 72 %}mdi:alert-circle
          {% elif t < 53 or t > 57 or rh < 50 or rh > 65 %}mdi:alert
          {% else %}mdi:check-circle{% endif %}

      # ── Temp Excursion Flag ───────────────────────────────
      # Binary: 1 if temp outside 53–57°F target, else 0
      # Used by automations to measure excursion duration
      - name: "wine_cave_temp_excursion"
        unique_id: wine_cave_temp_excursion
        unit_of_measurement: ""
        state: >
          {% set t = states('sensor.wine_temperature') | float(0) %}
          {{ 1 if (t < 53 or t > 57) else 0 }}

      # ── RH Excursion Flag ─────────────────────────────────
      - name: "wine_cave_rh_excursion"
        unique_id: wine_cave_rh_excursion
        unit_of_measurement: ""
        state: >
          {% set rh = states('sensor.wine_humidity') | float(0) %}
          {{ 1 if (rh < 50 or rh > 65) else 0 }}

      - name: "wine_temp_24h_mean"
        unique_id: wine_temp_24h_mean
        unit_of_measurement: "°F"
        device_class: temperature
        state_class: measurement
        availability: >
          {{ is_number(states('sensor.wine_temperature_24h_stats')) }}
        state: >
          {{ states('sensor.wine_temperature_24h_stats') | float(0) | round(1) }}

      - name: "wine_humidity_24h_mean"
        unique_id: wine_humidity_24h_mean
        unit_of_measurement: "%"
        state_class: measurement
        availability: >
          {{ is_number(states('sensor.wine_humidity_24h_stats')) }}
        state: >
          {{ states('sensor.wine_humidity_24h_stats') | float(0) | round(1) }}

      - name: "wine_cave_dew_point_margin"
        unique_id: wine_cave_dew_point_margin
        unit_of_measurement: "°F"
        device_class: temperature
        state_class: measurement
        availability: >
          {{ is_number(states('sensor.wine_temperature'))
             and is_number(states('sensor.wine_cave_dew_point')) }}
        state: >
          {{ ((states('sensor.wine_temperature') | float(0))
            - (states('sensor.wine_cave_dew_point') | float(0))) | round(1) }}

      - name: "wine_cave_absolute_humidity_24h_delta"
        unique_id: wine_cave_absolute_humidity_24h_delta
        unit_of_measurement: "g/m³"
        state_class: measurement
        availability: >
          {{ is_number(states('sensor.wine_cave_absolute_humidity'))
             and is_number(states('sensor.wine_cave_absolute_humidity_24h_stats')) }}
        state: >
          {{ ((states('sensor.wine_cave_absolute_humidity') | float(0))
            - (states('sensor.wine_cave_absolute_humidity_24h_stats') | float(0))) | round(2) }}

      - name: "wine_cave_temp_24h_delta_7d"
        unique_id: wine_cave_temp_24h_delta_7d
        unit_of_measurement: "°F"
        device_class: temperature
        state_class: measurement
        availability: >
          {{ is_number(states('sensor.wine_temperature_24h_stats'))
             and is_number(states('sensor.wine_temperature_7d_stats')) }}
        state: >
          {{ ((states('sensor.wine_temperature_24h_stats') | float(0))
            - (states('sensor.wine_temperature_7d_stats') | float(0))) | round(1) }}

      - name: "wine_cave_humidity_24h_delta_7d"
        unique_id: wine_cave_humidity_24h_delta_7d
        unit_of_measurement: "%"
        state_class: measurement
        availability: >
          {{ is_number(states('sensor.wine_humidity_24h_stats'))
             and is_number(states('sensor.wine_humidity_7d_stats')) }}
        state: >
          {{ ((states('sensor.wine_humidity_24h_stats') | float(0))
            - (states('sensor.wine_humidity_7d_stats') | float(0))) | round(1) }}

      - name: "front_stairs_schedule_brightness"
        unique_id: front_stairs_schedule_brightness
        unit_of_measurement: "%"
        state: >
          {% set evening_start_pct = 30 %}
          {% set overnight_pct = 10 %}
          {% set morning_end_pct = 20 %}
          {% set schedule_elevation = 10 %}
          {% set overnight_elevation = -10 %}
          {% set sun_elevation = state_attr('sun.sun', 'elevation') %}
          {% if sun_elevation is none %}
            0
          {% elif is_state('binary_sensor.front_stairs_schedule_active', 'off') %}
            0
          {% else %}
            {% set elevation = [overnight_elevation, [schedule_elevation, sun_elevation | float(0)] | min] | max %}
            {% set span = (schedule_elevation - overnight_elevation) | float(1) %}
            {% if is_state_attr('sun.sun', 'rising', true) %}
              {% set progress = ((elevation - overnight_elevation) / span) | float(0) %}
              {% set clamped = [0, [1, progress] | min] | max %}
              {{ (overnight_pct + ((morning_end_pct - overnight_pct) * clamped)) | round(0) }}
            {% else %}
              {% set progress = ((schedule_elevation - elevation) / span) | float(0) %}
              {% set clamped = [0, [1, progress] | min] | max %}
              {{ (evening_start_pct - ((evening_start_pct - overnight_pct) * clamped)) | round(0) }}
            {% endif %}
          {% endif %}

      - name: "foyer_chandelier_schedule_brightness"
        unique_id: foyer_chandelier_schedule_brightness
        unit_of_measurement: "%"
        state: >
          {% if is_state('binary_sensor.front_stairs_schedule_active', 'off') %}
            0
          {% else %}
            7
          {% endif %}

      - name: "away_security_active_lights"
        unique_id: away_security_active_lights
        icon: mdi:lightbulb-alert-outline
        state: >
          {% set exempt = namespace(entity_ids=[]) %}
          {% if is_state('binary_sensor.front_stairs_schedule_active', 'on') %}
            {% set exempt.entity_ids = exempt.entity_ids + ['light.stairs_front_stairs'] %}
          {% endif %}
          {% if is_state('binary_sensor.front_stairs_schedule_active', 'on')
             and is_state('input_boolean.foyer_chandelier_sleep_hold', 'off') %}
            {% set exempt.entity_ids = exempt.entity_ids + ['light.front_foyer_chandelier'] %}
          {% endif %}
          {% set ns = namespace(lights=[]) %}
          {% for light in states.light
            | selectattr('state', 'eq', 'on')
            | rejectattr('attributes.entity_id', 'defined')
            | list %}
            {% if light.entity_id not in exempt.entity_ids %}
              {% set ns.lights = ns.lights + [light] %}
            {% endif %}
          {% endfor %}
          {{ ns.lights | count }}
        attributes:
          names: >
            {% set exempt = namespace(entity_ids=[]) %}
            {% if is_state('binary_sensor.front_stairs_schedule_active', 'on') %}
              {% set exempt.entity_ids = exempt.entity_ids + ['light.stairs_front_stairs'] %}
            {% endif %}
            {% if is_state('binary_sensor.front_stairs_schedule_active', 'on')
               and is_state('input_boolean.foyer_chandelier_sleep_hold', 'off') %}
              {% set exempt.entity_ids = exempt.entity_ids + ['light.front_foyer_chandelier'] %}
            {% endif %}
            {% set ns = namespace(names=[]) %}
            {% for light in states.light
              | selectattr('state', 'eq', 'on')
              | rejectattr('attributes.entity_id', 'defined')
              | list %}
              {% if light.entity_id not in exempt.entity_ids %}
                {% set ns.names = ns.names + [light.name] %}
              {% endif %}
            {% endfor %}
            {{ ns.names | join('||') }}
          entity_ids: >
            {% set exempt = namespace(entity_ids=[]) %}
            {% if is_state('binary_sensor.front_stairs_schedule_active', 'on') %}
              {% set exempt.entity_ids = exempt.entity_ids + ['light.stairs_front_stairs'] %}
            {% endif %}
            {% if is_state('binary_sensor.front_stairs_schedule_active', 'on')
               and is_state('input_boolean.foyer_chandelier_sleep_hold', 'off') %}
              {% set exempt.entity_ids = exempt.entity_ids + ['light.front_foyer_chandelier'] %}
            {% endif %}
            {% set ns = namespace(ids=[]) %}
            {% for light in states.light
              | selectattr('state', 'eq', 'on')
              | rejectattr('attributes.entity_id', 'defined')
              | list %}
              {% if light.entity_id not in exempt.entity_ids %}
                {% set ns.ids = ns.ids + [light.entity_id] %}
              {% endif %}
            {% endfor %}
            {{ ns.ids | join('||') }}

      - name: "away_security_issue_summary"
        unique_id: away_security_issue_summary
        state: >
          {% set light_names = state_attr('sensor.away_security_active_lights', 'names') | default('', true) %}
          {% set lights = (light_names.split('||') if light_names else []) | reject('eq', '') | list %}
          {% set ns = namespace(items=[]) %}
          {% if is_state('lock.aqara_smart_lock_u100', 'unlocked') %}
            {% set ns.items = ns.items + ['garage door unlocked'] %}
          {% endif %}
          {% if lights | count == 1 %}
            {% set ns.items = ns.items + [lights[0] ~ ' on'] %}
          {% elif lights | count > 1 %}
            {% set ns.items = ns.items + [lights | count ~ ' lights on'] %}
          {% endif %}
          {{ ns.items | join(' and ') if ns.items else 'House secure' }}
        icon: >
          {% if is_state('lock.aqara_smart_lock_u100', 'unlocked') %}
            mdi:lock-open-alert-outline
          {% elif states('sensor.away_security_active_lights') | int(0) > 0 %}
            mdi:lightbulb-alert-outline
          {% else %}
            mdi:shield-home-outline
          {% endif %}

    binary_sensor:
      - name: "house_unsecured_while_away"
        unique_id: house_unsecured_while_away
        state: >
          {% set trevor_state = states('device_tracker.tk_iphone_16_pro') %}
          {% set casey_state = states('device_tracker.unifi_default_42_15_78_4a_d9_f8') %}
          {% set trevor_away = trevor_state not in ['home', 'unknown', 'unavailable', ''] %}
          {% set casey_away = casey_state not in ['home', 'unknown', 'unavailable', ''] %}
          {% set everyone_away = trevor_away and casey_away %}
          {% set lights_on = states('sensor.away_security_active_lights') | int(0) > 0 %}
          {{ everyone_away and (is_state('lock.aqara_smart_lock_u100', 'unlocked') or lights_on) }}
        icon: >
          {% if is_state('lock.aqara_smart_lock_u100', 'unlocked') %}
            mdi:lock-open-alert-outline
          {% elif states('sensor.away_security_active_lights') | int(0) > 0 %}
            mdi:lightbulb-alert-outline
          {% else %}
            mdi:shield-home-outline
          {% endif %}
        attributes:
          lights_on_count: >
            {{ states('sensor.away_security_active_lights') | int(0) }}
          summary: "{{ states('sensor.away_security_issue_summary') }}"

      - name: "door_lights_schedule_active"
        unique_id: door_lights_schedule_active
        icon: mdi:coach-lamp
        state: >
          {% set schedule_elevation = 10 %}
          {{ state_attr('sun.sun', 'elevation') | float(90) <= schedule_elevation }}

      - name: "front_stairs_schedule_active"
        unique_id: front_stairs_schedule_active
        icon: mdi:stairs
        state: >
          {% set schedule_elevation = 10 %}
          {{ state_attr('sun.sun', 'elevation') | float(90) <= schedule_elevation }}

      - name: "main_dashboard_sleep_hero_active"
        unique_id: main_dashboard_sleep_hero_active
        icon: mdi:weather-night
        state: >
          {% set hour = now().hour %}
          {{ is_state('person.bonticou', 'home')
             and (hour >= 22 or hour < 5)
             and is_state('input_boolean.foyer_chandelier_sleep_hold', 'off')
             and is_state('input_boolean.front_stairs_sleep_override', 'off') }}

      - name: "foyer_chandelier_schedule_active"
        unique_id: foyer_chandelier_schedule_active
        icon: mdi:chandelier
        state: >
          {{ is_state('binary_sensor.front_stairs_schedule_active', 'on') }}

  - sensor:
      - name: "Main Floor Temp Avg"
        unique_id: downstairs_temp_avg
        unit_of_measurement: "°F"
        device_class: temperature
        state_class: measurement
        state: >
          {% set ns = namespace(values=[]) %}
          {% if is_number(states('sensor.main_floor_temperature')) %}
            {% set ns.values = ns.values + [states('sensor.main_floor_temperature') | float(0)] %}
          {% endif %}
          {% if is_number(states('sensor.main_floor_2_temperature')) %}
            {% set ns.values = ns.values + [states('sensor.main_floor_2_temperature') | float(0)] %}
          {% endif %}
          {% if ns.values | count > 0 %}
            {{ (ns.values | sum / (ns.values | count)) | round(1) }}
          {% else %}
            unknown
          {% endif %}

      - name: "Main Floor Humidity Avg"
        unique_id: downstairs_humidity_avg
        unit_of_measurement: "%"
        state_class: measurement
        state: >
          {% set ns = namespace(values=[]) %}
          {% if is_number(states('sensor.main_floor_humidity')) %}
            {% set ns.values = ns.values + [states('sensor.main_floor_humidity') | float(0)] %}
          {% endif %}
          {% if is_number(states('sensor.main_floor_2_humidity')) %}
            {% set ns.values = ns.values + [states('sensor.main_floor_2_humidity') | float(0)] %}
          {% endif %}
          {% if ns.values | count > 0 %}
            {{ (ns.values | sum / (ns.values | count)) | round(1) }}
          {% else %}
            unknown
          {% endif %}

      - name: "Main Floor Temp Spread"
        unique_id: downstairs_temp_spread
        unit_of_measurement: "°F"
        device_class: temperature
        state_class: measurement
        state: >
          {% set t1 = states('sensor.main_floor_temperature') %}
          {% set t2 = states('sensor.main_floor_2_temperature') %}
          {% if is_number(t1) and is_number(t2) %}
            {{ ((t1 | float(0)) - (t2 | float(0))) | abs | round(1) }}
          {% else %}
            unknown
          {% endif %}

      - name: "Main Floor Time Period"
        unique_id: downstairs_time_period
        state: >
          {% set current = now().strftime('%H:%M') %}
          {{ 'day' if '06:30' <= current < '22:30' else 'night' }}
        icon: >
          {{ 'mdi:weather-sunny' if states('sensor.downstairs_time_period') == 'day' else 'mdi:weather-night' }}

      - name: "Main Floor Active Season"
        unique_id: downstairs_active_season
        state: >
          {% set selected = states('input_select.downstairs_season_mode') %}
          {% if selected in ['winter', 'summer', 'shoulder'] %}
            {{ selected }}
          {% else %}
            {% set month = now().month %}
            {% if month in [11, 12, 1, 2, 3] %}
              winter
            {% elif month in [6, 7, 8, 9] %}
              summer
            {% else %}
              shoulder
            {% endif %}
          {% endif %}
        icon: >
          {% set season = states('sensor.downstairs_active_season') %}
          {% if season == 'winter' %}mdi:snowflake
          {% elif season == 'summer' %}mdi:white-balance-sunny
          {% else %}mdi:leaf{% endif %}

      - name: "Main Floor Outdoor Temp"
        unique_id: downstairs_outdoor_temp
        unit_of_measurement: "°F"
        device_class: temperature
        state_class: measurement
        state: >
          {% set outdoor = state_attr('weather.forecast_home', 'temperature') %}
          {{ outdoor | round(1) if outdoor is number else 'unknown' }}

      - name: "Main Floor Outdoor Humidity"
        unique_id: downstairs_outdoor_humidity
        unit_of_measurement: "%"
        state_class: measurement
        state: >
          {% set humidity = state_attr('weather.forecast_home', 'humidity') %}
          {{ humidity | round(0) if humidity is number else 'unknown' }}

      - name: "Main Floor Outdoor Wind Speed"
        unique_id: downstairs_outdoor_wind_speed
        unit_of_measurement: "mph"
        state_class: measurement
        state: >
          {% set wind = state_attr('weather.forecast_home', 'wind_speed') %}
          {{ wind | round(1) if wind is number else 'unknown' }}

      - name: "Main Floor Source Policy"
        unique_id: downstairs_source_policy
        state: >
          {% if is_number(states('sensor.downstairs_outdoor_temp')) %}
            {% set outdoor = states('sensor.downstairs_outdoor_temp') | float(999) %}
            {% set aux_cutover = states('input_number.downstairs_aux_cutover_temp') | float(45) %}
            {% set compressor_lockout = states('input_number.downstairs_compressor_lockout_temp') | float(40) %}
            {% if outdoor > aux_cutover %}
              heat_pump
            {% elif outdoor <= compressor_lockout %}
              aux
            {% else %}
              transition
            {% endif %}
          {% else %}
            unknown
          {% endif %}
        icon: >
          {% set policy = states('sensor.downstairs_source_policy') %}
          {% if policy == 'aux' %}mdi:fire
          {% elif policy == 'transition' %}mdi:swap-horizontal
          {% else %}mdi:fan-chevron-down{% endif %}

      - name: "Dining Room Ecobee Setpoint"
        unique_id: downstairs_ecobee_setpoint
        unit_of_measurement: "°F"
        device_class: temperature
        state_class: measurement
        state: >
          {% set setpoint = state_attr('climate.dining_room', 'temperature') %}
          {{ setpoint | round(0) if setpoint is number else 'unknown' }}

      - name: "Main Floor Climate Status"
        unique_id: downstairs_climate_status
        state: >
          {% set spread = states('sensor.downstairs_temp_spread') %}
          {% set humidity = states('sensor.downstairs_humidity_avg') %}
          {% set avg_temp = states('sensor.downstairs_temp_avg') %}
          {% set setpoint = states('sensor.downstairs_ecobee_setpoint') %}
          {% set action = state_attr('climate.dining_room', 'hvac_action') | default('idle', true) %}
          {% if is_number(spread) and spread | float(0) > 3 %}
            uneven
          {% elif action == 'heating' %}
            warming
          {% elif action == 'cooling' %}
            cooling
          {% elif is_number(avg_temp) and is_number(setpoint) and (avg_temp | float(0)) >= (setpoint | float(0)) + 2 %}
            too_warm
          {% elif is_number(avg_temp) and is_number(setpoint) and (avg_temp | float(0)) <= (setpoint | float(0)) - 2 %}
            too_cool
          {% elif is_number(humidity) and (humidity | float(0)) >= 60 %}
            humid
          {% elif is_number(humidity) and (humidity | float(0)) <= 28 %}
            dry
          {% else %}
            steady
          {% endif %}
        icon: >
          {% set status = states('sensor.downstairs_climate_status') %}
          {% if status == 'warming' %}mdi:radiator
          {% elif status == 'cooling' %}mdi:snowflake
          {% elif status == 'too_warm' %}mdi:thermometer-high
          {% elif status == 'too_cool' %}mdi:thermometer-low
          {% elif status == 'humid' %}mdi:water-percent
          {% elif status == 'dry' %}mdi:water-off-outline
          {% elif status == 'uneven' %}mdi:thermometer-alert
          {% else %}mdi:home-thermometer-outline{% endif %}

      - name: "Main Floor Climate Insight"
        unique_id: downstairs_climate_insight
        state: >
          {% set avg_temp = states('sensor.downstairs_temp_avg') %}
          {% set humidity = states('sensor.downstairs_humidity_avg') %}
          {% set spread = states('sensor.downstairs_temp_spread') %}
          {% set outdoor = states('sensor.downstairs_outdoor_temp') %}
          {% set setpoint = states('sensor.downstairs_ecobee_setpoint') %}
          {% set profile = states('select.dining_room_current_mode') | replace('_', ' ') %}
          {% set action = state_attr('climate.dining_room', 'hvac_action') | default('idle', true) | replace('_', ' ') %}
          {% set open_window = is_state('binary_sensor.downstairs_open_window_eligible', 'on') %}
          Main Floor averages {{ avg_temp }}°F and {{ humidity }}% humidity.
          Dining Room Ecobee is {{ action }} in {{ profile }} with a setpoint of {{ setpoint }}°F.
          Sensor spread is {{ spread }}°F and outdoor air is {{ outdoor }}°F.
          {% if open_window %}Tonight looks favorable for opening windows and coasting.{% endif %}

      - name: "Main Floor Away Watch"
        unique_id: downstairs_away_watch
        state: >
          {% set away = is_state('binary_sensor.downstairs_everyone_away', 'on') %}
          {% set away_minutes = states('sensor.downstairs_away_minutes') | float(0) %}
          {% set away_delay = states('input_number.downstairs_away_profile_delay_minutes') | float(45) %}
          {% set avg_temp = states('sensor.downstairs_temp_avg') %}
          {% set humidity = states('sensor.downstairs_humidity_avg') %}
          {% set profile = states('select.dining_room_current_mode') %}
          {% set season = states('sensor.downstairs_active_season') %}
          {% if not away %}
            home_occupied
          {% elif away_minutes < away_delay %}
            grace_period
          {% elif is_number(avg_temp) and (avg_temp | float(0)) >= 78 %}
            too_hot
          {% elif is_number(avg_temp) and (avg_temp | float(0)) <= 60 %}
            too_cold
          {% elif is_number(humidity) and (humidity | float(0)) >= 65 %}
            too_humid
          {% elif profile == 'home' %}
            profile_check
          {% elif season == 'winter' and is_number(humidity) and (humidity | float(0)) <= 25 %}
            too_dry
          {% else %}
            all_clear
          {% endif %}
        icon: >
          {% set watch = states('sensor.downstairs_away_watch') %}
          {% if watch == 'too_hot' %}mdi:thermometer-high
          {% elif watch == 'too_cold' %}mdi:thermometer-low
          {% elif watch == 'too_humid' %}mdi:water-percent-alert
          {% elif watch == 'too_dry' %}mdi:water-off-outline
          {% elif watch == 'profile_check' %}mdi:home-alert-outline
          {% elif watch == 'all_clear' %}mdi:shield-home-outline
          {% else %}mdi:home-export-outline{% endif %}

      - name: "Main Floor Away Watch Reason"
        unique_id: downstairs_away_watch_reason
        state: >
          {% set watch = states('sensor.downstairs_away_watch') %}
          {% set away_minutes = states('sensor.downstairs_away_minutes') | int(0) %}
          {% set avg_temp = states('sensor.downstairs_temp_avg') %}
          {% set humidity = states('sensor.downstairs_humidity_avg') %}
          {% set profile = states('select.dining_room_current_mode') %}
          {% if watch == 'home_occupied' %}
            Someone is home, so the away watch is idle.
          {% elif watch == 'grace_period' %}
            Both phones are away, but only for {{ away_minutes }} minutes so the away grace period is still active.
          {% elif watch == 'too_hot' %}
            Both phones have been away for {{ away_minutes }} minutes and the Main Floor is running hot at {{ avg_temp }}°F.
          {% elif watch == 'too_cold' %}
            Both phones have been away for {{ away_minutes }} minutes and the Main Floor has drifted down to {{ avg_temp }}°F.
          {% elif watch == 'too_humid' %}
            Both phones have been away for {{ away_minutes }} minutes and Main Floor humidity is elevated at {{ humidity }}%.
          {% elif watch == 'too_dry' %}
            Both phones have been away for {{ away_minutes }} minutes and winter humidity has fallen to {{ humidity }}%.
          {% elif watch == 'profile_check' %}
            Both phones have been away for {{ away_minutes }} minutes, but the Dining Room Ecobee is still in the {{ profile }} comfort profile.
          {% else %}
            Both phones are away and the Main Floor looks stable right now.
          {% endif %}

      - name: "Main Floor Away Minutes"
        unique_id: downstairs_away_minutes
        unit_of_measurement: "min"
        state_class: measurement
        state: >
          {% if is_state('binary_sensor.downstairs_everyone_away', 'on') %}
            {{ ((as_timestamp(now()) - as_timestamp(states.binary_sensor.downstairs_everyone_away.last_changed)) / 60) | round(0) }}
          {% else %}
            0
          {% endif %}
