          ] %}
          {% set planted = stages | select('eq', 'planted') | list | count %}
          {{ planted + 1 }} planted group{{ 's' if planted != 0 else '' }} · {{ 5 - planted }} active start group{{ 's' if 5 - planted != 1 else '' }}
        icon: mdi:sprout-outline
        attributes:
