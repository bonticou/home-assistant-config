      - name: "Garbage Recycling Next Pickup"
        unique_id: garbage_recycling_next_pickup
        device_class: date
        icon: mdi:trash-can-outline
        state: >
          {% set raw = state_attr('sensor.garbage_recycling_schedule', 'items_json') | default('[]', true) %}
          {% set schedule = raw | from_json if raw is string else raw %}
          {% set today = now().strftime('%Y-%m-%d') %}
          {% set taken = states('input_text.garbage_recycling_last_taken_out_pickup') %}
          {% set ns = namespace(pickup='') %}
          {% for item in schedule %}
            {% if ns.pickup == ''
               and item.actual_pickup >= today
               and item.actual_pickup != taken %}
              {% set ns.pickup = item.actual_pickup %}
            {% endif %}
          {% endfor %}
          {{ ns.pickup if ns.pickup else 'unknown' }}
        attributes:
          scheduled_thursday: >
            {% set raw = state_attr('sensor.garbage_recycling_schedule', 'items_json') | default('[]', true) %}
            {% set schedule = raw | from_json if raw is string else raw %}
            {% set pickup = states('sensor.garbage_recycling_next_pickup') %}
            {% set ns = namespace(value='') %}
            {% for item in schedule %}
              {% if ns.value == '' and item.actual_pickup == pickup %}
                {% set ns.value = item.scheduled_thursday %}
              {% endif %}
            {% endfor %}
            {{ ns.value }}
          recycling: >
            {% set raw = state_attr('sensor.garbage_recycling_schedule', 'items_json') | default('[]', true) %}
            {% set schedule = raw | from_json if raw is string else raw %}
            {% set pickup = states('sensor.garbage_recycling_next_pickup') %}
            {% set ns = namespace(value='') %}
            {% for item in schedule %}
              {% if ns.value == '' and item.actual_pickup == pickup %}
                {% set ns.value = item.recycling %}
              {% endif %}
            {% endfor %}
            {{ ns.value }}
          recycling_label: >
            {% set stream = state_attr('sensor.garbage_recycling_next_pickup', 'recycling') %}
            {{ 'paper/cardboard recycling' if stream == 'paper recycling' else 'glass, cans and plastic recycling' if stream == 'non-paper' else stream }}
          exception: >
            {% set raw = state_attr('sensor.garbage_recycling_schedule', 'items_json') | default('[]', true) %}
            {% set schedule = raw | from_json if raw is string else raw %}
            {% set pickup = states('sensor.garbage_recycling_next_pickup') %}
            {% set ns = namespace(value='') %}
            {% for item in schedule %}
              {% if ns.value == '' and item.actual_pickup == pickup %}
                {% set ns.value = item.exception %}
              {% endif %}
            {% endfor %}
            {{ ns.value }}
          rescheduled_pickup: >
            {% set raw = state_attr('sensor.garbage_recycling_schedule', 'items_json') | default('[]', true) %}
            {% set schedule = raw | from_json if raw is string else raw %}
            {% set pickup = states('sensor.garbage_recycling_next_pickup') %}
            {% set ns = namespace(value='') %}
            {% for item in schedule %}
              {% if ns.value == '' and item.actual_pickup == pickup %}
                {% set ns.value = item.rescheduled_pickup %}
              {% endif %}
            {% endfor %}
            {{ ns.value }}
          route: "North Castle Zone 4 - Thursday"
          set_out_window: "After 4:00 PM the day before pickup and before 7:00 AM pickup day"
          last_taken_out_pickup: "{{ states('input_text.garbage_recycling_last_taken_out_pickup') }}"
          last_taken_out_at: "{{ states('input_datetime.garbage_recycling_last_taken_out_at') }}"

      - name: "Garbage Recycling Status"
        unique_id: garbage_recycling_status
        icon: >
          {% if is_state('binary_sensor.garbage_recycling_takeout_due', 'on') %}
            mdi:trash-can-outline
          {% else %}
            mdi:trash-can-check-outline
          {% endif %}
        state: >
          {% set pickup = states('sensor.garbage_recycling_next_pickup') %}
          {% set stream = state_attr('sensor.garbage_recycling_next_pickup', 'recycling_label') %}
          {% if not is_state('input_boolean.garbage_recycling_reminders_enabled', 'on') %}
            Off
          {% elif pickup in ['unknown', 'unavailable', 'none', ''] %}
            No 2026 pickup scheduled
          {% else %}
            {% set days = ((as_timestamp(strptime(pickup, '%Y-%m-%d')) - as_timestamp(today_at('00:00:00'))) / 86400) | int %}
            {% if days == 0 %}
              Pickup today: garbage + {{ stream }}
            {% elif days == 1 %}
              Put out tonight: garbage + {{ stream }}
            {% else %}
              Next pickup {{ as_timestamp(strptime(pickup, '%Y-%m-%d')) | timestamp_custom('%b %-d', true) }}: garbage + {{ stream }}
            {% endif %}
          {% endif %}

