          humidity_delta_vs_ecobee: >
            {% set a = states('sensor.main_floor_2_humidity') %}
            {% set b = states('sensor.dining_room_current_humidity') %}
            {{ ((a | float(0)) - (b | float(0))) | abs | round(0) if is_number(a) and is_number(b) else 'unknown' }}
