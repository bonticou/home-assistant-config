              }] %}
            {% endif %}
            {% set water_last = as_timestamp(states('input_datetime.espresso_last_water_backflush'), 0) %}
            {% set cafiza_last = as_timestamp(states('input_datetime.espresso_last_cafiza_clean'), 0) %}
            {% set water_due = (water_last + 604800) | timestamp_custom('%Y-%m-%d', true) if water_last > 0 else '' %}
