  - triggers:
      - trigger: homeassistant
        event: start
      - trigger: time_pattern
        minutes: "/30"
    actions:
      - action: weather.get_forecasts
        target:
          entity_id: weather.forecast_home
        data:
          type: daily
        response_variable: garden_daily_forecast
    sensor:
      # Garden workflow rules are documented in docs/garden-workflow.md.
      - name: "Garden Weather Window"
        unique_id: garden_weather_window
        icon: mdi:weather-partly-cloudy
        state: >
          {% set forecast_map = garden_daily_forecast if garden_daily_forecast is defined else {} %}
          {% set forecast = forecast_map['weather.forecast_home'].forecast if 'weather.forecast_home' in forecast_map else [] %}
          {% set ns = namespace(lows=[]) %}
          {% for item in forecast[:4] %}
            {% if is_number(item.templow | default(none)) %}
              {% set ns.lows = ns.lows + [item.templow | float(0)] %}
            {% endif %}
          {% endfor %}
          {% if ns.lows | count < 4 %}
            Forecast unavailable
          {% elif ns.lows | min < 32 %}
            Hard frost risk
          {% elif ns.lows | min < 50 %}
            Cool nights ahead
          {% elif ns.lows | min < 55 %}
            Tomato window; peppers and squash wait
          {% else %}
            Warm window open
          {% endif %}
        attributes:
          forecast_available: >
            {% set forecast_map = garden_daily_forecast if garden_daily_forecast is defined else {} %}
            {% set forecast = forecast_map['weather.forecast_home'].forecast if 'weather.forecast_home' in forecast_map else [] %}
            {% set ns = namespace(lows=[]) %}
            {% for item in forecast[:4] %}
              {% if is_number(item.templow | default(none)) %}
                {% set ns.lows = ns.lows + [item.templow | float(0)] %}
              {% endif %}
            {% endfor %}
            {{ ns.lows | count >= 4 }}
          climate_context: "White Plains frost normals are background context only; live forecast wins."
          average_last_spring_frost: "Apr 18 at Westchester Co AP; NOAA 1991-2020 normals via Almanac, 30% frost probability"
          average_first_fall_frost: "Oct 24 at Westchester Co AP; NOAA 1991-2020 normals via Almanac, 30% frost probability"
          lowest_low_4_day: >
            {% set forecast_map = garden_daily_forecast if garden_daily_forecast is defined else {} %}
            {% set forecast = forecast_map['weather.forecast_home'].forecast if 'weather.forecast_home' in forecast_map else [] %}
            {% set ns = namespace(lows=[]) %}
            {% for item in forecast[:4] %}
              {% if is_number(item.templow | default(none)) %}
                {% set ns.lows = ns.lows + [item.templow | float(0)] %}
              {% endif %}
            {% endfor %}
            {{ (ns.lows | min | round(0) | int) if ns.lows else 'unknown' }}
          next_4_lows: >
            {% set forecast_map = garden_daily_forecast if garden_daily_forecast is defined else {} %}
            {% set forecast = forecast_map['weather.forecast_home'].forecast if 'weather.forecast_home' in forecast_map else [] %}
            {% set ns = namespace(labels=[]) %}
            {% for item in forecast[:4] %}
              {% if is_number(item.templow | default(none)) %}
                {% set ns.labels = ns.labels + [((item.templow | float(0)) | round(0) | int) ~ '°'] %}
              {% endif %}
            {% endfor %}
            {{ ns.labels | join(' · ') if ns.labels else 'Forecast unavailable' }}
          wet_days: >
            {% set forecast_map = garden_daily_forecast if garden_daily_forecast is defined else {} %}
            {% set forecast = forecast_map['weather.forecast_home'].forecast if 'weather.forecast_home' in forecast_map else [] %}
            {% set wet_conditions = ['rainy', 'pouring', 'lightning', 'lightning-rainy', 'snowy', 'snowy-rainy'] %}
            {% set ns = namespace(labels=[]) %}
            {% for item in forecast[:4] %}
              {% set condition = item.condition | default('', true) %}
              {% set precip = item.precipitation_probability | default(0, true) | float(0) %}
              {% if condition in wet_conditions or precip >= 60 %}
                {% set day = as_datetime(item.datetime).strftime('%a') if item.datetime is defined else 'Day ' ~ loop.index %}
                {% set ns.labels = ns.labels + [day] %}
              {% endif %}
            {% endfor %}
            {{ ns.labels | join(' · ') if ns.labels else 'None flagged' }}
          wind_risk: >
            {% set forecast_map = garden_daily_forecast if garden_daily_forecast is defined else {} %}
            {% set forecast = forecast_map['weather.forecast_home'].forecast if 'weather.forecast_home' in forecast_map else [] %}
            {% set ns = namespace(risk=false) %}
            {% for item in forecast[:4] %}
              {% if item.wind_speed is defined and item.wind_speed | float(0) >= 18 %}
                {% set ns.risk = true %}
              {% endif %}
            {% endfor %}
            {{ ns.risk }}
          tomatoes_window: >
            {% set forecast_map = garden_daily_forecast if garden_daily_forecast is defined else {} %}
            {% set forecast = forecast_map['weather.forecast_home'].forecast if 'weather.forecast_home' in forecast_map else [] %}
            {% set ns = namespace(lows=[]) %}
            {% for item in forecast[:4] %}
              {% if is_number(item.templow | default(none)) %}
                {% set ns.lows = ns.lows + [item.templow | float(0)] %}
              {% endif %}
            {% endfor %}
            {{ ns.lows | count >= 4 and ns.lows | min >= 50 }}
          cape_gooseberry_window: >
            {% set forecast_map = garden_daily_forecast if garden_daily_forecast is defined else {} %}
            {% set forecast = forecast_map['weather.forecast_home'].forecast if 'weather.forecast_home' in forecast_map else [] %}
            {% set ns = namespace(lows=[]) %}
            {% for item in forecast[:4] %}
              {% if is_number(item.templow | default(none)) %}
                {% set ns.lows = ns.lows + [item.templow | float(0)] %}
              {% endif %}
            {% endfor %}
            {{ ns.lows | count >= 4 and ns.lows | min >= 50 }}
          peppers_window: >
            {% set forecast_map = garden_daily_forecast if garden_daily_forecast is defined else {} %}
            {% set forecast = forecast_map['weather.forecast_home'].forecast if 'weather.forecast_home' in forecast_map else [] %}
            {% set ns = namespace(lows=[]) %}
            {% for item in forecast[:4] %}
              {% if is_number(item.templow | default(none)) %}
                {% set ns.lows = ns.lows + [item.templow | float(0)] %}
              {% endif %}
            {% endfor %}
            {{ ns.lows | count >= 4 and ns.lows | min >= 55 }}
          honeynut_squash_window: >
            {% set forecast_map = garden_daily_forecast if garden_daily_forecast is defined else {} %}
            {% set forecast = forecast_map['weather.forecast_home'].forecast if 'weather.forecast_home' in forecast_map else [] %}
            {% set wet_conditions = ['rainy', 'pouring', 'lightning', 'lightning-rainy', 'snowy', 'snowy-rainy'] %}
            {% set ns = namespace(lows=[], wet=false) %}
            {% for item in forecast[:4] %}
              {% if is_number(item.templow | default(none)) %}
                {% set ns.lows = ns.lows + [item.templow | float(0)] %}
              {% endif %}
              {% set condition = item.condition | default('', true) %}
              {% set precip = item.precipitation_probability | default(0, true) | float(0) %}
              {% if condition in wet_conditions or precip >= 60 %}
                {% set ns.wet = true %}
              {% endif %}
            {% endfor %}
            {{ ns.lows | count >= 4 and ns.lows | min >= 55 and not ns.wet }}

      - name: "Irrigation Weather Skip Context"
        unique_id: irrigation_weather_skip_context
        icon: mdi:weather-pouring
        state: >
          {% set forecast_map = garden_daily_forecast if garden_daily_forecast is defined else {} %}
          {% set forecast = forecast_map['weather.forecast_home'].forecast if 'weather.forecast_home' in forecast_map else [] %}
          {% set wet_conditions = ['rainy', 'pouring', 'lightning', 'lightning-rainy', 'snowy', 'snowy-rainy'] %}
          {% set ns = namespace(lows=[], highs=[], precip=[], wet_days=[]) %}
          {% for item in forecast[:3] %}
            {% if is_number(item.templow | default(none)) %}
              {% set ns.lows = ns.lows + [item.templow | float(0)] %}
            {% endif %}
            {% if is_number(item.temperature | default(none)) %}
              {% set ns.highs = ns.highs + [item.temperature | float(0)] %}
            {% endif %}
            {% set condition = item.condition | default('', true) %}
            {% set precip = item.precipitation | default(none, true) %}
            {% if is_number(precip) %}
              {% set ns.precip = ns.precip + [precip | float(0)] %}
            {% endif %}
            {% if condition in wet_conditions or (is_number(precip) and precip | float(0) >= 0.1) %}
              {% set day = as_datetime(item.datetime).strftime('%a') if item.datetime is defined else 'Day ' ~ loop.index %}
              {% set ns.wet_days = ns.wet_days + [day] %}
            {% endif %}
          {% endfor %}
          {% set cold = ns.lows | count > 0 and ns.lows | min <= 63 %}
          {% set rain = ns.wet_days | count > 0 or (ns.precip | sum) >= 0.15 %}
          {% set lower_water = ns.lows | count > 0 and ns.lows | min <= 73 %}
          {% set hot = ns.highs | count > 0 and ns.highs | max >= 85 %}
          {% if forecast | count == 0 %}
            Forecast unavailable
          {% elif cold or rain %}
            Weather skip plausible
          {% elif lower_water %}
            Weather reduction plausible
          {% elif hot %}
            Hot-weather adjustment plausible
          {% else %}
            Weather skip unlikely
          {% endif %}
        attributes:
          forecast_available: >
            {% set forecast_map = garden_daily_forecast if garden_daily_forecast is defined else {} %}
            {% set forecast = forecast_map['weather.forecast_home'].forecast if 'weather.forecast_home' in forecast_map else [] %}
            {{ forecast | count > 0 }}
          plausible_weather_skip: >
            {% set forecast_map = garden_daily_forecast if garden_daily_forecast is defined else {} %}
            {% set forecast = forecast_map['weather.forecast_home'].forecast if 'weather.forecast_home' in forecast_map else [] %}
            {% set wet_conditions = ['rainy', 'pouring', 'lightning', 'lightning-rainy', 'snowy', 'snowy-rainy'] %}
            {% set ns = namespace(lows=[], precip=[], wet=false) %}
            {% for item in forecast[:3] %}
              {% if is_number(item.templow | default(none)) %}
                {% set ns.lows = ns.lows + [item.templow | float(0)] %}
              {% endif %}
              {% set condition = item.condition | default('', true) %}
              {% set precip = item.precipitation | default(none, true) %}
              {% if is_number(precip) %}
                {% set ns.precip = ns.precip + [precip | float(0)] %}
              {% endif %}
              {% if condition in wet_conditions or (is_number(precip) and precip | float(0) >= 0.1) %}
                {% set ns.wet = true %}
              {% endif %}
            {% endfor %}
            {{ forecast | count > 0 and ((ns.lows | count > 0 and ns.lows | min <= 63)
               or ns.precip | sum >= 0.15
               or ns.wet) }}
          cold_skip_possible: >
            {% set forecast_map = garden_daily_forecast if garden_daily_forecast is defined else {} %}
            {% set forecast = forecast_map['weather.forecast_home'].forecast if 'weather.forecast_home' in forecast_map else [] %}
            {% set ns = namespace(lows=[]) %}
            {% for item in forecast[:3] %}
              {% if is_number(item.templow | default(none)) %}
                {% set ns.lows = ns.lows + [item.templow | float(0)] %}
              {% endif %}
            {% endfor %}
            {{ ns.lows | count > 0 and ns.lows | min <= 63 }}
          rain_skip_possible: >
            {% set forecast_map = garden_daily_forecast if garden_daily_forecast is defined else {} %}
            {% set forecast = forecast_map['weather.forecast_home'].forecast if 'weather.forecast_home' in forecast_map else [] %}
            {% set wet_conditions = ['rainy', 'pouring', 'lightning', 'lightning-rainy', 'snowy', 'snowy-rainy'] %}
            {% set ns = namespace(precip=[], wet=false) %}
            {% for item in forecast[:3] %}
              {% set condition = item.condition | default('', true) %}
              {% set precip = item.precipitation | default(none, true) %}
              {% if is_number(precip) %}
                {% set ns.precip = ns.precip + [precip | float(0)] %}
              {% endif %}
              {% if condition in wet_conditions or (is_number(precip) and precip | float(0) >= 0.1) %}
                {% set ns.wet = true %}
              {% endif %}
            {% endfor %}
            {{ ns.precip | sum >= 0.15 or ns.wet }}
          water_less_possible: >
            {% set forecast_map = garden_daily_forecast if garden_daily_forecast is defined else {} %}
            {% set forecast = forecast_map['weather.forecast_home'].forecast if 'weather.forecast_home' in forecast_map else [] %}
            {% set ns = namespace(lows=[]) %}
            {% for item in forecast[:3] %}
              {% if is_number(item.templow | default(none)) %}
                {% set ns.lows = ns.lows + [item.templow | float(0)] %}
              {% endif %}
            {% endfor %}
            {{ ns.lows | count > 0 and ns.lows | min <= 73 }}
          water_longer_possible: >
            {% set forecast_map = garden_daily_forecast if garden_daily_forecast is defined else {} %}
            {% set forecast = forecast_map['weather.forecast_home'].forecast if 'weather.forecast_home' in forecast_map else [] %}
            {% set ns = namespace(highs=[]) %}
            {% for item in forecast[:3] %}
              {% if is_number(item.temperature | default(none)) %}
                {% set ns.highs = ns.highs + [item.temperature | float(0)] %}
              {% endif %}
            {% endfor %}
            {{ ns.highs | count > 0 and ns.highs | max >= 85 }}
          lowest_low_3_day: >
            {% set forecast_map = garden_daily_forecast if garden_daily_forecast is defined else {} %}
            {% set forecast = forecast_map['weather.forecast_home'].forecast if 'weather.forecast_home' in forecast_map else [] %}
            {% set ns = namespace(lows=[]) %}
            {% for item in forecast[:3] %}
              {% if is_number(item.templow | default(none)) %}
                {% set ns.lows = ns.lows + [item.templow | float(0)] %}
              {% endif %}
            {% endfor %}
            {{ (ns.lows | min | round(0) | int) if ns.lows else 'unknown' }}
          highest_high_3_day: >
            {% set forecast_map = garden_daily_forecast if garden_daily_forecast is defined else {} %}
            {% set forecast = forecast_map['weather.forecast_home'].forecast if 'weather.forecast_home' in forecast_map else [] %}
            {% set ns = namespace(highs=[]) %}
            {% for item in forecast[:3] %}
              {% if is_number(item.temperature | default(none)) %}
                {% set ns.highs = ns.highs + [item.temperature | float(0)] %}
              {% endif %}
            {% endfor %}
            {{ (ns.highs | max | round(0) | int) if ns.highs else 'unknown' }}
          forecast_precip_3_day: >
            {% set forecast_map = garden_daily_forecast if garden_daily_forecast is defined else {} %}
            {% set forecast = forecast_map['weather.forecast_home'].forecast if 'weather.forecast_home' in forecast_map else [] %}
            {% set ns = namespace(precip=[]) %}
            {% for item in forecast[:3] %}
              {% set precip = item.precipitation | default(none, true) %}
              {% if is_number(precip) %}
                {% set ns.precip = ns.precip + [precip | float(0)] %}
              {% endif %}
            {% endfor %}
            {{ (ns.precip | sum | round(2)) if ns.precip else 'unknown' }}
          wet_days: >
            {% set forecast_map = garden_daily_forecast if garden_daily_forecast is defined else {} %}
            {% set forecast = forecast_map['weather.forecast_home'].forecast if 'weather.forecast_home' in forecast_map else [] %}
            {% set wet_conditions = ['rainy', 'pouring', 'lightning', 'lightning-rainy', 'snowy', 'snowy-rainy'] %}
            {% set ns = namespace(labels=[]) %}
            {% for item in forecast[:3] %}
              {% set condition = item.condition | default('', true) %}
              {% set precip = item.precipitation | default(none, true) %}
              {% if condition in wet_conditions or (is_number(precip) and precip | float(0) >= 0.1) %}
                {% set day = as_datetime(item.datetime).strftime('%a') if item.datetime is defined else 'Day ' ~ loop.index %}
                {% set ns.labels = ns.labels + [day] %}
              {% endif %}
            {% endfor %}
            {{ ns.labels | join(' · ') if ns.labels else 'None flagged' }}
          skip_reasons: >
            {% set forecast_map = garden_daily_forecast if garden_daily_forecast is defined else {} %}
            {% set forecast = forecast_map['weather.forecast_home'].forecast if 'weather.forecast_home' in forecast_map else [] %}
            {% set wet_conditions = ['rainy', 'pouring', 'lightning', 'lightning-rainy', 'snowy', 'snowy-rainy'] %}
            {% set ns = namespace(lows=[], precip=[], wet=false, reasons=[]) %}
            {% for item in forecast[:3] %}
              {% if is_number(item.templow | default(none)) %}
                {% set ns.lows = ns.lows + [item.templow | float(0)] %}
              {% endif %}
              {% set condition = item.condition | default('', true) %}
              {% set precip = item.precipitation | default(none, true) %}
              {% if is_number(precip) %}
                {% set ns.precip = ns.precip + [precip | float(0)] %}
              {% endif %}
              {% if condition in wet_conditions or (is_number(precip) and precip | float(0) >= 0.1) %}
                {% set ns.wet = true %}
              {% endif %}
            {% endfor %}
            {% set cold = ns.lows | count > 0 and ns.lows | min <= 63 %}
            {% set rain = ns.precip | sum >= 0.15 or ns.wet %}
            {% if cold %}
              {% set ns.reasons = ns.reasons + ['cold forecast buffer'] %}
            {% endif %}
            {% if rain %}
              {% set ns.reasons = ns.reasons + ['rain forecast buffer'] %}
            {% endif %}
            {{ ns.reasons | join('; ') if ns.reasons else 'None' }}
          thresholds: "Hydrawise screenshot mirrored with buffers: cold <=63F for 60F rule; rainy condition or 3-day forecast precip >=0.15in as rain buffer; cool-water adjustment <=73F for 70F rule; hot adjustment >=85F."

  - sensor:
      - name: "Garden Spinach Status"
        unique_id: garden_spinach_status
        state: >
          {% if is_state('input_boolean.garden_spinach_in_ground', 'on') %}
            Raised beds
          {% else %}
            Outdoors
          {% endif %}
        icon: >
          {% if is_state('input_boolean.garden_spinach_in_ground', 'on') %}mdi:shovel
          {% else %}mdi:leaf{% endif %}
        attributes:
          count: 8
          planted_date: >
            {% set planted = states('input_datetime.garden_spinach_planted_in_ground') %}
            {% if planted in ['unknown', 'unavailable', ''] %}
              unknown
            {% else %}
              {{ as_datetime(planted).strftime('%B %-d') }}
            {% endif %}
          varieties: Bloomsdale spinach
          stage_note: >
            {% set observation = states('input_select.garden_spinach_observation') %}
            {% set in_ground = is_state('input_boolean.garden_spinach_in_ground', 'on') %}
            {% set planted = states('input_datetime.garden_spinach_planted_in_ground') %}
            {% set watered = states('input_datetime.garden_spinach_last_watered') %}
            {% set planted_label = as_datetime(planted).strftime('%B %-d')
              if planted not in ['unknown', 'unavailable', ''] else 'recently' %}
            {% set watered_label = as_datetime(watered).strftime('%B %-d')
              if watered not in ['unknown', 'unavailable', ''] else planted_label %}
            {% if in_ground and observation == 'dry' %}
              In the raised beds since {{ planted_label }} and looking dry. Give the spinach a deeper soak and recheck tonight.
            {% elif in_ground and observation == 'settling in' %}
              Planted in the raised beds {{ planted_label }}. Keep moisture even while the spinach settles in.
            {% elif in_ground and observation == 'stressed' %}
              Planted in the raised beds {{ planted_label }}. Watch for transplant stress and keep the soil evenly moist.
            {% elif in_ground %}
              Planted in the raised beds {{ planted_label }} and watered in {{ watered_label }}.
            {% elif observation == 'dry' %}
              Spinach looks dry. Water before the surface fully dries out.
            {% elif observation == 'true leaves showing' %}
              Spinach has true leaves. Start watching for a nice planting window.
            {% elif observation == 'ready for ground' %}
              Spinach looks ready for the ground when the bed is open and the soil is workable.
            {% elif observation == 'stressed' %}
              Spinach looks stressed outside. Recheck moisture and sun exposure.
            {% else %}
              Spinach is outside, but not planted in the ground yet.
            {% endif %}

      - name: "Garden Bok Choy Status"
        unique_id: garden_bok_choy_status
        state: "{{ states('input_select.garden_bok_choy_stage') | title }}"
        icon: mdi:sprout-outline
        attributes:
          count: 4
          varieties: Shanghai bok choy four-pack
          threshold: "Cool-season crop; protect only for hard frost."
          target_location: Raised bed or container with afternoon shade
          stage_note: >
            {% set stage = states('input_select.garden_bok_choy_stage') %}
            {% set low = state_attr('sensor.garden_weather_window', 'lowest_low_4_day') %}
            {% set low = low | float(99) if is_number(low) else 99 %}
            {% if stage == 'planted' %}
              Planted. Keep evenly moist and watch flea beetles.
            {% elif low < 32 %}
              Looks ready, but a hard frost is in the forecast. Wait or cover.
            {% else %}
              Plant now. It prefers this cool window and may bolt as heat builds.
            {% endif %}

