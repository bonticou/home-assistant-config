          {% if 'attention' in rooms or 'unavailable' in rooms %}
            attention
          {% elif 'watch' in rooms or is_state('binary_sensor.downstairs_temp_spread_high', 'on')
             or is_state('binary_sensor.environment_dining_room_ecobee_temp_disagreement', 'on')
             or is_state('binary_sensor.environment_dining_room_ecobee_humidity_disagreement', 'on') %}
            watch
          {% else %}
            steady
          {% endif %}
        icon: mdi:home-floor-1
        attributes:
