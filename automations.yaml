- id: espresso_morning_maintenance_reminder
  alias: "Espresso — Morning Maintenance Reminder"
  description: Sends the Profitec GO cleaning reminder on the morning ritual cadence or coffee-window homecoming catch-up.
  triggers:
    - trigger: time
      at: "07:00:00"
      id: morning
    - trigger: state
      entity_id: device_tracker.tk_iphone_16_pro
      to: "home"
      id: homecoming
    - trigger: homeassistant
      event: start
      id: startup
    - trigger: event
      event_type: automation_reloaded
      id: automation_reloaded
  conditions:
    - condition: state
      entity_id: input_boolean.espresso_maintenance_enabled
      state: "on"
    - condition: state
      entity_id: binary_sensor.espresso_maintenance_due
      state: "on"
  actions:
    - if:
        - condition: trigger
          id: startup
      then:
        - delay:
            minutes: 2
    - if:
        - condition: trigger
          id: automation_reloaded
      then:
        - delay:
            minutes: 1
    - variables:
        today: "{{ now().strftime('%Y-%m-%d') }}"
        coffee_window: "{{ now().hour >= 6 and now().hour < 12 }}"
        cafiza_due: "{{ is_state('binary_sensor.espresso_cafiza_clean_due', 'on') }}"
        water_due: "{{ is_state('binary_sensor.espresso_water_backflush_due', 'on') }}"
        last_notified: "{{ states('input_datetime.espresso_maintenance_last_notified_at') }}"
        notified_today: >-
          {{ last_notified not in ['unknown', 'unavailable', 'none', '']
             and last_notified[:10] == today }}
        trigger_allowed: >-
          {{ trigger.id == 'morning'
             or (trigger.id in ['homecoming', 'startup', 'automation_reloaded'] and coffee_window | bool) }}
    - condition: state
      entity_id: device_tracker.tk_iphone_16_pro
      state: "home"
    - condition: template
      value_template: "{{ trigger_allowed | bool }}"
    - condition: template
      value_template: "{{ not (notified_today | bool) }}"
    - condition: template
      value_template: "{{ cafiza_due | bool or water_due | bool }}"
    - action: script.espresso_send_maintenance_notification
  mode: single

- id: commute_metro_north_first_weekday_departure
  alias: "Commute — Metro-North First Weekday Departure"
  description: >
    Sends Trevor the first weekday NWP to Grand Central train reminder when he
    leaves home. Only includes trains departing more than 20 minutes later.
  triggers:
    - trigger: state
      entity_id: device_tracker.tk_iphone_16_pro
      from: "home"
  conditions:
    - condition: time
      weekday:
        - mon
        - tue
        - wed
        - thu
        - fri
    - condition: state
      entity_id: input_boolean.metro_north_commute_notified_today
      state: "off"
    - condition: template
      value_template: >
        {{ trigger.to_state is not none
           and trigger.to_state.state not in ['home', 'unknown', 'unavailable', ''] }}
  actions:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.metro_north_commute_notified_today
    - action: homeassistant.update_entity
      target:
        entity_id: sensor.metro_north_nwp_to_grand_central
    - delay:
        seconds: 4
    - variables:
        train_message: >-
          {% set message = state_attr('sensor.metro_north_nwp_to_grand_central', 'message') %}
          {{ message if message not in [none, '', 'unknown', 'unavailable'] else 'No Grand Central trains more than 20 minutes out were found.' }}
    - action: script.notify_trevor_phone
      data:
        title: "🚆 NWP to Grand Central"
        message: "{{ train_message }}"
        data:
          group: commute
          tag: metro-north-nwp-gct
          url: /calm-mobile/home
  mode: single

- id: commute_reset_metro_north_daily_notification
  alias: "Commute — Reset Metro-North Daily Reminder"
  description: Resets the first-departure commute notification latch before the next day.
  triggers:
    - trigger: time
      at: "03:00:00"
  conditions: []
  actions:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.metro_north_commute_notified_today
  mode: single

- id: espresso_maintenance_notification_actions
  alias: "Espresso — Notification Actions"
  description: Handles the quick actions from Profitec GO cleaning reminders.
  triggers:
    - trigger: event
      event_type: mobile_app_notification_action
  conditions:
    - condition: template
      value_template: >
        {{ trigger.event.data.action in [
          'ESPRESSO_WATER_BACKFLUSH_DONE',
          'ESPRESSO_CAFIZA_CLEAN_DONE',
          'ESPRESSO_SNOOZE_TOMORROW'
        ] }}
  actions:
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ trigger.event.data.action == 'ESPRESSO_WATER_BACKFLUSH_DONE' }}"
            - condition: state
              entity_id: binary_sensor.espresso_water_backflush_due
              state: "on"
            - condition: state
              entity_id: binary_sensor.espresso_cafiza_clean_due
              state: "off"
          sequence:
            - action: script.espresso_mark_water_backflush_done
