- id: garbage_recycling_reminders
  alias: "Garbage Recycling - Night Before And Morning Reminders"
  description: Sends North Castle Zone 4 garbage and recycling reminders until the current pickup is marked taken out, with early warnings for holiday-delayed Thursday pickups.
  triggers:
    - trigger: time
      at: "16:30:00"
      id: afternoon
    - trigger: time
      at: "19:00:00"
      id: evening
    - trigger: time
      at: "06:30:00"
      id: morning
  conditions:
    - condition: state
      entity_id: input_boolean.garbage_recycling_reminders_enabled
      state: "on"
  actions:
    - variables:
        pickup: "{{ states('sensor.garbage_recycling_next_pickup') }}"
        scheduled_thursday: "{{ state_attr('sensor.garbage_recycling_next_pickup', 'scheduled_thursday') | default('', true) }}"
        exception: "{{ state_attr('sensor.garbage_recycling_next_pickup', 'exception') | default('', true) }}"
        today: "{{ now().strftime('%Y-%m-%d') }}"
        tomorrow: "{{ (now() + timedelta(days=1)).strftime('%Y-%m-%d') }}"
        taken: "{{ states('input_text.garbage_recycling_last_taken_out_pickup') }}"
        shifted_week_warning: >-
          {{ exception | length > 0
             and scheduled_thursday not in ['unknown', 'unavailable', 'none', '']
             and scheduled_thursday == tomorrow
             and pickup != scheduled_thursday }}
        reminder_stage: >-
          {% if shifted_week_warning | bool and trigger.id == 'afternoon' %}
            delay_notice
          {% elif trigger.id == 'morning' %}
            morning
          {% else %}
            evening
          {% endif %}
        should_send: >-
          {{ pickup not in ['unknown', 'unavailable', 'none', '']
             and taken != pickup
             and (
               (trigger.id == 'afternoon' and (pickup == tomorrow or (shifted_week_warning | bool)))
               or (trigger.id == 'evening' and pickup == tomorrow)
               or (trigger.id == 'morning' and pickup == today)
             ) }}
    - condition: template
      value_template: "{{ should_send }}"
    - action: script.garbage_recycling_send_reminder
      data:
        stage: "{{ reminder_stage | trim }}"
        pickup_date: "{{ pickup }}"
  mode: single

- id: garbage_recycling_notification_actions
  alias: "Garbage Recycling - Notification Actions"
  description: Handles Taken out actions from garbage and recycling reminders.
  triggers:
    - trigger: event
      event_type: mobile_app_notification_action
  conditions:
    - condition: template
      value_template: "{{ trigger.event.data.action == 'GARBAGE_RECYCLING_TAKEN_OUT' }}"
  actions:
    - variables:
        tag: "{{ trigger.event.data.tag | default('', true) }}"
        pickup: >-
          {% if tag[:18] == 'garbage-recycling-' and tag | length >= 28 %}
            {{ tag[-10:] }}
          {% else %}
            {{ states('sensor.garbage_recycling_next_pickup') }}
          {% endif %}
    - action: script.garbage_recycling_mark_taken_out
      data:
        pickup_date: "{{ pickup | trim }}"
  mode: parallel
  max: 5

- id: property_tax_reminders
  alias: "Property Tax - Bill And Due Week Reminders"
  description: Sends bill-ready notices and daily due-week reminders until the matching tax bill is marked paid.
  triggers:
    - trigger: time
      at: "08:55:00"
      id: daily
    - trigger: homeassistant
      event: start
      id: startup
    - trigger: event
      event_type: automation_reloaded
      id: automation_reloaded
  conditions:
    - condition: state
      entity_id: input_boolean.tax_reminders_enabled
      state: "on"
  actions:
    - if:
        - condition: trigger
          id: startup
      then:
        - delay:
            minutes: 2
    - variables:
        today: "{{ now().strftime('%Y-%m-%d') }}"
        school_january_bill_date: "{{ now().year }}-01-01"
        town_bill_date: "{{ now().year }}-04-01"
        school_september_bill_date: "{{ now().year }}-09-01"
        school_january_due: "{{ states('sensor.school_tax_january_due_date') }}"
        town_due: "{{ states('sensor.town_tax_due_date') }}"
        school_september_due: "{{ states('sensor.school_tax_september_due_date') }}"
        school_january_last_paid: "{{ states('input_datetime.school_tax_january_last_paid_at') }}"
        school_september_last_paid: "{{ states('input_datetime.school_tax_september_last_paid_at') }}"
        town_last_paid: "{{ states('input_datetime.town_tax_last_paid_at') }}"
        school_january_paid: >-
          {{ school_january_last_paid not in ['unknown', 'unavailable', 'none', '']
             and school_january_last_paid[:10] >= school_january_bill_date }}
        town_paid: >-
          {{ town_last_paid not in ['unknown', 'unavailable', 'none', '']
             and town_last_paid[:10] >= town_bill_date }}
        school_september_paid: >-
          {{ school_september_last_paid not in ['unknown', 'unavailable', 'none', '']
             and school_september_last_paid[:10] >= school_september_bill_date }}
        school_january_due_week: >-
          {% if school_january_due in ['unknown', 'unavailable', 'none', ''] or now().weekday() >= 5 %}
            false
          {% else %}
            {% set due_date = strptime(school_january_due, '%Y-%m-%d') %}
            {% set today_date = strptime(today, '%Y-%m-%d') %}
            {% set days = (as_timestamp(due_date) - as_timestamp(today_date)) // 86400 %}
            {% set ns = namespace(business_days=0) %}
            {% for offset in range(1, (days | int) + 1) %}
              {% set day = today_date + timedelta(days=offset) %}
              {% if day.weekday() < 5 %}
                {% set ns.business_days = ns.business_days + 1 %}
              {% endif %}
            {% endfor %}
            {{ days >= 0 and days <= 10 and ns.business_days <= 5 }}
          {% endif %}
        town_due_week: >-
          {% if town_due in ['unknown', 'unavailable', 'none', ''] or now().weekday() >= 5 %}
            false
          {% else %}
            {% set due_date = strptime(town_due, '%Y-%m-%d') %}
            {% set today_date = strptime(today, '%Y-%m-%d') %}
            {% set days = (as_timestamp(due_date) - as_timestamp(today_date)) // 86400 %}
            {% set ns = namespace(business_days=0) %}
            {% for offset in range(1, (days | int) + 1) %}
              {% set day = today_date + timedelta(days=offset) %}
              {% if day.weekday() < 5 %}
                {% set ns.business_days = ns.business_days + 1 %}
              {% endif %}
            {% endfor %}
            {{ days >= 0 and days <= 10 and ns.business_days <= 5 }}
          {% endif %}
        school_september_due_week: >-
          {% if school_september_due in ['unknown', 'unavailable', 'none', ''] or now().weekday() >= 5 %}
            false
          {% else %}
            {% set due_date = strptime(school_september_due, '%Y-%m-%d') %}
            {% set today_date = strptime(today, '%Y-%m-%d') %}
            {% set days = (as_timestamp(due_date) - as_timestamp(today_date)) // 86400 %}
            {% set ns = namespace(business_days=0) %}
            {% for offset in range(1, (days | int) + 1) %}
              {% set day = today_date + timedelta(days=offset) %}
              {% if day.weekday() < 5 %}
                {% set ns.business_days = ns.business_days + 1 %}
              {% endif %}
            {% endfor %}
            {{ days >= 0 and days <= 10 and ns.business_days <= 5 }}
          {% endif %}
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ today == school_january_bill_date and not school_january_paid }}"
          sequence:
            - action: script.property_tax_send_reminder
              data:
                tax_type: school
                bill_month: 1
                stage: bill_ready
                due_date: "{{ school_january_due }}"

        - conditions:
            - condition: template
              value_template: "{{ (school_january_due_week | trim | lower) == 'true' and not school_january_paid }}"
          sequence:
            - action: script.property_tax_send_reminder
              data:
                tax_type: school
                bill_month: 1
                stage: countdown
                due_date: "{{ school_january_due }}"

        - conditions:
            - condition: template
              value_template: "{{ today == town_bill_date and not town_paid }}"
          sequence:
            - action: script.property_tax_send_reminder
              data:
                tax_type: town
                bill_month: 4
                stage: bill_ready
                due_date: "{{ town_due }}"

        - conditions:
            - condition: template
              value_template: "{{ (town_due_week | trim | lower) == 'true' and not town_paid }}"
          sequence:
            - action: script.property_tax_send_reminder
              data:
                tax_type: town
                bill_month: 4
                stage: countdown
                due_date: "{{ town_due }}"

        - conditions:
            - condition: template
              value_template: "{{ today == school_september_bill_date and not school_september_paid }}"
          sequence:
            - action: script.property_tax_send_reminder
              data:
                tax_type: school
                bill_month: 9
                stage: bill_ready
                due_date: "{{ school_september_due }}"

        - conditions:
            - condition: template
              value_template: "{{ (school_september_due_week | trim | lower) == 'true' and not school_september_paid }}"
          sequence:
            - action: script.property_tax_send_reminder
              data:
                tax_type: school
                bill_month: 9
                stage: countdown
                due_date: "{{ school_september_due }}"
  mode: single

