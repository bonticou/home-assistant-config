- id: '1768872479153'
  alias: Noise Detection - Wynn's Room
  description: Notify when the Wynn's Room camera hears a baby cry for 5 seconds.
  triggers:
  - trigger: state
    entity_id: binary_sensor.wynn_s_room_baby_cry_detected
    to: 'on'
    for:
      hours: 0
      minutes: 0
      seconds: 5
  conditions:
  - condition: zone
    entity_id: person.bonticou
    zone: zone.home
  actions:
  - action: notify.mobile_app_tk_iphone_16_pro
    metadata: {}
    data:
      message: Check on Wynn
      title: Noise Detected
  mode: single

- id: camera_latest_motion_tracker
  alias: "Cameras - Latest Motion Tracker"
  description: Stores the most recent real camera motion-style event for the Home header.
  triggers:
    - trigger: event
      event_type: state_changed
  conditions:
    - condition: template
      value_template: >-
        {% set entity = trigger.event.data.entity_id | default('') %}
        {% set new = trigger.event.data.new_state %}
        {% set old = trigger.event.data.old_state %}
        {% set motion_sources = {
          'binary_sensor.g6_instant_motion': 'Play Room',
          'binary_sensor.g6_instant_motion_2': 'Front Yard',
          'binary_sensor.wynn_s_room_motion': "Wynn's Room",
          'binary_sensor.wynn_s_room_person_detected': "Wynn's Room",
          'binary_sensor.mud_room_motion': 'Mud Room',
          'binary_sensor.mud_room_person_detected': 'Mud Room'
        } %}
        {% if entity.startswith('binary_sensor.') and new is not none and new.state == 'on' and (old is none or old.state != 'on') %}
          {{ entity in motion_sources }}
        {% else %}
          false
        {% endif %}
  actions:
    - variables:
        entity: "{{ trigger.event.data.entity_id }}"
        label: >-
          {% set motion_sources = {
            'binary_sensor.g6_instant_motion': 'Play Room',
            'binary_sensor.g6_instant_motion_2': 'Front Yard',
            'binary_sensor.wynn_s_room_motion': "Wynn's Room",
            'binary_sensor.wynn_s_room_person_detected': "Wynn's Room",
            'binary_sensor.mud_room_motion': 'Mud Room',
            'binary_sensor.mud_room_person_detected': 'Mud Room'
          } %}
          {{ motion_sources.get(entity, state_attr(entity, 'friendly_name') or entity) }}
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.latest_camera_motion_at
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
    - action: input_text.set_value
      target:
        entity_id: input_text.latest_camera_motion_label
      data:
        value: "{{ label }}"
    - action: input_text.set_value
      target:
        entity_id: input_text.latest_camera_motion_entity
      data:
        value: "{{ entity }}"
  mode: queued
  max: 20

- id: water_overnight_continuous_flow
  alias: "Water — Overnight Continuous Flow (Running Toilet)"
  description: >
    Detects small sustained flow overnight when no one should be using water.
    Primary indicator of a running toilet or dripping fixture.
  triggers:
    - trigger: numeric_state
      entity_id: sensor.flo_shutoff_water_flow_rate
      above: 0.05
      for:
        minutes: 10
  conditions:
    - condition: time
      after: "00:00:00"
      before: "06:00:00"
  actions:
    - action: script.water_send_alert
      data:
        alert_kind: overnight_flow
        message: >
          Flow has been {{ states('sensor.flo_shutoff_water_flow_rate') }} gal/min
          for 10+ minutes. Possible running toilet or dripping fixture.
          Check Water tab in HA.
  mode: single

- id: water_daytime_sustained_flow
  alias: "Water — Daytime Sustained Low Flow"
  description: >
    Detects continuous low-level flow during the day for 20+ minutes.
    Accounts for normal household activity but flags potential running toilet.
  triggers:
    - trigger: numeric_state
      entity_id: sensor.flo_shutoff_water_flow_rate
      above: 0.1
      for:
        minutes: 20
  conditions:
    - condition: time
      after: "06:00:00"
      before: "23:59:59"
  actions:
    - action: script.water_send_alert
      data:
        alert_kind: sustained_flow
        message: >
          Water has been flowing at
          {{ states('sensor.flo_shutoff_water_flow_rate') }} gal/min
          for 20+ minutes. Could be a running toilet or left-on fixture.
  mode: single

- id: water_burst_daytime
  alias: "Water — High Flow Burst (Daytime)"
  description: Immediate alert for potential pipe burst during the day.
  triggers:
    - trigger: numeric_state
      entity_id: sensor.flo_shutoff_water_flow_rate
      above: 8
      for:
        minutes: 1
  conditions:
    - condition: time
      after: "06:00:00"
      before: "23:59:59"
  actions:
    - action: script.water_send_alert
      data:
        alert_kind: burst_day
        severity: critical
        message: >
          Flow rate is {{ states('sensor.flo_shutoff_water_flow_rate') }} gal/min
          well above normal. Possible pipe burst. Check immediately or shut off
          valve in HA Water tab.
  mode: single

- id: water_burst_overnight
  alias: "Water — High Flow Burst (Overnight)"
  description: Immediate critical alert for any significant flow overnight.
  triggers:
    - trigger: numeric_state
      entity_id: sensor.flo_shutoff_water_flow_rate
      above: 5
      for:
        minutes: 1
  conditions:
    - condition: time
      after: "00:00:00"
      before: "06:00:00"
  actions:
    - action: script.water_send_alert
      data:
        alert_kind: burst_night
        severity: critical
        message: >
          URGENT: Flow rate is {{ states('sensor.flo_shutoff_water_flow_rate') }} gal/min
          at {{ now().strftime('%I:%M %p') }}. No one should be using water.
          Possible pipe burst, consider shutting off valve immediately.
  mode: single

- id: water_pressure_drop_sudden
  alias: "Water — Pressure Drop (Sudden)"
  description: Early warning when water pressure falls sharply while the valve is open.
  triggers:
    - trigger: numeric_state
      entity_id: sensor.flo_shutoff_water_pressure
      below: 50
      for:
        minutes: 1
  conditions:
    - condition: state
      entity_id: switch.flo_shutoff_shutoff_valve
      state: "on"
    - condition: template
      value_template: >-
        {% set previous_pressure = trigger.from_state.state | float(0) if trigger.from_state is not none else 0 %}
        {% set current_pressure = states('sensor.flo_shutoff_water_pressure') | float(0) %}
        {{ previous_pressure - current_pressure >= 12 }}
  actions:
    - variables:
        previous_pressure: >-
          {{ trigger.from_state.state | float(0) | round(0) if trigger.from_state is not none else 0 }}
        current_pressure: "{{ states('sensor.flo_shutoff_water_pressure') | float(0) | round(0) }}"
        current_flow: "{{ states('sensor.flo_shutoff_water_flow_rate') | float(0) | round(2) }}"
        pressure_drop: >-
          {% set previous_pressure = trigger.from_state.state | float(0) if trigger.from_state is not none else 0 %}
          {% set current_pressure = states('sensor.flo_shutoff_water_pressure') | float(0) %}
          {{ (previous_pressure - current_pressure) | round(0) }}
    - action: script.water_send_alert
      data:
        alert_kind: pressure_drop
        message: >-
          Pressure fell from {{ previous_pressure }} psi to {{ current_pressure }} psi
          (down {{ pressure_drop }} psi) with flow at {{ current_flow }} gal/min.
          This was a sudden drop below 50 psi. Check for a developing water issue.{% if current_flow | float(0) > 1.5 %} Sprinklers on?{% endif %}
  mode: single

- id: water_low_pressure
  alias: "Water — Low Pressure"
  description: Sustained low pressure indicates pump issues, blockage, or large leak.
  triggers:
    - trigger: numeric_state
      entity_id: sensor.flo_shutoff_water_pressure
      below: 40
      for:
        minutes: 5
  conditions:
    - condition: state
      entity_id: switch.flo_shutoff_shutoff_valve
      state: "on"
  actions:
    - variables:
        current_pressure: "{{ states('sensor.flo_shutoff_water_pressure') | float(0) | round(0) }}"
        current_flow: "{{ states('sensor.flo_shutoff_water_flow_rate') | float(0) | round(2) }}"
    - action: script.water_send_alert
      data:
        alert_kind: low_pressure
        message: >-
          Pressure is down to {{ current_pressure }} psi with flow at {{ current_flow }} gal/min.
          It has stayed below 40 psi for 5+ minutes. Could indicate pump issue,
          blockage, or a significant leak.{% if current_flow | float(0) > 1.5 %} Sprinklers on?{% endif %}
  mode: single

- id: water_high_pressure
  alias: "Water — High Pressure"
  description: High pressure strains pipes and appliances. PRV may have failed.
  triggers:
    - trigger: numeric_state
      entity_id: sensor.flo_shutoff_water_pressure
      above: 80
      for:
        minutes: 5
  conditions: []
  actions:
    - action: script.water_send_alert
      data:
        alert_kind: high_pressure
        message: >
          Pressure is {{ states('sensor.flo_shutoff_water_pressure') }} psi
          above safe limit of 80 psi. Check pressure reducing valve (PRV).
  mode: single

- id: water_daily_usage_high
  alias: "Water — High Daily Usage"
  description: Evening check for abnormally high daily consumption.
  triggers:
    - trigger: time
      at: "20:00:00"
  conditions:
    - condition: numeric_state
      entity_id: sensor.flo_shutoff_today_s_water_usage
      above: 400
  actions:
    - action: script.water_send_alert
      data:
        alert_kind: usage_high
        message: >
          Today's usage is {{ states('sensor.flo_shutoff_today_s_water_usage') }} gal
          above the 400 gal threshold. Review the Water tab for unusual flow periods.
  mode: single

- id: water_leak_sensor_triggered
  alias: "Water — Leak Sensor Triggered"
  description: Immediate alert if any zone leak sensor detects water.
  triggers:
    - trigger: state
      entity_id:
        - binary_sensor.kitchen_sink_leak_detection_water_detected
        - binary_sensor.island_sink_leak_detection_water_detected
        - binary_sensor.dishwasher_leak_detection_water_detected
        - binary_sensor.kitchen_fridge_leak_detection_water_detected
        - binary_sensor.washing_machine_leak_detection_water_detected
        - binary_sensor.laundry_sink_leak_detection_water_detected
        - binary_sensor.mechanical_room_leak_detection_water_detected
        - binary_sensor.electrical_room_leak_detection_water_detected
        - binary_sensor.basement_ejector_leak_detection_water_detected
      to: "on"
  conditions: []
  actions:
    - action: script.water_send_alert
      data:
        alert_kind: leak
        severity: critical
        message: >
          Water detected at {{ trigger.to_state.attributes.friendly_name }}
          at {{ now().strftime('%I:%M %p') }}. Check immediately.
          Shut off valve from HA Water tab if needed.
  mode: parallel
  max: 10

- id: water_shutoff_valve_closed
  alias: "Water — Shutoff Valve Closed"
  description: Alert if the shutoff valve closes for any reason.
  triggers:
    - trigger: state
      entity_id: switch.flo_shutoff_shutoff_valve
      to: "off"
  conditions: []
  actions:
    - action: script.water_send_alert
      data:
        alert_kind: valve_closed
        severity: critical
        message: >
          The Flo shutoff valve has closed at {{ now().strftime('%I:%M %p') }}.
          If this was not intentional, check the Flo app and HA Water tab.
  mode: single

- id: water_flo_system_alert
  alias: "Water — Flo System Alert"
  description: Passes through any native Flo system alerts to your phone.
  triggers:
    - trigger: state
      entity_id: binary_sensor.flo_shutoff_pending_system_alerts
      to: "on"
  conditions: []
  actions:
    - action: script.water_send_alert
      data:
        alert_kind: flo_system
        message: Flo has flagged a system alert. Check the Flo app for details.
  mode: single

- id: door_lights_schedule_sync
  alias: "Lights — Door Lights Schedule Sync"
  description: Keep the front door lights synced to the adaptive sun-elevation evening schedule and restore the correct state on startup.
  triggers:
    - trigger: homeassistant
      event: start
    - trigger: state
      entity_id: binary_sensor.door_lights_schedule_active
      to: "on"
    - trigger: state
      entity_id: binary_sensor.door_lights_schedule_active
      to: "off"
  actions:
    - choose:
        - conditions:
            - condition: state
              entity_id: binary_sensor.door_lights_schedule_active
              state: "on"
          sequence:
            - action: script.door_lights_schedule_on
      default:
        - action: script.door_lights_schedule_off
  mode: single

- id: front_stairs_schedule_sync
  alias: "Lights — Front Stairs Schedule Sync"
  description: Keep the front stairs light synced to the adaptive sun-elevation evening schedule, while honoring the bedtime 4 percent override until the overnight schedule ends.
  triggers:
    - trigger: homeassistant
      event: start
    - trigger: time_pattern
      minutes: "/15"
    - trigger: state
      entity_id: binary_sensor.front_stairs_schedule_active
      to: "on"
    - trigger: state
      entity_id: binary_sensor.front_stairs_schedule_active
      to: "off"
  actions:
    - choose:
        - conditions:
            - condition: state
              entity_id: binary_sensor.front_stairs_schedule_active
              state: "on"
          sequence:
            - action: script.front_stairs_schedule_on
      default:
        - action: script.front_stairs_schedule_off
        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.front_stairs_sleep_override
  mode: single

- id: foyer_chandelier_schedule_sync
  alias: "Lights — Foyer Chandelier Schedule Sync"
  description: Keep the foyer chandelier synced to the front stairs evening schedule while honoring the bedtime hold for the rest of the night.
  triggers:
    - trigger: homeassistant
      event: start
      id: startup
    - trigger: time_pattern
      minutes: "/15"
      id: refresh
    - trigger: state
      entity_id: binary_sensor.front_stairs_schedule_active
      to: "on"
      id: schedule_on
    - trigger: state
      entity_id: binary_sensor.front_stairs_schedule_active
      to: "off"
      for:
        minutes: 2
      id: schedule_off
  actions:
    - choose:
        - conditions:
            - condition: trigger
              id: schedule_off
            - condition: state
              entity_id: sun.sun
              state: "above_horizon"
          sequence:
            - action: script.foyer_chandelier_schedule_off
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.foyer_chandelier_sleep_hold
        - conditions:
            - condition: trigger
              id: schedule_on
            - condition: state
              entity_id: input_boolean.foyer_chandelier_sleep_hold
              state: "off"
          sequence:
            - action: script.foyer_chandelier_schedule_on
        - conditions:
            - condition: trigger
              id: startup
            - condition: state
              entity_id: binary_sensor.front_stairs_schedule_active
              state: "off"
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.foyer_chandelier_sleep_hold
        - conditions:
            - condition: state
              entity_id: binary_sensor.front_stairs_schedule_active
              state: "on"
            - condition: state
              entity_id: input_boolean.foyer_chandelier_sleep_hold
              state: "off"
          sequence:
            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ trigger.id == 'startup' }}"
                  sequence:
                    - action: script.foyer_chandelier_schedule_on
                - conditions:
                    - condition: trigger
                      id: refresh
                    - condition: state
                      entity_id: light.front_foyer_chandelier
                      state: "on"
                  sequence:
                    - action: script.foyer_chandelier_schedule_on
  mode: single

- id: away_security_unsecured_reminder
  alias: "Security — House Unsecured While Away"
  description: >
    Reminds Trevor when both Trevor and Casey are away while the garage door is
    unlocked or lights are still on. Reminder can be snoozed from the push.
  triggers:
    - trigger: state
      entity_id: binary_sensor.house_unsecured_while_away
      to: "on"
      id: became_unsecured
    - trigger: homeassistant
      event: start
      id: startup
    - trigger: event
      event_type: automation_reloaded
      id: automation_reloaded
    - trigger: state
      entity_id: device_tracker.unifi_default_42_15_78_4a_d9_f8
      not_from:
        - "unknown"
        - "unavailable"
      not_to:
        - "unknown"
        - "unavailable"
      id: casey_departed
    - trigger: state
      entity_id: device_tracker.tk_iphone_16_pro
      not_from:
        - "unknown"
        - "unavailable"
      not_to:
        - "unknown"
        - "unavailable"
      id: trevor_departed
    - trigger: state
      entity_id: sensor.away_security_issue_summary
      id: issue_changed
    - trigger: time_pattern
      minutes: "/15"
      id: repeat
  conditions:
    - condition: template
      value_template: >
        {% set snooze = states('input_datetime.away_security_snooze_until') %}
        {{ snooze in ['unknown', 'unavailable', '']
           or as_timestamp(snooze, 0) <= as_timestamp(now()) }}
  actions:
    - if:
        - condition: template
          value_template: "{{ trigger.id == 'startup' }}"
      then:
        - delay:
            seconds: 15
    - variables:
        trevor_state: "{{ states('device_tracker.tk_iphone_16_pro') }}"
        casey_state: "{{ states('device_tracker.unifi_default_42_15_78_4a_d9_f8') }}"
        trevor_away: "{{ trevor_state not in ['home', 'unknown', 'unavailable', ''] }}"
        casey_away: "{{ casey_state not in ['home', 'unknown', 'unavailable', ''] }}"
        use_casey_context: >
          {{ trigger.id == 'casey_departed'
             and trigger.from_state is not none
             and trigger.to_state is not none
             and trigger.from_state.state == 'home'
             and trigger.to_state.state not in ['home', 'unknown', 'unavailable', ''] }}
        garage_unlocked: "{{ is_state('lock.aqara_smart_lock_u100', 'unlocked') }}"
        daylight: "{{ is_state('sun.sun', 'above_horizon') }}"
        active_lights_on: >
          {{ states('sensor.away_security_active_lights') | int(0) > 0 }}
        home_unsecured: >
          {{ trevor_away | bool
             and casey_away | bool
             and (garage_unlocked | bool or active_lights_on | bool) }}
    - if:
        - condition: template
          value_template: "{{ home_unsecured | bool }}"
      then:
        - choose:
            - conditions:
                - condition: template
                  value_template: >
                    {{ use_casey_context | bool
                       and daylight | bool
                       and garage_unlocked | bool
                       and active_lights_on | bool }}
              sequence:
                - action: script.casey_left_combo_send_alert
            - conditions:
                - condition: template
                  value_template: "{{ use_casey_context | bool and garage_unlocked | bool }}"
              sequence:
                - action: script.casey_left_garage_send_alert
            - conditions:
                - condition: template
                  value_template: >
                    {{ use_casey_context | bool
                       and daylight | bool
                       and active_lights_on | bool }}
              sequence:
                - action: script.casey_left_lights_send_alert
          default:
            - action: script.away_security_send_alert
  mode: restart

- id: away_security_notification_actions
  alias: "Security — Away Reminder Actions"
  description: Handles quick actions from the away-security push notification.
  triggers:
    - trigger: event
      event_type: mobile_app_notification_action
  conditions:
    - condition: template
      value_template: >
        {{ trigger.event.data.action in [
          'LOCK_AWAY_GARAGE',
          'LOCK_CASEY_LEFT_GARAGE',
          'SECURE_CASEY_LEFT_HOME',
          'TURN_OFF_AWAY_LIGHTS',
          'TURN_OFF_CASEY_LEFT_LIGHTS',
          'SNOOZE_AWAY_SECURITY_30',
          'SNOOZE_AWAY_SECURITY_120'
        ] }}
  actions:
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ trigger.event.data.action == 'SECURE_CASEY_LEFT_HOME' }}"
          sequence:
            - if:
                - condition: state
                  entity_id: lock.aqara_smart_lock_u100
                  state: unlocked
              then:
                - action: lock.lock
                  target:
                    entity_id: lock.aqara_smart_lock_u100
            - variables:
                active_lights: >
                  {% set light_ids = state_attr('sensor.away_security_active_lights', 'entity_ids') | default('', true) %}
                  {{ (light_ids.split('||') if light_ids else []) | reject('eq', '') | list }}
            - repeat:
                for_each: "{{ active_lights }}"
                sequence:
                  - action: light.turn_off
                    target:
                      entity_id: "{{ repeat.item }}"
            - delay:
                seconds: 2
            - action: script.casey_left_combo_clear_alert
            - action: script.casey_left_garage_clear_alert
            - action: script.casey_left_lights_clear_alert
            - if:
                - condition: template
                  value_template: >
                    {% set trevor_state = states('device_tracker.tk_iphone_16_pro') %}
                    {% set casey_state = states('device_tracker.unifi_default_42_15_78_4a_d9_f8') %}
                    {% set trevor_away = trevor_state not in ['home', 'unknown', 'unavailable', ''] %}
                    {% set casey_away = casey_state not in ['home', 'unknown', 'unavailable', ''] %}
                    {% set lights_on = states('sensor.away_security_active_lights') | int(0) > 0 %}
                    {{ trevor_away and casey_away and
                       (is_state('lock.aqara_smart_lock_u100', 'unlocked') or lights_on) }}
              then:
                - action: script.away_security_send_alert
              else:
                - action: script.away_security_clear_alert

        - conditions:
            - condition: template
              value_template: "{{ trigger.event.data.action in ['LOCK_AWAY_GARAGE', 'LOCK_CASEY_LEFT_GARAGE'] }}"
          sequence:
            - if:
                - condition: state
                  entity_id: lock.aqara_smart_lock_u100
                  state: unlocked
              then:
                - action: lock.lock
                  target:
                    entity_id: lock.aqara_smart_lock_u100
            - delay:
                seconds: 2
            - action: script.casey_left_garage_clear_alert
            - if:
                - condition: template
                  value_template: >
                    {% set trevor_state = states('device_tracker.tk_iphone_16_pro') %}
                    {% set casey_state = states('device_tracker.unifi_default_42_15_78_4a_d9_f8') %}
                    {% set trevor_away = trevor_state not in ['home', 'unknown', 'unavailable', ''] %}
                    {% set casey_away = casey_state not in ['home', 'unknown', 'unavailable', ''] %}
                    {% set lights_on = states('sensor.away_security_active_lights') | int(0) > 0 %}
                    {{ trevor_away and casey_away and
                       (is_state('lock.aqara_smart_lock_u100', 'unlocked') or lights_on) }}
              then:
                - action: script.away_security_send_alert
              else:
                - action: script.away_security_clear_alert

        - conditions:
            - condition: template
              value_template: "{{ trigger.event.data.action in ['TURN_OFF_AWAY_LIGHTS', 'TURN_OFF_CASEY_LEFT_LIGHTS'] }}"
          sequence:
            - variables:
                active_lights: >
                  {% set light_ids = state_attr('sensor.away_security_active_lights', 'entity_ids') | default('', true) %}
                  {{ (light_ids.split('||') if light_ids else []) | reject('eq', '') | list }}
            - repeat:
                for_each: "{{ active_lights }}"
                sequence:
                  - action: light.turn_off
                    target:
                      entity_id: "{{ repeat.item }}"
            - delay:
                seconds: 2
            - action: script.casey_left_lights_clear_alert
            - if:
                - condition: template
                  value_template: >
                    {% set trevor_state = states('device_tracker.tk_iphone_16_pro') %}
                    {% set casey_state = states('device_tracker.unifi_default_42_15_78_4a_d9_f8') %}
                    {% set trevor_away = trevor_state not in ['home', 'unknown', 'unavailable', ''] %}
                    {% set casey_away = casey_state not in ['home', 'unknown', 'unavailable', ''] %}
                    {% set lights_on = states('sensor.away_security_active_lights') | int(0) > 0 %}
                    {{ trevor_away and casey_away and
                       (is_state('lock.aqara_smart_lock_u100', 'unlocked') or lights_on) }}
              then:
                - action: script.away_security_send_alert
              else:
                - action: script.away_security_clear_alert

        - conditions:
            - condition: template
              value_template: "{{ trigger.event.data.action == 'SNOOZE_AWAY_SECURITY_30' }}"
          sequence:
            - action: input_datetime.set_datetime
              target:
                entity_id: input_datetime.away_security_snooze_until
              data:
                datetime: "{{ (now() + timedelta(minutes=30)).strftime('%Y-%m-%d %H:%M:%S') }}"
            - action: script.away_security_clear_alert
            - action: notify.mobile_app_tk_iphone_16_pro
              data:
                title: House reminder sleeping
                message: Away security reminders paused for 30 minutes.
                data:
                  tag: away-security-snooze

        - conditions:
            - condition: template
              value_template: "{{ trigger.event.data.action == 'SNOOZE_AWAY_SECURITY_120' }}"
          sequence:
            - action: input_datetime.set_datetime
              target:
                entity_id: input_datetime.away_security_snooze_until
              data:
                datetime: "{{ (now() + timedelta(hours=2)).strftime('%Y-%m-%d %H:%M:%S') }}"
            - action: script.away_security_clear_alert
            - action: notify.mobile_app_tk_iphone_16_pro
              data:
                title: House reminder sleeping
                message: Away security reminders paused for 2 hours.
                data:
                  tag: away-security-snooze
  mode: parallel
  max: 10
- id: away_security_clear_when_resolved
