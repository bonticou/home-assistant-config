- id: away_motion_security_activity_detected
  alias: "Security — Motion While Everyone Away"
  description: High-sensitivity alert for interior or garage motion after both household phones are away.
  triggers:
    - trigger: state
      entity_id:
        - binary_sensor.g6_instant_motion
        - binary_sensor.wynn_s_room_motion
        - binary_sensor.wynn_s_room_person_detected
        - binary_sensor.mud_room_motion
        - binary_sensor.mud_room_person_detected
        - binary_sensor.mechanical_room_motion
        - binary_sensor.mechanical_room_person_detected
        - binary_sensor.dining_room_motion
        - binary_sensor.dining_room_occupancy
        - binary_sensor.office_motion
        - binary_sensor.office_occupancy
        - binary_sensor.master_motion_2
        - binary_sensor.master_occupancy_2
        - binary_sensor.master_sensor_new_motion_2
        - binary_sensor.master_sensor_new_occupancy_2
        - binary_sensor.wynn_room_motion
        - binary_sensor.wynn_room_occupancy
        - binary_sensor.g6_instant_motion_3
        - binary_sensor.garage_person_detected
        - binary_sensor.garage_vehicle_detected
        - binary_sensor.ratgdo32disco_c26634_motion
        - binary_sensor.ratgdo32disco_c26634_vehicle_arriving
        - binary_sensor.ratgdo32disco_c26634_vehicle_leaving
        - binary_sensor.ratgdo32_4536e8_motion
      to: "on"
  conditions:
    - condition: template
      value_template: >
        {{ trigger.from_state is not none
           and trigger.from_state.state not in ['on', 'unknown', 'unavailable', ''] }}
    - condition: template
      value_template: >
        {% set trevor_away = states('device_tracker.tk_iphone_16_pro') not in ['home', 'unknown', 'unavailable', ''] %}
        {% set casey_away = states('device_tracker.unifi_default_42_15_78_4a_d9_f8') not in ['home', 'unknown', 'unavailable', ''] %}
        {{ trevor_away and casey_away }}
    - condition: template
      value_template: >
        {{ is_state('binary_sensor.downstairs_everyone_away', 'on')
           and (as_timestamp(now()) - as_timestamp(states.binary_sensor.downstairs_everyone_away.last_changed, 0)) >= 300 }}
    - condition: template
      value_template: >
        {% set snooze = states('input_datetime.away_motion_security_snooze_until') %}
        {{ snooze in ['unknown', 'unavailable', '']
           or as_timestamp(snooze, 0) <= as_timestamp(now()) }}
  actions:
    - action: script.away_motion_security_send_alert
      data:
        motion_entity: "{{ trigger.entity_id }}"
  mode: queued
  max: 10

- id: away_motion_security_clear_when_home
  alias: "Security — Clear Away Motion Alert When Home"
  description: Clears away motion security notifications and re-arms temporary guest pauses when a household phone returns home.
  triggers:
    - trigger: state
      entity_id:
        - device_tracker.tk_iphone_16_pro
        - device_tracker.unifi_default_42_15_78_4a_d9_f8
      to: home
  conditions: []
  actions:
    - action: script.away_motion_security_resume
  mode: single

- id: garage_security_open_while_person_away
  alias: "Garage — Open While Person Away"
  description: >
    Notifies Trevor when either garage door is open while exactly one household
    person is away. Everyone-away cases stay in the away-security guardrail.
  triggers:
    - trigger: state
      entity_id: binary_sensor.away_security_garage_door_open
      to: "on"
      id: garage_opened
    - trigger: state
      entity_id: device_tracker.tk_iphone_16_pro
      not_from:
        - "unknown"
        - "unavailable"
      not_to:
        - "unknown"
        - "unavailable"
      id: trevor_presence
    - trigger: state
      entity_id: device_tracker.unifi_default_42_15_78_4a_d9_f8
      not_from:
        - "unknown"
        - "unavailable"
      not_to:
        - "unknown"
        - "unavailable"
      id: casey_presence
    - trigger: time_pattern
      minutes: "/15"
      id: repeat
  conditions:
    - condition: state
      entity_id: binary_sensor.away_security_garage_door_open
      state: "on"
    - condition: template
      value_template: >
        {% set snooze = states('input_datetime.garage_security_snooze_until') %}
        {{ snooze in ['unknown', 'unavailable', '']
           or as_timestamp(snooze, 0) <= as_timestamp(now()) }}
  actions:
    - variables:
        trevor_state: "{{ states('device_tracker.tk_iphone_16_pro') }}"
        casey_state: "{{ states('device_tracker.unifi_default_42_15_78_4a_d9_f8') }}"
        trevor_away: "{{ trevor_state not in ['home', 'unknown', 'unavailable', ''] }}"
        casey_away: "{{ casey_state not in ['home', 'unknown', 'unavailable', ''] }}"
        trevor_home: "{{ trevor_state == 'home' }}"
        casey_home: "{{ casey_state == 'home' }}"
        trigger_is_departure: >
          {{ trigger.id in ['trevor_presence', 'casey_presence']
             and trigger.from_state is not none
             and trigger.to_state is not none
             and trigger.from_state.state == 'home'
             and trigger.to_state.state not in ['home', 'unknown', 'unavailable', ''] }}
        trigger_is_garage_or_repeat: "{{ trigger.id in ['garage_opened', 'repeat'] }}"
        repeat_is_due: >
          {{ trigger.id != 'repeat'
             or (as_timestamp(now()) - as_timestamp(states.binary_sensor.away_security_garage_door_open.last_changed, 0)) >= 900 }}
    - condition: template
      value_template: >
        {{ repeat_is_due | bool
           and (trigger_is_departure | bool or trigger_is_garage_or_repeat | bool)
           and ((trevor_away | bool and casey_home | bool)
                or (casey_away | bool and trevor_home | bool)) }}
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ trevor_away | bool and casey_home | bool }}"
          sequence:
            - action: script.garage_security_send_alert
              data:
                alert_kind: trevor_away
        - conditions:
            - condition: template
              value_template: "{{ casey_away | bool and trevor_home | bool }}"
          sequence:
            - action: script.garage_security_send_alert
              data:
                alert_kind: casey_away
  mode: restart

- id: garage_security_open_too_long
  alias: "Garage — Open Too Long"
  description: Low-noise reminder when either ratgdo garage door stays open while someone is home.
  triggers:
    - trigger: state
      entity_id:
        - cover.ratgdo32disco_c26634_door
        - cover.ratgdo32_4536e8_door
      to: "open"
      for:
        minutes: 30
      id: open_30
    - trigger: time_pattern
      minutes: "/30"
      id: repeat
  conditions:
    - condition: state
      entity_id: binary_sensor.away_security_garage_door_open
      state: "on"
    - condition: template
      value_template: >
        {{ is_state('device_tracker.tk_iphone_16_pro', 'home')
           and is_state('device_tracker.unifi_default_42_15_78_4a_d9_f8', 'home') }}
    - condition: template
      value_template: >
        {% set snooze = states('input_datetime.garage_security_snooze_until') %}
        {{ snooze in ['unknown', 'unavailable', '']
           or as_timestamp(snooze, 0) <= as_timestamp(now()) }}
    - condition: template
      value_template: >
        {% set minutes_now = now().hour * 60 + now().minute %}
        {{ minutes_now >= 360 and minutes_now < 1350 }}
    - condition: template
      value_template: >
        {{ trigger.id != 'repeat'
           or (as_timestamp(now()) - as_timestamp(states.binary_sensor.away_security_garage_door_open.last_changed, 0)) >= 1800 }}
  actions:
    - action: script.garage_security_send_alert
      data:
        alert_kind: open_too_long
        garage_cover: "{{ trigger.entity_id if trigger.id == 'open_30' else state_attr('binary_sensor.away_security_garage_door_open', 'primary_open_entity') }}"
  mode: single

- id: garage_security_open_at_night
  alias: "Garage — Open At Night"
  description: Higher-priority reminder when either ratgdo garage door is open during the overnight window.
  triggers:
    - trigger: time
      at: "22:30:00"
      id: bedtime_check
    - trigger: time_pattern
      minutes: "/15"
      id: repeat
  conditions:
    - condition: state
      entity_id: binary_sensor.away_security_garage_door_open
      state: "on"
    - condition: template
      value_template: >
        {% set snooze = states('input_datetime.garage_security_snooze_until') %}
        {{ snooze in ['unknown', 'unavailable', '']
           or as_timestamp(snooze, 0) <= as_timestamp(now()) }}
    - condition: template
      value_template: >
        {% set minutes_now = now().hour * 60 + now().minute %}
        {{ minutes_now >= 1350 or minutes_now < 360 }}
    - condition: template
      value_template: >
        {{ is_state('device_tracker.tk_iphone_16_pro', 'home')
           and is_state('device_tracker.unifi_default_42_15_78_4a_d9_f8', 'home') }}
  actions:
    - action: script.garage_security_send_alert
      data:
        alert_kind: open_at_night
  mode: single

- id: entry_security_mudroom_unlocked_at_night
  alias: "Security — Mudroom Unlocked At Night"
  description: Reminds Trevor when the mudroom door is unlocked during the overnight window.
  triggers:
    - trigger: time
      at: "22:30:00"
      id: bedtime_check
    - trigger: state
      entity_id: lock.mudroom_door_lock
      to: "unlocked"
      id: unlocked
    - trigger: homeassistant
      event: start
      id: startup
    - trigger: event
      event_type: automation_reloaded
      id: automation_reloaded
    - trigger: time_pattern
      minutes: "/15"
      id: repeat
  conditions:
    - condition: state
      entity_id: lock.mudroom_door_lock
      state: "unlocked"
    - condition: template
      value_template: >
        {% set snooze = states('input_datetime.entry_security_snooze_until') %}
        {{ snooze in ['unknown', 'unavailable', '']
           or as_timestamp(snooze, 0) <= as_timestamp(now()) }}
    - condition: template
      value_template: >
        {% set minutes_now = now().hour * 60 + now().minute %}
        {{ minutes_now >= 1350 or minutes_now < 360 }}
    - condition: template
      value_template: >
        {% set trevor_away = states('device_tracker.tk_iphone_16_pro') not in ['home', 'unknown', 'unavailable', ''] %}
        {% set casey_away = states('device_tracker.unifi_default_42_15_78_4a_d9_f8') not in ['home', 'unknown', 'unavailable', ''] %}
        {{ not (trevor_away and casey_away) }}
  actions:
    - if:
        - condition: template
          value_template: "{{ trigger.id == 'startup' }}"
      then:
        - delay:
            seconds: 15
    - action: script.entry_security_send_alert
      data:
        alert_kind: mudroom_unlocked_at_night
  mode: single

- id: garage_security_opened_overnight
  alias: "Garage — Opened Overnight"
  description: Immediate alert when either ratgdo garage door opens overnight without a recent arrival home.
  triggers:
    - trigger: state
      entity_id:
        - cover.ratgdo32disco_c26634_door
        - cover.ratgdo32_4536e8_door
      from: "closed"
      to: "opening"
      id: opening
    - trigger: state
      entity_id:
        - cover.ratgdo32disco_c26634_door
        - cover.ratgdo32_4536e8_door
      from: "closed"
      to: "open"
      id: open
  conditions:
    - condition: template
      value_template: >
        {% set minutes_now = now().hour * 60 + now().minute %}
        {{ minutes_now >= 1380 or minutes_now < 360 }}
    - condition: template
      value_template: >
        {% set snooze = states('input_datetime.garage_security_snooze_until') %}
        {{ snooze in ['unknown', 'unavailable', '']
           or as_timestamp(snooze, 0) <= as_timestamp(now()) }}
    - condition: template
      value_template: >
        {% set recent_window = 600 %}
        {% set trevor_recent = is_state('device_tracker.tk_iphone_16_pro', 'home')
           and (as_timestamp(now()) - as_timestamp(states.device_tracker.tk_iphone_16_pro.last_changed, 0)) < recent_window %}
        {% set casey_recent = is_state('device_tracker.unifi_default_42_15_78_4a_d9_f8', 'home')
           and (as_timestamp(now()) - as_timestamp(states.device_tracker.unifi_default_42_15_78_4a_d9_f8.last_changed, 0)) < recent_window %}
        {{ not (trevor_recent or casey_recent) }}
  actions:
    - action: script.garage_security_send_alert
      data:
        alert_kind: opened_overnight
        garage_cover: "{{ trigger.entity_id }}"
  mode: single

- id: garage_security_obstruction_detected
  alias: "Garage — Obstruction Detected"
  description: Pushes only when either ratgdo reports an obstruction while that garage door is moving.
  triggers:
    - trigger: state
      entity_id:
        - binary_sensor.ratgdo32disco_c26634_obstruction
        - binary_sensor.ratgdo32_4536e8_obstruction
      to: "on"
  conditions:
    - condition: template
      value_template: >-
        {% set cover = 'cover.ratgdo32_4536e8_door'
           if trigger.entity_id == 'binary_sensor.ratgdo32_4536e8_obstruction'
           else 'cover.ratgdo32disco_c26634_door' %}
        {{ states(cover) in ['opening', 'closing'] }}
    - condition: template
      value_template: >
        {% set snooze = states('input_datetime.garage_security_snooze_until') %}
        {{ snooze in ['unknown', 'unavailable', '']
           or as_timestamp(snooze, 0) <= as_timestamp(now()) }}
  actions:
    - action: script.garage_security_send_alert
      data:
        alert_kind: obstruction
        garage_cover: >-
          {{ 'cover.ratgdo32_4536e8_door'
             if trigger.entity_id == 'binary_sensor.ratgdo32_4536e8_obstruction'
             else 'cover.ratgdo32disco_c26634_door' }}
  mode: single

- id: garage_security_clear_when_resolved
  alias: "Garage — Clear Alerts When Resolved"
  description: Clears active garage-security pushes when the door closes or obstruction clears.
  triggers:
    - trigger: state
      entity_id:
        - cover.ratgdo32disco_c26634_door
        - cover.ratgdo32_4536e8_door
      to: "closed"
      id: door_closed
    - trigger: state
      entity_id:
        - binary_sensor.ratgdo32disco_c26634_obstruction
        - binary_sensor.ratgdo32_4536e8_obstruction
      to: "off"
      id: obstruction_clear
    - trigger: state
      entity_id:
        - device_tracker.tk_iphone_16_pro
        - device_tracker.unifi_default_42_15_78_4a_d9_f8
      to: home
      id: person_home
  conditions: []
  actions:
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ trigger.id == 'door_closed' }}"
          sequence:
            - if:
                - condition: state
                  entity_id: binary_sensor.away_security_garage_door_open
                  state: "off"
              then:
                - action: script.garage_security_clear_alerts
        - conditions:
            - condition: template
              value_template: "{{ trigger.id == 'obstruction_clear' }}"
          sequence:
            - action: script.notify_trevor_phone
              data:
                message: clear_notification
                data:
                  tag: garage-obstruction
        - conditions:
            - condition: template
              value_template: "{{ trigger.id == 'person_home' }}"
          sequence:
            - action: script.garage_security_clear_person_away_alerts
  mode: single

- id: entry_security_clear_when_resolved
  alias: "Security — Clear Entry Night Reminder When Resolved"
  description: Clears overnight entry-security pushes when the mudroom lock is secured or away-security takes over.
  triggers:
    - trigger: state
      entity_id: lock.mudroom_door_lock
      to: "locked"
      id: mudroom_locked
    - trigger: state
      entity_id:
        - device_tracker.tk_iphone_16_pro
        - device_tracker.unifi_default_42_15_78_4a_d9_f8
      not_from:
        - "unknown"
        - "unavailable"
      not_to:
        - "unknown"
        - "unavailable"
      id: presence
    - trigger: state
      entity_id: binary_sensor.house_unsecured_while_away
      to: "on"
      id: away_security
    - trigger: homeassistant
      event: start
      id: startup
    - trigger: event
      event_type: automation_reloaded
      id: automation_reloaded
  conditions: []
  actions:
    - if:
        - condition: template
          value_template: >
            {% set trevor_away = states('device_tracker.tk_iphone_16_pro') not in ['home', 'unknown', 'unavailable', ''] %}
            {% set casey_away = states('device_tracker.unifi_default_42_15_78_4a_d9_f8') not in ['home', 'unknown', 'unavailable', ''] %}
            {{ trigger.id in ['mudroom_locked', 'away_security']
               or is_state('lock.mudroom_door_lock', 'locked')
               or (trevor_away and casey_away) }}
      then:
        - action: script.entry_security_clear_alerts

- id: away_security_clear_when_resolved
  alias: "Security — Clear Away Reminder When Resolved"
  description: Clears the active away-security push once the issue is resolved.
  triggers:
    - trigger: state
      entity_id: binary_sensor.house_unsecured_while_away
      to: "off"
  conditions: []
  actions:
    - action: script.away_security_clear_alert
  mode: single

- id: security_casey_left_garage_clear
  alias: "Security — Clear Casey Left Entry Alert"
  description: Clears the contextual Casey-left-entry push once it is no longer relevant.
  triggers:
    - trigger: state
      entity_id:
        - cover.ratgdo32disco_c26634_door
        - cover.ratgdo32_4536e8_door
      to: closed
    - trigger: state
      entity_id:
        - lock.garage_entry_lock
        - lock.mudroom_door_lock
      to: locked
    - trigger: state
      entity_id: device_tracker.tk_iphone_16_pro
      to: home
    - trigger: state
      entity_id: device_tracker.unifi_default_42_15_78_4a_d9_f8
      to: home
  conditions: []
  actions:
    - if:
        - condition: template
          value_template: >
            {{ is_state('device_tracker.tk_iphone_16_pro', 'home')
               or is_state('device_tracker.unifi_default_42_15_78_4a_d9_f8', 'home')
               or states('sensor.away_security_entry_point_issues') | int(0) == 0 }}
      then:
        - action: script.casey_left_garage_clear_alert
  mode: single

- id: security_casey_left_combo_clear
  alias: "Security — Clear Casey Left Combo Alert"
  description: Clears the contextual Casey-left combo push once it is no longer relevant.
  triggers:
    - trigger: state
      entity_id:
        - cover.ratgdo32disco_c26634_door
        - cover.ratgdo32_4536e8_door
      to: closed
    - trigger: state
      entity_id:
        - lock.garage_entry_lock
        - lock.mudroom_door_lock
      to: locked
    - trigger: state
      entity_id: sun.sun
      to: "below_horizon"
    - trigger: state
      entity_id: device_tracker.tk_iphone_16_pro
      to: home
    - trigger: state
      entity_id: device_tracker.unifi_default_42_15_78_4a_d9_f8
      to: home
    - trigger: event
      event_type: state_changed
      id: lights_state_changed
  conditions:
    - condition: template
      value_template: >
        {% if trigger.id == 'lights_state_changed' %}
          {% set entity = trigger.event.data.entity_id | default('') %}
          {{ entity.startswith('light.') or entity == 'switch.exterior_mud_room_stairs' }}
        {% else %}
          true
        {% endif %}
  actions:
    - if:
        - condition: template
          value_template: >
            {{ not (
              is_state('sun.sun', 'above_horizon')
              and states('device_tracker.tk_iphone_16_pro') not in ['home', 'unknown', 'unavailable', '']
              and states('device_tracker.unifi_default_42_15_78_4a_d9_f8') not in ['home', 'unknown', 'unavailable', '']
              and states('sensor.away_security_entry_point_issues') | int(0) > 0
              and states('sensor.away_security_active_lights') | int(0) > 0
            ) }}
      then:
        - action: script.casey_left_combo_clear_alert
  mode: single

- id: security_casey_left_lights_clear
  alias: "Security — Clear Casey Left Lights Alert"
  description: Clears the contextual Casey-left-lights push once it is no longer relevant.
  triggers:
    - trigger: state
      entity_id: sun.sun
      to: "below_horizon"
    - trigger: state
      entity_id: device_tracker.tk_iphone_16_pro
      to: home
    - trigger: state
      entity_id: device_tracker.unifi_default_42_15_78_4a_d9_f8
      to: home
    - trigger: event
      event_type: state_changed
      id: lights_state_changed
  conditions:
    - condition: template
      value_template: >
        {% if trigger.id == 'lights_state_changed' %}
          {% set entity = trigger.event.data.entity_id | default('') %}
          {{ entity.startswith('light.') or entity == 'switch.exterior_mud_room_stairs' }}
        {% else %}
          true
        {% endif %}
  actions:
    - if:
        - condition: template
          value_template: >
            {{ is_state('sun.sun', 'below_horizon')
               or is_state('device_tracker.tk_iphone_16_pro', 'home')
               or is_state('device_tracker.unifi_default_42_15_78_4a_d9_f8', 'home')
               or states('sensor.away_security_active_lights') | int(0) == 0 }}
      then:
        - action: script.casey_left_lights_clear_alert
  mode: single

- id: security_entry_ring_notifications
  alias: "Security — Entry Ring Notifications"
  description: Sends mobile notifications for front door and mud room Ring motion and doorbell events.
  triggers:
    - trigger: state
      entity_id: event.front_door_motion
      id: front_door_motion
    - trigger: state
      entity_id: event.front_door_ding
      id: front_door_ding
    - trigger: state
      entity_id: event.mudroom_door_motion
      id: mudroom_door_motion
    - trigger: state
      entity_id: event.mudroom_door_ding
      id: mudroom_door_ding
  conditions:
    - condition: template
      value_template: >
        {{ trigger.to_state is not none and trigger.to_state.state not in ['unknown', 'unavailable'] }}
  actions:
    - variables:
        zone_name: "{{ 'Mud room' if trigger.id.startswith('mudroom') else 'Front door' }}"
        event_kind: "{{ 'doorbell' if trigger.id.endswith('ding') else 'motion' }}"
    - action: script.entry_camera_send_alert
      data:
        zone_name: "{{ zone_name }}"
        event_kind: "{{ event_kind }}"
  mode: parallel
  max: 10

- id: set_default_theme_liquid_glass
  alias: "Frontend — Set Liquid Glass Theme"
  description: Applies the liquid glass theme on Home Assistant startup.
  triggers:
    - trigger: homeassistant
      event: start
  conditions: []
  actions:
    - action: frontend.set_theme
      data:
        name: liquid_glass
        mode: dark
  mode: single

- id: master_bedroom_sconces_sync
  alias: "Lights — Sync Master Bedroom Sconces"
  description: Keeps the left and right master bedroom sconces paired when either side changes.
  triggers:
    - trigger: state
      entity_id:
        - light.master_bedroom_sconce_l
        - light.master_bedroom_sconce_r
  conditions:
    - condition: template
      value_template: >
        {% set source = trigger.to_state %}
        {% set target_id = 'light.master_bedroom_sconce_r'
           if trigger.entity_id == 'light.master_bedroom_sconce_l'
           else 'light.master_bedroom_sconce_l' %}
        {% set target_state = states(target_id) %}
        {{ source is not none
           and source.state in ['on', 'off']
           and target_state not in ['unknown', 'unavailable']
           and (
             source.state != target_state
             or (
               source.state == 'on'
               and (source.attributes.brightness | int(255))
                  != (state_attr(target_id, 'brightness') | int(255))
             )
           ) }}
  actions:
    - variables:
        target_entity: >-
          {{ 'light.master_bedroom_sconce_r'
             if trigger.entity_id == 'light.master_bedroom_sconce_l'
             else 'light.master_bedroom_sconce_l' }}
        source_state: "{{ trigger.to_state.state }}"
        source_brightness: "{{ trigger.to_state.attributes.brightness | int(255) }}"
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ source_state == 'on' }}"
          sequence:
            - action: light.turn_on
              data:
                entity_id: "{{ target_entity }}"
                brightness: "{{ source_brightness }}"
        - conditions:
            - condition: template
              value_template: "{{ source_state == 'off' }}"
          sequence:
            - action: light.turn_off
              data:
                entity_id: "{{ target_entity }}"
  mode: restart

- id: downstairs_climate_pilot_startup_sync
  alias: "Environment — Startup Sync"
  description: Refreshes environment observability entities and clears stale advisory notifications on startup.
  triggers:
    - trigger: homeassistant
      event: start
  actions:
    - action: homeassistant.update_entity
      target:
        entity_id:
          - sensor.downstairs_temp_avg
          - sensor.downstairs_humidity_avg
          - sensor.downstairs_temp_spread
          - sensor.downstairs_time_period
          - sensor.downstairs_active_season
          - sensor.downstairs_outdoor_temp
          - sensor.downstairs_outdoor_humidity
          - sensor.downstairs_outdoor_wind_speed
          - sensor.downstairs_source_policy
          - binary_sensor.downstairs_open_window_eligible
          - binary_sensor.open_window_recommendation_active
          - sensor.downstairs_ecobee_setpoint
          - sensor.downstairs_climate_status
          - sensor.downstairs_climate_insight
          - sensor.downstairs_away_watch
          - sensor.downstairs_away_watch_reason
          - sensor.downstairs_away_minutes
          - binary_sensor.downstairs_temp_spread_high
          - binary_sensor.downstairs_someone_home
          - binary_sensor.downstairs_everyone_away
          - sensor.environment_house_status
          - sensor.environment_main_floor_status
          - sensor.environment_second_floor_status
          - sensor.environment_kitchen_status
          - sensor.environment_dining_room_status
          - sensor.environment_primary_bedroom_status
          - sensor.environment_office_status
          - sensor.environment_basement_status
          - sensor.environment_garage_status
          - sensor.environment_attic_status
          - binary_sensor.environment_dining_room_ecobee_temp_disagreement
          - binary_sensor.environment_dining_room_ecobee_humidity_disagreement
          - binary_sensor.environment_basement_radon_high_alert
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ not is_state('input_boolean.environment_alerts_enabled', 'on')
                   or not is_state('input_boolean.downstairs_mobile_alerts_enabled', 'on')
                   or not is_state('input_boolean.downstairs_pilot_enabled', 'on')
                   or states('sensor.downstairs_away_watch') in ['all_clear', 'grace_period', 'home_occupied', 'unknown', 'unavailable'] }}
          sequence:
            - action: script.notify_trevor_phone
              data:
                message: clear_notification
                data:
                  tag: downstairs-away-watch
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ not is_state('input_boolean.downstairs_mobile_alerts_enabled', 'on')
                   or not is_state('input_boolean.downstairs_pilot_enabled', 'on')
                   or not is_state('binary_sensor.downstairs_open_window_eligible', 'on')
                   or not is_state('binary_sensor.downstairs_someone_home', 'on')
                   or not is_state('sensor.downstairs_time_period', 'night') }}
          sequence:
            - action: script.notify_trevor_phone
              data:
                message: clear_notification
                data:
                  tag: downstairs-window-night
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ not is_state('input_boolean.environment_alerts_enabled', 'on')
                   or not is_state('input_boolean.downstairs_mobile_alerts_enabled', 'on')
                   or not is_state('binary_sensor.open_window_recommendation_active', 'on') }}
          sequence:
            - action: script.notify_trevor_phone
              data:
                message: clear_notification
                data:
                  tag: open-window-night
  mode: single

- id: downstairs_climate_recommendation_notification
  alias: "Environment — Main Floor Open Window Dashboard Only"
  description: Keeps the open-window signal dashboard-only and clears the old mobile notification tag if it exists.
  triggers:
    - trigger: state
      entity_id: binary_sensor.downstairs_open_window_eligible
      to: "on"
      for:
        minutes: 20
      id: send
    - trigger: state
      entity_id:
        - input_boolean.downstairs_pilot_enabled
        - input_boolean.downstairs_mobile_alerts_enabled
        - binary_sensor.downstairs_someone_home
        - binary_sensor.downstairs_open_window_eligible
        - sensor.downstairs_time_period
      id: reevaluate
  actions:
    - action: script.notify_trevor_phone
      data:
        message: clear_notification
        data:
          tag: downstairs-window-night
  mode: restart

- id: downstairs_climate_profile_recommendation_notification
  alias: "Environment — Main Floor Away Watch"
  description: Alerts when both phones are away and the Main Floor climate or Dining Room Ecobee profile needs attention.
  triggers:
    - trigger: state
      entity_id: sensor.downstairs_away_watch
      to: too_hot
      for:
        minutes: 45
      id: too_hot
    - trigger: state
      entity_id: sensor.downstairs_away_watch
      to: too_cold
      for:
        minutes: 45
      id: too_cold
    - trigger: state
      entity_id: sensor.downstairs_away_watch
      to: too_humid
      for:
        minutes: 90
      id: too_humid
    - trigger: state
      entity_id: sensor.downstairs_away_watch
      to: too_dry
      for:
        hours: 6
      id: too_dry
    - trigger: state
      entity_id: sensor.downstairs_away_watch
      to: profile_check
      for:
        minutes: 20
      id: profile_check
    - trigger: state
      entity_id: sensor.downstairs_away_watch
      to:
        - all_clear
        - grace_period
        - home_occupied
      id: clear
    - trigger: state
      entity_id:
        - input_boolean.downstairs_pilot_enabled
        - input_boolean.downstairs_mobile_alerts_enabled
      id: reevaluate
  conditions:
  actions:
    - variables:
        watch: "{{ states('sensor.downstairs_away_watch') }}"
        reason: "{{ states('sensor.downstairs_away_watch_reason') }}"
        should_send: >
          {{ is_state('input_boolean.downstairs_pilot_enabled', 'on')
             and is_state('input_boolean.downstairs_mobile_alerts_enabled', 'on')
             and is_state('input_boolean.environment_alerts_enabled', 'on')
             and watch in ['too_hot', 'too_cold', 'too_humid', 'too_dry', 'profile_check'] }}
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ trigger.id != 'clear' and should_send }}"
          sequence:
            - action: script.notify_trevor_phone
              data:
                title: >-
                  {% if watch == 'too_hot' %}🥵 Main Floor is hot while away
                  {% elif watch == 'too_cold' %}🥶 Main Floor is cold while away
                  {% elif watch == 'too_humid' %}💧 Main Floor is humid while away
                  {% elif watch == 'too_dry' %}🌵 Main Floor is dry while away
                  {% else %}🏠 Dining Room Ecobee still looks occupied{% endif %}
                message: >-
                  {{ reason }}
                  Indoor {{ states('sensor.downstairs_temp_avg') }}°F / {{ states('sensor.downstairs_humidity_avg') }}%.
                  Outdoor {{ states('sensor.downstairs_outdoor_temp') }}°F.
                  Dining Room Ecobee profile {{ states('select.dining_room_current_mode') }}.
                data:
                  tag: downstairs-away-watch
                  sticky: true
                  ttl: 0
                  priority: high
                  url: /calm-mobile/climate
      default:
        - action: script.notify_trevor_phone
          data:
            message: clear_notification
            data:
              tag: downstairs-away-watch
  mode: restart

- id: downstairs_climate_sensor_spread_watch
  alias: "Environment — Main Floor Sensor Spread Watch"
  description: Warns when the Kitchen and Dining Room sensors disagree for an extended period and the average may be less trustworthy.
  triggers:
    - trigger: state
      entity_id: binary_sensor.downstairs_temp_spread_high
      to: "on"
      for:
        minutes: 30
  conditions:
    - condition: state
      entity_id: input_boolean.downstairs_pilot_enabled
      state: "on"
    - condition: state
      entity_id: input_boolean.downstairs_mobile_alerts_enabled
      state: "on"
    - condition: state
      entity_id: input_boolean.environment_alerts_enabled
      state: "on"
  actions:
    - action: script.environment_send_alert
      data:
        room: Main Floor
        alert_kind: source_disagreement
        message: >-
          Kitchen and Dining Room are still {{ states('sensor.downstairs_temp_spread') }}°F apart.
          That likely means the Main Floor is uneven or one sensor placement needs a second look before trusting the average too heavily.
  mode: single

- id: environment_room_actionable_alerts
  alias: "Environment — Room Actionable Alerts"
  description: Sends specific room environment pushes after red-band conditions have persisted long enough to matter.
  triggers:
    - trigger: state
      entity_id: binary_sensor.environment_kitchen_temp_high_alert
      to: "on"
      id: kitchen_temp_high
    - trigger: state
      entity_id: binary_sensor.environment_kitchen_temp_low_alert
      to: "on"
      id: kitchen_temp_low
    - trigger: state
      entity_id: binary_sensor.environment_kitchen_humidity_high_alert
      to: "on"
      id: kitchen_humidity_high
    - trigger: state
      entity_id: binary_sensor.environment_kitchen_humidity_low_alert
      to: "on"
      id: kitchen_humidity_low
    - trigger: state
      entity_id: binary_sensor.environment_dining_room_temp_high_alert
      to: "on"
      id: dining_temp_high
    - trigger: state
      entity_id: binary_sensor.environment_dining_room_temp_low_alert
      to: "on"
      id: dining_temp_low
    - trigger: state
      entity_id: binary_sensor.environment_dining_room_humidity_high_alert
      to: "on"
      id: dining_humidity_high
    - trigger: state
      entity_id: binary_sensor.environment_dining_room_humidity_low_alert
      to: "on"
      id: dining_humidity_low
    - trigger: state
      entity_id: binary_sensor.environment_primary_bedroom_temp_high_alert
      to: "on"
      id: primary_temp_high
    - trigger: state
      entity_id: binary_sensor.environment_primary_bedroom_temp_low_alert
      to: "on"
      id: primary_temp_low
    - trigger: state
      entity_id: binary_sensor.environment_primary_bedroom_humidity_high_alert
      to: "on"
      id: primary_humidity_high
    - trigger: state
      entity_id: binary_sensor.environment_primary_bedroom_humidity_low_alert
      to: "on"
      id: primary_humidity_low
    - trigger: state
      entity_id: binary_sensor.environment_basement_temp_high_alert
      to: "on"
      id: basement_temp_high
    - trigger: state
      entity_id: binary_sensor.environment_basement_temp_low_alert
      to: "on"
      id: basement_temp_low
    - trigger: state
      entity_id: binary_sensor.environment_garage_temp_high_alert
      to: "on"
      id: garage_temp_high
    - trigger: state
      entity_id: binary_sensor.environment_garage_temp_low_alert
      to: "on"
      id: garage_temp_low
    - trigger: state
      entity_id: binary_sensor.environment_garage_humidity_high_alert
      to: "on"
      id: garage_humidity_high
    - trigger: state
      entity_id: binary_sensor.environment_attic_temp_high_alert
      to: "on"
      id: attic_temp_high
    - trigger: state
      entity_id: binary_sensor.environment_attic_humidity_high_alert
      to: "on"
      id: attic_humidity_high
    - trigger: state
      entity_id: binary_sensor.environment_dining_room_ecobee_temp_disagreement
      to: "on"
      id: dining_temp_disagreement
    - trigger: state
      entity_id: binary_sensor.environment_dining_room_ecobee_humidity_disagreement
      to: "on"
      id: dining_humidity_disagreement
    - trigger: state
      entity_id:
        - binary_sensor.environment_kitchen_sensor_unavailable
        - binary_sensor.environment_dining_room_sensor_unavailable
        - binary_sensor.environment_primary_bedroom_sensor_unavailable
        - binary_sensor.environment_basement_sensor_unavailable
        - binary_sensor.environment_garage_sensor_unavailable
        - binary_sensor.environment_attic_sensor_unavailable
      to: "on"
      id: sensor_unavailable
  conditions:
    - condition: state
      entity_id: input_boolean.environment_alerts_enabled
      state: "on"
  actions:
    - variables:
        entity: "{{ trigger.to_state.entity_id }}"
        trigger_name: "{{ trigger.id }}"
    - variables:
        room: >-
          {% if 'kitchen' in trigger_name or entity == 'binary_sensor.environment_kitchen_sensor_unavailable' %}Kitchen
          {% elif 'dining' in trigger_name or entity == 'binary_sensor.environment_dining_room_sensor_unavailable' %}Dining Room
          {% elif 'primary' in trigger_name or entity == 'binary_sensor.environment_primary_bedroom_sensor_unavailable' %}Primary Bedroom
          {% elif 'basement' in trigger_name or entity == 'binary_sensor.environment_basement_sensor_unavailable' %}Basement
          {% elif 'garage' in trigger_name or entity == 'binary_sensor.environment_garage_sensor_unavailable' %}Garage
          {% elif 'attic' in trigger_name or entity == 'binary_sensor.environment_attic_sensor_unavailable' %}Attic
          {% else %}Environment{% endif %}
        kind: >-
          {% if trigger_name == 'sensor_unavailable' %}sensor_unavailable
          {% elif 'disagreement' in trigger_name %}source_disagreement
          {% elif 'temp_high' in trigger_name %}temp_high
          {% elif 'temp_low' in trigger_name %}temp_low
          {% elif 'humidity_high' in trigger_name %}humidity_high
          {% elif 'humidity_low' in trigger_name %}humidity_low
          {% else %}status{% endif %}
    - variables:
        message: >-
          {% set room_name = room %}
          {% if kind == 'sensor_unavailable' %}
            {{ room_name }} environment sensor has been unavailable for 15 minutes.
            Check battery, Bluetooth gateway reachability, or the room sensor placement.
          {% elif room_name == 'Kitchen' %}
            {% set t = states('sensor.main_floor_temperature') %}
            {% set h = states('sensor.main_floor_humidity') %}
            Kitchen is at {{ t }}°F and {{ h }}% humidity. This has stayed outside the action range long enough to deserve a look.
          {% elif room_name == 'Dining Room' and kind == 'source_disagreement' %}
            Dining Room SensorPush and Ecobee readings have been apart long enough to check placement or airflow.
            SensorPush is {{ states('sensor.main_floor_2_temperature') }}°F / {{ states('sensor.main_floor_2_humidity') }}%.
            Ecobee is {{ states('sensor.dining_room_current_temperature') }}°F / {{ states('sensor.dining_room_current_humidity') }}%.
          {% elif room_name == 'Dining Room' %}
            Dining Room is at {{ states('sensor.main_floor_2_temperature') }}°F and {{ states('sensor.main_floor_2_humidity') }}% humidity.
            Dining Room Ecobee is {{ states('sensor.dining_room_current_temperature') }}°F and {{ states('sensor.dining_room_current_humidity') }}%.
          {% elif room_name == 'Primary Bedroom' %}
            Primary Bedroom is at {{ states('sensor.master_temperature') }}°F and {{ states('sensor.master_humidity') }}% humidity.
            This alert uses the room sensor as the source of truth.
          {% elif room_name == 'Basement' %}
            Basement is at {{ states('sensor.mechanical_room_temperature') }}°F and {{ states('sensor.mechanical_room_humidity') }}% humidity.
            Worth checking dehumidification, ventilation, or any open-air source if this keeps up.
          {% elif room_name == 'Garage' %}
            Garage is at {{ states('sensor.garage_temperature') }}°F and {{ states('sensor.garage_humidity') }}% humidity.
            This is outside the garage action band.
          {% elif room_name == 'Attic' %}
            Attic is at {{ states('sensor.attic_temperature') }}°F and {{ states('sensor.attic_humidity') }}% humidity.
            This is outside the attic action band.
          {% else %}
            One of the environment sensors has been unavailable for 15 minutes. Check the Environment tab for the specific room.
          {% endif %}
    - action: script.environment_send_alert
      data:
        room: "{{ room }}"
        alert_kind: "{{ kind }}"
        message: "{{ message }}"
  mode: parallel

- id: environment_room_alert_clears
  alias: "Environment — Clear Room Alerts"
  description: Clears room environment notifications when the underlying actionable binary sensor recovers.
  triggers:
    - trigger: state
      entity_id:
        - binary_sensor.environment_kitchen_temp_high_alert
        - binary_sensor.environment_kitchen_temp_low_alert
        - binary_sensor.environment_kitchen_humidity_high_alert
        - binary_sensor.environment_kitchen_humidity_low_alert
        - binary_sensor.environment_dining_room_temp_high_alert
        - binary_sensor.environment_dining_room_temp_low_alert
        - binary_sensor.environment_dining_room_humidity_high_alert
        - binary_sensor.environment_dining_room_humidity_low_alert
        - binary_sensor.environment_primary_bedroom_temp_high_alert
        - binary_sensor.environment_primary_bedroom_temp_low_alert
        - binary_sensor.environment_primary_bedroom_humidity_high_alert
        - binary_sensor.environment_primary_bedroom_humidity_low_alert
        - binary_sensor.environment_basement_temp_high_alert
        - binary_sensor.environment_basement_temp_low_alert
        - binary_sensor.environment_garage_temp_high_alert
        - binary_sensor.environment_garage_temp_low_alert
        - binary_sensor.environment_garage_humidity_high_alert
        - binary_sensor.environment_attic_temp_high_alert
        - binary_sensor.environment_attic_humidity_high_alert
        - binary_sensor.environment_dining_room_ecobee_temp_disagreement
        - binary_sensor.environment_dining_room_ecobee_humidity_disagreement
        - binary_sensor.environment_kitchen_sensor_unavailable
        - binary_sensor.environment_dining_room_sensor_unavailable
        - binary_sensor.environment_primary_bedroom_sensor_unavailable
        - binary_sensor.environment_basement_sensor_unavailable
        - binary_sensor.environment_garage_sensor_unavailable
        - binary_sensor.environment_attic_sensor_unavailable
        - binary_sensor.downstairs_temp_spread_high
      to: "off"
  actions:
    - variables:
        entity: "{{ trigger.to_state.entity_id }}"
        room: >-
          {% if 'kitchen' in entity %}Kitchen
          {% elif 'dining_room' in entity %}Dining Room
          {% elif 'primary_bedroom' in entity %}Primary Bedroom
          {% elif 'basement' in entity %}Basement
          {% elif 'garage' in entity %}Garage
          {% elif 'attic' in entity %}Attic
          {% elif entity == 'binary_sensor.downstairs_temp_spread_high' %}Main Floor
          {% else %}Environment{% endif %}
        kind: >-
          {% if 'sensor_unavailable' in entity %}sensor_unavailable
          {% elif 'disagreement' in entity %}source_disagreement
          {% elif entity == 'binary_sensor.downstairs_temp_spread_high' %}source_disagreement
          {% elif 'temp_high' in entity %}temp_high
          {% elif 'temp_low' in entity %}temp_low
          {% elif 'humidity_high' in entity %}humidity_high
          {% elif 'humidity_low' in entity %}humidity_low
          {% else %}status{% endif %}
    - action: script.environment_send_alert
      data:
        room: "{{ room }}"
        alert_kind: "{{ kind }}"
        clear: true
  mode: parallel

- id: environment_open_window_recommendation
  alias: "Environment — Open Window Recommendation"
  description: Sends one soft whole-house open-window recommendation when lived-in rooms would likely benefit from outdoor air.
  triggers:
    - trigger: state
      entity_id: binary_sensor.open_window_recommendation_active
      to: "on"
      for:
        minutes: 20
  conditions:
    - condition: state
      entity_id: binary_sensor.open_window_recommendation_active
      state: "on"
    - condition: state
      entity_id: device_tracker.tk_iphone_16_pro
      state: home
    - condition: state
      entity_id: input_boolean.environment_alerts_enabled
      state: "on"
    - condition: state
      entity_id: input_boolean.downstairs_mobile_alerts_enabled
      state: "on"
    - condition: template
      value_template: >-
        {% set last_sent = states('input_datetime.open_window_notice_last_sent_at') %}
        {{ last_sent in ['unknown', 'unavailable', 'none', '']
           or (as_timestamp(last_sent, 0) | timestamp_custom('%Y-%m-%d', true)) != now().strftime('%Y-%m-%d') }}
  actions:
    - action: script.open_window_notice_send
  mode: single

- id: environment_open_window_recommendation_clear
  alias: "Environment — Clear Open Window Recommendation"
  description: Clears the soft open-window push when conditions are no longer favorable.
  triggers:
    - trigger: state
      entity_id: binary_sensor.open_window_recommendation_active
      to: "off"
  actions:
    - action: script.notify_trevor_phone
      data:
        message: clear_notification
        data:
          tag: open-window-night
  mode: single

- id: environment_open_window_recommendation_morning_expiry
  alias: "Environment — Clear Open Window Recommendation During Sleep Hours"
  description: Clears open-window nudges once the awake-hours window closes, with a 3 AM safety clear for stale mobile banners.
  triggers:
    - trigger: time
      at: "22:30:00"
    - trigger: time
      at: "03:00:00"
  actions:
    - action: script.notify_trevor_phone
      data:
        message: clear_notification
        data:
          tag: open-window-night
    - action: homeassistant.update_entity
      target:
        entity_id: binary_sensor.open_window_recommendation_active
  mode: single

- id: environment_open_window_notification_actions
  alias: "Environment — Open Window Notification Actions"
  description: Handles the dismiss action from the whole-house open-window recommendation push.
  triggers:
    - trigger: event
      event_type: mobile_app_notification_action
  conditions:
    - condition: template
      value_template: "{{ trigger.event.data.action == 'OPEN_WINDOW_NOTICE_DISMISS_TONIGHT' }}"
  actions:
    - action: script.open_window_notice_dismiss_tonight
  mode: single

- id: house_low_battery_notification
  alias: "House — Low Battery Notification"
  description: Sends short home-maintenance pushes for monitored infrastructure batteries at 20%, 10%, and 5%.
  triggers:
    - trigger: state
      entity_id: binary_sensor.house_low_battery_alert
      to: "on"
      id: getting_low
    - trigger: state
      entity_id: binary_sensor.house_battery_replace_soon_alert
      to: "on"
      id: replace_soon
    - trigger: state
      entity_id: binary_sensor.house_battery_critical_alert
      to: "on"
      id: critical
    - trigger: homeassistant
      event: start
      id: startup
  conditions:
    - condition: state
      entity_id: input_boolean.house_battery_alerts_enabled
      state: "on"
    - condition: template
      value_template: "{{ (states('sensor.house_low_battery_summary') | int(0)) > 0 }}"
  actions:
    - variables:
        severity: "{{ state_attr('sensor.house_low_battery_summary', 'severity') | default('getting_low', true) }}"
        battery_list: >-
          {% if severity == 'critical' %}
            {{ state_attr('sensor.house_low_battery_summary', 'critical_batteries') }}
          {% elif severity == 'replace_soon' %}
            {{ state_attr('sensor.house_low_battery_summary', 'replace_soon_batteries') }}
          {% else %}
            {{ state_attr('sensor.house_low_battery_summary', 'getting_low_batteries') }}
          {% endif %}
    - action: script.notify_trevor_phone
      data:
        title: >-
          {% if severity == 'critical' %}🪫 Battery critical
          {% elif severity == 'replace_soon' %}🪫 Battery replace soon
          {% else %}🪫 Battery getting low{% endif %}
        message: "{{ battery_list }}"
        data:
          group: house-maintenance
          tag: house-low-battery
          url: /calm-mobile/climate
  mode: single

- id: house_low_battery_clear_notification
  alias: "House — Clear Low Battery Notification"
  description: Clears the home-maintenance low-battery push once all monitored infrastructure batteries recover.
  triggers:
    - trigger: state
      entity_id: binary_sensor.house_low_battery_alert
      to: "off"
    - trigger: state
      entity_id: binary_sensor.house_battery_replace_soon_alert
      to: "off"
    - trigger: state
      entity_id: binary_sensor.house_battery_critical_alert
      to: "off"
  conditions:
    - condition: state
      entity_id: binary_sensor.house_low_battery_alert
      state: "off"
    - condition: state
      entity_id: binary_sensor.house_battery_replace_soon_alert
      state: "off"
    - condition: state
      entity_id: binary_sensor.house_battery_critical_alert
      state: "off"
  actions:
    - action: script.notify_trevor_phone
      data:
        message: clear_notification
        data:
          tag: house-low-battery
  mode: single

- id: ting_confirmed_hazard_notification
  alias: "Ting — Confirmed Hazard Notification"
  description: Sends immediate critical Ting hazard alerts and repeats while the confirmed hazard remains active.
  triggers:
    - trigger: state
      entity_id: binary_sensor.ting_confirmed_hazard_active
      to: "on"
      id: activated
    - trigger: time_pattern
      minutes: "/5"
      id: repeat
    - trigger: homeassistant
      event: start
      id: startup
  conditions:
    - condition: state
      entity_id: binary_sensor.ting_confirmed_hazard_active
      state: "on"
  actions:
    - variables:
        last_sent: "{{ states('input_datetime.ting_confirmed_hazard_last_sent_at') }}"
        send_due: >
          {{ last_sent in ['unknown', 'unavailable', 'none', '']
             or (as_timestamp(now()) - as_timestamp(last_sent, 0)) >= 600 }}
    - if:
        - condition: template
          value_template: "{{ send_due }}"
      then:
        - action: script.ting_send_notification
          data:
            alert_kind: confirmed
  mode: single

- id: ting_confirmed_hazard_clear_notification
  alias: "Ting — Confirmed Hazard Clear Notification"
  description: Clears the critical Ting hazard push and sends one recovery note when the confirmed hazard resolves.
  triggers:
    - trigger: state
      entity_id: binary_sensor.ting_confirmed_hazard_active
      from: "on"
      to: "off"
  conditions: []
  actions:
    - action: script.ting_send_notification
      data:
        alert_kind: confirmed_clear
  mode: single

- id: ting_unverified_hazard_notification
  alias: "Ting — Unverified Hazard Notification"
  description: Sends non-critical Ting unverified-hazard watches, without duplicating confirmed hazard alerts.
  triggers:
    - trigger: state
      entity_id: binary_sensor.ting_unverified_hazard_active
      to: "on"
      id: activated
    - trigger: time_pattern
      minutes: "/15"
      id: repeat
  conditions:
    - condition: state
      entity_id: input_boolean.ting_watch_notifications_enabled
      state: "on"
    - condition: state
      entity_id: binary_sensor.ting_unverified_hazard_active
      state: "on"
    - condition: state
      entity_id: binary_sensor.ting_confirmed_hazard_active
      state: "off"
  actions:
    - variables:
        last_sent: "{{ states('input_datetime.ting_unverified_hazard_last_sent_at') }}"
        send_due: >
          {{ last_sent in ['unknown', 'unavailable', 'none', '']
             or (as_timestamp(now()) - as_timestamp(last_sent, 0)) >= 3600 }}
    - if:
        - condition: template
          value_template: "{{ send_due }}"
      then:
        - action: script.ting_send_notification
          data:
            alert_kind: unverified
  mode: single

- id: ting_unverified_hazard_clear_notification
  alias: "Ting — Clear Unverified Hazard Notification"
  description: Silently clears the unverified Ting watch notification when the watch resolves.
  triggers:
    - trigger: state
      entity_id: binary_sensor.ting_unverified_hazard_active
      from: "on"
      to: "off"
  conditions: []
  actions:
    - action: script.notify_trevor_phone
      data:
        message: clear_notification
        data:
          tag: ting-unverified-hazard
  mode: single

- id: ting_power_quality_notification
  alias: "Ting — Power Quality Notification"
  description: Sends a Ting voltage watch only after sustained low/high voltage or a sustained spread between the two Ting sensors.
  triggers:
    - trigger: state
      entity_id: binary_sensor.ting_power_quality_watch
      to: "on"
      for: "00:10:00"
      id: sustained
    - trigger: time_pattern
      minutes: "/15"
      id: repeat
  conditions:
    - condition: state
      entity_id: input_boolean.ting_watch_notifications_enabled
      state: "on"
    - condition: state
      entity_id: binary_sensor.ting_power_quality_watch
      state: "on"
    - condition: state
      entity_id: binary_sensor.ting_confirmed_hazard_active
      state: "off"
    - condition: template
      value_template: >
        {{ (as_timestamp(now()) - as_timestamp(states.binary_sensor.ting_power_quality_watch.last_changed, 0)) >= 600 }}
  actions:
    - variables:
        last_sent: "{{ states('input_datetime.ting_voltage_watch_last_sent_at') }}"
        send_due: >
          {{ last_sent in ['unknown', 'unavailable', 'none', '']
             or (as_timestamp(now()) - as_timestamp(last_sent, 0)) >= 7200 }}
    - if:
        - condition: template
          value_template: "{{ send_due }}"
      then:
        - action: script.ting_send_notification
          data:
            alert_kind: voltage
  mode: single

- id: ting_power_quality_clear_notification
  alias: "Ting — Clear Power Quality Notification"
  description: Silently clears the Ting voltage watch after readings recover and stay stable.
  triggers:
    - trigger: state
      entity_id: binary_sensor.ting_power_quality_watch
      from: "on"
      to: "off"
      for: "00:10:00"
  conditions: []
  actions:
    - action: script.notify_trevor_phone
      data:
        message: clear_notification
        data:
          tag: ting-voltage-watch
  mode: single

- id: ting_offline_notification
  alias: "Ting — Offline Notification"
  description: Sends a Ting offline watch after either sensor stops reporting voltage for 30 minutes.
  triggers:
    - trigger: state
      entity_id: binary_sensor.ting_offline_watch
      to: "on"
      for: "00:30:00"
      id: sustained
    - trigger: time_pattern
      minutes: "/15"
      id: repeat
  conditions:
    - condition: state
      entity_id: input_boolean.ting_watch_notifications_enabled
      state: "on"
    - condition: state
      entity_id: binary_sensor.ting_offline_watch
      state: "on"
    - condition: state
      entity_id: binary_sensor.ting_confirmed_hazard_active
      state: "off"
    - condition: template
      value_template: >
        {{ (as_timestamp(now()) - as_timestamp(states.binary_sensor.ting_offline_watch.last_changed, 0)) >= 1800 }}
  actions:
    - variables:
        last_sent: "{{ states('input_datetime.ting_offline_watch_last_sent_at') }}"
        send_due: >
          {{ last_sent in ['unknown', 'unavailable', 'none', '']
             or (as_timestamp(now()) - as_timestamp(last_sent, 0)) >= 7200 }}
    - if:
        - condition: template
          value_template: "{{ send_due }}"
      then:
        - action: script.ting_send_notification
          data:
            alert_kind: offline
  mode: single

- id: ting_offline_clear_notification
  alias: "Ting — Offline Clear Notification"
  description: Sends one Ting recovery note when an offline watch that notified has recovered.
  triggers:
    - trigger: state
      entity_id: binary_sensor.ting_offline_watch
      from: "on"
      to: "off"
      for: "00:05:00"
  conditions:
    - condition: state
      entity_id: input_boolean.ting_offline_watch_alert_active
      state: "on"
  actions:
    - action: script.ting_send_notification
      data:
        alert_kind: offline_clear
  mode: single

- id: ting_freeze_risk_notification
  alias: "Ting — Freeze Risk Notification"
  description: Sends Ting freeze-risk watches only when Ting risk and house/weather context both support it.
  triggers:
    - trigger: state
      entity_id: binary_sensor.ting_freeze_risk_watch
      to: "on"
      id: activated
    - trigger: time_pattern
      minutes: "0"
      id: repeat
  conditions:
    - condition: state
      entity_id: input_boolean.ting_watch_notifications_enabled
      state: "on"
    - condition: state
      entity_id: binary_sensor.ting_freeze_risk_watch
      state: "on"
    - condition: state
      entity_id: binary_sensor.ting_confirmed_hazard_active
      state: "off"
  actions:
    - variables:
        last_sent: "{{ states('input_datetime.ting_freeze_risk_last_sent_at') }}"
        send_due: >
          {{ last_sent in ['unknown', 'unavailable', 'none', '']
             or (as_timestamp(now()) - as_timestamp(last_sent, 0)) >= 21600 }}
    - if:
        - condition: template
          value_template: "{{ send_due }}"
      then:
        - action: script.ting_send_notification
          data:
            alert_kind: freeze
  mode: single

- id: ting_freeze_risk_clear_notification
  alias: "Ting — Clear Freeze Risk Notification"
  description: Silently clears the Ting freeze-risk notification when the watch resolves.
  triggers:
    - trigger: state
      entity_id: binary_sensor.ting_freeze_risk_watch
      from: "on"
      to: "off"
  conditions: []
  actions:
    - action: script.notify_trevor_phone
      data:
        message: clear_notification
        data:
          tag: ting-freeze-risk
  mode: single

- id: ting_learning_complete_notification
  alias: "Ting — Learning Complete Notification"
  description: Sends one quiet notice when both Ting sensors leave learning mode.
  triggers:
    - trigger: state
      entity_id:
        - binary_sensor.ting_1_learning_mode
        - binary_sensor.ting_2_learning_mode
      to: "off"
      for: "00:30:00"
      id: learned
    - trigger: homeassistant
      event: start
      id: startup
  conditions:
    - condition: state
      entity_id: input_boolean.ting_watch_notifications_enabled
      state: "on"
    - condition: state
      entity_id: input_boolean.ting_learning_complete_notified
      state: "off"
    - condition: state
      entity_id: binary_sensor.ting_1_learning_mode
      state: "off"
    - condition: state
      entity_id: binary_sensor.ting_2_learning_mode
      state: "off"
  actions:
    - if:
        - condition: template
          value_template: "{{ trigger.id == 'startup' }}"
      then:
        - delay: "00:30:00"
    - condition: state
      entity_id: binary_sensor.ting_1_learning_mode
      state: "off"
    - condition: state
      entity_id: binary_sensor.ting_2_learning_mode
      state: "off"
    - condition: state
      entity_id: input_boolean.ting_learning_complete_notified
      state: "off"
    - action: script.ting_send_notification
      data:
        alert_kind: learning_complete
  mode: single

- id: ting_learning_resumed_reset
  alias: "Ting — Reset Learning Complete Flag"
  description: Lets the learning-complete notice fire again if either Ting sensor returns to learning mode later.
  triggers:
    - trigger: state
      entity_id:
        - binary_sensor.ting_1_learning_mode
        - binary_sensor.ting_2_learning_mode
      to: "on"
  conditions: []
  actions:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.ting_learning_complete_notified
  mode: single

- id: garden_morning_stage_notification
  alias: "Garden — Morning Stage Notification"
  description: Sends one quiet garden planting-window notification when the live forecast says a crop is ready.
  triggers:
    - trigger: time
      at: "08:45:00"
    - trigger: state
      entity_id: binary_sensor.garden_stage_action_due
      to: "on"
      for: "00:10:00"
  conditions:
    - condition: state
      entity_id: input_boolean.garden_notifications_enabled
      state: "on"
    - condition: state
      entity_id: binary_sensor.garden_stage_action_due
      state: "on"
    - condition: state
      entity_id: binary_sensor.garden_issue_attention_due
      state: "off"
    - condition: template
      value_template: >
        {% set snooze = states('input_datetime.garden_notifications_snooze_until') %}
        {{ snooze in ['unknown', 'unavailable', 'none', '']
           or as_timestamp(snooze, 0) <= as_timestamp(now()) }}
    - condition: template
      value_template: >
        {% set last = states('input_datetime.garden_stage_last_notified_at') %}
        {{ last in ['unknown', 'unavailable', 'none', '']
           or as_timestamp(last, 0) | timestamp_custom('%Y-%m-%d', true) != now().strftime('%Y-%m-%d') }}
  actions:
    - variables:
        garden_action: "{{ state_attr('sensor.garden_next_action', 'action_id') | default('none', true) }}"
        garden_harden_action: >-
          {% if garden_action == 'GARDEN_MARK_TOMATOES_PLANTED' %}GARDEN_MARK_TOMATOES_HARDENED
          {% elif garden_action == 'GARDEN_MARK_PEPPERS_PLANTED' %}GARDEN_MARK_PEPPERS_HARDENED
          {% elif garden_action == 'GARDEN_MARK_CAPE_GOOSEBERRY_PLANTED' %}GARDEN_MARK_CAPE_GOOSEBERRY_HARDENED
          {% elif garden_action == 'GARDEN_MARK_HONEYNUT_SQUASH_PLANTED' %}GARDEN_MARK_HONEYNUT_SQUASH_HARDENED
          {% else %}none{% endif %}
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ garden_harden_action | trim != 'none' }}"
          sequence:
            - action: script.notify_trevor_phone
              data:
                title: "🌱 Garden: {{ states('sensor.garden_next_action') }}"
                message: "{{ state_attr('sensor.garden_workflow_status', 'attention_reason') }}"
                data:
                  group: garden
                  tag: garden-stage
                  url: /calm-mobile/garden
                  actions:
                    - action: "{{ garden_action }}"
                      title: Mark planted
                    - action: "{{ garden_harden_action | trim }}"
                      title: Mark hardened
                    - action: GARDEN_SNOOZE
                      title: Snooze
      default:
        - action: script.notify_trevor_phone
          data:
            title: "🌱 Garden: {{ states('sensor.garden_next_action') }}"
            message: "{{ state_attr('sensor.garden_workflow_status', 'attention_reason') }}"
            data:
              group: garden
              tag: garden-stage
              url: /calm-mobile/garden
              actions:
                - action: "{{ garden_action }}"
                  title: Mark planted
                - action: GARDEN_SNOOZE
                  title: Snooze
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.garden_stage_last_notified_at
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
  mode: single

- id: garden_afternoon_weather_protection_notification
  alias: "Garden — Afternoon Weather Protection Notification"
  description: Sends one late-afternoon reminder only when planted crops or outdoor starts need cold or frost protection.
  triggers:
