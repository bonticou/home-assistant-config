        {{ snooze in ['unknown', 'unavailable', 'none', '']
           or as_timestamp(snooze, 0) <= as_timestamp(now()) }}
    - condition: template
      value_template: >
        {% set last = states('input_datetime.garden_weather_last_notified_at') %}
        {{ last in ['unknown', 'unavailable', 'none', '']
           or as_timestamp(last, 0) | timestamp_custom('%Y-%m-%d', true) != now().strftime('%Y-%m-%d') }}
  actions:
    - action: script.notify_trevor_phone
