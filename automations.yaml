- id: downstairs_climate_pilot_startup_sync
  alias: "Environment — Startup Sync"
  description: Refreshes environment observability entities and clears stale advisory notifications on startup.
  triggers:
    - trigger: homeassistant
      event: start
  actions:
    - action: homeassistant.update_entity
      target:
        entity_id:
          - sensor.downstairs_temp_avg
          - sensor.downstairs_humidity_avg
          - sensor.downstairs_temp_spread
          - sensor.downstairs_time_period
          - sensor.downstairs_active_season
          - sensor.downstairs_outdoor_temp
          - sensor.downstairs_outdoor_humidity
          - sensor.downstairs_outdoor_wind_speed
          - sensor.downstairs_source_policy
          - binary_sensor.downstairs_open_window_eligible
          - sensor.downstairs_ecobee_setpoint
          - sensor.downstairs_climate_status
          - sensor.downstairs_climate_insight
          - sensor.downstairs_away_watch
          - sensor.downstairs_away_watch_reason
          - sensor.downstairs_away_minutes
          - binary_sensor.downstairs_temp_spread_high
          - binary_sensor.downstairs_someone_home
          - binary_sensor.downstairs_everyone_away
          - sensor.environment_house_status
          - sensor.environment_main_floor_status
          - sensor.environment_second_floor_status
          - sensor.environment_kitchen_status
          - sensor.environment_dining_room_status
          - sensor.environment_primary_bedroom_status
          - sensor.environment_office_status
          - sensor.environment_basement_status
          - sensor.environment_garage_status
          - sensor.environment_attic_status
          - binary_sensor.environment_dining_room_ecobee_temp_disagreement
          - binary_sensor.environment_dining_room_ecobee_humidity_disagreement
          - binary_sensor.environment_basement_radon_high_alert
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ not is_state('input_boolean.environment_alerts_enabled', 'on')
                   or not is_state('input_boolean.downstairs_mobile_alerts_enabled', 'on')
                   or not is_state('input_boolean.downstairs_pilot_enabled', 'on')
                   or states('sensor.downstairs_away_watch') in ['all_clear', 'grace_period', 'home_occupied', 'unknown', 'unavailable'] }}
          sequence:
            - action: notify.mobile_app_tk_iphone_16_pro
              data:
                message: clear_notification
                data:
                  tag: downstairs-away-watch
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ not is_state('input_boolean.downstairs_mobile_alerts_enabled', 'on')
                   or not is_state('input_boolean.downstairs_pilot_enabled', 'on')
                   or not is_state('binary_sensor.downstairs_open_window_eligible', 'on')
                   or not is_state('binary_sensor.downstairs_someone_home', 'on')
                   or not is_state('sensor.downstairs_time_period', 'night') }}
          sequence:
            - action: notify.mobile_app_tk_iphone_16_pro
              data:
                message: clear_notification
                data:
                  tag: downstairs-window-night
  mode: single

- id: downstairs_climate_recommendation_notification
  alias: "Environment — Main Floor Open Window Dashboard Only"
  description: Keeps the open-window signal dashboard-only and clears the old mobile notification tag if it exists.
  triggers:
    - trigger: state
      entity_id: binary_sensor.downstairs_open_window_eligible
      to: "on"
      for:
        minutes: 20
      id: send
    - trigger: state
      entity_id:
        - input_boolean.downstairs_pilot_enabled
        - input_boolean.downstairs_mobile_alerts_enabled
        - binary_sensor.downstairs_someone_home
        - binary_sensor.downstairs_open_window_eligible
        - sensor.downstairs_time_period
      id: reevaluate
  actions:
    - action: notify.mobile_app_tk_iphone_16_pro
      data:
        message: clear_notification
        data:
          tag: downstairs-window-night
  mode: restart

- id: downstairs_climate_profile_recommendation_notification
  alias: "Environment — Main Floor Away Watch"
  description: Alerts when both phones are away and the Main Floor climate or Dining Room Ecobee profile needs attention.
  triggers:
    - trigger: state
      entity_id: sensor.downstairs_away_watch
      to: too_hot
      for:
        minutes: 45
      id: too_hot
    - trigger: state
      entity_id: sensor.downstairs_away_watch
      to: too_cold
      for:
        minutes: 45
      id: too_cold
    - trigger: state
      entity_id: sensor.downstairs_away_watch
      to: too_humid
      for:
        minutes: 90
      id: too_humid
    - trigger: state
      entity_id: sensor.downstairs_away_watch
      to: too_dry
      for:
        hours: 6
      id: too_dry
    - trigger: state
      entity_id: sensor.downstairs_away_watch
      to: profile_check
      for:
        minutes: 20
      id: profile_check
    - trigger: state
      entity_id: sensor.downstairs_away_watch
      to:
        - all_clear
        - grace_period
        - home_occupied
      id: clear
    - trigger: state
      entity_id:
        - input_boolean.downstairs_pilot_enabled
        - input_boolean.downstairs_mobile_alerts_enabled
      id: reevaluate
  conditions:
  actions:
    - variables:
        watch: "{{ states('sensor.downstairs_away_watch') }}"
        reason: "{{ states('sensor.downstairs_away_watch_reason') }}"
        should_send: >
          {{ is_state('input_boolean.downstairs_pilot_enabled', 'on')
             and is_state('input_boolean.downstairs_mobile_alerts_enabled', 'on')
             and is_state('input_boolean.environment_alerts_enabled', 'on')
             and watch in ['too_hot', 'too_cold', 'too_humid', 'too_dry', 'profile_check'] }}
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ trigger.id != 'clear' and should_send }}"
          sequence:
            - action: notify.mobile_app_tk_iphone_16_pro
              data:
                title: >-
                  {% if watch == 'too_hot' %}🥵 Main Floor is hot while away
                  {% elif watch == 'too_cold' %}🥶 Main Floor is cold while away
                  {% elif watch == 'too_humid' %}💧 Main Floor is humid while away
                  {% elif watch == 'too_dry' %}🌵 Main Floor is dry while away
                  {% else %}🏠 Dining Room Ecobee still looks occupied{% endif %}
                message: >-
                  {{ reason }}
                  Indoor {{ states('sensor.downstairs_temp_avg') }}°F / {{ states('sensor.downstairs_humidity_avg') }}%.
                  Outdoor {{ states('sensor.downstairs_outdoor_temp') }}°F.
                  Dining Room Ecobee profile {{ states('select.dining_room_current_mode') }}.
                data:
                  tag: downstairs-away-watch
                  sticky: true
                  ttl: 0
                  priority: high
                  url: /calm-mobile/climate
      default:
        - action: notify.mobile_app_tk_iphone_16_pro
          data:
            message: clear_notification
            data:
              tag: downstairs-away-watch
  mode: restart

- id: downstairs_climate_sensor_spread_watch
  alias: "Environment — Main Floor Sensor Spread Watch"
  description: Warns when the Kitchen and Dining Room sensors disagree for an extended period and the average may be less trustworthy.
  triggers:
    - trigger: state
      entity_id: binary_sensor.downstairs_temp_spread_high
      to: "on"
      for:
        minutes: 30
  conditions:
    - condition: state
      entity_id: input_boolean.downstairs_pilot_enabled
      state: "on"
    - condition: state
      entity_id: input_boolean.downstairs_mobile_alerts_enabled
      state: "on"
    - condition: state
      entity_id: input_boolean.environment_alerts_enabled
      state: "on"
  actions:
    - action: script.environment_send_alert
      data:
        room: Main Floor
        alert_kind: source_disagreement
        message: >-
          Kitchen and Dining Room are still {{ states('sensor.downstairs_temp_spread') }}°F apart.
          That likely means the Main Floor is uneven or one sensor placement needs a second look before trusting the average too heavily.
  mode: single

- id: environment_room_actionable_alerts
  alias: "Environment — Room Actionable Alerts"
