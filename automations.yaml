    - trigger: time
      at: "09:20:00"
  conditions:
    - condition: state
      entity_id: input_boolean.wine_cave_maintenance_enabled
      state: "on"
    - condition: state
      entity_id: binary_sensor.wine_cave_cabinet_cleaning_due
      state: "on"
  actions:
    - action: script.wine_cave_send_cabinet_cleaning_reminder
  mode: single

- id: wine_cave_rating_plate_one_time_reminder
  alias: "Wine Cave — Rating Plate One-Time Reminder"
  description: Sends one prompt to capture the wine cave rating plate and serial number for house-manager.
  triggers:
    - trigger: time
      at: "10:00:00"
  conditions:
    - condition: state
      entity_id: input_boolean.wine_cave_maintenance_enabled
      state: "on"
    - condition: state
      entity_id: input_boolean.wine_cave_rating_plate_captured
      state: "off"
    - condition: state
      entity_id: input_boolean.wine_cave_rating_plate_reminder_sent
      state: "off"
  actions:
    - action: script.wine_cave_send_rating_plate_reminder
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.wine_cave_rating_plate_reminder_sent
  mode: single

- id: wine_cave_maintenance_notification_actions
  alias: "Wine Cave — Maintenance Notification Actions"
  description: Handles quick actions from wine cave lifecycle and maintenance reminders.
  triggers:
    - trigger: event
      event_type: mobile_app_notification_action
  conditions:
    - condition: template
      value_template: >
        {{ trigger.event.data.action in [
          'WINE_CAVE_CHARCOAL_REPLACED',
          'WINE_CAVE_CHARCOAL_SNOOZE_30',
          'WINE_CAVE_CLEANING_DONE',
          'WINE_CAVE_CLEANING_SNOOZE_30',
          'WINE_CAVE_RATING_PLATE_CAPTURED'
        ] }}
  actions:
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ trigger.event.data.action == 'WINE_CAVE_CHARCOAL_REPLACED' }}"
          sequence:
            - action: script.wine_cave_mark_charcoal_filter_replaced

        - conditions:
            - condition: template
              value_template: "{{ trigger.event.data.action == 'WINE_CAVE_CHARCOAL_SNOOZE_30' }}"
          sequence:
            - action: script.wine_cave_snooze_charcoal_filter

        - conditions:
            - condition: template
              value_template: "{{ trigger.event.data.action == 'WINE_CAVE_CLEANING_DONE' }}"
          sequence:
            - action: script.wine_cave_mark_cabinet_cleaning_done

        - conditions:
            - condition: template
              value_template: "{{ trigger.event.data.action == 'WINE_CAVE_CLEANING_SNOOZE_30' }}"
          sequence:
            - action: script.wine_cave_snooze_cabinet_cleaning

        - conditions:
            - condition: template
              value_template: "{{ trigger.event.data.action == 'WINE_CAVE_RATING_PLATE_CAPTURED' }}"
          sequence:
            - action: script.wine_cave_mark_rating_plate_captured
  mode: parallel
  max: 10

- id: wine_cave_cooling_cycle_settled_notification
  alias: "Wine Cave — Cooling Cycle Settled Notification"
  description: Clears outstanding wine cave cycle notifications once humidity returns to the target band.
  triggers:
    - trigger: state
      entity_id: binary_sensor.wine_cave_cooling_cycle
      to: "off"
      for:
        minutes: 10
  conditions:
    - condition: state
      entity_id: binary_sensor.wine_cave_cycle_settled
      state: "on"
    - condition: state
      entity_id: binary_sensor.wine_cave_sensor_unavailable
      state: "off"
  actions:
    - action: script.notify_trevor_phone
      data:
        message: clear_notification
        data:
          tag: wine-cave-overdue
    - action: script.notify_trevor_phone
      data:
        message: clear_notification
        data:
          tag: wine-cave-unresolved
    - action: script.notify_trevor_phone
      data:
        message: clear_notification
        data:
          tag: wine-cave-cycle
  mode: single

- id: wine_cave_cooling_cycle_overdue_notification
  alias: "Wine Cave — Cooling Cycle Overdue Notification"
  description: Sends a watch-level push when a normal cycle has not recovered in the expected window.
  triggers:
    - trigger: state
      entity_id: binary_sensor.wine_cave_cooling_cycle
      to: "on"
      for:
        minutes: 90
  conditions:
    - condition: state
      entity_id: binary_sensor.wine_cave_sensor_unavailable
      state: "off"
    - condition: state
      entity_id: binary_sensor.wine_cave_actionable_alert
      state: "off"
  actions:
    - action: script.wine_cave_send_alert
      data:
        alert_kind: cycle_overdue
        severity: watch
        message: >-
          Humidity is still below the normal band after 90 minutes.
          Current reading is {{ states('sensor.wine_humidity') | float(0) | round(0) }}% RH
          at {{ states('sensor.wine_temperature') | float(0) | round(1) }}°F.
          This may still resolve, but it is no longer just a quick cycle.
          If the cabinet is closed and powered, check the humidity cartridge next.
  mode: single

- id: wine_cave_cooling_cycle_unresolved_urgent
  alias: "Wine Cave — Cooling Cycle Unresolved Urgent"
  description: Escalates if a dry cooling-cycle condition is still unresolved after several hours.
  triggers:
    - trigger: state
      entity_id: binary_sensor.wine_cave_cooling_cycle
      to: "on"
      for:
        hours: 3
  conditions:
    - condition: state
      entity_id: binary_sensor.wine_cave_sensor_unavailable
      state: "off"
  actions:
    - action: script.wine_cave_send_alert
      data:
        alert_kind: cycle_overdue
        severity: urgent
        message: >-
          Wine cave humidity has stayed low for 3 hours.
          Current reading is {{ states('sensor.wine_humidity') | float(0) | round(0) }}% RH
          at {{ states('sensor.wine_temperature') | float(0) | round(1) }}°F.
          Check the fridge, door, power circuit, and humidity cartridge when you can.
  mode: single

- id: wine_cave_unresolved_attention_reminder
  alias: "Wine Cave — Unresolved Attention Reminder"
  description: Escalates unresolved wine cave issues on a tighter cadence the longer they remain active.
  triggers:
    - trigger: time
      at: "08:30:00"
      id: morning
    - trigger: time
      at: "20:30:00"
      id: evening
    - trigger: time_pattern
      hours: "/6"
      minutes: 30
      id: six_hour
    - trigger: time_pattern
      hours: "/3"
      minutes: 30
      id: three_hour
  conditions:
    - condition: template
      value_template: >-
        {% set now_ts = as_timestamp(now()) %}
        {% set ns = namespace(active=false, oldest=now_ts) %}
        {% if is_state('binary_sensor.wine_cave_actionable_alert', 'on') %}
          {% set ns.active = true %}
          {% set ns.oldest = [ns.oldest, as_timestamp(states.binary_sensor.wine_cave_actionable_alert.last_changed, now())] | min %}
        {% endif %}
        {% if is_state('binary_sensor.wine_cave_sensor_unavailable', 'on') %}
          {% set ns.active = true %}
          {% set ns.oldest = [ns.oldest, as_timestamp(states.binary_sensor.wine_cave_sensor_unavailable.last_changed, now())] | min %}
        {% endif %}
        {% if is_state('binary_sensor.wine_cave_cooling_cycle', 'on')
           and (now_ts - as_timestamp(states.binary_sensor.wine_cave_cooling_cycle.last_changed, now())) >= 10800 %}
          {% set ns.active = true %}
          {% set ns.oldest = [ns.oldest, as_timestamp(states.binary_sensor.wine_cave_cooling_cycle.last_changed, now())] | min %}
        {% endif %}
        {% set unresolved_seconds = now_ts - ns.oldest %}
        {% if trigger.id in ['morning', 'evening'] %}
          {{ ns.active and unresolved_seconds >= 43200 and unresolved_seconds < 86400 }}
        {% elif trigger.id == 'six_hour' %}
          {{ ns.active and unresolved_seconds >= 86400 and unresolved_seconds < 172800 }}
        {% elif trigger.id == 'three_hour' %}
          {{ ns.active and unresolved_seconds >= 172800 }}
        {% else %}
          false
        {% endif %}
  actions:
    - variables:
        unresolved_hours: >-
          {% set now_ts = as_timestamp(now()) %}
          {% set ns = namespace(oldest=now_ts) %}
          {% if is_state('binary_sensor.wine_cave_actionable_alert', 'on') %}
            {% set ns.oldest = [ns.oldest, as_timestamp(states.binary_sensor.wine_cave_actionable_alert.last_changed, now())] | min %}
          {% endif %}
          {% if is_state('binary_sensor.wine_cave_sensor_unavailable', 'on') %}
            {% set ns.oldest = [ns.oldest, as_timestamp(states.binary_sensor.wine_cave_sensor_unavailable.last_changed, now())] | min %}
          {% endif %}
          {% if is_state('binary_sensor.wine_cave_cooling_cycle', 'on') %}
            {% set ns.oldest = [ns.oldest, as_timestamp(states.binary_sensor.wine_cave_cooling_cycle.last_changed, now())] | min %}
          {% endif %}
          {{ ((now_ts - ns.oldest) / 3600) | round(0) | int }}
        active_issue_summary: >-
          {% set ns = namespace(items=[]) %}
          {% if is_state('binary_sensor.wine_cave_sensor_unavailable', 'on') %}
            {% set ns.items = ns.items + ['telemetry is missing'] %}
          {% endif %}
          {% if is_state('binary_sensor.wine_cave_temp_high_alert', 'on') %}
            {% set ns.items = ns.items + ['temperature is high'] %}
          {% endif %}
          {% if is_state('binary_sensor.wine_cave_temp_low_alert', 'on') %}
            {% set ns.items = ns.items + ['temperature is low'] %}
          {% endif %}
          {% if is_state('binary_sensor.wine_cave_moisture_anomaly', 'on') %}
            {% set ns.items = ns.items + ['humidity/moisture is abnormal'] %}
          {% endif %}
          {% if is_state('binary_sensor.wine_cave_condensation_risk', 'on') %}
            {% set ns.items = ns.items + ['condensation risk is active'] %}
          {% endif %}
          {% if is_state('binary_sensor.wine_cave_cooling_cycle', 'on') %}
            {% set ns.items = ns.items + ['cycle recovery is still unresolved'] %}
          {% endif %}
          {{ ns.items | join(', ') if ns.items else 'the wine cave still has an unresolved condition' }}
        escalation_context: >-
          {% set hours = unresolved_hours | int(0) %}
          {% if hours >= 48 %}
            This has been unresolved for more than two days, so reminders now repeat every 3 hours until it recovers.
          {% elif hours >= 24 %}
            This has been unresolved for more than a day, so reminders now repeat every 6 hours until it recovers.
          {% else %}
            If this is still unresolved after 24 hours, reminders will repeat every 6 hours.
          {% endif %}
    - action: script.wine_cave_send_alert
      data:
        alert_kind: unresolved
        severity: urgent
        message: >-
          Wine cave has been unresolved for about {{ unresolved_hours }} hours:
          {{ active_issue_summary }}.
          Current readings are {{ states('sensor.wine_temperature') | float(0) | round(1) }}°F
          and {{ states('sensor.wine_humidity') | float(0) | round(0) }}% RH when telemetry is available.
          {{ escalation_context }}
          Confirm the fridge has power, the door is closed, the sensor is online,
          and the circuit has not tripped.
  mode: single

- id: wine_cave_temperature_alerts
  alias: "Wine Cave — Temperature Alerts"
  description: Sends pushes when the wine cave is genuinely running too warm or too cold for a sustained period.
  triggers:
    - trigger: state
      entity_id: binary_sensor.wine_cave_temp_high_alert
      to: "on"
      id: temp_high
    - trigger: state
      entity_id: binary_sensor.wine_cave_temp_low_alert
      to: "on"
      id: temp_low
  conditions:
    - condition: state
      entity_id: binary_sensor.wine_cave_sensor_unavailable
      state: "off"
  actions:
    - choose:
        - conditions:
            - condition: trigger
              id: temp_high
          sequence:
            - action: script.wine_cave_send_alert
              data:
                alert_kind: temp_high
                severity: urgent
                message: >-
                  Wine cave is at {{ states('sensor.wine_temperature') | float(0) | round(1) }}°F,
                  above your 60°F ceiling.
                  This no longer looks like a normal cycle.
        - conditions:
            - condition: trigger
              id: temp_low
          sequence:
            - action: script.wine_cave_send_alert
              data:
                alert_kind: temp_low
                severity: urgent
                message: >-
                  Wine cave is at {{ states('sensor.wine_temperature') | float(0) | round(1) }}°F,
                  below your 50°F floor.
                  This may be overcooling or a sensor issue.
  mode: single

- id: wine_cave_moisture_anomaly_notification
  alias: "Wine Cave — Moisture Anomaly Notification"
  description: Alerts when humidity is outside the desired band in a way that does not look like a normal refrigeration cycle.
  triggers:
    - trigger: state
      entity_id: binary_sensor.wine_cave_moisture_anomaly
      to: "on"
  conditions:
    - condition: state
      entity_id: binary_sensor.wine_cave_sensor_unavailable
      state: "off"
    - condition: template
      value_template: >
        {{ not (
          is_state('binary_sensor.wine_cave_condensation_risk', 'on')
          and (states('sensor.wine_humidity') | float(0)) > 70
        ) }}
  actions:
    - action: script.wine_cave_send_alert
      data:
        alert_kind: moisture
        message: >-
          {% set humidity = states('sensor.wine_humidity') | float(0) | round(0) %}
          {% set ah = states('sensor.wine_cave_absolute_humidity') | float(0) | round(2) %}
          {% set ah_delta = states('sensor.wine_cave_absolute_humidity_24h_delta') | float(0) %}
          {% if humidity < 50 %}
            Humidity is {{ humidity }}%, below your 50% floor.
            Actual moisture is {{ ah }} g/m³, so this looks drier than a normal cycle.
            If the door and power look normal, check the wine cave humidity cartridge.
          {% else %}
            Humidity is {{ humidity }}% and actual moisture is {{ ah }} g/m³,
            {{ (ah_delta | abs) | round(2) }} g/m³ above the 24-hour average.
            This looks different from a normal refrigeration cycle.
          {% endif %}
  mode: single

- id: wine_cave_condensation_risk_notification
  alias: "Wine Cave — Condensation Risk Notification"
  description: Warns when dew point gets too close to the cellar temperature for long enough to matter.
  triggers:
    - trigger: state
      entity_id: binary_sensor.wine_cave_condensation_risk
      to: "on"
  conditions:
    - condition: state
      entity_id: binary_sensor.wine_cave_sensor_unavailable
      state: "off"
  actions:
    - action: script.wine_cave_send_alert
      data:
        alert_kind: condensation
        message: >-
          Dew point has moved close to cellar temperature:
          {{ states('sensor.wine_cave_dew_point') | float(0) | round(1) }}°F dew point
          vs {{ states('sensor.wine_temperature') | float(0) | round(1) }}°F air temperature.
          Labels and corks may be at risk if this holds.
  mode: single

- id: wine_cave_drift_notification
  alias: "Wine Cave — Drift Notification"
  description: Sends an early heads-up when the last 24 hours drift away from the cave's recent baseline.
  triggers:
    - trigger: state
      entity_id: binary_sensor.wine_cave_drift_alert
      to: "on"
  conditions:
    - condition: state
      entity_id: binary_sensor.wine_cave_sensor_unavailable
      state: "off"
    - condition: state
      entity_id: binary_sensor.wine_cave_actionable_alert
      state: "off"
    - condition: state
      entity_id: binary_sensor.wine_cave_cooling_cycle
      state: "off"
  actions:
    - action: script.wine_cave_send_alert
      data:
        alert_kind: drift
        message: >-
          The last 24 hours have drifted away from the cave's recent pattern:
          {{ states('sensor.wine_temperature_24h_stats') | float(0) | round(1) }}°F avg vs
          {{ states('sensor.wine_temperature_7d_stats') | float(0) | round(1) }}°F over 7 days,
          and {{ states('sensor.wine_humidity_24h_stats') | float(0) | round(0) }}% avg vs
          {{ states('sensor.wine_humidity_7d_stats') | float(0) | round(0) }}% over 7 days.
          Worth a look before it turns into a hard alarm.
  mode: single

- id: wine_cave_sensor_unavailable_notification
  alias: "Wine Cave — Sensor Unavailable Notification"
  description: Warns when wine cave telemetry has been missing long enough that climate alerts may be incomplete.
  triggers:
    - trigger: state
      entity_id: binary_sensor.wine_cave_sensor_unavailable
      to: "on"
  actions:
    - action: script.wine_cave_send_alert
      data:
        alert_kind: sensor_unavailable
        message: >-
          Wine cave temperature or humidity data has been unavailable for 10 minutes,
          so condition alerts may be incomplete right now.
  mode: single

- id: wine_cave_sensor_unavailable_urgent
  alias: "Wine Cave — Sensor Unavailable Urgent"
  description: Escalates when wine cave telemetry stays missing long enough to suggest power or sensor trouble.
  triggers:
    - trigger: state
      entity_id: binary_sensor.wine_cave_sensor_unavailable
      to: "on"
      for:
        minutes: 45
  actions:
    - action: script.wine_cave_send_alert
      data:
        alert_kind: sensor_unavailable
        severity: urgent
        message: >-
          Wine cave temperature or humidity data has been missing for 45 minutes.
          Check the fridge, sensor, and power circuit.
  mode: single

- id: wine_cave_sensor_unavailable_clear
  alias: "Wine Cave — Clear Sensor Unavailable Notification"
  description: Clears the stale wine cave sensor-health push once telemetry has recovered.
  triggers:
    - trigger: state
      entity_id: binary_sensor.wine_cave_sensor_unavailable
      to: "off"
      for:
        minutes: 5
  actions:
    - action: script.notify_trevor_phone
      data:
        message: clear_notification
        data:
          tag: wine-cave-sensor_unavailable
    - choose:
        - conditions:
            - condition: state
              entity_id: binary_sensor.wine_cave_actionable_alert
              state: "off"
            - condition: state
              entity_id: binary_sensor.wine_cave_cooling_cycle
              state: "off"
          sequence:
            - action: script.notify_trevor_phone
              data:
                message: clear_notification
                data:
                  tag: wine-cave-unresolved
  mode: single

- id: wine_cave_abrupt_change_notification
  alias: "Wine Cave — Abrupt Change Notification"
  description: Sends an immediate push when temperature or humidity jumps far more than a normal cycle swing.
  triggers:
    - trigger: state
      entity_id: sensor.wine_temperature
      id: temperature
    - trigger: state
      entity_id: sensor.wine_humidity
      id: humidity
  conditions:
    - condition: state
      entity_id: binary_sensor.wine_cave_sensor_unavailable
      state: "off"
    - condition: template
      value_template: >
        {{ trigger.from_state is not none
           and trigger.to_state is not none
           and trigger.from_state.state not in ['unknown', 'unavailable', 'none', '']
           and trigger.to_state.state not in ['unknown', 'unavailable', 'none', '']
           and (as_timestamp(now()) - as_timestamp(trigger.from_state.last_updated, 0)) <= 1800 }}
    - condition: template
      value_template: >
        {% set from_value = trigger.from_state.state | float(0) %}
        {% set to_value = trigger.to_state.state | float(0) %}
        {% set delta = (to_value - from_value) | abs %}
        {{ (trigger.id == 'temperature' and delta >= 3)
           or (trigger.id == 'humidity' and delta >= 15) }}
    - condition: state
      entity_id: binary_sensor.wine_cave_cooling_cycle
      state: "off"
  actions:
    - action: script.wine_cave_send_alert
      data:
        alert_kind: abrupt
        message: >-
          {% set from_value = trigger.from_state.state | float(0) %}
          {% set to_value = trigger.to_state.state | float(0) %}
          {% set delta = (to_value - from_value) | abs %}
          {% if trigger.id == 'temperature' %}
            Wine temperature changed {{ delta | round(1) }}°F in under 30 minutes,
            from {{ from_value | round(1) }}°F to {{ to_value | round(1) }}°F.
            That can point to an open door, outside air intrusion, or a sensor issue.
          {% else %}
            Wine humidity changed {{ delta | round(0) }} points in under 30 minutes,
            from {{ from_value | round(0) }}% to {{ to_value | round(0) }}%.
            That is larger than a normal cycle swing.
          {% endif %}
    - delay:
        minutes: 30
  mode: single

- id: wine_cave_recovery_notification
  alias: "Wine Cave — Clear Resolved Alert Notifications"
  description: Clears stale wine cave alert pushes when an actionable issue has settled, without sending a separate recovery push.
  triggers:
    - trigger: state
      entity_id: binary_sensor.wine_cave_actionable_alert
      to: "off"
      for:
        minutes: 30
  conditions:
    - condition: state
      entity_id: binary_sensor.wine_cave_sensor_unavailable
      state: "off"
  actions:
    - action: script.notify_trevor_phone
      data:
        message: clear_notification
        data:
          tag: wine-cave-temp_high
    - action: script.notify_trevor_phone
      data:
        message: clear_notification
        data:
          tag: wine-cave-temp_low
    - action: script.notify_trevor_phone
      data:
        message: clear_notification
        data:
          tag: wine-cave-moisture
    - action: script.notify_trevor_phone
      data:
        message: clear_notification
        data:
          tag: wine-cave-condensation
    - action: script.notify_trevor_phone
      data:
        message: clear_notification
        data:
          tag: wine-cave-overdue
    - action: script.notify_trevor_phone
      data:
        message: clear_notification
        data:
          tag: wine-cave-unresolved
  mode: single

- id: basement_humidity_watch_notification
  alias: "Environment — Basement Humidity Watch"
  description: Uses the Airthings-backed basement sensor to warn when the basement stays humid long enough to invite mold, mustiness, or damp-loving bugs.
  triggers:
    - trigger: numeric_state
      entity_id: sensor.mechanical_room_humidity
      above: 55
      for:
        minutes: 90
      id: watch
    - trigger: numeric_state
      entity_id: sensor.mechanical_room_humidity
      above: 60
      for:
        minutes: 45
      id: urgent
    - trigger: numeric_state
      entity_id: sensor.mechanical_room_humidity
      below: 52
      for:
        minutes: 90
      id: clear
    - trigger: homeassistant
      event: start
      id: startup
    - trigger: event
      event_type: automation_reloaded
      id: automation_reloaded
    - trigger: time
      at: input_datetime.basement_humidity_snooze_until
      id: snooze_expired
  actions:
    - if:
        - condition: template
          value_template: "{{ trigger.id == 'startup' }}"
      then:
        - delay:
            minutes: 20
    - if:
        - condition: template
          value_template: "{{ trigger.id == 'automation_reloaded' }}"
      then:
        - delay:
            minutes: 1
    - variables:
        humidity_raw: "{{ states('sensor.mechanical_room_humidity') }}"
        temp_raw: "{{ states('sensor.mechanical_room_temperature') }}"
        humidity_valid: "{{ is_number(humidity_raw) }}"
        temp_valid: "{{ is_number(temp_raw) }}"
        humidity: "{{ humidity_raw | float(0) }}"
        temp: "{{ temp_raw | float(0) }}"
        alert_kind: >-
          {% set h = states('sensor.mechanical_room_humidity') %}
          {% if is_number(h) and (h | float(0)) >= 60 %}
            urgent
          {% elif is_number(h) and (h | float(0)) >= 55 %}
            watch
          {% else %}
            clear
          {% endif %}
        warm_damp: >-
          {% set h = states('sensor.mechanical_room_humidity') %}
          {% set t = states('sensor.mechanical_room_temperature') %}
          {{ is_number(h) and is_number(t) and (h | float(0)) >= 60 and (t | float(0)) >= 68 }}
        snooze_until: "{{ states('input_datetime.basement_humidity_snooze_until') }}"
        snoozed: >-
          {{ snooze_until not in ['unknown', 'unavailable', 'none', '']
             and as_timestamp(snooze_until, 0) > as_timestamp(now()) }}
    - if:
        - condition: template
          value_template: "{{ snoozed and alert_kind != 'clear' }}"
      then:
        - action: script.environment_send_alert
          data:
            room: Basement
            alert_kind: humidity_high
            clear: true
        - stop: Basement humidity notifications are snoozed.
    - choose:
        - conditions:
            - condition: state
              entity_id: input_boolean.environment_alerts_enabled
              state: "off"
          sequence:
            - action: script.environment_send_alert
              data:
                room: Basement
                alert_kind: humidity_high
                clear: true
        - conditions:
            - condition: template
              value_template: "{{ alert_kind == 'urgent' }}"
          sequence:
            - action: script.environment_send_alert
              data:
                room: Basement
                alert_kind: humidity_high
                message: >-
                  Basement humidity is sitting at {{ humidity | round(0) }}%
                  {% if temp_valid | bool %}with the basement around {{ temp | round(0) }}°F{% endif %}.
                  That is damp enough to raise mold, mustiness, and insect risk if it keeps up.
                  {% if warm_damp | bool %}
                    Warm plus humid is especially worth correcting.
                  {% endif %}
                  Worth checking the dehumidifier, drainage, or any open-air source.
        - conditions:
            - condition: template
              value_template: "{{ alert_kind == 'watch' }}"
          sequence:
            - action: script.environment_send_alert
              data:
                room: Basement
                alert_kind: humidity_high
                message: >-
                  Basement humidity has stayed above the safer range long enough to deserve a look:
                  {{ humidity | round(0) }}%
                  {% if temp_valid | bool %}at about {{ temp | round(0) }}°F{% endif %}.
                  In your climate, keeping the basement in the low-to-mid 50s is the better target for
                  mold and damp-bug prevention.
                  Worth checking dehumidification before it turns swampy.
      default:
        - action: script.environment_send_alert
          data:
            room: Basement
            alert_kind: humidity_high
            clear: true
  mode: restart

- id: basement_humidity_notification_actions
  alias: "Environment — Basement Humidity Notification Actions"
  description: Handles basement humidity push actions, including the 24-hour snooze.
  triggers:
    - trigger: event
      event_type: mobile_app_notification_action
  conditions:
    - condition: template
      value_template: "{{ trigger.event.data.action == 'BASEMENT_HUMIDITY_SNOOZE_24H' }}"
  actions:
    - action: script.basement_humidity_snooze_24h
  mode: single

- id: environment_basement_radon_notification
  alias: "Environment — Basement Radon Notification"
  description: Sends a throttled basement radon push when the 24-hour Airthings average reaches the action band.
  triggers:
    - trigger: state
      entity_id: binary_sensor.environment_basement_radon_high_alert
      to: "on"
      id: high
    - trigger: time
      at: "09:00:00"
      id: repeat
    - trigger: state
      entity_id: binary_sensor.environment_basement_radon_high_alert
      to: "off"
      id: clear
  actions:
    - variables:
        due_again: >-
          {% set last_ts = as_timestamp(states('input_datetime.environment_radon_last_alert'), 0) %}
          {{ last_ts == 0 or (as_timestamp(now()) - last_ts) >= 604800 }}
        should_send: >-
          {{ is_state('input_boolean.environment_alerts_enabled', 'on')
             and is_state('binary_sensor.environment_basement_radon_high_alert', 'on')
             and (trigger.id == 'high' or (trigger.id == 'repeat' and due_again | bool)) }}
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ trigger.id == 'clear' or not is_state('input_boolean.environment_alerts_enabled', 'on') }}"
          sequence:
            - action: script.environment_send_alert
              data:
                room: Basement
                alert_kind: radon_high
                clear: true
        - conditions:
            - condition: template
              value_template: "{{ should_send }}"
          sequence:
            - action: script.environment_send_alert
              data:
                room: Basement
                alert_kind: radon_high
                message: >-
                  Basement radon is elevated on the 24-hour average:
                  {{ states('sensor.basement_radon_24h_stats') }} {{ state_attr('sensor.basement_air_quality_radon', 'unit_of_measurement') or 'Bq/m³' }}.
                  The dashboard starts watching at 75 Bq/m³ and this push fires around the EPA action band.
                  Check ventilation or mitigation status if this persists.
            - action: input_datetime.set_datetime
              target:
                entity_id: input_datetime.environment_radon_last_alert
              data:
                datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
  mode: single
