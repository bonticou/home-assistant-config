      to: "on"
      id: kitchen_temp_low
    - trigger: state
      entity_id: binary_sensor.environment_kitchen_humidity_high_alert
      to: "on"
      id: kitchen_humidity_high
    - trigger: state
      entity_id: binary_sensor.environment_kitchen_humidity_low_alert
      to: "on"
      id: kitchen_humidity_low
    - trigger: state
      entity_id: binary_sensor.environment_dining_room_temp_high_alert
      to: "on"
      id: dining_temp_high
    - trigger: state
      entity_id: binary_sensor.environment_dining_room_temp_low_alert
      to: "on"
      id: dining_temp_low
    - trigger: state
      entity_id: binary_sensor.environment_dining_room_humidity_high_alert
      to: "on"
      id: dining_humidity_high
    - trigger: state
      entity_id: binary_sensor.environment_dining_room_humidity_low_alert
      to: "on"
      id: dining_humidity_low
    - trigger: state
      entity_id: binary_sensor.environment_primary_bedroom_temp_high_alert
      to: "on"
      id: primary_temp_high
    - trigger: state
      entity_id: binary_sensor.environment_primary_bedroom_temp_low_alert
      to: "on"
      id: primary_temp_low
    - trigger: state
      entity_id: binary_sensor.environment_primary_bedroom_humidity_high_alert
      to: "on"
      id: primary_humidity_high
    - trigger: state
      entity_id: binary_sensor.environment_primary_bedroom_humidity_low_alert
      to: "on"
      id: primary_humidity_low
    - trigger: state
      entity_id: binary_sensor.environment_basement_temp_high_alert
      to: "on"
      id: basement_temp_high
    - trigger: state
      entity_id: binary_sensor.environment_basement_temp_low_alert
      to: "on"
      id: basement_temp_low
    - trigger: state
      entity_id: binary_sensor.environment_garage_temp_high_alert
      to: "on"
      id: garage_temp_high
    - trigger: state
      entity_id: binary_sensor.environment_garage_temp_low_alert
      to: "on"
      id: garage_temp_low
    - trigger: state
      entity_id: binary_sensor.environment_garage_humidity_high_alert
      to: "on"
      id: garage_humidity_high
    - trigger: state
      entity_id: binary_sensor.environment_attic_temp_high_alert
      to: "on"
      id: attic_temp_high
    - trigger: state
      entity_id: binary_sensor.environment_attic_humidity_high_alert
      to: "on"
      id: attic_humidity_high
    - trigger: state
      entity_id: binary_sensor.environment_dining_room_ecobee_temp_disagreement
      to: "on"
      id: dining_temp_disagreement
    - trigger: state
      entity_id: binary_sensor.environment_dining_room_ecobee_humidity_disagreement
      to: "on"
      id: dining_humidity_disagreement
    - trigger: state
      entity_id:
        - binary_sensor.environment_kitchen_sensor_unavailable
        - binary_sensor.environment_dining_room_sensor_unavailable
        - binary_sensor.environment_primary_bedroom_sensor_unavailable
        - binary_sensor.environment_basement_sensor_unavailable
        - binary_sensor.environment_garage_sensor_unavailable
        - binary_sensor.environment_attic_sensor_unavailable
      to: "on"
      id: sensor_unavailable
  conditions:
    - condition: state
      entity_id: input_boolean.environment_alerts_enabled
      state: "on"
  actions:
    - variables:
        entity: "{{ trigger.to_state.entity_id }}"
        trigger_name: "{{ trigger.id }}"
    - variables:
        room: >-
          {% if 'kitchen' in trigger_name or entity == 'binary_sensor.environment_kitchen_sensor_unavailable' %}Kitchen
          {% elif 'dining' in trigger_name or entity == 'binary_sensor.environment_dining_room_sensor_unavailable' %}Dining Room
          {% elif 'primary' in trigger_name or entity == 'binary_sensor.environment_primary_bedroom_sensor_unavailable' %}Primary Bedroom
          {% elif 'basement' in trigger_name or entity == 'binary_sensor.environment_basement_sensor_unavailable' %}Basement
          {% elif 'garage' in trigger_name or entity == 'binary_sensor.environment_garage_sensor_unavailable' %}Garage
          {% elif 'attic' in trigger_name or entity == 'binary_sensor.environment_attic_sensor_unavailable' %}Attic
          {% else %}Environment{% endif %}
        kind: >-
          {% if trigger_name == 'sensor_unavailable' %}sensor_unavailable
          {% elif 'disagreement' in trigger_name %}source_disagreement
          {% elif 'temp_high' in trigger_name %}temp_high
          {% elif 'temp_low' in trigger_name %}temp_low
          {% elif 'humidity_high' in trigger_name %}humidity_high
          {% elif 'humidity_low' in trigger_name %}humidity_low
          {% else %}status{% endif %}
    - variables:
        message: >-
          {% set room_name = room %}
          {% if kind == 'sensor_unavailable' %}
            {{ room_name }} environment sensor has been unavailable for 15 minutes.
            Check battery, Bluetooth gateway reachability, or the room sensor placement.
          {% elif room_name == 'Kitchen' %}
            {% set t = states('sensor.main_floor_temperature') %}
            {% set h = states('sensor.main_floor_humidity') %}
            Kitchen is at {{ t }}°F and {{ h }}% humidity. This has stayed outside the action range long enough to deserve a look.
          {% elif room_name == 'Dining Room' and kind == 'source_disagreement' %}
            Dining Room SensorPush and Ecobee readings have been apart long enough to check placement or airflow.
            SensorPush is {{ states('sensor.main_floor_2_temperature') }}°F / {{ states('sensor.main_floor_2_humidity') }}%.
            Ecobee is {{ states('sensor.dining_room_current_temperature') }}°F / {{ states('sensor.dining_room_current_humidity') }}%.
          {% elif room_name == 'Dining Room' %}
            Dining Room is at {{ states('sensor.main_floor_2_temperature') }}°F and {{ states('sensor.main_floor_2_humidity') }}% humidity.
            Dining Room Ecobee is {{ states('sensor.dining_room_current_temperature') }}°F and {{ states('sensor.dining_room_current_humidity') }}%.
          {% elif room_name == 'Primary Bedroom' %}
            Primary Bedroom is at {{ states('sensor.master_temperature') }}°F and {{ states('sensor.master_humidity') }}% humidity.
            This alert uses the room sensor as the source of truth.
          {% elif room_name == 'Basement' %}
            Basement is at {{ states('sensor.mechanical_room_temperature') }}°F and {{ states('sensor.mechanical_room_humidity') }}% humidity.
            Worth checking dehumidification, ventilation, or any open-air source if this keeps up.
          {% elif room_name == 'Garage' %}
            Garage is at {{ states('sensor.garage_temperature') }}°F and {{ states('sensor.garage_humidity') }}% humidity.
            This is outside the garage action band.
          {% elif room_name == 'Attic' %}
            Attic is at {{ states('sensor.attic_temperature') }}°F and {{ states('sensor.attic_humidity') }}% humidity.
            This is outside the attic action band.
          {% else %}
            One of the environment sensors has been unavailable for 15 minutes. Check the Environment tab for the specific room.
          {% endif %}
    - action: script.environment_send_alert
      data:
        room: "{{ room }}"
        alert_kind: "{{ kind }}"
        message: "{{ message }}"
  mode: parallel

- id: environment_room_alert_clears
  alias: "Environment — Clear Room Alerts"
  description: Clears room environment notifications when the underlying actionable binary sensor recovers.
  triggers:
    - trigger: state
      entity_id:
        - binary_sensor.environment_kitchen_temp_high_alert
        - binary_sensor.environment_kitchen_temp_low_alert
        - binary_sensor.environment_kitchen_humidity_high_alert
        - binary_sensor.environment_kitchen_humidity_low_alert
        - binary_sensor.environment_dining_room_temp_high_alert
        - binary_sensor.environment_dining_room_temp_low_alert
        - binary_sensor.environment_dining_room_humidity_high_alert
        - binary_sensor.environment_dining_room_humidity_low_alert
        - binary_sensor.environment_primary_bedroom_temp_high_alert
        - binary_sensor.environment_primary_bedroom_temp_low_alert
        - binary_sensor.environment_primary_bedroom_humidity_high_alert
        - binary_sensor.environment_primary_bedroom_humidity_low_alert
        - binary_sensor.environment_basement_temp_high_alert
        - binary_sensor.environment_basement_temp_low_alert
        - binary_sensor.environment_garage_temp_high_alert
        - binary_sensor.environment_garage_temp_low_alert
        - binary_sensor.environment_garage_humidity_high_alert
        - binary_sensor.environment_attic_temp_high_alert
        - binary_sensor.environment_attic_humidity_high_alert
        - binary_sensor.environment_dining_room_ecobee_temp_disagreement
        - binary_sensor.environment_dining_room_ecobee_humidity_disagreement
        - binary_sensor.environment_kitchen_sensor_unavailable
        - binary_sensor.environment_dining_room_sensor_unavailable
        - binary_sensor.environment_primary_bedroom_sensor_unavailable
        - binary_sensor.environment_basement_sensor_unavailable
        - binary_sensor.environment_garage_sensor_unavailable
        - binary_sensor.environment_attic_sensor_unavailable
        - binary_sensor.downstairs_temp_spread_high
      to: "off"
  actions:
    - variables:
        entity: "{{ trigger.to_state.entity_id }}"
        room: >-
          {% if 'kitchen' in entity %}Kitchen
          {% elif 'dining_room' in entity %}Dining Room
          {% elif 'primary_bedroom' in entity %}Primary Bedroom
          {% elif 'basement' in entity %}Basement
          {% elif 'garage' in entity %}Garage
          {% elif 'attic' in entity %}Attic
          {% elif entity == 'binary_sensor.downstairs_temp_spread_high' %}Main Floor
          {% else %}Environment{% endif %}
        kind: >-
          {% if 'sensor_unavailable' in entity %}sensor_unavailable
          {% elif 'disagreement' in entity %}source_disagreement
          {% elif entity == 'binary_sensor.downstairs_temp_spread_high' %}source_disagreement
          {% elif 'temp_high' in entity %}temp_high
          {% elif 'temp_low' in entity %}temp_low
          {% elif 'humidity_high' in entity %}humidity_high
          {% elif 'humidity_low' in entity %}humidity_low
          {% else %}status{% endif %}
    - action: script.environment_send_alert
      data:
        room: "{{ room }}"
        alert_kind: "{{ kind }}"
        clear: true
  mode: parallel

- id: garden_seedling_morning_check_notification
  alias: "Garden — Morning Seedling Check"
  description: Sends a gentle morning reminder to inspect the indoor starts.
  triggers:
    - trigger: time
      at: "08:30:00"
  conditions:
    - condition: state
      entity_id: input_boolean.garden_tracking_enabled
      state: "on"
    - condition: state
      entity_id: input_boolean.garden_watering_nudges_enabled
      state: "on"
    - condition: state
      entity_id: binary_sensor.garden_indoor_seedlings_active
      state: "on"
    - condition: state
      entity_id: binary_sensor.garden_seedling_check_due
      state: "on"
  actions:
    - action: script.notify_trevor_phone
      data:
        title: "Garden check"
        message: >-
          Take a quick pass on the 32 indoor starts you sowed on April 11, 2026.
          Check moisture, leaf color, any legginess, and whether the lights are still close to the canopy.
        data:
          tag: garden-daily-check
          url: /calm-mobile/garden
          actions:
            - action: GARDEN_MARK_CHECKED
              title: Mark checked
            - action: GARDEN_MARK_WATERED
              title: Mark watered
  mode: single

- id: garden_daily_status_reset
  alias: "Garden — Reset Daily Status"
  description: Clears the daily check and watering flags shortly after midnight.
  triggers:
    - trigger: time
      at: "00:05:00"
  actions:
    - action: input_boolean.turn_off
      target:
        entity_id:
          - input_boolean.garden_checked_today
          - input_boolean.garden_watered_today
  mode: single

- id: garden_seedling_evening_watering_notification
  alias: "Garden — Evening Moisture Review"
  description: Sends an evening reminder to review watering needs for the indoor starts.
  triggers:
    - trigger: time
      at: "18:30:00"
  conditions:
    - condition: state
      entity_id: input_boolean.garden_tracking_enabled
      state: "on"
    - condition: state
      entity_id: input_boolean.garden_watering_nudges_enabled
      state: "on"
    - condition: state
      entity_id: binary_sensor.garden_indoor_seedlings_active
      state: "on"
    - condition: state
      entity_id: binary_sensor.garden_water_review_due
      state: "on"
  actions:
    - action: script.notify_trevor_phone
      data:
        title: "Garden moisture pass"
        message: >-
          Do an evening check on the indoor trays.
          If the cells feel light or the surface is drying, bottom-water tonight.
        data:
          tag: garden-daily-check
          url: /calm-mobile/garden
          actions:
            - action: GARDEN_MARK_CHECKED
              title: Mark checked
            - action: GARDEN_MARK_WATERED
              title: Mark watered
  mode: single

- id: garden_marigolds_hardening_notification
  alias: "Garden — Marigolds Hardening Reminder"
  description: Suggests starting hardening off for the petite marigolds once the live weather and forecast cooperate.
  triggers:
    - trigger: time
      at: "09:00:00"
  conditions:
    - condition: state
      entity_id: input_boolean.garden_tracking_enabled
      state: "on"
    - condition: state
      entity_id: input_boolean.garden_weather_nudges_enabled
      state: "on"
    - condition: state
      entity_id: input_boolean.garden_marigolds_hardening_off
      state: "off"
    - condition: state
      entity_id: input_boolean.garden_marigolds_outside
      state: "off"
    - condition: numeric_state
      entity_id: sensor.garden_days_since_sowing
      above: 13
    - condition: state
      entity_id: binary_sensor.garden_marigolds_weather_ready
      state: "on"
  actions:
    - action: script.notify_trevor_phone
      data:
        title: "Garden: marigolds can start hardening"
        message: >-
          Your petite marigolds have reached their hardening window.
          Outside right now: {{ states('sensor.garden_outdoor_snapshot') }}.
          Next forecast lows: {{ state_attr('sensor.garden_lowest_forecast_low_4_day', 'next_4_lows') }}.
          Start with a short bright-shade session and build up over 5 to 7 days.
        data:
          tag: garden-marigolds-stage
          url: /calm-mobile/garden
          actions:
            - action: GARDEN_START_MARIGOLDS_HARDENING
              title: Started
  mode: single

- id: garden_basil_hardening_notification
  alias: "Garden — Basil Hardening Reminder"
  description: Suggests starting hardening off for the basil once the live weather and forecast are warm enough.
  triggers:
    - trigger: time
      at: "09:10:00"
  conditions:
    - condition: state
      entity_id: input_boolean.garden_tracking_enabled
      state: "on"
    - condition: state
      entity_id: input_boolean.garden_weather_nudges_enabled
      state: "on"
    - condition: state
      entity_id: input_boolean.garden_basil_hardening_off
      state: "off"
    - condition: state
      entity_id: input_boolean.garden_basil_outside
      state: "off"
    - condition: numeric_state
      entity_id: sensor.garden_days_since_sowing
      above: 27
    - condition: state
      entity_id: binary_sensor.garden_basil_weather_ready
      state: "on"
  actions:
    - action: script.notify_trevor_phone
      data:
        title: "Garden: basil can start hardening"
        message: >-
          The basil trays have reached their hardening window.
          Outside right now: {{ states('sensor.garden_outdoor_snapshot') }}.
          Next forecast lows: {{ state_attr('sensor.garden_lowest_forecast_low_4_day', 'next_4_lows') }}.
          Give them a gentle first day outdoors and build exposure over about a week.
        data:
          tag: garden-basil-stage
          url: /calm-mobile/garden
          actions:
            - action: GARDEN_START_BASIL_HARDENING
              title: Started
  mode: single

- id: garden_marigolds_move_outside_notification
  alias: "Garden — Marigolds Move Outside Reminder"
  description: Suggests moving the marigolds outside once hardening time and weather both look good.
  triggers:
    - trigger: time
      at: "09:20:00"
  conditions:
    - condition: state
      entity_id: input_boolean.garden_tracking_enabled
      state: "on"
    - condition: state
      entity_id: input_boolean.garden_weather_nudges_enabled
      state: "on"
    - condition: state
      entity_id: input_boolean.garden_marigolds_hardening_off
      state: "on"
    - condition: state
      entity_id: input_boolean.garden_marigolds_outside
      state: "off"
    - condition: state
      entity_id: binary_sensor.garden_marigolds_weather_ready
      state: "on"
    - condition: template
      value_template: >
        {% set started = states('input_datetime.garden_marigolds_hardening_started') %}
        {{ started not in ['unknown', 'unavailable', '']
           and (now().date() - as_datetime(started).date()).days >= 5 }}
  actions:
    - action: script.notify_trevor_phone
      data:
        title: "Garden: marigolds look ready to move out"
        message: >-
          Your petite marigolds have had at least five days of hardening.
          Outside right now: {{ states('sensor.garden_outdoor_snapshot') }}.
          Next forecast lows: {{ state_attr('sensor.garden_lowest_forecast_low_4_day', 'next_4_lows') }}.
          If the trays look sturdy, they should be ready for full-time outdoor life.
        data:
          tag: garden-marigolds-stage
          url: /calm-mobile/garden
          actions:
            - action: GARDEN_MARK_MARIGOLDS_OUTSIDE
              title: Moved outside
  mode: single

- id: garden_basil_move_outside_notification
  alias: "Garden — Basil Move Outside Reminder"
  description: Suggests moving the basil outside once hardening time and weather both look good.
  triggers:
    - trigger: time
      at: "09:30:00"
  conditions:
    - condition: state
      entity_id: input_boolean.garden_tracking_enabled
      state: "on"
    - condition: state
      entity_id: input_boolean.garden_weather_nudges_enabled
      state: "on"
    - condition: state
      entity_id: input_boolean.garden_basil_hardening_off
      state: "on"
    - condition: state
      entity_id: input_boolean.garden_basil_outside
      state: "off"
    - condition: state
      entity_id: binary_sensor.garden_basil_weather_ready
      state: "on"
    - condition: template
      value_template: >
        {% set started = states('input_datetime.garden_basil_hardening_started') %}
        {{ started not in ['unknown', 'unavailable', '']
           and (now().date() - as_datetime(started).date()).days >= 7 }}
  actions:
    - action: script.notify_trevor_phone
      data:
        title: "Garden: basil looks ready to move out"
        message: >-
          The basil trays have had about a week of hardening.
          Outside right now: {{ states('sensor.garden_outdoor_snapshot') }}.
          Next forecast lows: {{ state_attr('sensor.garden_lowest_forecast_low_4_day', 'next_4_lows') }}.
          If the stems and leaves still look happy, they should be ready for outdoor nights.
        data:
          tag: garden-basil-stage
          url: /calm-mobile/garden
          actions:
            - action: GARDEN_MARK_BASIL_OUTSIDE
              title: Moved outside
  mode: single

- id: garden_notification_actions
  alias: "Garden — Notification Actions"
  description: Handles the quick actions from garden reminders.
  triggers:
    - trigger: event
      event_type: mobile_app_notification_action
  conditions:
    - condition: template
      value_template: >
        {{ trigger.event.data.action in [
          'GARDEN_MARK_CHECKED',
          'GARDEN_MARK_WATERED',
          'GARDEN_START_MARIGOLDS_HARDENING',
          'GARDEN_START_BASIL_HARDENING',
          'GARDEN_MARK_MARIGOLDS_OUTSIDE',
          'GARDEN_MARK_BASIL_OUTSIDE'
        ] }}
  actions:
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ trigger.event.data.action == 'GARDEN_MARK_CHECKED' }}"
          sequence:
            - action: script.garden_mark_seedlings_checked

        - conditions:
            - condition: template
              value_template: "{{ trigger.event.data.action == 'GARDEN_MARK_WATERED' }}"
          sequence:
            - action: script.garden_mark_seedlings_watered

        - conditions:
            - condition: template
              value_template: "{{ trigger.event.data.action == 'GARDEN_START_MARIGOLDS_HARDENING' }}"
          sequence:
            - action: script.garden_start_marigolds_hardening

        - conditions:
            - condition: template
              value_template: "{{ trigger.event.data.action == 'GARDEN_START_BASIL_HARDENING' }}"
          sequence:
            - action: script.garden_start_basil_hardening

        - conditions:
            - condition: template
              value_template: "{{ trigger.event.data.action == 'GARDEN_MARK_MARIGOLDS_OUTSIDE' }}"
          sequence:
            - action: script.garden_mark_marigolds_outside

        - conditions:
            - condition: template
              value_template: "{{ trigger.event.data.action == 'GARDEN_MARK_BASIL_OUTSIDE' }}"
          sequence:
            - action: script.garden_mark_basil_outside
    - action: notify.mobile_app_tk_iphone_16_pro
      data:
        message: clear_notification
        data:
          tag: "{{ 'garden-daily-check' if trigger.event.data.action in ['GARDEN_MARK_CHECKED', 'GARDEN_MARK_WATERED'] else 'garden-marigolds-stage' if trigger.event.data.action in ['GARDEN_START_MARIGOLDS_HARDENING', 'GARDEN_MARK_MARIGOLDS_OUTSIDE'] else 'garden-basil-stage' }}"
  mode: parallel
  max: 10

- id: wine_cave_cooling_cycle_notification
  alias: "Wine Cave — Cooling Cycle Notification"
  description: Sends one calm push when the cave looks like it entered a normal refrigeration cycle.
  triggers:
    - trigger: state
      entity_id: binary_sensor.wine_cave_cooling_cycle
      to: "on"
  conditions:
    - condition: state
      entity_id: binary_sensor.wine_cave_sensor_unavailable
      state: "off"
  actions:
    - action: script.wine_cave_send_alert
      data:
        alert_kind: cycle
        message: >-
          Humidity bumped because the refrigeration cycle started.
          {{ states('sensor.wine_temperature') | float(0) | round(1) }}°F
          · {{ states('sensor.wine_humidity') | float(0) | round(0) }}% RH
          · {{ states('sensor.wine_cave_absolute_humidity') | float(0) | round(2) }} g/m³.
          This looks normal.
  mode: single

- id: wine_cave_temperature_alerts
  alias: "Wine Cave — Temperature Alerts"
  description: Sends pushes when the wine cave is genuinely running too warm or too cold for a sustained period.
  triggers:
    - trigger: state
      entity_id: binary_sensor.wine_cave_temp_high_alert
      to: "on"
      id: temp_high
    - trigger: state
      entity_id: binary_sensor.wine_cave_temp_low_alert
      to: "on"
      id: temp_low
  conditions:
    - condition: state
      entity_id: binary_sensor.wine_cave_sensor_unavailable
      state: "off"
  actions:
    - choose:
        - conditions:
            - condition: trigger
              id: temp_high
          sequence:
            - action: script.wine_cave_send_alert
              data:
                alert_kind: temp_high
                message: >-
                  Wine cave is at {{ states('sensor.wine_temperature') | float(0) | round(1) }}°F,
                  above your 60°F ceiling.
                  This no longer looks like a normal cycle.
        - conditions:
            - condition: trigger
              id: temp_low
          sequence:
            - action: script.wine_cave_send_alert
              data:
                alert_kind: temp_low
                message: >-
                  Wine cave is at {{ states('sensor.wine_temperature') | float(0) | round(1) }}°F,
                  below your 50°F floor.
                  This may be overcooling or a sensor issue.
  mode: single

- id: wine_cave_moisture_anomaly_notification
  alias: "Wine Cave — Moisture Anomaly Notification"
  description: Alerts when humidity is outside the desired band in a way that does not look like a normal refrigeration cycle.
  triggers:
    - trigger: state
      entity_id: binary_sensor.wine_cave_moisture_anomaly
      to: "on"
  conditions:
    - condition: state
      entity_id: binary_sensor.wine_cave_sensor_unavailable
      state: "off"
    - condition: template
      value_template: >
        {{ not (
          is_state('binary_sensor.wine_cave_condensation_risk', 'on')
          and (states('sensor.wine_humidity') | float(0)) > 70
        ) }}
  actions:
    - action: script.wine_cave_send_alert
      data:
        alert_kind: moisture
        message: >-
          {% set humidity = states('sensor.wine_humidity') | float(0) | round(0) %}
          {% set ah = states('sensor.wine_cave_absolute_humidity') | float(0) | round(2) %}
          {% set ah_delta = states('sensor.wine_cave_absolute_humidity_24h_delta') | float(0) %}
          {% if humidity < 50 %}
            Humidity is {{ humidity }}%, below your 50% floor.
            Actual moisture is {{ ah }} g/m³, so this looks drier than a normal cycle.
          {% else %}
            Humidity is {{ humidity }}% and actual moisture is {{ ah }} g/m³,
            {{ (ah_delta | abs) | round(2) }} g/m³ above the 24-hour average.
            This looks different from a normal refrigeration cycle.
          {% endif %}
  mode: single

- id: wine_cave_condensation_risk_notification
  alias: "Wine Cave — Condensation Risk Notification"
  description: Warns when dew point gets too close to the cellar temperature for long enough to matter.
  triggers:
    - trigger: state
      entity_id: binary_sensor.wine_cave_condensation_risk
      to: "on"
  conditions:
    - condition: state
      entity_id: binary_sensor.wine_cave_sensor_unavailable
      state: "off"
  actions:
    - action: script.wine_cave_send_alert
      data:
        alert_kind: condensation
        message: >-
          Dew point has moved close to cellar temperature:
          {{ states('sensor.wine_cave_dew_point') | float(0) | round(1) }}°F dew point
          vs {{ states('sensor.wine_temperature') | float(0) | round(1) }}°F air temperature.
          Labels and corks may be at risk if this holds.
  mode: single

- id: wine_cave_drift_notification
  alias: "Wine Cave — Drift Notification"
  description: Sends an early heads-up when the last 24 hours drift away from the cave's recent baseline.
  triggers:
    - trigger: state
      entity_id: binary_sensor.wine_cave_drift_alert
      to: "on"
  conditions:
    - condition: state
      entity_id: binary_sensor.wine_cave_sensor_unavailable
      state: "off"
    - condition: state
      entity_id: binary_sensor.wine_cave_actionable_alert
      state: "off"
  actions:
    - action: script.wine_cave_send_alert
      data:
        alert_kind: drift
        message: >-
          The last 24 hours have drifted away from the cave's recent pattern:
          {{ states('sensor.wine_temperature_24h_stats') | float(0) | round(1) }}°F avg vs
          {{ states('sensor.wine_temperature_7d_stats') | float(0) | round(1) }}°F over 7 days,
          and {{ states('sensor.wine_humidity_24h_stats') | float(0) | round(0) }}% avg vs
          {{ states('sensor.wine_humidity_7d_stats') | float(0) | round(0) }}% over 7 days.
          Worth a look before it turns into a hard alarm.
  mode: single

- id: wine_cave_sensor_unavailable_notification
  alias: "Wine Cave — Sensor Unavailable Notification"
  description: Warns when wine cave telemetry has been missing long enough that climate alerts may be incomplete.
  triggers:
    - trigger: state
      entity_id: binary_sensor.wine_cave_sensor_unavailable
      to: "on"
  actions:
    - action: script.wine_cave_send_alert
      data:
        alert_kind: sensor_unavailable
        message: >-
          Wine cave temperature or humidity data has been unavailable for 10 minutes,
          so condition alerts may be incomplete right now.
  mode: single

- id: wine_cave_sensor_unavailable_clear
  alias: "Wine Cave — Clear Sensor Unavailable Notification"
  description: Clears the stale wine cave sensor-health push once telemetry has recovered.
  triggers:
    - trigger: state
      entity_id: binary_sensor.wine_cave_sensor_unavailable
      to: "off"
      for:
        minutes: 5
  actions:
    - action: script.notify_trevor_phone
      data:
        message: clear_notification
        data:
          tag: wine-cave-sensor_unavailable
  mode: single

- id: wine_cave_abrupt_change_notification
  alias: "Wine Cave — Abrupt Change Notification"
  description: Sends an immediate push when temperature or humidity jumps far more than a normal cycle swing.
  triggers:
    - trigger: state
      entity_id: sensor.wine_temperature
      id: temperature
    - trigger: state
      entity_id: sensor.wine_humidity
      id: humidity
  conditions:
    - condition: state
      entity_id: binary_sensor.wine_cave_sensor_unavailable
      state: "off"
    - condition: template
      value_template: >
        {{ trigger.from_state is not none
           and trigger.to_state is not none
           and trigger.from_state.state not in ['unknown', 'unavailable', 'none', '']
           and trigger.to_state.state not in ['unknown', 'unavailable', 'none', '']
           and (as_timestamp(now()) - as_timestamp(trigger.from_state.last_updated, 0)) <= 1800 }}
    - condition: template
      value_template: >
        {% set from_value = trigger.from_state.state | float(0) %}
        {% set to_value = trigger.to_state.state | float(0) %}
        {% set delta = (to_value - from_value) | abs %}
        {{ (trigger.id == 'temperature' and delta >= 3)
           or (trigger.id == 'humidity' and delta >= 15) }}
  actions:
    - action: script.wine_cave_send_alert
      data:
        alert_kind: abrupt
        message: >-
          {% set from_value = trigger.from_state.state | float(0) %}
          {% set to_value = trigger.to_state.state | float(0) %}
          {% set delta = (to_value - from_value) | abs %}
          {% if trigger.id == 'temperature' %}
            Wine temperature changed {{ delta | round(1) }}°F in under 30 minutes,
            from {{ from_value | round(1) }}°F to {{ to_value | round(1) }}°F.
            That can point to an open door, outside air intrusion, or a sensor issue.
          {% else %}
            Wine humidity changed {{ delta | round(0) }} points in under 30 minutes,
            from {{ from_value | round(0) }}% to {{ to_value | round(0) }}%.
            That is larger than a normal cycle swing.
          {% endif %}
    - delay:
        minutes: 30
  mode: single

- id: wine_cave_recovery_notification
  alias: "Wine Cave — Recovery Notification"
  description: Sends a push when the active wine cave issue has settled back into range for a while.
  triggers:
    - trigger: state
      entity_id: binary_sensor.wine_cave_actionable_alert
      to: "off"
      for:
        minutes: 30
  conditions:
    - condition: state
      entity_id: binary_sensor.wine_cave_sensor_unavailable
      state: "off"
  actions:
    - action: script.notify_trevor_phone
      data:
        message: clear_notification
        data:
          tag: wine-cave-temp_high
    - action: script.notify_trevor_phone
      data:
        message: clear_notification
        data:
          tag: wine-cave-temp_low
    - action: script.notify_trevor_phone
      data:
        message: clear_notification
        data:
          tag: wine-cave-moisture
    - action: script.notify_trevor_phone
      data:
        message: clear_notification
        data:
          tag: wine-cave-condensation
    - action: script.wine_cave_send_alert
      data:
        alert_kind: recovery
        message: >-
          Live conditions are back in range at
          {{ states('sensor.wine_temperature') | float(0) | round(1) }}°F
          and {{ states('sensor.wine_humidity') | float(0) | round(0) }}% RH.
  mode: single

- id: basement_humidity_watch_notification
  alias: "Environment — Basement Humidity Watch"
  description: Uses the Airthings-backed basement sensor to warn when the basement stays humid long enough to invite mold, mustiness, or damp-loving bugs.
  triggers:
    - trigger: numeric_state
      entity_id: sensor.mechanical_room_humidity
      above: 55
      for:
        minutes: 90
      id: watch
    - trigger: numeric_state
      entity_id: sensor.mechanical_room_humidity
      above: 60
      for:
        minutes: 45
      id: urgent
    - trigger: numeric_state
      entity_id: sensor.mechanical_room_humidity
      below: 52
      for:
        minutes: 90
      id: clear
    - trigger: homeassistant
      event: start
      id: startup
    - trigger: event
      event_type: automation_reloaded
      id: automation_reloaded
  actions:
    - if:
        - condition: template
          value_template: "{{ trigger.id == 'startup' }}"
      then:
        - delay:
            minutes: 20
    - if:
        - condition: template
          value_template: "{{ trigger.id == 'automation_reloaded' }}"
      then:
        - delay:
            minutes: 1
    - variables:
        humidity_raw: "{{ states('sensor.mechanical_room_humidity') }}"
        temp_raw: "{{ states('sensor.mechanical_room_temperature') }}"
        humidity_valid: "{{ is_number(humidity_raw) }}"
        temp_valid: "{{ is_number(temp_raw) }}"
        humidity: "{{ humidity_raw | float(0) }}"
        temp: "{{ temp_raw | float(0) }}"
        alert_kind: >-
          {% set h = states('sensor.mechanical_room_humidity') %}
          {% if is_number(h) and (h | float(0)) >= 60 %}
            urgent
          {% elif is_number(h) and (h | float(0)) >= 55 %}
            watch
          {% else %}
            clear
          {% endif %}
        warm_damp: >-
          {% set h = states('sensor.mechanical_room_humidity') %}
          {% set t = states('sensor.mechanical_room_temperature') %}
          {{ is_number(h) and is_number(t) and (h | float(0)) >= 60 and (t | float(0)) >= 68 }}
    - choose:
        - conditions:
            - condition: state
              entity_id: input_boolean.environment_alerts_enabled
              state: "off"
          sequence:
            - action: script.environment_send_alert
              data:
                room: Basement
                alert_kind: humidity_high
                clear: true
        - conditions:
            - condition: template
              value_template: "{{ alert_kind == 'urgent' }}"
          sequence:
            - action: script.environment_send_alert
              data:
                room: Basement
                alert_kind: humidity_high
                message: >-
                  Basement humidity is sitting at {{ humidity | round(0) }}%
                  {% if temp_valid | bool %}with the basement around {{ temp | round(0) }}°F{% endif %}.
                  That is damp enough to raise mold, mustiness, and insect risk if it keeps up.
                  {% if warm_damp | bool %}
                    Warm plus humid is especially worth correcting.
                  {% endif %}
                  Worth checking the dehumidifier, drainage, or any open-air source.
        - conditions:
            - condition: template
              value_template: "{{ alert_kind == 'watch' }}"
          sequence:
            - action: script.environment_send_alert
              data:
                room: Basement
                alert_kind: humidity_high
                message: >-
                  Basement humidity has stayed above the safer range long enough to deserve a look:
                  {{ humidity | round(0) }}%
                  {% if temp_valid | bool %}at about {{ temp | round(0) }}°F{% endif %}.
                  In your climate, keeping the basement in the low-to-mid 50s is the better target for
                  mold and damp-bug prevention.
                  Worth checking dehumidification before it turns swampy.
      default:
        - action: script.environment_send_alert
          data:
            room: Basement
            alert_kind: humidity_high
            clear: true
  mode: restart

- id: environment_basement_radon_notification
  alias: "Environment — Basement Radon Notification"
  description: Sends a throttled basement radon push when the 24-hour Airthings average reaches the action band.
  triggers:
    - trigger: state
      entity_id: binary_sensor.environment_basement_radon_high_alert
      to: "on"
      id: high
    - trigger: time
      at: "09:00:00"
      id: repeat
    - trigger: state
      entity_id: binary_sensor.environment_basement_radon_high_alert
      to: "off"
      id: clear
  actions:
    - variables:
        due_again: >-
          {% set last_ts = as_timestamp(states('input_datetime.environment_radon_last_alert'), 0) %}
          {{ last_ts == 0 or (as_timestamp(now()) - last_ts) >= 604800 }}
        should_send: >-
          {{ is_state('input_boolean.environment_alerts_enabled', 'on')
             and is_state('binary_sensor.environment_basement_radon_high_alert', 'on')
             and (trigger.id == 'high' or (trigger.id == 'repeat' and due_again | bool)) }}
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ trigger.id == 'clear' or not is_state('input_boolean.environment_alerts_enabled', 'on') }}"
          sequence:
            - action: script.environment_send_alert
              data:
                room: Basement
                alert_kind: radon_high
                clear: true
        - conditions:
            - condition: template
              value_template: "{{ should_send }}"
          sequence:
            - action: script.environment_send_alert
              data:
                room: Basement
                alert_kind: radon_high
                message: >-
                  Basement radon is elevated on the 24-hour average:
                  {{ states('sensor.basement_radon_24h_stats') }} {{ state_attr('sensor.basement_air_quality_radon', 'unit_of_measurement') or 'Bq/m³' }}.
                  The dashboard starts watching at 75 Bq/m³ and this push fires around the EPA action band.
                  Check ventilation or mitigation status if this persists.
            - action: input_datetime.set_datetime
              target:
                entity_id: input_datetime.environment_radon_last_alert
              data:
                datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
  mode: single
