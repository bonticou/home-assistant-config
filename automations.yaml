- id: '1768872479153'
  alias: Noise Detection - Wynn's Room
  description: Notify when the Wynn's Room camera hears a baby cry for 5 seconds.
  triggers:
  - trigger: state
    entity_id: binary_sensor.wynn_s_room_baby_cry_detected
    to: 'on'
    for:
      hours: 0
      minutes: 0
      seconds: 5
  conditions:
  - condition: zone
    entity_id: person.bonticou
    zone: zone.home
  actions:
  - action: script.notify_trevor_phone
    metadata: {}
    data:
      message: Check on Wynn
      title: "👂 Noise detected"
  mode: single

- id: camera_latest_motion_tracker
  alias: "Cameras - Latest Motion Tracker"
  description: Stores the most recent real camera motion-style event for the Home header.
  triggers:
    - trigger: event
      event_type: state_changed
  conditions:
    - condition: template
      value_template: >-
        {% set entity = trigger.event.data.entity_id | default('') %}
        {% set new = trigger.event.data.new_state %}
        {% set old = trigger.event.data.old_state %}
        {% set motion_sources = {
          'binary_sensor.g6_instant_motion': 'Play Room',
          'binary_sensor.g6_instant_motion_2': 'Front Yard',
          'binary_sensor.wynn_s_room_motion': "Wynn's Room",
          'binary_sensor.wynn_s_room_person_detected': "Wynn's Room",
          'binary_sensor.mud_room_motion': 'Mud Room',
          'binary_sensor.mud_room_person_detected': 'Mud Room'
        } %}
        {% if entity.startswith('binary_sensor.') and new is not none and new.state == 'on' and (old is none or old.state != 'on') %}
          {{ entity in motion_sources }}
        {% else %}
          false
        {% endif %}
  actions:
    - variables:
        entity: "{{ trigger.event.data.entity_id }}"
        label: >-
          {% set motion_sources = {
            'binary_sensor.g6_instant_motion': 'Play Room',
            'binary_sensor.g6_instant_motion_2': 'Front Yard',
            'binary_sensor.wynn_s_room_motion': "Wynn's Room",
            'binary_sensor.wynn_s_room_person_detected': "Wynn's Room",
            'binary_sensor.mud_room_motion': 'Mud Room',
            'binary_sensor.mud_room_person_detected': 'Mud Room'
          } %}
          {{ motion_sources.get(entity, state_attr(entity, 'friendly_name') or entity) }}
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.latest_camera_motion_at
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
    - action: input_text.set_value
      target:
        entity_id: input_text.latest_camera_motion_label
      data:
        value: "{{ label }}"
    - action: input_text.set_value
      target:
        entity_id: input_text.latest_camera_motion_entity
      data:
        value: "{{ entity }}"
  mode: queued
  max: 20

- id: water_overnight_continuous_flow
  alias: "Water — Overnight Continuous Flow (Running Toilet)"
  description: >
    Detects small sustained flow overnight when no one should be using water.
    Primary indicator of a running toilet or dripping fixture.
  triggers:
    - trigger: numeric_state
      entity_id: sensor.flo_shutoff_water_flow_rate
      above: 0.05
      for:
        minutes: 10
  conditions:
    - condition: time
      after: "00:00:00"
      before: "06:00:00"
  actions:
    - action: script.water_send_alert
      data:
        alert_kind: overnight_flow
        message: >
          Flow has been {{ states('sensor.flo_shutoff_water_flow_rate') }} gal/min
          for 10+ minutes. Possible running toilet or dripping fixture.
          Is this expected? If not, check toilets, faucets, and the Water tab.
  mode: single

- id: water_daytime_sustained_flow
  alias: "Water — Daytime Sustained Low Flow"
  description: >
    Detects continuous low-level flow during the day for 20+ minutes.
    Accounts for normal household activity but flags potential running toilet.
  triggers:
    - trigger: numeric_state
      entity_id: sensor.flo_shutoff_water_flow_rate
      above: 0.1
      for:
        minutes: 20
  conditions:
    - condition: time
      after: "06:00:00"
      before: "23:59:59"
  actions:
    - action: script.water_send_alert
      data:
        alert_kind: sustained_flow
        message: >
          Water has been flowing at
          {{ states('sensor.flo_shutoff_water_flow_rate') }} gal/min
          for 20+ minutes. Is this expected? If not, check for a running
          toilet, hose, or left-on fixture.
  mode: single

- id: water_burst_daytime
  alias: "Water — High Flow Burst (Daytime)"
  description: Immediate alert for potential pipe burst during the day.
  triggers:
    - trigger: numeric_state
      entity_id: sensor.flo_shutoff_water_flow_rate
      above: 8
      for:
        minutes: 1
  conditions:
    - condition: time
      after: "06:00:00"
      before: "23:59:59"
  actions:
    - action: script.water_send_alert
      data:
        alert_kind: burst_day
        severity: critical
        message: >
          Flow rate is {{ states('sensor.flo_shutoff_water_flow_rate') }} gal/min
          well above normal. Possible pipe burst. Check immediately or shut off
          valve in HA Water tab.
  mode: single

- id: water_burst_overnight
  alias: "Water — High Flow Burst (Overnight)"
  description: Immediate critical alert for any significant flow overnight.
  triggers:
    - trigger: numeric_state
      entity_id: sensor.flo_shutoff_water_flow_rate
      above: 5
      for:
        minutes: 1
  conditions:
    - condition: time
      after: "00:00:00"
      before: "06:00:00"
  actions:
    - action: script.water_send_alert
      data:
        alert_kind: burst_night
        severity: critical
        message: >
          URGENT: Flow rate is {{ states('sensor.flo_shutoff_water_flow_rate') }} gal/min
          at {{ now().strftime('%I:%M %p') }}. No one should be using water.
          Possible pipe burst, consider shutting off valve immediately.
  mode: single

- id: water_pressure_drop_sudden
  alias: "Water — Pressure Drop (Sudden)"
  description: Logs a sharp pressure drop for dashboard history without sending a phone alert.
  triggers:
    - trigger: numeric_state
      entity_id: sensor.flo_shutoff_water_pressure
      below: 50
      for:
        minutes: 1
  conditions:
    - condition: state
      entity_id: switch.flo_shutoff_shutoff_valve
      state: "on"
    - condition: template
      value_template: >-
        {% set previous_pressure = trigger.from_state.state | float(0) if trigger.from_state is not none else 0 %}
        {% set current_pressure = states('sensor.flo_shutoff_water_pressure') | float(0) %}
        {{ previous_pressure - current_pressure >= 12 }}
  actions:
    - variables:
        previous_pressure: >-
          {{ trigger.from_state.state | float(0) | round(0) if trigger.from_state is not none else 0 }}
        current_pressure: "{{ states('sensor.flo_shutoff_water_pressure') | float(0) | round(0) }}"
        current_flow: "{{ states('sensor.flo_shutoff_water_flow_rate') | float(0) | round(2) }}"
        pressure_drop: >-
          {% set previous_pressure = trigger.from_state.state | float(0) if trigger.from_state is not none else 0 %}
          {% set current_pressure = states('sensor.flo_shutoff_water_pressure') | float(0) %}
          {{ (previous_pressure - current_pressure) | round(0) }}
    - action: logbook.log
      data:
        name: Water pressure drop
        entity_id: sensor.flo_shutoff_water_pressure
        message: >-
          Pressure fell from {{ previous_pressure }} psi to {{ current_pressure }} psi
          (down {{ pressure_drop }} psi) with flow at {{ current_flow }} gal/min.
  mode: single

- id: water_low_pressure
  alias: "Water — Low Pressure"
  description: Calm first nudge for pressure low enough to be noticeable during normal use.
  triggers:
    - trigger: numeric_state
      entity_id: sensor.flo_shutoff_water_pressure
      below: 40
      for:
        minutes: 10
  conditions:
    - condition: state
      entity_id: switch.flo_shutoff_shutoff_valve
      state: "on"
    - condition: template
      value_template: >-
        {% set snooze = states('input_datetime.water_pressure_snooze_until') %}
        {{ snooze in ['unknown', 'unavailable', 'none', '']
           or as_timestamp(snooze, 0) <= as_timestamp(now()) }}
  actions:
    - variables:
        current_pressure: "{{ states('sensor.flo_shutoff_water_pressure') | float(0) | round(0) }}"
        current_flow: "{{ states('sensor.flo_shutoff_water_flow_rate') | float(0) | round(2) }}"
    - action: script.water_send_alert
      data:
        alert_kind: low_pressure
        message: >-
          Pressure is down to {{ current_pressure }} psi with flow at {{ current_flow }} gal/min.
          It has stayed below 40 psi for 10+ minutes. Is this expected water use?
          If not, check sprinklers, showers, toilets, and the Water tab.
  mode: single

- id: water_low_pressure_persistent
  alias: "Water — Low Pressure Persistent"
  description: Follow-up when low pressure continues beyond normal short fixture use.
  triggers:
    - trigger: numeric_state
      entity_id: sensor.flo_shutoff_water_pressure
      below: 40
      for:
        minutes: 30
  conditions:
    - condition: state
      entity_id: switch.flo_shutoff_shutoff_valve
      state: "on"
    - condition: template
      value_template: >-
        {% set snooze = states('input_datetime.water_pressure_snooze_until') %}
        {{ snooze in ['unknown', 'unavailable', 'none', '']
           or as_timestamp(snooze, 0) <= as_timestamp(now()) }}
  actions:
    - variables:
        current_pressure: "{{ states('sensor.flo_shutoff_water_pressure') | float(0) | round(0) }}"
        current_flow: "{{ states('sensor.flo_shutoff_water_flow_rate') | float(0) | round(2) }}"
    - action: script.water_send_alert
      data:
        alert_kind: low_pressure_persistent
        message: >-
          Pressure is still around {{ current_pressure }} psi after 30+ minutes,
          with flow at {{ current_flow }} gal/min. If sprinklers or a long shower
          explain it, tap Expected. Otherwise check for a running toilet or open fixture.
  mode: single

- id: water_very_low_pressure
  alias: "Water — Very Low Pressure"
  description: Stronger warning when pressure is very low, with urgency only for active flow or overnight context.
  triggers:
    - trigger: numeric_state
      entity_id: sensor.flo_shutoff_water_pressure
      below: 25
      for:
        minutes: 10
  conditions:
    - condition: state
      entity_id: switch.flo_shutoff_shutoff_valve
      state: "on"
  actions:
    - variables:
        current_pressure: "{{ states('sensor.flo_shutoff_water_pressure') | float(0) | round(0) }}"
        current_flow: "{{ states('sensor.flo_shutoff_water_flow_rate') | float(0) | round(2) }}"
        overnight_context: "{{ now().hour < 6 }}"
        pressure_severity: >-
          {{ 'critical' if (current_flow | float(0) > 1.5) or (overnight_context | bool) else 'warning' }}
    - action: script.water_send_alert
      data:
        alert_kind: low_pressure_very_low
        severity: "{{ pressure_severity }}"
        message: >-
          Pressure is very low at {{ current_pressure }} psi for 10+ minutes,
          with flow at {{ current_flow }} gal/min.
          {% if pressure_severity == 'critical' %}
            This is more concerning because {% if current_flow | float(0) > 1.5 %}flow is active above 1.5 gal/min{% else %}it is overnight{% endif %}.
          {% else %}
            This may still be normal fixture use, but it is low enough to review.
          {% endif %}
          Check the Water tab and obvious fixtures.
  mode: single

- id: water_very_low_pressure_persistent
  alias: "Water — Very Low Pressure Persistent"
  description: Urgent pressure alert when very low pressure persists without recovering.
  triggers:
    - trigger: numeric_state
      entity_id: sensor.flo_shutoff_water_pressure
      below: 25
      for:
        minutes: 20
  conditions:
    - condition: state
      entity_id: switch.flo_shutoff_shutoff_valve
      state: "on"
  actions:
    - variables:
        current_pressure: "{{ states('sensor.flo_shutoff_water_pressure') | float(0) | round(0) }}"
        current_flow: "{{ states('sensor.flo_shutoff_water_flow_rate') | float(0) | round(2) }}"
    - action: script.water_send_alert
      data:
        alert_kind: low_pressure_urgent
        severity: critical
        message: >-
          Pressure has stayed very low at {{ current_pressure }} psi for 20+ minutes,
          with flow at {{ current_flow }} gal/min. Check the Water tab, fixtures,
          sprinkler zones, and the Flo app.
  mode: single

- id: water_high_pressure
  alias: "Water — High Pressure"
  description: High pressure strains pipes and appliances. PRV may have failed.
  triggers:
    - trigger: numeric_state
      entity_id: sensor.flo_shutoff_water_pressure
      above: 80
      for:
        minutes: 5
  conditions: []
  actions:
    - action: script.water_send_alert
      data:
        alert_kind: high_pressure
        message: >
          Pressure is {{ states('sensor.flo_shutoff_water_pressure') }} psi
          above safe limit of 80 psi. Check pressure reducing valve (PRV).
  mode: single

- id: water_daily_usage_high
  alias: "Water — High Daily Usage"
  description: Evening check for abnormally high daily consumption.
  triggers:
    - trigger: time
      at: "20:00:00"
  conditions:
    - condition: numeric_state
      entity_id: sensor.flo_shutoff_today_s_water_usage
      above: 400
  actions:
    - action: script.water_send_alert
      data:
        alert_kind: usage_high
        message: >
          Today's usage is {{ states('sensor.flo_shutoff_today_s_water_usage') }} gal
          above the 400 gal threshold. Review the Water tab for unusual flow periods.
  mode: single

- id: water_leak_sensor_triggered
  alias: "Water — Leak Sensor Triggered"
  description: Immediate alert if any zone leak sensor detects water.
  triggers:
    - trigger: state
      entity_id:
        - binary_sensor.kitchen_sink_leak_detection_water_detected
        - binary_sensor.island_sink_leak_detection_water_detected
        - binary_sensor.dishwasher_leak_detection_water_detected
        - binary_sensor.kitchen_fridge_leak_detection_water_detected
        - binary_sensor.washing_machine_leak_detection_water_detected
        - binary_sensor.laundry_sink_leak_detection_water_detected
        - binary_sensor.mechanical_room_leak_detection_water_detected
        - binary_sensor.electrical_room_leak_detection_water_detected
        - binary_sensor.basement_ejector_leak_detection_water_detected
      to: "on"
  conditions: []
  actions:
    - action: script.water_send_alert
      data:
        alert_kind: leak
        severity: critical
        message: >
          Water detected at {{ trigger.to_state.attributes.friendly_name }}
          at {{ now().strftime('%I:%M %p') }}. Check immediately.
          Shut off valve from HA Water tab if needed.
  mode: parallel
  max: 10

- id: water_shutoff_valve_closed
  alias: "Water — Shutoff Valve Closed"
  description: Alert if the shutoff valve closes for any reason.
  triggers:
    - trigger: state
      entity_id: switch.flo_shutoff_shutoff_valve
      to: "off"
  conditions: []
  actions:
    - action: script.water_send_alert
      data:
        alert_kind: valve_closed
        severity: critical
        message: >
          The Flo shutoff valve has closed at {{ now().strftime('%I:%M %p') }}.
          If this was not intentional, check the Flo app and HA Water tab.
  mode: single

- id: water_flo_system_alert
  alias: "Water — Flo System Alert"
  description: Passes through any native Flo system alerts to your phone.
  triggers:
    - trigger: state
      entity_id: binary_sensor.flo_shutoff_pending_system_alerts
      to: "on"
  conditions: []
  actions:
    - action: script.water_send_alert
      data:
        alert_kind: flo_system
        message: Flo has flagged a system alert. Check the Flo app for details.
  mode: single

- id: house_notice_action_history
  alias: "Notices — Notification Action History"
  description: Records mobile notification actions so the Notices tab can show recent taps like Paid, Done, Snoozed, and Applied.
  triggers:
    - trigger: event
      event_type: mobile_app_notification_action
  conditions: []
  actions:
    - variables:
        action_id: "{{ trigger.event.data.action | default('unknown', true) }}"
        action_label: >-
          {% if 'SNOOZE' in action_id %}
            Snoozed
          {% elif 'PAID' in action_id %}
            Paid
          {% elif 'DONE' in action_id or 'REPLACED' in action_id or 'CAPTURED' in action_id %}
            Done
          {% elif 'APPLIED' in action_id %}
            Applied
          {% elif 'RENEWED' in action_id %}
            Renewed
          {% elif action_id == 'URI' %}
            Opened
          {% elif 'LOCK' in action_id or 'TURN_OFF' in action_id or 'SECURE' in action_id %}
            Acted
          {% else %}
            Action
          {% endif %}
        tag: "{{ trigger.event.data.tag | default('', true) }}"
    - event: house_notice_event_recorded
      event_data:
        at: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
        kind: action
        title: "{{ action_label }}"
        message: "{{ action_id }}"
        group: "{{ trigger.event.data.group | default('mobile-action', true) }}"
        tag: "{{ tag }}"
        url: "{{ trigger.event.data.url | default('', true) }}"
        severity: info
        action: "{{ action_id }}"
        source: mobile_app_notification_action
  mode: parallel
  max: 20

- id: water_notification_actions
  alias: "Water — Notification Actions"
  description: Handles quick actions from water monitoring notifications.
  triggers:
    - trigger: event
      event_type: mobile_app_notification_action
  conditions:
    - condition: template
      value_template: >
        {{ trigger.event.data.action in [
          'WATER_OVERNIGHT_FLOW_EXPECTED',
          'WATER_SUSTAINED_FLOW_EXPECTED',
          'WATER_LOW_PRESSURE_EXPECTED'
        ] }}
  actions:
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ trigger.event.data.action == 'WATER_LOW_PRESSURE_EXPECTED' }}"
          sequence:
            - action: input_datetime.set_datetime
              target:
                entity_id: input_datetime.water_pressure_snooze_until
              data:
                datetime: "{{ (now() + timedelta(hours=1)).strftime('%Y-%m-%d %H:%M:%S') }}"
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.water_pressure_alert_active
            - repeat:
                for_each:
                  - water-low_pressure
                  - water-low_pressure_persistent
                  - water-low_pressure_very_low
                  - water-low_pressure_urgent
                  - water-pressure_drop
                sequence:
                  - action: script.notify_trevor_phone
                    data:
                      message: clear_notification
                      data:
                        tag: "{{ repeat.item }}"
      default:
        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.water_flow_alert_active
        - action: script.notify_trevor_phone
          data:
            message: clear_notification
            data:
              tag: >-
                {{ 'water-overnight_flow'
                   if trigger.event.data.action == 'WATER_OVERNIGHT_FLOW_EXPECTED'
                   else 'water-sustained_flow' }}
  mode: parallel
  max: 5

- id: water_pressure_recovered
  alias: "Water — Pressure Recovered"
  description: Clears pressure notifications once pressure is back in a stable normal range.
  triggers:
    - trigger: numeric_state
      entity_id: sensor.flo_shutoff_water_pressure
      above: 42
      for:
        minutes: 5
  conditions: []
  actions:
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.water_pressure_snooze_until
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.water_pressure_alert_active
    - repeat:
        for_each:
          - water-low_pressure
          - water-low_pressure_persistent
          - water-low_pressure_very_low
          - water-low_pressure_urgent
          - water-pressure_drop
        sequence:
          - action: script.notify_trevor_phone
            data:
              message: clear_notification
              data:
                tag: "{{ repeat.item }}"
  mode: single

- id: water_notification_state_clear_when_normal
  alias: "Water — Clear Notification State When Normal"
  description: Clears dashboard notification state when the underlying water condition is quiet again.
  triggers:
    - trigger: numeric_state
      entity_id: sensor.flo_shutoff_water_flow_rate
      below: 0.02
      for:
        minutes: 5
      id: flow_quiet
    - trigger: state
      entity_id:
        - binary_sensor.kitchen_sink_leak_detection_water_detected
        - binary_sensor.island_sink_leak_detection_water_detected
        - binary_sensor.dishwasher_leak_detection_water_detected
        - binary_sensor.kitchen_fridge_leak_detection_water_detected
        - binary_sensor.washing_machine_leak_detection_water_detected
        - binary_sensor.laundry_sink_leak_detection_water_detected
        - binary_sensor.mechanical_room_leak_detection_water_detected
        - binary_sensor.electrical_room_leak_detection_water_detected
        - binary_sensor.basement_ejector_leak_detection_water_detected
      to: "off"
      for:
        minutes: 5
      id: leaks_clear
    - trigger: state
      entity_id: switch.flo_shutoff_shutoff_valve
      to: "on"
      for:
        minutes: 2
      id: valve_open
    - trigger: state
      entity_id: binary_sensor.flo_shutoff_pending_system_alerts
      to: "off"
      for:
        minutes: 2
      id: flo_clear
    - trigger: numeric_state
      entity_id: sensor.flo_shutoff_water_pressure
      below: 80
      for:
        minutes: 5
      id: high_pressure_normal
    - trigger: time
      at: "00:05:00"
      id: usage_reset
  actions:
    - choose:
        - conditions:
            - condition: trigger
              id: flow_quiet
            - condition: template
              value_template: "{{ states('input_text.water_latest_alert_kind') not in ['burst_day', 'burst_night'] }}"
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.water_flow_alert_active
            - repeat:
                for_each:
                  - water-overnight_flow
                  - water-sustained_flow
                sequence:
                  - action: script.notify_trevor_phone
                    data:
                      message: clear_notification
                      data:
                        tag: "{{ repeat.item }}"
        - conditions:
            - condition: trigger
              id: leaks_clear
            - condition: template
              value_template: >-
                {{ expand([
                  'binary_sensor.kitchen_sink_leak_detection_water_detected',
                  'binary_sensor.island_sink_leak_detection_water_detected',
                  'binary_sensor.dishwasher_leak_detection_water_detected',
                  'binary_sensor.kitchen_fridge_leak_detection_water_detected',
                  'binary_sensor.washing_machine_leak_detection_water_detected',
                  'binary_sensor.laundry_sink_leak_detection_water_detected',
                  'binary_sensor.mechanical_room_leak_detection_water_detected',
                  'binary_sensor.electrical_room_leak_detection_water_detected',
                  'binary_sensor.basement_ejector_leak_detection_water_detected'
                ]) | selectattr('state', 'eq', 'on') | list | count == 0 }}
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.water_leak_alert_active
            - action: script.notify_trevor_phone
              data:
                message: clear_notification
                data:
                  tag: water-leak
        - conditions:
            - condition: template
              value_template: "{{ trigger.id in ['valve_open', 'flo_clear'] }}"
            - condition: state
              entity_id: switch.flo_shutoff_shutoff_valve
              state: "on"
            - condition: state
              entity_id: binary_sensor.flo_shutoff_pending_system_alerts
              state: "off"
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.water_valve_alert_active
            - repeat:
                for_each:
                  - water-valve_closed
                  - water-flo_system
                sequence:
                  - action: script.notify_trevor_phone
                    data:
                      message: clear_notification
                      data:
                        tag: "{{ repeat.item }}"
        - conditions:
            - condition: trigger
              id: high_pressure_normal
            - condition: template
              value_template: "{{ states('input_text.water_latest_alert_kind') == 'high_pressure' }}"
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.water_pressure_alert_active
            - action: script.notify_trevor_phone
              data:
                message: clear_notification
                data:
                  tag: water-high_pressure
        - conditions:
            - condition: trigger
              id: usage_reset
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.water_usage_alert_active
            - action: script.notify_trevor_phone
              data:
                message: clear_notification
                data:
                  tag: water-usage_high
  mode: single

- id: door_lights_schedule_sync
  alias: "Lights — Door Lights Schedule Sync"
  description: Keep the front door lights synced to the adaptive sun-elevation evening schedule and restore the correct state on startup.
  triggers:
    - trigger: homeassistant
      event: start
    - trigger: state
      entity_id: binary_sensor.door_lights_schedule_active
      to: "on"
    - trigger: state
      entity_id: binary_sensor.door_lights_schedule_active
      to: "off"
  actions:
    - choose:
        - conditions:
            - condition: state
              entity_id: binary_sensor.door_lights_schedule_active
              state: "on"
          sequence:
            - action: script.door_lights_schedule_on
      default:
        - action: script.door_lights_schedule_off
  mode: single

- id: front_stairs_schedule_sync
  alias: "Lights — Front Stairs Schedule Sync"
  description: Keep the front stairs light synced to the adaptive sun-elevation evening schedule, while honoring the bedtime 4 percent override until the overnight schedule ends.
  triggers:
    - trigger: homeassistant
      event: start
    - trigger: time_pattern
      minutes: "/15"
    - trigger: state
      entity_id: binary_sensor.front_stairs_schedule_active
      to: "on"
    - trigger: state
      entity_id: binary_sensor.front_stairs_schedule_active
      to: "off"
  actions:
    - choose:
        - conditions:
            - condition: state
              entity_id: binary_sensor.front_stairs_schedule_active
              state: "on"
          sequence:
            - action: script.front_stairs_schedule_on
      default:
        - action: script.front_stairs_schedule_off
        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.front_stairs_sleep_override
  mode: single

- id: foyer_chandelier_schedule_sync
  alias: "Lights — Foyer Chandelier Schedule Sync"
  description: Keep the foyer chandelier synced to the front stairs evening schedule while honoring the bedtime hold for the rest of the night.
  triggers:
    - trigger: homeassistant
      event: start
      id: startup
    - trigger: time_pattern
      minutes: "/15"
      id: refresh
    - trigger: state
      entity_id: binary_sensor.front_stairs_schedule_active
      to: "on"
      id: schedule_on
    - trigger: state
      entity_id: binary_sensor.front_stairs_schedule_active
      to: "off"
      for:
        minutes: 2
      id: schedule_off
  actions:
    - choose:
        - conditions:
            - condition: trigger
              id: schedule_off
            - condition: state
              entity_id: sun.sun
              state: "above_horizon"
          sequence:
            - action: script.foyer_chandelier_schedule_off
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.foyer_chandelier_sleep_hold
        - conditions:
            - condition: trigger
              id: schedule_on
            - condition: state
              entity_id: input_boolean.foyer_chandelier_sleep_hold
              state: "off"
          sequence:
            - action: script.foyer_chandelier_schedule_on
        - conditions:
            - condition: trigger
              id: startup
            - condition: state
              entity_id: binary_sensor.front_stairs_schedule_active
              state: "off"
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.foyer_chandelier_sleep_hold
        - conditions:
            - condition: state
              entity_id: binary_sensor.front_stairs_schedule_active
              state: "on"
            - condition: state
              entity_id: input_boolean.foyer_chandelier_sleep_hold
              state: "off"
          sequence:
            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ trigger.id == 'startup' }}"
                  sequence:
                    - action: script.foyer_chandelier_schedule_on
                - conditions:
                    - condition: trigger
                      id: refresh
                    - condition: state
                      entity_id: light.front_foyer_chandelier
                      state: "on"
                  sequence:
                    - action: script.foyer_chandelier_schedule_on
  mode: single

- id: away_security_unsecured_reminder
  alias: "Security — House Unsecured While Away"
  description: >
    Reminds Trevor when both Trevor and Casey are away while the garage door is
    unlocked or lights are still on. Reminder can be snoozed from the push.
  triggers:
    - trigger: state
      entity_id: binary_sensor.house_unsecured_while_away
      to: "on"
      id: became_unsecured
    - trigger: homeassistant
      event: start
      id: startup
    - trigger: event
      event_type: automation_reloaded
      id: automation_reloaded
    - trigger: state
      entity_id: device_tracker.unifi_default_42_15_78_4a_d9_f8
      not_from:
        - "unknown"
        - "unavailable"
      not_to:
        - "unknown"
        - "unavailable"
      id: casey_departed
    - trigger: state
      entity_id: device_tracker.tk_iphone_16_pro
      not_from:
        - "unknown"
        - "unavailable"
      not_to:
        - "unknown"
        - "unavailable"
      id: trevor_departed
    - trigger: state
      entity_id: sensor.away_security_issue_summary
      id: issue_changed
    - trigger: time_pattern
      minutes: "/15"
      id: repeat
  conditions:
    - condition: template
      value_template: >
        {% set snooze = states('input_datetime.away_security_snooze_until') %}
        {{ snooze in ['unknown', 'unavailable', '']
           or as_timestamp(snooze, 0) <= as_timestamp(now()) }}
  actions:
    - if:
        - condition: template
          value_template: "{{ trigger.id == 'startup' }}"
      then:
        - delay:
            seconds: 15
    - variables:
        trevor_state: "{{ states('device_tracker.tk_iphone_16_pro') }}"
        casey_state: "{{ states('device_tracker.unifi_default_42_15_78_4a_d9_f8') }}"
        trevor_away: "{{ trevor_state not in ['home', 'unknown', 'unavailable', ''] }}"
        casey_away: "{{ casey_state not in ['home', 'unknown', 'unavailable', ''] }}"
        use_casey_context: >
          {{ trigger.id == 'casey_departed'
             and trigger.from_state is not none
             and trigger.to_state is not none
             and trigger.from_state.state == 'home'
             and trigger.to_state.state not in ['home', 'unknown', 'unavailable', ''] }}
        garage_unlocked: "{{ is_state('lock.aqara_smart_lock_u100', 'unlocked') }}"
        daylight: "{{ is_state('sun.sun', 'above_horizon') }}"
        active_lights_on: >
          {{ states('sensor.away_security_active_lights') | int(0) > 0 }}
        home_unsecured: >
          {{ trevor_away | bool
             and casey_away | bool
             and (garage_unlocked | bool or active_lights_on | bool) }}
    - if:
        - condition: template
          value_template: "{{ home_unsecured | bool }}"
      then:
        - choose:
            - conditions:
                - condition: template
                  value_template: >
                    {{ use_casey_context | bool
                       and daylight | bool
                       and garage_unlocked | bool
                       and active_lights_on | bool }}
              sequence:
                - action: script.casey_left_combo_send_alert
            - conditions:
                - condition: template
                  value_template: "{{ use_casey_context | bool and garage_unlocked | bool }}"
              sequence:
                - action: script.casey_left_garage_send_alert
            - conditions:
                - condition: template
                  value_template: >
                    {{ use_casey_context | bool
                       and daylight | bool
                       and active_lights_on | bool }}
              sequence:
                - action: script.casey_left_lights_send_alert
          default:
            - action: script.away_security_send_alert
  mode: restart

- id: away_security_notification_actions
  alias: "Security — Away Reminder Actions"
  description: Handles quick actions from the away-security push notification.
  triggers:
    - trigger: event
      event_type: mobile_app_notification_action
  conditions:
    - condition: template
      value_template: >
        {{ trigger.event.data.action in [
          'LOCK_AWAY_GARAGE',
          'LOCK_CASEY_LEFT_GARAGE',
          'SECURE_CASEY_LEFT_HOME',
          'TURN_OFF_AWAY_LIGHTS',
          'TURN_OFF_CASEY_LEFT_LIGHTS',
          'SNOOZE_AWAY_SECURITY_30',
          'SNOOZE_AWAY_SECURITY_120'
        ] }}
  actions:
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ trigger.event.data.action == 'SECURE_CASEY_LEFT_HOME' }}"
          sequence:
            - if:
                - condition: state
                  entity_id: lock.aqara_smart_lock_u100
                  state: unlocked
              then:
                - action: lock.lock
                  target:
                    entity_id: lock.aqara_smart_lock_u100
            - variables:
                active_lights: >
                  {% set light_ids = state_attr('sensor.away_security_active_lights', 'entity_ids') | default('', true) %}
                  {{ (light_ids.split('||') if light_ids else []) | reject('eq', '') | list }}
            - repeat:
                for_each: "{{ active_lights }}"
                sequence:
                  - action: light.turn_off
                    target:
                      entity_id: "{{ repeat.item }}"
            - delay:
                seconds: 2
            - action: script.casey_left_combo_clear_alert
            - action: script.casey_left_garage_clear_alert
            - action: script.casey_left_lights_clear_alert
            - if:
                - condition: template
                  value_template: >
                    {% set trevor_state = states('device_tracker.tk_iphone_16_pro') %}
                    {% set casey_state = states('device_tracker.unifi_default_42_15_78_4a_d9_f8') %}
                    {% set trevor_away = trevor_state not in ['home', 'unknown', 'unavailable', ''] %}
                    {% set casey_away = casey_state not in ['home', 'unknown', 'unavailable', ''] %}
                    {% set lights_on = states('sensor.away_security_active_lights') | int(0) > 0 %}
                    {{ trevor_away and casey_away and
                       (is_state('lock.aqara_smart_lock_u100', 'unlocked') or lights_on) }}
              then:
                - action: script.away_security_send_alert
              else:
                - action: script.away_security_clear_alert

        - conditions:
            - condition: template
              value_template: "{{ trigger.event.data.action in ['LOCK_AWAY_GARAGE', 'LOCK_CASEY_LEFT_GARAGE'] }}"
          sequence:
            - if:
                - condition: state
                  entity_id: lock.aqara_smart_lock_u100
                  state: unlocked
              then:
                - action: lock.lock
                  target:
                    entity_id: lock.aqara_smart_lock_u100
            - delay:
                seconds: 2
            - action: script.casey_left_garage_clear_alert
            - if:
                - condition: template
                  value_template: >
                    {% set trevor_state = states('device_tracker.tk_iphone_16_pro') %}
                    {% set casey_state = states('device_tracker.unifi_default_42_15_78_4a_d9_f8') %}
                    {% set trevor_away = trevor_state not in ['home', 'unknown', 'unavailable', ''] %}
                    {% set casey_away = casey_state not in ['home', 'unknown', 'unavailable', ''] %}
                    {% set lights_on = states('sensor.away_security_active_lights') | int(0) > 0 %}
                    {{ trevor_away and casey_away and
                       (is_state('lock.aqara_smart_lock_u100', 'unlocked') or lights_on) }}
              then:
                - action: script.away_security_send_alert
              else:
                - action: script.away_security_clear_alert

        - conditions:
            - condition: template
              value_template: "{{ trigger.event.data.action in ['TURN_OFF_AWAY_LIGHTS', 'TURN_OFF_CASEY_LEFT_LIGHTS'] }}"
          sequence:
            - variables:
                active_lights: >
                  {% set light_ids = state_attr('sensor.away_security_active_lights', 'entity_ids') | default('', true) %}
                  {{ (light_ids.split('||') if light_ids else []) | reject('eq', '') | list }}
            - repeat:
                for_each: "{{ active_lights }}"
                sequence:
                  - action: light.turn_off
                    target:
                      entity_id: "{{ repeat.item }}"
            - delay:
                seconds: 2
            - action: script.casey_left_lights_clear_alert
            - if:
                - condition: template
                  value_template: >
                    {% set trevor_state = states('device_tracker.tk_iphone_16_pro') %}
                    {% set casey_state = states('device_tracker.unifi_default_42_15_78_4a_d9_f8') %}
                    {% set trevor_away = trevor_state not in ['home', 'unknown', 'unavailable', ''] %}
                    {% set casey_away = casey_state not in ['home', 'unknown', 'unavailable', ''] %}
                    {% set lights_on = states('sensor.away_security_active_lights') | int(0) > 0 %}
                    {{ trevor_away and casey_away and
                       (is_state('lock.aqara_smart_lock_u100', 'unlocked') or lights_on) }}
              then:
                - action: script.away_security_send_alert
              else:
                - action: script.away_security_clear_alert

        - conditions:
            - condition: template
              value_template: "{{ trigger.event.data.action == 'SNOOZE_AWAY_SECURITY_30' }}"
          sequence:
            - action: input_datetime.set_datetime
              target:
                entity_id: input_datetime.away_security_snooze_until
              data:
                datetime: "{{ (now() + timedelta(minutes=30)).strftime('%Y-%m-%d %H:%M:%S') }}"
            - action: script.away_security_clear_alert
            - action: script.notify_trevor_phone
              data:
                title: House reminder sleeping
                message: Away security reminders paused for 30 minutes.
                data:
                  tag: away-security-snooze

        - conditions:
            - condition: template
              value_template: "{{ trigger.event.data.action == 'SNOOZE_AWAY_SECURITY_120' }}"
          sequence:
            - action: input_datetime.set_datetime
              target:
                entity_id: input_datetime.away_security_snooze_until
              data:
                datetime: "{{ (now() + timedelta(hours=2)).strftime('%Y-%m-%d %H:%M:%S') }}"
            - action: script.away_security_clear_alert
            - action: script.notify_trevor_phone
              data:
                title: House reminder sleeping
                message: Away security reminders paused for 2 hours.
                data:
                  tag: away-security-snooze
  mode: parallel
  max: 10
- id: away_security_clear_when_resolved
  alias: "Security — Clear Away Reminder When Resolved"
  description: Clears the active away-security push once the issue is resolved.
  triggers:
    - trigger: state
      entity_id: binary_sensor.house_unsecured_while_away
      to: "off"
  conditions: []
  actions:
    - action: script.away_security_clear_alert
  mode: single

- id: security_casey_left_garage_clear
  alias: "Security — Clear Casey Left Garage Alert"
  description: Clears the contextual Casey-left-garage push once it is no longer relevant.
  triggers:
    - trigger: state
      entity_id: lock.aqara_smart_lock_u100
      to: locked
    - trigger: state
      entity_id: device_tracker.tk_iphone_16_pro
      to: home
    - trigger: state
      entity_id: device_tracker.unifi_default_42_15_78_4a_d9_f8
      to: home
  conditions: []
  actions:
    - action: script.casey_left_garage_clear_alert
  mode: single

- id: security_casey_left_combo_clear
  alias: "Security — Clear Casey Left Combo Alert"
  description: Clears the contextual Casey-left combo push once it is no longer relevant.
  triggers:
    - trigger: state
      entity_id: lock.aqara_smart_lock_u100
      to: locked
    - trigger: state
      entity_id: sun.sun
      to: "below_horizon"
    - trigger: state
      entity_id: device_tracker.tk_iphone_16_pro
      to: home
    - trigger: state
      entity_id: device_tracker.unifi_default_42_15_78_4a_d9_f8
      to: home
    - trigger: event
      event_type: state_changed
      id: lights_state_changed
  conditions:
    - condition: template
      value_template: >
        {% if trigger.id == 'lights_state_changed' %}
          {% set entity = trigger.event.data.entity_id | default('') %}
          {{ entity.startswith('light.') }}
        {% else %}
          true
        {% endif %}
  actions:
    - if:
        - condition: template
          value_template: >
            {{ not (
              is_state('sun.sun', 'above_horizon')
              and states('device_tracker.tk_iphone_16_pro') not in ['home', 'unknown', 'unavailable', '']
              and states('device_tracker.unifi_default_42_15_78_4a_d9_f8') not in ['home', 'unknown', 'unavailable', '']
              and is_state('lock.aqara_smart_lock_u100', 'unlocked')
              and states('sensor.away_security_active_lights') | int(0) > 0
            ) }}
      then:
        - action: script.casey_left_combo_clear_alert
  mode: single

- id: security_casey_left_lights_clear
  alias: "Security — Clear Casey Left Lights Alert"
  description: Clears the contextual Casey-left-lights push once it is no longer relevant.
  triggers:
    - trigger: state
      entity_id: sun.sun
      to: "below_horizon"
    - trigger: state
      entity_id: device_tracker.tk_iphone_16_pro
      to: home
    - trigger: state
      entity_id: device_tracker.unifi_default_42_15_78_4a_d9_f8
      to: home
    - trigger: event
      event_type: state_changed
      id: lights_state_changed
  conditions:
    - condition: template
      value_template: >
        {% if trigger.id == 'lights_state_changed' %}
          {% set entity = trigger.event.data.entity_id | default('') %}
          {{ entity.startswith('light.') }}
        {% else %}
          true
        {% endif %}
  actions:
    - if:
        - condition: template
          value_template: >
            {{ is_state('sun.sun', 'below_horizon')
               or is_state('device_tracker.tk_iphone_16_pro', 'home')
               or is_state('device_tracker.unifi_default_42_15_78_4a_d9_f8', 'home')
               or states('sensor.away_security_active_lights') | int(0) == 0 }}
      then:
        - action: script.casey_left_lights_clear_alert
  mode: single

- id: security_entry_ring_notifications
  alias: "Security — Entry Ring Notifications"
  description: Sends mobile notifications for front door and mud room Ring motion and doorbell events.
  triggers:
    - trigger: state
      entity_id: event.front_door_motion
      id: front_door_motion
    - trigger: state
      entity_id: event.front_door_ding
      id: front_door_ding
    - trigger: state
      entity_id: event.mudroom_door_motion
      id: mudroom_door_motion
    - trigger: state
      entity_id: event.mudroom_door_ding
      id: mudroom_door_ding
  conditions:
    - condition: template
      value_template: >
        {{ trigger.to_state is not none and trigger.to_state.state not in ['unknown', 'unavailable'] }}
  actions:
    - variables:
        zone_name: "{{ 'Mud room' if trigger.id.startswith('mudroom') else 'Front door' }}"
        event_kind: "{{ 'doorbell' if trigger.id.endswith('ding') else 'motion' }}"
    - action: script.entry_camera_send_alert
      data:
        zone_name: "{{ zone_name }}"
        event_kind: "{{ event_kind }}"
  mode: parallel
  max: 10

- id: set_default_theme_liquid_glass
  alias: "Frontend — Set Liquid Glass Theme"
  description: Applies the liquid glass theme on Home Assistant startup.
  triggers:
    - trigger: homeassistant
      event: start
  conditions: []
  actions:
    - action: frontend.set_theme
      data:
        name: liquid_glass
        mode: dark
  mode: single

- id: downstairs_climate_pilot_startup_sync
  alias: "Environment — Startup Sync"
  description: Refreshes environment observability entities and clears stale advisory notifications on startup.
  triggers:
    - trigger: homeassistant
      event: start
  actions:
    - action: homeassistant.update_entity
      target:
        entity_id:
          - sensor.downstairs_temp_avg
          - sensor.downstairs_humidity_avg
          - sensor.downstairs_temp_spread
          - sensor.downstairs_time_period
          - sensor.downstairs_active_season
          - sensor.downstairs_outdoor_temp
          - sensor.downstairs_outdoor_humidity
          - sensor.downstairs_outdoor_wind_speed
          - sensor.downstairs_source_policy
          - binary_sensor.downstairs_open_window_eligible
          - sensor.downstairs_ecobee_setpoint
          - sensor.downstairs_climate_status
          - sensor.downstairs_climate_insight
          - sensor.downstairs_away_watch
          - sensor.downstairs_away_watch_reason
          - sensor.downstairs_away_minutes
          - binary_sensor.downstairs_temp_spread_high
          - binary_sensor.downstairs_someone_home
          - binary_sensor.downstairs_everyone_away
          - sensor.environment_house_status
          - sensor.environment_main_floor_status
          - sensor.environment_second_floor_status
          - sensor.environment_kitchen_status
          - sensor.environment_dining_room_status
          - sensor.environment_primary_bedroom_status
          - sensor.environment_office_status
          - sensor.environment_basement_status
          - sensor.environment_garage_status
          - sensor.environment_attic_status
          - binary_sensor.environment_dining_room_ecobee_temp_disagreement
          - binary_sensor.environment_dining_room_ecobee_humidity_disagreement
          - binary_sensor.environment_basement_radon_high_alert
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ not is_state('input_boolean.environment_alerts_enabled', 'on')
                   or not is_state('input_boolean.downstairs_mobile_alerts_enabled', 'on')
                   or not is_state('input_boolean.downstairs_pilot_enabled', 'on')
                   or states('sensor.downstairs_away_watch') in ['all_clear', 'grace_period', 'home_occupied', 'unknown', 'unavailable'] }}
          sequence:
            - action: script.notify_trevor_phone
              data:
                message: clear_notification
                data:
                  tag: downstairs-away-watch
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ not is_state('input_boolean.downstairs_mobile_alerts_enabled', 'on')
                   or not is_state('input_boolean.downstairs_pilot_enabled', 'on')
                   or not is_state('binary_sensor.downstairs_open_window_eligible', 'on')
                   or not is_state('binary_sensor.downstairs_someone_home', 'on')
                   or not is_state('sensor.downstairs_time_period', 'night') }}
          sequence:
            - action: script.notify_trevor_phone
              data:
                message: clear_notification
                data:
                  tag: downstairs-window-night
  mode: single

- id: downstairs_climate_recommendation_notification
  alias: "Environment — Main Floor Open Window Dashboard Only"
  description: Keeps the open-window signal dashboard-only and clears the old mobile notification tag if it exists.
  triggers:
    - trigger: state
      entity_id: binary_sensor.downstairs_open_window_eligible
      to: "on"
      for:
        minutes: 20
      id: send
    - trigger: state
      entity_id:
        - input_boolean.downstairs_pilot_enabled
        - input_boolean.downstairs_mobile_alerts_enabled
        - binary_sensor.downstairs_someone_home
        - binary_sensor.downstairs_open_window_eligible
        - sensor.downstairs_time_period
      id: reevaluate
  actions:
    - action: script.notify_trevor_phone
      data:
        message: clear_notification
        data:
          tag: downstairs-window-night
  mode: restart

- id: downstairs_climate_profile_recommendation_notification
  alias: "Environment — Main Floor Away Watch"
  description: Alerts when both phones are away and the Main Floor climate or Dining Room Ecobee profile needs attention.
  triggers:
    - trigger: state
      entity_id: sensor.downstairs_away_watch
      to: too_hot
      for:
        minutes: 45
      id: too_hot
    - trigger: state
      entity_id: sensor.downstairs_away_watch
      to: too_cold
      for:
        minutes: 45
      id: too_cold
    - trigger: state
      entity_id: sensor.downstairs_away_watch
      to: too_humid
      for:
        minutes: 90
      id: too_humid
    - trigger: state
      entity_id: sensor.downstairs_away_watch
      to: too_dry
      for:
        hours: 6
      id: too_dry
    - trigger: state
      entity_id: sensor.downstairs_away_watch
      to: profile_check
      for:
        minutes: 20
      id: profile_check
    - trigger: state
      entity_id: sensor.downstairs_away_watch
      to:
        - all_clear
        - grace_period
        - home_occupied
      id: clear
    - trigger: state
      entity_id:
        - input_boolean.downstairs_pilot_enabled
        - input_boolean.downstairs_mobile_alerts_enabled
      id: reevaluate
  conditions:
  actions:
    - variables:
        watch: "{{ states('sensor.downstairs_away_watch') }}"
        reason: "{{ states('sensor.downstairs_away_watch_reason') }}"
        should_send: >
          {{ is_state('input_boolean.downstairs_pilot_enabled', 'on')
             and is_state('input_boolean.downstairs_mobile_alerts_enabled', 'on')
             and is_state('input_boolean.environment_alerts_enabled', 'on')
             and watch in ['too_hot', 'too_cold', 'too_humid', 'too_dry', 'profile_check'] }}
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ trigger.id != 'clear' and should_send }}"
          sequence:
            - action: script.notify_trevor_phone
              data:
                title: >-
                  {% if watch == 'too_hot' %}🥵 Main Floor is hot while away
                  {% elif watch == 'too_cold' %}🥶 Main Floor is cold while away
                  {% elif watch == 'too_humid' %}💧 Main Floor is humid while away
                  {% elif watch == 'too_dry' %}🌵 Main Floor is dry while away
                  {% else %}🏠 Dining Room Ecobee still looks occupied{% endif %}
                message: >-
                  {{ reason }}
                  Indoor {{ states('sensor.downstairs_temp_avg') }}°F / {{ states('sensor.downstairs_humidity_avg') }}%.
                  Outdoor {{ states('sensor.downstairs_outdoor_temp') }}°F.
                  Dining Room Ecobee profile {{ states('select.dining_room_current_mode') }}.
                data:
                  tag: downstairs-away-watch
                  sticky: true
                  ttl: 0
                  priority: high
                  url: /calm-mobile/climate
      default:
        - action: script.notify_trevor_phone
          data:
            message: clear_notification
            data:
              tag: downstairs-away-watch
  mode: restart

- id: downstairs_climate_sensor_spread_watch
  alias: "Environment — Main Floor Sensor Spread Watch"
  description: Warns when the Kitchen and Dining Room sensors disagree for an extended period and the average may be less trustworthy.
  triggers:
    - trigger: state
      entity_id: binary_sensor.downstairs_temp_spread_high
      to: "on"
      for:
        minutes: 30
  conditions:
    - condition: state
      entity_id: input_boolean.downstairs_pilot_enabled
      state: "on"
    - condition: state
      entity_id: input_boolean.downstairs_mobile_alerts_enabled
      state: "on"
    - condition: state
      entity_id: input_boolean.environment_alerts_enabled
      state: "on"
  actions:
    - action: script.environment_send_alert
      data:
        room: Main Floor
        alert_kind: source_disagreement
        message: >-
          Kitchen and Dining Room are still {{ states('sensor.downstairs_temp_spread') }}°F apart.
          That likely means the Main Floor is uneven or one sensor placement needs a second look before trusting the average too heavily.
  mode: single

- id: environment_room_actionable_alerts
  alias: "Environment — Room Actionable Alerts"
  description: Sends specific room environment pushes after red-band conditions have persisted long enough to matter.
  triggers:
    - trigger: state
      entity_id: binary_sensor.environment_kitchen_temp_high_alert
      to: "on"
      id: kitchen_temp_high
    - trigger: state
      entity_id: binary_sensor.environment_kitchen_temp_low_alert
      to: "on"
      id: kitchen_temp_low
    - trigger: state
      entity_id: binary_sensor.environment_kitchen_humidity_high_alert
      to: "on"
      id: kitchen_humidity_high
    - trigger: state
      entity_id: binary_sensor.environment_kitchen_humidity_low_alert
      to: "on"
      id: kitchen_humidity_low
    - trigger: state
      entity_id: binary_sensor.environment_dining_room_temp_high_alert
      to: "on"
      id: dining_temp_high
    - trigger: state
      entity_id: binary_sensor.environment_dining_room_temp_low_alert
      to: "on"
      id: dining_temp_low
    - trigger: state
      entity_id: binary_sensor.environment_dining_room_humidity_high_alert
      to: "on"
      id: dining_humidity_high
    - trigger: state
      entity_id: binary_sensor.environment_dining_room_humidity_low_alert
      to: "on"
      id: dining_humidity_low
    - trigger: state
      entity_id: binary_sensor.environment_primary_bedroom_temp_high_alert
      to: "on"
      id: primary_temp_high
    - trigger: state
      entity_id: binary_sensor.environment_primary_bedroom_temp_low_alert
      to: "on"
      id: primary_temp_low
    - trigger: state
      entity_id: binary_sensor.environment_primary_bedroom_humidity_high_alert
      to: "on"
      id: primary_humidity_high
    - trigger: state
      entity_id: binary_sensor.environment_primary_bedroom_humidity_low_alert
      to: "on"
      id: primary_humidity_low
    - trigger: state
      entity_id: binary_sensor.environment_basement_temp_high_alert
      to: "on"
      id: basement_temp_high
    - trigger: state
      entity_id: binary_sensor.environment_basement_temp_low_alert
      to: "on"
      id: basement_temp_low
    - trigger: state
      entity_id: binary_sensor.environment_garage_temp_high_alert
      to: "on"
      id: garage_temp_high
    - trigger: state
      entity_id: binary_sensor.environment_garage_temp_low_alert
      to: "on"
      id: garage_temp_low
    - trigger: state
      entity_id: binary_sensor.environment_garage_humidity_high_alert
      to: "on"
      id: garage_humidity_high
    - trigger: state
      entity_id: binary_sensor.environment_attic_temp_high_alert
      to: "on"
      id: attic_temp_high
    - trigger: state
      entity_id: binary_sensor.environment_attic_humidity_high_alert
      to: "on"
      id: attic_humidity_high
    - trigger: state
      entity_id: binary_sensor.environment_dining_room_ecobee_temp_disagreement
      to: "on"
      id: dining_temp_disagreement
    - trigger: state
      entity_id: binary_sensor.environment_dining_room_ecobee_humidity_disagreement
      to: "on"
      id: dining_humidity_disagreement
    - trigger: state
      entity_id:
        - binary_sensor.environment_kitchen_sensor_unavailable
        - binary_sensor.environment_dining_room_sensor_unavailable
        - binary_sensor.environment_primary_bedroom_sensor_unavailable
        - binary_sensor.environment_basement_sensor_unavailable
        - binary_sensor.environment_garage_sensor_unavailable
        - binary_sensor.environment_attic_sensor_unavailable
      to: "on"
      id: sensor_unavailable
  conditions:
    - condition: state
      entity_id: input_boolean.environment_alerts_enabled
      state: "on"
  actions:
    - variables:
        entity: "{{ trigger.to_state.entity_id }}"
        trigger_name: "{{ trigger.id }}"
    - variables:
        room: >-
          {% if 'kitchen' in trigger_name or entity == 'binary_sensor.environment_kitchen_sensor_unavailable' %}Kitchen
          {% elif 'dining' in trigger_name or entity == 'binary_sensor.environment_dining_room_sensor_unavailable' %}Dining Room
          {% elif 'primary' in trigger_name or entity == 'binary_sensor.environment_primary_bedroom_sensor_unavailable' %}Primary Bedroom
          {% elif 'basement' in trigger_name or entity == 'binary_sensor.environment_basement_sensor_unavailable' %}Basement
          {% elif 'garage' in trigger_name or entity == 'binary_sensor.environment_garage_sensor_unavailable' %}Garage
          {% elif 'attic' in trigger_name or entity == 'binary_sensor.environment_attic_sensor_unavailable' %}Attic
          {% else %}Environment{% endif %}
        kind: >-
          {% if trigger_name == 'sensor_unavailable' %}sensor_unavailable
          {% elif 'disagreement' in trigger_name %}source_disagreement
          {% elif 'temp_high' in trigger_name %}temp_high
          {% elif 'temp_low' in trigger_name %}temp_low
          {% elif 'humidity_high' in trigger_name %}humidity_high
          {% elif 'humidity_low' in trigger_name %}humidity_low
          {% else %}status{% endif %}
    - variables:
        message: >-
          {% set room_name = room %}
          {% if kind == 'sensor_unavailable' %}
            {{ room_name }} environment sensor has been unavailable for 15 minutes.
            Check battery, Bluetooth gateway reachability, or the room sensor placement.
          {% elif room_name == 'Kitchen' %}
            {% set t = states('sensor.main_floor_temperature') %}
            {% set h = states('sensor.main_floor_humidity') %}
            Kitchen is at {{ t }}°F and {{ h }}% humidity. This has stayed outside the action range long enough to deserve a look.
          {% elif room_name == 'Dining Room' and kind == 'source_disagreement' %}
            Dining Room SensorPush and Ecobee readings have been apart long enough to check placement or airflow.
            SensorPush is {{ states('sensor.main_floor_2_temperature') }}°F / {{ states('sensor.main_floor_2_humidity') }}%.
            Ecobee is {{ states('sensor.dining_room_current_temperature') }}°F / {{ states('sensor.dining_room_current_humidity') }}%.
          {% elif room_name == 'Dining Room' %}
            Dining Room is at {{ states('sensor.main_floor_2_temperature') }}°F and {{ states('sensor.main_floor_2_humidity') }}% humidity.
            Dining Room Ecobee is {{ states('sensor.dining_room_current_temperature') }}°F and {{ states('sensor.dining_room_current_humidity') }}%.
          {% elif room_name == 'Primary Bedroom' %}
            Primary Bedroom is at {{ states('sensor.master_temperature') }}°F and {{ states('sensor.master_humidity') }}% humidity.
            This alert uses the room sensor as the source of truth.
          {% elif room_name == 'Basement' %}
            Basement is at {{ states('sensor.mechanical_room_temperature') }}°F and {{ states('sensor.mechanical_room_humidity') }}% humidity.
            Worth checking dehumidification, ventilation, or any open-air source if this keeps up.
          {% elif room_name == 'Garage' %}
            Garage is at {{ states('sensor.garage_temperature') }}°F and {{ states('sensor.garage_humidity') }}% humidity.
            This is outside the garage action band.
          {% elif room_name == 'Attic' %}
            Attic is at {{ states('sensor.attic_temperature') }}°F and {{ states('sensor.attic_humidity') }}% humidity.
            This is outside the attic action band.
          {% else %}
            One of the environment sensors has been unavailable for 15 minutes. Check the Environment tab for the specific room.
          {% endif %}
    - action: script.environment_send_alert
      data:
        room: "{{ room }}"
        alert_kind: "{{ kind }}"
        message: "{{ message }}"
  mode: parallel

- id: environment_room_alert_clears
  alias: "Environment — Clear Room Alerts"
  description: Clears room environment notifications when the underlying actionable binary sensor recovers.
  triggers:
    - trigger: state
      entity_id:
        - binary_sensor.environment_kitchen_temp_high_alert
        - binary_sensor.environment_kitchen_temp_low_alert
        - binary_sensor.environment_kitchen_humidity_high_alert
        - binary_sensor.environment_kitchen_humidity_low_alert
        - binary_sensor.environment_dining_room_temp_high_alert
        - binary_sensor.environment_dining_room_temp_low_alert
        - binary_sensor.environment_dining_room_humidity_high_alert
        - binary_sensor.environment_dining_room_humidity_low_alert
        - binary_sensor.environment_primary_bedroom_temp_high_alert
        - binary_sensor.environment_primary_bedroom_temp_low_alert
        - binary_sensor.environment_primary_bedroom_humidity_high_alert
        - binary_sensor.environment_primary_bedroom_humidity_low_alert
        - binary_sensor.environment_basement_temp_high_alert
        - binary_sensor.environment_basement_temp_low_alert
        - binary_sensor.environment_garage_temp_high_alert
        - binary_sensor.environment_garage_temp_low_alert
        - binary_sensor.environment_garage_humidity_high_alert
        - binary_sensor.environment_attic_temp_high_alert
        - binary_sensor.environment_attic_humidity_high_alert
        - binary_sensor.environment_dining_room_ecobee_temp_disagreement
        - binary_sensor.environment_dining_room_ecobee_humidity_disagreement
        - binary_sensor.environment_kitchen_sensor_unavailable
        - binary_sensor.environment_dining_room_sensor_unavailable
        - binary_sensor.environment_primary_bedroom_sensor_unavailable
        - binary_sensor.environment_basement_sensor_unavailable
        - binary_sensor.environment_garage_sensor_unavailable
        - binary_sensor.environment_attic_sensor_unavailable
        - binary_sensor.downstairs_temp_spread_high
      to: "off"
  actions:
    - variables:
        entity: "{{ trigger.to_state.entity_id }}"
        room: >-
          {% if 'kitchen' in entity %}Kitchen
          {% elif 'dining_room' in entity %}Dining Room
          {% elif 'primary_bedroom' in entity %}Primary Bedroom
          {% elif 'basement' in entity %}Basement
          {% elif 'garage' in entity %}Garage
          {% elif 'attic' in entity %}Attic
          {% elif entity == 'binary_sensor.downstairs_temp_spread_high' %}Main Floor
          {% else %}Environment{% endif %}
        kind: >-
          {% if 'sensor_unavailable' in entity %}sensor_unavailable
          {% elif 'disagreement' in entity %}source_disagreement
          {% elif entity == 'binary_sensor.downstairs_temp_spread_high' %}source_disagreement
          {% elif 'temp_high' in entity %}temp_high
          {% elif 'temp_low' in entity %}temp_low
          {% elif 'humidity_high' in entity %}humidity_high
          {% elif 'humidity_low' in entity %}humidity_low
          {% else %}status{% endif %}
    - action: script.environment_send_alert
      data:
        room: "{{ room }}"
        alert_kind: "{{ kind }}"
        clear: true
  mode: parallel

- id: house_low_battery_notification
  alias: "House — Low Battery Notification"
  description: Sends short home-maintenance pushes for monitored infrastructure batteries at 20%, 10%, and 5%.
  triggers:
    - trigger: state
      entity_id: binary_sensor.house_low_battery_alert
      to: "on"
      id: getting_low
    - trigger: state
      entity_id: binary_sensor.house_battery_replace_soon_alert
      to: "on"
      id: replace_soon
    - trigger: state
      entity_id: binary_sensor.house_battery_critical_alert
      to: "on"
      id: critical
    - trigger: homeassistant
      event: start
      id: startup
  conditions:
    - condition: state
      entity_id: input_boolean.house_battery_alerts_enabled
      state: "on"
    - condition: template
      value_template: "{{ (states('sensor.house_low_battery_summary') | int(0)) > 0 }}"
  actions:
    - variables:
        severity: "{{ state_attr('sensor.house_low_battery_summary', 'severity') | default('getting_low', true) }}"
        battery_list: >-
          {% if severity == 'critical' %}
            {{ state_attr('sensor.house_low_battery_summary', 'critical_batteries') }}
          {% elif severity == 'replace_soon' %}
            {{ state_attr('sensor.house_low_battery_summary', 'replace_soon_batteries') }}
          {% else %}
            {{ state_attr('sensor.house_low_battery_summary', 'getting_low_batteries') }}
          {% endif %}
    - action: script.notify_trevor_phone
      data:
        title: >-
          {% if severity == 'critical' %}🪫 Battery critical
          {% elif severity == 'replace_soon' %}🪫 Battery replace soon
          {% else %}🪫 Battery getting low{% endif %}
        message: "{{ battery_list }}"
        data:
          group: house-maintenance
          tag: house-low-battery
          url: /calm-mobile/climate
  mode: single

- id: house_low_battery_clear_notification
  alias: "House — Clear Low Battery Notification"
  description: Clears the home-maintenance low-battery push once all monitored infrastructure batteries recover.
  triggers:
    - trigger: state
      entity_id: binary_sensor.house_low_battery_alert
      to: "off"
    - trigger: state
      entity_id: binary_sensor.house_battery_replace_soon_alert
      to: "off"
    - trigger: state
      entity_id: binary_sensor.house_battery_critical_alert
      to: "off"
  conditions:
    - condition: state
      entity_id: binary_sensor.house_low_battery_alert
      state: "off"
    - condition: state
      entity_id: binary_sensor.house_battery_replace_soon_alert
      state: "off"
    - condition: state
      entity_id: binary_sensor.house_battery_critical_alert
      state: "off"
  actions:
    - action: script.notify_trevor_phone
      data:
        message: clear_notification
        data:
          tag: house-low-battery
  mode: single

