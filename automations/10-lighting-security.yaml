- id: away_motion_security_activity_detected
  alias: "Security — Motion While Everyone Away"
  description: High-sensitivity alert for interior or garage motion after both household phones are away.
  triggers:
    - trigger: state
      entity_id:
        - binary_sensor.g6_instant_motion
        - binary_sensor.wynn_s_room_motion
        - binary_sensor.wynn_s_room_person_detected
        - binary_sensor.mud_room_motion
        - binary_sensor.mud_room_person_detected
        - binary_sensor.mechanical_room_motion
        - binary_sensor.mechanical_room_person_detected
        - binary_sensor.dining_room_motion
        - binary_sensor.dining_room_occupancy
        - binary_sensor.office_motion
        - binary_sensor.office_occupancy
        - binary_sensor.master_motion_2
        - binary_sensor.master_occupancy_2
        - binary_sensor.master_sensor_new_motion_2
        - binary_sensor.master_sensor_new_occupancy_2
        - binary_sensor.wynn_room_motion
        - binary_sensor.wynn_room_occupancy
        - binary_sensor.g6_instant_motion_3
        - binary_sensor.garage_person_detected
        - binary_sensor.garage_vehicle_detected
        - binary_sensor.ratgdo32disco_c26634_motion
        - binary_sensor.ratgdo32disco_c26634_vehicle_arriving
        - binary_sensor.ratgdo32disco_c26634_vehicle_leaving
        - binary_sensor.ratgdo32_4536e8_motion
      to: "on"
  conditions:
    - condition: template
      value_template: >
        {{ trigger.from_state is not none
           and trigger.from_state.state not in ['on', 'unknown', 'unavailable', ''] }}
    - condition: template
      value_template: >
        {% set trevor_away = states('device_tracker.tk_iphone_16_pro') not in ['home', 'unknown', 'unavailable', ''] %}
        {% set casey_away = states('device_tracker.unifi_default_42_15_78_4a_d9_f8') not in ['home', 'unknown', 'unavailable', ''] %}
        {{ trevor_away and casey_away }}
    - condition: template
      value_template: >
        {{ is_state('binary_sensor.downstairs_everyone_away', 'on')
           and (as_timestamp(now()) - as_timestamp(states.binary_sensor.downstairs_everyone_away.last_changed, 0)) >= 300 }}
    - condition: template
      value_template: >
        {% set snooze = states('input_datetime.away_motion_security_snooze_until') %}
        {{ snooze in ['unknown', 'unavailable', '']
           or as_timestamp(snooze, 0) <= as_timestamp(now()) }}
  actions:
    - action: script.away_motion_security_send_alert
      data:
        motion_entity: "{{ trigger.entity_id }}"
  mode: queued
  max: 10

- id: away_motion_security_clear_when_home
  alias: "Security — Clear Away Motion Alert When Home"
  description: Clears away motion security notifications and re-arms temporary guest pauses when a household phone returns home.
  triggers:
    - trigger: state
      entity_id:
        - device_tracker.tk_iphone_16_pro
        - device_tracker.unifi_default_42_15_78_4a_d9_f8
      to: home
  conditions: []
  actions:
    - action: script.away_motion_security_resume
  mode: single

- id: garage_security_open_while_person_away
  alias: "Garage — Open While Person Away"
  description: >
    Notifies Trevor when either garage door is open while exactly one household
    person is away. Everyone-away cases stay in the away-security guardrail.
  triggers:
    - trigger: state
      entity_id: binary_sensor.away_security_garage_door_open
      to: "on"
      id: garage_opened
    - trigger: state
      entity_id: device_tracker.tk_iphone_16_pro
      not_from:
        - "unknown"
        - "unavailable"
      not_to:
        - "unknown"
        - "unavailable"
      id: trevor_presence
    - trigger: state
      entity_id: device_tracker.unifi_default_42_15_78_4a_d9_f8
      not_from:
        - "unknown"
        - "unavailable"
      not_to:
        - "unknown"
        - "unavailable"
      id: casey_presence
    - trigger: time_pattern
      minutes: "/15"
      id: repeat
  conditions:
    - condition: state
      entity_id: binary_sensor.away_security_garage_door_open
      state: "on"
    - condition: template
      value_template: >
        {% set snooze = states('input_datetime.garage_security_snooze_until') %}
        {{ snooze in ['unknown', 'unavailable', '']
           or as_timestamp(snooze, 0) <= as_timestamp(now()) }}
  actions:
    - variables:
        trevor_state: "{{ states('device_tracker.tk_iphone_16_pro') }}"
        casey_state: "{{ states('device_tracker.unifi_default_42_15_78_4a_d9_f8') }}"
        trevor_away: "{{ trevor_state not in ['home', 'unknown', 'unavailable', ''] }}"
        casey_away: "{{ casey_state not in ['home', 'unknown', 'unavailable', ''] }}"
        trevor_home: "{{ trevor_state == 'home' }}"
        casey_home: "{{ casey_state == 'home' }}"
        trigger_is_departure: >
          {{ trigger.id in ['trevor_presence', 'casey_presence']
             and trigger.from_state is not none
             and trigger.to_state is not none
             and trigger.from_state.state == 'home'
             and trigger.to_state.state not in ['home', 'unknown', 'unavailable', ''] }}
        trigger_is_garage_or_repeat: "{{ trigger.id in ['garage_opened', 'repeat'] }}"
        repeat_is_due: >
          {{ trigger.id != 'repeat'
             or (as_timestamp(now()) - as_timestamp(states.binary_sensor.away_security_garage_door_open.last_changed, 0)) >= 900 }}
    - condition: template
      value_template: >
        {{ repeat_is_due | bool
           and (trigger_is_departure | bool or trigger_is_garage_or_repeat | bool)
           and ((trevor_away | bool and casey_home | bool)
                or (casey_away | bool and trevor_home | bool)) }}
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ trevor_away | bool and casey_home | bool }}"
          sequence:
            - action: script.garage_security_send_alert
              data:
                alert_kind: trevor_away
        - conditions:
            - condition: template
              value_template: "{{ casey_away | bool and trevor_home | bool }}"
          sequence:
            - action: script.garage_security_send_alert
              data:
                alert_kind: casey_away
  mode: restart

- id: garage_security_open_too_long
  alias: "Garage — Open Too Long"
  description: Low-noise reminder when either garage door stays open while someone is home.
  triggers:
    - trigger: state
      entity_id:
        - cover.ratgdo32disco_c26634_door
        - cover.ratgdo32_4536e8_door
      to: "open"
      for:
        minutes: 30
      id: open_30
    - trigger: time_pattern
      minutes: "/30"
      id: repeat
  conditions:
    - condition: state
      entity_id: binary_sensor.away_security_garage_door_open
      state: "on"
    - condition: template
      value_template: >
        {{ is_state('device_tracker.tk_iphone_16_pro', 'home')
           and is_state('device_tracker.unifi_default_42_15_78_4a_d9_f8', 'home') }}
    - condition: template
      value_template: >
        {% set snooze = states('input_datetime.garage_security_snooze_until') %}
        {{ snooze in ['unknown', 'unavailable', '']
           or as_timestamp(snooze, 0) <= as_timestamp(now()) }}
    - condition: template
      value_template: >
        {% set minutes_now = now().hour * 60 + now().minute %}
        {{ minutes_now >= 360 and minutes_now < 1350 }}
    - condition: template
      value_template: >
        {{ trigger.id != 'repeat'
           or (as_timestamp(now()) - as_timestamp(states.binary_sensor.away_security_garage_door_open.last_changed, 0)) >= 1800 }}
  actions:
    - action: script.garage_security_send_alert
      data:
        alert_kind: open_too_long
        garage_cover: "{{ trigger.entity_id if trigger.id == 'open_30' else state_attr('binary_sensor.away_security_garage_door_open', 'primary_open_entity') }}"
  mode: single

- id: garage_security_open_at_night
  alias: "Garage — Open At Night"
  description: Higher-priority reminder when either garage door is open during the overnight window.
  triggers:
    - trigger: time
      at: "22:30:00"
      id: bedtime_check
    - trigger: time_pattern
      minutes: "/15"
      id: repeat
  conditions:
    - condition: state
      entity_id: binary_sensor.away_security_garage_door_open
      state: "on"
    - condition: template
      value_template: >
        {% set snooze = states('input_datetime.garage_security_snooze_until') %}
        {{ snooze in ['unknown', 'unavailable', '']
           or as_timestamp(snooze, 0) <= as_timestamp(now()) }}
    - condition: template
      value_template: >
        {% set minutes_now = now().hour * 60 + now().minute %}
        {{ minutes_now >= 1350 or minutes_now < 360 }}
    - condition: template
      value_template: >
        {{ is_state('device_tracker.tk_iphone_16_pro', 'home')
           and is_state('device_tracker.unifi_default_42_15_78_4a_d9_f8', 'home') }}
  actions:
    - action: script.garage_security_send_alert
      data:
        alert_kind: open_at_night
  mode: single

- id: entry_security_mudroom_unlocked_at_night
  alias: "Security — Mudroom Unlocked At Night"
  description: Reminds Trevor when the mudroom door is unlocked during the overnight window.
  triggers:
    - trigger: time
      at: "22:30:00"
      id: bedtime_check
    - trigger: state
      entity_id: lock.mudroom_door_lock
      to: "unlocked"
      id: unlocked
    - trigger: homeassistant
      event: start
      id: startup
    - trigger: event
      event_type: automation_reloaded
      id: automation_reloaded
    - trigger: time_pattern
      minutes: "/15"
      id: repeat
  conditions:
    - condition: state
      entity_id: lock.mudroom_door_lock
      state: "unlocked"
    - condition: template
      value_template: >
        {% set snooze = states('input_datetime.entry_security_snooze_until') %}
        {{ snooze in ['unknown', 'unavailable', '']
           or as_timestamp(snooze, 0) <= as_timestamp(now()) }}
    - condition: template
      value_template: >
        {% set minutes_now = now().hour * 60 + now().minute %}
        {{ minutes_now >= 1350 or minutes_now < 360 }}
    - condition: template
      value_template: >
        {% set trevor_away = states('device_tracker.tk_iphone_16_pro') not in ['home', 'unknown', 'unavailable', ''] %}
        {% set casey_away = states('device_tracker.unifi_default_42_15_78_4a_d9_f8') not in ['home', 'unknown', 'unavailable', ''] %}
        {{ not (trevor_away and casey_away) }}
  actions:
    - if:
        - condition: template
          value_template: "{{ trigger.id == 'startup' }}"
      then:
        - delay:
            seconds: 15
    - action: script.entry_security_send_alert
      data:
        alert_kind: mudroom_unlocked_at_night
  mode: single

- id: garage_security_opened_overnight
  alias: "Garage — Opened Overnight"
  description: Immediate alert when either garage door opens overnight without a recent arrival home.
  triggers:
    - trigger: state
      entity_id:
        - cover.ratgdo32disco_c26634_door
        - cover.ratgdo32_4536e8_door
      from: "closed"
      to: "opening"
      id: opening
    - trigger: state
      entity_id:
        - cover.ratgdo32disco_c26634_door
        - cover.ratgdo32_4536e8_door
      from: "closed"
      to: "open"
      id: open
  conditions:
    - condition: template
      value_template: >
        {% set minutes_now = now().hour * 60 + now().minute %}
        {{ minutes_now >= 1380 or minutes_now < 360 }}
    - condition: template
      value_template: >
        {% set snooze = states('input_datetime.garage_security_snooze_until') %}
        {{ snooze in ['unknown', 'unavailable', '']
           or as_timestamp(snooze, 0) <= as_timestamp(now()) }}
    - condition: template
      value_template: >
        {% set recent_window = 600 %}
        {% set trevor_recent = is_state('device_tracker.tk_iphone_16_pro', 'home')
           and (as_timestamp(now()) - as_timestamp(states.device_tracker.tk_iphone_16_pro.last_changed, 0)) < recent_window %}
        {% set casey_recent = is_state('device_tracker.unifi_default_42_15_78_4a_d9_f8', 'home')
           and (as_timestamp(now()) - as_timestamp(states.device_tracker.unifi_default_42_15_78_4a_d9_f8.last_changed, 0)) < recent_window %}
        {{ not (trevor_recent or casey_recent) }}
  actions:
    - action: script.garage_security_send_alert
      data:
        alert_kind: opened_overnight
        garage_cover: "{{ trigger.entity_id }}"
  mode: single

- id: garage_security_obstruction_detected
  alias: "Garage — Obstruction Detected"
  description: Pushes only when either garage door path reports an obstruction while that door is moving.
  triggers:
    - trigger: state
      entity_id:
        - binary_sensor.ratgdo32disco_c26634_obstruction
        - binary_sensor.ratgdo32_4536e8_obstruction
      to: "on"
  conditions:
    - condition: template
      value_template: >-
        {% set cover = 'cover.ratgdo32_4536e8_door'
           if trigger.entity_id == 'binary_sensor.ratgdo32_4536e8_obstruction'
           else 'cover.ratgdo32disco_c26634_door' %}
        {{ states(cover) in ['opening', 'closing'] }}
    - condition: template
      value_template: >
        {% set snooze = states('input_datetime.garage_security_snooze_until') %}
        {{ snooze in ['unknown', 'unavailable', '']
           or as_timestamp(snooze, 0) <= as_timestamp(now()) }}
  actions:
    - action: script.garage_security_send_alert
      data:
        alert_kind: obstruction
        garage_cover: >-
          {{ 'cover.ratgdo32_4536e8_door'
             if trigger.entity_id == 'binary_sensor.ratgdo32_4536e8_obstruction'
             else 'cover.ratgdo32disco_c26634_door' }}
  mode: single

- id: garage_security_clear_when_resolved
  alias: "Garage — Clear Alerts When Resolved"
  description: Clears active garage-security pushes when the door closes or obstruction clears.
  triggers:
    - trigger: state
      entity_id:
        - cover.ratgdo32disco_c26634_door
        - cover.ratgdo32_4536e8_door
      to: "closed"
      id: door_closed
    - trigger: state
      entity_id:
        - binary_sensor.ratgdo32disco_c26634_obstruction
        - binary_sensor.ratgdo32_4536e8_obstruction
      to: "off"
      id: obstruction_clear
    - trigger: state
      entity_id:
        - device_tracker.tk_iphone_16_pro
        - device_tracker.unifi_default_42_15_78_4a_d9_f8
      to: home
      id: person_home
  conditions: []
  actions:
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ trigger.id == 'door_closed' }}"
          sequence:
            - if:
                - condition: state
                  entity_id: binary_sensor.away_security_garage_door_open
                  state: "off"
              then:
                - action: script.garage_security_clear_alerts
        - conditions:
            - condition: template
              value_template: "{{ trigger.id == 'obstruction_clear' }}"
          sequence:
            - action: script.notify_trevor_phone
              data:
                message: clear_notification
                data:
                  tag: garage-obstruction
        - conditions:
            - condition: template
              value_template: "{{ trigger.id == 'person_home' }}"
          sequence:
            - action: script.garage_security_clear_person_away_alerts
  mode: single

- id: entry_security_clear_when_resolved
  alias: "Security — Clear Entry Night Reminder When Resolved"
  description: Clears overnight entry-security pushes when the mudroom lock is secured or away-security takes over.
  triggers:
    - trigger: state
      entity_id: lock.mudroom_door_lock
      to: "locked"
      id: mudroom_locked
    - trigger: state
      entity_id:
        - device_tracker.tk_iphone_16_pro
        - device_tracker.unifi_default_42_15_78_4a_d9_f8
      not_from:
        - "unknown"
        - "unavailable"
      not_to:
        - "unknown"
        - "unavailable"
      id: presence
    - trigger: state
      entity_id: binary_sensor.house_unsecured_while_away
      to: "on"
      id: away_security
    - trigger: homeassistant
      event: start
      id: startup
    - trigger: event
      event_type: automation_reloaded
      id: automation_reloaded
  conditions: []
  actions:
    - if:
        - condition: template
          value_template: >
            {% set trevor_away = states('device_tracker.tk_iphone_16_pro') not in ['home', 'unknown', 'unavailable', ''] %}
            {% set casey_away = states('device_tracker.unifi_default_42_15_78_4a_d9_f8') not in ['home', 'unknown', 'unavailable', ''] %}
            {{ trigger.id in ['mudroom_locked', 'away_security']
               or is_state('lock.mudroom_door_lock', 'locked')
               or (trevor_away and casey_away) }}
      then:
        - action: script.entry_security_clear_alerts

- id: away_security_clear_when_resolved
  alias: "Security — Clear Away Reminder When Resolved"
  description: Clears the active away-security push once the issue is resolved.
  triggers:
    - trigger: state
      entity_id: binary_sensor.house_unsecured_while_away
      to: "off"
  conditions: []
  actions:
    - action: script.away_security_clear_alert
  mode: single

- id: security_casey_left_garage_clear
  alias: "Security — Clear Casey Left Entry Alert"
  description: Clears the contextual Casey-left-entry push once it is no longer relevant.
  triggers:
    - trigger: state
      entity_id:
        - cover.ratgdo32disco_c26634_door
        - cover.ratgdo32_4536e8_door
      to: closed
    - trigger: state
      entity_id:
        - lock.garage_entry_lock
        - lock.mudroom_door_lock
      to: locked
    - trigger: state
      entity_id: device_tracker.tk_iphone_16_pro
      to: home
    - trigger: state
      entity_id: device_tracker.unifi_default_42_15_78_4a_d9_f8
      to: home
  conditions: []
  actions:
    - if:
        - condition: template
          value_template: >
            {{ is_state('device_tracker.tk_iphone_16_pro', 'home')
               or is_state('device_tracker.unifi_default_42_15_78_4a_d9_f8', 'home')
               or states('sensor.away_security_entry_point_issues') | int(0) == 0 }}
      then:
        - action: script.casey_left_garage_clear_alert
  mode: single

- id: security_casey_left_combo_clear
  alias: "Security — Clear Casey Left Combo Alert"
  description: Clears the contextual Casey-left combo push once it is no longer relevant.
  triggers:
    - trigger: state
      entity_id:
        - cover.ratgdo32disco_c26634_door
        - cover.ratgdo32_4536e8_door
      to: closed
    - trigger: state
      entity_id:
        - lock.garage_entry_lock
        - lock.mudroom_door_lock
      to: locked
    - trigger: state
      entity_id: sun.sun
      to: "below_horizon"
    - trigger: state
      entity_id: device_tracker.tk_iphone_16_pro
      to: home
    - trigger: state
      entity_id: device_tracker.unifi_default_42_15_78_4a_d9_f8
      to: home
    - trigger: event
      event_type: state_changed
      id: lights_state_changed
  conditions:
    - condition: template
      value_template: >
        {% if trigger.id == 'lights_state_changed' %}
          {% set entity = trigger.event.data.entity_id | default('') %}
          {{ entity.startswith('light.') or entity == 'switch.exterior_mud_room_stairs' }}
        {% else %}
          true
        {% endif %}
  actions:
    - if:
        - condition: template
          value_template: >
            {{ not (
              is_state('sun.sun', 'above_horizon')
              and states('device_tracker.tk_iphone_16_pro') not in ['home', 'unknown', 'unavailable', '']
              and states('device_tracker.unifi_default_42_15_78_4a_d9_f8') not in ['home', 'unknown', 'unavailable', '']
              and states('sensor.away_security_entry_point_issues') | int(0) > 0
              and states('sensor.away_security_active_lights') | int(0) > 0
            ) }}
      then:
        - action: script.casey_left_combo_clear_alert
  mode: single

- id: security_casey_left_lights_clear
  alias: "Security — Clear Casey Left Lights Alert"
  description: Clears the contextual Casey-left-lights push once it is no longer relevant.
  triggers:
    - trigger: state
      entity_id: sun.sun
      to: "below_horizon"
    - trigger: state
      entity_id: device_tracker.tk_iphone_16_pro
      to: home
    - trigger: state
      entity_id: device_tracker.unifi_default_42_15_78_4a_d9_f8
      to: home
    - trigger: event
      event_type: state_changed
      id: lights_state_changed
  conditions:
    - condition: template
      value_template: >
        {% if trigger.id == 'lights_state_changed' %}
          {% set entity = trigger.event.data.entity_id | default('') %}
          {{ entity.startswith('light.') or entity == 'switch.exterior_mud_room_stairs' }}
        {% else %}
          true
        {% endif %}
  actions:
    - if:
        - condition: template
          value_template: >
            {{ is_state('sun.sun', 'below_horizon')
               or is_state('device_tracker.tk_iphone_16_pro', 'home')
               or is_state('device_tracker.unifi_default_42_15_78_4a_d9_f8', 'home')
               or states('sensor.away_security_active_lights') | int(0) == 0 }}
      then:
        - action: script.casey_left_lights_clear_alert
  mode: single

- id: security_entry_ring_notifications
  alias: "Security — Entry Ring Notifications"
  description: Sends mobile notifications for front door and mud room Ring motion and doorbell events.
  triggers:
    - trigger: state
      entity_id: event.front_door_motion
      id: front_door_motion
    - trigger: state
      entity_id: event.front_door_ding
      id: front_door_ding
    - trigger: state
      entity_id: event.mudroom_door_motion
      id: mudroom_door_motion
    - trigger: state
      entity_id: event.mudroom_door_ding
      id: mudroom_door_ding
  conditions:
    - condition: template
      value_template: >
        {{ trigger.to_state is not none and trigger.to_state.state not in ['unknown', 'unavailable'] }}
  actions:
    - variables:
        zone_name: "{{ 'Mud room' if trigger.id.startswith('mudroom') else 'Front door' }}"
        event_kind: "{{ 'doorbell' if trigger.id.endswith('ding') else 'motion' }}"
    - action: script.entry_camera_send_alert
      data:
        zone_name: "{{ zone_name }}"
        event_kind: "{{ event_kind }}"
  mode: parallel
  max: 10
