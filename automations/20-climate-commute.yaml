- id: set_default_theme_liquid_glass
  alias: "Frontend — Set Liquid Glass Theme"
  description: Applies the liquid glass theme on Home Assistant startup.
  triggers:
    - trigger: homeassistant
      event: start
  conditions: []
  actions:
    - action: frontend.set_theme
      data:
        name: liquid_glass
        mode: dark
  mode: single

- id: master_bedroom_sconces_sync
  alias: "Lights — Sync Master Bedroom Sconces"
  description: Keeps the left and right master bedroom sconces paired when either side changes.
  triggers:
    - trigger: state
      entity_id:
        - light.master_bedroom_sconce_l
        - light.master_bedroom_sconce_r
  conditions:
    - condition: template
      value_template: >
        {% set source = trigger.to_state %}
        {% set target_id = 'light.master_bedroom_sconce_r'
           if trigger.entity_id == 'light.master_bedroom_sconce_l'
           else 'light.master_bedroom_sconce_l' %}
        {% set target_state = states(target_id) %}
        {{ source is not none
           and source.state in ['on', 'off']
           and target_state not in ['unknown', 'unavailable']
           and (
             source.state != target_state
             or (
               source.state == 'on'
               and (source.attributes.brightness | int(255))
                  != (state_attr(target_id, 'brightness') | int(255))
             )
           ) }}
  actions:
    - variables:
        target_entity: >-
          {{ 'light.master_bedroom_sconce_r'
             if trigger.entity_id == 'light.master_bedroom_sconce_l'
             else 'light.master_bedroom_sconce_l' }}
        source_state: "{{ trigger.to_state.state }}"
        source_brightness: "{{ trigger.to_state.attributes.brightness | int(255) }}"
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ source_state == 'on' }}"
          sequence:
            - action: light.turn_on
              data:
                entity_id: "{{ target_entity }}"
                brightness: "{{ source_brightness }}"
        - conditions:
            - condition: template
              value_template: "{{ source_state == 'off' }}"
          sequence:
            - action: light.turn_off
              data:
                entity_id: "{{ target_entity }}"
  mode: restart

- id: downstairs_climate_pilot_startup_sync
  alias: "Environment — Startup Sync"
  description: Refreshes environment observability entities and clears stale advisory notifications on startup.
  triggers:
    - trigger: homeassistant
      event: start
  actions:
    - action: homeassistant.update_entity
      target:
        entity_id:
          - sensor.downstairs_temp_avg
          - sensor.downstairs_humidity_avg
          - sensor.downstairs_temp_spread
          - sensor.downstairs_time_period
          - sensor.downstairs_active_season
          - sensor.downstairs_outdoor_temp
          - sensor.downstairs_outdoor_humidity
          - sensor.downstairs_outdoor_wind_speed
          - sensor.downstairs_source_policy
          - binary_sensor.downstairs_open_window_eligible
          - binary_sensor.open_window_recommendation_active
          - sensor.downstairs_ecobee_setpoint
          - sensor.downstairs_climate_status
          - sensor.downstairs_climate_insight
          - sensor.downstairs_away_watch
          - sensor.downstairs_away_watch_reason
          - sensor.downstairs_away_minutes
          - binary_sensor.downstairs_temp_spread_high
          - binary_sensor.downstairs_someone_home
          - binary_sensor.downstairs_everyone_away
          - sensor.environment_house_status
          - sensor.environment_main_floor_status
          - sensor.environment_second_floor_status
          - sensor.environment_kitchen_status
          - sensor.environment_dining_room_status
          - sensor.environment_primary_bedroom_status
          - sensor.environment_office_status
          - sensor.environment_basement_status
          - sensor.environment_garage_status
          - sensor.environment_attic_status
          - binary_sensor.environment_dining_room_ecobee_temp_disagreement
          - binary_sensor.environment_dining_room_ecobee_humidity_disagreement
          - binary_sensor.environment_basement_radon_high_alert
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ not is_state('input_boolean.environment_alerts_enabled', 'on')
                   or not is_state('input_boolean.downstairs_mobile_alerts_enabled', 'on')
                   or not is_state('input_boolean.downstairs_pilot_enabled', 'on')
                   or states('sensor.downstairs_away_watch') in ['all_clear', 'grace_period', 'home_occupied', 'unknown', 'unavailable'] }}
          sequence:
            - action: script.notify_trevor_phone
              data:
                message: clear_notification
                data:
                  tag: downstairs-away-watch
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ not is_state('input_boolean.downstairs_mobile_alerts_enabled', 'on')
                   or not is_state('input_boolean.downstairs_pilot_enabled', 'on')
                   or not is_state('binary_sensor.downstairs_open_window_eligible', 'on')
                   or not is_state('binary_sensor.downstairs_someone_home', 'on')
                   or not is_state('sensor.downstairs_time_period', 'night') }}
          sequence:
            - action: script.notify_trevor_phone
              data:
                message: clear_notification
                data:
                  tag: downstairs-window-night
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ not is_state('input_boolean.environment_alerts_enabled', 'on')
                   or not is_state('input_boolean.downstairs_mobile_alerts_enabled', 'on')
                   or not is_state('binary_sensor.open_window_recommendation_active', 'on') }}
          sequence:
            - action: script.notify_trevor_phone
              data:
                message: clear_notification
                data:
                  tag: open-window-night
  mode: single

- id: downstairs_climate_recommendation_notification
  alias: "Environment — Main Floor Open Window Dashboard Only"
  description: Keeps the open-window signal dashboard-only and clears the old mobile notification tag if it exists.
  triggers:
    - trigger: state
      entity_id: binary_sensor.downstairs_open_window_eligible
      to: "on"
      for:
        minutes: 20
      id: send
    - trigger: state
      entity_id:
        - input_boolean.downstairs_pilot_enabled
        - input_boolean.downstairs_mobile_alerts_enabled
        - binary_sensor.downstairs_someone_home
        - binary_sensor.downstairs_open_window_eligible
        - sensor.downstairs_time_period
      id: reevaluate
  actions:
    - action: script.notify_trevor_phone
      data:
        message: clear_notification
        data:
          tag: downstairs-window-night
  mode: restart

- id: downstairs_climate_profile_recommendation_notification
  alias: "Environment — Main Floor Away Watch"
  description: Alerts when both phones are away and the Main Floor climate or Dining Room Ecobee profile needs attention.
  triggers:
    - trigger: state
      entity_id: sensor.downstairs_away_watch
      to: too_hot
      for:
        minutes: 45
      id: too_hot
    - trigger: state
      entity_id: sensor.downstairs_away_watch
      to: too_cold
      for:
        minutes: 45
      id: too_cold
    - trigger: state
      entity_id: sensor.downstairs_away_watch
      to: too_humid
      for:
        minutes: 90
      id: too_humid
    - trigger: state
      entity_id: sensor.downstairs_away_watch
      to: too_dry
      for:
        hours: 6
      id: too_dry
    - trigger: state
      entity_id: sensor.downstairs_away_watch
      to: profile_check
      for:
        minutes: 20
      id: profile_check
    - trigger: state
      entity_id: sensor.downstairs_away_watch
      to:
        - all_clear
        - grace_period
        - home_occupied
      id: clear
    - trigger: state
      entity_id:
        - input_boolean.downstairs_pilot_enabled
        - input_boolean.downstairs_mobile_alerts_enabled
      id: reevaluate
  conditions:
  actions:
    - variables:
        watch: "{{ states('sensor.downstairs_away_watch') }}"
        reason: "{{ states('sensor.downstairs_away_watch_reason') }}"
        should_send: >
          {{ is_state('input_boolean.downstairs_pilot_enabled', 'on')
             and is_state('input_boolean.downstairs_mobile_alerts_enabled', 'on')
             and is_state('input_boolean.environment_alerts_enabled', 'on')
             and watch in ['too_hot', 'too_cold', 'too_humid', 'too_dry', 'profile_check'] }}
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ trigger.id != 'clear' and should_send }}"
          sequence:
            - action: script.notify_trevor_phone
              data:
                title: >-
                  {% if watch == 'too_hot' %}🥵 Main Floor is hot while away
                  {% elif watch == 'too_cold' %}🥶 Main Floor is cold while away
                  {% elif watch == 'too_humid' %}💧 Main Floor is humid while away
                  {% elif watch == 'too_dry' %}🌵 Main Floor is dry while away
                  {% else %}🏠 Dining Room Ecobee still looks occupied{% endif %}
                message: >-
                  {{ reason }}
                  Indoor {{ states('sensor.downstairs_temp_avg') }}°F / {{ states('sensor.downstairs_humidity_avg') }}%.
                  Outdoor {{ states('sensor.downstairs_outdoor_temp') }}°F.
                  Dining Room Ecobee profile {{ states('select.dining_room_current_mode') }}.
                data:
                  tag: downstairs-away-watch
                  sticky: true
                  ttl: 0
                  priority: high
                  url: /calm-mobile/climate
      default:
        - action: script.notify_trevor_phone
          data:
            message: clear_notification
            data:
              tag: downstairs-away-watch
  mode: restart

- id: downstairs_climate_sensor_spread_watch
  alias: "Environment — Main Floor Sensor Spread Watch"
  description: Warns when the Kitchen and Dining Room sensors disagree for an extended period and the average may be less trustworthy.
  triggers:
    - trigger: state
      entity_id: binary_sensor.downstairs_temp_spread_high
      to: "on"
      for:
        minutes: 30
  conditions:
    - condition: state
      entity_id: input_boolean.downstairs_pilot_enabled
      state: "on"
    - condition: state
      entity_id: input_boolean.downstairs_mobile_alerts_enabled
      state: "on"
    - condition: state
      entity_id: input_boolean.environment_alerts_enabled
      state: "on"
  actions:
    - action: script.environment_send_alert
      data:
        room: Main Floor
        alert_kind: source_disagreement
        message: >-
          Kitchen and Dining Room are still {{ states('sensor.downstairs_temp_spread') }}°F apart.
          That likely means the Main Floor is uneven or one sensor placement needs a second look before trusting the average too heavily.
  mode: single

- id: environment_room_actionable_alerts
  alias: "Environment — Room Actionable Alerts"
  description: Sends specific room environment pushes after red-band conditions have persisted long enough to matter.
  triggers:
    - trigger: state
      entity_id: binary_sensor.environment_kitchen_temp_high_alert
      to: "on"
      id: kitchen_temp_high
    - trigger: state
      entity_id: binary_sensor.environment_kitchen_temp_low_alert
      to: "on"
      id: kitchen_temp_low
    - trigger: state
      entity_id: binary_sensor.environment_kitchen_humidity_high_alert
      to: "on"
      id: kitchen_humidity_high
    - trigger: state
      entity_id: binary_sensor.environment_kitchen_humidity_low_alert
      to: "on"
      id: kitchen_humidity_low
    - trigger: state
      entity_id: binary_sensor.environment_dining_room_temp_high_alert
      to: "on"
      id: dining_temp_high
    - trigger: state
      entity_id: binary_sensor.environment_dining_room_temp_low_alert
      to: "on"
      id: dining_temp_low
    - trigger: state
      entity_id: binary_sensor.environment_dining_room_humidity_high_alert
      to: "on"
      id: dining_humidity_high
    - trigger: state
      entity_id: binary_sensor.environment_dining_room_humidity_low_alert
      to: "on"
      id: dining_humidity_low
    - trigger: state
      entity_id: binary_sensor.environment_primary_bedroom_temp_high_alert
      to: "on"
      id: primary_temp_high
    - trigger: state
      entity_id: binary_sensor.environment_primary_bedroom_temp_low_alert
      to: "on"
      id: primary_temp_low
    - trigger: state
      entity_id: binary_sensor.environment_primary_bedroom_humidity_high_alert
      to: "on"
      id: primary_humidity_high
    - trigger: state
      entity_id: binary_sensor.environment_primary_bedroom_humidity_low_alert
      to: "on"
      id: primary_humidity_low
    - trigger: state
      entity_id: binary_sensor.environment_basement_temp_high_alert
      to: "on"
      id: basement_temp_high
    - trigger: state
      entity_id: binary_sensor.environment_basement_temp_low_alert
      to: "on"
      id: basement_temp_low
    - trigger: state
      entity_id: binary_sensor.environment_garage_temp_high_alert
      to: "on"
      id: garage_temp_high
    - trigger: state
      entity_id: binary_sensor.environment_garage_temp_low_alert
      to: "on"
      id: garage_temp_low
    - trigger: state
      entity_id: binary_sensor.environment_garage_humidity_high_alert
      to: "on"
      id: garage_humidity_high
    - trigger: state
      entity_id: binary_sensor.environment_attic_temp_high_alert
      to: "on"
      id: attic_temp_high
    - trigger: state
      entity_id: binary_sensor.environment_attic_humidity_high_alert
      to: "on"
      id: attic_humidity_high
    - trigger: state
      entity_id: binary_sensor.environment_dining_room_ecobee_temp_disagreement
      to: "on"
      id: dining_temp_disagreement
    - trigger: state
      entity_id: binary_sensor.environment_dining_room_ecobee_humidity_disagreement
      to: "on"
      id: dining_humidity_disagreement
    - trigger: state
      entity_id:
        - binary_sensor.environment_kitchen_sensor_unavailable
        - binary_sensor.environment_dining_room_sensor_unavailable
        - binary_sensor.environment_primary_bedroom_sensor_unavailable
        - binary_sensor.environment_basement_sensor_unavailable
        - binary_sensor.environment_garage_sensor_unavailable
        - binary_sensor.environment_attic_sensor_unavailable
      to: "on"
      id: sensor_unavailable
  conditions:
    - condition: state
      entity_id: input_boolean.environment_alerts_enabled
      state: "on"
  actions:
    - variables:
        entity: "{{ trigger.to_state.entity_id }}"
        trigger_name: "{{ trigger.id }}"
    - variables:
        room: >-
          {% if 'kitchen' in trigger_name or entity == 'binary_sensor.environment_kitchen_sensor_unavailable' %}Kitchen
          {% elif 'dining' in trigger_name or entity == 'binary_sensor.environment_dining_room_sensor_unavailable' %}Dining Room
          {% elif 'primary' in trigger_name or entity == 'binary_sensor.environment_primary_bedroom_sensor_unavailable' %}Primary Bedroom
          {% elif 'basement' in trigger_name or entity == 'binary_sensor.environment_basement_sensor_unavailable' %}Basement
          {% elif 'garage' in trigger_name or entity == 'binary_sensor.environment_garage_sensor_unavailable' %}Garage
          {% elif 'attic' in trigger_name or entity == 'binary_sensor.environment_attic_sensor_unavailable' %}Attic
          {% else %}Environment{% endif %}
        kind: >-
          {% if trigger_name == 'sensor_unavailable' %}sensor_unavailable
          {% elif 'disagreement' in trigger_name %}source_disagreement
          {% elif 'temp_high' in trigger_name %}temp_high
          {% elif 'temp_low' in trigger_name %}temp_low
          {% elif 'humidity_high' in trigger_name %}humidity_high
          {% elif 'humidity_low' in trigger_name %}humidity_low
          {% else %}status{% endif %}
    - variables:
        message: >-
          {% set room_name = room %}
          {% if kind == 'sensor_unavailable' %}
            {{ room_name }} environment sensor has been unavailable for 15 minutes.
            Check battery, Bluetooth gateway reachability, or the room sensor placement.
          {% elif room_name == 'Kitchen' %}
            {% set t = states('sensor.main_floor_temperature') %}
            {% set h = states('sensor.main_floor_humidity') %}
            Kitchen is at {{ t }}°F and {{ h }}% humidity. This has stayed outside the action range long enough to deserve a look.
          {% elif room_name == 'Dining Room' and kind == 'source_disagreement' %}
            Dining Room SensorPush and Ecobee readings have been apart long enough to check placement or airflow.
            SensorPush is {{ states('sensor.main_floor_2_temperature') }}°F / {{ states('sensor.main_floor_2_humidity') }}%.
            Ecobee is {{ states('sensor.dining_room_current_temperature') }}°F / {{ states('sensor.dining_room_current_humidity') }}%.
          {% elif room_name == 'Dining Room' %}
            Dining Room is at {{ states('sensor.main_floor_2_temperature') }}°F and {{ states('sensor.main_floor_2_humidity') }}% humidity.
            Dining Room Ecobee is {{ states('sensor.dining_room_current_temperature') }}°F and {{ states('sensor.dining_room_current_humidity') }}%.
          {% elif room_name == 'Primary Bedroom' %}
            Primary Bedroom is at {{ states('sensor.master_temperature') }}°F and {{ states('sensor.master_humidity') }}% humidity.
            This alert uses the room sensor as the source of truth.
          {% elif room_name == 'Basement' %}
            Basement is at {{ states('sensor.mechanical_room_temperature') }}°F and {{ states('sensor.mechanical_room_humidity') }}% humidity.
            Worth checking dehumidification, ventilation, or any open-air source if this keeps up.
          {% elif room_name == 'Garage' %}
            Garage is at {{ states('sensor.garage_temperature') }}°F and {{ states('sensor.garage_humidity') }}% humidity.
            This is outside the garage action band.
          {% elif room_name == 'Attic' %}
            Attic is at {{ states('sensor.attic_temperature') }}°F and {{ states('sensor.attic_humidity') }}% humidity.
            This is outside the attic action band.
          {% else %}
            One of the environment sensors has been unavailable for 15 minutes. Check the Environment tab for the specific room.
          {% endif %}
    - action: script.environment_send_alert
      data:
        room: "{{ room }}"
        alert_kind: "{{ kind }}"
        message: "{{ message }}"
  mode: parallel

- id: environment_room_alert_clears
  alias: "Environment — Clear Room Alerts"
  description: Clears room environment notifications when the underlying actionable binary sensor recovers.
  triggers:
    - trigger: state
      entity_id:
        - binary_sensor.environment_kitchen_temp_high_alert
        - binary_sensor.environment_kitchen_temp_low_alert
        - binary_sensor.environment_kitchen_humidity_high_alert
        - binary_sensor.environment_kitchen_humidity_low_alert
        - binary_sensor.environment_dining_room_temp_high_alert
        - binary_sensor.environment_dining_room_temp_low_alert
        - binary_sensor.environment_dining_room_humidity_high_alert
        - binary_sensor.environment_dining_room_humidity_low_alert
        - binary_sensor.environment_primary_bedroom_temp_high_alert
        - binary_sensor.environment_primary_bedroom_temp_low_alert
        - binary_sensor.environment_primary_bedroom_humidity_high_alert
        - binary_sensor.environment_primary_bedroom_humidity_low_alert
        - binary_sensor.environment_basement_temp_high_alert
        - binary_sensor.environment_basement_temp_low_alert
        - binary_sensor.environment_garage_temp_high_alert
        - binary_sensor.environment_garage_temp_low_alert
        - binary_sensor.environment_garage_humidity_high_alert
        - binary_sensor.environment_attic_temp_high_alert
        - binary_sensor.environment_attic_humidity_high_alert
        - binary_sensor.environment_dining_room_ecobee_temp_disagreement
        - binary_sensor.environment_dining_room_ecobee_humidity_disagreement
        - binary_sensor.environment_kitchen_sensor_unavailable
        - binary_sensor.environment_dining_room_sensor_unavailable
        - binary_sensor.environment_primary_bedroom_sensor_unavailable
        - binary_sensor.environment_basement_sensor_unavailable
        - binary_sensor.environment_garage_sensor_unavailable
        - binary_sensor.environment_attic_sensor_unavailable
        - binary_sensor.downstairs_temp_spread_high
      to: "off"
  actions:
    - variables:
        entity: "{{ trigger.to_state.entity_id }}"
        room: >-
          {% if 'kitchen' in entity %}Kitchen
          {% elif 'dining_room' in entity %}Dining Room
          {% elif 'primary_bedroom' in entity %}Primary Bedroom
          {% elif 'basement' in entity %}Basement
          {% elif 'garage' in entity %}Garage
          {% elif 'attic' in entity %}Attic
          {% elif entity == 'binary_sensor.downstairs_temp_spread_high' %}Main Floor
          {% else %}Environment{% endif %}
        kind: >-
          {% if 'sensor_unavailable' in entity %}sensor_unavailable
          {% elif 'disagreement' in entity %}source_disagreement
          {% elif entity == 'binary_sensor.downstairs_temp_spread_high' %}source_disagreement
          {% elif 'temp_high' in entity %}temp_high
          {% elif 'temp_low' in entity %}temp_low
          {% elif 'humidity_high' in entity %}humidity_high
          {% elif 'humidity_low' in entity %}humidity_low
          {% else %}status{% endif %}
    - action: script.environment_send_alert
      data:
        room: "{{ room }}"
        alert_kind: "{{ kind }}"
        clear: true
  mode: parallel

- id: environment_open_window_recommendation
  alias: "Environment — Open Window Recommendation"
  description: Sends one soft whole-house open-window recommendation when lived-in rooms would likely benefit from outdoor air.
  triggers:
    - trigger: state
      entity_id: binary_sensor.open_window_recommendation_active
      to: "on"
      for:
        minutes: 20
  conditions:
    - condition: state
      entity_id: binary_sensor.open_window_recommendation_active
      state: "on"
    - condition: state
      entity_id: device_tracker.tk_iphone_16_pro
      state: home
    - condition: state
      entity_id: input_boolean.environment_alerts_enabled
      state: "on"
    - condition: state
      entity_id: input_boolean.downstairs_mobile_alerts_enabled
      state: "on"
    - condition: template
      value_template: >-
        {% set last_sent = states('input_datetime.open_window_notice_last_sent_at') %}
        {{ last_sent in ['unknown', 'unavailable', 'none', '']
           or (as_timestamp(last_sent, 0) | timestamp_custom('%Y-%m-%d', true)) != now().strftime('%Y-%m-%d') }}
  actions:
    - action: script.open_window_notice_send
  mode: single

- id: environment_open_window_recommendation_clear
  alias: "Environment — Clear Open Window Recommendation"
  description: Clears the soft open-window push when conditions are no longer favorable.
  triggers:
    - trigger: state
      entity_id: binary_sensor.open_window_recommendation_active
      to: "off"
  actions:
    - action: script.notify_trevor_phone
      data:
        message: clear_notification
        data:
          tag: open-window-night
  mode: single

- id: environment_open_window_recommendation_morning_expiry
  alias: "Environment — Clear Open Window Recommendation During Sleep Hours"
  description: Clears open-window nudges once the awake-hours window closes, with a 3 AM safety clear for stale mobile banners.
  triggers:
    - trigger: time
      at: "22:30:00"
    - trigger: time
      at: "03:00:00"
  actions:
    - action: script.notify_trevor_phone
      data:
        message: clear_notification
        data:
          tag: open-window-night
    - action: homeassistant.update_entity
      target:
        entity_id: binary_sensor.open_window_recommendation_active
  mode: single

- id: environment_open_window_notification_actions
  alias: "Environment — Open Window Notification Actions"
  description: Handles the dismiss action from the whole-house open-window recommendation push.
  triggers:
    - trigger: event
      event_type: mobile_app_notification_action
  conditions:
    - condition: template
      value_template: "{{ trigger.event.data.action == 'OPEN_WINDOW_NOTICE_DISMISS_TONIGHT' }}"
  actions:
    - action: script.open_window_notice_dismiss_tonight
  mode: single

- id: house_low_battery_notification
  alias: "House — Low Battery Notification"
  description: Sends short home-maintenance pushes for monitored infrastructure batteries at 20%, 10%, and 5%.
  triggers:
    - trigger: state
      entity_id: binary_sensor.house_low_battery_alert
      to: "on"
      id: getting_low
    - trigger: state
      entity_id: binary_sensor.house_battery_replace_soon_alert
      to: "on"
      id: replace_soon
    - trigger: state
      entity_id: binary_sensor.house_battery_critical_alert
      to: "on"
      id: critical
    - trigger: homeassistant
      event: start
      id: startup
  conditions:
    - condition: state
      entity_id: input_boolean.house_battery_alerts_enabled
      state: "on"
    - condition: template
      value_template: "{{ (states('sensor.house_low_battery_summary') | int(0)) > 0 }}"
  actions:
    - variables:
        severity: "{{ state_attr('sensor.house_low_battery_summary', 'severity') | default('getting_low', true) }}"
        battery_list: >-
          {% if severity == 'critical' %}
            {{ state_attr('sensor.house_low_battery_summary', 'critical_batteries') }}
          {% elif severity == 'replace_soon' %}
            {{ state_attr('sensor.house_low_battery_summary', 'replace_soon_batteries') }}
          {% else %}
            {{ state_attr('sensor.house_low_battery_summary', 'getting_low_batteries') }}
          {% endif %}
    - action: script.notify_trevor_phone
      data:
        title: >-
          {% if severity == 'critical' %}🪫 Battery critical
          {% elif severity == 'replace_soon' %}🪫 Battery replace soon
          {% else %}🪫 Battery getting low{% endif %}
        message: "{{ battery_list }}"
        data:
          group: house-maintenance
          tag: house-low-battery
          url: /calm-mobile/climate
  mode: single

- id: house_low_battery_clear_notification
  alias: "House — Clear Low Battery Notification"
  description: Clears the home-maintenance low-battery push once all monitored infrastructure batteries recover.
  triggers:
    - trigger: state
      entity_id: binary_sensor.house_low_battery_alert
      to: "off"
    - trigger: state
      entity_id: binary_sensor.house_battery_replace_soon_alert
      to: "off"
    - trigger: state
      entity_id: binary_sensor.house_battery_critical_alert
      to: "off"
  conditions:
    - condition: state
      entity_id: binary_sensor.house_low_battery_alert
      state: "off"
    - condition: state
      entity_id: binary_sensor.house_battery_replace_soon_alert
      state: "off"
    - condition: state
      entity_id: binary_sensor.house_battery_critical_alert
      state: "off"
  actions:
    - action: script.notify_trevor_phone
      data:
        message: clear_notification
        data:
          tag: house-low-battery
  mode: single

- id: ting_confirmed_hazard_notification
  alias: "Ting — Confirmed Hazard Notification"
  description: Sends immediate critical Ting hazard alerts and repeats while the confirmed hazard remains active.
  triggers:
    - trigger: state
      entity_id: binary_sensor.ting_confirmed_hazard_active
      to: "on"
      id: activated
    - trigger: time_pattern
      minutes: "/5"
      id: repeat
    - trigger: homeassistant
      event: start
      id: startup
  conditions:
    - condition: state
      entity_id: binary_sensor.ting_confirmed_hazard_active
      state: "on"
  actions:
    - variables:
        last_sent: "{{ states('input_datetime.ting_confirmed_hazard_last_sent_at') }}"
        send_due: >
          {{ last_sent in ['unknown', 'unavailable', 'none', '']
             or (as_timestamp(now()) - as_timestamp(last_sent, 0)) >= 600 }}
    - if:
        - condition: template
          value_template: "{{ send_due }}"
      then:
        - action: script.ting_send_notification
          data:
            alert_kind: confirmed
  mode: single

- id: ting_confirmed_hazard_clear_notification
  alias: "Ting — Confirmed Hazard Clear Notification"
  description: Clears the critical Ting hazard push and sends one recovery note when the confirmed hazard resolves.
  triggers:
    - trigger: state
      entity_id: binary_sensor.ting_confirmed_hazard_active
      from: "on"
      to: "off"
  conditions: []
  actions:
    - action: script.ting_send_notification
      data:
        alert_kind: confirmed_clear
  mode: single

- id: ting_unverified_hazard_notification
  alias: "Ting — Unverified Hazard Notification"
  description: Sends non-critical Ting unverified-hazard watches, without duplicating confirmed hazard alerts.
  triggers:
    - trigger: state
      entity_id: binary_sensor.ting_unverified_hazard_active
      to: "on"
      id: activated
    - trigger: time_pattern
      minutes: "/15"
      id: repeat
  conditions:
    - condition: state
      entity_id: input_boolean.ting_watch_notifications_enabled
      state: "on"
    - condition: state
      entity_id: binary_sensor.ting_unverified_hazard_active
      state: "on"
    - condition: state
      entity_id: binary_sensor.ting_confirmed_hazard_active
      state: "off"
  actions:
    - variables:
        last_sent: "{{ states('input_datetime.ting_unverified_hazard_last_sent_at') }}"
        send_due: >
          {{ last_sent in ['unknown', 'unavailable', 'none', '']
             or (as_timestamp(now()) - as_timestamp(last_sent, 0)) >= 3600 }}
    - if:
        - condition: template
          value_template: "{{ send_due }}"
      then:
        - action: script.ting_send_notification
          data:
            alert_kind: unverified
  mode: single

- id: ting_unverified_hazard_clear_notification
  alias: "Ting — Clear Unverified Hazard Notification"
  description: Silently clears the unverified Ting watch notification when the watch resolves.
  triggers:
    - trigger: state
      entity_id: binary_sensor.ting_unverified_hazard_active
      from: "on"
      to: "off"
  conditions: []
  actions:
    - action: script.notify_trevor_phone
      data:
        message: clear_notification
        data:
          tag: ting-unverified-hazard
  mode: single

- id: ting_power_quality_notification
  alias: "Ting — Power Quality Notification"
  description: Sends a Ting voltage watch only after sustained low/high voltage or a sustained spread between the two Ting sensors.
  triggers:
    - trigger: state
      entity_id: binary_sensor.ting_power_quality_watch
      to: "on"
      for: "00:10:00"
      id: sustained
    - trigger: time_pattern
      minutes: "/15"
      id: repeat
  conditions:
    - condition: state
      entity_id: input_boolean.ting_watch_notifications_enabled
      state: "on"
    - condition: state
      entity_id: binary_sensor.ting_power_quality_watch
      state: "on"
    - condition: state
      entity_id: binary_sensor.ting_confirmed_hazard_active
      state: "off"
    - condition: template
      value_template: >
        {{ (as_timestamp(now()) - as_timestamp(states.binary_sensor.ting_power_quality_watch.last_changed, 0)) >= 600 }}
  actions:
    - variables:
        last_sent: "{{ states('input_datetime.ting_voltage_watch_last_sent_at') }}"
        send_due: >
          {{ last_sent in ['unknown', 'unavailable', 'none', '']
             or (as_timestamp(now()) - as_timestamp(last_sent, 0)) >= 7200 }}
    - if:
        - condition: template
          value_template: "{{ send_due }}"
      then:
        - action: script.ting_send_notification
          data:
            alert_kind: voltage
  mode: single

- id: ting_power_quality_clear_notification
  alias: "Ting — Clear Power Quality Notification"
  description: Silently clears the Ting voltage watch after readings recover and stay stable.
  triggers:
    - trigger: state
      entity_id: binary_sensor.ting_power_quality_watch
      from: "on"
      to: "off"
      for: "00:10:00"
  conditions: []
  actions:
    - action: script.notify_trevor_phone
      data:
        message: clear_notification
        data:
          tag: ting-voltage-watch
  mode: single

- id: ting_offline_notification
  alias: "Ting — Offline Notification"
  description: Sends a Ting offline watch after either sensor stops reporting voltage for 30 minutes.
  triggers:
    - trigger: state
      entity_id: binary_sensor.ting_offline_watch
      to: "on"
      for: "00:30:00"
      id: sustained
    - trigger: time_pattern
      minutes: "/15"
      id: repeat
  conditions:
    - condition: state
      entity_id: input_boolean.ting_watch_notifications_enabled
      state: "on"
    - condition: state
      entity_id: binary_sensor.ting_offline_watch
      state: "on"
    - condition: state
      entity_id: binary_sensor.ting_confirmed_hazard_active
      state: "off"
    - condition: template
      value_template: >
        {{ (as_timestamp(now()) - as_timestamp(states.binary_sensor.ting_offline_watch.last_changed, 0)) >= 1800 }}
  actions:
    - variables:
        last_sent: "{{ states('input_datetime.ting_offline_watch_last_sent_at') }}"
        send_due: >
          {{ last_sent in ['unknown', 'unavailable', 'none', '']
             or (as_timestamp(now()) - as_timestamp(last_sent, 0)) >= 7200 }}
    - if:
        - condition: template
          value_template: "{{ send_due }}"
      then:
        - action: script.ting_send_notification
          data:
            alert_kind: offline
  mode: single

- id: ting_offline_clear_notification
  alias: "Ting — Offline Clear Notification"
  description: Sends one Ting recovery note when an offline watch that notified has recovered.
  triggers:
    - trigger: state
      entity_id: binary_sensor.ting_offline_watch
      from: "on"
      to: "off"
      for: "00:05:00"
  conditions:
    - condition: state
      entity_id: input_boolean.ting_offline_watch_alert_active
      state: "on"
  actions:
    - action: script.ting_send_notification
      data:
        alert_kind: offline_clear
  mode: single

- id: ting_freeze_risk_notification
  alias: "Ting — Freeze Risk Notification"
  description: Sends Ting freeze-risk watches only when Ting risk and house/weather context both support it.
  triggers:
    - trigger: state
      entity_id: binary_sensor.ting_freeze_risk_watch
      to: "on"
      id: activated
    - trigger: time_pattern
      minutes: "0"
      id: repeat
  conditions:
    - condition: state
      entity_id: input_boolean.ting_watch_notifications_enabled
      state: "on"
    - condition: state
      entity_id: binary_sensor.ting_freeze_risk_watch
      state: "on"
    - condition: state
      entity_id: binary_sensor.ting_confirmed_hazard_active
      state: "off"
  actions:
    - variables:
        last_sent: "{{ states('input_datetime.ting_freeze_risk_last_sent_at') }}"
        send_due: >
          {{ last_sent in ['unknown', 'unavailable', 'none', '']
             or (as_timestamp(now()) - as_timestamp(last_sent, 0)) >= 21600 }}
    - if:
        - condition: template
          value_template: "{{ send_due }}"
      then:
        - action: script.ting_send_notification
          data:
            alert_kind: freeze
  mode: single

- id: ting_freeze_risk_clear_notification
  alias: "Ting — Clear Freeze Risk Notification"
  description: Silently clears the Ting freeze-risk notification when the watch resolves.
  triggers:
    - trigger: state
      entity_id: binary_sensor.ting_freeze_risk_watch
      from: "on"
      to: "off"
  conditions: []
  actions:
    - action: script.notify_trevor_phone
      data:
        message: clear_notification
        data:
          tag: ting-freeze-risk
  mode: single

- id: ting_learning_complete_notification
  alias: "Ting — Learning Complete Notification"
  description: Sends one quiet notice when both Ting sensors leave learning mode.
  triggers:
    - trigger: state
      entity_id:
        - binary_sensor.ting_1_learning_mode
        - binary_sensor.ting_2_learning_mode
      to: "off"
      for: "00:30:00"
      id: learned
    - trigger: homeassistant
      event: start
      id: startup
  conditions:
    - condition: state
      entity_id: input_boolean.ting_watch_notifications_enabled
      state: "on"
    - condition: state
      entity_id: input_boolean.ting_learning_complete_notified
      state: "off"
    - condition: state
      entity_id: binary_sensor.ting_1_learning_mode
      state: "off"
    - condition: state
      entity_id: binary_sensor.ting_2_learning_mode
      state: "off"
  actions:
    - if:
        - condition: template
          value_template: "{{ trigger.id == 'startup' }}"
      then:
        - delay: "00:30:00"
    - condition: state
      entity_id: binary_sensor.ting_1_learning_mode
      state: "off"
    - condition: state
      entity_id: binary_sensor.ting_2_learning_mode
      state: "off"
    - condition: state
      entity_id: input_boolean.ting_learning_complete_notified
      state: "off"
    - action: script.ting_send_notification
      data:
        alert_kind: learning_complete
  mode: single

- id: ting_learning_resumed_reset
  alias: "Ting — Reset Learning Complete Flag"
  description: Lets the learning-complete notice fire again if either Ting sensor returns to learning mode later.
  triggers:
    - trigger: state
      entity_id:
        - binary_sensor.ting_1_learning_mode
        - binary_sensor.ting_2_learning_mode
      to: "on"
  conditions: []
  actions:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.ting_learning_complete_notified
  mode: single

- id: espresso_morning_maintenance_reminder
  alias: "Espresso — Morning Maintenance Reminder"
  description: Sends the Profitec GO cleaning reminder on the morning ritual cadence or coffee-window homecoming catch-up.
  triggers:
    - trigger: time
      at: "07:00:00"
      id: morning
    - trigger: state
      entity_id: device_tracker.tk_iphone_16_pro
      to: "home"
      id: homecoming
    - trigger: homeassistant
      event: start
      id: startup
    - trigger: event
      event_type: automation_reloaded
      id: automation_reloaded
  conditions:
    - condition: state
      entity_id: input_boolean.espresso_maintenance_enabled
      state: "on"
    - condition: state
      entity_id: binary_sensor.espresso_maintenance_due
      state: "on"
  actions:
    - if:
        - condition: trigger
          id: startup
      then:
        - delay:
            minutes: 2
    - if:
        - condition: trigger
          id: automation_reloaded
      then:
        - delay:
            minutes: 1
    - variables:
        today: "{{ now().strftime('%Y-%m-%d') }}"
        coffee_window: "{{ now().hour >= 6 and now().hour < 12 }}"
        cafiza_due: "{{ is_state('binary_sensor.espresso_cafiza_clean_due', 'on') }}"
        water_due: "{{ is_state('binary_sensor.espresso_water_backflush_due', 'on') }}"
        last_notified: "{{ states('input_datetime.espresso_maintenance_last_notified_at') }}"
        notified_today: >-
          {{ last_notified not in ['unknown', 'unavailable', 'none', '']
             and last_notified[:10] == today }}
        trigger_allowed: >-
          {{ trigger.id == 'morning'
             or (trigger.id in ['homecoming', 'startup', 'automation_reloaded'] and coffee_window | bool) }}
    - condition: state
      entity_id: device_tracker.tk_iphone_16_pro
      state: "home"
    - condition: template
      value_template: "{{ trigger_allowed | bool }}"
    - condition: template
      value_template: "{{ not (notified_today | bool) }}"
    - condition: template
      value_template: "{{ cafiza_due | bool or water_due | bool }}"
    - action: script.espresso_send_maintenance_notification
  mode: single

- id: commute_metro_north_first_weekday_departure
  alias: "Commute — Metro-North First Weekday Departure"
  description: >
    Sends Trevor the first weekday NWP to Grand Central train reminder when he
    leaves home. Only includes trains departing more than 20 minutes later.
  triggers:
    - trigger: state
      entity_id: device_tracker.tk_iphone_16_pro
      from: "home"
  conditions:
    - condition: time
      weekday:
        - mon
        - tue
        - wed
        - thu
        - fri
    - condition: template
      value_template: >-
        {% set today = now().strftime('%Y-%m-%d') %}
        {% set last_notified = states('input_datetime.metro_north_commute_last_notified_at') %}
        {{ last_notified in ['unknown', 'unavailable', 'none', '']
           or last_notified[:10] != today
           or last_notified[11:19] == '00:00:00' }}
    - condition: template
      value_template: >
        {{ trigger.to_state is not none
           and trigger.to_state.state not in ['home', 'unknown', 'unavailable', ''] }}
  actions:
    - action: homeassistant.update_entity
      target:
        entity_id: sensor.metro_north_nwp_to_grand_central
    - delay:
        seconds: 4
    - variables:
        train_message: >-
          {% set message = state_attr('sensor.metro_north_nwp_to_grand_central', 'message') %}
          {{ message if message not in [none, '', 'unknown', 'unavailable'] else 'No Grand Central trains more than 20 minutes out were found.' }}
    - action: script.notify_trevor_phone
      data:
        title: "🚆 NWP to Grand Central"
        message: "{{ train_message }}"
        data:
          group: commute
          tag: metro-north-nwp-gct
          url: /calm-mobile/home
    - action: input_text.set_value
      target:
        entity_id: input_text.metro_north_commute_card_message
      data:
        value: "{{ train_message[:255] }}"
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.metro_north_commute_last_notified_at
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.metro_north_commute_notified_today
  mode: single

- id: commute_reset_metro_north_daily_notification
  alias: "Commute — Reset Metro-North Daily Reminder"
  description: Resets the display latch before the next day; the dated last-notified helper is the durable guard.
  triggers:
    - trigger: time
      at: "03:00:00"
    - trigger: homeassistant
      event: start
    - trigger: event
      event_type: automation_reloaded
  conditions: []
  actions:
    - variables:
        last_notified: "{{ states('input_datetime.metro_north_commute_last_notified_at') }}"
        notified_today: >-
          {% set today = now().strftime('%Y-%m-%d') %}
          {{ last_notified not in ['unknown', 'unavailable', 'none', '']
             and last_notified[:10] == today
             and last_notified[11:19] != '00:00:00' }}
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ notified_today | bool }}"
          sequence:
            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.metro_north_commute_notified_today
      default:
        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.metro_north_commute_notified_today
  mode: single
