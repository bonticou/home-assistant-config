- id: bonticou_llc_de_franchise_tax_reminder
  alias: "Bonticou - DE Franchise Tax Reminder"
  description: Sends bill-ready and due-week reminders until Bonticou - DE franchise tax is marked paid.
  triggers:
    - trigger: time
      at: "09:06:00"
      id: daily
    - trigger: homeassistant
      event: start
      id: startup
    - trigger: event
      event_type: automation_reloaded
      id: automation_reloaded
  conditions:
    - condition: state
      entity_id: input_boolean.business_admin_reminders_enabled
      state: "on"
    - condition: state
      entity_id: binary_sensor.bonticou_llc_de_franchise_tax_due
      state: "on"
  actions:
    - if:
        - condition: trigger
          id: startup
      then:
        - delay:
            minutes: 2
    - variables:
        today: "{{ now().strftime('%Y-%m-%d') }}"
        due: "{{ states('sensor.bonticou_llc_de_franchise_tax_due_date') }}"
        notice_start: >-
          {{ due[:4] ~ '-05-01' if due not in ['unknown', 'unavailable', 'none', ''] else '' }}
        due_week: >-
          {% if due in ['unknown', 'unavailable', 'none', ''] or now().weekday() >= 5 %}
            false
          {% else %}
            {% set due_date = strptime(due, '%Y-%m-%d') %}
            {% set today_date = strptime(today, '%Y-%m-%d') %}
            {% set days = (as_timestamp(due_date) - as_timestamp(today_date)) // 86400 %}
            {% set ns = namespace(business_days=0) %}
            {% for offset in range(1, (days | int) + 1) %}
              {% set day = today_date + timedelta(days=offset) %}
              {% if day.weekday() < 5 %}
                {% set ns.business_days = ns.business_days + 1 %}
              {% endif %}
            {% endfor %}
            {{ days >= 0 and days <= 10 and ns.business_days <= 5 }}
          {% endif %}
        reminder_stage: >-
          {% if due in ['unknown', 'unavailable', 'none', ''] %}
          {% elif today == notice_start %}
            bill_ready
          {% elif (due_week | trim | lower) == 'true' %}
            countdown
          {% endif %}
    - condition: template
      value_template: "{{ reminder_stage | trim != '' }}"
    - action: script.bonticou_llc_de_franchise_tax_send_reminder
      data:
        stage: "{{ reminder_stage | trim }}"
        due_date: "{{ due }}"
  mode: single

