- id: espresso_maintenance_notification_actions
  alias: "Espresso — Notification Actions"
  description: Handles the quick actions from Profitec GO cleaning reminders.
  triggers:
    - trigger: event
      event_type: mobile_app_notification_action
  conditions:
    - condition: template
      value_template: >
        {{ trigger.event.data.action in [
          'ESPRESSO_WATER_BACKFLUSH_DONE',
          'ESPRESSO_CAFIZA_CLEAN_DONE',
          'ESPRESSO_SNOOZE_TOMORROW'
        ] }}
  actions:
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ trigger.event.data.action == 'ESPRESSO_WATER_BACKFLUSH_DONE' }}"
            - condition: state
              entity_id: binary_sensor.espresso_water_backflush_due
              state: "on"
            - condition: state
              entity_id: binary_sensor.espresso_cafiza_clean_due
              state: "off"
          sequence:
            - action: script.espresso_mark_water_backflush_done
              data:
                source: home_assistant_notification_action

        - conditions:
            - condition: template
              value_template: "{{ trigger.event.data.action == 'ESPRESSO_CAFIZA_CLEAN_DONE' }}"
            - condition: state
              entity_id: binary_sensor.espresso_cafiza_clean_due
              state: "on"
          sequence:
            - action: script.espresso_mark_cafiza_clean_done
              data:
                source: home_assistant_notification_action

        - conditions:
            - condition: template
              value_template: "{{ trigger.event.data.action == 'ESPRESSO_SNOOZE_TOMORROW' }}"
            - condition: state
              entity_id: binary_sensor.espresso_maintenance_due
              state: "on"
          sequence:
            - action: script.espresso_snooze_maintenance
              data:
                source: home_assistant_notification_action
  mode: parallel
  max: 10

