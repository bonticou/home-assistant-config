property_tax_send_reminder:
  alias: Property Tax Send Reminder
  description: Sends bill-ready and daily due-week property tax reminders.
  icon: mdi:calendar-cash
  mode: restart
  fields:
    tax_type:
      description: Tax type, either school or town
      example: school
    bill_month:
      description: Numeric billing month
      example: 9
    stage:
      description: Reminder stage, either bill_ready or countdown
      example: countdown
    due_date:
      description: Computed due date for this tax bill
      example: "2026-09-30"
  sequence:
    - variables:
        tax_kind: "{{ tax_type | default('town', true) }}"
        month_number: "{{ bill_month | default(4) | int(4) }}"
        reminder_stage: "{{ stage | default('countdown', true) }}"
        bill_year: "{{ now().year }}"
        bill_date: "{{ '%04d-%02d-01' | format(now().year, month_number | int) }}"
        due: >-
          {% set provided_due = due_date | default('', true) %}
          {% if provided_due not in ['unknown', 'unavailable', 'none', ''] %}
            {{ provided_due }}
          {% else %}
            {% set first_next_month = strptime('%04d-%02d-01' | format(now().year, (month_number | int) + 1), '%Y-%m-%d') %}
            {% set last_day = first_next_month - timedelta(days=1) %}
            {% set weekend_offset = 2 if last_day.weekday() == 6 else 1 if last_day.weekday() == 5 else 0 %}
            {{ (last_day - timedelta(days=weekend_offset)).strftime('%Y-%m-%d') }}
          {% endif %}
        tax_label: "{{ 'School' if tax_kind == 'school' else 'Town' }}"
        school_tax_icon: "\U0001F4DA\U0001F4B8"
        town_tax_icon: "\U0001F3DB\U0001F4B8"
        tax_icon: "{{ school_tax_icon if tax_kind == 'school' else town_tax_icon }}"
        bill_month_label: "{{ strptime(bill_date, '%Y-%m-%d').strftime('%B') }}"
        due_label: "{{ strptime(due | trim, '%Y-%m-%d').strftime('%A, %B %-d') }}"
        days_until: >-
          {{ ((as_timestamp(strptime(due | trim, '%Y-%m-%d')) - as_timestamp(today_at('00:00:00'))) / 86400) | int }}
        business_days_until: >-
          {% set due_date = strptime(due | trim, '%Y-%m-%d') %}
          {% set today_date = today_at('00:00:00').replace(tzinfo=None) %}
          {% set days = ((as_timestamp(due_date) - as_timestamp(today_at('00:00:00'))) / 86400) | int %}
          {% set ns = namespace(business_days=0) %}
          {% for offset in range(1, days + 1) %}
            {% set day = today_date + timedelta(days=offset) %}
            {% if day.weekday() < 5 %}
              {% set ns.business_days = ns.business_days + 1 %}
            {% endif %}
          {% endfor %}
          {{ ns.business_days }}
        notification_tag: "{{ 'property-tax-' ~ tax_kind ~ '-' ~ '%02d' | format(month_number | int) }}"
        paid_action: >-
          {% if tax_kind == 'school' and (month_number | int) == 1 %}
            PROPERTY_TAX_SCHOOL_JAN_PAID
          {% elif tax_kind == 'school' and (month_number | int) == 9 %}
            PROPERTY_TAX_SCHOOL_SEP_PAID
          {% else %}
            PROPERTY_TAX_TOWN_APR_PAID
          {% endif %}
        notification_title: >-
          {% if reminder_stage == 'bill_ready' %}
            {{ tax_icon }} {{ tax_label }} tax bill ready
          {% elif days_until <= 0 %}
            {{ tax_icon }} {{ tax_label }} tax due today
          {% else %}
            {{ tax_icon }} {{ tax_label }} tax due in {{ business_days_until }} business day{{ '' if (business_days_until | int) == 1 else 's' }}
          {% endif %}
        notification_message: >-
          {% if reminder_stage == 'bill_ready' %}
            The {{ tax_label | lower }} tax bill should be available.
            It is due {{ due_label | trim }}, the last business day of {{ bill_month_label }}.
            Pay it or schedule it, then tap Paid.
          {% elif days_until <= 0 %}
            The {{ tax_label | lower }} tax bill is due today.
            Tap Paid once the payment is submitted so Home Assistant stops the reminders and house-manager logs it.
          {% else %}
            The {{ tax_label | lower }} tax bill is due in {{ business_days_until }} business day{{ '' if (business_days_until | int) == 1 else 's' }},
            on {{ due_label | trim }}.
            Tap Paid once the payment is submitted so Home Assistant stops the reminders and house-manager logs it.
          {% endif %}
    - action: script.notify_trevor_phone
      data:
        title: "{{ notification_title | trim }}"
        message: "{{ notification_message | regex_replace('\\s+', ' ') | trim }}"
        data:
          group: property-tax
          tag: "{{ notification_tag }}"
          url: /calm-mobile/home
          actions:
            - action: "{{ paid_action | trim }}"
              title: Paid

property_tax_mark_paid:
  alias: Property Tax Mark Paid
  description: Stamps a property tax bill as paid and sends the payment event to house-manager.
  icon: mdi:cash-check
  mode: restart
  fields:
    tax_type:
      description: Tax type, either school or town
      example: town
    bill_month:
      description: Numeric billing month
      example: 4
    due_date:
      description: Computed due date for this tax bill
      example: "2026-04-30"
  sequence:
    - variables:
        tax_kind: "{{ tax_type | default('town', true) }}"
        month_number: "{{ bill_month | default(4) | int(4) }}"
        paid_now: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
        paid_today: "{{ now().strftime('%Y-%m-%d') }}"
        due: >-
          {% set provided_due = due_date | default('', true) %}
          {% if provided_due not in ['unknown', 'unavailable', 'none', ''] %}
            {{ provided_due }}
          {% else %}
            {% set first_next_month = strptime('%04d-%02d-01' | format(now().year, (month_number | int) + 1), '%Y-%m-%d') %}
            {% set last_day = first_next_month - timedelta(days=1) %}
            {% set weekend_offset = 2 if last_day.weekday() == 6 else 1 if last_day.weekday() == 5 else 0 %}
            {{ (last_day - timedelta(days=weekend_offset)).strftime('%Y-%m-%d') }}
          {% endif %}
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ tax_kind == 'school' and (month_number | int) == 1 }}"
          sequence:
            - action: input_datetime.set_datetime
              target:
                entity_id: input_datetime.school_tax_january_last_paid_at
              data:
                datetime: "{{ paid_now }}"

        - conditions:
            - condition: template
              value_template: "{{ tax_kind == 'school' and (month_number | int) == 9 }}"
          sequence:
            - action: input_datetime.set_datetime
              target:
                entity_id: input_datetime.school_tax_september_last_paid_at
              data:
                datetime: "{{ paid_now }}"
      default:
        - action: input_datetime.set_datetime
          target:
            entity_id: input_datetime.town_tax_last_paid_at
          data:
            datetime: "{{ paid_now }}"
    - action: shell_command.house_manager_log_property_tax_payment
      continue_on_error: true
      data:
        tax_type: "{{ tax_kind }}"
        bill_month: "{{ month_number }}"
        bill_year: "{{ now().year }}"
        due_date: "{{ due | trim }}"
        paid_date: "{{ paid_today }}"
        source: home_assistant_notification_action
    - action: script.property_tax_clear_notification
      data:
        tax_type: "{{ tax_kind }}"
        bill_month: "{{ month_number }}"

property_tax_clear_notification:
  alias: Property Tax Clear Notification
  description: Clears the active property tax reminder notification tag.
  icon: mdi:calendar-check-outline
  mode: restart
  fields:
    tax_type:
      description: Tax type, either school or town
      example: school
    bill_month:
      description: Numeric billing month
      example: 1
  sequence:
    - variables:
        tax_kind: "{{ tax_type | default('town', true) }}"
        month_number: "{{ bill_month | default(4) | int(4) }}"
        notification_tag: "{{ 'property-tax-' ~ tax_kind ~ '-' ~ '%02d' | format(month_number | int) }}"
    - action: script.notify_trevor_phone
      data:
        message: clear_notification
        data:
