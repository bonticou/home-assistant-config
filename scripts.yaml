    - variables:
        active_light_names: >
          {% set light_names = state_attr('sensor.away_security_active_lights', 'names') | default('', true) %}
          {{ (light_names.split('||') if light_names else []) | reject('eq', '') | list }}
    - action: script.notify_trevor_phone
      data:
        title: "💡 Casey left the lights on"
        message: >-
          {% if active_light_names | count == 1 %}
            Casey just left home and {{ active_light_names[0] }} is still on.
          {% elif active_light_names | count == 2 %}
            Casey just left home and {{ active_light_names | join(' and ') }} are still on.
          {% else %}
            Casey just left home and {{ active_light_names | count }} lights are still on.
          {% endif %}
          Tap below to turn them off.
        data:
          tag: casey-left-lights-on
          group: away-security
          sticky: true
          ttl: 0
          priority: high
          actions:
            - action: TURN_OFF_CASEY_LEFT_LIGHTS
              title: Turn off lights

casey_left_lights_clear_alert:
  alias: Casey Left Lights Clear Alert
  description: Clears the contextual Casey-left-lights notification tag.
  icon: mdi:lightbulb-off-outline
  mode: restart
  sequence:
    - action: script.notify_trevor_phone
      data:
        message: clear_notification
        data:
          tag: casey-left-lights-on

entry_camera_send_alert:
  alias: Entry Camera Send Alert
  description: Sends a mobile notification when the front door or mud room Ring doorbells detect motion or are rung.
  icon: mdi:bell-alert-outline
  mode: parallel
  fields:
    zone_name:
      description: Friendly zone name for the camera
      example: Front door
    event_kind:
      description: Type of event to announce
      example: motion
  sequence:
    - action: notify.mobile_app_tk_iphone_16_pro
      data:
        title: >-
          {% set zone = zone_name | default('Entry') %}
          {% set kind = event_kind | default('motion') %}
          {% if kind == 'doorbell' %}
            🔔 {{ zone }} doorbell
          {% else %}
            👀 {{ zone }} motion
          {% endif %}
        message: >-
          {% set zone = zone_name | default('entry') | lower %}
          {% set kind = event_kind | default('motion') %}
          {% if kind == 'doorbell' %}
            Someone rang the {{ zone }} doorbell.
          {% else %}
            Motion detected at the {{ zone }}.
          {% endif %}
        data:
          group: entry-cameras
          tag: >-
            {% set zone = zone_name | default('entry') | lower | replace(' ', '-') %}
            {% set kind = event_kind | default('motion') %}
            entry-{{ zone }}-{{ kind }}
          url: /calm-mobile/home

wine_cave_send_alert:
  alias: Wine Cave Send Alert
  description: Sends a mobile notification for wine cave cycles, anomalies, and recovery with a consistent calm format.
  icon: mdi:glass-wine
  mode: parallel
  fields:
    alert_kind:
      description: Type of wine cave alert to send
      example: cycle
    message:
      description: Notification body text
  sequence:
    - variables:
        kind: "{{ alert_kind | default('status') }}"
        notification_message: "{{ message | default('', true) }}"
    - action: script.notify_trevor_phone
      data:
        title: >-
          {% if kind == 'cycle' %}
            ❄️ Wine cave cooling cycle
          {% elif kind == 'temp_high' %}
            🌡️ Wine cave is running warm
          {% elif kind == 'temp_low' %}
            🧊 Wine cave is running cold
          {% elif kind == 'moisture' %}
            💧 Wine cave moisture looks unusual
          {% elif kind == 'condensation' %}
            💦 Wine cave condensation risk
          {% elif kind == 'drift' %}
            📈 Wine cave drift needs a look
          {% elif kind == 'abrupt' %}
            🚨 Wine cave changed fast
          {% elif kind == 'recovery' %}
            ✅ Wine cave recovered
          {% elif kind == 'sensor_unavailable' %}
            📡 Wine cave sensor unavailable
          {% else %}
            🍷 Wine cave update
          {% endif %}
        message: "{{ notification_message }}"
        data:
          group: wine-cave
          tag: "wine-cave-{{ kind }}"
          url: /calm-mobile/wine

environment_send_alert:
  alias: Environment Send Alert
  description: Sends room and area environment pushes with consistent titles, tags, grouping, and urgency.
  icon: mdi:home-thermometer-outline
  mode: parallel
  fields:
    room:
      description: Human-facing room or area name
      example: Kitchen
    alert_kind:
      description: Environment issue type
      example: temp_high
    message:
      description: Notification body text
    clear:
      description: Clear the matching mobile notification tag
      example: false
  sequence:
    - variables:
        alert_room: "{{ room | default('Environment', true) }}"
        kind: "{{ alert_kind | default('status', true) }}"
        notification_message: "{{ message | default('', true) }}"
        clear_notification: "{{ clear | default(false) }}"
        slug: "{{ alert_room | lower | replace(' ', '-') | replace('/', '-') }}"
        tag: "environment-{{ slug }}-{{ kind }}"
        title_icon: >-
          {% if kind in ['temp_high', 'temp_low'] %}🌡️
          {% elif kind in ['humidity_high', 'humidity_low'] %}💧
          {% elif kind == 'radon_high' %}⚠️
          {% elif kind == 'source_disagreement' %}📍
          {% elif kind == 'sensor_unavailable' %}📡
          {% else %}🏠{% endif %}
        title_issue: >-
          {% if kind == 'temp_high' %}is too warm
          {% elif kind == 'temp_low' %}is too cool
          {% elif kind == 'humidity_high' %}is too humid
          {% elif kind == 'humidity_low' %}is too dry
          {% elif kind == 'radon_high' %}radon is elevated
          {% elif kind == 'source_disagreement' %}readings disagree
          {% elif kind == 'sensor_unavailable' %}sensor unavailable
          {% elif kind == 'recovered' %}recovered
          {% else %}needs a look{% endif %}
        sticky_alert: "{{ kind in ['radon_high', 'sensor_unavailable'] }}"
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ clear_notification | bool }}"
          sequence:
            - action: script.notify_trevor_phone
              data:
                message: clear_notification
                data:
                  tag: "{{ tag }}"
      default:
        - action: script.notify_trevor_phone
          data:
            title: "{{ title_icon }} {{ alert_room }} {{ title_issue }}"
            message: "{{ notification_message }}"
            data:
              group: environment
              tag: "{{ tag }}"
              sticky: "{{ sticky_alert }}"
              ttl: 0
              priority: high
              url: /calm-mobile/climate

basement_humidity_send_alert:
  alias: Basement Humidity Send Alert
  description: Sends Trevor a basement humidity push using the Airthings-backed basement sensor.
  icon: mdi:water-percent-alert
  mode: parallel
  fields:
    alert_kind:
      description: Type of basement humidity alert to send
      example: watch
    message:
      description: Notification body text
  sequence:
    - variables:
        kind: "{{ alert_kind | default('watch') }}"
        notification_message: "{{ message | default('', true) }}"
    - action: script.notify_trevor_phone
      data:
        title: >-
          {% if kind == 'urgent' %}
            🚨 Basement is too humid
          {% else %}
            💧 Basement humidity is creeping up
          {% endif %}
        message: "{{ notification_message }}"
        data:
          group: basement-climate
          tag: basement-humidity
          sticky: "{{ kind == 'urgent' }}"
          ttl: 0
          priority: high
          url: /calm-mobile/climate

basement_humidity_clear_alert:
  alias: Basement Humidity Clear Alert
  description: Clears the active basement humidity notification tag.
  icon: mdi:water-check-outline
  mode: restart
  sequence:
    - action: script.notify_trevor_phone
      data:
        message: clear_notification
        data:
          tag: basement-humidity
