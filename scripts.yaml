spotify_bedtime_fade:
  alias: Spotify Bedtime Fade
  description: Gradually lower Sonos volume over 30 minutes, then pause playback.
  icon: mdi:weather-night
  mode: single
  variables:
    target_players:
      - media_player.kitchen_speakers
      - media_player.family_room
      - media_player.great_room_speakers
      - media_player.unnamed_room_6
      - media_player.wynn_s_room
    steps: 15
    step_minutes: 2
  sequence:
    - repeat:
        count: "{{ steps }}"
        sequence:
          - variables:
              volume_factor: "{{ ((steps - repeat.index) / steps) | float(0) }}"
          - repeat:
              for_each: "{{ target_players }}"
              sequence:
                - if:
                    - condition: template
                      value_template: >
                        {{ states(repeat.item) not in ['unknown', 'unavailable', 'off'] and
                           state_attr(repeat.item, 'volume_level') is not none }}
                  then:
                    - action: media_player.volume_set
                      data:
                        entity_id: "{{ repeat.item }}"
                        volume_level: >
                          {% set current = state_attr(repeat.item, 'volume_level') | float(0) %}
                          {{ [0, [1, current * volume_factor] | min] | max | round(2) }}
          - delay:
              minutes: "{{ step_minutes }}"
    - repeat:
        for_each: "{{ target_players }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ states(repeat.item) not in ['unknown', 'unavailable'] }}"
            then:
              - action: media_player.media_pause
                data:
                  entity_id: "{{ repeat.item }}"

light_transition_toggle:
  alias: Light Transition Toggle
  description: Toggle a light with explicit turn_on/turn_off transition timing.
  icon: mdi:lightbulb-auto-outline
  mode: parallel
  fields:
    light_entity:
      description: Light entity to toggle
      example: light.kitchen
    transition_seconds:
      description: Transition duration in seconds
      example: 3
  sequence:
    - variables:
        target_light: "{{ light_entity }}"
        transition: "{{ transition_seconds | default(3) | float(3) }}"
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ is_state(target_light, 'on') }}"
          sequence:
            - action: light.turn_off
              data:
                entity_id: "{{ target_light }}"
                transition: "{{ transition }}"
      default:
        - action: light.turn_on
          data:
            entity_id: "{{ target_light }}"
            transition: "{{ transition }}"

foyer_chandelier_curved_transition:
  alias: Foyer Chandelier Linear Transition
  description: Fade the foyer chandelier with a straight linear ramp using raw brightness steps for smoother sub-percent dimming.
  icon: mdi:chandelier
  mode: restart
  max_exceeded: silent
  fields:
    target_state:
      description: on, off, or toggle
      example: toggle
    brightness_pct:
      description: Target brightness when fading on
      example: 33
    duration_seconds:
      description: Total fade duration in seconds
      example: 12
  sequence:
    - variables:
        chandelier: light.front_foyer_chandelier
        requested_state: "{{ target_state | default('toggle') }}"
        last_known_brightness: "{{ state_attr(chandelier, 'brightness') | int(0) }}"
        duration: "{{ duration_seconds | default(12) | float(12) }}"
        resolved_state: >
          {% if requested_state == 'toggle' %}
            {{ 'off' if is_state(chandelier, 'on') else 'on' }}
          {% else %}
            {{ requested_state }}
          {% endif %}
        target_pct: >
          {% set requested = brightness_pct | default(none) %}
          {% if requested is not none %}
            {{ [0.5, [100, requested | float(100)] | min] | max }}
          {% elif last_known_brightness > 0 %}
            {{ (((last_known_brightness / 255) * 100) | round(1)) }}
          {% else %}
            100
          {% endif %}
        target_brightness: >
          {{ [1, [255, ((target_pct | float(100) / 100) * 255) | round(0)] | min] | max | int }}
        start_brightness: >
          {% if is_state(chandelier, 'on') %}
            {{ [1, last_known_brightness] | max }}
          {% else %}
            1
          {% endif %}
        step_direction: >
          {{ 1 if target_brightness >= start_brightness else -1 }}
        step_total: >
          {% if resolved_state == 'on' %}
            {{ (target_brightness - start_brightness) | abs }}
          {% else %}
            {{ [0, (start_brightness - 1)] | max }}
          {% endif %}
        step_delay_ms: >
          {% if step_total | int(0) > 0 %}
            {{ [15, (((duration * 1000) / (step_total | float(1))) | round(0) | int)] | max }}
          {% else %}
            0
          {% endif %}
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ resolved_state == 'on' }}"
          sequence:
            - if:
                - condition: template
                  value_template: "{{ not is_state(chandelier, 'on') }}"
              then:
                - action: light.turn_on
                  data:
                    entity_id: "{{ chandelier }}"
                    brightness: 1
            - if:
                - condition: template
                  value_template: "{{ step_total | int(0) > 0 }}"
              then:
                - repeat:
                    count: "{{ step_total }}"
                    sequence:
                      - action: light.turn_on
                        data:
                          entity_id: "{{ chandelier }}"
                          brightness: "{{ start_brightness + (repeat.index * step_direction) }}"
                      - delay:
                          milliseconds: "{{ step_delay_ms }}"
            - if:
                - condition: template
                  value_template: "{{ not is_state(chandelier, 'on') or (state_attr(chandelier, 'brightness') | int(0)) != (target_brightness | int(0)) }}"
              then:
                - action: light.turn_on
                  data:
                    entity_id: "{{ chandelier }}"
                    brightness: "{{ target_brightness }}"
      default:
        - if:
            - condition: template
              value_template: "{{ is_state(chandelier, 'on') }}"
          then:
            - if:
                - condition: template
                  value_template: "{{ step_total | int(0) > 0 }}"
              then:
                - repeat:
                    count: "{{ step_total }}"
                    sequence:
                      - action: light.turn_on
                        data:
                          entity_id: "{{ chandelier }}"
                          brightness: "{{ start_brightness - repeat.index }}"
                      - delay:
                          milliseconds: "{{ step_delay_ms }}"
        - action: light.turn_off
          data:
            entity_id: "{{ chandelier }}"

foyer_chandelier_toggle:
  alias: Foyer Chandelier Toggle
  description: Toggle the foyer chandelier using its slow linear dim profile.
  icon: mdi:chandelier
  mode: restart
  sequence:
    - action: script.foyer_chandelier_curved_transition
      data:
        target_state: toggle

common_areas_transition_toggle:
  alias: Common Areas Transition Toggle
  description: Toggle the common area lights while letting the foyer chandelier use its bespoke fade.
  icon: mdi:home-lightbulb-outline
  mode: restart
  sequence:
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ is_state('light.interior_test', 'on') }}"
          sequence:
            - action: light.turn_off
              data:
                entity_id:
                  - light.front_foyer_ceiling_lights
                  - light.stairs_front_stairs
                  - light.back_stairs_back_stairs
                  - light.upstairs_hallway_main_lights
                  - light.vestibule_main_lights
                  - light.mudroom_main_lights
                  - light.mudroom_nook_lights
                  - light.back_patio_light
                transition: 3
            - action: script.turn_on
              target:
                entity_id: script.foyer_chandelier_curved_transition
              data:
                variables:
                  target_state: off
                  duration_seconds: 12
      default:
        - action: light.turn_on
          data:
            entity_id:
              - light.front_foyer_ceiling_lights
              - light.stairs_front_stairs
              - light.back_stairs_back_stairs
              - light.upstairs_hallway_main_lights
              - light.vestibule_main_lights
              - light.mudroom_main_lights
              - light.mudroom_nook_lights
              - light.back_patio_light
            transition: 3
        - action: script.turn_on
          target:
            entity_id: script.foyer_chandelier_curved_transition
          data:
            variables:
              target_state: on
              duration_seconds: 12

lights_evening_scene:
  alias: Lights Evening Scene
  description: Set the common evening lights and Mudroom interior lights to a calm 10 percent level, keep the kitchen island bright, leave Wynn's room and exterior utility lights alone, turn on the great room uplights, and softly bring the chandelier up to 10 percent only if it happens to be off.
  icon: mdi:weather-sunset
  mode: single
  sequence:
    - action: input_select.select_option
      target:
        entity_id: input_select.lighting_active_scene
      data:
        option: Evening
    - action: input_boolean.turn_off
      target:
        entity_id:
          - input_boolean.foyer_chandelier_sleep_hold
          - input_boolean.front_stairs_sleep_override
    - variables:
        front_stairs_target_pct: "{{ [10, states('sensor.front_stairs_schedule_brightness') | int(0)] | max }}"
        front_stairs_current_pct: >-
          {% if is_state('light.stairs_front_stairs', 'on') %}
            {{ (((state_attr('light.stairs_front_stairs', 'brightness') | int(0)) / 255) * 100) | round(0) | int }}
          {% else %}
            0
          {% endif %}
    - if:
        - condition: state
          entity_id: light.front_foyer_chandelier
          state: "off"
      then:
        - action: light.turn_on
          data:
            entity_id: light.front_foyer_chandelier
            brightness_pct: 10
            transition: 8
    - action: light.turn_on
      data:
        entity_id:
          - light.family_room_main_lights_1
          - light.family_room_main_lights_2
          - light.family_room_main_lights_3
        brightness_pct: 10
        transition: 1
    - action: light.turn_on
      data:
        entity_id: light.kitchen_island
        brightness_pct: 100
        transition: 3
    - action: light.turn_on
      data:
        entity_id:
          - light.front_foyer_ceiling_lights
          - light.back_stairs_back_stairs
          - light.upstairs_hallway_main_lights
          - light.vestibule_main_lights
          - light.kitchen_main
          - light.kitchen_table_lights
          - light.kitchen_sink_light
          - light.kitchen_coffee_bar
          - light.mudroom_main_lights
          - light.mudroom_nook_lights
          - light.back_patio_light
        brightness_pct: 10
        transition: 3
    - action: switch.turn_on
      data:
        entity_id: switch.great_room_uplights
    - if:
        - condition: template
          value_template: "{{ front_stairs_target_pct > 0 and front_stairs_current_pct < front_stairs_target_pct }}"
      then:
        - action: light.turn_on
          data:
            entity_id: light.stairs_front_stairs
            brightness_pct: "{{ front_stairs_target_pct }}"
            transition: 10

family_room_tv_mode_on:
  alias: Family Room TV Mode On
  description: Wake the family room Frame TV and Apple TV, then force the Frame TV to the Apple TV HDMI input, retrying once so TV mode can break out of Art Mode or a stale app state.
  icon: mdi:television-play
  mode: restart
  sequence:
    - alias: Define the family room TV entities and Apple TV input
      variables:
        frame_tv_entity: media_player.family_room_frame_tv
        frame_tv_remote_entity: remote.family_room_frame_tv
        app_tv_entity: media_player.family_room_tv_2
        app_tv_remote_entity: remote.family_room_tv
        target_input: HDMI
        needs_wake: >-
          {% set combined = (
              (state_attr(app_tv_entity, 'app_name') | default('', true))
              ~ ' '
              ~ (state_attr(app_tv_entity, 'source') | default('', true))
              ~ ' '
              ~ (state_attr(frame_tv_entity, 'source') | default('', true))
            ) | lower %}
          {{ states(frame_tv_entity) in ['off', 'standby', 'idle', 'unknown', 'unavailable']
             or states(app_tv_entity) in ['off', 'standby', 'idle']
             or 'art mode' in combined
             or 'ambient mode' in combined }}
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ needs_wake }}"
          sequence:
            - alias: Wake the Frame TV when it looks off, idle, or in Art Mode
              action: media_player.turn_on
              data:
                entity_id: "{{ frame_tv_entity }}"
            - alias: Wake the Apple TV with its remote wakeup command
              continue_on_error: true
              action: remote.send_command
              target:
                entity_id: "{{ app_tv_remote_entity }}"
              data:
                command: wakeup
            - alias: Wait briefly for the Frame TV to become controllable
              wait_template: >-
                {% set combined = (
                    (state_attr(app_tv_entity, 'app_name') | default('', true))
                    ~ ' '
                    ~ (state_attr(app_tv_entity, 'source') | default('', true))
                    ~ ' '
                    ~ (state_attr(frame_tv_entity, 'source') | default('', true))
                  ) | lower %}
                {{ states(frame_tv_entity) not in ['off', 'standby', 'unknown', 'unavailable']
                   and 'art mode' not in combined
                   and 'ambient mode' not in combined }}
              timeout:
                seconds: 8
              continue_on_timeout: true
    - alias: Switch the Frame TV to the Apple TV HDMI input
      action: media_player.select_source
      data:
        entity_id: "{{ frame_tv_entity }}"
        source: "{{ target_input }}"
    - alias: Nudge the Samsung remote directly to HDMI
      continue_on_error: true
      action: remote.send_command
      target:
        entity_id: "{{ frame_tv_remote_entity }}"
      data:
        command: KEY_HDMI
    - alias: Let the TV settle before retrying HDMI
      delay:
        seconds: 2
    - alias: Retry the Apple TV HDMI input in case the TV was still waking up
      action: media_player.select_source
      data:
        entity_id: "{{ frame_tv_entity }}"
        source: "{{ target_input }}"
    - alias: Reassert HDMI with the Samsung remote after wakeup
      continue_on_error: true
      action: remote.send_command
      target:
        entity_id: "{{ frame_tv_remote_entity }}"
      data:
        command: KEY_HDMI

lights_tv_scene:
  alias: Lights TV Scene
  description: Set the foyer ceiling and family room main lights for TV time, route the family room TV to Apple TV, then settle the chandelier to a soft 5 percent glow.
  icon: mdi:television
  mode: single
  sequence:
    - action: input_select.select_option
      target:
        entity_id: input_select.lighting_active_scene
      data:
        option: TV
    - action: input_boolean.turn_off
      target:
        entity_id:
          - input_boolean.foyer_chandelier_sleep_hold
          - input_boolean.front_stairs_sleep_override
    - variables:
        front_stairs_target_pct: "{{ states('sensor.front_stairs_schedule_brightness') | int(0) }}"
        front_stairs_current_pct: >-
          {% if is_state('light.stairs_front_stairs', 'on') %}
            {{ (((state_attr('light.stairs_front_stairs', 'brightness') | int(0)) / 255) * 100) | round(0) | int }}
          {% else %}
            0
          {% endif %}
    - parallel:
        - sequence:
            - action: light.turn_off
              data:
                entity_id: light.front_foyer_ceiling_lights
                transition: 2
            - action: light.turn_off
              data:
                entity_id:
                  - light.family_room_main_lights_1
                  - light.family_room_main_lights_2
                  - light.family_room_main_lights_3
                transition: 1
        - sequence:
            - alias: Wake the family room TV and route it to Apple TV
              action: script.family_room_tv_mode_on
    - if:
        - condition: template
          value_template: "{{ front_stairs_target_pct > 0 and front_stairs_current_pct < front_stairs_target_pct }}"
      then:
        - action: light.turn_on
          data:
            entity_id: light.stairs_front_stairs
            brightness_pct: "{{ front_stairs_target_pct }}"
            transition: 10
    - delay:
        seconds: 3
    - choose:
        - conditions:
            - condition: state
              entity_id: light.front_foyer_chandelier
              state: "on"
          sequence:
            - action: light.turn_on
              data:
                entity_id: light.front_foyer_chandelier
                brightness_pct: 5
                transition: 5
      default:
        - action: light.turn_on
          data:
            entity_id: light.front_foyer_chandelier
            brightness_pct: 5
            transition: 10

lights_all_off_scene:
  alias: Lights All Off Scene
  description: Turn off house lights and stray exterior lights, while preserving Wynn's room, the main stair light, and the front door lights.
  icon: mdi:lightbulb-off-outline
  mode: single
  sequence:
    - action: input_select.select_option
      target:
        entity_id: input_select.lighting_active_scene
      data:
        option: All off
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ is_state('binary_sensor.front_stairs_schedule_active', 'on')
                   or is_state('binary_sensor.door_lights_schedule_active', 'on') }}
          sequence:
            - action: input_boolean.turn_on
              target:
                entity_id:
                  - input_boolean.foyer_chandelier_sleep_hold
                  - input_boolean.front_stairs_sleep_override
      default:
        - action: input_boolean.turn_off
          target:
            entity_id:
              - input_boolean.foyer_chandelier_sleep_hold
              - input_boolean.front_stairs_sleep_override
    - action: light.turn_off
      data:
        entity_id:
          - light.front_foyer_ceiling_lights
          - light.family_room_main_lights_1
          - light.family_room_main_lights_2
          - light.family_room_main_lights_3
          - light.back_stairs_back_stairs
          - light.upstairs_hallway_main_lights
          - light.vestibule_main_lights
          - light.kitchen_main
          - light.kitchen_island
          - light.kitchen_table_lights
          - light.kitchen_sink_light
          - light.kitchen_coffee_bar
          - light.mudroom_main_lights
          - light.mudroom_nook_lights
          - light.back_patio_light
          - light.deck_deck_lights
          - light.exterior_deck_lights
          - light.exterior_yard_lights
          - light.ratgdo32_4536e8_light
          - light.ratgdo32disco_c26634_light
          - light.master_casey_s_closet
        transition: 3
    - variables:
        master_sconces_sleep_fade_down: >-
          {% set left_on = is_state('light.master_bedroom_sconce_l', 'on') %}
          {% set right_on = is_state('light.master_bedroom_sconce_r', 'on') %}
          {% set left_pct = ((state_attr('light.master_bedroom_sconce_l', 'brightness') | int(0) / 255) * 100) | round(0) | int %}
          {% set right_pct = ((state_attr('light.master_bedroom_sconce_r', 'brightness') | int(0) / 255) * 100) | round(0) | int %}
          {{ left_on and right_on and (([left_pct, right_pct] | max) > 30) }}
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ master_sconces_sleep_fade_down }}"
          sequence:
            - action: light.turn_on
              target:
                entity_id:
                  - light.master_bedroom_sconce_l
                  - light.master_bedroom_sconce_r
              data:
                brightness_pct: 30
                transition: 3
            - delay:
                seconds: 4
            - action: light.turn_off
              target:
                entity_id:
                  - light.master_bedroom_sconce_l
                  - light.master_bedroom_sconce_r
      default:
        - action: light.turn_off
          target:
            entity_id:
              - light.master_bedroom_sconce_l
              - light.master_bedroom_sconce_r
    - action: switch.turn_off
      data:
        entity_id:
          - switch.great_room_uplights
          - switch.garage_garage_lights
          - switch.exterior_mud_room_stairs
    - action: script.turn_on
      target:
        entity_id: script.foyer_chandelier_curved_transition
      data:
        variables:
          target_state: off
          duration_seconds: 12
    - if:
        - condition: state
          entity_id: binary_sensor.front_stairs_schedule_active
          state: "on"
      then:
        - action: script.front_stairs_schedule_on
    - if:
        - condition: state
          entity_id: binary_sensor.door_lights_schedule_active
          state: "on"
      then:
        - action: script.door_lights_schedule_on

