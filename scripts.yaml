entry_security_lock_mudroom_door:
  alias: Entry Security Lock Mudroom Door
  description: Locks the mudroom door from an explicit notification action.
  icon: mdi:door-closed-lock
  mode: restart
  sequence:
    - choose:
        - conditions:
            - condition: state
              entity_id: lock.mudroom_door_lock
              state: "locked"
          sequence:
            - action: script.entry_security_clear_alerts
        - conditions:
            - condition: state
              entity_id: lock.mudroom_door_lock
              state: "unlocked"
          sequence:
            - action: lock.lock
              target:
                entity_id: lock.mudroom_door_lock
            - wait_template: "{{ is_state('lock.mudroom_door_lock', 'locked') }}"
              timeout: "00:00:25"
              continue_on_timeout: true
            - if:
                - condition: state
                  entity_id: lock.mudroom_door_lock
                  state: "locked"
              then:
                - action: script.entry_security_clear_alerts
              else:
                - action: script.notify_trevor_phone
                  data:
                    title: "🔐 Mudroom did not lock"
                    message: >-
                      Home Assistant sent the lock command, but the mudroom door
                      still reports {{ states('lock.mudroom_door_lock') }}.
                      I’ll keep checking until it locks.
                    data:
                      tag: mudroom-unlocked-at-night
                      group: entry-security
                      sticky: true
                      ttl: 0
                      priority: high
                      url: /calm-mobile/home
                      actions:
                        - action: URI
                          title: Open Protect
                          uri: unifi-protect://
                        - action: LOCK_MUDROOM_NIGHT_SECURITY
                          title: Try locking again
                        - action: SNOOZE_ENTRY_SECURITY_30
                          title: Sleep 30 min

