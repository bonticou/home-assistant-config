    - if:
        - condition: state
          entity_id: lock.garage_entry_lock
          state: "unlocked"
      then:
        - action: lock.lock
          target:
            entity_id: lock.garage_entry_lock
    - if:
        - condition: state
          entity_id: lock.mudroom_door_lock
          state: "unlocked"
      then:
        - action: lock.lock
          target:
            entity_id: lock.mudroom_door_lock

away_security_close_garage_door:
  alias: Away Security Close Garage Door
  description: Closes the ratgdo garage door only from an explicit user action when the garage path is clear.
  icon: mdi:garage-arrow-down
  mode: restart
  sequence:
    - variables:
        garage_cover: cover.ratgdo32disco_c26634_door
        close_hazard_active: "{{ is_state('binary_sensor.garage_close_hazard_active', 'on') }}"
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ states(garage_cover) == 'closed' }}"
          sequence:
            - action: script.garage_security_clear_alerts
        - conditions:
            - condition: template
              value_template: "{{ close_hazard_active }}"
          sequence:
            - stop: Garage close blocked because garage motion or obstruction is active.
        - conditions:
            - condition: template
              value_template: "{{ states(garage_cover) not in ['closed', 'unknown', 'unavailable', ''] }}"
          sequence:
            - if:
                - condition: template
                  value_template: "{{ states(garage_cover) != 'closing' }}"
              then:
                - action: cover.close_cover
                  target:
                    entity_id: cover.ratgdo32disco_c26634_door
            - wait_template: "{{ is_state(garage_cover, 'closed') }}"
              timeout: "00:01:00"
              continue_on_timeout: true
            - variables:
                trevor_away: "{{ states('device_tracker.tk_iphone_16_pro') not in ['home', 'unknown', 'unavailable', ''] }}"
                casey_away: "{{ states('device_tracker.unifi_default_42_15_78_4a_d9_f8') not in ['home', 'unknown', 'unavailable', ''] }}"
            - if:
                - condition: template
                  value_template: "{{ is_state(garage_cover, 'closed') }}"
              then:
                - action: script.garage_security_clear_alerts
              else:
                - action: script.notify_trevor_phone
                  data:
                    title: "🚗 Garage did not close"
                    message: >-
                      Home Assistant sent the close command, but the garage door reports
                      {{ states(garage_cover) }}.
                      {% if trevor_away | bool and casey_away | bool %}
                        Casey and Trevor are away, and Home Assistant still sees {{ states('sensor.away_security_issue_summary') }}.
                      {% else %}
                        Home Assistant will keep watching ratgdo until the door reports closed.
                      {% endif %}
                    data:
                      tag: garage-did-not-close
                      group: garage-security
                      sticky: true
                      ttl: 0
                      priority: high
                      url: /calm-mobile/home
                      actions:
                        - action: URI
                          title: Open Protect
                          uri: unifi-protect://
                        - action: CLOSE_GARAGE_SECURITY
                          title: Try closing again
                        - action: SNOOZE_GARAGE_SECURITY_30
                          title: Sleep 30 min

garage_security_clear_alerts:
  alias: Garage Security Clear Alerts
  description: Clears active garage-security notification tags.
  icon: mdi:garage-check-variant
  mode: parallel
  sequence:
    - repeat:
        for_each:
          - garage-open-too-long
          - garage-open-at-night
          - garage-opened-overnight
          - garage-open-trevor-away
          - garage-open-casey-away
          - garage-did-not-close
          - garage-obstruction
        sequence:
          - action: script.notify_trevor_phone
            data:
              message: clear_notification
              data:
                tag: "{{ repeat.item }}"

garage_security_snooze_30:
  alias: Garage Security Snooze 30 Minutes
  description: Pauses garage-security reminders for 30 minutes.
  icon: mdi:garage-clock
  mode: restart
  sequence:
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.garage_security_snooze_until
      data:
        datetime: "{{ (now() + timedelta(minutes=30)).strftime('%Y-%m-%d %H:%M:%S') }}"
    - action: script.garage_security_clear_alerts
    - action: script.notify_trevor_phone
      data:
        title: "🚗 Garage reminders sleeping"
        message: Garage reminders paused for 30 minutes.
        data:
