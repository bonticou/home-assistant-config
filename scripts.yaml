water_send_alert:
  alias: Water Send Alert
  description: Sends water alerts with consistent titles, tags, grouping, and urgency.
  icon: mdi:water-alert
  mode: parallel
  fields:
    alert_kind:
      description: Type of water alert to send
      example: low_pressure
    message:
      description: Notification body text
    severity:
      description: Optional severity override
      example: critical
  sequence:
    - variables:
        kind: "{{ alert_kind | default('status') }}"
        notification_message: "{{ message | default('', true) }}"
        alert_label: >-
          {% if kind == 'overnight_flow' %}
            Overnight flow
          {% elif kind == 'sustained_flow' %}
            Sustained flow
          {% elif kind == 'burst_day' %}
            Daytime burst
          {% elif kind == 'burst_night' %}
            Overnight burst
          {% elif kind == 'pressure_drop' %}
            Pressure drop
          {% elif kind == 'low_pressure' %}
            Low pressure
          {% elif kind == 'low_pressure_persistent' %}
            Low pressure
          {% elif kind == 'low_pressure_very_low' %}
            Very low pressure
          {% elif kind == 'low_pressure_urgent' %}
            Very low pressure
          {% elif kind == 'high_pressure' %}
            High pressure
          {% elif kind == 'usage_high' %}
            High usage
          {% elif kind == 'leak' %}
            Leak detected
          {% elif kind == 'valve_closed' %}
            Valve closed
          {% elif kind == 'flo_system' %}
            Flo system alert
          {% elif kind == 'irrigation_started' %}
            Irrigation started
          {% elif kind == 'irrigation_finished' %}
            Irrigation finished
          {% elif kind == 'irrigation_pressure_collapse' %}
            Shared well pressure low
          {% elif kind == 'irrigation_recovery_slow' %}
            Irrigation recovery slow
          {% elif kind == 'irrigation_recovery_failed' %}
            Irrigation recovery failed
          {% elif kind == 'irrigation_zone_ran_too_long' %}
            Irrigation zone ran too long
          {% elif kind == 'irrigation_valve_mismatch' %}
            Irrigation valve mismatch
          {% elif kind == 'irrigation_multiple_zones' %}
            Multiple irrigation zones
          {% elif kind == 'irrigation_scheduled_not_started' %}
            Scheduled irrigation did not start
          {% elif kind == 'irrigation_controller_offline' %}
            Hydrawise offline
          {% elif kind == 'irrigation_controller_offline_during_watering' %}
            Hydrawise offline during watering
          {% else %}
            Water update
          {% endif %}
        expected_action: >-
          {{ 'WATER_LOW_PRESSURE_EXPECTED'
             if kind in ['low_pressure', 'low_pressure_persistent']
             else 'WATER_OVERNIGHT_FLOW_EXPECTED'
             if kind == 'overnight_flow'
             else 'WATER_SUSTAINED_FLOW_EXPECTED' }}
        resolved_severity: >-
          {% if severity is defined and severity | default('', true) != '' %}
            {{ severity }}
          {% elif kind in [
            'burst_day',
            'burst_night',
            'leak',
            'valve_closed',
            'low_pressure_urgent',
            'irrigation_pressure_collapse',
            'irrigation_recovery_failed',
            'irrigation_zone_ran_too_long',
            'irrigation_valve_mismatch',
            'irrigation_multiple_zones'
          ] %}
            critical
          {% elif kind in ['irrigation_started', 'irrigation_finished'] %}
            info
          {% else %}
            warning
          {% endif %}
        notification_title: >-
          {% if kind == 'overnight_flow' %}
            🌙 Water running overnight?
          {% elif kind == 'sustained_flow' %}
            🚰 Water still running?
          {% elif kind == 'burst_day' %}
            🚨 Very high water flow
          {% elif kind == 'burst_night' %}
            🚨 Water burst overnight
          {% elif kind == 'pressure_drop' %}
            📉 Sudden water pressure drop
          {% elif kind == 'low_pressure' %}
            🚿 Low water pressure?
          {% elif kind == 'low_pressure_persistent' %}
            🚿 Low pressure still active
          {% elif kind == 'low_pressure_very_low' %}
            ⚠️ Very low water pressure
          {% elif kind == 'low_pressure_urgent' %}
            🚨 Very low pressure still active
          {% elif kind == 'high_pressure' %}
            📈 High water pressure
          {% elif kind == 'usage_high' %}
            💧 High water usage today
          {% elif kind == 'leak' %}
            💦 Leak detected
          {% elif kind == 'valve_closed' %}
            🛑 Water shutoff valve closed
          {% elif kind == 'flo_system' %}
            ⚠️ Flo system alert
          {% elif kind == 'irrigation_started' %}
            💦 Sprinklers started
          {% elif kind == 'irrigation_finished' %}
            ✅ Sprinklers finished
          {% elif kind == 'irrigation_pressure_collapse' %}
            🚨 Shared well pressure low
          {% elif kind == 'irrigation_recovery_slow' %}
            ⚠️ Well recovery is slow
          {% elif kind == 'irrigation_recovery_failed' %}
            🚨 Well did not recover
          {% elif kind == 'irrigation_zone_ran_too_long' %}
            🚨 Irrigation zone ran too long
          {% elif kind == 'irrigation_valve_mismatch' %}
            🚨 Irrigation valve state mismatch
          {% elif kind == 'irrigation_multiple_zones' %}
            🚨 Multiple irrigation zones active
          {% elif kind == 'irrigation_scheduled_not_started' %}
            ⚠️ Scheduled watering did not start
          {% elif kind == 'irrigation_controller_offline' %}
            ⚠️ Hydrawise offline before watering
          {% elif kind == 'irrigation_controller_offline_during_watering' %}
            ⚠️ Hydrawise offline during watering
          {% else %}
            💧 Water update
          {% endif %}
        event_at: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
        event_domain: >-
          {% if kind in ['overnight_flow', 'sustained_flow', 'burst_day', 'burst_night'] %}
            flow
          {% elif kind in ['pressure_drop', 'low_pressure', 'low_pressure_persistent', 'low_pressure_very_low', 'low_pressure_urgent', 'high_pressure'] %}
            pressure
          {% elif kind == 'leak' %}
            leak
          {% elif kind in ['valve_closed', 'flo_system'] %}
            valve
          {% elif kind == 'usage_high' %}
            usage
          {% elif kind[:11] == 'irrigation_' %}
            irrigation
          {% else %}
            water
          {% endif %}
        current_flow: "{{ states('sensor.flo_shutoff_water_flow_rate') | float(0) | round(2) }}"
        current_pressure: "{{ states('sensor.flo_shutoff_water_pressure') | float(0) | round(0) }}"
        current_usage: "{{ states('sensor.flo_shutoff_today_s_water_usage') | float(0) | round(0) }}"
        valve_label: "{{ 'closed' if is_state('switch.flo_shutoff_shutoff_valve', 'off') else 'open' }}"
        leak_zones: >-
          {% set zones = expand([
            'binary_sensor.kitchen_sink_leak_detection_water_detected',
            'binary_sensor.island_sink_leak_detection_water_detected',
            'binary_sensor.dishwasher_leak_detection_water_detected',
            'binary_sensor.kitchen_fridge_leak_detection_water_detected',
            'binary_sensor.washing_machine_leak_detection_water_detected',
            'binary_sensor.laundry_sink_leak_detection_water_detected',
            'binary_sensor.mechanical_room_leak_detection_water_detected',
            'binary_sensor.electrical_room_leak_detection_water_detected',
            'binary_sensor.basement_ejector_leak_detection_water_detected'
          ]) | selectattr('state', 'eq', 'on') | map(attribute='name') | list %}
          {{ zones | join(', ') if zones else 'No leak sensors active' }}
        event_note: >-
          {% set domain = event_domain | trim %}
          {% if domain == 'flow' %}
            Flow {{ current_flow }} gal/min with pressure at {{ current_pressure }} psi.
            {% if kind == 'overnight_flow' %}Sustained quiet overnight flow for 10+ minutes.
            {% elif kind == 'sustained_flow' %}Sustained daytime flow for 20+ minutes.
            {% elif kind == 'burst_day' %}Daytime burst above the high-flow threshold.
            {% else %}Overnight burst above the high-flow threshold.{% endif %}
          {% elif domain == 'pressure' %}
            Pressure {{ current_pressure }} psi with flow at {{ current_flow }} gal/min.
            {% if kind == 'high_pressure' %}Above the high-pressure threshold.
            {% elif kind == 'low_pressure_urgent' %}Very low pressure persisted for 20+ minutes.
            {% elif kind == 'low_pressure_very_low' %}Very low pressure persisted for 10+ minutes.
            {% elif kind == 'low_pressure_persistent' %}Low pressure persisted for 30+ minutes.
            {% else %}Low pressure persisted for 10+ minutes.{% endif %}
          {% elif domain == 'leak' %}
            {{ leak_zones }}. Valve is {{ valve_label }}; flow {{ current_flow }} gal/min.
          {% elif domain == 'valve' %}
            Valve is {{ valve_label }}; flow {{ current_flow }} gal/min and pressure {{ current_pressure }} psi.
          {% elif domain == 'usage' %}
            {{ current_usage }} gal used today at alert time; current flow {{ current_flow }} gal/min.
          {% elif domain == 'irrigation' %}
            {{ notification_message | regex_replace('\s+', ' ') | trim }}
          {% else %}
            {{ notification_message | regex_replace('\s+', ' ') | trim }}
          {% endif %}
    - action: input_text.set_value
      target:
        entity_id: input_text.water_latest_alert_kind
      data:
        value: "{{ kind }}"
    - action: input_text.set_value
      target:
        entity_id: input_text.water_latest_alert_label
      data:
        value: "{{ alert_label | trim }}"
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.water_latest_alert_at
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
    - event: water_alert_recorded
      event_data:
        at: "{{ event_at }}"
        domain: "{{ event_domain | trim }}"
        kind: "{{ kind }}"
        label: "{{ alert_label | trim }}"
        severity: "{{ resolved_severity | trim }}"
        note: "{{ event_note | regex_replace('\\s+', ' ') | trim }}"
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ kind in ['overnight_flow', 'sustained_flow', 'burst_day', 'burst_night'] }}"
          sequence:
            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.water_flow_alert_active
        - conditions:
            - condition: template
              value_template: "{{ kind in ['pressure_drop', 'low_pressure', 'low_pressure_persistent', 'low_pressure_very_low', 'low_pressure_urgent', 'high_pressure'] }}"
          sequence:
            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.water_pressure_alert_active
        - conditions:
            - condition: template
              value_template: "{{ kind == 'usage_high' }}"
          sequence:
            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.water_usage_alert_active
        - conditions:
            - condition: template
              value_template: "{{ kind == 'leak' }}"
          sequence:
            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.water_leak_alert_active
        - conditions:
            - condition: template
              value_template: "{{ kind in ['valve_closed', 'flo_system'] }}"
          sequence:
            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.water_valve_alert_active
        - conditions:
            - condition: template
              value_template: >-
                {{ kind in [
                  'irrigation_pressure_collapse',
                  'irrigation_recovery_slow',
                  'irrigation_recovery_failed',
                  'irrigation_zone_ran_too_long',
                  'irrigation_valve_mismatch',
                  'irrigation_multiple_zones',
                  'irrigation_controller_offline',
                  'irrigation_controller_offline_during_watering'
                ] }}
          sequence:
            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.water_irrigation_alert_active
            - action: input_text.set_value
              target:
                entity_id: input_text.irrigation_active_alert_kind
              data:
                value: "{{ kind }}"
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ kind == 'leak' }}"
          sequence:
            - action: script.notify_trevor_phone
              data:
                title: "{{ notification_title }}"
                message: "{{ notification_message }}"
                data:
                  group: water
                  tag: "water-{{ kind }}"
                  url: /calm-mobile/water
                  sticky: true
                  ttl: 0
                  priority: high
                  critical: true
                  push:
                    sound:
                      name: default
                      critical: 1
                      volume: 1.0
        - conditions:
            - condition: template
              value_template: >-
                {{ kind in [
                  'irrigation_pressure_collapse',
                  'irrigation_recovery_failed',
                  'irrigation_zone_ran_too_long',
                  'irrigation_valve_mismatch',
                  'irrigation_multiple_zones'
                ] }}
          sequence:
            - action: script.notify_trevor_phone
              data:
                title: "{{ notification_title }}"
                message: "{{ notification_message }}"
                data:
                  group: water
                  tag: "water-{{ kind }}"
                  url: /calm-mobile/water
                  sticky: true
                  ttl: 0
                  priority: high
                  critical: true
                  push:
                    sound:
                      name: default
                      critical: 1
                      volume: 1.0
        - conditions:
            - condition: template
              value_template: "{{ resolved_severity | trim == 'critical' }}"
          sequence:
            - action: script.notify_trevor_phone
              data:
                title: "{{ notification_title }}"
                message: "{{ notification_message }}"
                data:
                  group: water
                  tag: "water-{{ kind }}"
                  url: /calm-mobile/water
                  sticky: true
                  ttl: 0
                  priority: high
      default:
        - choose:
            - conditions:
                - condition: template
                  value_template: "{{ kind in ['overnight_flow', 'sustained_flow', 'low_pressure', 'low_pressure_persistent'] }}"
              sequence:
                - action: script.notify_trevor_phone
                  data:
                    title: "{{ notification_title }}"
                    message: "{{ notification_message }}"
                    data:
                      group: water
                      tag: "water-{{ kind }}"
                      url: /calm-mobile/water
                      sticky: false
                      actions:
                        - action: "{{ expected_action }}"
                          title: Expected
                        - action: URI
                          title: Open Water
                          uri: /calm-mobile/water
          default:
            - action: script.notify_trevor_phone
              data:
                title: "{{ notification_title }}"
                message: "{{ notification_message }}"
                data:
                  group: water
                  tag: "water-{{ kind }}"
                  url: /calm-mobile/water
                  sticky: false

away_security_lock_unlocked_entry_doors:
  alias: Away Security Lock Unlocked Entry Doors
  description: Locks whichever monitored entry locks are currently unlocked.
  icon: mdi:lock-check-outline
  mode: restart
  sequence:
    - if:
        - condition: state
          entity_id: lock.garage_entry_lock
          state: "unlocked"
      then:
        - action: lock.lock
          target:
            entity_id: lock.garage_entry_lock
    - if:
        - condition: state
          entity_id: lock.mudroom_door_lock
          state: "unlocked"
      then:
        - action: lock.lock
          target:
            entity_id: lock.mudroom_door_lock

away_security_move_garage_door:
  alias: Away Security Move Garage Door
  description: Opens the selected garage door when closed, or uses the guarded close routine when it is open.
  icon: mdi:garage
  mode: restart
  fields:
    garage_cover:
      description: Garage cover entity to move.
      example: cover.ratgdo32disco_c26634_door
  sequence:
    - variables:
        requested_cover: "{{ garage_cover | default('cover.ratgdo32disco_c26634_door', true) }}"
        target_cover: "{{ 'cover.ratgdo32_4536e8_door' if requested_cover in ['trevor', 'cover.ratgdo32_4536e8_door'] else 'cover.ratgdo32disco_c26634_door' }}"
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ states(target_cover) == 'closed' }}"
          sequence:
            - action: cover.open_cover
              target:
                entity_id: "{{ target_cover }}"
        - conditions:
            - condition: template
              value_template: "{{ states(target_cover) in ['open', 'opening', 'stopped'] }}"
          sequence:
            - action: script.away_security_close_garage_door
              data:
                garage_cover: "{{ target_cover }}"

away_security_close_garage_door:
  alias: Away Security Close Garage Door
  description: Closes a selected garage door only from an explicit user action when the shared garage path is clear.
  icon: mdi:garage-arrow-down
  mode: parallel
  max: 4
  fields:
    garage_cover:
      description: Garage cover entity to close.
      example: cover.ratgdo32disco_c26634_door
  sequence:
    - variables:
        requested_cover: "{{ garage_cover | default('cover.ratgdo32disco_c26634_door', true) }}"
        target_cover: "{{ 'cover.ratgdo32_4536e8_door' if requested_cover in ['trevor', 'cover.ratgdo32_4536e8_door'] else 'cover.ratgdo32disco_c26634_door' }}"
        garage_label: "{{ 'your garage door' if target_cover == 'cover.ratgdo32_4536e8_door' else \"Casey's garage door\" }}"
        close_hazard_active: "{{ is_state('binary_sensor.garage_close_hazard_active', 'on') }}"
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ states(target_cover) == 'closed' }}"
          sequence:
            - if:
                - condition: state
                  entity_id: binary_sensor.away_security_garage_door_open
                  state: "off"
              then:
                - action: script.garage_security_clear_alerts
        - conditions:
            - condition: template
              value_template: "{{ close_hazard_active }}"
          sequence:
            - stop: Garage close blocked because garage camera, motion, or obstruction is active.
        - conditions:
            - condition: template
              value_template: "{{ states(target_cover) not in ['closed', 'unknown', 'unavailable', ''] }}"
          sequence:
            - if:
                - condition: template
                  value_template: "{{ states(target_cover) != 'closing' }}"
              then:
                - action: cover.close_cover
                  target:
                    entity_id: "{{ target_cover }}"
            - wait_template: "{{ is_state(target_cover, 'closed') }}"
              timeout: "00:01:00"
              continue_on_timeout: true
            - variables:
                trevor_away: "{{ states('device_tracker.tk_iphone_16_pro') not in ['home', 'unknown', 'unavailable', ''] }}"
                casey_away: "{{ states('device_tracker.unifi_default_42_15_78_4a_d9_f8') not in ['home', 'unknown', 'unavailable', ''] }}"
            - if:
                - condition: template
                  value_template: "{{ is_state(target_cover, 'closed') }}"
              then:
                - if:
                    - condition: state
                      entity_id: binary_sensor.away_security_garage_door_open
                      state: "off"
                  then:
                    - action: script.garage_security_clear_alerts
              else:
                - action: script.notify_trevor_phone
                  data:
                    title: "🚗 Garage did not close"
                    message: >-
                      Home Assistant sent the close command, but {{ garage_label }} reports
                      {{ states(target_cover) }}.
                      {% if trevor_away | bool and casey_away | bool %}
                        Casey and Trevor are away, and Home Assistant still sees {{ states('sensor.away_security_issue_summary') }}.
                      {% else %}
                        Home Assistant will keep watching {{ garage_label }} and clear this once it reports closed.
                      {% endif %}
                    data:
                      tag: garage-did-not-close
                      group: garage-security
                      sticky: true
                      ttl: 0
                      priority: high
                      url: /calm-mobile/home
                      actions:
                        - action: URI
                          title: Open Protect
                          uri: unifi-protect://
                        - action: CLOSE_GARAGE_SECURITY
                          title: Try closing again
                        - action: SNOOZE_GARAGE_SECURITY_30
                          title: Sleep 30 min

away_security_close_open_garage_doors:
  alias: Away Security Close Open Garage Doors
  description: Closes every currently open garage door when the shared garage path is clear.
  icon: mdi:garage-alert
  mode: restart
  sequence:
    - variables:
        open_garage_doors: >-
          {% set entity_ids = state_attr('binary_sensor.away_security_garage_door_open', 'open_entities') | default('', true) %}
          {{ (entity_ids.split('||') if entity_ids else []) | reject('eq', '') | list }}
        close_hazard_active: "{{ is_state('binary_sensor.garage_close_hazard_active', 'on') }}"
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ close_hazard_active }}"
          sequence:
            - stop: Garage close blocked because garage camera, motion, or obstruction is active.
      default:
        - repeat:
            for_each: "{{ open_garage_doors }}"
            sequence:
              - action: script.away_security_close_garage_door
                data:
                  garage_cover: "{{ repeat.item }}"
        - if:
            - condition: state
              entity_id: binary_sensor.away_security_garage_door_open
              state: "off"
          then:
            - action: script.garage_security_clear_alerts

garage_security_clear_alerts:
  alias: Garage Security Clear Alerts
  description: Clears active garage-security notification tags.
  icon: mdi:garage-check-variant
  mode: parallel
  sequence:
    - repeat:
        for_each:
          - garage-open-too-long
          - garage-open-at-night
          - garage-opened-overnight
          - garage-open-trevor-away
          - garage-open-casey-away
          - garage-did-not-close
          - garage-obstruction
        sequence:
          - action: script.notify_trevor_phone
            data:
              message: clear_notification
              data:
                tag: "{{ repeat.item }}"

garage_security_snooze_30:
  alias: Garage Security Snooze 30 Minutes
  description: Pauses garage-security reminders for 30 minutes.
  icon: mdi:garage-clock
  mode: restart
  sequence:
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.garage_security_snooze_until
      data:
        datetime: "{{ (now() + timedelta(minutes=30)).strftime('%Y-%m-%d %H:%M:%S') }}"
    - action: script.garage_security_clear_alerts
    - action: script.notify_trevor_phone
      data:
        title: "🚗 Garage reminders sleeping"
        message: Garage reminders paused for 30 minutes.
        data:
          tag: garage-security-snooze

garage_security_snooze_until_morning:
  alias: Garage Security Snooze Until Morning
  description: Pauses garage-security reminders until 7 AM.
  icon: mdi:weather-sunset-up
  mode: restart
  sequence:
    - variables:
        morning: >-
          {% set target = today_at('07:00') %}
          {% if as_timestamp(target) <= as_timestamp(now()) %}
            {% set target = target + timedelta(days=1) %}
          {% endif %}
          {{ target.strftime('%Y-%m-%d %H:%M:%S') }}
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.garage_security_snooze_until
      data:
        datetime: "{{ morning }}"
    - action: script.garage_security_clear_alerts
    - action: script.notify_trevor_phone
      data:
        title: "🚗 Garage reminders sleeping"
        message: Garage reminders paused until 7 AM.
        data:
          tag: garage-security-snooze

garage_security_clear_person_away_alerts:
  alias: Garage Security Clear Person-Away Alerts
  description: Clears garage-open alerts that are only relevant while one person is away.
  icon: mdi:garage-check-variant
  mode: parallel
  sequence:
    - repeat:
        for_each:
          - garage-open-trevor-away
          - garage-open-casey-away
        sequence:
          - action: script.notify_trevor_phone
            data:
              message: clear_notification
              data:
                tag: "{{ repeat.item }}"

garage_security_send_alert:
  alias: Garage Security Send Alert
  description: Sends garage door reminders that are not part of the away-security system.
  icon: mdi:garage-alert-variant
  mode: restart
  fields:
    alert_kind:
      description: Garage alert type
      example: open_too_long
    garage_cover:
      description: Garage cover that caused the alert, when known.
      example: cover.ratgdo32_4536e8_door
  sequence:
    - variables:
        kind: "{{ alert_kind | default('open_too_long', true) }}"
        requested_cover: "{{ garage_cover | default(state_attr('binary_sensor.away_security_garage_door_open', 'primary_open_entity') | default('cover.ratgdo32disco_c26634_door', true), true) }}"
        target_cover: "{{ 'cover.ratgdo32_4536e8_door' if requested_cover in ['trevor', 'cover.ratgdo32_4536e8_door'] else 'cover.ratgdo32disco_c26634_door' }}"
        target_label: "{{ 'your garage door' if target_cover == 'cover.ratgdo32_4536e8_door' else \"Casey's garage door\" }}"
        target_state: "{{ states(target_cover) }}"
        open_count: "{{ state_attr('binary_sensor.away_security_garage_door_open', 'open_count') | int(0) }}"
        open_label: "{{ state_attr('binary_sensor.away_security_garage_door_open', 'open_label') | default(target_label, true) }}"
        open_issue: "{{ state_attr('binary_sensor.away_security_garage_door_open', 'open_issue') | default(target_label ~ ' open', true) }}"
        target_label_title: "{{ target_label[:1] | upper ~ target_label[1:] }}"
        open_label_title: "{{ open_label[:1] | upper ~ open_label[1:] }}"
        open_issue_title: "{{ open_issue[:1] | upper ~ open_issue[1:] }}"
        casey_departure_open_label: >-
          {% set label = open_label | trim %}
          {% if label == "Casey's garage door" %}
            her garage door
          {% else %}
            {{ label }}
          {% endif %}
        casey_departure_open_issue: >-
          {% set issue = open_issue | trim %}
          {% if issue == "Casey's garage door open" %}
            her garage door is open
          {% elif issue[-5:] == ' open' %}
            {{ issue[:-5] }} is open
          {% else %}
            {{ issue }}
          {% endif %}
        close_title: "{{ state_attr('binary_sensor.away_security_garage_door_open', 'close_action_title') | default('Close garage', true) }}"
        opened_for: >-
          {% set door = states[target_cover] %}
          {{ relative_time(door.last_changed) if door is not none else 'a while' }}
        obstruction_state: >-
          {{ states('binary_sensor.ratgdo32_4536e8_obstruction') if target_cover == 'cover.ratgdo32_4536e8_door' else states('binary_sensor.ratgdo32disco_c26634_obstruction') }}
        title: >-
          {% if kind == 'open_at_night' %}
            {% if open_count | int(0) == 2 %}🚗 Both garage doors open at night{% else %}🚗 {{ open_label_title }} open at night{% endif %}
          {% elif kind == 'opened_overnight' %}
            🚗 {{ target_label_title }} opened overnight
          {% elif kind == 'trevor_away' %}
            🚗 {{ open_issue_title }} while you're away
          {% elif kind == 'casey_away' %}
            {% if open_count | int(0) == 2 %}🚗 Casey left both garage doors open{% else %}🚗 Casey left {{ casey_departure_open_label }} open{% endif %}
          {% elif kind == 'obstruction' %}
            🚗 {{ target_label_title }} obstruction detected
          {% else %}
            🚗 {{ open_issue_title }}
          {% endif %}
        tag: >-
          {% if kind == 'open_at_night' %}garage-open-at-night
          {% elif kind == 'opened_overnight' %}garage-opened-overnight
          {% elif kind == 'trevor_away' %}garage-open-trevor-away
          {% elif kind == 'casey_away' %}garage-open-casey-away
          {% elif kind == 'obstruction' %}garage-obstruction
          {% else %}garage-open-too-long{% endif %}
        priority: "{{ 'high' if kind in ['open_at_night', 'opened_overnight', 'obstruction', 'trevor_away', 'casey_away'] else 'normal' }}"
        message: >-
          {% if kind == 'open_at_night' %}
            {{ open_issue }} during the overnight window.
            Casey's door reports {{ states('cover.ratgdo32disco_c26634_door') }};
            Your garage door reports {{ states('cover.ratgdo32_4536e8_door') }}.
          {% elif kind == 'opened_overnight' %}
            {{ target_label }} changed from closed to {{ target_state }} overnight, and I did not see a recent arrival home.
          {% elif kind == 'trevor_away' %}
            You're away, Casey is home, and {{ open_issue }}. Home Assistant will keep watching until the garage is closed.
          {% elif kind == 'casey_away' %}
            Casey is away, you're home, and {{ casey_departure_open_issue }}. Home Assistant will keep watching until the garage is closed.
          {% elif kind == 'obstruction' %}
            Something is in or near the door path while {{ target_label }} is {{ target_state }}. Check the doorway before trying again.
          {% else %}
            {{ open_issue }} for {{ opened_for }} while someone is home.
          {% endif %}
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ kind == 'obstruction' }}"
          sequence:
            - action: script.notify_trevor_phone
              data:
                title: "{{ title }}"
                message: "{{ message }}"
                data:
                  tag: "{{ tag }}"
                  group: garage-security
                  sticky: true
                  ttl: 0
                  priority: "{{ priority }}"
                  url: /calm-mobile/home
                  actions:
                    - action: URI
                      title: Open Protect
                      uri: unifi-protect://
                    - action: SNOOZE_GARAGE_SECURITY_30
                      title: Sleep 30 min
        - conditions:
            - condition: template
              value_template: "{{ kind == 'open_at_night' }}"
          sequence:
            - action: script.notify_trevor_phone
              data:
                title: "{{ title }}"
                message: "{{ message }}"
                data:
                  tag: "{{ tag }}"
                  group: garage-security
                  sticky: true
                  ttl: 0
                  priority: "{{ priority }}"
                  url: /calm-mobile/home
                  actions:
                    - action: URI
                      title: Open Protect
                      uri: unifi-protect://
                    - action: CLOSE_GARAGE_SECURITY
                      title: "{{ close_title }}"
                    - action: SNOOZE_GARAGE_SECURITY_MORNING
                      title: Sleep until morning
      default:
        - action: script.notify_trevor_phone
          data:
            title: "{{ title }}"
            message: "{{ message }}"
            data:
              tag: "{{ tag }}"
              group: garage-security
              sticky: true
              ttl: 0
              priority: "{{ priority }}"
              url: /calm-mobile/home
              actions:
                - action: URI
                  title: Open Protect
                  uri: unifi-protect://
                - action: CLOSE_GARAGE_SECURITY
                  title: "{{ close_title }}"
                - action: SNOOZE_GARAGE_SECURITY_30
                  title: Sleep 30 min

entry_security_clear_alerts:
