            - action: script.turn_on
              target:
                entity_id: script.foyer_chandelier_curved_transition
              data:
                variables:
                  target_state: off
                  duration_seconds: 12
      default:
        - action: light.turn_on
          data:
            entity_id:
              - light.front_foyer_ceiling_lights
              - light.stairs_front_stairs
              - light.back_stairs_back_stairs
              - light.upstairs_hallway_main_lights
              - light.vestibule_main_lights
              - light.back_patio_light
            transition: 3
        - action: script.turn_on
          target:
            entity_id: script.foyer_chandelier_curved_transition
          data:
            variables:
              target_state: on
              duration_seconds: 12

lights_evening_scene:
  alias: Lights Evening Scene
  description: Set the non-automated house lights to a calm 10 percent evening level, excluding Wynn's room, turn on the living room uplight, and softly bring the chandelier up to 7 percent only if it happens to be off.
  icon: mdi:weather-sunset
  mode: single
  sequence:
    - action: input_boolean.turn_off
      target:
        entity_id:
          - input_boolean.foyer_chandelier_sleep_hold
          - input_boolean.front_stairs_sleep_override
    - variables:
        front_stairs_target_pct: "{{ states('sensor.front_stairs_schedule_brightness') | int(0) }}"
        front_stairs_current_pct: >-
          {% if is_state('light.stairs_front_stairs', 'on') %}
            {{ (((state_attr('light.stairs_front_stairs', 'brightness') | int(0)) / 255) * 100) | round(0) | int }}
          {% else %}
            0
          {% endif %}
    - if:
        - condition: state
          entity_id: light.front_foyer_chandelier
          state: "off"
      then:
        - action: light.turn_on
          data:
            entity_id: light.front_foyer_chandelier
            brightness_pct: 7
            transition: 8
    - action: light.turn_on
      data:
        entity_id:
          - light.family_room_main_lights_1
          - light.family_room_main_lights_2
          - light.family_room_main_lights_3
        brightness_pct: 10
        transition: 1
    - action: light.turn_on
      data:
        entity_id:
          - light.front_foyer_ceiling_lights
          - light.back_stairs_back_stairs
          - light.upstairs_hallway_main_lights
          - light.vestibule_main_lights
          - light.back_patio_light
        brightness_pct: 10
        transition: 3
    - action: switch.turn_on
      data:
        entity_id: switch.uplight
    - if:
        - condition: template
          value_template: "{{ front_stairs_target_pct > 0 and front_stairs_current_pct < front_stairs_target_pct }}"
      then:
        - action: light.turn_on
          data:
            entity_id: light.stairs_front_stairs
            brightness_pct: "{{ front_stairs_target_pct }}"
            transition: 10

family_room_tv_mode_on:
  alias: Family Room TV Mode On
  description: Wake the family room Frame TV and route it to the Apple TV HDMI input, retrying once so TV mode can break out of Art Mode or a stale app state.
  icon: mdi:television-play
  mode: restart
  sequence:
    - alias: Define the family room TV entities and Apple TV input
      variables:
        frame_tv_entity: media_player.family_room_frame_tv
        app_tv_entity: media_player.family_room_tv_2
        target_input: HDMI
        needs_wake: >-
          {% set combined = (
              (state_attr(app_tv_entity, 'app_name') | default('', true))
              ~ ' '
              ~ (state_attr(app_tv_entity, 'source') | default('', true))
              ~ ' '
              ~ (state_attr(frame_tv_entity, 'source') | default('', true))
            ) | lower %}
          {{ states(frame_tv_entity) in ['off', 'standby', 'idle', 'unknown', 'unavailable']
             or states(app_tv_entity) in ['off', 'standby', 'idle']
             or 'art mode' in combined
             or 'ambient mode' in combined }}
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ needs_wake }}"
          sequence:
            - alias: Wake the Frame TV when it looks off, idle, or in Art Mode
              action: media_player.turn_on
              data:
                entity_id: "{{ frame_tv_entity }}"
            - alias: Wait briefly for the Frame TV to become controllable
              wait_template: >-
                {% set combined = (
                    (state_attr(app_tv_entity, 'app_name') | default('', true))
                    ~ ' '
                    ~ (state_attr(app_tv_entity, 'source') | default('', true))
                    ~ ' '
                    ~ (state_attr(frame_tv_entity, 'source') | default('', true))
                  ) | lower %}
                {{ states(frame_tv_entity) not in ['off', 'standby', 'unknown', 'unavailable']
                   and 'art mode' not in combined
                   and 'ambient mode' not in combined }}
              timeout:
                seconds: 8
              continue_on_timeout: true
    - alias: Switch the Frame TV to the Apple TV HDMI input
      action: media_player.select_source
      data:
        entity_id: "{{ frame_tv_entity }}"
        source: "{{ target_input }}"
    - alias: Let the TV settle before retrying HDMI
      delay:
        seconds: 2
    - alias: Retry the Apple TV HDMI input in case the TV was still waking up
      action: media_player.select_source
      data:
        entity_id: "{{ frame_tv_entity }}"
        source: "{{ target_input }}"

lights_tv_scene:
  alias: Lights TV Scene
  description: Set the foyer ceiling and family room main lights for TV time, route the family room TV to Apple TV, then settle the chandelier to a soft 5 percent glow.
  icon: mdi:television
  mode: single
  sequence:
    - action: input_boolean.turn_off
      target:
        entity_id:
          - input_boolean.foyer_chandelier_sleep_hold
          - input_boolean.front_stairs_sleep_override
    - variables:
        front_stairs_target_pct: "{{ states('sensor.front_stairs_schedule_brightness') | int(0) }}"
        front_stairs_current_pct: >-
          {% if is_state('light.stairs_front_stairs', 'on') %}
            {{ (((state_attr('light.stairs_front_stairs', 'brightness') | int(0)) / 255) * 100) | round(0) | int }}
          {% else %}
            0
          {% endif %}
    - parallel:
        - sequence:
            - action: light.turn_off
              data:
                entity_id: light.front_foyer_ceiling_lights
                transition: 2
            - action: light.turn_off
              data:
                entity_id:
                  - light.family_room_main_lights_1
                  - light.family_room_main_lights_2
                  - light.family_room_main_lights_3
                transition: 1
        - sequence:
            - alias: Wake the family room TV and route it to Apple TV
              action: script.family_room_tv_mode_on
        - sequence:
            - alias: Turn on the living room uplight
              action: switch.turn_on
              data:
                entity_id: switch.uplight
    - if:
        - condition: template
          value_template: "{{ front_stairs_target_pct > 0 and front_stairs_current_pct < front_stairs_target_pct }}"
      then:
        - action: light.turn_on
          data:
            entity_id: light.stairs_front_stairs
            brightness_pct: "{{ front_stairs_target_pct }}"
            transition: 10
    - delay:
        seconds: 3
    - choose:
        - conditions:
            - condition: state
              entity_id: light.front_foyer_chandelier
              state: "on"
          sequence:
            - action: light.turn_on
              data:
                entity_id: light.front_foyer_chandelier
                brightness_pct: 5
                transition: 5
      default:
        - action: light.turn_on
          data:
            entity_id: light.front_foyer_chandelier
            brightness_pct: 5
            transition: 10

lights_all_off_scene:
  alias: Lights All Off Scene
  description: Turn off the normal house lights, while leaving scheduled ambient exterior lights alone if someone is home.
  icon: mdi:lightbulb-off-outline
  mode: single
  sequence:
    - variables:
        everyone_away: >
          {{ is_state('person.bonticou', 'not_home')
             and is_state('device_tracker.unifi_default_42_15_78_4a_d9_f8', 'not_home') }}
    - action: light.turn_off
      data:
        entity_id:
          - light.front_foyer_ceiling_lights
          - light.back_stairs_back_stairs
          - light.upstairs_hallway_main_lights
          - light.vestibule_main_lights
          - light.back_patio_light
          - light.wynn_s_room_chandelier
          - light.wynn_s_room_ceiling_lights
        transition: 3
    - action: script.turn_on
      target:
        entity_id: script.foyer_chandelier_curved_transition
      data:
        variables:
          target_state: off
          duration_seconds: 12
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ everyone_away }}"
          sequence:
            - action: light.turn_off
              data:
                entity_id:
                  - light.stairs_front_stairs
                transition: 3
            - action: switch.turn_off
              data:
                entity_id:
                  - switch.master_lantern
                  - switch.front_foyer_sconces

lights_bedtime_scene:
  alias: Lights Bedtime Scene
  description: Turn off the house lights for bedtime, turn off the family room TV, leave Wynn's room and the front door lights alone, fade the chandelier down first, then settle the front stairs to a 4 percent overnight glow, and keep the chandelier off for the rest of the night.
  icon: mdi:weather-night
  mode: single
  sequence:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.foyer_chandelier_sleep_hold
    - if:
        - condition: template
          value_template: >
            {{ states('media_player.family_room_tv_2') not in ['unknown', 'unavailable', 'off', 'idle', 'standby'] }}
      then:
        - continue_on_error: true
          action: media_player.turn_off
          data:
            entity_id: media_player.family_room_tv_2
    - action: light.turn_off
      data:
        entity_id:
          - light.front_foyer_ceiling_lights
          - light.family_room_main_lights_1
          - light.family_room_main_lights_2
          - light.family_room_main_lights_3
          - light.back_stairs_back_stairs
          - light.upstairs_hallway_main_lights
          - light.vestibule_main_lights
          - light.back_patio_light
        transition: 8
    - action: switch.turn_off
      data:
        entity_id: switch.uplight
    - choose:
        - conditions:
            - condition: state
              entity_id: light.front_foyer_chandelier
              state: "on"
          sequence:
            - action: light.turn_on
              data:
                entity_id: light.front_foyer_chandelier
                brightness_pct: 4
            - action: light.turn_on
              data:
                entity_id: light.front_foyer_chandelier
                brightness_pct: 3
            - delay:
                seconds: 2
            - action: light.turn_on
              data:
                entity_id: light.front_foyer_chandelier
                brightness_pct: 2
            - delay:
                seconds: 3
            - action: light.turn_on
              data:
                entity_id: light.front_foyer_chandelier
                brightness_pct: 1
            - delay:
                seconds: 3
            - action: light.turn_off
              data:
                entity_id: light.front_foyer_chandelier
                transition: 2
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.front_stairs_sleep_override
    - choose:
        - conditions:
            - condition: state
              entity_id: light.stairs_front_stairs
              state: "off"
          sequence:
            - action: light.turn_on
              data:
                entity_id: light.stairs_front_stairs
                brightness_pct: 4
                transition: 8
      default:
        - action: light.turn_on
          data:
            entity_id: light.stairs_front_stairs
            brightness_pct: 4
            transition: 3
    - if:
        - condition: template
          value_template: >
            {{ states('media_player.family_room_tv_2') not in ['unknown', 'unavailable', 'off', 'idle', 'standby'] }}
      then:
        - continue_on_error: true
          action: media_player.media_pause
          data:
            entity_id: media_player.family_room_tv_2

