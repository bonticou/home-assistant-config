garage_security_send_alert:
  alias: Garage Security Send Alert
  description: Sends ratgdo garage reminders that are not part of the away-security system.
  icon: mdi:garage-alert-variant
  mode: restart
  fields:
    alert_kind:
      description: Garage alert type
      example: open_too_long
  sequence:
    - variables:
        kind: "{{ alert_kind | default('open_too_long', true) }}"
        garage_cover: cover.ratgdo32disco_c26634_door
        garage_state: "{{ states('cover.ratgdo32disco_c26634_door') }}"
        opened_for: "{{ relative_time(states.cover.ratgdo32disco_c26634_door.last_changed) }}"
        obstruction_state: "{{ states('binary_sensor.ratgdo32disco_c26634_obstruction') }}"
        title: >-
          {% if kind == 'open_at_night' %}
            🚗 Garage open at night
          {% elif kind == 'opened_overnight' %}
            🚗 Garage opened overnight
          {% elif kind == 'trevor_away' %}
            🚗 Garage door open while you're away
          {% elif kind == 'casey_away' %}
            🚗 Casey left the garage open
          {% elif kind == 'obstruction' %}
            🚗 Garage obstruction detected
          {% else %}
            🚗 Garage open
          {% endif %}
        tag: >-
          {% if kind == 'open_at_night' %}garage-open-at-night
          {% elif kind == 'opened_overnight' %}garage-opened-overnight
          {% elif kind == 'trevor_away' %}garage-open-trevor-away
          {% elif kind == 'casey_away' %}garage-open-casey-away
          {% elif kind == 'obstruction' %}garage-obstruction
          {% else %}garage-open-too-long{% endif %}
        priority: "{{ 'high' if kind in ['open_at_night', 'opened_overnight', 'obstruction', 'trevor_away', 'casey_away'] else 'normal' }}"
        message: >-
          {% if kind == 'open_at_night' %}
            The garage door is open during the overnight window. It currently reports {{ garage_state }}.
          {% elif kind == 'opened_overnight' %}
            The garage door changed from closed to {{ garage_state }} overnight, and I did not see a recent arrival home.
          {% elif kind == 'trevor_away' %}
            You're away, Casey is home, and the garage door is open. Home Assistant will keep watching until it closes.
          {% elif kind == 'casey_away' %}
            Casey is away, you're home, and the garage door is open. Home Assistant will keep watching until it closes.
          {% elif kind == 'obstruction' %}
            ratgdo reports an obstruction while the garage door is {{ garage_state }}. Check the door path before closing again.
          {% else %}
            The garage door has been open for {{ opened_for }} while someone is home.
          {% endif %}
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ kind == 'obstruction' }}"
          sequence:
            - action: script.notify_trevor_phone
              data:
                title: "{{ title }}"
                message: "{{ message }}"
                data:
                  tag: "{{ tag }}"
                  group: garage-security
                  sticky: true
                  ttl: 0
                  priority: "{{ priority }}"
                  url: /calm-mobile/home
                  actions:
                    - action: URI
                      title: Open Protect
                      uri: unifi-protect://
                    - action: SNOOZE_GARAGE_SECURITY_30
                      title: Sleep 30 min
        - conditions:
            - condition: template
              value_template: "{{ kind == 'open_at_night' }}"
          sequence:
            - action: script.notify_trevor_phone
              data:
                title: "{{ title }}"
                message: "{{ message }}"
                data:
                  tag: "{{ tag }}"
                  group: garage-security
                  sticky: true
                  ttl: 0
                  priority: "{{ priority }}"
                  url: /calm-mobile/home
                  actions:
                    - action: URI
                      title: Open Protect
                      uri: unifi-protect://
                    - action: CLOSE_GARAGE_SECURITY
                      title: Close garage
                    - action: SNOOZE_GARAGE_SECURITY_MORNING
                      title: Sleep until morning
      default:
        - action: script.notify_trevor_phone
          data:
            title: "{{ title }}"
            message: "{{ message }}"
            data:
              tag: "{{ tag }}"
              group: garage-security
              sticky: true
              ttl: 0
              priority: "{{ priority }}"
              url: /calm-mobile/home
              actions:
                - action: URI
                  title: Open Protect
                  uri: unifi-protect://
                - action: CLOSE_GARAGE_SECURITY
                  title: Close garage
                - action: SNOOZE_GARAGE_SECURITY_30
                  title: Sleep 30 min

