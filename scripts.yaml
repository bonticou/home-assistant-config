      then:
        - continue_on_error: true
          action: media_player.media_pause
          data:
            entity_id: media_player.family_room_tv_2

lights_late_night_exterior_off:
  alias: Lights Late Night Exterior Off
  description: Turn off garage and exterior utility lights for the night while leaving the front door lights alone.
  icon: mdi:outdoor-lamp
  mode: restart
  sequence:
    - if:
        - condition: state
          entity_id: binary_sensor.door_lights_schedule_active
          state: "on"
      then:
        - action: input_boolean.turn_on
          target:
            entity_id: input_boolean.front_stairs_sleep_override
    - action: light.turn_off
      data:
        entity_id:
          - light.back_patio_light
          - light.deck_deck_lights
          - light.exterior_deck_lights
          - light.exterior_yard_lights
          - light.ratgdo32_4536e8_light
          - light.ratgdo32disco_c26634_light
        transition: 3
    - action: switch.turn_off
      data:
        entity_id:
          - switch.great_room_uplights
          - switch.garage_garage_lights
          - switch.exterior_mud_room_stairs
    - if:
        - condition: state
          entity_id: binary_sensor.door_lights_schedule_active
          state: "on"
      then:
        - action: script.door_lights_schedule_on

lights_overnight_sweep_off:
  alias: Lights Overnight Sweep Off
  description: Turn off lights left on overnight while preserving the front door sconces and front stairs light.
  icon: mdi:lightbulb-night-outline
  mode: restart
  sequence:
    - variables:
        active_lights: >
          {% set entity_ids = state_attr('sensor.overnight_lights_left_on', 'entity_ids') | default('', true) %}
          {{ (entity_ids.split('||') if entity_ids else []) | reject('eq', '') | list }}
    - repeat:
        for_each: "{{ active_lights }}"
        sequence:
          - action: homeassistant.turn_off
            target:
              entity_id: "{{ repeat.item }}"

door_lights_schedule_on:
  alias: Door Lights Schedule On
  description: Turn on the front door lights for the normal overnight routine; vacation mode owns the mudroom exterior light.
  icon: mdi:coach-lamp
  mode: single
  sequence:
    - action: switch.turn_on
      data:
        entity_id:
          - switch.master_lantern
          - switch.front_foyer_sconces

door_lights_schedule_off:
  alias: Door Lights Schedule Off
  description: Turn off the front door lights when the normal overnight routine ends.
  icon: mdi:coach-lamp-outline
  mode: single
  sequence:
    - action: switch.turn_off
      data:
        entity_id:
          - switch.master_lantern
          - switch.front_foyer_sconces

front_stairs_schedule_on:
  alias: Front Stairs Schedule On
  description: Turn on the front stairs light for the normal overnight routine, honoring the bedtime 4 percent override until sunrise.
  icon: mdi:stairs
  mode: single
  sequence:
    - action: light.turn_on
      data:
        entity_id: light.stairs_front_stairs
        brightness_pct: >-
          {{ 4 if is_state('input_boolean.front_stairs_sleep_override', 'on')
             else (states('sensor.front_stairs_schedule_brightness') | int(10)) }}
        transition: 3

front_stairs_schedule_off:
  alias: Front Stairs Schedule Off
  description: Turn off the front stairs light when the normal overnight routine ends.
  icon: mdi:stairs-down
  mode: single
  sequence:
    - action: light.turn_off
      data:
        entity_id: light.stairs_front_stairs
        transition: 3

foyer_chandelier_schedule_on:
  alias: Foyer Chandelier Schedule On
  description: Set the foyer chandelier to its calm scheduled brightness for the evening and overnight routine.
  icon: mdi:chandelier
  mode: restart
  sequence:
    - action: light.turn_on
      data:
        entity_id: light.front_foyer_chandelier
        brightness_pct: 10
        transition: 3

foyer_chandelier_schedule_off:
  alias: Foyer Chandelier Schedule Off
  description: Turn off the foyer chandelier when its normal overnight routine ends.
  icon: mdi:chandelier
  mode: restart
  sequence:
    - action: light.turn_off
      data:
        entity_id: light.front_foyer_chandelier
        transition: 3

interior_lights_guest_override_start:
  alias: Interior Lights Guest Override Start
  description: Pause the adaptive front stairs and foyer chandelier schedule sync after confirmation.
  icon: mdi:cancel
  mode: restart
  sequence:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.interior_lights_guest_override
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.interior_lights_guest_override_confirm

interior_lights_guest_override_end:
  alias: Interior Lights Guest Override End
  description: Resume normal adaptive front stairs and foyer chandelier schedule sync.
  icon: mdi:calendar-check-outline
  mode: restart
  sequence:
    - action: input_boolean.turn_off
      target:
        entity_id:
          - input_boolean.interior_lights_guest_override
          - input_boolean.interior_lights_guest_override_confirm

vacation_mode_start:
  alias: Vacation Mode Start
  description: Enable vacation mode, settle temporary overrides, and start the current lived-in lighting window if one is active.
  icon: mdi:island
  mode: restart
  sequence:
    - variables:
        was_vacation_active: "{{ is_state('input_boolean.vacation_mode', 'on') }}"
        window: "{{ states('sensor.vacation_activity_window') }}"
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.vacation_mode
    - action: input_boolean.turn_off
      target:
        entity_id:
          - input_boolean.vacation_mode_start_confirm
          - input_boolean.interior_lights_guest_override
          - input_boolean.interior_lights_guest_override_confirm
          - input_boolean.foyer_chandelier_sleep_hold
          - input_boolean.front_stairs_sleep_override
    - action: light.turn_off
      data:
        entity_id:
          - light.front_foyer_ceiling_lights
          - light.back_stairs_back_stairs
          - light.upstairs_hallway_main_lights
          - light.vestibule_main_lights
          - light.mudroom_main_lights
          - light.mudroom_nook_lights
          - light.wynn_s_room_chandelier
          - light.wynn_s_room_ceiling_lights
          - light.master_casey_s_closet
        transition: 3
    - action: switch.turn_off
      data:
        entity_id: switch.garage_garage_lights
    - action: script.vacation_activity_apply
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ not was_vacation_active and window == 'evening' }}"
          sequence:
            - action: script.notify_trevor_phone
              data:
                title: "🌴✨ Vacation glow is on"
                message: Home lighting is simulating activity for the evening. The house is doing its lived-in routine.
                data:
                  tag: vacation-activity-evening
                  group: lighting
                  url: /calm-mobile
        - conditions:
            - condition: template
              value_template: "{{ not was_vacation_active and window == 'pre_sunrise' }}"
          sequence:
            - action: script.notify_trevor_phone
              data:
                title: "🌅🌴 Vacation morning glow"
                message: Home lighting is simulating early-morning activity as sunrise approaches.
                data:
                  tag: vacation-activity-morning
                  group: lighting
                  url: /calm-mobile

vacation_mode_end:
  alias: Vacation Mode End
  description: Disable vacation mode, clear simulated activity lights, and hand the foyer chandelier back to its normal schedule.
  icon: mdi:island
  mode: restart
  sequence:
    - action: input_boolean.turn_off
      target:
        entity_id:
          - input_boolean.vacation_mode
          - input_boolean.vacation_mode_start_confirm
          - input_boolean.interior_lights_guest_override_confirm
    - action: light.turn_off
      data:
        entity_id:
          - light.family_room_main_lights_1
          - light.family_room_main_lights_2
          - light.family_room_main_lights_3
          - light.mudroom_main_lights
          - light.mudroom_nook_lights
          - light.wynn_s_room_chandelier
          - light.wynn_s_room_ceiling_lights
          - light.deck_deck_lights
          - light.exterior_yard_lights
          - light.back_patio_light
        transition: 8
    - action: switch.turn_off
      data:
        entity_id:
          - switch.great_room_uplights
          - switch.exterior_mud_room_stairs
    - choose:
        - conditions:
            - condition: state
              entity_id: binary_sensor.foyer_chandelier_schedule_active
              state: "on"
            - condition: state
              entity_id: input_boolean.foyer_chandelier_sleep_hold
              state: "off"
          sequence:
            - action: script.foyer_chandelier_schedule_on
      default:
        - action: script.foyer_chandelier_schedule_off

vacation_activity_apply:
  alias: Vacation Activity Apply
  description: Apply the current vacation activity lighting target for the evening or pre-sunrise sun curve, with a date-varied bedtime taper for Wynn's room.
  icon: mdi:island
  mode: restart
  sequence:
    - condition: state
      entity_id: input_boolean.vacation_mode
      state: "on"
    - variables:
        window: "{{ states('sensor.vacation_activity_window') }}"
        detail_phase: "{{ state_attr('sensor.vacation_activity_window', 'detail_phase') | default('unknown', true) }}"
        elevation: "{{ state_attr('sun.sun', 'elevation') | float(0) }}"
        darkness: >-
          {% set raw = (10 - (elevation | float(0))) / 18 %}
          {{ [0, [1, raw] | min] | max }}
        morning_progress: >-
          {% set raw = ((elevation | float(0)) + 14) / 18 %}
          {{ [0, [1, raw] | min] | max }}
        late_progress: >-
          {% set start = as_timestamp(today_at('21:30')) %}
          {% set end = as_timestamp(today_at('23:45')) %}
          {% set span = [1, end - start] | max %}
          {% set raw = (as_timestamp(now()) - start) / span %}
          {{ [0, [1, raw] | min] | max }}
        late_remaining: "{{ 1 - (late_progress | float(0)) }}"
        vacation_day_seed: "{{ now().strftime('%j') | int(0) }}"
        wynn_bedtime_start_offset_minutes: "{{ (((vacation_day_seed | int(0)) * 7) % 25) - 12 }}"
        wynn_bedtime_end_offset_minutes: "{{ (((vacation_day_seed | int(0)) * 11) % 21) - 10 }}"
        wynn_bedtime_chandelier_peak_pct: "{{ 38 + (((vacation_day_seed | int(0)) * 5) % 7) }}"
        wynn_bedtime_ceiling_peak_pct: "{{ 20 + (((vacation_day_seed | int(0)) * 3) % 5) }}"
        vacation_interior_offset_pct: "{{ (((vacation_day_seed | int(0)) * 3) % 7) - 3 }}"
        vacation_secondary_offset_pct: "{{ (((vacation_day_seed | int(0)) * 5) % 7) - 3 }}"
        vacation_exterior_offset_pct: "{{ (((vacation_day_seed | int(0)) * 13) % 7) - 3 }}"
        wynn_bedtime_remaining: >-
          {% set start = as_timestamp(today_at('20:15')) + ((wynn_bedtime_start_offset_minutes | int(0)) * 60) %}
          {% set end = as_timestamp(today_at('21:00')) + ((wynn_bedtime_end_offset_minutes | int(0)) * 60) %}
          {% set span = [1, end - start] | max %}
          {% set raw = 1 - ((as_timestamp(now()) - start) / span) %}
          {{ [0, [1, raw] | min] | max }}
        evening_family_pct: "{{ [1, [100, (24 + (12 * (darkness | float(0))) + (vacation_interior_offset_pct | int(0))) | round(0) | int] | min] | max }}"
        evening_wynn_chandelier_pct: "{{ (1 + (((wynn_bedtime_chandelier_peak_pct | int(40)) - 1) * (wynn_bedtime_remaining | float(0)))) | round(0) | int }}"
        evening_wynn_ceiling_pct: "{{ (1 + (((wynn_bedtime_ceiling_peak_pct | int(22)) - 1) * (wynn_bedtime_remaining | float(0)))) | round(0) | int }}"
        evening_foyer_pct: "{{ [1, [100, (26 + (14 * (darkness | float(0))) + (vacation_secondary_offset_pct | int(0))) | round(0) | int] | min] | max }}"
        evening_mudroom_main_pct: "{{ [1, [100, (18 + (10 * (darkness | float(0))) + (vacation_secondary_offset_pct | int(0))) | round(0) | int] | min] | max }}"
        evening_mudroom_nook_pct: "{{ [1, [100, (12 + (8 * (darkness | float(0))) + (vacation_secondary_offset_pct | int(0))) | round(0) | int] | min] | max }}"
        evening_yard_pct: "{{ [1, [100, (35 + (25 * (darkness | float(0))) + (vacation_exterior_offset_pct | int(0))) | round(0) | int] | min] | max }}"
        evening_deck_pct: "{{ [1, [100, (30 + (22 * (darkness | float(0))) + (vacation_exterior_offset_pct | int(0))) | round(0) | int] | min] | max }}"
        late_family_pct: "{{ [1, [100, (8 + (18 * (late_remaining | float(0))) + (vacation_interior_offset_pct | int(0))) | round(0) | int] | min] | max }}"
        late_wynn_chandelier_pct: 1
        late_wynn_ceiling_pct: 1
        late_foyer_pct: "{{ [1, [100, (24 + (18 * (late_remaining | float(0))) + (vacation_secondary_offset_pct | int(0))) | round(0) | int] | min] | max }}"
        late_mudroom_main_pct: "{{ [1, [100, (5 + (16 * (late_remaining | float(0))) + (vacation_secondary_offset_pct | int(0))) | round(0) | int] | min] | max }}"
        late_mudroom_nook_pct: "{{ [1, [100, (3 + (11 * (late_remaining | float(0))) + (vacation_secondary_offset_pct | int(0))) | round(0) | int] | min] | max }}"
        late_yard_pct: "{{ [1, [100, (40 + (8 * (late_remaining | float(0))) + (vacation_exterior_offset_pct | int(0))) | round(0) | int] | min] | max }}"
        late_deck_pct: "{{ [1, [100, (32 + (8 * (late_remaining | float(0))) + (vacation_exterior_offset_pct | int(0))) | round(0) | int] | min] | max }}"
        morning_family_pct: "{{ [1, [100, (12 + (8 * (morning_progress | float(0))) + (vacation_interior_offset_pct | int(0))) | round(0) | int] | min] | max }}"
        morning_foyer_pct: "{{ [1, [100, (18 + (10 * (morning_progress | float(0))) + (vacation_secondary_offset_pct | int(0))) | round(0) | int] | min] | max }}"
        morning_mudroom_main_pct: "{{ [1, [100, (10 + (6 * (morning_progress | float(0))) + (vacation_secondary_offset_pct | int(0))) | round(0) | int] | min] | max }}"
        morning_mudroom_nook_pct: "{{ [1, [100, (6 + (4 * (morning_progress | float(0))) + (vacation_secondary_offset_pct | int(0))) | round(0) | int] | min] | max }}"
        morning_yard_pct: "{{ [1, [100, (18 + (14 * (morning_progress | float(0))) + (vacation_exterior_offset_pct | int(0))) | round(0) | int] | min] | max }}"
        morning_deck_pct: "{{ [1, [100, (16 + (12 * (morning_progress | float(0))) + (vacation_exterior_offset_pct | int(0))) | round(0) | int] | min] | max }}"
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ window == 'evening' and detail_phase == 'evening_lived_in' }}"
          sequence:
            - parallel:
                - sequence:
                    - action: light.turn_on
                      data:
                        entity_id:
                          - light.family_room_main_lights_1
                          - light.family_room_main_lights_2
                          - light.family_room_main_lights_3
                        brightness_pct: "{{ evening_family_pct }}"
                        transition: 8
                    - action: switch.turn_on
                      data:
                        entity_id: switch.great_room_uplights
                - sequence:
                    - action: light.turn_on
                      data:
                        entity_id: light.front_foyer_chandelier
                        brightness_pct: "{{ evening_foyer_pct }}"
                        transition: 10
                - sequence:
                    - action: light.turn_on
                      data:
                        entity_id: light.mudroom_main_lights
                        brightness_pct: "{{ evening_mudroom_main_pct }}"
                        transition: 10
                    - action: light.turn_on
                      data:
                        entity_id: light.mudroom_nook_lights
                        brightness_pct: "{{ evening_mudroom_nook_pct }}"
                        transition: 10
                - sequence:
                    - action: light.turn_on
                      data:
                        entity_id: light.wynn_s_room_chandelier
                        brightness_pct: "{{ evening_wynn_chandelier_pct }}"
                        transition: 10
                    - action: light.turn_on
                      data:
                        entity_id: light.wynn_s_room_ceiling_lights
                        brightness_pct: "{{ evening_wynn_ceiling_pct }}"
                        transition: 10
                - sequence:
                    - action: light.turn_on
                      data:
                        entity_id: light.exterior_yard_lights
                        brightness_pct: "{{ evening_yard_pct }}"
                        transition: 8
                    - action: light.turn_on
                      data:
                        entity_id: light.deck_deck_lights
                        brightness_pct: "{{ evening_deck_pct }}"
                        transition: 8
                    - action: light.turn_on
                      data:
                        entity_id: light.back_patio_light
                        transition: 3
                    - action: switch.turn_on
                      data:
                        entity_id: switch.exterior_mud_room_stairs
        - conditions:
            - condition: template
              value_template: "{{ window == 'evening' and detail_phase == 'late_glow' }}"
          sequence:
            - parallel:
                - sequence:
                    - action: light.turn_on
                      data:
                        entity_id:
                          - light.family_room_main_lights_1
                          - light.family_room_main_lights_2
                          - light.family_room_main_lights_3
                        brightness_pct: "{{ late_family_pct }}"
                        transition: 240
                    - action: switch.turn_on
                      data:
                        entity_id: switch.great_room_uplights
                - sequence:
                    - action: light.turn_on
                      data:
                        entity_id: light.front_foyer_chandelier
                        brightness_pct: "{{ late_foyer_pct }}"
                        transition: 240
                - sequence:
                    - action: light.turn_on
                      data:
                        entity_id: light.wynn_s_room_chandelier
                        brightness_pct: "{{ late_wynn_chandelier_pct }}"
                        transition: 240
                    - action: light.turn_on
                      data:
                        entity_id: light.wynn_s_room_ceiling_lights
                        brightness_pct: "{{ late_wynn_ceiling_pct }}"
                        transition: 240
                - sequence:
                    - action: light.turn_on
                      data:
                        entity_id: light.mudroom_main_lights
                        brightness_pct: "{{ late_mudroom_main_pct }}"
                        transition: 240
                    - action: light.turn_on
                      data:
                        entity_id: light.mudroom_nook_lights
                        brightness_pct: "{{ late_mudroom_nook_pct }}"
                        transition: 240
                - sequence:
                    - action: light.turn_on
                      data:
                        entity_id: light.exterior_yard_lights
                        brightness_pct: "{{ late_yard_pct }}"
                        transition: 60
                    - action: light.turn_on
                      data:
                        entity_id: light.deck_deck_lights
                        brightness_pct: "{{ late_deck_pct }}"
                        transition: 60
                    - action: light.turn_on
                      data:
                        entity_id: light.back_patio_light
                        transition: 3
                    - action: switch.turn_on
                      data:
                        entity_id: switch.exterior_mud_room_stairs
        - conditions:
            - condition: template
              value_template: "{{ window == 'pre_sunrise' }}"
          sequence:
            - parallel:
                - sequence:
                    - action: light.turn_on
                      data:
                        entity_id:
                          - light.family_room_main_lights_1
                          - light.family_room_main_lights_2
                          - light.family_room_main_lights_3
                        brightness_pct: "{{ morning_family_pct }}"
                        transition: 10
                    - action: switch.turn_on
                      data:
                        entity_id: switch.great_room_uplights
                - sequence:
                    - action: light.turn_off
                      data:
                        entity_id:
                          - light.wynn_s_room_chandelier
                          - light.wynn_s_room_ceiling_lights
                        transition: 8
                    - action: light.turn_on
                      data:
                        entity_id: light.front_foyer_chandelier
                        brightness_pct: "{{ morning_foyer_pct }}"
                        transition: 10
                - sequence:
                    - action: light.turn_on
                      data:
                        entity_id: light.mudroom_main_lights
                        brightness_pct: "{{ morning_mudroom_main_pct }}"
                        transition: 10
                    - action: light.turn_on
                      data:
                        entity_id: light.mudroom_nook_lights
                        brightness_pct: "{{ morning_mudroom_nook_pct }}"
                        transition: 10
                - sequence:
                    - action: light.turn_on
                      data:
                        entity_id: light.exterior_yard_lights
                        brightness_pct: "{{ morning_yard_pct }}"
                        transition: 10
                    - action: light.turn_on
                      data:
                        entity_id: light.deck_deck_lights
                        brightness_pct: "{{ morning_deck_pct }}"
                        transition: 10
                    - action: light.turn_on
                      data:
                        entity_id: light.back_patio_light
                        transition: 3
                    - action: switch.turn_on
                      data:
                        entity_id: switch.exterior_mud_room_stairs
      default:
        - action: light.turn_off
          data:
            entity_id:
              - light.family_room_main_lights_1
              - light.family_room_main_lights_2
              - light.family_room_main_lights_3
              - light.wynn_s_room_chandelier
              - light.wynn_s_room_ceiling_lights
              - light.mudroom_main_lights
              - light.mudroom_nook_lights
              - light.exterior_yard_lights
              - light.deck_deck_lights
              - light.back_patio_light
            transition: 8
        - action: switch.turn_off
          data:
            entity_id: switch.great_room_uplights
        - if:
            - condition: state
              entity_id: binary_sensor.door_lights_schedule_active
              state: "off"
          then:
            - action: switch.turn_off
              data:
                entity_id: switch.exterior_mud_room_stairs
        - choose:
            - conditions:
                - condition: state
                  entity_id: binary_sensor.foyer_chandelier_schedule_active
                  state: "on"
                - condition: state
                  entity_id: input_boolean.foyer_chandelier_sleep_hold
                  state: "off"
              sequence:
                - action: script.foyer_chandelier_schedule_on
          default:
            - action: script.foyer_chandelier_schedule_off

notify_trevor_phone:
  alias: Notify Trevor Phone
  description: Centralizes Trevor's mobile notification service so device-name changes only need one update.
  icon: mdi:cellphone-message
  mode: parallel
  fields:
    title:
      description: Notification title
    message:
      description: Notification body
    data:
      description: Optional mobile app notification payload
  sequence:
    - variables:
        notification_title: "{{ title | default('', true) }}"
        notification_message: "{{ message | default('', true) }}"
        notification_data: "{{ data | default({}, true) }}"
    - event: house_notice_event_recorded
      event_data:
        at: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
        kind: >-
          {{ 'clear' if notification_message == 'clear_notification' else 'sent' }}
        title: >-
          {% set fallback = notification_data.tag | default('House notice', true) %}
          {{ notification_title if notification_title | trim else fallback }}
        message: "{{ notification_message }}"
        group: "{{ notification_data.group | default('general', true) }}"
        tag: "{{ notification_data.tag | default('', true) }}"
        url: "{{ notification_data.url | default('', true) }}"
        severity: >-
          {% if notification_data.priority | default('', true) == 'high'
             or notification_data.critical | default(false) in [true, 'true', 'True'] %}
            critical
          {% elif notification_data.sticky | default(false) in [true, 'true', 'True'] %}
            watch
          {% else %}
            info
          {% endif %}
        action: "{{ notification_data.action | default('', true) }}"
        source: notify_trevor_phone
        recent: "{{ notification_data.recent | default('', true) }}"
        keep_recent: "{{ notification_data.keep_recent | default('', true) }}"
        history: "{{ notification_data.history | default('', true) }}"
    - action: notify.mobile_app_tk_iphone_16_pro
      data:
        title: "{{ notification_title }}"
        message: "{{ notification_message }}"
        data: "{{ notification_data }}"

metro_north_commute_dismiss_card:
  alias: Metro-North Commute Dismiss Card
  description: Hides the current Metro-North commute schedule card from the home dashboard.
  icon: mdi:train
  mode: restart
  sequence:
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.metro_north_commute_card_dismissed_at
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

ting_send_notification:
  alias: Ting Send Notification
  description: Sends high-signal Ting electrical, voltage, offline, freeze, and learning notifications.
  icon: mdi:flash-alert-outline
  mode: parallel
  fields:
    alert_kind:
      description: confirmed, unverified, voltage, offline, offline_clear, freeze, learning_complete, or confirmed_clear.
      example: confirmed
  sequence:
    - variables:
        kind: "{{ alert_kind | default('confirmed', true) }}"
        confirmed_devices: "{{ state_attr('sensor.ting_notification_status', 'confirmed_devices') | default('None', true) }}"
        unverified_devices: "{{ state_attr('sensor.ting_notification_status', 'unverified_devices') | default('None', true) }}"
        offline_devices: "{{ state_attr('sensor.ting_notification_status', 'offline_devices') | default('None', true) }}"
        freeze_devices: "{{ state_attr('sensor.ting_notification_status', 'freeze_devices') | default('None', true) }}"
        voltage_summary: "{{ state_attr('sensor.ting_notification_status', 'voltage_summary') | default('Ting voltage unknown', true) }}"
        voltage_spread: "{{ state_attr('sensor.ting_notification_status', 'voltage_spread') | default('unknown', true) }}"
        ting_messages: "{{ state_attr('sensor.ting_notification_status', 'ting_messages') | default('', true) }}"
        freeze_context: "{{ state_attr('sensor.ting_notification_status', 'freeze_context') | default('house context unavailable', true) }}"
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ kind == 'confirmed' }}"
          sequence:
            - action: script.notify_trevor_phone
              data:
                title: "⚡🔥 Ting electrical hazard"
                message: >-
                  Ting is flagging a confirmed electrical hazard on {{ confirmed_devices }}.
                  {{ ting_messages ~ ' ' if ting_messages | trim else '' }}Current readings:
                  {{ voltage_summary }}. Check the Ting app now; if anything smells hot,
                  smoky, or wrong, treat it like an emergency.
                data:
                  group: ting
                  tag: ting-confirmed-hazard
                  url: /calm-mobile/notices
                  sticky: true
                  ttl: 0
                  priority: high
                  critical: true
                  push:
                    sound:
                      name: default
                      critical: 1
                      volume: 1.0
            - action: input_datetime.set_datetime
              target:
                entity_id: input_datetime.ting_confirmed_hazard_last_sent_at
              data:
                datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
        - conditions:
            - condition: template
              value_template: "{{ kind == 'confirmed_clear' }}"
          sequence:
            - action: script.notify_trevor_phone
              data:
                message: clear_notification
                data:
                  tag: ting-confirmed-hazard
            - action: script.notify_trevor_phone
              data:
                title: "✅⚡ Ting hazard cleared"
                message: Ting is no longer reporting the confirmed electrical hazard.
                data:
                  group: ting
                  tag: ting-confirmed-hazard-clear
                  url: /calm-mobile/notices
        - conditions:
            - condition: template
              value_template: "{{ kind == 'unverified' }}"
          sequence:
            - action: script.notify_trevor_phone
              data:
                title: "⚡ Ting sees something odd"
                message: >-
                  Ting flagged an unverified electrical pattern on {{ unverified_devices }}.
                  {{ ting_messages ~ ' ' if ting_messages | trim else '' }}No confirmed hazard yet.
                  I’m watching for escalation.
                data:
                  group: ting
                  tag: ting-unverified-hazard
                  url: /calm-mobile/notices
                  sticky: true
                  ttl: 0
                  priority: high
            - action: input_datetime.set_datetime
              target:
                entity_id: input_datetime.ting_unverified_hazard_last_sent_at
              data:
                datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
        - conditions:
            - condition: template
              value_template: "{{ kind == 'voltage' }}"
          sequence:
            - action: script.notify_trevor_phone
              data:
                title: "⚡ Ting voltage drift"
                message: >-
                  Ting readings have been outside the quiet range for 10 minutes.
                  {{ voltage_summary }}{% if is_number(voltage_spread) %}. Spread {{ voltage_spread }}V{% endif %}.
                  This may be utility-side or circuit-specific; I’ll keep watching.
                data:
                  group: ting
                  tag: ting-voltage-watch
                  url: /calm-mobile/notices
            - action: input_datetime.set_datetime
              target:
                entity_id: input_datetime.ting_voltage_watch_last_sent_at
              data:
                datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
        - conditions:
            - condition: template
              value_template: "{{ kind == 'offline' }}"
          sequence:
            - action: script.notify_trevor_phone
              data:
                title: "⚡ Ting went quiet"
                message: >-
                  {{ offline_devices }} has not reported voltage for 30 minutes.
                  I’ll keep watching; check the outlet or Wi-Fi if it stays offline.
                data:
                  group: ting
                  tag: ting-offline-watch
                  url: /calm-mobile/notices
            - action: input_datetime.set_datetime
              target:
                entity_id: input_datetime.ting_offline_watch_last_sent_at
              data:
                datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.ting_offline_watch_alert_active
        - conditions:
            - condition: template
              value_template: "{{ kind == 'offline_clear' }}"
          sequence:
            - action: script.notify_trevor_phone
              data:
                message: clear_notification
                data:
                  tag: ting-offline-watch
            - action: script.notify_trevor_phone
              data:
                title: "✅⚡ Ting is back"
                message: Both Ting sensors are reporting voltage normally again.
                data:
                  group: ting
                  tag: ting-offline-recovered
                  url: /calm-mobile/notices
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.ting_offline_watch_alert_active
        - conditions:
            - condition: template
              value_template: "{{ kind == 'freeze' }}"
          sequence:
            - action: script.notify_trevor_phone
              data:
                title: "🥶 Ting sees freeze risk"
                message: >-
                  Ting is flagging possible freeze risk on {{ freeze_devices }}.
                  {{ freeze_context }}. I’ll keep watching temperature and house context.
                data:
                  group: ting
                  tag: ting-freeze-risk
                  url: /calm-mobile/notices
                  sticky: true
                  priority: high
            - action: input_datetime.set_datetime
              target:
                entity_id: input_datetime.ting_freeze_risk_last_sent_at
              data:
                datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
        - conditions:
            - condition: template
              value_template: "{{ kind == 'learning_complete' }}"
          sequence:
            - action: script.notify_trevor_phone
              data:
                title: "⚡ Ting has its baseline"
                message: Both Ting sensors are out of learning mode. Home Assistant will now watch for hazards, sustained voltage drift, offline sensors, and freeze risk.
                data:
                  group: ting
                  tag: ting-learning-complete
                  url: /calm-mobile/notices
            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.ting_learning_complete_notified

espresso_send_maintenance_notification:
  alias: Espresso Send Maintenance Notification
  description: Sends the next Profitec GO cleaning reminder with quick actions.
  icon: mdi:coffee-maker-outline
  mode: restart
  sequence:
    - variables:
        cafiza_due: "{{ is_state('binary_sensor.espresso_cafiza_clean_due', 'on') }}"
        notified_now: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ cafiza_due | bool }}"
          sequence:
            - action: script.notify_trevor_phone
              data:
                title: "☕🧼 Profitec GO Cafiza clean"
                message: >-
                  Time for a Cafiza brew-group clean.
                  Use the blind basket with cleaner, rinse thoroughly, and toss the first shot.
                  Marking this done also resets the weekly water backflush cadence.
                data:
                  group: espresso
                  tag: espresso-maintenance
                  url: /calm-mobile/home
                  action: espresso_cafiza_clean_reminder_sent
                  recent: false
                  keep_recent: false
                  history: audit
                  actions:
                    - action: ESPRESSO_CAFIZA_CLEAN_DONE
                      title: Cafiza done
                    - action: ESPRESSO_SNOOZE_TOMORROW
                      title: Snooze
      default:
        - action: script.notify_trevor_phone
          data:
            title: "☕💧 Profitec GO water backflush"
            message: >-
              Weekly water backflush for the Profitec GO.
              Use the blind basket with water only, run a few short pump cycles,
              then wipe the group clean.
            data:
              group: espresso
              tag: espresso-maintenance
              url: /calm-mobile/home
              action: espresso_water_backflush_reminder_sent
              recent: false
              keep_recent: false
              history: audit
              actions:
                - action: ESPRESSO_WATER_BACKFLUSH_DONE
                  title: Water done
                - action: ESPRESSO_SNOOZE_TOMORROW
                  title: Snooze
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.espresso_maintenance_last_notified_at
      data:
        datetime: "{{ notified_now }}"

espresso_mark_water_backflush_done:
  alias: Espresso Mark Water Backflush Done
  description: Stamp the last Profitec GO water backflush.
  icon: mdi:water-check-outline
  mode: restart
  fields:
    source:
      description: Source that confirmed the action.
      example: codex_chat
    note:
      description: Optional ledger note.
      example: Confirmed from chat.
  sequence:
    - variables:
        espresso_now: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
        action_source: "{{ source | default('home_assistant_dashboard_action', true) | regex_replace('[^A-Za-z0-9_.:-]', '') }}"
        action_note: "{{ note | default('', true) | regex_replace('[^A-Za-z0-9 .,_:/@+-]', '') | truncate(500, true, '') }}"
    - action: shell_command.log_house_action_stamp
      data:
        notice_id: profitec-go-water-backflush
        cycle_id: "{{ 'water-backflush-' ~ espresso_now[:10] }}"
        action: water_backflush_done
        completed_at: "{{ espresso_now }}"
        source: "{{ action_source }}"
        note: "{{ action_note }}"
    - if:
        - condition: template
          value_template: "{{ action_source != 'home_assistant_notification_action' }}"
      then:
        - event: house_notice_event_recorded
          event_data:
            at: "{{ espresso_now }}"
            kind: action
            title: Water done
            message: Profitec GO water backflush recorded
            group: espresso
            tag: espresso-maintenance
            url: /calm-mobile/home
            severity: info
            action: water_backflush_done
            source: "{{ action_source }}"
            recent: false
            keep_recent: false
            history: audit
    - action: input_datetime.set_datetime
      target:
        entity_id:
          - input_datetime.espresso_last_water_backflush
          - input_datetime.espresso_maintenance_snooze_until
      data:
        datetime: "{{ espresso_now }}"
    - action: script.espresso_clear_maintenance_notification

