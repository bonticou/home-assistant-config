  mode: restart
  sequence:
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.entry_security_snooze_until
      data:
        datetime: "{{ (now() + timedelta(minutes=30)).strftime('%Y-%m-%d %H:%M:%S') }}"
    - action: script.entry_security_clear_alerts
