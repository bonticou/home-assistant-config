wine_cave_send_alert:
  alias: Wine Cave Send Alert
  description: Sends a mobile notification for wine cave cycles and anomalies with a consistent calm format.
  icon: mdi:glass-wine
  mode: parallel
  fields:
    alert_kind:
      description: Type of wine cave alert to send
      example: cycle
    message:
      description: Notification body text
    severity:
      description: Optional severity override
      example: urgent
  sequence:
    - variables:
        kind: "{{ alert_kind | default('status') }}"
        notification_message: "{{ message | default('', true) }}"
        resolved_severity: >-
          {% if severity is defined and severity | default('', true) != '' %}
            {{ severity }}
          {% elif kind in ['temp_high', 'temp_low'] %}
            urgent
          {% elif kind in ['cycle', 'cycle_settled'] %}
            info
          {% else %}
            watch
          {% endif %}
        notification_title: >-
          {% if kind == 'cycle' %}
            ❄️ Wine cave cooling cycle
          {% elif kind == 'cycle_settled' %}
            ✅ Wine cave cycle settled
          {% elif kind == 'cycle_overdue' %}
            ⏳ Wine cave cycle is still settling
          {% elif kind == 'unresolved' %}
            🚨 Wine cave still needs attention
          {% elif kind == 'temp_high' %}
            🌡️ Wine cave is running warm
          {% elif kind == 'temp_low' %}
            🧊 Wine cave is running cold
          {% elif kind == 'moisture' %}
            💧 Wine cave moisture looks unusual
          {% elif kind == 'condensation' %}
            💦 Wine cave condensation risk
          {% elif kind == 'drift' %}
            📈 Wine cave drift needs a look
          {% elif kind == 'abrupt' %}
            🚨 Wine cave changed fast
          {% elif kind == 'sensor_unavailable' %}
            📡 Wine cave sensor unavailable
          {% else %}
            🍷 Wine cave update
          {% endif %}
        notification_tag: >-
          {% if kind in ['cycle', 'cycle_settled'] %}
            wine-cave-cycle
          {% elif kind == 'cycle_overdue' %}
            wine-cave-overdue
          {% elif kind == 'unresolved' %}
            wine-cave-unresolved
          {% else %}
            wine-cave-{{ kind }}
          {% endif %}
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ resolved_severity == 'urgent' }}"
          sequence:
            - action: script.notify_trevor_phone
              data:
                title: "{{ notification_title }}"
                message: "{{ notification_message }}"
                data:
                  group: wine-cave
                  tag: "{{ notification_tag }}"
                  url: /calm-mobile/wine
                  sticky: true
                  ttl: 0
                  priority: high
      default:
        - action: script.notify_trevor_phone
          data:
            title: "{{ notification_title }}"
            message: "{{ notification_message }}"
            data:
              group: wine-cave
              tag: "{{ notification_tag }}"
              url: /calm-mobile/wine
              sticky: false

environment_send_alert:
  alias: Environment Send Alert
  description: Sends room and area environment pushes with consistent titles, tags, grouping, and urgency.
  icon: mdi:home-thermometer-outline
  mode: parallel
  fields:
    room:
      description: Human-facing room or area name
      example: Kitchen
    alert_kind:
      description: Environment issue type
      example: temp_high
    message:
      description: Notification body text
    clear:
      description: Clear the matching mobile notification tag
      example: false
  sequence:
    - variables:
        alert_room: "{{ room | default('Environment', true) }}"
        kind: "{{ alert_kind | default('status', true) }}"
        notification_message: "{{ message | default('', true) }}"
        clear_notification: "{{ clear | default(false) }}"
        slug: "{{ alert_room | lower | replace(' ', '-') | replace('/', '-') }}"
        tag: "environment-{{ slug }}-{{ kind }}"
        title_icon: >-
          {% if kind in ['temp_high', 'temp_low'] %}🌡️
          {% elif kind in ['humidity_high', 'humidity_low'] %}💧
          {% elif kind == 'radon_high' %}⚠️
          {% elif kind == 'source_disagreement' %}📍
          {% elif kind == 'sensor_unavailable' %}📡
          {% elif kind == 'battery_low' %}🪫
          {% else %}🏠{% endif %}
        title_issue: >-
          {% if kind == 'temp_high' %}is too warm
          {% elif kind == 'temp_low' %}is too cool
          {% elif kind == 'humidity_high' %}is too humid
          {% elif kind == 'humidity_low' %}is too dry
          {% elif kind == 'radon_high' %}radon is elevated
          {% elif kind == 'source_disagreement' %}readings disagree
          {% elif kind == 'sensor_unavailable' %}sensor unavailable
          {% elif kind == 'battery_low' %}battery is low
          {% elif kind == 'recovered' %}recovered
          {% else %}needs a look{% endif %}
        sticky_alert: "{{ kind in ['radon_high', 'sensor_unavailable'] }}"
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ clear_notification | bool }}"
          sequence:
            - action: script.notify_trevor_phone
              data:
                message: clear_notification
                data:
                  tag: "{{ tag }}"
      default:
        - action: script.notify_trevor_phone
          data:
            title: "{{ title_icon }} {{ alert_room }} {{ title_issue }}"
            message: "{{ notification_message }}"
            data:
              group: environment
              tag: "{{ tag }}"
              sticky: "{{ sticky_alert }}"
              ttl: 0
              priority: high
              url: /calm-mobile/climate

basement_humidity_send_alert:
  alias: Basement Humidity Send Alert
  description: Sends Trevor a basement humidity push using the Airthings-backed basement sensor.
  icon: mdi:water-percent-alert
  mode: parallel
  fields:
    alert_kind:
      description: Type of basement humidity alert to send
      example: watch
    message:
      description: Notification body text
  sequence:
    - variables:
        kind: "{{ alert_kind | default('watch') }}"
        notification_message: "{{ message | default('', true) }}"
    - action: script.notify_trevor_phone
      data:
        title: >-
          {% if kind == 'urgent' %}
            🚨 Basement is too humid
          {% else %}
            💧 Basement humidity is creeping up
          {% endif %}
        message: "{{ notification_message }}"
        data:
          group: basement-climate
          tag: basement-humidity
          sticky: "{{ kind == 'urgent' }}"
          ttl: 0
          priority: high
          url: /calm-mobile/climate

basement_humidity_clear_alert:
  alias: Basement Humidity Clear Alert
  description: Clears the active basement humidity notification tag.
  icon: mdi:water-check-outline
  mode: restart
  sequence:
    - action: script.notify_trevor_phone
      data:
        message: clear_notification
        data:
          tag: basement-humidity
