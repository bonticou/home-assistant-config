casey_left_garage_send_alert:
  alias: Casey Left Entry Send Alert
  description: Sends Trevor a contextual push when Casey leaves home and an entry point is unsecured.
  icon: mdi:garage-alert-variant
  mode: restart
  sequence:
    - action: script.away_security_clear_alert
    - action: script.casey_left_combo_clear_alert
    - action: script.casey_left_lights_clear_alert
    - variables:
        garage_door_open: "{{ is_state('binary_sensor.away_security_garage_door_open', 'on') }}"
        entry_point_count: "{{ states('sensor.away_security_entry_point_issues') | int(0) }}"
        entry_point_issue: "{{ state_attr('sensor.away_security_entry_point_issues', 'issue') | default('an entry point unsecured', true) }}"
        unlocked_entry_count: "{{ states('sensor.away_security_unlocked_entry_locks') | int(0) }}"
        notification_title: >-
          {% if garage_door_open | bool and entry_point_count | int(0) == 1 %}
            🚗 Casey left the garage open
          {% elif entry_point_count | int(0) > 1 %}
            🔐 Casey left entry points unsecured
          {% else %}
            🔐 Casey left {{ entry_point_issue }}
          {% endif %}
        notification_message: >-
          Casey just left home and {{ entry_point_issue }}.
          Tap below to {{ 'close it' if garage_door_open | bool and unlocked_entry_count | int(0) == 0 else 'secure it' }}.
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ garage_door_open | bool and unlocked_entry_count | int(0) > 0 }}"
          sequence:
            - action: script.notify_trevor_phone
              data:
                title: "{{ notification_title }}"
                message: "{{ notification_message }}"
                data:
                  tag: casey-left-garage-unlocked
                  group: away-security
                  sticky: true
                  ttl: 0
                  priority: high
                  actions:
                    - action: URI
                      title: Open Protect
                      uri: unifi-protect://
                    - action: SECURE_CASEY_LEFT_HOME
                      title: Close + lock
                    - action: CLOSE_AWAY_GARAGE
                      title: Close garage
                    - action: LOCK_CASEY_LEFT_ENTRY_DOORS
                      title: >-
                        {{ 'Lock doors' if unlocked_entry_count | int(0) > 1 else 'Lock door' }}
        - conditions:
            - condition: template
              value_template: "{{ garage_door_open | bool }}"
          sequence:
            - action: script.notify_trevor_phone
              data:
                title: "{{ notification_title }}"
                message: "{{ notification_message }}"
                data:
                  tag: casey-left-garage-unlocked
                  group: away-security
                  sticky: true
                  ttl: 0
                  priority: high
                  actions:
                    - action: URI
                      title: Open Protect
                      uri: unifi-protect://
                    - action: CLOSE_AWAY_GARAGE
                      title: Close garage
      default:
        - action: script.notify_trevor_phone
          data:
            title: "{{ notification_title }}"
            message: "{{ notification_message }}"
            data:
              tag: casey-left-garage-unlocked
              group: away-security
              sticky: true
              ttl: 0
              priority: high
              actions:
                - action: URI
                  title: Open Protect
                  uri: unifi-protect://
                - action: LOCK_CASEY_LEFT_ENTRY_DOORS
                  title: >-
                    {{ 'Lock doors' if unlocked_entry_count | int(0) > 1 else 'Lock door' }}

