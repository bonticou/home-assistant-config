entry_security_snooze_until_morning:
  alias: Entry Security Snooze Until Morning
  description: Pauses entry-security reminders until 7 AM.
  icon: mdi:weather-sunset-up
  mode: restart
  sequence:
    - variables:
        morning: >-
          {% set target = today_at('07:00') %}
          {% if as_timestamp(target) <= as_timestamp(now()) %}
            {% set target = target + timedelta(days=1) %}
          {% endif %}
          {{ target.strftime('%Y-%m-%d %H:%M:%S') }}
