casey_left_combo_send_alert:
  alias: Casey Left Combo Send Alert
  description: Sends Trevor a contextual push when Casey leaves during daylight with an entry point unsecured and lights still on.
  icon: mdi:home-lightning-bolt-outline
  mode: restart
  sequence:
    - action: script.away_security_clear_alert
    - action: script.casey_left_garage_clear_alert
    - action: script.casey_left_lights_clear_alert
    - variables:
        garage_door_open: "{{ is_state('binary_sensor.away_security_garage_door_open', 'on') }}"
        entry_point_issue: "{{ state_attr('sensor.away_security_entry_point_issues', 'issue') | default('an entry point unsecured', true) }}"
        unlocked_entry_count: "{{ states('sensor.away_security_unlocked_entry_locks') | int(0) }}"
        active_light_names: >
          {% set light_names = state_attr('sensor.away_security_active_lights', 'names') | default('', true) %}
          {{ (light_names.split('||') if light_names else []) | reject('eq', '') | list }}
        secure_action_title: >-
          {% if garage_door_open | bool and unlocked_entry_count | int(0) > 0 %}Close + lock + lights off
          {% elif garage_door_open | bool %}Close + lights off
          {% else %}Lock + lights off{% endif %}
    - action: script.notify_trevor_phone
      data:
        title: "🏠 Casey left {{ entry_point_issue }} and lights on"
        message: >-
          {% if active_light_names | count == 1 %}
            Casey just left home, {{ entry_point_issue }}, and {{ active_light_names[0] }} is still on.
          {% elif active_light_names | count == 2 %}
            Casey just left home, {{ entry_point_issue }}, and {{ active_light_names | join(' and ') }} are still on.
          {% else %}
            Casey just left home, {{ entry_point_issue }}, and {{ active_light_names | count }} lights are still on.
          {% endif %}
          Tap below to secure everything.
        data:
          tag: casey-left-combo
          group: away-security
          sticky: true
          ttl: 0
          priority: high
          actions:
            - action: URI
              title: Open Protect
              uri: unifi-protect://
            - action: SECURE_CASEY_LEFT_HOME
              title: "{{ secure_action_title }}"

