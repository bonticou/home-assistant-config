spotify_bedtime_fade:
  alias: Spotify Bedtime Fade
  description: Gradually lower Sonos volume over 30 minutes, then pause playback.
  icon: mdi:weather-night
  mode: single
  variables:
    target_players:
      - media_player.kitchen_speakers
      - media_player.family_room
      - media_player.great_room_speakers
      - media_player.unnamed_room_6
      - media_player.wynn_s_room
    steps: 15
    step_minutes: 2
  sequence:
    - repeat:
        count: "{{ steps }}"
        sequence:
          - variables:
              volume_factor: "{{ ((steps - repeat.index) / steps) | float(0) }}"
          - repeat:
              for_each: "{{ target_players }}"
              sequence:
                - if:
                    - condition: template
                      value_template: >
                        {{ states(repeat.item) not in ['unknown', 'unavailable', 'off'] and
                           state_attr(repeat.item, 'volume_level') is not none }}
                  then:
                    - action: media_player.volume_set
                      data:
                        entity_id: "{{ repeat.item }}"
                        volume_level: >
                          {% set current = state_attr(repeat.item, 'volume_level') | float(0) %}
                          {{ [0, [1, current * volume_factor] | min] | max | round(2) }}
          - delay:
              minutes: "{{ step_minutes }}"
    - repeat:
        for_each: "{{ target_players }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ states(repeat.item) not in ['unknown', 'unavailable'] }}"
            then:
              - action: media_player.media_pause
                data:
                  entity_id: "{{ repeat.item }}"

light_transition_toggle:
  alias: Light Transition Toggle
  description: Toggle a light with explicit turn_on/turn_off transition timing.
  icon: mdi:lightbulb-auto-outline
  mode: parallel
  fields:
    light_entity:
      description: Light entity to toggle
      example: light.kitchen
    transition_seconds:
      description: Transition duration in seconds
      example: 3
  sequence:
    - variables:
        target_light: "{{ light_entity }}"
        transition: "{{ transition_seconds | default(3) | float(3) }}"
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ is_state(target_light, 'on') }}"
          sequence:
            - action: light.turn_off
              data:
                entity_id: "{{ target_light }}"
                transition: "{{ transition }}"
      default:
        - action: light.turn_on
          data:
            entity_id: "{{ target_light }}"
            transition: "{{ transition }}"

lights_evening_scene:
  alias: Lights Evening Scene
  description: Set the main house lights to a calm 33 percent evening level, excluding Wynn's room.
  icon: mdi:weather-sunset
  mode: single
  sequence:
    - action: light.turn_on
      data:
        entity_id:
          - light.front_foyer_ceiling_lights
          - light.stairs_front_stairs
          - light.back_stairs_back_stairs
          - light.upstairs_hallway_main_lights
          - light.vestibule_main_lights
          - light.back_patio_light
        brightness_pct: 33
        transition: 3
    - action: switch.turn_on
      data:
        entity_id:
          - switch.master_lantern
          - switch.front_foyer_sconces

lights_all_off_scene:
  alias: Lights All Off Scene
  description: Turn off all house lights and switches, including Wynn's room.
  icon: mdi:lightbulb-off-outline
  mode: single
  sequence:
    - action: light.turn_off
      data:
        entity_id:
          - light.front_foyer_ceiling_lights
          - light.stairs_front_stairs
          - light.back_stairs_back_stairs
          - light.upstairs_hallway_main_lights
          - light.vestibule_main_lights
          - light.back_patio_light
          - light.wynn_s_room_chandelier
          - light.wynn_s_room_ceiling_lights
        transition: 3
    - action: switch.turn_off
      data:
        entity_id:
          - switch.master_lantern
          - switch.front_foyer_sconces

lights_bedtime_scene:
  alias: Lights Bedtime Scene
  description: Turn off the house lights for bedtime, excluding Wynn's room, while leaving front stairs at 10 percent.
  icon: mdi:weather-night
  mode: single
  sequence:
    - action: light.turn_off
      data:
        entity_id:
          - light.front_foyer_ceiling_lights
          - light.back_stairs_back_stairs
          - light.upstairs_hallway_main_lights
          - light.vestibule_main_lights
          - light.back_patio_light
        transition: 3
    - action: switch.turn_off
      data:
        entity_id:
          - switch.master_lantern
          - switch.front_foyer_sconces
    - action: light.turn_on
      data:
        entity_id: light.stairs_front_stairs
        brightness_pct: 10
        transition: 3

door_lights_schedule_on:
  alias: Door Lights Schedule On
  description: Turn on the front door lights for the normal overnight routine.
  icon: mdi:coach-lamp
  mode: single
  sequence:
    - action: switch.turn_on
      data:
        entity_id:
          - switch.master_lantern
          - switch.front_foyer_sconces

door_lights_schedule_off:
  alias: Door Lights Schedule Off
  description: Turn off the front door lights when the normal overnight routine ends.
  icon: mdi:coach-lamp-outline
  mode: single
  sequence:
    - action: switch.turn_off
      data:
        entity_id:
          - switch.master_lantern
          - switch.front_foyer_sconces

front_stairs_schedule_on:
  alias: Front Stairs Schedule On
  description: Turn on the front stairs light for the normal overnight routine.
  icon: mdi:stairs
  mode: single
  sequence:
    - action: light.turn_on
      data:
        entity_id: light.stairs_front_stairs
        brightness_pct: "{{ states('sensor.front_stairs_schedule_brightness') | int(10) }}"
        transition: 3

front_stairs_schedule_off:
  alias: Front Stairs Schedule Off
  description: Turn off the front stairs light when the normal overnight routine ends.
  icon: mdi:stairs-down
  mode: single
  sequence:
    - action: light.turn_off
      data:
        entity_id: light.stairs_front_stairs
        transition: 3

away_security_send_alert:
  alias: Away Security Send Alert
  description: Sends the active away-security issue with quick actions.
  icon: mdi:shield-alert-outline
  mode: restart
  sequence:
    - variables:
        issue_summary: "{{ states('sensor.away_security_issue_summary') }}"
    - action: notify.mobile_app_tk_iphone_16_pro
      data:
        title: House left unsecured
        message: >-
          Casey and Trevor are away, and {{ issue_summary }}.
        data:
          tag: away-security
          sticky: true
          ttl: 0
          priority: high
          url: /calm-mobile/home
          actions:
            - action: LOCK_AWAY_GARAGE
              title: Lock garage
            - action: TURN_OFF_AWAY_LIGHTS
              title: Turn off lights
            - action: SNOOZE_AWAY_SECURITY_30
              title: Sleep 30 min
            - action: SNOOZE_AWAY_SECURITY_120
              title: Sleep 2 hr

away_security_clear_alert:
  alias: Away Security Clear Alert
  description: Clears the active away-security notification tag.
  icon: mdi:shield-check-outline
  mode: restart
  sequence:
    - action: notify.mobile_app_tk_iphone_16_pro
      data:
        message: clear_notification
        data:
          tag: away-security
