garden_apply_next_stage:
  alias: Garden Apply Next Stage
  description: Run the next recommended garden stage action, if one is ready.
  icon: mdi:arrow-right-circle-outline
  mode: restart
  sequence:
    - variables:
        next_step: "{{ state_attr('sensor.garden_next_stage_step', 'action_id') }}"
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ next_step == 'start_marigolds_hardening' }}"
          sequence:
            - action: script.garden_start_marigolds_hardening

        - conditions:
            - condition: template
              value_template: "{{ next_step == 'mark_marigolds_outside' }}"
          sequence:
            - action: script.garden_mark_marigolds_outside

        - conditions:
            - condition: template
              value_template: "{{ next_step == 'start_basil_hardening' }}"
          sequence:
            - action: script.garden_start_basil_hardening

        - conditions:
            - condition: template
              value_template: "{{ next_step == 'mark_basil_outside' }}"
          sequence:
            - action: script.garden_mark_basil_outside

away_security_send_alert:
  alias: Away Security Send Alert
  description: Sends the active away-security issue with quick actions.
  icon: mdi:shield-alert-outline
  mode: restart
  sequence:
    - action: script.casey_left_combo_clear_alert
    - action: script.casey_left_garage_clear_alert
    - action: script.casey_left_lights_clear_alert
    - variables:
        issue_summary: "{{ states('sensor.away_security_issue_summary') }}"
    - action: notify.mobile_app_tk_iphone_16_pro
      data:
        title: >-
          {% if 'garage door unlocked' in issue_summary %}
            🔐 Garage door unlocked while away
          {% else %}
            🏠 House left unsecured
          {% endif %}
        message: >-
          Casey and Trevor are away, and {{ issue_summary }}.
        data:
          tag: away-security
          sticky: true
          ttl: 0
          priority: high
          url: /calm-mobile/home
          actions:
            - action: LOCK_AWAY_GARAGE
              title: Lock garage
            - action: TURN_OFF_AWAY_LIGHTS
              title: Turn off lights
            - action: SNOOZE_AWAY_SECURITY_30
              title: Sleep 30 min
            - action: SNOOZE_AWAY_SECURITY_120
              title: Sleep 2 hr

away_security_clear_alert:
  alias: Away Security Clear Alert
  description: Clears the active away-security notification tag.
  icon: mdi:shield-check-outline
  mode: restart
  sequence:
    - action: notify.mobile_app_tk_iphone_16_pro
      data:
        message: clear_notification
        data:
          tag: away-security

casey_left_garage_send_alert:
  alias: Casey Left Garage Send Alert
  description: Sends Trevor a contextual push when Casey leaves home and the garage is still unlocked.
  icon: mdi:garage-alert-variant
  mode: restart
  sequence:
    - action: script.away_security_clear_alert
    - action: script.casey_left_combo_clear_alert
    - action: script.casey_left_lights_clear_alert
    - action: script.notify_trevor_phone
      data:
        title: "🔐 Casey left the garage unlocked"
        message: >-
          Casey just left home and the garage is still unlocked.
          Tap below to lock it.
        data:
          tag: casey-left-garage-unlocked
          group: away-security
          sticky: true
          ttl: 0
          priority: high
          actions:
            - action: LOCK_CASEY_LEFT_GARAGE
              title: Lock garage

casey_left_garage_clear_alert:
  alias: Casey Left Garage Clear Alert
  description: Clears the contextual Casey-left-garage notification tag.
  icon: mdi:garage-variant-lock
  mode: restart
  sequence:
    - action: script.notify_trevor_phone
      data:
        message: clear_notification
        data:
          tag: casey-left-garage-unlocked

casey_left_combo_send_alert:
  alias: Casey Left Combo Send Alert
  description: Sends Trevor a contextual push when Casey leaves during daylight with the garage unlocked and lights still on.
  icon: mdi:home-lightning-bolt-outline
  mode: restart
  sequence:
    - action: script.away_security_clear_alert
    - action: script.casey_left_garage_clear_alert
    - action: script.casey_left_lights_clear_alert
    - variables:
        active_light_names: >
          {% set light_names = state_attr('sensor.away_security_active_lights', 'names') | default('', true) %}
          {{ (light_names.split('||') if light_names else []) | reject('eq', '') | list }}
    - action: script.notify_trevor_phone
      data:
        title: "🏠 Casey left the garage unlocked and lights on"
        message: >-
          {% if active_light_names | count == 1 %}
            Casey just left home, the garage is still unlocked, and {{ active_light_names[0] }} is still on.
          {% elif active_light_names | count == 2 %}
            Casey just left home, the garage is still unlocked, and {{ active_light_names | join(' and ') }} are still on.
          {% else %}
            Casey just left home, the garage is still unlocked, and {{ active_light_names | count }} lights are still on.
          {% endif %}
          Tap below to secure everything.
        data:
          tag: casey-left-combo
          group: away-security
          sticky: true
          ttl: 0
          priority: high
          actions:
            - action: SECURE_CASEY_LEFT_HOME
              title: Lock + lights off

casey_left_combo_clear_alert:
  alias: Casey Left Combo Clear Alert
  description: Clears the contextual Casey-left combo notification tag.
  icon: mdi:check-decagram-outline
  mode: restart
  sequence:
    - action: script.notify_trevor_phone
      data:
        message: clear_notification
        data:
          tag: casey-left-combo

casey_left_lights_send_alert:
