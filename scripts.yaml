away_security_send_alert:
  alias: Away Security Send Alert
  description: Sends the active away-security issue with quick actions.
  icon: mdi:shield-alert-outline
  mode: restart
  sequence:
    - action: script.casey_left_combo_clear_alert
    - action: script.casey_left_garage_clear_alert
    - action: script.casey_left_lights_clear_alert
    - variables:
        issue_summary: "{{ states('sensor.away_security_issue_summary') }}"
        garage_door_open: "{{ is_state('binary_sensor.away_security_garage_door_open', 'on') }}"
        garage_open_count: "{{ state_attr('binary_sensor.away_security_garage_door_open', 'open_count') | int(0) }}"
        garage_close_title: "{{ state_attr('binary_sensor.away_security_garage_door_open', 'close_action_title') | default('Close garage', true) }}"
        entry_point_count: "{{ states('sensor.away_security_entry_point_issues') | int(0) }}"
        entry_point_issue: "{{ state_attr('sensor.away_security_entry_point_issues', 'issue') | default('', true) }}"
        entry_point_issue_title: "{{ entry_point_issue[:1] | upper ~ entry_point_issue[1:] }}"
        unlocked_entry_count: "{{ states('sensor.away_security_unlocked_entry_locks') | int(0) }}"
        active_light_count: "{{ states('sensor.away_security_active_lights') | int(0) }}"
        secure_action_title: >-
          {% set garage = garage_door_open | bool %}
          {% set garage_close = garage_close_title %}
          {% set locks = unlocked_entry_count | int(0) > 0 %}
          {% set lights = active_light_count | int(0) > 0 %}
          {% if garage and locks and lights %}{{ garage_close }} + lock + lights off
          {% elif garage and locks %}{{ garage_close }} + lock
          {% elif garage and lights %}{{ garage_close }} + lights off
          {% elif locks and lights %}Lock + lights off
          {% else %}Secure home{% endif %}
        notification_title: >-
          {% if garage_open_count | int(0) == 2 %}
            🚗 Both garage doors open while away
          {% elif garage_door_open | bool and entry_point_count | int(0) == garage_open_count | int(0) and active_light_count | int(0) == 0 %}
            🚗 {{ entry_point_issue_title }} while away
          {% elif entry_point_count | int(0) > 1 and active_light_count | int(0) == 0 %}
            🔐 Entry points unsecured while away
          {% elif entry_point_count | int(0) == 1 and active_light_count | int(0) == 0 %}
            🔐 {{ entry_point_issue_title }} while away
          {% else %}
            🏠 House left unsecured
          {% endif %}
        notification_message: >-
          {% if garage_open_count | int(0) == 2 %}
            Casey and Trevor are away, and Casey's garage door and your garage door are open.
            {% set extras = namespace(items=[]) %}
            {% if unlocked_entry_count | int(0) > 0 %}
              {% set extras.items = extras.items + [('entry locks' if unlocked_entry_count | int(0) > 1 else 'an entry lock') ~ ' unlocked'] %}
            {% endif %}
            {% if active_light_count | int(0) > 0 %}
              {% set extras.items = extras.items + [(active_light_count | int(0)) ~ (' lights' if active_light_count | int(0) > 1 else ' light') ~ ' on'] %}
            {% endif %}
            {% if extras.items | count > 0 %}
              Home Assistant is also watching {{ extras.items | join(' and ') }}.
            {% endif %}
          {% else %}
            Casey and Trevor are away, and {{ issue_summary }}.
          {% endif %}
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ garage_door_open | bool
                   and unlocked_entry_count | int(0) > 0
                   and active_light_count | int(0) > 0 }}
          sequence:
            - action: script.notify_trevor_phone
              data:
                title: "{{ notification_title }}"
                message: "{{ notification_message }}"
                data:
                  tag: away-security
                  group: away-security
                  sticky: true
                  ttl: 0
                  priority: high
                  url: /calm-mobile/home
                  actions:
                    - action: URI
                      title: Open Protect
                      uri: unifi-protect://
                    - action: SECURE_AWAY_HOME
                      title: "{{ secure_action_title }}"
                    - action: CLOSE_AWAY_GARAGE
                      title: "{{ garage_close_title }}"
