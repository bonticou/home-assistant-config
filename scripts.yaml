notify_trevor_phone:
  alias: Notify Trevor Phone
  description: Centralizes Trevor's mobile notification service so device-name changes only need one update.
  icon: mdi:cellphone-message
  mode: parallel
  fields:
    title:
      description: Notification title
    message:
      description: Notification body
    data:
      description: Optional mobile app notification payload
  sequence:
    - variables:
        notification_title: "{{ title | default('', true) }}"
        notification_message: "{{ message | default('', true) }}"
        notification_data: "{{ data | default({}, true) }}"
    - action: notify.mobile_app_tk_iphone_16_pro
      data:
        title: "{{ notification_title }}"
        message: "{{ notification_message }}"
        data: "{{ notification_data }}"

water_send_alert:
  alias: Water Send Alert
  description: Sends water alerts with consistent titles, tags, grouping, and urgency.
  icon: mdi:water-alert
  mode: parallel
  fields:
    alert_kind:
      description: Type of water alert to send
      example: low_pressure
    message:
      description: Notification body text
    severity:
      description: Optional severity override
      example: critical
  sequence:
    - variables:
        kind: "{{ alert_kind | default('status') }}"
        notification_message: "{{ message | default('', true) }}"
        resolved_severity: >-
          {% if severity is defined and severity | default('', true) != '' %}
            {{ severity }}
          {% elif kind in ['burst_day', 'burst_night', 'leak', 'valve_closed'] %}
            critical
          {% else %}
            warning
          {% endif %}
        notification_title: >-
          {% if kind == 'overnight_flow' %}
            🌙 Water running overnight
          {% elif kind == 'sustained_flow' %}
            🚰 Sustained water flow
          {% elif kind == 'burst_day' %}
            🚨 Very high water flow
          {% elif kind == 'burst_night' %}
            🚨 Water burst overnight
          {% elif kind == 'pressure_drop' %}
            📉 Sudden water pressure drop
          {% elif kind == 'low_pressure' %}
            🚿 Low water pressure
          {% elif kind == 'high_pressure' %}
            📈 High water pressure
          {% elif kind == 'usage_high' %}
            💧 High water usage today
          {% elif kind == 'leak' %}
            💦 Leak detected
          {% elif kind == 'valve_closed' %}
            🛑 Water shutoff valve closed
          {% elif kind == 'flo_system' %}
            ⚠️ Flo system alert
          {% else %}
            💧 Water update
          {% endif %}
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ resolved_severity == 'critical' }}"
          sequence:
            - action: script.notify_trevor_phone
              data:
                title: "{{ notification_title }}"
                message: "{{ notification_message }}"
                data:
                  group: water
                  tag: "water-{{ kind }}"
                  url: /calm-mobile/water
                  sticky: true
                  ttl: 0
                  priority: high
      default:
        - action: script.notify_trevor_phone
          data:
            title: "{{ notification_title }}"
            message: "{{ notification_message }}"
            data:
              group: water
              tag: "water-{{ kind }}"
              url: /calm-mobile/water
              sticky: false

garden_mark_seedlings_checked:
  alias: Garden Mark Seedlings Checked
  description: Stamp the last time the indoor seed trays were checked.
  icon: mdi:clipboard-check-outline
  mode: restart
  sequence:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.garden_checked_today
    - action: input_datetime.set_datetime
