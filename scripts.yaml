garden_fertilizer_send_notification:
  alias: Garden Fertilizer Send Notification
  description: Sends the every-other-Friday growing season fertilizer reminder.
  icon: mdi:sprout
  mode: restart
  sequence:
    - variables:
        notified_now: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
        cycle: >-
          {{ state_attr('sensor.garden_fertilizer_status', 'current_cycle')
             or state_attr('sensor.garden_fertilizer_status', 'next_due_date')
             or now().strftime('%Y-%m-%d') }}
    - action: script.notify_trevor_phone
      data:
        title: "🍅 Fertilizer time"
        message: >-
          It is a fertilizer Friday. Add fertilizer when you have a few minutes,
          then mark it done.
        data:
          group: garden
          tag: garden-fertilizer
          url: /calm-mobile/notices
          action: garden_fertilizer_reminder_sent
          recent: false
          keep_recent: false
          history: audit
          actions:
            - action: GARDEN_FERTILIZER_DONE
              title: Done
            - action: GARDEN_FERTILIZER_SNOOZE
              title: Snooze
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.garden_fertilizer_last_notified_at
      data:
        datetime: "{{ notified_now }}"
    - action: input_text.set_value
      target:
        entity_id: input_text.garden_fertilizer_last_notified_cycle
      data:
        value: "{{ cycle }}"

garden_fertilizer_mark_done:
  alias: Garden Fertilizer Mark Done
  description: Stamps the growing season fertilizer reminder as completed.
  icon: mdi:sprout
  mode: restart
  fields:
    source:
      description: Source that confirmed the action.
      example: home_assistant_notification_action
    note:
      description: Optional ledger note.
      example: Confirmed from chat.
  sequence:
    - variables:
        fertilizer_now: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
        fertilizer_cycle_id: >-
          {% set cycle = state_attr('sensor.garden_fertilizer_status', 'current_cycle') | default('', true) | trim %}
          {{ cycle if cycle else fertilizer_now[:10] }}
        action_source: "{{ source | default('home_assistant_dashboard_action', true) | regex_replace('[^A-Za-z0-9_.:-]', '') }}"
        action_note: "{{ note | default('', true) | regex_replace('[^A-Za-z0-9 .,_:/@+-]', '') | truncate(500, true, '') }}"
    - action: input_datetime.set_datetime
      target:
