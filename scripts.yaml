        bill_month: "{{ month_number }}"
        bill_year: "{{ now().year }}"
        due_date: "{{ due | trim }}"
        paid_date: "{{ paid_today }}"
        source: home_assistant_notification_action
    - action: script.property_tax_clear_notification
      data:
        tax_type: "{{ tax_kind }}"
        bill_month: "{{ month_number }}"

property_tax_clear_notification:
  alias: Property Tax Clear Notification
  description: Clears the active property tax reminder notification tag.
  icon: mdi:calendar-check-outline
  mode: restart
  fields:
    tax_type:
      description: Tax type, either school or town
      example: school
    bill_month:
      description: Numeric billing month
      example: 1
  sequence:
    - variables:
        tax_kind: "{{ tax_type | default('town', true) }}"
        month_number: "{{ bill_month | default(4) | int(4) }}"
        notification_tag: "{{ 'property-tax-' ~ tax_kind ~ '-' ~ '%02d' | format(month_number | int) }}"
    - action: script.notify_trevor_phone
      data:
        message: clear_notification
        data:
          tag: "{{ notification_tag }}"

