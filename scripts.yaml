          - input_datetime.garden_fertilizer_last_done_at
          - input_datetime.garden_fertilizer_snooze_until
      data:
        datetime: "{{ fertilizer_now }}"
    - continue_on_error: true
      action: shell_command.log_house_action_stamp
      data:
        notice_id: garden-fertilizer
        cycle_id: "{{ fertilizer_cycle_id }}"
        action: fertilizer_done
        completed_at: "{{ fertilizer_now }}"
        source: "{{ action_source }}"
        note: "{{ action_note }}"
    - if:
        - condition: template
          value_template: "{{ action_source != 'home_assistant_notification_action' }}"
      then:
        - event: house_notice_event_recorded
          event_data:
            at: "{{ fertilizer_now }}"
            kind: action
            title: Fertilizer done
            message: Garden fertilizer recorded
            group: garden
            tag: garden-fertilizer
            url: /calm-mobile/notices
            severity: info
            action: fertilizer_done
            source: "{{ action_source }}"
            recent: false
            keep_recent: false
            history: audit
