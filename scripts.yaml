          {% if issue[:5] == 'Casey' or issue[:6] == 'Trevor' %}
            {{ issue }}
          {% elif issue %}
            {{ issue[:1] | lower ~ issue[1:] }}
          {% else %}
            {{ issue }}
          {% endif %}
        casey_departure_entry_issue_sentence: >-
          {% set issue = entry_point_issue_sentence | trim %}
          {% if issue == "Casey's garage door open" %}
            her garage door open
          {% else %}
            {{ issue }}
          {% endif %}
        casey_departure_entry_message_clause: >-
          {% set issue = entry_point_issue_sentence | trim %}
          {% if issue == "Casey's garage door open" %}
