garbage_recycling_send_reminder:
  alias: Garbage Recycling Send Reminder
  description: Sends Zone 4 garbage and recycling reminders, including early holiday-delay warnings.
  icon: mdi:trash-can-outline
  mode: restart
  fields:
    stage:
      description: Reminder stage, either delay_notice, evening, or morning
      example: evening
    pickup_date:
      description: Actual pickup date from the Zone 4 schedule
      example: "2026-05-14"
  sequence:
    - variables:
        reminder_stage: "{{ stage | default('evening', true) }}"
        pickup: >-
          {% set provided = pickup_date | default('', true) %}
          {{ provided if provided not in ['unknown', 'unavailable', 'none', ''] else states('sensor.garbage_recycling_next_pickup') }}
        pickup_label: "{{ strptime(pickup | trim, '%Y-%m-%d').strftime('%A, %B %-d') }}"
        pickup_day: "{{ strptime(pickup | trim, '%Y-%m-%d').strftime('%A') }}"
        scheduled_thursday: "{{ state_attr('sensor.garbage_recycling_next_pickup', 'scheduled_thursday') | default('', true) }}"
        scheduled_day: >-
          {% if scheduled_thursday not in ['unknown', 'unavailable', 'none', ''] %}
            {{ strptime(scheduled_thursday | trim, '%Y-%m-%d').strftime('%A') }}
          {% else %}
            Thursday
          {% endif %}
        recycling_stream: "{{ state_attr('sensor.garbage_recycling_next_pickup', 'recycling') | default('', true) }}"
        recycling_label: "{{ state_attr('sensor.garbage_recycling_next_pickup', 'recycling_label') | default(recycling_stream, true) }}"
        title_stream: "{{ 'paper recycling' if recycling_stream == 'paper recycling' else 'non-paper recycling' }}"
        notification_emoji: "♻️"
        exception: "{{ state_attr('sensor.garbage_recycling_next_pickup', 'exception') | default('', true) }}"
        notification_tag: "{{ 'garbage-recycling-' ~ (pickup | trim) }}"
        notification_title: >-
          {% if reminder_stage == 'delay_notice' %}
            {{ notification_emoji }} No {{ scheduled_day | trim }} garbage pickup
          {% elif exception | length > 0 %}
            {{ notification_emoji }} Garbage + {{ title_stream }} moved to {{ pickup_day }}
          {% elif reminder_stage == 'morning' %}
            {{ notification_emoji }} Garbage + {{ title_stream }} this morning
          {% else %}
            {{ notification_emoji }} Garbage + {{ title_stream }} tomorrow
          {% endif %}
        notification_message: >-
          {% if reminder_stage == 'delay_notice' %}
            {{ exception }}.
            Do not put bins out tonight for the usual {{ scheduled_day | trim }} pickup.
            Actual pickup is {{ pickup_label }}.
            Put out household garbage plus {{ recycling_label }} after 4:00 PM the day before pickup.
          {% elif exception | length > 0 %}
            {{ exception }}.
            Actual pickup is {{ pickup_label }}.
          {% else %}
            Pickup is {{ pickup_label }}.
          {% endif %}
          Put out household garbage plus {{ recycling_label }}
          {{ 'before 7:00 AM.' if reminder_stage == 'morning' else 'after 4:00 PM tonight.' }}
          Tap Taken out once the bins are at the curb.
    - condition: template
      value_template: >-
        {{ pickup | trim not in ['unknown', 'unavailable', 'none', '']
           and states('input_text.garbage_recycling_last_taken_out_pickup') != (pickup | trim) }}
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ reminder_stage == 'delay_notice' }}"
          sequence:
            - action: script.notify_trevor_phone
              data:
                title: "{{ notification_title | trim }}"
                message: "{{ notification_message | regex_replace('\\s+', ' ') | trim }}"
                data:
                  group: house-care
                  tag: "{{ notification_tag }}"
                  url: /calm-mobile/notices
      default:
        - action: script.notify_trevor_phone
          data:
            title: "{{ notification_title | trim }}"
            message: "{{ notification_message | regex_replace('\\s+', ' ') | trim }}"
            data:
              group: house-care
              tag: "{{ notification_tag }}"
              url: /calm-mobile/notices
              actions:
                - action: GARBAGE_RECYCLING_TAKEN_OUT
                  title: Taken out

garbage_recycling_mark_taken_out:
  alias: Garbage Recycling Mark Taken Out
  description: Marks the current garbage and recycling pickup as taken out and clears the reminder.
  icon: mdi:trash-can-check-outline
  mode: restart
  fields:
    pickup_date:
      description: Actual pickup date being handled
      example: "2026-05-14"
  sequence:
    - variables:
        pickup: >-
          {% set provided = pickup_date | default('', true) %}
          {{ provided if provided not in ['unknown', 'unavailable', 'none', ''] else states('sensor.garbage_recycling_next_pickup') }}
        taken_now: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
    - condition: template
      value_template: "{{ pickup | trim not in ['unknown', 'unavailable', 'none', ''] }}"
    - action: input_text.set_value
      target:
        entity_id: input_text.garbage_recycling_last_taken_out_pickup
      data:
        value: "{{ pickup | trim }}"
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.garbage_recycling_last_taken_out_at
      data:
        datetime: "{{ taken_now }}"
    - action: script.garbage_recycling_clear_notification
      data:
        pickup_date: "{{ pickup | trim }}"

garbage_recycling_clear_notification:
  alias: Garbage Recycling Clear Notification
  description: Clears the active garbage and recycling reminder notification tag.
  icon: mdi:trash-can-check-outline
  mode: restart
  fields:
    pickup_date:
      description: Actual pickup date to clear
      example: "2026-05-14"
  sequence:
    - variables:
        pickup: >-
          {% set provided = pickup_date | default('', true) %}
          {{ provided if provided not in ['unknown', 'unavailable', 'none', ''] else states('input_text.garbage_recycling_last_taken_out_pickup') }}
    - action: script.notify_trevor_phone
      data:
        message: clear_notification
        data:
          tag: "{{ 'garbage-recycling-' ~ (pickup | trim) }}"

property_tax_send_reminder:
  alias: Property Tax Send Reminder
  description: Sends bill-ready and daily due-week property tax reminders.
  icon: mdi:calendar-cash
  mode: restart
  fields:
    tax_type:
      description: Tax type, either school or town
      example: school
    bill_month:
      description: Numeric billing month
      example: 9
    stage:
      description: Reminder stage, either bill_ready or countdown
      example: countdown
    due_date:
      description: Computed due date for this tax bill
      example: "2026-09-30"
  sequence:
    - variables:
        tax_kind: "{{ tax_type | default('town', true) }}"
        month_number: "{{ bill_month | default(4) | int(4) }}"
        reminder_stage: "{{ stage | default('countdown', true) }}"
        bill_year: "{{ now().year }}"
        bill_date: "{{ '%04d-%02d-01' | format(now().year, month_number | int) }}"
        due: >-
          {% set provided_due = due_date | default('', true) %}
          {% if provided_due not in ['unknown', 'unavailable', 'none', ''] %}
            {{ provided_due }}
          {% else %}
            {% set first_next_month = strptime('%04d-%02d-01' | format(now().year, (month_number | int) + 1), '%Y-%m-%d') %}
            {% set last_day = first_next_month - timedelta(days=1) %}
            {% set weekend_offset = 2 if last_day.weekday() == 6 else 1 if last_day.weekday() == 5 else 0 %}
            {{ (last_day - timedelta(days=weekend_offset)).strftime('%Y-%m-%d') }}
          {% endif %}
        tax_label: "{{ 'School' if tax_kind == 'school' else 'Town' }}"
        school_tax_icon: "\U0001F4DA\U0001F4B8"
        town_tax_icon: "\U0001F3DB\U0001F4B8"
        tax_icon: "{{ school_tax_icon if tax_kind == 'school' else town_tax_icon }}"
        bill_month_label: "{{ strptime(bill_date, '%Y-%m-%d').strftime('%B') }}"
        due_label: "{{ strptime(due | trim, '%Y-%m-%d').strftime('%A, %B %-d') }}"
        days_until: >-
          {{ ((as_timestamp(strptime(due | trim, '%Y-%m-%d')) - as_timestamp(today_at('00:00:00'))) / 86400) | int }}
        business_days_until: >-
          {% set due_date = strptime(due | trim, '%Y-%m-%d') %}
          {% set today_date = today_at('00:00:00').replace(tzinfo=None) %}
          {% set days = ((as_timestamp(due_date) - as_timestamp(today_at('00:00:00'))) / 86400) | int %}
          {% set ns = namespace(business_days=0) %}
          {% for offset in range(1, days + 1) %}
            {% set day = today_date + timedelta(days=offset) %}
            {% if day.weekday() < 5 %}
              {% set ns.business_days = ns.business_days + 1 %}
            {% endif %}
          {% endfor %}
          {{ ns.business_days }}
        notification_tag: "{{ 'property-tax-' ~ tax_kind ~ '-' ~ '%02d' | format(month_number | int) }}"
        paid_action: >-
          {% if tax_kind == 'school' and (month_number | int) == 1 %}
            PROPERTY_TAX_SCHOOL_JAN_PAID
          {% elif tax_kind == 'school' and (month_number | int) == 9 %}
            PROPERTY_TAX_SCHOOL_SEP_PAID
          {% else %}
            PROPERTY_TAX_TOWN_APR_PAID
          {% endif %}
        notification_title: >-
          {% if reminder_stage == 'bill_ready' %}
            {{ tax_icon }} {{ tax_label }} tax bill ready
          {% elif days_until <= 0 %}
            {{ tax_icon }} {{ tax_label }} tax due today
          {% else %}
            {{ tax_icon }} {{ tax_label }} tax due in {{ business_days_until }} business day{{ '' if (business_days_until | int) == 1 else 's' }}
          {% endif %}
        notification_message: >-
          {% if reminder_stage == 'bill_ready' %}
            The {{ tax_label | lower }} tax bill should be available.
            It is due {{ due_label | trim }}, the last business day of {{ bill_month_label }}.
            Pay it or schedule it, then tap Paid.
          {% elif days_until <= 0 %}
            The {{ tax_label | lower }} tax bill is due today.
            Tap Paid once the payment is submitted so Home Assistant stops the reminders and house-manager logs it.
          {% else %}
            The {{ tax_label | lower }} tax bill is due in {{ business_days_until }} business day{{ '' if (business_days_until | int) == 1 else 's' }},
            on {{ due_label | trim }}.
            Tap Paid once the payment is submitted so Home Assistant stops the reminders and house-manager logs it.
          {% endif %}
    - condition: template
      value_template: >-
        {{ reminder_stage != 'countdown'
           or (
             now().weekday() < 5
             and (days_until | int) >= 0
             and (days_until | int) <= 10
             and (business_days_until | int) <= 5
           ) }}
    - action: script.notify_trevor_phone
      data:
        title: "{{ notification_title | trim }}"
        message: "{{ notification_message | regex_replace('\\s+', ' ') | trim }}"
        data:
          group: property-tax
          tag: "{{ notification_tag }}"
          url: https://northcastle.municipaltaxpayments.com/
          actions:
            - action: "{{ paid_action | trim }}"
              title: Paid

property_tax_mark_paid:
  alias: Property Tax Mark Paid
  description: Stamps a property tax bill as paid and sends the payment event to house-manager.
  icon: mdi:cash-check
  mode: restart
  fields:
    tax_type:
      description: Tax type, either school or town
      example: town
    bill_month:
      description: Numeric billing month
      example: 4
    due_date:
      description: Computed due date for this tax bill
      example: "2026-04-30"
  sequence:
    - variables:
        tax_kind: "{{ tax_type | default('town', true) }}"
        month_number: "{{ bill_month | default(4) | int(4) }}"
        paid_now: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
        paid_today: "{{ now().strftime('%Y-%m-%d') }}"
        due: >-
          {% set provided_due = due_date | default('', true) %}
          {% if provided_due not in ['unknown', 'unavailable', 'none', ''] %}
            {{ provided_due }}
          {% else %}
            {% set first_next_month = strptime('%04d-%02d-01' | format(now().year, (month_number | int) + 1), '%Y-%m-%d') %}
            {% set last_day = first_next_month - timedelta(days=1) %}
            {% set weekend_offset = 2 if last_day.weekday() == 6 else 1 if last_day.weekday() == 5 else 0 %}
            {{ (last_day - timedelta(days=weekend_offset)).strftime('%Y-%m-%d') }}
          {% endif %}
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ tax_kind == 'school' and (month_number | int) == 1 }}"
          sequence:
            - action: input_datetime.set_datetime
              target:
                entity_id: input_datetime.school_tax_january_last_paid_at
