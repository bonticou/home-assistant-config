water_send_alert:
  alias: Water Send Alert
  description: Sends water alerts with consistent titles, tags, grouping, and urgency.
  icon: mdi:water-alert
  mode: parallel
  fields:
    alert_kind:
      description: Type of water alert to send
      example: low_pressure
    message:
      description: Notification body text
    severity:
      description: Optional severity override
      example: critical
  sequence:
    - variables:
        kind: "{{ alert_kind | default('status') }}"
        notification_message: "{{ message | default('', true) }}"
        alert_label: >-
          {% if kind == 'overnight_flow' %}
            Overnight flow
          {% elif kind == 'sustained_flow' %}
            Sustained flow
          {% elif kind == 'burst_day' %}
            Daytime burst
          {% elif kind == 'burst_night' %}
            Overnight burst
          {% elif kind == 'pressure_drop' %}
            Pressure drop
          {% elif kind == 'low_pressure' %}
            Low pressure
          {% elif kind == 'low_pressure_persistent' %}
            Low pressure
          {% elif kind == 'low_pressure_very_low' %}
            Very low pressure
          {% elif kind == 'low_pressure_urgent' %}
            Very low pressure
          {% elif kind == 'high_pressure' %}
            High pressure
          {% elif kind == 'usage_high' %}
            High usage
          {% elif kind == 'leak' %}
            Leak detected
          {% elif kind == 'valve_closed' %}
            Valve closed
          {% elif kind == 'flo_system' %}
            Flo system alert
          {% else %}
            Water update
          {% endif %}
        expected_action: >-
          {{ 'WATER_LOW_PRESSURE_EXPECTED'
             if kind in ['low_pressure', 'low_pressure_persistent']
             else 'WATER_OVERNIGHT_FLOW_EXPECTED'
             if kind == 'overnight_flow'
             else 'WATER_SUSTAINED_FLOW_EXPECTED' }}
        resolved_severity: >-
          {% if severity is defined and severity | default('', true) != '' %}
            {{ severity }}
          {% elif kind in ['burst_day', 'burst_night', 'leak', 'valve_closed', 'low_pressure_urgent'] %}
            critical
          {% else %}
            warning
          {% endif %}
        notification_title: >-
          {% if kind == 'overnight_flow' %}
            🌙 Water running overnight?
          {% elif kind == 'sustained_flow' %}
            🚰 Water still running?
          {% elif kind == 'burst_day' %}
            🚨 Very high water flow
          {% elif kind == 'burst_night' %}
            🚨 Water burst overnight
          {% elif kind == 'pressure_drop' %}
            📉 Sudden water pressure drop
          {% elif kind == 'low_pressure' %}
            🚿 Low water pressure?
          {% elif kind == 'low_pressure_persistent' %}
            🚿 Low pressure still active
          {% elif kind == 'low_pressure_very_low' %}
            ⚠️ Very low water pressure
          {% elif kind == 'low_pressure_urgent' %}
            🚨 Very low pressure still active
          {% elif kind == 'high_pressure' %}
            📈 High water pressure
          {% elif kind == 'usage_high' %}
            💧 High water usage today
          {% elif kind == 'leak' %}
            💦 Leak detected
          {% elif kind == 'valve_closed' %}
            🛑 Water shutoff valve closed
          {% elif kind == 'flo_system' %}
            ⚠️ Flo system alert
          {% else %}
            💧 Water update
          {% endif %}
        event_at: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
        event_domain: >-
          {% if kind in ['overnight_flow', 'sustained_flow', 'burst_day', 'burst_night'] %}
            flow
          {% elif kind in ['pressure_drop', 'low_pressure', 'low_pressure_persistent', 'low_pressure_very_low', 'low_pressure_urgent', 'high_pressure'] %}
            pressure
          {% elif kind == 'leak' %}
            leak
          {% elif kind in ['valve_closed', 'flo_system'] %}
            valve
          {% elif kind == 'usage_high' %}
            usage
          {% else %}
            water
          {% endif %}
        current_flow: "{{ states('sensor.flo_shutoff_water_flow_rate') | float(0) | round(2) }}"
        current_pressure: "{{ states('sensor.flo_shutoff_water_pressure') | float(0) | round(0) }}"
        current_usage: "{{ states('sensor.flo_shutoff_today_s_water_usage') | float(0) | round(0) }}"
        valve_label: "{{ 'closed' if is_state('switch.flo_shutoff_shutoff_valve', 'off') else 'open' }}"
        leak_zones: >-
          {% set zones = expand([
            'binary_sensor.kitchen_sink_leak_detection_water_detected',
            'binary_sensor.island_sink_leak_detection_water_detected',
            'binary_sensor.dishwasher_leak_detection_water_detected',
            'binary_sensor.kitchen_fridge_leak_detection_water_detected',
            'binary_sensor.washing_machine_leak_detection_water_detected',
            'binary_sensor.laundry_sink_leak_detection_water_detected',
            'binary_sensor.mechanical_room_leak_detection_water_detected',
            'binary_sensor.electrical_room_leak_detection_water_detected',
            'binary_sensor.basement_ejector_leak_detection_water_detected'
          ]) | selectattr('state', 'eq', 'on') | map(attribute='name') | list %}
          {{ zones | join(', ') if zones else 'No leak sensors active' }}
        event_note: >-
          {% set domain = event_domain | trim %}
          {% if domain == 'flow' %}
            Flow {{ current_flow }} gal/min with pressure at {{ current_pressure }} psi.
            {% if kind == 'overnight_flow' %}Sustained quiet overnight flow for 10+ minutes.
            {% elif kind == 'sustained_flow' %}Sustained daytime flow for 20+ minutes.
            {% elif kind == 'burst_day' %}Daytime burst above the high-flow threshold.
            {% else %}Overnight burst above the high-flow threshold.{% endif %}
          {% elif domain == 'pressure' %}
            Pressure {{ current_pressure }} psi with flow at {{ current_flow }} gal/min.
            {% if kind == 'high_pressure' %}Above the high-pressure threshold.
            {% elif kind == 'low_pressure_urgent' %}Very low pressure persisted for 20+ minutes.
            {% elif kind == 'low_pressure_very_low' %}Very low pressure persisted for 10+ minutes.
            {% elif kind == 'low_pressure_persistent' %}Low pressure persisted for 30+ minutes.
            {% else %}Low pressure persisted for 10+ minutes.{% endif %}
          {% elif domain == 'leak' %}
            {{ leak_zones }}. Valve is {{ valve_label }}; flow {{ current_flow }} gal/min.
          {% elif domain == 'valve' %}
            Valve is {{ valve_label }}; flow {{ current_flow }} gal/min and pressure {{ current_pressure }} psi.
          {% elif domain == 'usage' %}
            {{ current_usage }} gal used today at alert time; current flow {{ current_flow }} gal/min.
          {% else %}
            {{ notification_message | regex_replace('\s+', ' ') | trim }}
          {% endif %}
    - action: input_text.set_value
      target:
        entity_id: input_text.water_latest_alert_kind
      data:
        value: "{{ kind }}"
    - action: input_text.set_value
      target:
        entity_id: input_text.water_latest_alert_label
      data:
        value: "{{ alert_label | trim }}"
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.water_latest_alert_at
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
    - event: water_alert_recorded
      event_data:
        at: "{{ event_at }}"
        domain: "{{ event_domain | trim }}"
        kind: "{{ kind }}"
        label: "{{ alert_label | trim }}"
        severity: "{{ resolved_severity | trim }}"
        note: "{{ event_note | regex_replace('\\s+', ' ') | trim }}"
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ kind in ['overnight_flow', 'sustained_flow', 'burst_day', 'burst_night'] }}"
          sequence:
            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.water_flow_alert_active
        - conditions:
            - condition: template
              value_template: "{{ kind in ['pressure_drop', 'low_pressure', 'low_pressure_persistent', 'low_pressure_very_low', 'low_pressure_urgent', 'high_pressure'] }}"
          sequence:
            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.water_pressure_alert_active
        - conditions:
            - condition: template
              value_template: "{{ kind == 'usage_high' }}"
          sequence:
            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.water_usage_alert_active
        - conditions:
            - condition: template
              value_template: "{{ kind == 'leak' }}"
          sequence:
            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.water_leak_alert_active
        - conditions:
            - condition: template
              value_template: "{{ kind in ['valve_closed', 'flo_system'] }}"
          sequence:
            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.water_valve_alert_active
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ resolved_severity | trim == 'critical' }}"
          sequence:
            - action: script.notify_trevor_phone
              data:
                title: "{{ notification_title }}"
                message: "{{ notification_message }}"
                data:
                  group: water
                  tag: "water-{{ kind }}"
                  url: /calm-mobile/water
                  sticky: true
                  ttl: 0
                  priority: high
      default:
        - choose:
            - conditions:
                - condition: template
                  value_template: "{{ kind in ['overnight_flow', 'sustained_flow', 'low_pressure', 'low_pressure_persistent'] }}"
              sequence:
                - action: script.notify_trevor_phone
                  data:
                    title: "{{ notification_title }}"
                    message: "{{ notification_message }}"
                    data:
                      group: water
                      tag: "water-{{ kind }}"
                      url: /calm-mobile/water
                      sticky: false
                      actions:
                        - action: "{{ expected_action }}"
                          title: Expected
                        - action: URI
                          title: Open Water
                          uri: /calm-mobile/water
          default:
            - action: script.notify_trevor_phone
              data:
                title: "{{ notification_title }}"
                message: "{{ notification_message }}"
                data:
                  group: water
                  tag: "water-{{ kind }}"
                  url: /calm-mobile/water
                  sticky: false

