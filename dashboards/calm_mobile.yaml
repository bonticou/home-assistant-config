        title: Flow Guard
        dismiss_icon: mdi:close
        initial_style: wide
        popup_styles: *calm_popup_styles
        card:
          type: vertical-stack
          cards:
            - type: custom:mushroom-template-card
              entity: automation.water_overnight_continuous_flow_running_toilet
              primary: >-
                {{ 'Armed'
                   if is_state('automation.water_overnight_continuous_flow_running_toilet', 'on')
                   and is_state('automation.water_daytime_sustained_low_flow', 'on')
                   and is_state('automation.water_high_flow_burst_daytime', 'on')
                   and is_state('automation.water_high_flow_burst_overnight', 'on')
                   else 'Disabled' }}
              secondary: >-
                Watches quiet overnight flow, sustained daytime flow, and high-flow bursts.
              icon: mdi:shield-water-outline
              icon_color: >-
                {{ 'teal'
                   if is_state('automation.water_overnight_continuous_flow_running_toilet', 'on')
                   and is_state('automation.water_daytime_sustained_low_flow', 'on')
                   and is_state('automation.water_high_flow_burst_daytime', 'on')
                   and is_state('automation.water_high_flow_burst_overnight', 'on')
                   else 'grey' }}
              fill_container: true
              tap_action:
                action: none
              card_mod:
                style: *calm_popup_hero_style
            - type: custom:mushroom-chips-card
              alignment: left
              chips:
                - type: template
                  entity: automation.water_overnight_continuous_flow_running_toilet
                  icon: mdi:power
                  icon_color: >-
                    {{ 'teal'
                       if is_state('automation.water_overnight_continuous_flow_running_toilet', 'on')
                       and is_state('automation.water_daytime_sustained_low_flow', 'on')
                       and is_state('automation.water_high_flow_burst_daytime', 'on')
                       and is_state('automation.water_high_flow_burst_overnight', 'on')
                       else 'grey' }}
                  content: >-
                    {{ 'Active'
                       if is_state('automation.water_overnight_continuous_flow_running_toilet', 'on')
                       and is_state('automation.water_daytime_sustained_low_flow', 'on')
                       and is_state('automation.water_high_flow_burst_daytime', 'on')
                       and is_state('automation.water_high_flow_burst_overnight', 'on')
                       else 'Disabled' }}
                  tap_action:
                    action: none
                - type: template
                  entity: sensor.water_guard_flow_events
                  icon: mdi:history
                  icon_color: blue-grey
                  content: >-
                    {% set ts = states('sensor.water_guard_flow_events') %}
                    {{ 'Last alert ' ~ relative_time(as_datetime(ts)) ~ ' ago'
                       if ts not in ['unknown', 'unavailable', 'none', ''] else 'No alerts recorded' }}
                  tap_action:
                    action: none
              card_mod:
                style: *calm_popup_chip_style
            - type: custom:button-card
              entity: sensor.water_guard_flow_events
              variables:
                empty_text: No flow alerts logged yet.
              show_icon: false
              show_name: false
              show_state: false
              tap_action:
                action: none
              custom_fields:
                log: &water_guard_event_log_field >-
                  [[[
                    const raw = entity?.attributes?.events_json || [];
                    let events = Array.isArray(raw) ? raw : [];
                    if (!Array.isArray(raw)) {
                      try {
                        const parsed = JSON.parse(raw);
                        events = Array.isArray(parsed) ? parsed : [];
                      } catch (e) {
                        events = [];
                      }
                    }
                    const escapeHtml = (value) => String(value ?? '').replace(/[&<>"']/g, (char) => ({
                      '&': '&amp;',
                      '<': '&lt;',
                      '>': '&gt;',
                      '"': '&quot;',
                      "'": '&#39;'
                    }[char]));
                    const parseDate = (value) => {
                      const parsed = new Date(String(value || '').replace(' ', 'T'));
                      return Number.isNaN(parsed.getTime()) ? null : parsed;
                    };
                    const relative = (date) => {
                      if (!date) return '';
                      const minutes = Math.max(0, Math.round((Date.now() - date.getTime()) / 60000));
                      if (minutes < 1) return 'just now';
                      if (minutes < 60) return `${minutes}m ago`;
                      const hours = Math.round(minutes / 60);
                      if (hours < 24) return `${hours}h ago`;
                      return `${Math.round(hours / 24)}d ago`;
                    };
                    const when = (date) => date
                      ? date.toLocaleString(undefined, { weekday: 'short', hour: 'numeric', minute: '2-digit' })
                      : 'Unknown time';
                    const cutoff = Date.now() - (7 * 24 * 60 * 60 * 1000);
                    const weekEvents = events.filter((event) => {
                      const date = parseDate(event.at);
                      return date && date.getTime() >= cutoff;
                    });
                    const rows = weekEvents.map((event, index) => {
                      const date = parseDate(event.at);
                      const severity = event.severity === 'critical'
                        ? 'critical'
                        : event.severity === 'info' ? 'info' : 'watch';
                      const severityLabel = severity === 'critical'
                        ? 'Critical'
                        : severity === 'info' ? 'Info' : 'Watch';
                      const timeText = [when(date), relative(date)].filter(Boolean).join(' · ');
                      return `
                        <div class="event-row${index === 0 ? ' first' : ''}">
                          <div class="event-dot ${severity}"></div>
                          <div class="event-body">
                            <div class="event-top">
                              <span class="event-label">${escapeHtml(event.label || 'Water alert')}</span>
                              <span class="event-time">${escapeHtml(timeText)}</span>
                            </div>
                            <div class="event-note">${escapeHtml(event.note || 'No detail logged.')}</div>
                          </div>
                          <div class="event-pill ${severity}">${severityLabel}</div>
                        </div>`;
                    }).join('');
                    return `
                      <div class="event-log">
                        <div class="event-title">Alert history <span>7 days</span></div>
                        ${weekEvents.length ? rows : `<div class="event-empty">${escapeHtml(variables.empty_text || 'No alerts logged yet.')}</div>`}
                      </div>`;
                  ]]]
              styles: &water_guard_event_log_styles
                card:
                  - padding: 14px
                  - border-radius: 16px
                  - box-shadow: none
                  - background: rgba(15, 23, 42, 0.48)
                  - border: 1px solid rgba(148, 163, 184, 0.14)
                grid:
                  - grid-template-areas: '"log"'
                  - grid-template-columns: minmax(0, 1fr)
                custom_fields:
                  log:
                    - grid-area: log
                    - min-width: 0
              extra_styles: &water_guard_event_log_extra |
                .event-log {
                  letter-spacing: 0;
                  text-align: left;
                }
                .event-title {
                  align-items: baseline;
                  color: rgba(248, 250, 252, 0.94);
                  display: flex;
                  font-size: 14px;
                  font-weight: 650;
                  gap: 8px;
                  justify-content: space-between;
                  line-height: 1.2;
                  margin-bottom: 10px;
                }
                .event-title span {
                  color: rgba(203, 213, 225, 0.62);
                  font-size: 11px;
                  font-weight: 600;
                  text-transform: uppercase;
                }
                .event-empty {
                  color: rgba(203, 213, 225, 0.74);
                  font-size: 12px;
                  line-height: 1.35;
                }
                .event-row {
                  align-items: flex-start;
                  border-top: 1px solid rgba(148, 163, 184, 0.10);
                  column-gap: 10px;
                  display: grid;
                  grid-template-columns: 8px minmax(0, 1fr) auto;
                  padding: 9px 0 0;
                  margin-top: 9px;
                }
                .event-row.first {
                  border-top: 0;
                  margin-top: 0;
                  padding-top: 0;
                }
                .event-dot {
                  border-radius: 999px;
                  height: 8px;
                  margin-top: 5px;
                  width: 8px;
                }
                .event-dot.watch {
                  background: #2dd4bf;
                }
                .event-dot.info {
                  background: #94a3b8;
                }
                .event-dot.critical {
                  background: #fb7185;
                }
                .event-body {
                  min-width: 0;
                }
                .event-top {
                  align-items: baseline;
                  display: flex;
                  gap: 8px;
                  justify-content: space-between;
                  min-width: 0;
                }
                .event-label {
                  color: rgba(248, 250, 252, 0.92);
                  font-size: 12px;
                  font-weight: 650;
                  line-height: 1.25;
                  min-width: 0;
                  overflow: hidden;
                  text-overflow: ellipsis;
                  white-space: nowrap;
                }
                .event-time {
                  color: rgba(203, 213, 225, 0.66);
                  flex: 0 0 auto;
                  font-size: 11px;
                  line-height: 1.25;
                }
                .event-note {
                  color: rgba(203, 213, 225, 0.78);
                  font-size: 11px;
                  line-height: 1.35;
                  margin-top: 3px;
                }
                .event-pill {
                  border-radius: 999px;
                  font-size: 10px;
                  font-weight: 650;
                  line-height: 1;
                  padding: 4px 7px;
                  text-transform: uppercase;
                }
                .event-pill.watch {
                  background: rgba(45, 212, 191, 0.12);
                  color: #5eead4;
                }
                .event-pill.info {
                  background: rgba(148, 163, 184, 0.12);
                  color: #cbd5e1;
                }
                .event-pill.critical {
                  background: rgba(251, 113, 133, 0.13);
                  color: #fecdd3;
                }
                @media (max-width: 380px) {
                  .event-row {
                    grid-template-columns: 8px minmax(0, 1fr);
                  }
                  .event-pill {
                    grid-column: 2;
                    justify-self: start;
                    margin-top: 6px;
                  }
                  .event-top {
                    display: block;
                  }
                  .event-time {
                    display: block;
                    margin-top: 2px;
                  }
                }

