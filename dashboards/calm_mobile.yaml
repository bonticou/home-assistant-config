              font-size: 28px !important;
              font-weight: 560 !important;
              letter-spacing: 0;
              color: rgba(15, 23, 42, 0.92) !important;
            }
            .secondary {
              font-size: 14px !important;
              line-height: 1.5 !important;
              opacity: 1 !important;
              color: rgba(30, 41, 59, 0.78) !important;
            }

