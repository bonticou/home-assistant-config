              position: absolute;
              top: 42px;
              left: 18px;
              right: 18px;
              color: rgba(226, 232, 240, 0.64);
              font-size: 12px;
              line-height: 1.25;
              font-weight: 400;
              letter-spacing: 0;
              pointer-events: none;
              z-index: 1;
