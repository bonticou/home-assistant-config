                    color: #f8fafc !important;
                    font-size: 48px !important;
                    line-height: 0.95 !important;
                    font-weight: 500 !important;
                    letter-spacing: -0.05em;
                    margin-bottom: 6px !important;
                  }
                  .secondary {
                    color: rgba(226, 232, 240, 0.86) !important;
                    font-size: 14px !important;
                    line-height: 1.45 !important;
                    opacity: 1 !important;
                    max-width: 28rem;
                  }
            - type: custom:mushroom-chips-card
              alignment: left
              chips:
                - type: template
                  entity: sun.sun
                  icon: mdi:weather-sunset-up
                  icon_color: amber
                  content: >-
                    Sunrise {{ as_timestamp(state_attr('sun.sun', 'next_rising')) | timestamp_custom('%-I:%M %p') }}
                  tap_action:
                    action: none
                - type: template
                  entity: sun.sun
                  icon: mdi:weather-sunset-down
                  icon_color: deep-orange
                  content: >-
                    Sunset {{ as_timestamp(state_attr('sun.sun', 'next_setting')) | timestamp_custom('%-I:%M %p') }}
                  tap_action:
                    action: none
                - type: template
                  entity: sun.sun
                  icon: mdi:white-balance-sunny
                  icon_color: yellow
                  content: >-
                    {% set sunrise = as_timestamp(state_attr('sun.sun', 'next_rising')) %}
                    {% set sunset = as_timestamp(state_attr('sun.sun', 'next_setting')) %}
                    {% if is_state('sun.sun', 'above_horizon') %}
                      {% set daylight = sunset - (sunrise - 86400) %}
                    {% else %}
                      {% set daylight = sunset - sunrise %}
                    {% endif %}
                    {% set hours = (daylight // 3600) | int(0) %}
                    {% set minutes = ((daylight % 3600) // 60) | int(0) %}
                    {{ hours }}h {{ '%02d' | format(minutes) }}m daylight
                  tap_action:
                    action: none
                - type: template
                  entity: weather.forecast_home
                  icon: mdi:update
                  icon_color: blue-grey
                  content: >-
                    Updated {{ relative_time(states['weather.forecast_home'].last_changed) }} ago
                  tap_action:
                    action: none
              card_mod:
                style: &calm_popup_chip_style |
                  ha-card {
                    border: none;
                    box-shadow: none;
                    margin: -2px 0 2px;
                    --chip-spacing: 10px;
                  }
                  mushroom-template-chip {
                    --chip-background: rgba(15, 23, 42, 0.58);
                    --chip-border-width: 1px;
                    --chip-border-color: rgba(148, 163, 184, 0.18);
                    --chip-box-shadow: none;
                    --primary-text-color: #cbd5e1;
                  }
            - type: grid
              columns: 2
              square: false
              cards:
                - type: custom:button-card
                  entity: weather.forecast_home
                  show_icon: false
                  show_name: false
                  show_state: false
                  custom_fields:
                    icon: >-
                      [[[
                        return `<div class="weather-mini-icon"><ha-icon icon="mdi:thermometer" style="color:#f59e0b"></ha-icon></div>`;
                      ]]]
                    text: >-
                      [[[
                        const apparent = entity.attributes.apparent_temperature;
                        const temp = Math.round(Number(apparent ?? entity.attributes.temperature ?? 0));
                        return `<div class="weather-mini-label">Feels Like</div><div class="weather-mini-value">${temp}°</div>`;
                      ]]]
                  tap_action:
                    action: none
                  styles: &calm_weather_mini_tile_styles
                    card:
                      - height: 56px
                      - padding: 0 12px
                      - border-radius: 20px
                      - border: 1px solid rgba(148, 163, 184, 0.18)
                      - box-shadow: 0 10px 20px rgba(2, 8, 23, 0.18)
                      - background: linear-gradient(180deg, rgba(15, 23, 42, 0.78), rgba(30, 41, 59, 0.72))
                      - text-align: left
                      - overflow: hidden
                    grid:
                      - grid-template-areas: '"icon text"'
                      - grid-template-columns: 28px minmax(0, 1fr)
                      - column-gap: 10px
                      - align-items: center
                    custom_fields:
                      icon:
                        - grid-area: icon
                        - justify-self: start
                        - align-self: center
                      text:
                        - grid-area: text
                        - justify-self: start
                        - align-self: center
                        - min-width: 0
                  extra_styles: &calm_weather_mini_tile_extra |
                    .weather-mini-icon {
                      width: 28px;
                      height: 28px;
                      border-radius: 999px;
                      background: rgba(255, 255, 255, 0.08);
                      display: grid;
                      place-items: center;
                      line-height: 0;
                    }
                    .weather-mini-icon ha-icon {
                      display: block;
                      width: 16px;
                      height: 16px;
                      --mdc-icon-size: 16px;
                    }
                    .weather-mini-label {
                      color: rgba(226, 232, 240, 0.76);
                      font-size: 11px;
                      font-weight: 600;
                      line-height: 1;
                      text-transform: uppercase;
                      letter-spacing: 0.08em;
                    }
                    .weather-mini-value {
                      color: #f8fafc;
                      font-size: 14px;
                      font-weight: 520;
                      line-height: 1.15;
                      margin-top: 3px;
                      white-space: nowrap;
                      overflow: hidden;
                      text-overflow: ellipsis;
                    }
                - type: custom:button-card
                  entity: weather.forecast_home
                  show_icon: false
                  show_name: false
                  show_state: false
                  custom_fields:
                    icon: >-
                      [[[
                        return `<div class="weather-mini-icon"><ha-icon icon="mdi:water-percent" style="color:#7dd3fc"></ha-icon></div>`;
                      ]]]
                    text: >-
                      [[[
                        const humidity = Math.round(Number(entity.attributes.humidity ?? 0));
                        let label = 'Comfortable';
                        if (humidity < 30) label = 'Dry';
                        else if (humidity >= 75) label = 'Heavy';
                        else if (humidity >= 60) label = 'Humid';
                        return `<div class="weather-mini-label">Humidity</div><div class="weather-mini-value">${humidity}% · ${label}</div>`;
                      ]]]
                  tap_action:
                    action: none
                  styles:
                    <<: *calm_weather_mini_tile_styles
                  extra_styles: *calm_weather_mini_tile_extra
                - type: custom:button-card
                  entity: weather.forecast_home
                  show_icon: false
                  show_name: false
                  show_state: false
                  custom_fields:
                    icon: >-
                      [[[
                        return `<div class="weather-mini-icon"><ha-icon icon="mdi:weather-windy" style="color:#5eead4"></ha-icon></div>`;
                      ]]]
                    text: >-
                      [[[
                        const speed = Number(entity.attributes.wind_speed ?? 0);
                        const bearing = entity.attributes.wind_bearing;
                        const dirs = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW', 'N'];
                        const direction = bearing == null ? '' : ` ${dirs[Math.floor((Number(bearing) + 22.5) / 45)]}`;
                        const value = speed < 1 ? 'Calm' : `${Math.round(speed)} mph${direction}`;
                        return `<div class="weather-mini-label">Wind</div><div class="weather-mini-value">${value}</div>`;
                      ]]]
                  tap_action:
                    action: none
                  styles:
                    <<: *calm_weather_mini_tile_styles
                  extra_styles: *calm_weather_mini_tile_extra
                - type: custom:button-card
                  entity: sun.sun
                  show_icon: false
                  show_name: false
                  show_state: false
                  custom_fields:
                    icon: >-
                      [[[
                        const above = entity.state === 'above_horizon';
                        const icon = above ? 'mdi:weather-sunset-down' : 'mdi:weather-sunset-up';
                        const color = above ? '#f59e0b' : '#fb923c';
                        return `<div class="weather-mini-icon"><ha-icon icon="${icon}" style="color:${color}"></ha-icon></div>`;
                      ]]]
                    text: >-
                      [[[
                        const above = entity.state === 'above_horizon';
                        const raw = above ? entity.attributes.next_setting : entity.attributes.next_rising;
                        const label = above ? 'Next Light' : 'Next Light';
                        const formatted = raw
                          ? new Date(raw).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })
                          : 'Unavailable';
                        const prefix = above ? 'Sunset' : 'Sunrise';
                        return `<div class="weather-mini-label">${label}</div><div class="weather-mini-value">${prefix} ${formatted}</div>`;
                      ]]]
                  tap_action:
                    action: none
                  styles:
                    <<: *calm_weather_mini_tile_styles
                  extra_styles: *calm_weather_mini_tile_extra
      - type: custom:popup-card
