        initial_style: wide
        popup_styles: *calm_popup_styles
        card:
          type: vertical-stack
          cards:
            - type: custom:mushroom-title-card
              title: Sun schedules
            - type: custom:mushroom-template-card
              entity: sensor.lighting_evening_on_schedule_elevation_threshold
              primary: Evening turns on
              secondary: >-
                {% set base = state_attr('sensor.lighting_evening_on_schedule_elevation_threshold', 'base_elevation') | float(10) %}
                {% set adjustment = state_attr('sensor.lighting_evening_on_schedule_elevation_threshold', 'weather_adjustment') | float(0) %}
                {% set threshold = states('sensor.lighting_evening_on_schedule_elevation_threshold') | float(base) %}
                {% set summary = state_attr('sensor.lighting_evening_on_schedule_elevation_threshold', 'summary') | default('Baseline evening threshold', true) %}
                Baseline {{ base | round(0) }}°
                {% if adjustment > 0 %}+ {{ adjustment | round(0) }}° weather nudge
                {% elif adjustment < 0 %}- {{ (adjustment | abs) | round(0) }}° clear-day nudge
                {% else %}+ 0° weather nudge{% endif %}
                • On below {{ threshold | round(0) }}°
                • {{ summary }}
              multiline_secondary: true
              icon: mdi:weather-sunset
              icon_color: >-
                {% set adjustment = state_attr('sensor.lighting_evening_on_schedule_elevation_threshold', 'weather_adjustment') | float(0) %}
                {% if adjustment > 0 %}blue
                {% elif adjustment < 0 %}amber
                {% else %}grey{% endif %}
              tap_action:
                action: none
              hold_action:
                action: none
              double_tap_action:
                action: none
              card_mod:
                style: *lights_compact_card_style
            - type: custom:mushroom-template-card
              entity: sensor.lighting_morning_off_schedule_elevation_threshold
              primary: Morning turns off
              secondary: >-
