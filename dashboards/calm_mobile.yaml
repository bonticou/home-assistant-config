      - type: custom:apexcharts-card
        graph_span: 7d
        span:
          end: day
        header:
          show: false
        apex_config:
          chart:
            height: 224
            type: line
            parentHeightOffset: 0
            toolbar:
              show: false
          plotOptions:
            bar:
              borderRadius: 7
              borderRadiusApplication: end
              columnWidth: 34%
          dataLabels:
            enabled: false
          stroke:
            curve: straight
            width:
              - 0
              - 2
            dashArray:
              - 0
              - 5
          fill:
            opacity:
              - 0.82
              - 1
            type:
              - gradient
              - solid
            gradient:
              shade: dark
              type: vertical
              opacityFrom: 0.95
              opacityTo: 0.58
          grid:
            borderColor: rgba(148, 163, 184, 0.10)
            strokeDashArray: 4
            padding:
              top: 8
              right: 10
              bottom: 4
              left: 2
          legend:
            show: true
            position: top
            horizontalAlign: left
            fontSize: 11px
            labels:
              colors: rgba(226, 232, 240, 0.64)
            markers:
              width: 7
              height: 7
              radius: 7
          markers:
            size:
              - 0
              - 0
          states:
            hover:
              filter:
                type: lighten
                value: 0.08
          tooltip:
            theme: dark
            shared: true
            intersect: false
            x:
              formatter: |
                EVAL:function(value, opts) {
                  const seriesIndex = opts?.seriesIndex ?? 0;
                  const dataPointIndex = opts?.dataPointIndex ?? 0;
                  const source = opts?.w?.globals?.seriesX?.[seriesIndex]?.[dataPointIndex] ?? value;
                  const numeric = typeof source === 'number' ? source : Number(source);
                  const date = Number.isFinite(numeric) ? new Date(numeric) : new Date(source);
                  if (Number.isNaN(date.getTime())) return value ?? '';
                  const today = new Date();
                  const isToday = date.getFullYear() === today.getFullYear()
                    && date.getMonth() === today.getMonth()
                    && date.getDate() === today.getDate();
                  const weekday = date.toLocaleDateString(undefined, { weekday: 'short' });
                  const day = isToday ? `Today (${weekday})` : weekday;
                  const month = date.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
                  return `${day}, ${month}`;
                }
            'y':
              formatter: |
                EVAL:function(value) {
                  const numeric = Number(value);
                  return Number.isFinite(numeric) ? `${Math.round(numeric)} gal` : value;
                }
          xaxis:
            tickAmount: 7
            axisBorder:
              show: false
            axisTicks:
              show: false
            labels:
              datetimeUTC: false
              hideOverlappingLabels: false
              maxHeight: 38
              rotate: 0
              showDuplicates: true
              trim: false
              formatter: |
                EVAL:function(value, timestamp) {
                  const source = timestamp ?? value;
                  const numeric = typeof source === 'number' ? source : Number(source);
                  const date = Number.isFinite(numeric) ? new Date(numeric) : new Date(source);
                  if (Number.isNaN(date.getTime())) return value ?? '';
                  const today = new Date();
                  today.setHours(0, 0, 0, 0);
                  const tomorrow = new Date(today);
                  tomorrow.setDate(tomorrow.getDate() + 1);
                  if (date >= tomorrow) return '';
                  if (date.getFullYear() === today.getFullYear()
                    && date.getMonth() === today.getMonth()
                    && date.getDate() === today.getDate()) {
                    return 'Today';
                  }
                  return date.toLocaleDateString(undefined, { weekday: 'short' });
                }
              style:
                colors: rgba(226, 232, 240, 0.74)
                fontSize: 11px
                fontWeight: 500
        yaxis:
          - min: 0
            max: "~400"
            align_to: 100
            decimals: 0
            apex_config:
              tickAmount: 4
        series:
          - entity: sensor.flo_shutoff_today_s_water_usage
            name: Daily total
            type: column
            color: '#60a5fa'
            stroke_width: 0
            float_precision: 0
            data_generator: |
              const entityId = entity.entity_id || 'sensor.flo_shutoff_today_s_water_usage';
              const dayMs = 24 * 60 * 60 * 1000;
              const today = new Date();
              today.setHours(0, 0, 0, 0);
              const firstDay = new Date(today);
              firstDay.setDate(firstDay.getDate() - 6);
              const spanEnd = new Date(today.getTime() + dayMs);
              const path = `history/period/${firstDay.toISOString()}?filter_entity_id=${encodeURIComponent(entityId)}&end_time=${encodeURIComponent(spanEnd.toISOString())}`;
              const response = await hass.callApi('GET', path);
              const rows = Array.isArray(response?.[0]) ? response[0] : [];
              const keyFor = (date) => [
                date.getFullYear(),
                String(date.getMonth() + 1).padStart(2, '0'),
                String(date.getDate()).padStart(2, '0')
              ].join('-');
              const buckets = new Map();
              for (const row of rows) {
                const value = Number(row.state);
                if (!Number.isFinite(value)) continue;
                const changed = row.last_changed || row.last_updated;
                const date = new Date(changed);
                if (Number.isNaN(date.getTime())) continue;
                const key = keyFor(date);
                const previous = buckets.get(key);
                buckets.set(key, previous === undefined ? value : Math.max(previous, value));
              }
              const current = Number(entity.state);
              if (Number.isFinite(current)) {
                const key = keyFor(today);
                const previous = buckets.get(key);
                buckets.set(key, previous === undefined ? current : Math.max(previous, current));
              }
              return Array.from({ length: 7 }, (_, index) => {
                const day = new Date(firstDay.getTime() + index * dayMs);
                const value = buckets.get(keyFor(day));
                return [day.getTime(), Number.isFinite(value) ? value : null];
              });
          - entity: sensor.flo_shutoff_today_s_water_usage
            name: 7-day avg
            type: line
            color: rgba(226, 232, 240, 0.58)
            stroke_width: 2
            stroke_dash: 5
            float_precision: 0
            data_generator: |
              const entityId = entity.entity_id || 'sensor.flo_shutoff_today_s_water_usage';
              const dayMs = 24 * 60 * 60 * 1000;
              const today = new Date();
              today.setHours(0, 0, 0, 0);
              const firstDay = new Date(today);
              firstDay.setDate(firstDay.getDate() - 6);
              const spanEnd = new Date(today.getTime() + dayMs);
              const path = `history/period/${firstDay.toISOString()}?filter_entity_id=${encodeURIComponent(entityId)}&end_time=${encodeURIComponent(spanEnd.toISOString())}`;
              const response = await hass.callApi('GET', path);
              const rows = Array.isArray(response?.[0]) ? response[0] : [];
              const keyFor = (date) => [
                date.getFullYear(),
                String(date.getMonth() + 1).padStart(2, '0'),
                String(date.getDate()).padStart(2, '0')
              ].join('-');
              const buckets = new Map();
              for (const row of rows) {
                const value = Number(row.state);
                if (!Number.isFinite(value)) continue;
                const changed = row.last_changed || row.last_updated;
                const date = new Date(changed);
                if (Number.isNaN(date.getTime())) continue;
                const key = keyFor(date);
                const previous = buckets.get(key);
                buckets.set(key, previous === undefined ? value : Math.max(previous, value));
              }
              const current = Number(entity.state);
              if (Number.isFinite(current)) {
                const key = keyFor(today);
                const previous = buckets.get(key);
                buckets.set(key, previous === undefined ? current : Math.max(previous, current));
              }
              const days = Array.from({ length: 7 }, (_, index) => new Date(firstDay.getTime() + index * dayMs));
              const values = days
                .map((day) => buckets.get(keyFor(day)))
                .filter((value) => Number.isFinite(value));
              if (!values.length) return [];
              const average = values.reduce((sum, value) => sum + value, 0) / values.length;
              return days.map((day) => [day.getTime(), average]);
        card_mod:
          style: &water_chart_card_style |
            ha-card {
              border: 1px solid rgba(148, 163, 184, 0.08);
              border-radius: 18px;
              box-shadow: none;
