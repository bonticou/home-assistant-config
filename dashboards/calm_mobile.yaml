          {% set next_on = (as_timestamp(state_attr('sun.sun', 'next_setting')) - 3600) | timestamp_custom('%-I:%M %p', true) %}
          {% set next_off = (as_timestamp(state_attr('sun.sun', 'next_rising')) + 3600) | timestamp_custom('%-I:%M %p', true) %}
