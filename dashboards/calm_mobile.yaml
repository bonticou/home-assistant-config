          {% if status == 'warming' %}Main Floor is warming
          {% elif status == 'cooling' %}Main Floor is cooling
          {% elif status == 'too_warm' %}Main Floor is running warm
          {% elif status == 'too_cool' %}Main Floor is running cool
          {% elif status == 'humid' %}Main Floor feels humid
          {% elif status == 'dry' %}Main Floor feels dry
          {% elif status == 'uneven' %}Main Floor is uneven
          {% else %}Main Floor feels steady{% endif %}
        secondary: >-
          {{ states('sensor.downstairs_climate_insight') }}
