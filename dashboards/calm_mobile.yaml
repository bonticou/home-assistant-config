      - type: custom:mushroom-title-card
        title: Guards

      - type: custom:button-card
        entity: binary_sensor.water_notification_alert_active
        show_icon: false
        show_name: false
        show_state: false
        custom_fields:
          icon: >-
            [[[
              const active = entity.state === 'on';
              const color = active ? '#ef4444' : '#14b8a6';
              const icon = active ? 'mdi:bell-alert' : 'mdi:bell-check';
              const background = active ? 'rgba(239, 68, 68, 0.13)' : 'rgba(20, 184, 166, 0.14)';
              const border = active ? 'rgba(239, 68, 68, 0.22)' : 'rgba(20, 184, 166, 0.24)';
              return `<div class="water-guard-icon" style="background:${background};border-color:${border}"><ha-icon icon="${icon}" style="color:${color}"></ha-icon></div>`;
            ]]]
          copy: >-
            [[[
              const active = entity.state === 'on';
              const latest = states['input_text.water_latest_alert_label']?.state;
              const latestAt = states['input_datetime.water_latest_alert_at']?.state;
              const activeAlerts = (states['sensor.water_notification_status']?.attributes?.active_alerts || '').trim();
              const valid = (value) => value && !['unknown', 'unavailable', 'none', ''].includes(value);
              const relative = (value) => {
                if (!valid(value)) return '';
                const parsed = new Date(value.replace(' ', 'T')).getTime();
                if (!Number.isFinite(parsed)) return '';
                const minutes = Math.max(0, Math.round((Date.now() - parsed) / 60000));
                if (minutes < 1) return 'just now';
                if (minutes < 60) return `${minutes}m ago`;
                const hours = Math.round(minutes / 60);
                if (hours < 24) return `${hours}h ago`;
                return `${Math.round(hours / 24)}d ago`;
              };
              const last = valid(latest) ? `Last: ${latest}${relative(latestAt) ? ` · ${relative(latestAt)}` : ''}` : 'No recent alerts';
              const detail = active
                ? `${activeAlerts && activeAlerts !== 'None' ? activeAlerts : 'Water'} active · ${last}`
                : last;
              const title = active ? 'Water alert active' : 'No active water alerts';
              return `<div class="water-guard-copy"><div class="water-guard-title">${title}</div><div class="water-guard-meta">${detail}</div></div>`;
            ]]]
          art: >-
            [[[
              const active = entity.state === 'on';
              const icon = active ? 'mdi:bell-alert' : 'mdi:shield-check';
              const color = active ? 'rgba(239, 68, 68, 0.40)' : 'rgba(20, 184, 166, 0.34)';
              return `<ha-icon class="water-guard-art" icon="${icon}" style="color:${color}"></ha-icon>`;
            ]]]
        tap_action:
          action: more-info
        styles:
          card:
            - min-height: 64px
            - padding: 10px 12px
            - border: |
                [[[
                  return entity.state === 'on'
                    ? '1px solid rgba(239, 68, 68, 0.24)'
                    : '1px solid rgba(20, 184, 166, 0.18)';
                ]]]
            - border-radius: 18px
            - box-shadow: none
            - background: |
                [[[
                  return entity.state === 'on'
                    ? 'linear-gradient(180deg, rgba(239, 68, 68, 0.12), rgba(15, 23, 42, 0.56))'
                    : 'linear-gradient(180deg, rgba(20, 184, 166, 0.10), rgba(15, 23, 42, 0.54))';
                ]]]
            - overflow: hidden
            - position: relative
          grid:
            - grid-template-areas: '"icon copy art"'
            - grid-template-columns: 34px 1fr 46px
            - column-gap: 10px
            - align-items: center
          custom_fields:
            icon:
              - grid-area: icon
              - align-items: center
              - display: flex
              - height: 100%
              - justify-content: center
              - line-height: 0
              - z-index: 1
            copy:
              - grid-area: copy
              - align-self: center
              - justify-self: start
              - min-width: 0
              - z-index: 1
            art:
              - grid-area: art
              - align-items: center
              - align-self: center
              - display: flex
              - height: 100%
              - justify-content: flex-end
              - justify-self: stretch
              - line-height: 0
              - z-index: 0
        extra_styles: |
          .water-guard-icon {
            align-items: center;
            border: 1px solid transparent;
            border-radius: 12px;
            display: flex;
            height: 30px;
            justify-content: center;
            width: 30px;
          }
          .water-guard-icon ha-icon {
            --mdc-icon-size: 18px;
          }
          .water-guard-copy {
            min-width: 0;
            text-align: left;
          }
          .water-guard-title {
            color: rgba(248, 250, 252, 0.96);
            font-size: 17px;
            font-weight: 620;
            letter-spacing: 0;
            line-height: 1.15;
          }
          .water-guard-meta {
            color: rgba(226, 232, 240, 0.72);
            font-size: 11px;
            letter-spacing: 0;
            line-height: 1.25;
            margin-top: 3px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
          }
          .water-guard-art {
            --mdc-icon-size: 42px;
            display: block;
            height: 42px;
            width: 42px;
          }

