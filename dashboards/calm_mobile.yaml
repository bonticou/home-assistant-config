                - type: conditional
                  conditions: [{entity: binary_sensor.espresso_maintenance_due, state: "on"}]
                  chip: {type: template, icon: "mdi:alarm-snooze", icon_color: grey, content: Snooze, tap_action: {action: call-service, service: script.espresso_snooze_maintenance}}

