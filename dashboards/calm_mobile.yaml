                style: *lights_compact_card_style
            - type: custom:mushroom-title-card
              title: Evening automations
            - type: custom:mushroom-template-card
              entity: automation.lights_interior_evening_mode_schedule_sync
              primary: Interior evening mode
              secondary: >-
                {% set exterior_window_active = is_state('binary_sensor.front_stairs_schedule_active', 'on') %}
                {% set rising = is_state_attr('sun.sun', 'rising', true) %}
                {% set evening_window_active = exterior_window_active and not rising %}
                {% set home = is_state('person.bonticou', 'home') or is_state('person.casey', 'home') %}
                {% set scene = states('input_select.lighting_active_scene') %}
                {% set elevation = state_attr('sun.sun', 'elevation') | float(0) | round(1) %}
