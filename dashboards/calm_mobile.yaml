      - type: custom:button-card
        entity: sensor.irrigation_history_status
        name: Most recent
        show_icon: false
        show_state: false
        tap_action:
          action: more-info
        custom_fields:
          log: >-
            [[[
              const events = Array.isArray(entity?.attributes?.events) ? entity.attributes.events.slice(0, 5) : [];
              const escapeHtml = (value) => String(value ?? '').replace(/[&<>"']/g, (char) => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
              }[char]));
              const parseDate = (value) => {
                const parsed = new Date(String(value || '').replace(' ', 'T'));
                return Number.isNaN(parsed.getTime()) ? null : parsed;
              };
              const relative = (date) => {
                if (!date) return '';
                const minutes = Math.max(0, Math.round((Date.now() - date.getTime()) / 60000));
                if (minutes < 1) return 'just now';
                if (minutes < 60) return `${minutes}m ago`;
                const hours = Math.round(minutes / 60);
                if (hours < 24) return `${hours}h ago`;
                return `${Math.round(hours / 24)}d ago`;
              };
              const rows = events.map((event) => {
                const severity = event.severity === 'critical' ? 'critical' : event.severity === 'warning' ? 'warning' : 'info';
                const when = relative(parseDate(event.at));
                return `<div class="ir-row">
                  <span class="ir-dot ${severity}"></span>
                  <div class="ir-body">
                    <div class="ir-top"><b>${escapeHtml(event.title || 'Irrigation event')}</b><span>${escapeHtml(when)}</span></div>
                    <div class="ir-note">${escapeHtml(event.note || event.kind || '')}</div>
                  </div>
                </div>`;
              }).join('');
              return `<div class="ir-card"><div class="ir-title">Most recent <span>History</span></div>${rows || '<div class="ir-empty">No irrigation history yet.</div>'}</div>`;
            ]]]
        styles:
          card:
            - padding: 14px
            - border-radius: 20px
            - box-shadow: none
            - border: 1px solid rgba(148, 163, 184, 0.14)
            - background: linear-gradient(180deg, rgba(15, 23, 42, 0.76), rgba(15, 23, 42, 0.56))
          grid:
            - grid-template-areas: '"log"'
            - grid-template-columns: minmax(0, 1fr)
          custom_fields:
            log:
              - grid-area: log
        extra_styles: |
          .ir-title {
            color: rgba(248,250,252,0.94);
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 680;
            letter-spacing: 0;
            margin-bottom: 10px;
          }
          .ir-title span {
            color: rgba(148,163,184,0.86);
            font-size: 12px;
            font-weight: 560;
          }
          .ir-row {
            align-items: flex-start;
            display: grid;
            gap: 10px;
            grid-template-columns: 10px minmax(0, 1fr);
            padding: 8px 0;
            border-top: 1px solid rgba(148,163,184,0.12);
            text-align: left;
          }
          .ir-row:first-of-type { border-top: none; }
          .ir-dot {
            border-radius: 999px;
            height: 9px;
            margin-top: 5px;
            width: 9px;
            background: #2dd4bf;
          }
          .ir-dot.warning { background: #f59e0b; }
          .ir-dot.critical { background: #ef4444; }
          .ir-top {
            display: flex;
            gap: 8px;
            justify-content: space-between;
            min-width: 0;
          }
          .ir-top b {
            color: rgba(248,250,252,0.95);
            font-size: 13px;
            font-weight: 650;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
          }
          .ir-top span {
            color: rgba(148,163,184,0.86);
            flex: 0 0 auto;
            font-size: 12px;
          }
          .ir-note {
            color: rgba(203,213,225,0.82);
            font-size: 12px;
            line-height: 1.35;
            margin-top: 2px;
          }
          .ir-empty {
            color: rgba(203,213,225,0.76);
            font-size: 13px;
            text-align: left;
          }

