title: Home
views:
  - title: Home
    path: home
    icon: mdi:home-variant-outline
    type: masonry
    cards:
      - type: custom:mushroom-title-card
        title: >-
          {% set is_night = is_state('sun.sun', 'below_horizon') %}
          {% set hour = now().hour %}
          {% if is_night and hour < 5 %}Good night
          {% elif hour < 12 %}Good morning
          {% elif hour < 17 %}Good afternoon
          {% elif not is_night %}Good evening
          {% else %}Good night{% endif %}

      - type: conditional
        conditions:
          - entity: input_boolean.vacation_mode
            state: "on"
        card:
          type: custom:button-card
          entity: input_boolean.vacation_mode
          name: Vacation mode active
          label: >-
            [[[
              const windowState = hass.states['sensor.vacation_activity_window']?.state || 'off';
              const phase = hass.states['sensor.vacation_activity_window']?.attributes?.detail_phase || 'quiet';
              const labels = {
                evening: 'Evening presence glow',
                pre_sunrise: 'Pre-sunrise presence glow',
                off: 'Quiet watch'
              };
              return `${labels[windowState] || 'Quiet watch'} · ${String(phase).replaceAll('_', ' ')}`;
            ]]]
          icon: mdi:island
          show_label: true
          show_state: false
          tap_action:
            action: fire-dom-event
            browser_mod:
              service: browser_mod.popup
              data:
                popup_card_id: vacation-mode-popup
          hold_action:
            action: more-info
          styles:
            card:
              - min-height: 44px
              - padding: 8px 10px
              - border-radius: 18px
              - border: 1px solid rgba(59, 130, 246, 0.16)
              - background: linear-gradient(180deg, rgba(239, 246, 255, 0.94), rgba(219, 234, 254, 0.78))
              - box-shadow: none
              - text-align: left
            grid:
              - grid-template-areas: '"i n" "i l"'
              - grid-template-columns: 32px minmax(0, 1fr)
              - grid-template-rows: min-content min-content
              - column-gap: 9px
              - align-items: center
            icon:
              - width: 21px
              - color: rgba(37, 99, 235, 0.92)
            img_cell:
              - justify-content: center
              - align-items: center
              - width: 32px
              - height: 32px
              - border-radius: 999px
              - background: rgba(59, 130, 246, 0.12)
            name:
              - justify-self: start
              - align-self: end
              - font-size: 13px
              - font-weight: 650
              - color: rgba(15, 23, 42, 0.9)
            label:
              - justify-self: start
              - align-self: start
              - min-width: 0
              - overflow: hidden
              - text-overflow: ellipsis
              - white-space: nowrap
              - font-size: 12px
              - font-weight: 500
              - color: rgba(51, 65, 85, 0.72)

      - type: conditional
        conditions:
          - entity: binary_sensor.main_dashboard_sleep_hero_active
            state: "on"
        card:
          type: custom:mushroom-template-card
          entity: input_select.lighting_active_scene
          primary: Sleep
          secondary: >-
            {% if is_state('input_select.lighting_active_scene', 'Bedtime') %}
              Bedtime scene is on.
            {% else %}
              Wind the house down with the bedtime scene.
            {% endif %}
          icon: mdi:weather-night
          icon_color: >-
            {% if is_state('input_select.lighting_active_scene', 'Bedtime') %}
              indigo
            {% else %}
              amber
            {% endif %}
          multiline_secondary: true
          fill_container: true
          tap_action:
            action: call-service
            service: script.turn_on
            target:
              entity_id: script.lights_bedtime_scene
          hold_action:
            action: navigate
            navigation_path: /calm-mobile/lights
          card_mod:
            style: |
              ha-card {
                border: none;
                border-radius: 28px;
                padding: 12px 10px;
                box-shadow:
                  {% if is_state('input_select.lighting_active_scene', 'Bedtime') %}
                    inset 0 1px 0 rgba(255, 255, 255, 0.08),
                    0 18px 40px rgba(49, 46, 129, 0.28);
                  {% else %}
                    0 18px 38px rgba(15, 23, 42, 0.16);
                  {% endif %}
                background:
                  {% if is_state('input_select.lighting_active_scene', 'Bedtime') %}
                  radial-gradient(circle at top right, rgba(129, 140, 248, 0.28), transparent 36%),
                  linear-gradient(145deg, rgba(30, 41, 59, 0.98), rgba(49, 46, 129, 0.82));
                  {% else %}
                  radial-gradient(circle at top right, rgba(245, 158, 11, 0.18), transparent 34%),
                  linear-gradient(145deg, rgba(15, 23, 42, 0.98), rgba(30, 41, 59, 0.94));
                  {% endif %}
                color: #f8fafc;
              }
              mushroom-state-info .primary {
                font-size: 30px !important;
                line-height: 1.02 !important;
                font-weight: 620 !important;
                letter-spacing: -0.03em;
                margin-bottom: 6px !important;
              }
              mushroom-state-info .secondary {
                font-size: 14px !important;
                line-height: 1.45 !important;
                opacity: 0.82 !important;
                max-width: 230px;
              }
              mushroom-shape-icon {
                --shape-color:
                  {% if is_state('input_select.lighting_active_scene', 'Bedtime') %}
                    rgba(129, 140, 248, 0.22)
                  {% else %}
                    rgba(251, 191, 36, 0.16)
                  {% endif %} !important;
                --shape-color-disabled:
                  {% if is_state('input_select.lighting_active_scene', 'Bedtime') %}
                    rgba(129, 140, 248, 0.22)
                  {% else %}
                    rgba(251, 191, 36, 0.16)
                  {% endif %} !important;
                width: 68px;
                height: 68px;
              }
              ha-state-icon {
                color:
                  {% if is_state('input_select.lighting_active_scene', 'Bedtime') %}
                    #c4b5fd
                  {% else %}
                    #fbbf24
                  {% endif %} !important;
              }

      - type: conditional
        conditions:
          - entity: binary_sensor.open_window_recommendation_active
            state: "on"
        card:
          type: custom:button-card
          entity: binary_sensor.open_window_recommendation_active
          name: Good window air
          label: >-
            [[[
              const attrs = entity?.attributes || {};
              const bestRoom = attrs.best_room && attrs.best_room !== 'None'
                ? String(attrs.best_room)
                : 'Lived-in rooms';
              const roomTempEntities = {
                'Kitchen': 'sensor.main_floor_temperature',
                'Dining Room': 'sensor.main_floor_2_temperature',
                'Primary Bedroom': 'sensor.master_temperature',
                'Office': 'sensor.office_current_temperature',
              };
              const roomTemp = Number(hass.states[roomTempEntities[bestRoom]]?.state);
              const outdoor = Number(attrs.outdoor_temp);
              const humidity = Number(attrs.outdoor_humidity);
              const roomText = Number.isFinite(roomTemp)
                ? `${bestRoom} ${Math.round(roomTemp)}°`
                : bestRoom;
              const outsideText = Number.isFinite(outdoor) ? `${Math.round(outdoor)}°` : '--°';
              const humidityText = Number.isFinite(humidity) ? `${Math.round(humidity)}%` : '--%';
              return `${roomText} · outside ${outsideText} / ${humidityText}`;
            ]]]
          icon: mdi:window-open-variant
          show_label: true
          show_state: false
          tap_action:
            action: navigate
            navigation_path: /calm-mobile/climate
          hold_action:
            action: more-info
          custom_fields:
            close:
              card:
                type: custom:button-card
                icon: mdi:close
                show_name: false
                show_state: false
                tap_action:
                  action: call-service
                  service: script.open_window_notice_dismiss_tonight
                styles:
                  card:
                    - width: 34px
                    - height: 34px
                    - padding: 0
                    - border-radius: 999px
                    - border: 1px solid rgba(13, 148, 136, 0.16)
                    - background: rgba(240, 253, 250, 0.72)
                    - box-shadow: none
                  icon:
                    - width: 18px
                    - color: rgba(15, 118, 110, 0.82)
          styles:
            card:
              - min-height: 58px
              - padding: 9px 10px 9px 14px
              - border-radius: 22px
              - border: 1px solid rgba(13, 148, 136, 0.16)
              - background: linear-gradient(180deg, rgba(240, 253, 250, 0.94), rgba(236, 253, 245, 0.88))
              - box-shadow: 0 12px 26px rgba(15, 118, 110, 0.10)
              - text-align: left
            grid:
              - grid-template-areas: '"i n close" "i l close"'
              - grid-template-columns: 34px minmax(0, 1fr) 38px
              - grid-template-rows: min-content min-content
              - column-gap: 10px
              - align-items: center
            icon:
              - width: 23px
              - color: rgba(13, 148, 136, 0.92)
            img_cell:
              - justify-content: center
              - align-items: center
              - width: 34px
              - height: 34px
              - border-radius: 999px
              - background: rgba(20, 184, 166, 0.12)
            name:
              - justify-self: start
              - align-self: end
              - font-size: 14px
              - font-weight: 650
              - color: rgba(15, 23, 42, 0.92)
            label:
              - justify-self: start
              - align-self: start
              - min-width: 0
              - overflow: hidden
              - text-overflow: ellipsis
              - white-space: nowrap
              - font-size: 12px
              - font-weight: 500
              - color: rgba(51, 65, 85, 0.74)
            custom_fields:
              close:
                - grid-area: close
                - justify-self: end
                - align-self: center

      - type: custom:mushroom-template-card
        entity: weather.forecast_home
        primary: >-
          {% set t = state_attr('weather.forecast_home', 'temperature') | int(0) %}
          {% set s = states('weather.forecast_home') %}
          {% set hour = now().hour %}
          {% if hour < 5 %}
            {% set label = {
              'clear-night': 'A clear night',
              'sunny': 'A clear night',
              'partlycloudy': 'Partly cloudy night',
              'cloudy': 'Overcast tonight',
              'rainy': 'Rainy tonight',
              'pouring': 'Heavy rain tonight',
              'snowy': 'Snowing tonight',
              'snowy-rainy': 'Wintry mix tonight',
              'windy': 'Windy tonight',
              'windy-variant': 'Breezy and cloudy',
              'fog': 'Foggy tonight',
              'lightning': 'Thunderstorms',
              'lightning-rainy': 'Stormy tonight'
            } %}
          {% elif hour < 12 %}
            {% set label = {
              'clear-night': 'Clear morning',
              'sunny': 'Clear morning',
              'partlycloudy': 'Partly cloudy morning',
              'cloudy': 'Overcast morning',
              'rainy': 'Rainy morning',
              'pouring': 'Heavy rain',
              'snowy': 'Snowing',
              'snowy-rainy': 'Wintry mix',
              'windy': 'Windy morning',
              'windy-variant': 'Breezy and cloudy',
              'fog': 'Foggy morning',
              'lightning': 'Thunderstorms',
              'lightning-rainy': 'Stormy morning'
            } %}
          {% elif hour < 17 %}
            {% set label = {
              'clear-night': 'A bright afternoon',
              'sunny': 'A sunny afternoon',
              'partlycloudy': 'A partly cloudy afternoon',
              'cloudy': 'An overcast afternoon',
              'rainy': 'A rainy afternoon',
              'pouring': 'A stormy afternoon',
              'snowy': 'A snowy afternoon',
              'snowy-rainy': 'A wintry afternoon',
              'windy': 'A windy afternoon',
              'windy-variant': 'A breezy afternoon',
              'fog': 'A foggy afternoon',
              'lightning': 'Thunderstorms this afternoon',
              'lightning-rainy': 'A stormy afternoon'
            } %}
          {% elif hour < 21 %}
            {% set label = {
              'clear-night': 'A calm evening',
              'sunny': 'A golden evening',
              'partlycloudy': 'A partly cloudy evening',
              'cloudy': 'An overcast evening',
              'rainy': 'A rainy evening',
              'pouring': 'A stormy evening',
              'snowy': 'A snowy evening',
              'snowy-rainy': 'A wintry evening',
              'windy': 'A windy evening',
              'windy-variant': 'A breezy evening',
              'fog': 'A foggy evening',
              'lightning': 'Thunderstorms this evening',
              'lightning-rainy': 'A stormy evening'
            } %}
          {% else %}
            {% set label = {
              'clear-night': 'A quiet night',
              'sunny': 'A quiet night',
              'partlycloudy': 'A partly cloudy night',
              'cloudy': 'An overcast night',
              'rainy': 'A rainy night',
              'pouring': 'A stormy night',
              'snowy': 'A snowy night',
              'snowy-rainy': 'A wintry night',
              'windy': 'A windy night',
              'windy-variant': 'A breezy night',
              'fog': 'A foggy night',
              'lightning': 'Thunderstorms tonight',
              'lightning-rainy': 'A stormy night'
            } %}
          {% endif %}
          {{ t }}° · {{ label[s] | default(s) }} at Chestnut Ridge
        secondary: >-
          {% set humidity = state_attr('weather.forecast_home', 'humidity') | int(0) %}
          {% set wind = state_attr('weather.forecast_home', 'wind_speed') | int(0) %}
          {{ humidity }}% humidity{% if wind > 15 %} · {{ wind }} mph{% endif %}
        icon: >-
          {% set state = states('weather.forecast_home') %}
          {% set icons = {
            'clear-night': 'mdi:weather-night',
            'sunny': 'mdi:weather-sunny',
            'partlycloudy': 'mdi:weather-partly-cloudy',
            'cloudy': 'mdi:weather-cloudy',
            'rainy': 'mdi:weather-rainy',
            'pouring': 'mdi:weather-pouring',
            'snowy': 'mdi:weather-snowy',
            'snowy-rainy': 'mdi:weather-snowy-rainy',
            'windy': 'mdi:weather-windy',
            'windy-variant': 'mdi:weather-windy-variant',
            'fog': 'mdi:weather-fog',
            'lightning': 'mdi:weather-lightning',
            'lightning-rainy': 'mdi:weather-lightning-rainy'
          } %}
          {{ icons[state] | default('mdi:weather-cloudy') }}
        icon_color: >-
          {% set state = states('weather.forecast_home') %}
          {% if state == 'sunny' %}amber
          {% elif state in ['rainy', 'pouring', 'lightning-rainy'] %}blue
          {% elif state in ['snowy', 'snowy-rainy'] %}light-blue
          {% else %}grey{% endif %}
        tap_action:
          action: more-info
        card_mod:
          style: |
            ha-card {
              border: 1px solid rgba(148, 163, 184, 0.08);
              border-radius: 24px;
              background:
                radial-gradient(circle at 72% -20%, rgba(56, 189, 248, 0.20), transparent 34%),
                linear-gradient(135deg, rgba(15, 23, 42, 0.92), rgba(18, 48, 61, 0.72) 52%, rgba(15, 23, 42, 0.90));
              box-shadow: 0 14px 34px rgba(2, 6, 23, 0.18);
              -webkit-backdrop-filter: blur(18px) saturate(140%);
              backdrop-filter: blur(18px) saturate(140%);
              overflow: hidden;
            }
            .primary {
              font-size: 20px !important;
              font-weight: 400 !important;
            }
            .secondary {
              opacity: 0.65 !important;
            }

      - type: custom:mushroom-chips-card
        alignment: left
        chips:
          - type: template
            entity: device_tracker.unifi_default_42_15_78_4a_d9_f8
            icon: >-
              {{ 'mdi:home' if is_state('device_tracker.unifi_default_42_15_78_4a_d9_f8', 'home') else 'mdi:home-export-outline' }}
            icon_color: >-
              {{ 'green' if is_state('device_tracker.unifi_default_42_15_78_4a_d9_f8', 'home') else 'red' }}
            content: Casey
            tap_action:
              action: more-info
          - type: template
            entity: sensor.away_security_active_lights
            icon: >-
              {{ 'mdi:lightbulb-on-outline' if states('sensor.away_security_active_lights') | int(0) > 0 else 'mdi:lightbulb-off-outline' }}
            icon_color: >-
              {{ 'amber' if states('sensor.away_security_active_lights') | int(0) > 0 else 'grey' }}
            content: Lights
            tap_action:
              action: fire-dom-event
              browser_mod:
                service: browser_mod.popup
                data:
                  popup_card_id: lights-quick-popup
          - type: template
            entity: climate.dining_room
            icon: >-
              {% set profile = states('select.dining_room_current_mode') %}
              {% set hvac_action = state_attr('climate.dining_room', 'hvac_action') %}
              {% if profile == 'away' %}mdi:home-export-outline
              {% elif profile == 'sleep' %}mdi:sleep
              {% elif hvac_action == 'heating' %}mdi:radiator
              {% elif hvac_action == 'cooling' %}mdi:snowflake
              {% elif is_state('binary_sensor.open_window_recommendation_active', 'on') %}mdi:window-open-variant
              {% else %}mdi:home-thermometer-outline{% endif %}
            icon_color: >-
              {% set profile = states('select.dining_room_current_mode') %}
              {% set hvac_action = state_attr('climate.dining_room', 'hvac_action') %}
              {% if profile == 'away' %}amber
              {% elif profile == 'sleep' %}indigo
              {% elif hvac_action == 'heating' %}orange
              {% elif hvac_action == 'cooling' %}blue
              {% elif is_state('binary_sensor.open_window_recommendation_active', 'on') %}teal
              {% else %}grey{% endif %}
            # The Dining Room thermostat is governed by the Kitchen/main-floor sensor, but the home chip stays label-light.
            content: >-
              {% set profile = states('select.dining_room_current_mode') %}
              {% set temp = states('sensor.downstairs_temp_avg') %}
              {% if profile == 'away' %}Away
              {% elif profile == 'sleep' %}Sleep
              {% elif is_number(temp) %}{{ temp | float(0) | round(0) }}°
              {% else %}HVAC{% endif %}
            tap_action:
              action: fire-dom-event
              browser_mod:
                service: browser_mod.popup
                data:
                  popup_card_id: climate-quick-popup
            hold_action:
              action: more-info
          - type: template
            entity: climate.master_2
            icon: >-
              {% set profile = states('select.master_current_mode_2') %}
              {% set hvac_action = state_attr('climate.master_2', 'hvac_action') %}
              {% if profile == 'away' %}mdi:home-export-outline
              {% elif profile == 'sleep' %}mdi:sleep
              {% elif hvac_action == 'heating' %}mdi:radiator
              {% elif hvac_action == 'cooling' %}mdi:snowflake
              {% else %}mdi:bed-king-outline{% endif %}
            icon_color: >-
              {% set profile = states('select.master_current_mode_2') %}
              {% set hvac_action = state_attr('climate.master_2', 'hvac_action') %}
              {% if profile == 'away' %}amber
              {% elif profile == 'sleep' %}indigo
              {% elif hvac_action == 'heating' %}orange
              {% elif hvac_action == 'cooling' %}blue
              {% else %}grey{% endif %}
            # The Master Bedroom home chip mirrors the built-in Master Ecobee thermostat sensor.
            content: >-
              {% set profile = states('select.master_current_mode_2') %}
              {% set climate_temp = state_attr('climate.master_2', 'current_temperature') %}
              {% set temp = states('sensor.master_current_temperature_2') %}
              {% if profile == 'away' %}Away
              {% elif profile == 'sleep' %}Sleep
              {% elif climate_temp is not none %}{{ climate_temp | float(0) | round(0) }}°
              {% elif is_number(temp) %}{{ temp | float(0) | round(0) }}°
              {% else %}HVAC{% endif %}
            tap_action:
              action: fire-dom-event
              browser_mod:
                service: browser_mod.popup
                data:
                  popup_card_id: master-climate-quick-popup
            hold_action:
              action: more-info
          - type: template
            entity: binary_sensor.irrigation_active
            icon: >-
              {{ 'mdi:sprinkler-variant' if is_state('binary_sensor.irrigation_active', 'on') else 'mdi:sprinkler' }}
            icon_color: >-
              {{ 'blue' if is_state('binary_sensor.irrigation_active', 'on') else 'grey' }}
            tap_action:
              action: navigate
              navigation_path: /calm-mobile/irrigation
            hold_action:
              action: more-info
          - type: template
            entity: sensor.basement_air_quality_radon
            icon: mdi:radioactive
            icon_color: >-
              {% set radon = states('sensor.basement_air_quality_radon') | float(0) %}
              {% if radon < 100 %}green
              {% elif radon < 148 %}orange
              {% else %}red{% endif %}
            tap_action:
              action: fire-dom-event
              radon_air_quality_popup: true
            hold_action:
              action: more-info
        card_mod:
          style: |
            ha-card {
              border: none;
              box-shadow: none;
              overflow: visible;
              --chip-spacing: 8px;
            }
            .chip-container {
              align-items: center !important;
              flex-wrap: wrap !important;
              gap: 8px !important;
            }
            mushroom-template-chip {
              flex: 0 0 auto;
              max-width: none;
            }
      - type: custom:popup-card
        popup_card_id: lights-quick-popup
        target:
          entity_id: sensor.away_security_active_lights
        title: " "
        initial_style: wide
        card_mod:
          style:
            ha-dialog$: |
              ha-icon-button {
                display: none !important;
              }
        popup_styles:
          - style: all
            styles: |
              :host {
                --primary-text-color: #f8fafc;
                --secondary-text-color: #cbd5e1;
                --popup-padding-x: 0px;
                --popup-padding-y: 0px;
              }
              ha-dialog {
                --mdc-dialog-scrim-color: rgba(2, 6, 23, 0.70);
                --dialog-backdrop-filter: blur(30px) saturate(160%);
                --ha-dialog-border-radius: 28px;
                --mdc-dialog-container-color: transparent;
                --mdc-theme-surface: transparent;
                --ha-dialog-surface-background: transparent;
              }
              dialog {
                background: transparent !important;
                box-shadow: none !important;
              }
          - style: wide
            styles: |
              .content {
                width: min(344px, calc(100vw - 30px)) !important;
                margin-inline: auto;
              }
              .content .container {
                overflow: visible;
                box-sizing: border-box;
                margin-top: clamp(128px, 24vh, 260px);
                position: relative;
                padding: 14px !important;
                border-radius: 28px;
                border: 1px solid rgba(148, 163, 184, 0.22);
                background:
                  radial-gradient(circle at 14% -12%, rgba(251, 191, 36, 0.14), transparent 38%),
                  radial-gradient(circle at 96% 4%, rgba(129, 140, 248, 0.15), transparent 36%),
                  linear-gradient(180deg, rgba(15, 23, 42, 0.90), rgba(8, 13, 27, 0.84));
                box-shadow:
                  inset 0 1px 0 rgba(255, 255, 255, 0.07),
                  0 26px 54px rgba(2, 6, 23, 0.42);
                -webkit-backdrop-filter: blur(22px) saturate(150%);
                backdrop-filter: blur(22px) saturate(150%);
              }
        card:
          type: vertical-stack
          cards:
            - type: custom:button-card
              icon: mdi:close
              show_name: false
              show_state: false
              tap_action:
                action: fire-dom-event
                browser_mod:
                  service: browser_mod.close_popup
                  data: {}
              styles:
                card:
                  - width: 44px
                  - height: 44px
                  - padding: 0
                  - border-radius: 999px
                  - border: 1px solid rgba(148, 163, 184, 0.22)
                  - background: rgba(15, 23, 42, 0.58)
                  - color: "#f8fafc"
                  - box-shadow: 0 12px 26px rgba(2, 6, 23, 0.30)
                  - -webkit-backdrop-filter: blur(14px) saturate(150%)
                  - backdrop-filter: blur(14px) saturate(150%)
                icon:
                  - width: 22px
                  - color: "#f8fafc"
              card_mod:
                style: |
                  :host {
                    position: absolute !important;
                    top: -58px;
                    left: 0;
                    z-index: 5;
                    width: 44px;
                    height: 44px;
                    display: block;
                  }
            - type: custom:button-card
              name: Lights
              label: Frequent scenes
              icon: mdi:lightbulb-group-outline
              show_state: false
              show_label: true
              tap_action:
                action: none
              styles:
                card:
                  - height: 48px
                  - padding: 0 4px 8px
                  - border-radius: 0
                  - border: 0
                  - border-bottom: 1px solid rgba(148, 163, 184, 0.14)
                  - background: transparent
                  - box-shadow: none
                  - text-align: left
                grid:
