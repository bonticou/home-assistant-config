      - type: custom:popup-card
        target:
          entity_id: sensor.wine_cave_status
        title: Wine Cave
        dismiss_icon: mdi:close
        initial_style: wide
        popup_styles: &wine_popup_styles
          - style: all
            styles: |
              :host {
                --primary-text-color: #f8fafc;
                --secondary-text-color: #94a3b8;
              }
              ha-dialog {
                --mdc-dialog-scrim-color: rgba(15, 23, 42, 0.48);
                --dialog-backdrop-filter: blur(28px) saturate(170%);
                --ha-dialog-border-radius: 30px;
              }
        card:
          type: vertical-stack
          cards:
            - type: custom:mushroom-template-card
              entity: sensor.wine_cave_status
              primary: >-
                {{ states('sensor.wine_temperature') | float(0) | round(1) }}°F
                · {{ states('sensor.wine_humidity') | float(0) | round(0) }}%
              secondary: >-
                {% set status = states('sensor.wine_cave_status') %}
                {% set temp_avg = states('sensor.wine_temperature_24h_stats') %}
                {% set humidity_avg = states('sensor.wine_humidity_24h_stats') %}
                {% if status in ['Optimal', 'Normal', 'Good'] %}
                  The cellar is steady. Dew point is {{ states('sensor.wine_cave_dew_point') | float(0) | round(1) }}°F
                  with 24h averages of
                  {{ (temp_avg | float | round(1) ~ '°F') if is_number(temp_avg) else 'pending temp data' }}
                  and
                  {{ (humidity_avg | float | round(0) ~ '%') if is_number(humidity_avg) else 'pending humidity data' }}.
                {% elif status in ['Warning', 'Caution'] %}
                  Drift is starting to show. Dew point is {{ states('sensor.wine_cave_dew_point') | float(0) | round(1) }}°F
                  and the cave should be watched a bit more closely.
                {% elif status == 'Critical' %}
                  Conditions are out of range. Dew point is {{ states('sensor.wine_cave_dew_point') | float(0) | round(1) }}°F
                  and the cave needs attention.
                {% else %}
                  Wine cave status is unavailable right now.
                {% endif %}
              icon: mdi:glass-wine
              icon_color: >-
                {% set status = states('sensor.wine_cave_status') %}
                {% if status in ['Optimal', 'Normal', 'Good'] %}teal
                {% elif status in ['Warning', 'Caution'] %}orange
                {% elif status == 'Critical' %}red
                {% else %}grey{% endif %}
              multiline_secondary: true
              fill_container: true
              tap_action:
                action: none
              card_mod:
                style: &wine_popup_hero_style |
                  ha-card {
                    border: 1px solid rgba(148, 163, 184, 0.22);
                    box-shadow: 0 10px 20px rgba(2, 8, 23, 0.18);
                    padding: 24px 22px 18px;
                    border-radius: 30px;
                    background:
                      radial-gradient(circle at top right, rgba(45, 212, 191, 0.16), transparent 34%),
                      linear-gradient(180deg, rgba(15, 23, 42, 0.78), rgba(30, 41, 59, 0.72)) !important;
                    backdrop-filter: blur(18px) saturate(160%);
                    -webkit-backdrop-filter: blur(18px) saturate(160%);
                    overflow: hidden;
                    color: #f8fafc;
                    --card-primary-color: #f8fafc;
                    --card-secondary-color: #cbd5e1;
                    --primary-text-color: #f8fafc;
                    --secondary-text-color: #cbd5e1;
                  }
                  mushroom-shape-icon {
                    --shape-color: rgba(255, 255, 255, 0.08) !important;
                    --icon-color: #f8fafc !important;
                  }
                  .primary {
                    color: #f8fafc !important;
                    font-size: 31px !important;
                    font-weight: 560 !important;
                    letter-spacing: -0.02em;
                  }
                  .secondary {
                    color: #cbd5e1 !important;
                    font-size: 14px !important;
                    line-height: 1.55 !important;
                    opacity: 1 !important;
                  }
            - type: custom:mushroom-chips-card
              alignment: left
              chips:
                - type: template
                  entity: sensor.wine_temperature
                  icon: mdi:thermometer
                  icon_color: >-
                    {% set raw = states('sensor.wine_temperature_24h_stats') %}
                    {% if not is_number(raw) %}grey
                    {% elif raw | float < 53 %}light-blue
                    {% elif raw | float > 57 %}red
                    {% else %}teal{% endif %}
                  content: >-
                    {% set raw = states('sensor.wine_temperature_24h_stats') %}
                    {{ (raw | float | round(1) ~ '°F avg') if is_number(raw) else '24h temp pending' }}
                  tap_action:
                    action: none
                - type: template
                  entity: sensor.wine_humidity
                  icon: mdi:water-percent
                  icon_color: >-
                    {% set raw = states('sensor.wine_humidity_24h_stats') %}
                    {% if not is_number(raw) %}grey
                    {% elif raw | float < 50 %}orange
                    {% elif raw | float > 65 %}light-blue
                    {% else %}teal{% endif %}
                  content: >-
                    {% set raw = states('sensor.wine_humidity_24h_stats') %}
                    {{ (raw | float | round(0) ~ '% avg') if is_number(raw) else '24h humidity pending' }}
                  tap_action:
                    action: none
                - type: template
                  entity: sensor.wine_cave_dew_point
                  icon: mdi:water-thermometer
                  icon_color: amber
                  content: >-
                    {{ states('sensor.wine_cave_dew_point') | float(0) | round(1) }}°F dew point
                  tap_action:
                    action: none
                - type: template
                  entity: sensor.wine_cave_status
                  icon: mdi:heart-pulse
                  icon_color: >-
                    {% set status = states('sensor.wine_cave_status') %}
                    {% if status in ['Optimal', 'Normal', 'Good'] %}teal
                    {% elif status in ['Warning', 'Caution'] %}orange
                    {% elif status == 'Critical' %}red
                    {% else %}grey{% endif %}
                  content: >-
                    {{ states('sensor.wine_cave_status') }}
                  tap_action:
                    action: none
              card_mod:
                style: &wine_popup_chip_style |
                  ha-card {
                    border: none;
                    box-shadow: none;
                    margin: -2px 0 2px;
                    --chip-spacing: 10px;
                  }
                  mushroom-template-chip {
                    --chip-background: rgba(255, 255, 255, 0.08);
                    --chip-border-width: 1px;
                    --chip-border-color: rgba(148, 163, 184, 0.18);
                    --chip-box-shadow: none;
                    --primary-text-color: #cbd5e1;
                  }
            - type: custom:apexcharts-card
              graph_span: 24h
              header:
                show: true
                title: Daily Stability
              apex_config:
                chart:
                  height: 280
                  background: transparent
                stroke:
                  curve: straight
                  dashArray:
                    - 0
                    - 0
                    - 6
                    - 6
                xaxis:
                  tickAmount: 6
                  labels:
                    formatter: |
                      EVAL:function(value, timestamp) {
                        const source = timestamp ?? value;
                        if (source === null || source === undefined || source === '') return value ?? '';
                        const numeric = typeof source === 'number' ? source : Number(source);
                        const date = Number.isFinite(numeric) ? new Date(numeric) : new Date(source);
                        if (Number.isNaN(date.getTime())) return value ?? '';
                        let hour = date.getHours();
                        const suffix = hour >= 12 ? 'p' : 'a';
                        hour = hour % 12 || 12;
                        return `${hour}${suffix}`;
                      }
                  tooltip:
                    enabled: false
                grid:
