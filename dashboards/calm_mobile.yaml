                Temperature is {{ states('sensor.wine_temperature') | float(0) | round(1) }}°F
                with {{ states('sensor.wine_humidity') | float(0) | round(0) }}% humidity right now.
              icon: mdi:water-thermometer
              icon_color: amber
              multiline_secondary: true
              fill_container: true
              tap_action:
                action: none
              card_mod:
                style: *wine_popup_hero_style
            - type: custom:apexcharts-card
              graph_span: 24h
              header:
                show: true
                title: Last 24 Hours
              apex_config:
                chart:
                  height: 260
                  background: transparent
                stroke:
                  curve: smooth
                xaxis:
                  labels:
                    formatter: |
                      EVAL:function(value, timestamp) {
                        const source = timestamp ?? value;
                        if (source === null || source === undefined || source === '') return value ?? '';
                        const numeric = typeof source === 'number' ? source : Number(source);
                        const date = Number.isFinite(numeric) ? new Date(numeric) : new Date(source);
                        if (Number.isNaN(date.getTime())) return value ?? '';
                        let hour = date.getHours();
                        const suffix = hour >= 12 ? 'p' : 'a';
                        hour = hour % 12 || 12;
                        return `${hour}${suffix}`;
                      }
                  tooltip:
                    enabled: true
                    formatter: |
                      EVAL:function(value, opts) {
                        const seriesIndex = opts?.seriesIndex ?? 0;
                        const dataPointIndex = opts?.dataPointIndex ?? 0;
                        const source = opts?.w?.globals?.seriesX?.[seriesIndex]?.[dataPointIndex] ?? value;
                        if (source === null || source === undefined || source === '') return value ?? '';
                        const numeric = typeof source === 'number' ? source : Number(source);
                        const date = Number.isFinite(numeric) ? new Date(numeric) : new Date(source);
                        if (Number.isNaN(date.getTime())) return value ?? '';
                        let hour = date.getHours();
                        const suffix = hour >= 12 ? 'p' : 'a';
                        hour = hour % 12 || 12;
                        return `${hour}${suffix}`;
                      }
                grid:
                  borderColor: rgba(120, 120, 120, 0.16)
                legend:
                  show: false
                tooltip:
                  theme: dark
                  x:
                    formatter: |
                      EVAL:function(value, timestamp) {
                        const source = timestamp ?? value;
                        if (source === null || source === undefined || source === '') return value ?? '';
                        const numeric = typeof source === 'number' ? source : Number(source);
                        const date = Number.isFinite(numeric) ? new Date(numeric) : new Date(source);
                        if (Number.isNaN(date.getTime())) return value ?? '';
                        let hour = date.getHours();
                        const suffix = hour >= 12 ? 'p' : 'a';
                        hour = hour % 12 || 12;
                        return `${hour}${suffix}`;
                      }
              series:
                - entity: sensor.wine_cave_dew_point
                  name: Dew point
                  type: line
                  color: '#fbbf24'
                  stroke_width: 2
                  group_by:
                    func: avg
                    duration: 10min
              yaxis:
                min: 38
                max: 41
                decimals: 1
                apex_config:
                  tickAmount: 4
              card_mod:
                style: *wine_popup_panel_style

