                { qty: '3x', name: `Lingua Franca Tongue 'N Cheek 2022`, kind: 'Pinot Noir' },
                { qty: '1x', name: 'Martin Woods Bednarik Vineyard 2022', kind: 'Pinot Noir' },
                { qty: '3x', name: 'Pessac-Léognan Rouge 2022', kind: 'Bordeaux blend' },
              ];
              const safeRows = (value, fallback) => {
                const rows = Array.isArray(value) ? value.filter((row) => row && typeof row === 'object') : [];
                return rows.length ? rows : fallback;
              };
              const prematureRows = safeRows(snapshot.hold_rows, fallbackPrematureRows);
              const earlyRows = safeRows(snapshot.early_rows, fallbackEarlyRows);
              const text = (value, fallback = '') => String(value ?? fallback);
              const bottle = (row) => `<div class="wine-bottle-row"><span class="wine-bottle-qty">${text(row.qty, '--')}</span><span class="wine-bottle-name">${text(row.name, 'Unnamed bottle')}</span><span class="wine-bottle-kind">${text(row.kind, 'hold')}</span></div>`;
              const section = (label, rows) => Array.isArray(rows) && rows.length
                ? `<div class="wine-bottle-divider">${label}</div>${rows.map(bottle).join('')}`
                : '';
              const renderedRows = [
                section('Premature', prematureRows),
                section('Early but open', earlyRows),
              ].filter(Boolean).join('');
              return renderedRows || `<div class="wine-bottle-row"><span class="wine-bottle-qty">--</span><span class="wine-bottle-name">No bottles waiting</span><span class="wine-bottle-kind">clear</span></div>`;
            ]]]
