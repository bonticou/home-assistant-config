              custom_fields:
                events: |
                  [[[
                    const labels = {
                      'binary_sensor.wynn_s_room_motion': 'Motion',
                      'binary_sensor.wynn_s_room_person_detected': 'Person',
                    };
                    const matches = Object.keys(labels)
                      .map((entityId) => states[entityId])
                      .filter((s) => s && !['unknown', 'unavailable'].includes(s.state))
                      .sort((a, b) => new Date(b.last_changed) - new Date(a.last_changed))
                      .slice(0, 8);
                    const pretty = (entityId) => labels[entityId] || entityId;
                    const when = (value) => {
                      const date = new Date(value);
                      const sameDay = date.toDateString() === new Date().toDateString();
                      const time = date.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
                      return sameDay ? time : `${date.toLocaleDateString([], { month: 'short', day: 'numeric' })} ${time}`;
