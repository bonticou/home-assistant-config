            - type: custom:mushroom-template-card
              primary: Wynn's Room motion
              secondary: >-
                {% set motion_entities = [
                  'binary_sensor.wynn_s_room_motion',
                  'binary_sensor.wynn_s_room_person_detected'
                ] %}
                {% set ns = namespace(entity='', ts=0, active=false) %}
                {% for sensor in states.binary_sensor %}
                  {% set entity = sensor.entity_id %}
                  {% if entity in motion_entities and sensor.state not in ['unknown', 'unavailable'] %}
                    {% set changed = as_timestamp(sensor.last_changed, 0) %}
                    {% if changed > ns.ts %}
                      {% set ns.entity = entity %}
                      {% set ns.ts = changed %}
                      {% set ns.active = is_state(entity, 'on') %}
                    {% endif %}
                  {% endif %}
                {% endfor %}
                {% if ns.entity %}
                  {{ 'Motion happening now.' if ns.active else 'Last motion ' ~ relative_time(states[ns.entity].last_changed) ~ ' ago.' }}
                {% else %}
                  No recent motion entities found.
                {% endif %}
              icon: mdi:cctv
