  - title: Wine
    path: wine
    icon: mdi:glass-wine
    type: masonry
    cards:
      - type: custom:mushroom-title-card
        title: Wine Cave

      - type: custom:button-card
        show_icon: true
        show_name: false
        show_state: false
        icon: mdi:clock-outline
        custom_fields:
          header: >-
            [[[
              const snapshot = hass.states['sensor.wine_collection_snapshot']?.attributes || {};
              const fallbackRows = [
                { qty: '2x', name: 'Enrico VI (Villero) 2004', kind: 'ends soon' },
                { qty: '3x', name: 'Pessac-Leognan Rouge 2016', kind: 'mature' },
                { qty: '4x', name: 'Abstract Red', kind: 'mature' },
              ];
              const safeRows = (value) => Array.isArray(value) ? value.filter((row) => row && typeof row === 'object') : [];
              const drinkRows = safeRows(snapshot.drink_now_rows);
              const matureRows = safeRows(snapshot.mature_rows);
              const rows = (drinkRows.length ? drinkRows : (matureRows.length ? matureRows : fallbackRows)).slice(0, 3);
              const meta = rows.length ? `${rows.length} picks` : 'No mature bottles';
              return `<div class="wine-screener-header"><div class="wine-screener-title">Drink now</div><div class="wine-screener-meta">${meta}</div></div>`;
            ]]]
          rows: >-
            [[[
              const snapshot = hass.states['sensor.wine_collection_snapshot']?.attributes || {};
              const fallbackRows = [
                { qty: '2x', name: 'Enrico VI (Villero) 2004', kind: 'ends soon' },
                { qty: '3x', name: 'Pessac-Leognan Rouge 2016', kind: 'mature' },
                { qty: '4x', name: 'Abstract Red', kind: 'mature' },
              ];
              const safeRows = (value) => Array.isArray(value) ? value.filter((row) => row && typeof row === 'object') : [];
              const text = (value, fallback = '') => String(value ?? fallback);
              const drinkRows = safeRows(snapshot.drink_now_rows);
              const matureRows = safeRows(snapshot.mature_rows);
              const rows = (drinkRows.length ? drinkRows : (matureRows.length ? matureRows : fallbackRows)).slice(0, 3);
              if (!rows.length) {
                return `<div class="wine-bottle-row"><span class="wine-bottle-qty">--</span><span class="wine-bottle-name">No mature bottles ready</span><span class="wine-bottle-kind">later</span></div>`;
              }
              return rows.map((row) => `<div class="wine-bottle-row"><span class="wine-bottle-qty">${text(row.qty, '--')}</span><span class="wine-bottle-name">${text(row.name, 'Unnamed bottle')}</span><span class="wine-bottle-kind">${text(row.kind, 'ready')}</span></div>`).join('');
            ]]]
        tap_action:
          action: url
          url_path: https://docs.google.com/spreadsheets/d/1XBYnqfFw7ggvTGqqeNdX6AaFtzQNf_lKnQHAzyPPA58/edit?usp=sharing
        styles:
          <<: &wine_screener_card_styles
            card:
              - border-radius: 24px
              - padding: 16px 18px 12px
              - min-height: 0
              - border: 1px solid rgba(148, 163, 184, 0.18)
              - box-shadow: 0 10px 20px rgba(2, 8, 23, 0.18)
              - background: linear-gradient(180deg, rgba(15, 23, 42, 0.78), rgba(30, 41, 59, 0.72))
              - backdrop-filter: blur(16px) saturate(160%)
              - -webkit-backdrop-filter: blur(16px) saturate(160%)
            grid:
              - grid-template-areas: '"header" "rows"'
              - grid-template-columns: minmax(0, 1fr)
              - grid-template-rows: auto auto
              - row-gap: 8px
            custom_fields:
              header:
                - justify-self: stretch
                - align-self: start
              rows:
                - justify-self: stretch
                - align-self: start
          grid:
            - grid-template-areas: '"i header" "rows rows"'
            - grid-template-columns: auto minmax(0, 1fr)
            - grid-template-rows: auto auto
            - column-gap: 10px
            - row-gap: 8px
          icon:
            - color: '#fbbf24'
            - width: 18px
            - height: 18px
            - justify-self: start
            - align-self: center
            - margin-top: 2px
        extra_styles: &wine_screener_card_extra |
          .wine-screener-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 12px;
          }
          .wine-screener-title {
            color: #f8fafc;
            font-size: 21px;
            font-weight: 560;
            letter-spacing: 0;
          }
          .wine-screener-meta {
            color: rgba(226, 232, 240, 0.62);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            white-space: nowrap;
          }
          .wine-stat-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 10px;
            align-items: center;
            padding: 4px 0;
            border-top: 1px solid rgba(148, 163, 184, 0.12);
          }
          .wine-stat-row:first-child {
            border-top: none;
            padding-top: 0;
          }
          .wine-stat-row:last-child {
            padding-bottom: 0;
          }
          .wine-stat-label {
            display: block;
            min-width: 0;
            color: rgba(248, 250, 252, 0.92);
            font-size: 13px;
            line-height: 1.25;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
          }
          .wine-stat-label--with-flag {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            min-width: 0;
          }
          .wine-stat-label-text {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
          }
          .wine-stat-flag {
            display: inline-block;
            margin-right: 8px;
            font-size: 15px;
            flex: none;
            transform: translateY(1px);
          }
          .wine-stat-value {
            justify-self: end;
            color: rgba(226, 232, 240, 0.82);
            font-size: 13px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            text-align: right;
          }
          .wine-bottle-row {
            display: grid;
            grid-template-columns: 28px minmax(0, 1fr) auto;
            align-items: baseline;
            gap: 10px;
            padding: 5px 0;
            border-top: 1px solid rgba(148, 163, 184, 0.12);
          }
          .wine-bottle-row:first-child {
            border-top: none;
            padding-top: 0;
          }
          .wine-bottle-row:last-child {
            padding-bottom: 0;
          }
          .wine-bottle-divider {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0 4px;
            color: rgba(226, 232, 240, 0.58);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            line-height: 1.2;
            text-transform: uppercase;
          }
          .wine-bottle-divider:first-child {
            padding-top: 0;
          }
          .wine-bottle-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(148, 163, 184, 0.12);
          }
          .wine-bottle-qty {
            color: rgba(148, 163, 184, 0.92);
            font-size: 12px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, monospace;
          }
          .wine-bottle-name {
            min-width: 0;
            color: #f8fafc;
            font-size: 13px;
            line-height: 1.25;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
          }
          .wine-bottle-kind {
            justify-self: end;
            color: rgba(226, 232, 240, 0.7);
            font-size: 12px;
            line-height: 1.2;
            white-space: nowrap;
            margin-left: 4px;
            text-align: right;
          }

      - type: custom:mushroom-title-card
        title: Environment

      - type: custom:mushroom-template-card
        entity: sensor.wine_cave_status
        primary: >-
          {% set temp = states('sensor.wine_temperature') | float(0) | round(1) %}
          {% set status = states('sensor.wine_cave_status') %}
          {% set cooling = is_state('binary_sensor.wine_cave_cooling_cycle', 'on') %}
          {% set actionable = is_state('binary_sensor.wine_cave_actionable_alert', 'on') %}
          {% set unavailable = is_state('binary_sensor.wine_cave_sensor_unavailable', 'on') %}
          {% set cooling_age = as_timestamp(now()) - as_timestamp(states.binary_sensor.wine_cave_cooling_cycle.last_changed, now()) %}
          {% if status in ['Optimal', 'Normal', 'Good'] %}{{ temp }}°F · Wine cave is optimal
          {% elif unavailable %}{{ temp }}°F · Sensor unavailable
          {% elif cooling and not actionable and cooling_age < 5400 %}{{ temp }}°F · Cooling cycle in progress
          {% elif cooling and not actionable %}{{ temp }}°F · Cycle still settling
          {% elif status == 'Critical' or actionable %}{{ temp }}°F · Conditions need attention
          {% elif is_state('binary_sensor.wine_cave_drift_alert', 'on') %}{{ temp }}°F · Drift needs a look
          {% elif status in ['Warning', 'Caution'] %}{{ temp }}°F · Slightly outside target
          {% else %}{{ temp }}°F · Wine cave unavailable{% endif %}
        secondary: >-
          {% set humidity = states('sensor.wine_humidity') | float(0) | round(0) %}
          {% set cooling = is_state('binary_sensor.wine_cave_cooling_cycle', 'on') %}
          {% set actionable = is_state('binary_sensor.wine_cave_actionable_alert', 'on') %}
          {% set cooling_age = as_timestamp(now()) - as_timestamp(states.binary_sensor.wine_cave_cooling_cycle.last_changed, now()) %}
          {% if cooling and not actionable and cooling_age < 5400 %}
            {{ humidity }}% humidity · normal dip while cooling
          {% elif cooling and not actionable %}
            {{ humidity }}% humidity · watching recovery
          {% else %}
            {{ humidity }}% humidity
          {% endif %}
        icon: >-
          {% set cooling = is_state('binary_sensor.wine_cave_cooling_cycle', 'on') %}
          {% set actionable = is_state('binary_sensor.wine_cave_actionable_alert', 'on') %}
          {% if is_state('binary_sensor.wine_cave_sensor_unavailable', 'on') %}mdi:wifi-alert
          {% elif cooling and not actionable %}mdi:snowflake
          {% elif actionable or states('sensor.wine_cave_status') == 'Critical' %}mdi:alert-circle-outline
          {% else %}mdi:glass-wine{% endif %}
        icon_color: >-
          {% set status = states('sensor.wine_cave_status') %}
          {% set cooling = is_state('binary_sensor.wine_cave_cooling_cycle', 'on') %}
          {% set actionable = is_state('binary_sensor.wine_cave_actionable_alert', 'on') %}
          {% if status in ['Optimal', 'Normal', 'Good'] %}teal
          {% elif cooling and not actionable %}light-blue
          {% elif status in ['Warning', 'Caution'] %}orange
          {% elif status == 'Critical' %}red
          {% else %}grey{% endif %}
        fill_container: true
        tap_action:
          action: more-info
        card_mod:
          style: |
            ha-card {
              border: none;
              box-shadow: none;
              padding: 0;
            }
            .primary {
              font-size: 20px !important;
              font-weight: 400 !important;
              color: inherit !important;
            }
            .secondary {
              color: inherit !important;
              font-size: 14px !important;
              line-height: 1.4 !important;
              opacity: 0.65 !important;
            }

      - type: custom:mushroom-chips-card
        alignment: left
        chips:
          - type: template
            entity: sensor.wine_temperature
            icon: mdi:thermometer
            icon_color: >-
              {% set raw = states('sensor.wine_temperature_24h_stats') %}
              {% if not is_number(raw) %}grey
              {% elif raw | float < 53 %}light-blue
              {% elif raw | float > 57 %}red
              {% else %}teal{% endif %}
            content: >-
              {% set raw = states('sensor.wine_temperature_24h_stats') %}
              {{ (raw | float | round(1) ~ '°F 24h avg') if is_number(raw) else '24h temp pending' }}
            tap_action:
              action: more-info
          - type: template
            entity: sensor.wine_humidity
            icon: mdi:water-percent
            icon_color: >-
              {% set raw = states('sensor.wine_humidity_24h_stats') %}
              {% if not is_number(raw) %}grey
              {% elif raw | float < 50 %}orange
              {% elif raw | float > 65 %}light-blue
              {% else %}teal{% endif %}
            content: >-
              {% set raw = states('sensor.wine_humidity_24h_stats') %}
              {{ (raw | float | round(0) ~ '% 24h avg') if is_number(raw) else '24h humidity pending' }}
            tap_action:
              action: more-info
          - type: template
            entity: sensor.wine_cave_dew_point
            icon: mdi:water-thermometer
            icon_color: amber
            content: >-
              {{ states('sensor.wine_cave_dew_point') | float(0) | round(1) }}°F dew point
            tap_action:
              action: more-info

      - type: custom:apexcharts-card
        graph_span: 24h
        header:
          show: false
        apex_config:
          chart:
            height: 240
            background: transparent
          stroke:
            curve: straight
          xaxis:
            tickAmount: 6
            labels:
              formatter: |
                EVAL:function(value, timestamp) {
                  const source = timestamp ?? value;
                  if (source === null || source === undefined || source === '') return value ?? '';
                  const numeric = typeof source === 'number' ? source : Number(source);
                  const date = Number.isFinite(numeric) ? new Date(numeric) : new Date(source);
                  if (Number.isNaN(date.getTime())) return value ?? '';
                  let hour = date.getHours();
                  const suffix = hour >= 12 ? 'p' : 'a';
                  hour = hour % 12 || 12;
                  return `${hour}${suffix}`;
                }
            tooltip:
              enabled: false
          grid:
            borderColor: rgba(120, 120, 120, 0.16)
          legend:
            show: false
          tooltip:
            theme: dark
            x:
              formatter: |
                EVAL:function(value, opts) {
                  const seriesIndex = opts?.seriesIndex ?? 0;
                  const dataPointIndex = opts?.dataPointIndex ?? 0;
                  const source = opts?.w?.globals?.seriesX?.[seriesIndex]?.[dataPointIndex] ?? value;
                  if (source === null || source === undefined || source === '') return value ?? '';
                  const numeric = typeof source === 'number' ? source : Number(source);
                  const date = Number.isFinite(numeric) ? new Date(numeric) : new Date(source);
                  if (Number.isNaN(date.getTime())) return value ?? '';
                  let hour = date.getHours();
                  const suffix = hour >= 12 ? 'p' : 'a';
                  hour = hour % 12 || 12;
                  return `${hour}${suffix}`;
                }
        yaxis:
          - id: temp
            min: "~52"
            max: "~60"
            align_to: 1
            decimals: 1
            apex_config:
              tickAmount: 4
          - id: humidity
            min: "~45"
            max: "~72"
            align_to: 1
            opposite: true
            decimals: 0
            apex_config:
              tickAmount: 4
        series:
          - entity: sensor.wine_temperature
            name: Temperature
            yaxis_id: temp
            type: line
            color: '#ef5350'
            stroke_width: 1.5
            group_by:
              func: avg
              duration: 10min
              fill: last
          - entity: sensor.wine_humidity
            name: Humidity
            yaxis_id: humidity
