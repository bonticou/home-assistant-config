                {% else %}
                  {% set threshold = states('sensor.lighting_evening_on_schedule_elevation_threshold') | float(10) | round(0) %}
                  {% set threshold_copy = 'On below' %}
                {% endif %}
                {{ 'Active now' if active else 'Off until dusk' }}
                • Sun {{ elevation }}°
                • {{ threshold_copy }} {{ threshold }}°
              multiline_secondary: true
              icon: mdi:coach-lamp
              icon_color: >-
