                {% set motion_entities = [
                  'binary_sensor.wynn_s_room_motion',
                  'binary_sensor.wynn_s_room_person_detected'
                ] %}
                {% set ns = namespace(active=false) %}
                {% for entity in motion_entities %}
                  {% if is_state(entity, 'on') %}
                    {% set ns.active = true %}
                  {% endif %}
                {% endfor %}
                {{ 'teal' if ns.active else 'grey' }}
              fill_container: true
