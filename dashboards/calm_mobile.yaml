            - type: custom:mushroom-template-card
              entity: automation.lights_casey_s_closet_auto_off
              primary: Casey's closet motion helper
              secondary: >-
                {% if is_state('light.master_casey_s_closet', 'on') %}
                  Motion keeps it active; no motion for 3 minutes turns it off.
                {% elif is_state('automation.lights_casey_s_closet_auto_off', 'on') %}
                  Motion turns it on, and stale-on quiet time turns it off.
                {% else %}
                  Automation is disabled.
                {% endif %}
              multiline_secondary: true
              icon: mdi:timer-off-outline
              icon_color: >-
                {% if is_state('light.master_casey_s_closet', 'on') %}
                  amber
                {% else %}
                  grey
                {% endif %}
              tap_action:
                action: none
              hold_action:
                action: none
              card_mod:
                style: *lights_compact_card_style
            - type: custom:mushroom-template-card
              entity: automation.lights_garage_light_auto_off
              primary: Garage light auto-off
              secondary: >-
                {% set camera_entities = [
                  'binary_sensor.g6_instant_motion_3',
                  'binary_sensor.garage_person_detected',
                  'binary_sensor.garage_vehicle_detected'
                ] %}
                {% set ns = namespace(recent=false) %}
                {% for entity_id in camera_entities %}
                  {% set sensor = states[entity_id] %}
                  {% if sensor is not none and sensor.state == 'on' %}
                    {% set ns.recent = true %}
                  {% elif sensor is not none
                          and sensor.state == 'off'
                          and (as_timestamp(now()) - as_timestamp(sensor.last_changed, 0)) < 300 %}
                    {% set ns.recent = true %}
                  {% endif %}
                {% endfor %}
                {% if is_state('switch.garage_garage_lights', 'on') and ns.recent %}
                  Garage light is on - holding because the garage camera saw recent motion.
                {% elif is_state('switch.garage_garage_lights', 'on') %}
                  Garage light is on - auto-off after 5 quiet minutes.
                {% elif is_state('automation.lights_garage_light_auto_off', 'on') %}
