  - title: Wine
    path: wine
    icon: mdi:glass-wine
    cards:
      - type: custom:mushroom-title-card
        title: Wine Cave

      - type: custom:mushroom-template-card
        entity: sensor.wine_cave_status
        primary: >-
          {% set temp = states('sensor.wine_temperature') | float(0) | round(1) %}
          {% set status = states('sensor.wine_cave_status') %}
          {% if status in ['Optimal', 'Normal', 'Good'] %}{{ temp }}°F · Wine cave is optimal
          {% elif status in ['Warning', 'Caution'] %}{{ temp }}°F · Drift needs a look
          {% elif status == 'Critical' %}{{ temp }}°F · Conditions need attention
          {% else %}{{ temp }}°F · Wine cave unavailable{% endif %}
        secondary: >-
          {{ states('sensor.wine_humidity') | float(0) | round(0) }}% humidity
        icon: mdi:glass-wine
        icon_color: >-
          {% set status = states('sensor.wine_cave_status') %}
          {% if status in ['Optimal', 'Normal', 'Good'] %}teal
          {% elif status in ['Warning', 'Caution'] %}orange
          {% elif status == 'Critical' %}red
          {% else %}grey{% endif %}
        fill_container: true
        tap_action:
          action: more-info
        card_mod:
          style: |
            ha-card {
              border: none;
              box-shadow: none;
              padding: 0;
            }
            .primary {
              font-size: 20px !important;
              font-weight: 400 !important;
              color: inherit !important;
            }
            .secondary {
              color: inherit !important;
              font-size: 14px !important;
              line-height: 1.4 !important;
              opacity: 0.65 !important;
            }

      - type: custom:mushroom-chips-card
        alignment: left
        chips:
          - type: template
            entity: sensor.wine_temperature
            icon: mdi:thermometer
            icon_color: >-
              {% set raw = states('sensor.wine_temperature_24h_stats') %}
              {% if not is_number(raw) %}grey
              {% elif raw | float < 53 %}light-blue
              {% elif raw | float > 57 %}red
              {% else %}teal{% endif %}
            content: >-
              {% set raw = states('sensor.wine_temperature_24h_stats') %}
              {{ (raw | float | round(1) ~ '°F 24h avg') if is_number(raw) else '24h temp pending' }}
            tap_action:
              action: more-info
          - type: template
            entity: sensor.wine_humidity
            icon: mdi:water-percent
            icon_color: >-
              {% set raw = states('sensor.wine_humidity_24h_stats') %}
              {% if not is_number(raw) %}grey
              {% elif raw | float < 50 %}orange
              {% elif raw | float > 65 %}light-blue
              {% else %}teal{% endif %}
            content: >-
              {% set raw = states('sensor.wine_humidity_24h_stats') %}
              {{ (raw | float | round(0) ~ '% 24h avg') if is_number(raw) else '24h humidity pending' }}
            tap_action:
              action: more-info
          - type: template
            entity: sensor.wine_cave_dew_point
            icon: mdi:water-thermometer
            icon_color: amber
            content: >-
              {{ states('sensor.wine_cave_dew_point') | float(0) | round(1) }}°F dew point
            tap_action:
              action: more-info
      - type: custom:mushroom-title-card
        title: 24-hour trends
      - type: custom:button-card
        show_icon: false
        show_name: true
        show_state: false
        name: >-
          [[[
            const temp = Number(hass.states['sensor.wine_temperature_24h_stats']?.state);
            const humidity = Number(hass.states['sensor.wine_humidity_24h_stats']?.state);
            return Number.isFinite(temp) && Number.isFinite(humidity)
              ? `Mean temp ${temp.toFixed(1)}°F · Mean humidity ${Math.round(humidity)}%`
              : 'Mean settling in';
          ]]]
        styles: &wine_trends_subtitle_button_styles
          card:
            - background: transparent
            - box-shadow: none
            - border: none
            - border-radius: 0
            - outline: none
            - min-height: 0
            - height: auto
            - padding: 0 16px
            - margin-top: -16px
            - margin-bottom: 10px
          name:
            - justify-self: start
            - color: rgba(226, 232, 240, 0.68)
            - font-size: 14px
            - font-weight: 400
            - line-height: 1.4
