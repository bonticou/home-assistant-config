                        else if (humidity >= 75) label = 'Heavy';
                        else if (humidity >= 60) label = 'Humid';
                        return `<div class="weather-mini-label">Humidity</div><div class="weather-mini-value">${humidity}% · ${label}</div>`;
                      ]]]
                  tap_action:
                    action: none
                  styles:
                    <<: *calm_weather_mini_tile_styles
                  extra_styles: *calm_weather_mini_tile_extra
                - type: custom:button-card
                  entity: weather.forecast_home
                  show_icon: false
                  show_name: false
                  show_state: false
                  custom_fields:
                    icon: >-
                      [[[
                        return `<div class="weather-mini-icon"><ha-icon icon="mdi:weather-windy" style="color:#5eead4"></ha-icon></div>`;
                      ]]]
                    text: >-
                      [[[
                        const speed = Number(entity.attributes.wind_speed ?? 0);
                        const bearing = entity.attributes.wind_bearing;
                        const dirs = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW', 'N'];
                        const direction = bearing == null ? '' : ` ${dirs[Math.floor((Number(bearing) + 22.5) / 45)]}`;
                        const value = speed < 1 ? 'Calm' : `${Math.round(speed)} mph${direction}`;
                        return `<div class="weather-mini-label">Wind</div><div class="weather-mini-value">${value}</div>`;
                      ]]]
                  tap_action:
                    action: none
                  styles:
                    <<: *calm_weather_mini_tile_styles
                  extra_styles: *calm_weather_mini_tile_extra
                - type: custom:button-card
                  entity: sun.sun
                  show_icon: false
                  show_name: false
                  show_state: false
                  custom_fields:
                    icon: >-
                      [[[
                        const above = entity.state === 'above_horizon';
                        const icon = above ? 'mdi:weather-sunset-down' : 'mdi:weather-sunset-up';
                        const color = above ? '#f59e0b' : '#fb923c';
                        return `<div class="weather-mini-icon"><ha-icon icon="${icon}" style="color:${color}"></ha-icon></div>`;
                      ]]]
                    text: >-
                      [[[
                        const above = entity.state === 'above_horizon';
                        const raw = above ? entity.attributes.next_setting : entity.attributes.next_rising;
                        const label = above ? 'Next Light' : 'Next Light';
                        const formatted = raw
                          ? new Date(raw).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })
                          : 'Unavailable';
                        const prefix = above ? 'Sunset' : 'Sunrise';
                        return `<div class="weather-mini-label">${label}</div><div class="weather-mini-value">${prefix} ${formatted}</div>`;
                      ]]]
                  tap_action:
                    action: none
                  styles:
                    <<: *calm_weather_mini_tile_styles
                  extra_styles: *calm_weather_mini_tile_extra
            - type: custom:mushroom-template-card
              entity: weather.forecast_home
              primary: Outlook
              secondary: >-
                {% set condition = states('weather.forecast_home') | replace('-', ' ') | replace('_', ' ') | title %}
                {% set temp = state_attr('weather.forecast_home', 'temperature') | float(0) | round(0) %}
                {% set humidity = state_attr('weather.forecast_home', 'humidity') | int(0) %}
                {% set wind = state_attr('weather.forecast_home', 'wind_speed') | float(0) | round(0) %}
                {% set apparent = state_attr('weather.forecast_home', 'apparent_temperature') %}
                {% set feels = (apparent if apparent is not none else state_attr('weather.forecast_home', 'temperature')) | float(0) | round(0) %}
                {% if humidity < 30 %}{% set air = 'dry air' %}
                {% elif humidity < 60 %}{% set air = 'comfortable air' %}
                {% elif humidity < 75 %}{% set air = 'humid air' %}
                {% else %}{% set air = 'very humid air' %}{% endif %}
                {% if wind < 4 %}{% set breeze = 'calm' %}
                {% elif wind < 12 %}{% set breeze = 'light' %}
                {% elif wind < 20 %}{% set breeze = 'noticeable' %}
                {% else %}{% set breeze = 'strong' %}{% endif %}
                {% if is_state('sun.sun', 'above_horizon') %}
                  {% set sun_label = 'Sunset' %}
                  {% set sun_time = as_timestamp(state_attr('sun.sun', 'next_setting')) | timestamp_custom('%-I:%M %p') %}
                {% else %}
                  {% set sun_label = 'Sunrise' %}
                  {% set sun_time = as_timestamp(state_attr('sun.sun', 'next_rising')) | timestamp_custom('%-I:%M %p') %}
                {% endif %}
                {{ condition }} right now at {{ temp }}°. It feels like {{ feels }}° outside with {{ air }} and {{ breeze }} wind. {{ sun_label }} is at {{ sun_time }}.
              icon: mdi:timeline-text-outline
              icon_color: blue-grey
              multiline_secondary: true
              tap_action:
                action: none
              card_mod:
                style: *calm_popup_panel_style

