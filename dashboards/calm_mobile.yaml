      - type: custom:popup-card
        target:
          entity_id: camera.g6_instant_high_resolution_channel
        title: Basement Camera
        dismiss_icon: mdi:close
        initial_style: wide
        popup_styles: *calm_popup_styles
        card:
          type: vertical-stack
          cards:
            - type: picture-entity
              entity: camera.g6_instant_high_resolution_channel
              camera_image: camera.g6_instant_high_resolution_channel
              camera_view: live
              aspect_ratio: 16x9
              show_name: false
              show_state: false
              tap_action:
                action: none
              card_mod:
                style: |
                  ha-card {
                    border: none;
                    box-shadow: 0 12px 28px rgba(2, 8, 23, 0.24);
                    border-radius: 24px;
                    padding: 0;
                    overflow: hidden;
                    border: 1px solid rgba(148, 163, 184, 0.18);
                    background: linear-gradient(180deg, rgba(15, 23, 42, 0.82), rgba(30, 41, 59, 0.76));
                    --primary-text-color: #f8fafc;
                    --secondary-text-color: #94a3b8;
                  }
                  #root,
                  .box,
                  .image,
                  .viewer,
                  hui-image {
                    margin: 0 !important;
                    padding: 0 !important;
                    border-radius: 24px !important;
                    overflow: hidden !important;
                  }
                  ha-camera-stream,
                  hui-image,
                  img,
                  video {
                    display: block;
                    width: 100% !important;
                    height: auto !important;
                    border-radius: 24px;
                    overflow: hidden;
                  }
            - type: custom:mushroom-template-card
              primary: Basement motion
              secondary: >-
                {% set prefix = 'g6_instant' %}
                {% set keywords = ['motion', 'occupancy', 'person', 'smart', 'ring'] %}
                {% set ns = namespace(entity='', ts=0, active=false) %}
                {% for sensor in states.binary_sensor %}
                  {% set entity = sensor.entity_id %}
                  {% if prefix in entity and sensor.state not in ['unknown', 'unavailable'] %}
                    {% set matched = namespace(ok=false) %}
                    {% for keyword in keywords %}
                      {% if keyword in entity %}
                        {% set matched.ok = true %}
                      {% endif %}
                    {% endfor %}
                    {% if matched.ok %}
                      {% set changed = as_timestamp(sensor.last_changed, 0) %}
                      {% if changed > ns.ts %}
                        {% set ns.entity = entity %}
                        {% set ns.ts = changed %}
                        {% set ns.active = is_state(entity, 'on') %}
                      {% endif %}
                    {% endif %}
                  {% endif %}
                {% endfor %}
                {% if ns.entity %}
                  {{ 'Motion happening now.' if ns.active else 'Last motion ' ~ relative_time(states[ns.entity].last_changed) ~ ' ago.' }}
                {% else %}
                  No recent motion entities found.
                {% endif %}
              icon: mdi:cctv
              icon_color: >-
                {% set prefix = 'g6_instant' %}
                {% set keywords = ['motion', 'occupancy', 'person', 'smart', 'ring'] %}
                {% set ns = namespace(active=false) %}
                {% for sensor in states.binary_sensor %}
                  {% set entity = sensor.entity_id %}
                  {% if prefix in entity and is_state(entity, 'on') %}
                    {% set matched = namespace(ok=false) %}
                    {% for keyword in keywords %}
                      {% if keyword in entity %}
                        {% set matched.ok = true %}
                      {% endif %}
                    {% endfor %}
                    {% if matched.ok %}
                      {% set ns.active = true %}
                    {% endif %}
                  {% endif %}
                {% endfor %}
                {{ 'teal' if ns.active else 'grey' }}
              fill_container: true
              tap_action:
                action: none
              card_mod:
                style: |
                  ha-card {
                    border: none;
                    box-shadow: 0 12px 24px rgba(2, 8, 23, 0.18);
                    padding: 14px 16px;
                    border-radius: 22px;
                    border: 1px solid rgba(148, 163, 184, 0.18);
                    background: linear-gradient(180deg, rgba(15, 23, 42, 0.74), rgba(30, 41, 59, 0.68));
                    color: #f8fafc;
                    --card-primary-color: #f8fafc;
                    --card-secondary-color: #cbd5e1;
                  }
                  .primary {
                    color: #f8fafc !important;
                    font-size: 16px !important;
                    font-weight: 550 !important;
                  }
                  .secondary {
                    color: #cbd5e1 !important;
                    font-size: 13px !important;
                    line-height: 1.4 !important;
                    opacity: 1 !important;
                  }
            - type: custom:button-card
              show_icon: false
              show_name: true
              name: Motion timeline
              tap_action:
                action: none
              custom_fields:
                events: |
                  [[[
                    const prefix = 'g6_instant';
                    const matches = Object.values(states)
                      .filter((s) =>
                        s.entity_id.startsWith(`binary_sensor.${prefix}`) &&
                        /(motion|occupancy|person|smart|ring)/.test(s.entity_id) &&
                        !['unknown', 'unavailable'].includes(s.state)
                      )
                      .sort((a, b) => new Date(b.last_changed) - new Date(a.last_changed))
                      .slice(0, 8);
                    const pretty = (entityId) =>
                      entityId
                        .replace(`binary_sensor.${prefix}_`, '')
                        .replace(/_/g, ' ')
                        .replace(/\b\w/g, (c) => c.toUpperCase());
                    const when = (value) => {
                      const date = new Date(value);
                      const sameDay = date.toDateString() === new Date().toDateString();
                      const time = date.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
                      return sameDay ? time : `${date.toLocaleDateString([], { month: 'short', day: 'numeric' })} ${time}`;
                    };
                    if (!matches.length) {
                      return `<div class="camera-events-empty">No recent motion history found.</div>`;
                    }
                    return `<div class="camera-events">${matches
                      .map(
                        (item) => `
                          <div class="camera-event">
                            <span class="camera-event-marker"></span>
                            <div class="camera-event-copy">
                              <span class="camera-event-type">${pretty(item.entity_id)}</span>
                              <span class="camera-event-time">${when(item.last_changed)}</span>
                            </div>
                          </div>`
                      )
                      .join('')}</div>`;
                  ]]]
              styles:
                card:
                  - border: none
                  - box-shadow: 0 12px 24px rgba(2, 8, 23, 0.18)
                  - padding: 16px
                  - border-radius: 22px
                  - border: 1px solid rgba(148, 163, 184, 0.18)
                  - background: linear-gradient(180deg, rgba(15, 23, 42, 0.74), rgba(30, 41, 59, 0.68))
                  - text-align: left
                name:
                  - justify-self: start
                  - color: '#f8fafc'
                  - font-size: 16px
                  - font-weight: 550
                  - padding: 0 0 10px 0
                custom_fields:
                  events:
                    - justify-self: stretch
                    - align-self: stretch
              extra_styles: |
                .camera-events {
                  position: relative;
                  max-height: 240px;
                  overflow-y: auto;
                  display: grid;
                  gap: 12px;
                  padding-left: 4px;
                }
                .camera-events:before {
                  content: '';
                  position: absolute;
                  left: 8px;
                  top: 6px;
                  bottom: 6px;
                  width: 1px;
                  background: linear-gradient(180deg, rgba(45, 212, 191, 0.55), rgba(148, 163, 184, 0.18));
                }
                .camera-event {
                  position: relative;
                  display: grid;
                  grid-template-columns: 16px 1fr;
                  gap: 12px;
                  align-items: start;
                }
                .camera-event-marker {
                  position: relative;
                  width: 9px;
                  height: 9px;
                  margin-top: 5px;
                  margin-left: 4px;
                  border-radius: 999px;
                  background: #2dd4bf;
                  box-shadow: 0 0 0 4px rgba(45, 212, 191, 0.12);
                  z-index: 1;
                }
                .camera-event-copy {
                  display: grid;
                  gap: 3px;
                  padding: 0 0 10px 0;
                  border-bottom: 1px solid rgba(148, 163, 184, 0.12);
                }
                .camera-event:last-child .camera-event-copy {
                  padding-bottom: 0;
                  border-bottom: none;
                }
                .camera-event-type {
                  color: #f8fafc;
                  font-size: 13px;
                  font-weight: 500;
                  line-height: 1.35;
                }
                .camera-event-time {
                  color: #94a3b8;
                  font-size: 12px;
                  line-height: 1.3;
                }
                .camera-events-empty {
                  color: #94a3b8;
                  font-size: 13px;
                  padding: 4px 0;
                }

