              custom_fields:
                sheet: >-
                  [[[
                    const entityState = (id) => hass.states[id];
                    const state = (id) => entityState(id)?.state;
                    const attr = (id, key) => entityState(id)?.attributes?.[key];
                    const number = (value) => {
                      const parsed = Number(value);
                      return Number.isFinite(parsed) ? parsed : null;
                    };
                    const rounded = (value, digits = 0) => {
                      const parsed = number(value);
                      return parsed === null ? '--' : parsed.toFixed(digits);
                    };
                    const avgTemp = number(state('sensor.downstairs_temp_avg'))
                      ?? number(attr('climate.dining_room', 'current_temperature'));
                    const avgHumidity = number(state('sensor.downstairs_humidity_avg'))
                      ?? number(attr('climate.dining_room', 'current_humidity'));
                    const setpoint = number(state('sensor.downstairs_ecobee_setpoint'))
                      ?? number(attr('climate.dining_room', 'temperature'));
                    const hvacAction = String(attr('climate.dining_room', 'hvac_action') || 'idle');
                    const status = String(state('sensor.downstairs_climate_status') || 'steady');
                    const profile = String(state('select.dining_room_current_mode') || 'unknown');
                    const actionMap = {
                      heating: ['mdi:radiator', 'Heating', '#fb923c'],
                      cooling: ['mdi:snowflake', 'Cooling', '#60a5fa'],
                      fan: ['mdi:fan', 'Fan', '#38bdf8'],
                      idle: ['mdi:weather-night', 'Idle', 'rgba(226, 232, 240, 0.86)'],
                      off: ['mdi:power', 'Off', 'rgba(148, 163, 184, 0.84)'],
                    };
                    const action = actionMap[hvacAction] || actionMap.idle;
                    const statusMap = {
                      steady: ['mdi:check-circle-outline', 'Steady', '#86efac'],
                      warming: ['mdi:radiator', 'Warming', '#fb923c'],
                      cooling: ['mdi:snowflake', 'Cooling', '#60a5fa'],
                      too_warm: ['mdi:thermometer-high', 'Warm', '#fca5a5'],
                      too_cool: ['mdi:thermometer-low', 'Cool', '#a5b4fc'],
                      humid: ['mdi:water-percent-alert', 'Humid', '#67e8f9'],
                      dry: ['mdi:water-off-outline', 'Dry', '#fbbf24'],
                      uneven: ['mdi:thermometer-alert', 'Uneven', '#fdba74'],
                    };
                    const comfort = statusMap[status] || statusMap.steady;
                    const modeLabel = ['home', 'sleep', 'away'].includes(profile)
                      ? profile.charAt(0).toUpperCase() + profile.slice(1)
                      : 'Setpoint';
                    const kitchenTemp = rounded(state('sensor.main_floor_temperature'));
                    const kitchenHumidity = rounded(state('sensor.main_floor_humidity'));
                    const diningTemp = rounded(state('sensor.main_floor_2_temperature'));
                    const diningHumidity = rounded(state('sensor.main_floor_2_humidity'));
                    const spread = rounded(state('sensor.downstairs_temp_spread'), 1);
                    return `
                      <div class="climate-sheet">
                        <div class="climate-header">
                          <div class="room-lockup">
                            <div class="room-icon"><ha-icon icon="mdi:home-thermometer-outline"></ha-icon></div>
                            <div>
                              <div class="room-title">Main Floor</div>
                              <div class="room-subtitle">Kitchen control sensor</div>
                            </div>
                          </div>
                        </div>
                        <div class="climate-metrics">
                          <div class="metric">
                            <ha-icon icon="mdi:water-outline"></ha-icon>
                            <span>${rounded(avgHumidity)}%</span>
                          </div>
                          <div class="metric metric-strong" style="--metric-color:${action[2]}">
                            <ha-icon icon="${action[0]}"></ha-icon>
                            <span>${action[1]}</span>
                          </div>
                          <div class="metric" style="--metric-color:${comfort[2]}">
                            <ha-icon icon="${comfort[0]}"></ha-icon>
                            <span>${comfort[1]}</span>
                          </div>
                        </div>
                        <div class="climate-temp">${avgTemp === null ? '--' : Math.round(avgTemp)}</div>
                        <div class="setpoint-pill">
                          <span class="setpoint-value">${setpoint === null ? '--' : Math.round(setpoint)}</span>
                          <span class="setpoint-rule"></span>
                          <span class="setpoint-label">${modeLabel}</span>
                        </div>
                        <div class="sensor-section">
                          <div class="sensor-heading">
                            <span>2 sensors</span>
                            <ha-icon icon="mdi:chevron-down"></ha-icon>
                          </div>
                          <div class="sensor-row">
                            <div>
                              <div class="sensor-name">Kitchen</div>
                              <div class="sensor-meta">Control sensor</div>
                            </div>
                            <div class="sensor-reading">${kitchenTemp}° · ${kitchenHumidity}%</div>
                          </div>
                          <div class="sensor-row">
                            <div>
                              <div class="sensor-name">Dining Room</div>
                              <div class="sensor-meta">Room sensor · spread ${spread}°</div>
                            </div>
                            <div class="sensor-reading">${diningTemp}° · ${diningHumidity}%</div>
                          </div>
                        </div>
                      </div>
                    `;
                  ]]]
              styles:
                card:
                  - padding: 0
                  - border-radius: 32px
                  - background: transparent
                  - box-shadow: none
                  - overflow: hidden
                grid:
                  - grid-template-areas: '"sheet"'
                  - grid-template-columns: minmax(0, 1fr)
                  - grid-template-rows: auto
                custom_fields:
                  sheet:
                    - justify-self: stretch
                    - align-self: stretch
                    - min-width: 0
              extra_styles: |
                .climate-sheet {
                  box-sizing: border-box;
                  width: 100%;
                  padding: 24px 20px 22px;
                  color: #f8fafc;
                  font-family: var(--primary-font-family);
                }
                .climate-header {
