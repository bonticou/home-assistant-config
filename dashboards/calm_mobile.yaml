      - type: custom:mushroom-title-card
        title: Environment

      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:button-card
            entity: sensor.master_temperature
            show_icon: false
            show_name: false
            show_state: false
            custom_fields:
              icon: >-
                [[[
                  const temp = Math.round(Number(states['sensor.master_temperature']?.state ?? 0));
                  const humidity = Math.round(Number(states['sensor.master_humidity']?.state ?? 0));
                  const color = (temp < 60 || temp > 80 || humidity < 28 || humidity > 65)
                    ? '#ef4444'
                    : (temp < 64 || temp > 76 || humidity < 32 || humidity > 60)
                      ? '#f59e0b'
                      : '#22c55e';
                  return `<div class="tile-icon"><ha-icon icon="mdi:bed-king-outline" style="color:${color}"></ha-icon></div>`;
                ]]]
              text: >-
                [[[
                  const temp = Number(states['sensor.master_temperature']?.state ?? 0);
                  const humidity = Number(states['sensor.master_humidity']?.state ?? 0);
                  return `<div class="tile-copy"><div class="tile-label">Master</div><div class="tile-meta">${Math.round(temp)}° · ${Math.round(humidity)}%</div></div>`;
                ]]]
            tap_action:
              action: more-info
            styles:
              &compact_environment_styles
              <<: *compact_tile_styles
            extra_styles: *compact_tile_extra
          - type: custom:button-card
            entity: sensor.garage_temperature
            show_icon: false
            show_name: false
            show_state: false
            custom_fields:
              icon: >-
                [[[
                  const temp = Number(states['sensor.garage_temperature']?.state ?? 0);
                  const humidity = Number(states['sensor.garage_humidity']?.state ?? 0);
                  const color = (temp < 25 || temp > 115 || humidity > 75)
                    ? '#ef4444'
                    : (temp < 32 || temp > 105 || humidity > 65)
                      ? '#f59e0b'
                      : '#22c55e';
                  return `<div class="tile-icon"><ha-icon icon="mdi:garage" style="color:${color}"></ha-icon></div>`;
                ]]]
              text: >-
                [[[
                  const temp = Number(states['sensor.garage_temperature']?.state ?? 0);
                  const humidity = Number(states['sensor.garage_humidity']?.state ?? 0);
                  return `<div class="tile-copy"><div class="tile-label">Garage</div><div class="tile-meta">${Math.round(temp)}° · ${Math.round(humidity)}%</div></div>`;
                ]]]
            tap_action:
              action: more-info
            styles:
              <<: *compact_environment_styles
            extra_styles: *compact_tile_extra
          - type: custom:button-card
            entity: sensor.mechanical_room_temperature
            show_icon: false
            show_name: false
            show_state: false
            custom_fields:
              icon: >-
                [[[
