                {% set adjustment = state_attr('sensor.lighting_morning_off_schedule_elevation_threshold', 'weather_adjustment') | float(0) %}
                {% set threshold = states('sensor.lighting_morning_off_schedule_elevation_threshold') | float(base) %}
                {% set summary = state_attr('sensor.lighting_morning_off_schedule_elevation_threshold', 'summary') | default('Baseline morning release', true) %}
                Baseline {{ base | round(0) }}°
                {% if adjustment > 0 %}+ {{ adjustment | round(0) }}° dim-morning nudge
                {% elif adjustment < 0 %}- {{ (adjustment | abs) | round(0) }}° clear-morning nudge
                {% else %}+ 0° weather nudge{% endif %}
                • Off above {{ threshold | round(0) }}°
                • {{ summary }}
              multiline_secondary: true
              icon: mdi:weather-sunset-up
              icon_color: >-
                {% set adjustment = state_attr('sensor.lighting_morning_off_schedule_elevation_threshold', 'weather_adjustment') | float(0) %}
                {% if adjustment > 0 %}blue
                {% elif adjustment < 0 %}amber
                {% else %}grey{% endif %}
