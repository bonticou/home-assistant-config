      - type: custom:apexcharts-card
        graph_span: 24h
        header:
          show: false
        apex_config:
          chart:
            height: 240
            background: transparent
          stroke:
            curve: straight
          xaxis:
            tickAmount: 6
            labels:
              formatter: |
                EVAL:function(value, timestamp) {
                  const source = timestamp ?? value;
                  if (source === null || source === undefined || source === '') return value ?? '';
                  const numeric = typeof source === 'number' ? source : Number(source);
                  const date = Number.isFinite(numeric) ? new Date(numeric) : new Date(source);
                  if (Number.isNaN(date.getTime())) return value ?? '';
                  let hour = date.getHours();
                  const suffix = hour >= 12 ? 'p' : 'a';
                  hour = hour % 12 || 12;
                  return `${hour}${suffix}`;
                }
            tooltip:
              enabled: false
          grid:
            borderColor: rgba(120, 120, 120, 0.16)
          legend:
            show: false
          tooltip:
            theme: dark
            x:
              formatter: |
                EVAL:function(value, opts) {
                  const seriesIndex = opts?.seriesIndex ?? 0;
                  const dataPointIndex = opts?.dataPointIndex ?? 0;
                  const source = opts?.w?.globals?.seriesX?.[seriesIndex]?.[dataPointIndex] ?? value;
                  if (source === null || source === undefined || source === '') return value ?? '';
                  const numeric = typeof source === 'number' ? source : Number(source);
                  const date = Number.isFinite(numeric) ? new Date(numeric) : new Date(source);
                  if (Number.isNaN(date.getTime())) return value ?? '';
                  let hour = date.getHours();
                  const suffix = hour >= 12 ? 'p' : 'a';
                  hour = hour % 12 || 12;
                  return `${hour}${suffix}`;
                }
        yaxis:
          - id: temp
            min: "~52"
            max: "~60"
            align_to: 1
            decimals: 1
            apex_config:
              tickAmount: 4
          - id: humidity
