                {% set apparent = state_attr('weather.forecast_home', 'apparent_temperature') %}
                {% set feels = (apparent if apparent is not none else state_attr('weather.forecast_home', 'temperature')) | float(0) | round(0) %}
                {{ condition }} in Chestnut Ridge. Feels like {{ feels }}° with {{ humidity }}% humidity and {{ wind }} mph wind.
              icon: >-
                {% set state = states('weather.forecast_home') %}
                {% set icons = {
                  'clear-night': 'mdi:weather-night',
                  'sunny': 'mdi:weather-sunny',
                  'partlycloudy': 'mdi:weather-partly-cloudy',
                  'cloudy': 'mdi:weather-cloudy',
                  'rainy': 'mdi:weather-rainy',
                  'pouring': 'mdi:weather-pouring',
                  'snowy': 'mdi:weather-snowy',
                  'snowy-rainy': 'mdi:weather-snowy-rainy',
                  'windy': 'mdi:weather-windy',
                  'windy-variant': 'mdi:weather-windy-variant',
                  'fog': 'mdi:weather-fog',
                  'lightning': 'mdi:weather-lightning',
                  'lightning-rainy': 'mdi:weather-lightning-rainy'
                } %}
                {{ icons[state] | default('mdi:weather-cloudy') }}
              icon_color: >-
                {% set state = states('weather.forecast_home') %}
                {% if state == 'sunny' %}amber
                {% elif state in ['rainy', 'pouring', 'lightning-rainy'] %}blue
                {% elif state in ['snowy', 'snowy-rainy'] %}light-blue
                {% elif state in ['clear-night', 'partlycloudy'] %}indigo
                {% else %}blue-grey{% endif %}
              multiline_secondary: true
              fill_container: true
              tap_action:
                action: none
              card_mod:
                style: &calm_weather_popup_hero_style |
                  ha-card {
                    border: none;
                    box-shadow: 0 20px 40px rgba(2, 8, 23, 0.28);
                    padding: 22px 20px 18px;
                    border-radius: 30px;
                    border: 1px solid rgba(148, 163, 184, 0.20);
                    background:
                      radial-gradient(circle at 18% 0%, rgba(125, 211, 252, 0.26), transparent 30%),
                      radial-gradient(circle at 82% 18%, rgba(251, 191, 36, 0.18), transparent 24%),
                      radial-gradient(circle at 50% 120%, rgba(59, 130, 246, 0.18), transparent 46%),
                      linear-gradient(180deg, rgba(8, 47, 73, 0.94), rgba(15, 23, 42, 0.88));
