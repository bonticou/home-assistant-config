                · {{ states('sensor.wine_humidity') | float(0) | round(0) }}%
              secondary: >-
                {% set status = states('sensor.wine_cave_status') %}
                {% set temp_avg = states('sensor.wine_temperature_24h_stats') %}
                {% set humidity_avg = states('sensor.wine_humidity_24h_stats') %}
                {% set cooling = is_state('binary_sensor.wine_cave_cooling_cycle', 'on') %}
                {% set actionable = is_state('binary_sensor.wine_cave_actionable_alert', 'on') %}
                {% set cooling_age = as_timestamp(now()) - as_timestamp(states.binary_sensor.wine_cave_cooling_cycle.last_changed, now()) %}
                {% if status in ['Optimal', 'Normal', 'Good'] %}
                  The cellar is steady. Dew point is {{ states('sensor.wine_cave_dew_point') | float(0) | round(1) }}°F
                  with 24h averages of
                  {{ (temp_avg | float | round(1) ~ '°F') if is_number(temp_avg) else 'pending temp data' }}
                  and
                  {{ (humidity_avg | float | round(0) ~ '%') if is_number(humidity_avg) else 'pending humidity data' }}.
                {% elif cooling and not actionable and cooling_age < 5400 %}
                  This looks like a normal cooling cycle: temperature is in range and humidity is temporarily low.
                  Alerts wait unless the recovery runs long or stops matching the cycle pattern.
                {% elif cooling and not actionable %}
                  This started as a normal cooling cycle, but humidity has been low longer than expected.
                  The watch notification is appropriate now; check the cartridge or door if it does not recover.
                {% elif status in ['Warning', 'Caution'] %}
                  Conditions are slightly outside target. Dew point is {{ states('sensor.wine_cave_dew_point') | float(0) | round(1) }}°F.
                  Home Assistant will wait for the stricter alert sensors before pushing.
                {% elif status == 'Critical' %}
                  Conditions are out of range. Dew point is {{ states('sensor.wine_cave_dew_point') | float(0) | round(1) }}°F
                  and the cave needs attention.
                {% else %}
                  Wine cave status is unavailable right now.
                {% endif %}
              icon: >-
                {% set cooling = is_state('binary_sensor.wine_cave_cooling_cycle', 'on') %}
                {% set actionable = is_state('binary_sensor.wine_cave_actionable_alert', 'on') %}
                {% if is_state('binary_sensor.wine_cave_sensor_unavailable', 'on') %}mdi:wifi-alert
