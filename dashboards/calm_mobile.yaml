                  gap: 7px;
                  color: var(--metric-color, rgba(248, 250, 252, 0.92));
                  font-size: 22px;
                  font-weight: 720;
                  line-height: 1;
                  white-space: nowrap;
                }
                .metric ha-icon {
                  --mdc-icon-size: 24px;
                  color: var(--metric-color, rgba(248, 250, 252, 0.86));
                }
                .metric-strong {
                  font-size: 24px;
                }
                .climate-temp {
                  margin-top: 28px;
                  text-align: center;
                  color: #f8fafc;
                  font-size: clamp(104px, 30vw, 142px);
                  font-weight: 280;
                  line-height: 0.96;
                  letter-spacing: 0;
                  font-variant-numeric: tabular-nums;
                }
                .setpoint-pill {
                  width: fit-content;
                  max-width: 100%;
                  margin: 24px auto 26px;
                  min-height: 72px;
                  padding: 0 22px;
                  border-radius: 999px;
                  border: 4px solid #3b82f6;
                  display: grid;
                  grid-template-columns: auto 2px auto;
                  align-items: center;
                  gap: 22px;
                  background: rgba(15, 23, 42, 0.18);
                  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
                }
                .setpoint-value {
                  color: #3b82f6;
                  font-size: 36px;
                  font-weight: 760;
                  line-height: 1;
                  font-variant-numeric: tabular-nums;
                }
                .setpoint-rule {
                  width: 2px;
                  height: 46px;
                  border-radius: 999px;
                  background: rgba(148, 163, 184, 0.74);
                }
                .setpoint-label {
                  color: rgba(248, 250, 252, 0.92);
                  font-size: 27px;
                  font-weight: 360;
                  line-height: 1;
                  white-space: nowrap;
                }
                .sensor-section {
                  border-top: 1px solid rgba(148, 163, 184, 0.40);
                  padding-top: 18px;
                }
                .sensor-heading {
                  display: flex;
                  align-items: center;
                  justify-content: space-between;
                  gap: 12px;
                  color: #f8fafc;
                  font-size: 30px;
                  font-weight: 430;
                  line-height: 1;
                }
                .sensor-heading ha-icon {
                  --mdc-icon-size: 28px;
                  color: #f8fafc;
                }
                .sensor-row {
                  display: grid;
                  grid-template-columns: minmax(0, 1fr) auto;
                  gap: 14px;
                  align-items: center;
                  padding: 15px 0 0;
                }
                .sensor-name {
                  color: rgba(248, 250, 252, 0.96);
                  font-size: 16px;
                  font-weight: 680;
                  line-height: 1.1;
                  text-align: left;
                }
                .sensor-meta {
                  margin-top: 3px;
                  color: rgba(203, 213, 225, 0.62);
