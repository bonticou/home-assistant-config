        subtitle: Indoor starts and raised-bed progress

      - type: custom:mushroom-template-card
        entity: sensor.garden_today_focus
        primary: >-
          {{ states('sensor.garden_today_focus') }}
        secondary: >-
          {% set indoor = states('sensor.garden_indoor_seedlings_count') | int(0) %}
          {% set trays = states('sensor.garden_outdoor_seedlings_count') | int(0) %}
          {% set planted = states('sensor.garden_outdoor_planted_count') | int(0) %}
          {{ indoor }} indoors{% if trays > 0 %} · {{ trays }} outside in trays{% endif %}{% if planted > 0 %} · {{ planted }} in raised beds{% endif %} · started April 11, 2026 · day {{ states('sensor.garden_days_since_sowing') }}.
          Next: {{ states('sensor.garden_next_milestone') }}.
        icon: mdi:sprout-outline
        icon_color: >-
          {% if is_state('binary_sensor.garden_water_review_due', 'on') %}amber
          {% elif is_state('binary_sensor.garden_seedling_check_due', 'on') %}blue
          {% elif is_state('binary_sensor.garden_basil_weather_ready', 'on') %}green
          {% elif is_state('binary_sensor.garden_marigolds_weather_ready', 'on') %}teal
          {% else %}grey{% endif %}
        multiline_secondary: true
        card_mod:
          style: &garden_hero_card_style |
            ha-card {
              min-height: 172px;
              border: none;
              box-shadow: 0 18px 40px rgba(2, 8, 23, 0.22);
              border-radius: 30px;
              padding: 14px 8px;
              border: 1px solid rgba(148, 163, 184, 0.16);
              background:
                radial-gradient(circle at top right, rgba(110, 231, 183, 0.14), transparent 28%),
                radial-gradient(circle at bottom left, rgba(45, 212, 191, 0.10), transparent 26%),
                linear-gradient(180deg, rgba(15, 23, 42, 0.94), rgba(15, 23, 42, 0.88));
            }
            .primary {
              font-size: 28px !important;
              font-weight: 560 !important;
              letter-spacing: -0.04em;
              line-height: 1.02 !important;
            }
            .secondary {
              line-height: 1.45 !important;
              opacity: 0.9 !important;
              max-width: 30rem;
            }
            mushroom-shape-icon {
              --shape-color: rgba(255, 255, 255, 0.06) !important;
            }

      - type: custom:mushroom-template-card
        entity: sensor.garden_outdoor_snapshot
        primary: >-
          {% if is_state('binary_sensor.garden_basil_weather_ready', 'on') %}
            Warm enough for basil and marigolds
          {% elif is_state('binary_sensor.garden_marigolds_weather_ready', 'on') %}
            Good window for marigolds
          {% else %}
            Not ready for outdoor nights
          {% endif %}
        secondary: >-
          Now {{ states('sensor.garden_outdoor_snapshot') }}.
          4-night low {{ states('sensor.garden_lowest_forecast_low_4_day') }}°.
          {{ states('sensor.garden_weather_readiness') }}.
        icon: >-
          {% set condition = states('weather.forecast_home') %}
          {% set icons = {
            'clear-night': 'mdi:weather-night',
            'sunny': 'mdi:weather-sunny',
            'partlycloudy': 'mdi:weather-partly-cloudy',
            'cloudy': 'mdi:weather-cloudy',
            'rainy': 'mdi:weather-rainy',
            'pouring': 'mdi:weather-pouring',
            'snowy': 'mdi:weather-snowy',
            'snowy-rainy': 'mdi:weather-snowy-rainy',
            'windy': 'mdi:weather-windy',
            'windy-variant': 'mdi:weather-windy-variant',
            'fog': 'mdi:weather-fog',
            'lightning': 'mdi:weather-lightning',
            'lightning-rainy': 'mdi:weather-lightning-rainy'
          } %}
          {{ icons[condition] | default('mdi:weather-cloudy') }}
        icon_color: >-
          {% if is_state('binary_sensor.garden_basil_weather_ready', 'on') %}green
          {% elif is_state('binary_sensor.garden_marigolds_weather_ready', 'on') %}teal
          {% elif states('weather.forecast_home') in ['rainy', 'pouring', 'lightning-rainy'] %}blue
          {% else %}grey{% endif %}
        multiline_secondary: true
        card_mod:
          style: &garden_support_card_style |
            ha-card {
              border: none;
              box-shadow: 0 14px 28px rgba(2, 8, 23, 0.18);
              border-radius: 26px;
              padding: 10px 6px;
              border: 1px solid rgba(148, 163, 184, 0.14);
              background:
                radial-gradient(circle at top right, rgba(56, 189, 248, 0.12), transparent 28%),
                radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.10), transparent 24%),
                linear-gradient(180deg, rgba(15, 23, 42, 0.90), rgba(15, 23, 42, 0.84));
            }
            .primary {
              font-size: 20px !important;
              font-weight: 540 !important;
              letter-spacing: -0.02em;
            }
            .secondary {
              line-height: 1.42 !important;
              opacity: 0.88 !important;
            }
            mushroom-shape-icon {
              --shape-color: rgba(255, 255, 255, 0.06) !important;
            }

      - type: custom:mushroom-chips-card
        alignment: left
        chips:
          - type: template
            entity: sensor.garden_check_status
            icon: mdi:clipboard-check-outline
            icon_color: >-
              {{ 'amber' if is_state('binary_sensor.garden_seedling_check_due', 'on') else 'green' }}
            content: >-
              {{ states('sensor.garden_check_status') }}
          - type: template
            entity: sensor.garden_watering_status
            icon: mdi:watering-can-outline
            icon_color: >-
              {{ 'amber' if is_state('binary_sensor.garden_water_review_due', 'on') else 'green' }}
            content: >-
              {{ states('sensor.garden_watering_status') }}
        card_mod:
          style: |
            ha-card {
              border: none;
              box-shadow: none;
              --chip-spacing: 10px;
              margin-top: -2px;
            }
            mushroom-template-chip {
              --chip-background: rgba(15, 23, 42, 0.72);
              --chip-border-width: 1px;
              --chip-border-color: rgba(148, 163, 184, 0.14);
            }

      - type: custom:mushroom-title-card
        title: Current Crops

      - type: custom:mushroom-template-card
        entity: sensor.garden_basil_genovese_status
        primary: Basil
        secondary: >-
          16 starts · Genovese + lettuce.
          {{ state_attr('sensor.garden_basil_genovese_status', 'stage_note') }}.
          Harden around {{ state_attr('sensor.garden_basil_genovese_status', 'hardening_target') }}.
        icon: mdi:leaf
        icon_color: >-
          {% if is_state('input_boolean.garden_basil_outside', 'on') %}green
          {% elif is_state('input_boolean.garden_basil_hardening_off', 'on') %}amber
          {% else %}teal{% endif %}
        multiline_secondary: true
        card_mod:
          style: &garden_crop_card_style |
            ha-card {
              border: none;
              box-shadow: 0 12px 24px rgba(2, 8, 23, 0.14);
              border-radius: 24px;
              padding: 8px 6px;
              border: 1px solid rgba(148, 163, 184, 0.12);
              background:
                radial-gradient(circle at top right, rgba(34, 197, 94, 0.08), transparent 22%),
                linear-gradient(180deg, rgba(15, 23, 42, 0.84), rgba(15, 23, 42, 0.78));
            }
            .primary {
              font-size: 20px !important;
              font-weight: 540 !important;
            }
            .secondary {
              line-height: 1.42 !important;
              opacity: 0.86 !important;
            }
            mushroom-shape-icon {
              --shape-color: rgba(255, 255, 255, 0.05) !important;
            }

      - type: custom:mushroom-template-card
        entity: sensor.garden_petite_marigolds_status
        primary: Petite Marigolds
        secondary: >-
          {{ state_attr('sensor.garden_petite_marigolds_status', 'count') }} starts.
          {{ state_attr('sensor.garden_petite_marigolds_status', 'stage_note') }}.
          Harden around {{ state_attr('sensor.garden_petite_marigolds_status', 'hardening_target') }}.
        icon: >-
          {% if is_state('input_boolean.garden_marigolds_outside', 'on') %}mdi:flower
          {% elif is_state('input_boolean.garden_marigolds_hardening_off', 'on') %}mdi:flower-pollen-outline
          {% else %}mdi:flower-outline{% endif %}
        icon_color: >-
          {% if is_state('input_boolean.garden_marigolds_outside', 'on') %}green
          {% elif is_state('input_boolean.garden_marigolds_hardening_off', 'on') %}amber
          {% elif is_state('binary_sensor.garden_marigolds_weather_ready', 'on') %}teal
          {% else %}grey{% endif %}
        multiline_secondary: true
        card_mod:
          style: *garden_crop_card_style

      - type: custom:mushroom-template-card
        entity: sensor.garden_spinach_status
        primary: Spinach
        secondary: >-
          {{ state_attr('sensor.garden_spinach_status', 'count') }} starts.
          {{ state_attr('sensor.garden_spinach_status', 'stage_note') }}
        icon: mdi:leaf
        icon_color: green
        multiline_secondary: true
        card_mod:
          style: *garden_crop_card_style

      - type: custom:mushroom-title-card
        title: Actions

      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-template-card
            primary: Mark Checked
            secondary: Log a quick tray inspection
            icon: mdi:clipboard-check-outline
            icon_color: blue
            tap_action:
              action: call-service
              service: script.turn_on
              target:
                entity_id: script.garden_mark_seedlings_checked
            card_mod:
              style: &garden_action_card_style |
                ha-card {
                  border: none;
                  box-shadow: 0 10px 22px rgba(2, 8, 23, 0.14);
                  border-radius: 22px;
                  border: 1px solid rgba(148, 163, 184, 0.12);
                  background:
                    linear-gradient(180deg, rgba(15, 23, 42, 0.82), rgba(15, 23, 42, 0.74));
                }
                .primary {
                  font-weight: 540 !important;
                }
                .secondary {
                  opacity: 0.82 !important;
                }
          - type: custom:mushroom-template-card
            primary: Mark Watered
            secondary: Log today’s watering pass
            icon: mdi:watering-can-outline
            icon_color: teal
            tap_action:
              action: call-service
              service: script.turn_on
              target:
                entity_id: script.garden_mark_seedlings_watered
            card_mod:
              style: *garden_action_card_style

      - type: custom:mushroom-template-card
        entity: sensor.garden_next_stage_step
        primary: >-
          {{ states('sensor.garden_next_stage_step') }}
        secondary: >-
          {{ state_attr('sensor.garden_next_stage_step', 'detail') }}
        icon: >-
          {% set action_id = state_attr('sensor.garden_next_stage_step', 'action_id') %}
          {% if action_id in ['start_marigolds_hardening', 'start_basil_hardening'] %}mdi:white-balance-sunny
          {% elif action_id in ['mark_marigolds_outside', 'mark_basil_outside'] %}mdi:arrow-right-circle-outline
          {% else %}mdi:calendar-check-outline{% endif %}
        icon_color: >-
          {% set action_id = state_attr('sensor.garden_next_stage_step', 'action_id') %}
          {% if action_id in ['start_marigolds_hardening', 'start_basil_hardening'] %}amber
          {% elif action_id in ['mark_marigolds_outside', 'mark_basil_outside'] %}green
          {% else %}grey{% endif %}
        multiline_secondary: true
        tap_action:
          action: call-service
          service: script.turn_on
          target:
            entity_id: script.garden_apply_next_stage
        card_mod:
          style: |
            ha-card {
              border: none;
              box-shadow: 0 14px 28px rgba(2, 8, 23, 0.18);
              border-radius: 26px;
              padding: 10px 6px;
              border: 1px solid rgba(148, 163, 184, 0.14);
              background:
                radial-gradient(circle at top right, rgba(251, 191, 36, 0.12), transparent 26%),
                radial-gradient(circle at bottom left, rgba(34, 197, 94, 0.10), transparent 22%),
                linear-gradient(180deg, rgba(15, 23, 42, 0.90), rgba(15, 23, 42, 0.82));
            }
            .primary {
              font-size: 21px !important;
              font-weight: 550 !important;
              letter-spacing: -0.02em;
            }
            .secondary {
              line-height: 1.42 !important;
              opacity: 0.88 !important;
            }

      - type: custom:mushroom-title-card
        title: Plant Notes
        subtitle: Update these only when something changes

      - type: entities
        title: Observation Check-In
        show_header_toggle: false
        entities:
          - entity: input_select.garden_basil_observation
            name: Basil
          - entity: input_select.garden_marigolds_observation
            name: Marigolds
          - entity: input_select.garden_spinach_observation
            name: Spinach
        card_mod:
          style: |
            ha-card {
              border: none;
              box-shadow: 0 12px 24px rgba(2, 8, 23, 0.14);
              border-radius: 24px;
              border: 1px solid rgba(148, 163, 184, 0.12);
              background:
                linear-gradient(180deg, rgba(15, 23, 42, 0.82), rgba(15, 23, 42, 0.76));
            }
