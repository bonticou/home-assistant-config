          {% elif status == 'cooling' %}blue
          {% elif status == 'too_warm' %}red
          {% elif status == 'too_cool' %}indigo
          {% elif status == 'humid' %}cyan
          {% elif status == 'dry' %}amber
          {% elif status == 'uneven' %}deep-orange
          {% else %}green{% endif %}
