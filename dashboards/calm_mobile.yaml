              icon: mdi:garage-variant
              icon_color: >-
                {% if is_state('switch.garage_garage_lights', 'on') %}
                  amber
                {% else %}
                  grey
                {% endif %}
              tap_action:
                action: none
              hold_action:
                action: none
              card_mod:
                style: *lights_compact_card_style

