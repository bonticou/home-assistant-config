              show_icon: false
              show_name: false
              show_state: false
              tap_action:
                action: none
              custom_fields:
                body: >-
                  [[[
                    const active = states['input_boolean.vacation_mode']?.state === 'on';
                    const windowState = states['sensor.vacation_activity_window']?.state || 'off';
                    const phase = states['sensor.vacation_activity_window']?.attributes?.detail_phase || 'unknown';
                    const elevation = Number(states['sun.sun']?.attributes?.elevation ?? 0).toFixed(1);
                    const phaseText = active && windowState === 'evening' && phase === 'evening_lived_in'
                      ? 'Evening activity until about 9:30 PM'
                      : active && windowState === 'evening'
                        ? 'Late glow until about 11:45 PM'
                      : active && windowState === 'pre_sunrise'
                          ? 'Pre-sunrise activity until daylight'
                          : active
                            ? `Waiting for the next sun window · Sun ${elevation}°`
                            : 'Ready when you are';
                    const title = active ? 'Vacation glow is on' : 'Vacation glow';
                    const copy = active
                      ? 'The house is following the sun curve and adjusting only during the evening and pre-sunrise windows.'
                      : 'Low-drama house theater: believable light after sunset, a tiny wakeup before sunrise, then daylight takes over.';
