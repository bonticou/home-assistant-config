                    --shape-color: rgba(34, 197, 94, 0.13) !important;
                  }
            - type: custom:button-card
              entity: input_datetime.away_motion_security_snooze_until
              triggers_update:
                - binary_sensor.downstairs_everyone_away
              show_icon: false
              show_name: false
              show_state: false
              custom_fields:
                icon: >-
                  [[[
                    const until = entity.state;
                    const untilDate = until && !['unknown', 'unavailable', ''].includes(until)
                      ? new Date(until.replace(' ', 'T'))
                      : null;
                    const paused = untilDate && untilDate.getTime() > Date.now();
                    const icon = paused ? 'mdi:motion-sensor-off' : 'mdi:motion-sensor';
                    return `<div class="security-motion-icon ${paused ? 'paused' : 'armed'}"><ha-icon icon="${icon}"></ha-icon></div>`;
                  ]]]
                name: Motion watch
                meta: Away motion alerts only
                state: >-
                  [[[
                    const until = entity.state;
                    const untilDate = until && !['unknown', 'unavailable', ''].includes(until)
                      ? new Date(until.replace(' ', 'T'))
                      : null;
                    const paused = untilDate && untilDate.getTime() > Date.now();
                    if (!paused) return '<span class="security-motion-state armed">Armed</span>';
                    const time = untilDate.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
                    return `<span class="security-motion-state paused">Paused until ${time}</span>`;
