                    top: -56px;
                    right: 0;
                    z-index: 5;
                    width: 98px;
                    display: block;
                  }
            - type: custom:button-card
              show_icon: false
              show_name: false
              show_state: false
              tap_action:
                action: none
              custom_fields:
                sheet: >-
                  [[[
                    const entityState = (id) => hass.states[id];
                    const state = (id) => entityState(id)?.state;
                    const attr = (id, key) => entityState(id)?.attributes?.[key];
                    const number = (value) => {
                      const parsed = Number(value);
                      return Number.isFinite(parsed) ? parsed : null;
                    };
                    const rounded = (value, digits = 0) => {
                      const parsed = number(value);
                      return parsed === null ? '--' : parsed.toFixed(digits);
                    };
                    const masterTemp = number(state('sensor.master_temperature'))
                      ?? number(state('sensor.master_current_temperature_2'))
                      ?? number(attr('climate.master_2', 'current_temperature'));
                    const masterHumidity = number(state('sensor.master_humidity'))
                      ?? number(state('sensor.master_current_humidity_2'))
                      ?? number(attr('climate.master_2', 'current_humidity'));
                    const setpoint = number(attr('climate.master_2', 'temperature'));
                    const hvacAction = String(attr('climate.master_2', 'hvac_action') || 'idle');
                    const status = String(state('sensor.environment_primary_bedroom_status') || 'steady').trim();
                    const rawProfile = String(state('select.master_current_mode_2') || 'unknown');
                    const profile = rawProfile.toLowerCase();
                    const actionMap = {
                      heating: ['mdi:radiator', 'Heating', '#fb923c'],
                      cooling: ['mdi:snowflake', 'Cooling', '#60a5fa'],
                      fan: ['mdi:fan', 'Fan', '#38bdf8'],
                      idle: ['mdi:weather-night', 'Idle', 'rgba(226, 232, 240, 0.86)'],
                      off: ['mdi:power', 'Off', 'rgba(148, 163, 184, 0.84)'],
                    };
                    const action = actionMap[hvacAction] || actionMap.idle;
                    const statusMap = {
                      steady: ['mdi:check-circle-outline', 'Steady', '#86efac'],
                      watch: ['mdi:eye-outline', 'Watch', '#fbbf24'],
                      attention: ['mdi:alert-circle-outline', 'Attention', '#fca5a5'],
                      unavailable: ['mdi:cloud-alert-outline', 'Offline', '#94a3b8'],
                    };
                    const comfort = statusMap[status] || statusMap.steady;
                    const modeLabel = ['home', 'sleep', 'away'].includes(profile)
                      ? profile.charAt(0).toUpperCase() + profile.slice(1)
                      : 'Setpoint';
                    const issue = attr('sensor.environment_primary_bedroom_status', 'issue') || comfort[1];
                    const roomTemp = rounded(state('sensor.master_temperature'));
                    const roomHumidity = rounded(state('sensor.master_humidity'));
                    const ecobeeTemp = rounded(state('sensor.master_current_temperature_2'));
                    const ecobeeHumidity = rounded(state('sensor.master_current_humidity_2'));
                    const ecobeeSensorTemp = rounded(state('sensor.master_sensor_new_temperature_2'));
                    const ecobeeSensorBattery = rounded(state('sensor.master_sensor_new_battery_2'));
                    return `
                      <div class="master-climate-sheet">
                        <div class="climate-header">
                          <div class="room-lockup">
                            <div class="room-icon"><ha-icon icon="mdi:bed-king-outline"></ha-icon></div>
                            <div>
                              <div class="room-title">Master Bedroom</div>
                              <div class="room-subtitle">SensorPush room sensor</div>
                            </div>
                          </div>
                        </div>
                        <div class="climate-metrics">
                          <div class="metric">
                            <ha-icon icon="mdi:water-outline"></ha-icon>
                            <span>${rounded(masterHumidity)}%</span>
                          </div>
                          <div class="metric metric-strong" style="--metric-color:${action[2]}">
                            <ha-icon icon="${action[0]}"></ha-icon>
                            <span>${action[1]}</span>
                          </div>
                          <div class="metric" style="--metric-color:${comfort[2]}">
                            <ha-icon icon="${comfort[0]}"></ha-icon>
                            <span>${comfort[1]}</span>
                          </div>
                        </div>
                        <div class="climate-temp">${masterTemp === null ? '--' : Math.round(masterTemp)}</div>
                        <div class="setpoint-pill">
                          <span class="setpoint-value">${setpoint === null ? '--' : Math.round(setpoint)}</span>
                          <span class="setpoint-rule"></span>
                          <span class="setpoint-label">${modeLabel}</span>
                        </div>
                        <div class="sensor-section">
                          <div class="sensor-heading">
                            <span>3 signals</span>
                            <ha-icon icon="mdi:chevron-down"></ha-icon>
                          </div>
                          <div class="sensor-row">
                            <div>
                              <div class="sensor-name">Room sensor</div>
                              <div class="sensor-meta">${issue}</div>
                            </div>
                            <div class="sensor-reading">${roomTemp}° · ${roomHumidity}%</div>
                          </div>
                          <div class="sensor-row">
                            <div>
                              <div class="sensor-name">Master Ecobee</div>
                              <div class="sensor-meta">Thermostat context</div>
                            </div>
                            <div class="sensor-reading">${ecobeeTemp}° · ${ecobeeHumidity}%</div>
                          </div>
                          <div class="sensor-row">
                            <div>
                              <div class="sensor-name">Ecobee sensor</div>
                              <div class="sensor-meta">Battery ${ecobeeSensorBattery}%</div>
                            </div>
                            <div class="sensor-reading">${ecobeeSensorTemp}°</div>
                          </div>
                        </div>
                      </div>
                    `;
                  ]]]
              styles:
                card:
                  - padding: 0
                  - border-radius: 32px
                  - background: transparent
                  - box-shadow: none
                  - overflow: hidden
                grid:
                  - grid-template-areas: '"sheet"'
                  - grid-template-columns: minmax(0, 1fr)
                  - grid-template-rows: auto
                custom_fields:
                  sheet:
                    - justify-self: stretch
                    - align-self: stretch
                    - min-width: 0
              extra_styles: |
                .master-climate-sheet {
                  box-sizing: border-box;
                  width: 100%;
                  padding: 24px 20px 22px;
                  color: #f8fafc;
                  font-family: var(--primary-font-family);
                }
                .climate-header {
                  display: flex;
                  justify-content: space-between;
                  align-items: center;
                  gap: 14px;
                }
                .room-lockup {
                  display: flex;
                  align-items: center;
                  min-width: 0;
                  gap: 13px;
                }
                .room-icon {
                  width: 48px;
                  height: 48px;
                  border-radius: 16px;
                  border: 2px solid rgba(248, 250, 252, 0.92);
                  display: grid;
                  place-items: center;
                  flex: 0 0 auto;
                }
                .room-icon ha-icon {
                  --mdc-icon-size: 24px;
                  color: #f8fafc;
                }
                .room-title {
                  color: #f8fafc;
                  font-size: 29px;
                  font-weight: 720;
                  line-height: 1.05;
                  letter-spacing: 0;
                  text-align: left;
                }
                .room-subtitle {
                  margin-top: 5px;
                  color: rgba(226, 232, 240, 0.66);
                  font-size: 12px;
                  font-weight: 620;
                  letter-spacing: 0.04em;
                  text-transform: uppercase;
                  text-align: left;
                }
                .climate-metrics {
                  display: grid;
                  grid-template-columns: repeat(3, minmax(0, 1fr));
                  gap: 12px;
                  margin-top: 26px;
                  align-items: center;
                }
                .metric {
                  min-width: 0;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  gap: 7px;
                  color: var(--metric-color, rgba(248, 250, 252, 0.92));
                  font-size: 22px;
                  font-weight: 720;
                  line-height: 1;
                  white-space: nowrap;
                }
                .metric ha-icon {
                  --mdc-icon-size: 24px;
                  color: var(--metric-color, rgba(248, 250, 252, 0.86));
                }
                .metric-strong {
                  font-size: 24px;
                }
                .climate-temp {
                  margin-top: 28px;
                  text-align: center;
                  color: #f8fafc;
                  font-size: clamp(104px, 30vw, 142px);
                  font-weight: 280;
                  line-height: 0.96;
                  letter-spacing: 0;
                  font-variant-numeric: tabular-nums;
                }
                .setpoint-pill {
                  width: fit-content;
                  max-width: 100%;
                  margin: 24px auto 26px;
                  min-height: 72px;
                  padding: 0 22px;
                  border-radius: 999px;
                  border: 4px solid #60a5fa;
                  display: grid;
                  grid-template-columns: auto 2px auto;
                  align-items: center;
                  gap: 22px;
                  background: rgba(15, 23, 42, 0.18);
                  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
                }
                .setpoint-value {
                  color: #60a5fa;
                  font-size: 36px;
                  font-weight: 760;
                  line-height: 1;
                  font-variant-numeric: tabular-nums;
                }
                .setpoint-rule {
                  width: 2px;
                  height: 46px;
                  border-radius: 999px;
                  background: rgba(148, 163, 184, 0.74);
                }
                .setpoint-label {
                  color: rgba(248, 250, 252, 0.92);
                  font-size: 27px;
                  font-weight: 360;
                  line-height: 1;
                  white-space: nowrap;
                }
                .sensor-section {
                  border-top: 1px solid rgba(148, 163, 184, 0.40);
                  padding-top: 18px;
                }
                .sensor-heading {
                  display: flex;
                  align-items: center;
                  justify-content: space-between;
                  gap: 12px;
                  color: #f8fafc;
                  font-size: 30px;
                  font-weight: 430;
                  line-height: 1;
                }
                .sensor-heading ha-icon {
                  --mdc-icon-size: 28px;
                  color: #f8fafc;
                }
                .sensor-row {
                  display: grid;
                  grid-template-columns: minmax(0, 1fr) auto;
                  gap: 14px;
                  align-items: center;
                  padding: 15px 0 0;
                }
                .sensor-name {
                  color: rgba(248, 250, 252, 0.96);
                  font-size: 16px;
                  font-weight: 680;
                  line-height: 1.1;
                  text-align: left;
                }
                .sensor-meta {
                  margin-top: 3px;
                  color: rgba(203, 213, 225, 0.62);
                  font-size: 12px;
                  font-weight: 520;
                  line-height: 1.2;
                  text-align: left;
                }
                .sensor-reading {
                  color: rgba(248, 250, 252, 0.90);
                  font-size: 16px;
                  font-weight: 700;
                  white-space: nowrap;
                  font-variant-numeric: tabular-nums;
                }
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:button-card
            entity: sensor.away_security_entry_point_issues
            triggers_update:
              - binary_sensor.away_security_garage_door_open
              - input_datetime.away_motion_security_snooze_until
            show_icon: false
            show_name: false
            show_state: false
            custom_fields:
              icon: >-
                [[[
                  const stateMap = hass?.states || {};
                  const count = Number(entity?.state ?? 0);
                  const garageOpen = stateMap['binary_sensor.away_security_garage_door_open']?.state === 'on';
                  const motionUntil = stateMap['input_datetime.away_motion_security_snooze_until']?.state;
                  const motionPaused = motionUntil
                    && !['unknown', 'unavailable', ''].includes(motionUntil)
                    && new Date(motionUntil.replace(' ', 'T')).getTime() > Date.now();
                  const icon = garageOpen
                    ? 'mdi:garage-open-variant'
                    : motionPaused
                      ? 'mdi:motion-sensor-off'
                      : count > 0
                        ? 'mdi:lock-open-variant-outline'
                        : 'mdi:shield-check-outline';
                  const color = count > 0 ? '#ef4444' : motionPaused ? '#f59e0b' : '#22c55e';
                  return `<div class="tile-icon"><ha-icon icon="${icon}" style="color:${color}"></ha-icon></div>`;
                ]]]
              text: >-
                [[[
                  const stateMap = hass?.states || {};
                  const count = Number(entity?.state ?? 0);
                  const issue = entity?.attributes?.issue || entity?.attributes?.label || '';
                  const motionUntil = stateMap['input_datetime.away_motion_security_snooze_until']?.state;
                  const motionUntilDate = motionUntil && !['unknown', 'unavailable', ''].includes(motionUntil)
                    ? new Date(motionUntil.replace(' ', 'T'))
                    : null;
                  const motionPaused = motionUntilDate && motionUntilDate.getTime() > Date.now();
                  const motionTime = motionPaused
                    ? motionUntilDate.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })
                    : '';
                  const meta = motionPaused
                    ? `Motion paused until ${motionTime}`
                    : count === 0
                      ? 'All secure'
                      : count === 1
                        ? issue
                        : `${count} issues`;
                  return `<div class="tile-copy"><div class="tile-label">Security</div><div class="tile-meta">${meta}</div></div>`;
                ]]]
            tap_action:
              action: fire-dom-event
              browser_mod:
                service: browser_mod.popup
                data:
                  popup_card_id: security-popup
            hold_action:
              action: more-info
            styles:
              &compact_tile_styles
              card:
                - height: 44px
                - padding: 0 10px
                - border-radius: 20px
                - box-shadow: none
                - text-align: left
                - overflow: hidden
              grid:
                - grid-template-areas: '"icon text"'
                - grid-template-columns: 24px minmax(0, 1fr)
                - column-gap: 8px
                - align-items: center
              custom_fields:
                icon:
                  - grid-area: icon
                  - justify-self: start
                  - align-self: center
                text:
                  - grid-area: text
                  - justify-self: stretch
                  - align-self: center
                  - min-width: 0
            extra_styles: &compact_tile_extra |
              .tile-icon {
                width: 24px;
                height: 24px;
                border-radius: 999px;
                background: rgba(148, 163, 184, 0.14);
                display: grid;
                place-items: center;
                line-height: 0;
              }
              .tile-icon ha-icon {
                display: block;
                width: 14px;
                height: 14px;
                margin: 0;
                padding: 0;
                line-height: 0;
                --mdc-icon-size: 14px;
              }
              .tile-icon ha-svg-icon,
              .tile-icon svg {
                display: block;
                width: 14px;
                height: 14px;
              }
              .tile-label {
                color: #f8fafc;
                font-size: 13px;
                font-weight: 500;
                line-height: 1.1;
              }
              .tile-copy {
                display: flex;
                width: 100%;
                min-height: 100%;
                flex-direction: column;
                justify-content: center;
                align-items: flex-start;
                text-align: left;
              }
              .tile-meta {
                color: rgba(226, 232, 240, 0.74);
                font-size: 11px;
                line-height: 1.1;
                margin-top: 1px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
              }
          - type: custom:button-card
            entity: switch.flo_shutoff_shutoff_valve
            show_icon: false
            show_name: false
            show_state: false
            custom_fields:
              icon: >-
                [[[
                  const stateMap = hass?.states || {};
                  const flow = Number(stateMap['sensor.flo_shutoff_water_flow_rate']?.state ?? 0);
                  const color = entity?.state === 'off'
                    ? '#ef4444'
                    : flow > 0.1 ? '#3b82f6' : '#22c55e';
                  return `<div class="tile-icon"><ha-icon icon="mdi:water" style="color:${color}"></ha-icon></div>`;
                ]]]
              text: >-
                [[[
                  const stateMap = hass?.states || {};
                  const flow = Number(stateMap['sensor.flo_shutoff_water_flow_rate']?.state ?? 0);
                  return `<div class="tile-copy"><div class="tile-label">Water</div><div class="tile-meta">${flow.toFixed(1)} gal/min</div></div>`;
                ]]]
            tap_action:
              action: navigate
              navigation_path: /calm-mobile/water
            styles:
              <<: *compact_tile_styles
            extra_styles: *compact_tile_extra
          - type: custom:button-card
            entity: sensor.wine_cave_status
            show_icon: false
            show_name: false
            show_state: false
            custom_fields:
              icon: >-
                [[[
                  const stateMap = hass?.states || {};
                  const status = entity?.state || 'Unknown';
                  const cooling = stateMap['binary_sensor.wine_cave_cooling_cycle']?.state === 'on';
                  const actionable = stateMap['binary_sensor.wine_cave_actionable_alert']?.state === 'on';
                  const unavailable = stateMap['binary_sensor.wine_cave_sensor_unavailable']?.state === 'on';
                  const coolingChanged = Date.parse(stateMap['binary_sensor.wine_cave_cooling_cycle']?.last_changed || '');
                  const coolingMinutes = Number.isFinite(coolingChanged)
                    ? (Date.now() - coolingChanged) / 60000
                    : 0;
                  let icon = 'mdi:glass-wine';
                  let color = '#94a3b8';
                  if (unavailable) {
                    icon = 'mdi:wifi-alert';
                    color = '#f59e0b';
                  } else if (cooling && !actionable && coolingMinutes >= 90) {
                    icon = 'mdi:snowflake-alert';
                    color = '#f59e0b';
                  } else if (cooling && !actionable) {
                    icon = 'mdi:snowflake';
                    color = '#7dd3fc';
                  } else if (['Optimal', 'Normal', 'Good'].includes(status)) {
                    color = '#22c55e';
                  } else if (['Warning', 'Caution'].includes(status)) {
                    icon = 'mdi:alert-circle-outline';
                    color = '#f59e0b';
                  } else if (status === 'Critical') {
                    icon = 'mdi:alert-circle';
                    color = '#ef4444';
                  }
                  return `<div class="tile-icon"><ha-icon icon="${icon}" style="color:${color}"></ha-icon></div>`;
                ]]]
              text: >-
                [[[
                  const stateMap = hass?.states || {};
                  const status = entity?.state || 'Unknown';
                  const cooling = stateMap['binary_sensor.wine_cave_cooling_cycle']?.state === 'on';
                  const actionable = stateMap['binary_sensor.wine_cave_actionable_alert']?.state === 'on';
                  const unavailable = stateMap['binary_sensor.wine_cave_sensor_unavailable']?.state === 'on';
                  const coolingChanged = Date.parse(stateMap['binary_sensor.wine_cave_cooling_cycle']?.last_changed || '');
                  const coolingMinutes = Number.isFinite(coolingChanged)
                    ? (Date.now() - coolingChanged) / 60000
                    : 0;
                  let meta = status || 'Unknown';
                  if (unavailable) {
                    meta = 'Sensor unavailable';
                  } else if (cooling && !actionable && coolingMinutes >= 90) {
                    meta = 'Cycle still settling';
                  } else if (cooling && !actionable) {
                    meta = 'Cooling cycle in progress';
                  } else if (['Optimal', 'Normal', 'Good'].includes(status)) {
                    meta = 'Healthy';
                  } else if (['Warning', 'Caution'].includes(status)) {
                    meta = 'Needs attention';
                  } else if (status === 'Critical') {
                    meta = 'Critical';
                  }
                  return `<div class="tile-copy"><div class="tile-label">Wine cave</div><div class="tile-meta">${meta}</div></div>`;
                ]]]
            tap_action:
              action: navigate
              navigation_path: /calm-mobile/wine
            styles:
              <<: *compact_tile_styles
            extra_styles: *compact_tile_extra
          - type: custom:button-card
            entity: sensor.espresso_maintenance_status
            show_icon: false
            show_name: false
            show_state: false
            custom_fields:
              icon: >-
                [[[
                  const stateMap = hass?.states || {};
                  const status = entity?.state || 'Unknown';
                  const cafizaDue = stateMap['binary_sensor.espresso_cafiza_clean_due']?.state === 'on';
                  const maintenanceDue = stateMap['binary_sensor.espresso_maintenance_due']?.state === 'on';
                  const enabled = stateMap['input_boolean.espresso_maintenance_enabled']?.state !== 'off';
                  const color = !enabled || status === 'Snoozed'
                    ? '#94a3b8'
                    : cafizaDue
                      ? '#ef4444'
                      : maintenanceDue
                        ? '#f59e0b'
                        : '#22c55e';
                  return `<div class="tile-icon"><ha-icon icon="mdi:coffee-maker-outline" style="color:${color}"></ha-icon></div>`;
                ]]]
              text: >-
                [[[
                  const status = entity?.state || 'Unknown';
                  return `<div class="tile-copy"><div class="tile-label">Espresso</div><div class="tile-meta">${status}</div></div>`;
                ]]]
            tap_action:
              action: fire-dom-event
              browser_mod:
                service: browser_mod.popup
                data:
                  popup_card_id: espresso-maintenance-popup
            hold_action:
              action: more-info
            styles:
              <<: *compact_tile_styles
            extra_styles: *compact_tile_extra
      - type: conditional
