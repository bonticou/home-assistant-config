                  - grid-template-rows: min-content min-content
                  - column-gap: 10px
                  - row-gap: 3px
                  - align-items: center
                custom_fields:
                  icon:
                    - grid-area: icon
                  name:
                    - grid-area: name
                    - justify-self: start
                    - color: "#f8fafc"
                    - font-size: 14px
                    - font-weight: 760
                    - line-height: 1.05
                  meta:
                    - grid-area: meta
                    - justify-self: start
                    - min-width: 0
                    - color: "#cbd5e1"
                    - font-size: 11px
                    - font-weight: 650
                    - line-height: 1.15
                    - white-space: nowrap
                    - overflow: hidden
                    - text-overflow: ellipsis
                  state:
                    - grid-area: state
                    - justify-self: end
                    - line-height: 1
              extra_styles: |
