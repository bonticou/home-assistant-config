              icon: >-
                {% set issues = states('sensor.away_security_entry_point_issues') | int(0) %}
                {{ 'mdi:shield-check-outline' if issues == 0 else 'mdi:shield-alert-outline' }}
              icon_color: >-
                {% set issues = states('sensor.away_security_entry_point_issues') | int(0) %}
                {{ 'green' if issues == 0 else 'amber' }}
              tap_action:
                action: none
