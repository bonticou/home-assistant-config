title: Calm Mobile
views:
  - title: Home
    path: home
    icon: mdi:home-variant-outline
    cards:
      - type: custom:mushroom-title-card
        title: >-
          {% set is_night = is_state('sun.sun', 'below_horizon') %}
          {% set hour = now().hour %}
          {% if is_night and hour < 5 %}Good night
          {% elif hour < 12 %}Good morning
          {% elif hour < 17 %}Good afternoon
          {% elif not is_night %}Good evening
          {% else %}Good night{% endif %}

      - type: custom:mushroom-template-card
        entity: weather.forecast_home
        primary: >-
          {% set t = state_attr('weather.forecast_home', 'temperature') | int(0) %}
          {% set s = states('weather.forecast_home') %}
          {% set hour = now().hour %}
          {% if hour < 5 %}
            {% set label = {
              'clear-night': 'A clear night',
              'sunny': 'A clear night',
              'partlycloudy': 'Partly cloudy night',
              'cloudy': 'Overcast tonight',
              'rainy': 'Rainy tonight',
              'pouring': 'Heavy rain tonight',
              'snowy': 'Snowing tonight',
              'snowy-rainy': 'Wintry mix tonight',
              'windy': 'Windy tonight',
              'windy-variant': 'Breezy and cloudy',
              'fog': 'Foggy tonight',
              'lightning': 'Thunderstorms',
              'lightning-rainy': 'Stormy tonight'
            } %}
          {% elif hour < 12 %}
            {% set label = {
              'clear-night': 'Clear morning',
              'sunny': 'Clear morning',
              'partlycloudy': 'Partly cloudy morning',
              'cloudy': 'Overcast morning',
              'rainy': 'Rainy morning',
              'pouring': 'Heavy rain',
              'snowy': 'Snowing',
              'snowy-rainy': 'Wintry mix',
              'windy': 'Windy morning',
              'windy-variant': 'Breezy and cloudy',
              'fog': 'Foggy morning',
              'lightning': 'Thunderstorms',
              'lightning-rainy': 'Stormy morning'
            } %}
          {% elif hour < 17 %}
            {% set label = {
              'clear-night': 'A bright afternoon',
              'sunny': 'A sunny afternoon',
              'partlycloudy': 'A partly cloudy afternoon',
              'cloudy': 'An overcast afternoon',
              'rainy': 'A rainy afternoon',
              'pouring': 'A stormy afternoon',
              'snowy': 'A snowy afternoon',
              'snowy-rainy': 'A wintry afternoon',
              'windy': 'A windy afternoon',
              'windy-variant': 'A breezy afternoon',
              'fog': 'A foggy afternoon',
              'lightning': 'Thunderstorms this afternoon',
              'lightning-rainy': 'A stormy afternoon'
            } %}
          {% elif hour < 21 %}
            {% set label = {
              'clear-night': 'A calm evening',
              'sunny': 'A golden evening',
              'partlycloudy': 'A partly cloudy evening',
              'cloudy': 'An overcast evening',
              'rainy': 'A rainy evening',
              'pouring': 'A stormy evening',
              'snowy': 'A snowy evening',
              'snowy-rainy': 'A wintry evening',
              'windy': 'A windy evening',
              'windy-variant': 'A breezy evening',
              'fog': 'A foggy evening',
              'lightning': 'Thunderstorms this evening',
              'lightning-rainy': 'A stormy evening'
            } %}
          {% else %}
            {% set label = {
              'clear-night': 'A quiet night',
              'sunny': 'A quiet night',
              'partlycloudy': 'A partly cloudy night',
              'cloudy': 'An overcast night',
              'rainy': 'A rainy night',
              'pouring': 'A stormy night',
              'snowy': 'A snowy night',
              'snowy-rainy': 'A wintry night',
              'windy': 'A windy night',
              'windy-variant': 'A breezy night',
              'fog': 'A foggy night',
              'lightning': 'Thunderstorms tonight',
              'lightning-rainy': 'A stormy night'
            } %}
          {% endif %}
          {{ t }}° · {{ label[s] | default(s) }} at Chestnut Ridge
        secondary: >-
          {% set humidity = state_attr('weather.forecast_home', 'humidity') | int(0) %}
          {% set wind = state_attr('weather.forecast_home', 'wind_speed') | int(0) %}
          {{ humidity }}% humidity{% if wind > 15 %} · {{ wind }} mph{% endif %}
        icon: >-
          {% set state = states('weather.forecast_home') %}
          {% set icons = {
            'clear-night': 'mdi:weather-night',
            'sunny': 'mdi:weather-sunny',
            'partlycloudy': 'mdi:weather-partly-cloudy',
            'cloudy': 'mdi:weather-cloudy',
            'rainy': 'mdi:weather-rainy',
            'pouring': 'mdi:weather-pouring',
            'snowy': 'mdi:weather-snowy',
            'snowy-rainy': 'mdi:weather-snowy-rainy',
            'windy': 'mdi:weather-windy',
            'windy-variant': 'mdi:weather-windy-variant',
            'fog': 'mdi:weather-fog',
            'lightning': 'mdi:weather-lightning',
            'lightning-rainy': 'mdi:weather-lightning-rainy'
          } %}
          {{ icons[state] | default('mdi:weather-cloudy') }}
        icon_color: >-
          {% set state = states('weather.forecast_home') %}
          {% if state == 'sunny' %}amber
          {% elif state in ['rainy', 'pouring', 'lightning-rainy'] %}blue
          {% elif state in ['snowy', 'snowy-rainy'] %}light-blue
          {% else %}grey{% endif %}
        tap_action:
          action: more-info
        card_mod:
          style: |
            ha-card {
              border: none;
              box-shadow: none;
            }
            .primary {
              font-size: 20px !important;
              font-weight: 400 !important;
            }
            .secondary {
              opacity: 0.65 !important;
            }

      - type: custom:mushroom-chips-card
        alignment: left
        chips:
          - type: template
            entity: device_tracker.unifi_default_42_15_78_4a_d9_f8
            icon: >-
              {{ 'mdi:home' if is_state('device_tracker.unifi_default_42_15_78_4a_d9_f8', 'home') else 'mdi:home-export-outline' }}
            icon_color: >-
              {{ 'green' if is_state('device_tracker.unifi_default_42_15_78_4a_d9_f8', 'home') else 'grey' }}
            content: >-
              {{ 'Casey home' if is_state('device_tracker.unifi_default_42_15_78_4a_d9_f8', 'home') else 'Casey away' }}
            tap_action:
              action: more-info
          - type: template
            icon: >-
              {% set ignore_door_lights = is_state('binary_sensor.door_lights_schedule_active', 'on') %}
              {% set light_count = states.light
                | selectattr('state', 'eq', 'on')
                | rejectattr('attributes.entity_id', 'defined')
                | list
                | count %}
              {% set door_switch_count = [
                states('switch.master_lantern'),
                states('switch.front_foyer_sconces')
              ] | select('eq', 'on') | list | count %}
              {% set switch_count = 0 if ignore_door_lights else door_switch_count %}
              {{ 'mdi:lightbulb-on-outline' if (light_count + switch_count) > 0 else 'mdi:lightbulb-off-outline' }}
            icon_color: >-
              {% set ignore_door_lights = is_state('binary_sensor.door_lights_schedule_active', 'on') %}
              {% set light_count = states.light
                | selectattr('state', 'eq', 'on')
                | rejectattr('attributes.entity_id', 'defined')
                | list
                | count %}
              {% set door_switch_count = [
                states('switch.master_lantern'),
                states('switch.front_foyer_sconces')
              ] | select('eq', 'on') | list | count %}
              {% set switch_count = 0 if ignore_door_lights else door_switch_count %}
              {{ 'amber' if (light_count + switch_count) > 0 else 'grey' }}
            content: >-
              {% set ignore_door_lights = is_state('binary_sensor.door_lights_schedule_active', 'on') %}
              {% set light_count = states.light
                | selectattr('state', 'eq', 'on')
                | rejectattr('attributes.entity_id', 'defined')
                | list
                | count %}
              {% set door_switch_count = [
                states('switch.master_lantern'),
                states('switch.front_foyer_sconces')
              ] | select('eq', 'on') | list | count %}
              {% set switch_count = 0 if ignore_door_lights else door_switch_count %}
              {{ 'Lights on' if (light_count + switch_count) > 0 else 'Lights off' }}
            tap_action:
              action: navigate
              navigation_path: /calm-mobile/lights
          - type: template
            entity: sensor.basement_air_quality_radon
            icon: mdi:radioactive
            icon_color: >-
              {% set radon = states('sensor.basement_air_quality_radon') | float(0) %}
              {% if radon < 100 %}green
              {% elif radon < 148 %}orange
              {% else %}red{% endif %}
            content: Radon
            tap_action:
              action: more-info

      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:button-card
            entity: lock.aqara_smart_lock_u100
            show_icon: false
            show_name: false
            show_state: false
            custom_fields:
              icon: >-
                [[[
                  const icon = entity.state === 'unlocked'
                    ? 'mdi:lock-open-variant-outline'
                    : 'mdi:lock-outline';
                  const color = entity.state === 'unlocked' ? '#ef4444' : '#22c55e';
                  return `<div class="tile-icon"><ha-icon icon="${icon}" style="color:${color}"></ha-icon></div>`;
                ]]]
              text: >-
                [[[
                  const meta = entity.state === 'unlocked' ? 'Unlocked' : 'Locked';
                  return `<div class="tile-copy"><div class="tile-label">Garage</div><div class="tile-meta">${meta}</div></div>`;
                ]]]
            tap_action:
              action: toggle
            hold_action:
              action: more-info
            styles:
              &compact_tile_styles
              card:
                - height: 44px
                - padding: 0 10px
                - border-radius: 20px
                - box-shadow: none
                - text-align: left
                - overflow: hidden
              grid:
                - grid-template-areas: '"icon text"'
                - grid-template-columns: 24px minmax(0, 1fr)
                - column-gap: 8px
                - align-items: center
              custom_fields:
                icon:
                  - grid-area: icon
                  - justify-self: start
                  - align-self: center
                text:
                  - grid-area: text
                  - justify-self: stretch
                  - align-self: center
                  - min-width: 0
            extra_styles: &compact_tile_extra |
              .tile-icon {
                width: 24px;
                height: 24px;
                border-radius: 999px;
                background: rgba(148, 163, 184, 0.14);
                display: grid;
                place-items: center;
                line-height: 0;
              }
              .tile-icon ha-icon {
                display: block;
                width: 14px;
                height: 14px;
                margin: 0;
                padding: 0;
                line-height: 0;
                --mdc-icon-size: 14px;
              }
              .tile-icon ha-svg-icon,
              .tile-icon svg {
                display: block;
                width: 14px;
                height: 14px;
              }
              .tile-label {
                color: #f8fafc;
                font-size: 13px;
                font-weight: 500;
                line-height: 1.1;
              }
              .tile-copy {
                display: flex;
                width: 100%;
                min-height: 100%;
                flex-direction: column;
                justify-content: center;
                align-items: flex-start;
                text-align: left;
              }
              .tile-meta {
                color: rgba(226, 232, 240, 0.74);
                font-size: 11px;
                line-height: 1.1;
                margin-top: 1px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
              }
          - type: custom:button-card
            entity: switch.flo_shutoff_shutoff_valve
            show_icon: false
            show_name: false
            show_state: false
            custom_fields:
              icon: >-
                [[[
                  const flow = Number(states['sensor.flo_shutoff_water_flow_rate']?.state ?? 0);
                  const color = entity.state === 'off'
                    ? '#ef4444'
                    : flow > 0.1 ? '#3b82f6' : '#22c55e';
                  return `<div class="tile-icon"><ha-icon icon="mdi:water" style="color:${color}"></ha-icon></div>`;
                ]]]
              text: >-
                [[[
                  const flow = Number(states['sensor.flo_shutoff_water_flow_rate']?.state ?? 0);
                  return `<div class="tile-copy"><div class="tile-label">Water</div><div class="tile-meta">${flow.toFixed(1)} gal/min</div></div>`;
                ]]]
            tap_action:
              action: navigate
              navigation_path: /calm-mobile/water
            styles:
              <<: *compact_tile_styles
            extra_styles: *compact_tile_extra
          - type: custom:button-card
            entity: sensor.wine_cave_status
            show_icon: false
            show_name: false
            show_state: false
            custom_fields:
              icon: >-
                [[[
                  const status = entity.state;
                  const color = ['Optimal', 'Normal', 'Good'].includes(status)
                    ? '#22c55e'
                    : ['Warning', 'Caution'].includes(status)
                      ? '#f59e0b'
                      : status === 'Critical'
                        ? '#ef4444'
                        : '#94a3b8';
                  return `<div class="tile-icon"><ha-icon icon="mdi:glass-wine" style="color:${color}"></ha-icon></div>`;
                ]]]
              text: >-
                [[[
                  const status = entity.state;
                  const meta = ['Optimal', 'Normal', 'Good'].includes(status)
                    ? 'Healthy'
                    : ['Warning', 'Caution'].includes(status)
                      ? 'Needs attention'
                      : status === 'Critical'
                        ? 'Critical'
                        : (status || 'Unknown');
                  return `<div class="tile-copy"><div class="tile-label">Wine cave</div><div class="tile-meta">${meta}</div></div>`;
                ]]]
            tap_action:
              action: navigate
              navigation_path: /calm-mobile/wine
            styles:
              <<: *compact_tile_styles
            extra_styles: *compact_tile_extra
          - type: custom:button-card
            entity: media_player.kitchen_speakers
            show_icon: false
            show_name: false
            show_state: false
            custom_fields:
              icon: >-
                [[[
                  const color = ['playing', 'paused'].includes(entity.state) ? '#3b82f6' : '#94a3b8';
                  return `<div class="tile-icon"><ha-icon icon="mdi:speaker-wireless" style="color:${color}"></ha-icon></div>`;
                ]]]
              text: >-
                [[[
                  const meta = entity.state === 'playing' ? 'Playing' : entity.state === 'paused' ? 'Ready' : 'Idle';
                  return `<div class="tile-copy"><div class="tile-label">Music</div><div class="tile-meta">${meta}</div></div>`;
                ]]]
            tap_action:
              action: navigate
              navigation_path: /calm-mobile/music
            styles:
              <<: *compact_tile_styles
            extra_styles: *compact_tile_extra

      - type: custom:mushroom-title-card
        title: Cameras

      - type: custom:mushroom-template-card
        primary: Latest motion
        secondary: >-
          {% set cameras = [
            ('g6_instant_2', 'Backyard'),
            ('g6_instant', 'Basement'),
            ('wynn_s_room', "Wynn's Room"),
            ('mud_room', 'Mud Room')
          ] %}
          {% set keywords = ['motion', 'occupancy', 'person', 'smart', 'ring'] %}
          {% set ns = namespace(entity='', label='', ts=0, active=false) %}
          {% for prefix, label in cameras %}
            {% for sensor in states.binary_sensor %}
              {% set entity = sensor.entity_id %}
              {% if prefix in entity and sensor.state not in ['unknown', 'unavailable'] %}
                {% set matched = namespace(ok=false) %}
                {% for keyword in keywords %}
                  {% if keyword in entity %}
                    {% set matched.ok = true %}
                  {% endif %}
                {% endfor %}
                {% if matched.ok %}
                  {% set changed = as_timestamp(sensor.last_changed, 0) %}
                  {% if changed > ns.ts %}
                    {% set ns.entity = entity %}
                    {% set ns.label = label %}
                    {% set ns.ts = changed %}
                    {% set ns.active = is_state(entity, 'on') %}
                  {% endif %}
                {% endif %}
              {% endif %}
            {% endfor %}
          {% endfor %}
          {% if ns.entity %}
            {{ ns.label }} · {{ 'Motion now' if ns.active else relative_time(states[ns.entity].last_changed) ~ ' ago' }}
          {% else %}
            No camera motion data available yet
          {% endif %}
        icon: mdi:cctv
        icon_color: >-
          {% set cameras = [
            'g6_instant_2',
            'g6_instant',
            'wynn_s_room',
            'mud_room'
          ] %}
          {% set keywords = ['motion', 'occupancy', 'person', 'smart', 'ring'] %}
          {% set ns = namespace(active=false) %}
          {% for prefix in cameras %}
            {% for sensor in states.binary_sensor %}
              {% set entity = sensor.entity_id %}
              {% if prefix in entity and is_state(entity, 'on') %}
                {% set matched = namespace(ok=false) %}
                {% for keyword in keywords %}
                  {% if keyword in entity %}
                    {% set matched.ok = true %}
                  {% endif %}
                {% endfor %}
                {% if matched.ok %}
                  {% set ns.active = true %}
                {% endif %}
              {% endif %}
            {% endfor %}
          {% endfor %}
          {{ 'teal' if ns.active else 'grey' }}
        layout: horizontal
        tap_action:
          action: none
        card_mod:
          style: |
            ha-card {
              border: none;
              box-shadow: none;
              padding: 0;
            }
            .primary {
              font-size: 20px !important;
              font-weight: 400 !important;
              color: inherit !important;
            }
            .secondary {
              color: inherit !important;
              font-size: 14px !important;
              line-height: 1.4 !important;
              opacity: 0.65 !important;
            }

