  - title: Water
    path: water
    icon: mdi:water-outline
    cards:
      - type: custom:mushroom-title-card
        title: Water

      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-template-card
            entity: sensor.flo_shutoff_water_flow_rate
            primary: Flow rate
            secondary: >-
              {{ states('sensor.flo_shutoff_water_flow_rate') | float(0) | round(2) }} gal/min
            icon: mdi:waves-arrow-right
            icon_color: >-
              {% set flow = states('sensor.flo_shutoff_water_flow_rate') | float(0) %}
              {% if flow > 8 %}red
              {% elif flow > 1 %}blue
              {% else %}green{% endif %}
          - type: custom:mushroom-template-card
            entity: sensor.flo_shutoff_water_pressure
            primary: Pressure
            secondary: >-
              {{ states('sensor.flo_shutoff_water_pressure') | float(0) | round(0) }} psi
            icon: mdi:gauge
            icon_color: >-
              {% set pressure = states('sensor.flo_shutoff_water_pressure') | float(0) %}
              {% if pressure < 40 or pressure > 80 %}orange
              {% else %}blue{% endif %}
          - type: custom:mushroom-template-card
            entity: sensor.flo_shutoff_today_s_water_usage
            primary: Daily usage
            secondary: >-
              {{ states('sensor.flo_shutoff_today_s_water_usage') | float(0) | round(0) }} gallons
            icon: mdi:water-opacity
            icon_color: >-
              {% set gallons = states('sensor.flo_shutoff_today_s_water_usage') | float(0) %}
              {{ 'orange' if gallons > 400 else 'blue' }}
          - type: custom:mushroom-template-card
            entity: switch.flo_shutoff_shutoff_valve
            primary: Shutoff valve
            secondary: >-
              {{ 'Closed' if is_state('switch.flo_shutoff_shutoff_valve', 'off') else 'Open' }}
            icon: mdi:pipe-valve
            icon_color: >-
              {{ 'red' if is_state('switch.flo_shutoff_shutoff_valve', 'off') else 'green' }}
            tap_action:
              action: more-info

      - type: custom:mushroom-title-card
        title: Last 7 Days
        subtitle: Daily water usage including today

      - type: custom:apexcharts-card
        graph_span: 7d
        header:
          show: false
        apex_config:
          chart:
            height: 220
            type: bar
          plotOptions:
            bar:
              borderRadius: 8
              columnWidth: 48%
          grid:
            borderColor: rgba(120, 120, 120, 0.16)
          legend:
            show: false
          tooltip:
            theme: dark
            x:
              format: ddd
          xaxis:
            labels:
              format: ddd
              style:
                colors: rgba(226, 232, 240, 0.74)
                fontSize: 12px
                fontWeight: 500
        yaxis:
          - min: 0
            decimals: 0
            apex_config:
              tickAmount: 4
        series:
          - entity: sensor.flo_shutoff_today_s_water_usage
            name: Usage
            type: column
            color: '#4da3ff'
            stroke_width: 0
            group_by:
              func: max
              duration: 1d

      - type: custom:mushroom-title-card
        title: Last 24 Hours
        subtitle: Flow spikes and pressure drift

      - type: custom:apexcharts-card
        graph_span: 24h
        header:
          show: true
          title: Flow and Pressure
        apex_config:
          chart:
            height: 220
          stroke:
            curve: smooth
          grid:
            borderColor: rgba(120, 120, 120, 0.16)
          legend:
            show: false
          tooltip:
            theme: dark
        yaxis:
          - id: flow
            min: 0
            decimals: 1
            apex_config:
              tickAmount: 4
          - id: pressure
            min: 30
            max: 90
            opposite: true
            decimals: 0
            apex_config:
              tickAmount: 4
        series:
          - entity: sensor.flo_shutoff_water_flow_rate
            name: Flow
