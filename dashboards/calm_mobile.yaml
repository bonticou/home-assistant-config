              --wine-chart-subtitle: "{% set temp = states('sensor.wine_temperature_24h_stats') %}{% set humidity = states('sensor.wine_humidity_24h_stats') %}{% if is_number(temp) and is_number(humidity) %}Mean temp {{ temp | float | round(1) }}°F · Mean humidity {{ humidity | float | round(0) }}%{% else %}Mean settling in{% endif %}";
              border: 1px solid rgba(148, 163, 184, 0.18);
              box-shadow: 0 10px 20px rgba(2, 8, 23, 0.18);
              border-radius: 24px;
              padding: 0;
              position: relative;
              background: linear-gradient(180deg, rgba(15, 23, 42, 0.78), rgba(30, 41, 59, 0.72)) !important;
              backdrop-filter: blur(16px) saturate(160%);
              -webkit-backdrop-filter: blur(16px) saturate(160%);
              overflow: hidden;
              --primary-text-color: #f8fafc;
              --secondary-text-color: #94a3b8;
            }
            ha-card::before {
              content: var(--wine-chart-title);
              position: absolute;
              top: 16px;
              left: 18px;
              right: 18px;
              color: #f8fafc;
