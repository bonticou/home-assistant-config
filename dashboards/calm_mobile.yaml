                  color: #f8fafc;
                }
                .room-title {
                  color: #f8fafc;
                  font-size: 31px;
                  font-weight: 720;
                  line-height: 1.05;
                  letter-spacing: 0;
                  text-align: left;
                }
                .room-subtitle {
                  margin-top: 5px;
                  color: rgba(226, 232, 240, 0.66);
                  font-size: 12px;
                  font-weight: 620;
                  letter-spacing: 0.04em;
                  text-transform: uppercase;
                  text-align: left;
                }
                .climate-metrics {
                  display: grid;
                  grid-template-columns: repeat(3, minmax(0, 1fr));
                  gap: 12px;
                  margin-top: 26px;
                  align-items: center;
                }
                .metric {
                  min-width: 0;
                  display: flex;
                  align-items: center;
