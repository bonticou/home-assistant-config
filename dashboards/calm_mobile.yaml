                  width: 34px;
                  height: 34px;
                  border-radius: 15px;
                  display: grid;
                  place-items: center;
                  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
                }
                .security-motion-icon.armed {
                  background: rgba(34, 197, 94, 0.14);
                  color: #22c55e;
                }
                .security-motion-icon.paused {
                  background: rgba(245, 158, 11, 0.15);
                  color: #fbbf24;
                }
                .security-motion-icon ha-icon {
                  --mdc-icon-size: 20px;
                }
                .security-motion-state {
                  display: inline-flex;
                  align-items: center;
                  justify-content: center;
                  min-height: 24px;
