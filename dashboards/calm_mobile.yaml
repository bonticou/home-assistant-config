            ha-card {
              min-height: 180px;
              border: none;
              box-shadow: 0 20px 42px rgba(15, 23, 42, 0.22);
              border-radius: 28px;
              padding: 14px 8px;
              border: 1px solid rgba(148, 163, 184, 0.18);
              color: rgba(15, 23, 42, 0.92) !important;
              --primary-text-color: rgba(15, 23, 42, 0.92) !important;
              --secondary-text-color: rgba(30, 41, 59, 0.78) !important;
